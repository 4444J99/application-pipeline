    \ powers voice AI applications for OpenAI, xAI, Salesforce, Coursera, Spotify,\
    \ and thousands of others, collectively facilitating billions of calls each year.\
    \ You\u2019ll thrive at LiveKit if you: are obsessed with helping developers succeed\
    \ are known as the go-to person for solving tricky technical issues work hard\
    \ and can move fast without sacrificing quality care deeply about polish, detail,\
    \ and clear communication are a fast learner, frequently picking up new tools,\
    \ systems, and skills The best way to impress us is by showing how you help others\
    \ unblock themselves\u2014and maybe by tinkering with LiveKit along the way \U0001F60A\
    \ About This Role LiveKit is seeking a Forward Deployed Engineer (FDE) to work\
    \ directly with customers building real-time communication and voice AI applications\
    \ on the LiveKit platform. This role sits at the intersection of engineering,\
    \ architecture, and customer implementation . Forward Deployed Engineers partner\
    \ closely with customers to design systems, prototype solutions, and solve complex\
    \ technical challenges as teams move from experimentation to production. You\u2019\
    ll work alongside customers\u2019 engineering teams to help them successfully\
    \ deploy and scale applications built on LiveKit. That may include designing architectures,\
    \ building integrations, debugging production issues, or developing reference\
    \ implementations that demonstrate best practices. This is an ideal role for engineers\
    \ who enjoy solving real-world problems in real customer environments . You\u2019\
    ll collaborate closely with Product and Engineering to surface insights from customer\
    \ implementations and help shape the future of the LiveKit platform. Your mission:\
    \ make it seamless for developers to build and scale real-time audio, video, and\
    \ AI applications on LiveKit. What You\u2019ll Do Work directly with customer\
    \ engineering teams to design and implement real-time applications built on LiveKit.\
    \ Design scalable architectures for voice AI, real-time media, and developer platform\
    \ use cases. Build prototype integrations, reference implementations, and sample\
    \ applications to accelerate customer development. Help customers navigate SDKs,\
    \ APIs, infrastructure, and deployment strategies for production systems. Debug\
    \ and troubleshoot complex technical issues in production environments . Lead\
    \ technical workshops and architecture sessions with developers and product teams.\
    \ Translate customer needs into technical insights that inform product and platform\
    \ development . Partner with Product and Engineering to improve developer experience,\
    \ documentation, and tooling . Contribute code, examples, or improvements to LiveKit\u2019\
    s open-source ecosystem when helpful. Act as a trusted advisor helping customers\
    \ successfully launch and scale applications on LiveKit . Who You Are Strong engineering\
    \ background with 5+ years of experience in backend or infrastructure engineering\
    \ . Proficient in one or more programming languages such as Go, Python, Node,\
    \ Rust, or C++ . Comfortable working across APIs, SDKs, distributed systems, and\
    \ cloud infrastructure . Experience building or integrating developer platforms\
    \ or real-time systems . Able to quickly understand complex systems and debug\
    \ issues in real-world environments . Strong communicator who can collaborate\
    \ directly with customer engineering teams and internal product teams . Comfortable\
    \ operating in fast-paced, low-process environments where ownership and initiative\
    \ matter. Excited to work hands-on with customers solving complex technical implementation\
    \ challenges . Bonus Points Experience with WebRTC, real-time media systems, or\
    \ telephony/SIP infrastructure . Familiarity with voice AI, conversational agents,\
    \ or AI infrastructure . Experience working in customer-facing engineering roles\
    \ such as Solutions Engineer, Field Engineer, or Forward Deployed Engineer. Experience\
    \ contributing to open-source projects or developer ecosystems . Previous experience\
    \ building with or integrating LiveKit . Our Commitments to You We offer The opportunity\
    \ to build technology powering the next generation of real-time and voice AI applications\
    \ Work alongside world-class engineers and open-source contributors Competitive\
    \ salary and equity package Health, dental, and vision benefits Flexible vacation\
    \ policy"
