# Notification configuration for pipeline events.
# Channels: webhook (POST JSON), email (SMTP), file (local YAML log).
# File channel logs to signals/notification-log.yaml (always works, no setup).
# Each event type maps to a list of channels to notify.

webhooks: []
  # - https://hooks.slack.com/services/YOUR/WEBHOOK/URL

email:
  smtp_host: ""
  smtp_port: 587
  sender: ""
  password: ""
  recipients: []

subscriptions:
  weekly_brief:
    - file
  agent_action:
    - file
  deadline_alert:
    - file
  outcome_received:
    - file
  triage_report:
    - file
