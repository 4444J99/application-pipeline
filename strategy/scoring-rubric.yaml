version: "1.0"
description: >
  8-dimension weighted scoring rubric for pipeline entries.
  Source of truth for score.py weights and auto-qualify thresholds.

# Default weights for creative/grant/residency tracks (must sum to 1.0)
weights:
  mission_alignment: 0.25
  evidence_match: 0.20
  track_record_fit: 0.15
  financial_alignment: 0.10
  effort_to_value: 0.10
  strategic_value: 0.10
  deadline_feasibility: 0.05
  portal_friction: 0.05

# Job-specific weights (human-judgment dimensions get 75%)
weights_job:
  mission_alignment: 0.35
  evidence_match: 0.25
  track_record_fit: 0.15
  strategic_value: 0.10
  financial_alignment: 0.05
  effort_to_value: 0.05
  deadline_feasibility: 0.03
  portal_friction: 0.02

thresholds:
  auto_qualify_min: 7.0
  auto_advance_to_drafting: 8.0
  tier1_cutoff: 8.5
  tier2_cutoff: 7.0
  tier3_cutoff: 5.0
  score_range_min: 1
  score_range_max: 10

# Benefits cliff thresholds (annual USD)
benefits_cliffs:
  snap_limit: 20352
  medicaid_limit: 21597
  essential_plan_limit: 39125
