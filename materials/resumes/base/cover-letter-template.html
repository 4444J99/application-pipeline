<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{NAME}} — Cover Letter</title>
<style>
  @page {
    size: 8.5in 11in;
    margin: 0.45in 0.55in;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Georgia', 'Times New Roman', serif;
    font-size: 9pt;
    line-height: 1.35;
    color: #1a1a1a;
    width: 7.4in;
    max-width: 7.4in;
    margin: 0 auto;
    padding: 0.45in 0.55in;
  }
  @media print {
    body { padding: 0; width: 100%; max-width: 100%; }
  }
  header {
    text-align: center;
    margin-bottom: 14pt;
    padding-bottom: 7pt;
    border-bottom: 1.5pt solid #1a1a1a;
  }
  header h1 {
    font-size: 16pt;
    font-weight: bold;
    font-style: italic;
    letter-spacing: 0.2pt;
    margin-bottom: 3pt;
  }
  header .contact {
    font-size: 8pt;
    color: #333;
  }
  header .contact a {
    color: #1a1a1a;
    text-decoration: underline;
    text-underline-offset: 1.5pt;
  }
  .letter-body {
    margin-top: 16pt;
  }
  .letter-body p {
    margin-bottom: 8pt;
    text-align: justify;
    text-indent: 0;
  }
  .signature {
    margin-top: 20pt;
  }
  .signature p {
    margin-bottom: 2pt;
  }
</style>
</head>
<body>
  <header>
    <h1>Anthony James Padavano</h1>
    <div class="contact">
      New York, NY &nbsp;&middot;&nbsp;
      padavano.anthony@gmail.com &nbsp;&middot;&nbsp;
      561-602-7300 &nbsp;&middot;&nbsp;
      <a href="https://4444j99.github.io/portfolio/">Portfolio</a> &nbsp;&middot;&nbsp;
      <a href="https://www.linkedin.com/in/anthonyjamespadavano">LinkedIn</a> &nbsp;&middot;&nbsp;
      <a href="https://github.com/meta-organvm">GitHub</a>
    </div>
  </header>
  <div class="letter-body">
{{BODY}}
  </div>
</body>
</html>
