<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anthony James Padavano — Cover Letter</title>
<style>
  @page {
    size: 8.5in 11in;
    margin: 0.45in 0.55in;
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: 'Georgia', 'Times New Roman', serif;
    font-size: 10.5pt;
    line-height: 1.5;
    color: #1a1a1a;
    width: 7.4in;
    max-width: 7.4in;
    margin: 0 auto;
    padding: 0.45in 0.55in;
    display: flex;
    flex-direction: column;
    min-height: 10.1in;
  }

  @media print {
    body {
      padding: 0;
      width: 100%;
      max-width: 100%;
      min-height: 100vh;
    }
  }

  /* Header — matches resume header exactly */
  header {
    text-align: center;
    margin-bottom: 12pt;
    padding-bottom: 8pt;
    border-bottom: 1.5pt solid #1a1a1a;
  }

  header h1 {
    font-size: 16pt;
    font-weight: bold;
    font-style: italic;
    letter-spacing: 0.2pt;
    margin-bottom: 3pt;
  }

  header .title-line {
    font-size: 10.5pt;
    font-weight: normal;
    font-style: normal;
    letter-spacing: 2pt;
    text-transform: uppercase;
    color: #444;
    margin-bottom: 4pt;
  }

  header .contact {
    font-size: 8pt;
    color: #333;
  }

  header .contact a {
    color: #333;
    text-decoration: none;
  }

  /* Letter body */
  .letter-body {
    margin-top: 10pt;
    flex: 1;
  }

  .letter-body p {
    margin-bottom: 11pt;
    text-align: justify;
    hyphens: auto;
  }

  .letter-body strong {
    font-weight: bold;
  }

  .letter-body em {
    font-style: italic;
  }

  /* Sign-off */
  .sign-off {
    margin-top: 18pt;
  }

  .sign-off p {
    margin-bottom: 2pt;
  }

  .sign-off .name {
    font-weight: bold;
    font-size: 10.5pt;
  }

  .sign-off .credentials {
    font-size: 9pt;
    color: #444;
  }
</style>
</head>
<body>

<header>
  <h1>Anthony James Padavano</h1>
  <div class="title-line">{{TITLE_LINE}}</div>
  <div class="contact">
    New York City &nbsp;|&nbsp; 561-602-7300 &nbsp;|&nbsp; padavano.anthony@gmail.com
  </div>
</header>

<div class="letter-body">
{{LETTER_BODY}}
</div>

<div class="sign-off">
  <p>Sincerely,</p>
  <p class="name">Anthony James Padavano</p>
  <p class="credentials">{{CREDENTIALS}}</p>
</div>

</body>
</html>
