name: Quality

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Verify module coverage matrix
        run: python scripts/verification_matrix.py --strict

      - name: Lint
        run: ruff check scripts/ tests/ --statistics

      - name: Validate pipeline YAML
        run: python scripts/validate.py --check-id-maps --check-rubric

      - name: Run tests
        run: python -m pytest tests/ -v
