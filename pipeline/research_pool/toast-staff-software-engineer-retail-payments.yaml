  description: "<p>Toast creates technology to help restaurants and local businesses\
    \ succeed in a digital world, helping business owners operate, increase sales,\
    \ engage customers, and keep employees happy.</p> <p>The Retail organization at\
    \ Toast is focused on building foundational technology to support a rapidly expanding\
    \ vertical. We emphasize early learnings and remain closely aligned with our customers,\
    \ engaging in frequent conversations with our initial retail partners to understand\
    \ their needs, pain points, and feature requests. This direct feedback loop allows\
    \ us to rapidly iterate and ensures we are building the right product for the\
    \ market. As one of the fastest-growing verticals at Toast, we offer an opportunity\
    \ to have a significant impact on the company's future growth.</p> <p>The Retail\
    \ Payments team is central to this expansion, focusing specifically on enhancing\
    \ and adding support for payment flows tailored to the retail environment. This\
    \ is a fullstack team, and can include features like allowing multiple refunds\
    \ easily, or integrating new payment terminal hardware and ensuring seamless,\
    \ robust integration with our Point-of-Sale (POS) system. The work involves tackling\
    \ complex, high-visibility challenges to ensure retail customers have a frictionless\
    \ and secure payment experience.</p> <p><strong>A day in the life (Responsibilities)&nbsp;</strong></p>\
    \ <ul> <li>Work closely with the leads to identify high-impact opportunities in\
    \ the domain</li> <li>Plan, scope, and prototype solutions from design to rollout,\
    \ using a combination of Android and server-side technologies</li> <li>Make technical\
    \ decisions and recommendations that will lay the foundation for the future of\
    \ our retail strategy</li> <li>Stay in tune with customer needs by hearing direct\
    \ customer feedback and staying abreast of industry research</li> </ul> <p><strong>What\
    \ you'll need to thrive (Requirements)</strong></p> <ul> <li>Growth mindset with\
    \ an emphasis on learning and self/team-improvement</li> <li>8+ years experience\
    \ building and shipping production software to customers</li> <li>8-10 years experience\
    \ with Java, Kotlin, or other object oriented programming languages</li> <li>Experience\
    \ with payments technology or fintech in general</li> <li>Respectful, empathetic,\
    \ and humble</li> <li>Passionate about making users happy and seeing people use\
    \ your product in the wild.</li> <li>Startup mindset and comfort with ambiguity</li>\
    \ <li>Flexible in using different tech stacks and languages</li> <li>Comfortable\
    \ with testing methodologies and frameworks</li> </ul> <p><strong>What will help\
    \ you stand out (Nonessential Skills/Nice to Haves)</strong></p> <ul> <li>Experience\
    \ in the Fintech industry</li> <li>Experience in Android engineering</li> </ul>\
    \ <p><strong>**This role requires two days hybrid work per week in our Dublin\
    \ office**</strong></p> <p data-pm-slice=\"1 1 []\"><strong>AI at Toast</strong></p>\
    \ <p>At Toast, one of our company values is that we're hungry to build and learn.\
    \ We believe learning new AI tools empowers us to build for our customers faster,\
    \ more independently, and with higher quality. We provide these tools across all\
    \ disciplines, from Engineering and Product to Sales and Support, and are inspired\
    \ by how our Toasters are already driving real value with them. The people who\
    \ thrive here are those who embrace changes that let us build more for our customers;\
    \ it\u2019s a core part of our culture.</p> <p>&nbsp;</p> <p><strong>Our Total\
    \ Rewards Philosophy&nbsp;</strong><br>We strive to provide competitive compensation\
    \ and benefits programs that help to attract, retain, and motivate the best and\
    \ brightest people in our industry. Our total rewards package goes beyond great\
    \ earnings potential and provides the means to a healthy lifestyle with the flexibility\
    \ to meet Toasters\u2019 changing needs. Learn more about our benefits at&nbsp;<a\
    \ class=\"c-link\" href=\"https://careers.toasttab.com/toast-benefits\" target=\"\
    _blank\" data-stringify-link=\"https://careers.toasttab.com/toast-benefits\" data-sk=\"\
    tooltip_parent\">https://careers.toasttab.com/toast-benefits</a>.</p> <p>#LI-HYBRID\
    \ #BI-Hybrid<br><br></p><div class=\"content-conclusion\"><p><strong>How Toast\
    \ Uses AI in its Hiring Process</strong></p> <p>Throughout the hiring process,\
    \ our goal is to get to know you. We use AI tools to support our recruiters and\
    \ interviewers with tasks like note-taking, summarization, and documentation of\
    \ interviews to ensure they can be fully focused on your conversation. All hiring\
    \ decisions are made by people.</p> <p><strong><strong data-stringify-type=\"\
    bold\">Diversity, Equity, and Inclusion is Baked into our Recipe for Success</strong></strong></p>\
    \ <p>At Toast, our employees are our secret ingredient\u2014when they thrive,\
    \ we thrive.&nbsp;The restaurant industry is one of the most diverse, and we embrace\
    \ that diversity with authenticity, inclusivity, respect, and humility. By embedding\
    \ these principles into our culture and design, we create equitable opportunities\
    \ for all and raise the bar"
