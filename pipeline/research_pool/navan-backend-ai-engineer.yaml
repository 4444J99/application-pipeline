  description: <p>We are seeking a skilled Backend Engineer to join our team and implement
    advanced AI solutions in our travel and expense management products. The ideal
    candidate will have strong backend engineering expertise and enthusiasm for working
    with cutting-edge AI technologies.<br><br>You'll be responsible for designing
    and implementing backend services that integrate AI capabilities including large
    language models (LLMs), retrieval-augmented generation (RAG), and conversational
    interfaces into our consumer-facing products. This is an opportunity to expand
    your expertise into AI while leveraging your strong engineering foundation.</p>
    <p><strong>What You’ll Do</strong><br>• Design and develop scalable, high-performance
    backend services and APIs.<br>• Implement integrations with AI platforms and services.<br>•
    Work with AI specialists to translate AI capabilities into production-ready features.<br>•
    Ensure high reliability, performance, and security of AI-powered systems.<br>•
    Collaborate with product and engineering teams to gather requirements and deliver
    solutions.</p> <p><strong>What We’re Looking for:</strong><br>• 5+ years of professional
    backend engineering experience.<br>• Strong proficiency in at least one backend
    programming language (Java etc).<br>• Experience building and maintaining production-grade
    APIs and microservices.<br>• Solid understanding of distributed systems, data
    structures, and algorithms.<br>• Experience with SQL and NoSQL databases.<br>•
    Track record of delivering consumer-facing products at scale.</p> <p>• Experience
    with AI/ML platforms and services (OpenAI, Hugging Face, etc.)<br>• Familiarity
    with LLMs, RAG, or conversational AI.<br>• Knowledge of vector databases and embedding
    technologies.<br>• Experience with cloud platforms (AWS, GCP, Azure).<br>• Understanding
    of AI/ML concepts and implementation patterns.</p>
