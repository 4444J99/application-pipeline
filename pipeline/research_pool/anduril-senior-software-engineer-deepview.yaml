  description: <div class="content-intro"><p>Anduril Industries is a defense technology
    company with a mission to transform U.S. and allied military capabilities with
    advanced technology. By bringing the expertise, technology, and business model
    of the 21st century’s most innovative companies to the defense industry, Anduril
    is changing how military systems are designed, built and sold. Anduril’s family
    of systems is powered by Lattice OS, an AI-powered operating system that turns
    thousands of data streams into a realtime, 3D command and control center. As the
    world enters an era of strategic competition, Anduril is committed to bringing
    cutting-edge autonomy, AI, computer vision, sensor fusion, and networking technology
    to the military in months, not years.</p></div><p><strong>ABOUT THE TEAM</strong><br><br>The
    Deepview team builds Anduril’s real-time 3D data visualization and analysis tool.
    Deepview ingests protobuf, image, video, and CSV data streams—rendering them in
    a time-synchronized world view with terrain, plots, and camera feeds for deep
    introspection of autonomous systems. The tool runs cross-platform (Linux, macOS,
    Windows) and supports both offline data analysis and live telemetry streaming
    over MAVLink, STANAG 4586, Flux, and gRPC.<br><br>Our team’s mission is to give
    engineers and operators the deepest possible visibility into what autonomous systems
    are doing and why. We build high-performance visualization software that handles
    massive data volumes from heterogeneous sources, enabling engineers across Anduril
    to debug, analyze, and validate autonomous behaviors in the field and in simulation.<br><br><br><strong>WHAT
    YOU’LL DO</strong></p> <ul> <li>Develop and extend Deepview’s real-time 3D rendering
    engine and 2D plotting capabilities using C++20 and OpenGL (via the Cinder framework).</li>
    <li>Build and optimize data ingestion pipelines for diverse formats including
    Protobuf, MCAP, HDF5, video (FFmpeg), KML, MAVLink telemetry logs, and CSV.</li>
    <li>Implement and maintain live telemetry streaming over gRPC, MAVLink, STANAG
    4586, and Anduril protocols.</li> <li>Design cross-platform features targeting
    Linux, macOS, and Windows using CMake.</li> <li>Create APIs (including gRPC services
    and a Python client SDK) that allow external tools and scripts to interact with
    Deepview.</li> <li>Collaborate with mission teams across Anduril to support new
    data types, visualization needs, and debugging workflows.</li> <li>Test and validate
    features through unit testing and performance benchmarks.</li> </ul> <p><br><strong>REQUIRED
    QUALIFICATIONS</strong></p> <ul> <li>3+ years of experience in C++ software engineering</li>
    <li>Experience with CMake-based build systems</li> <li>Experience developing on
    Linux-based environments</li> <li>Strong communication skills and an ability to
    work effectively with cross-functional teams</li> <li>Must be a U.S. Person due
    to required access to U.S. export controlled information or facilities</li> </ul>
    <p><br><strong>PREFERRED QUALIFICATIONS</strong></p> <ul> <li>Experience with
    real-time graphics or visualization (OpenGL, Vulkan, or similar)</li> <li>Experience
    with 3D rendering frameworks (Cinder, OpenFrameworks, or similar)</li> <li>Experience
    with geospatial libraries (GDAL, KML) or terrain rendering</li> <li>Experience
    with Nix package management or reproducible build systems</li> <li>Experience
    developing with Python or Lua scripting</li> </ul><div class="content-pay-transparency"><div
