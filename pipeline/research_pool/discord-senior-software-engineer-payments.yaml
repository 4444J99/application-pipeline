  description: "<div class=\"content-intro\"><p>Discord is used by over 200 million\
    \ people every month for many different reasons, but there\u2019s one thing that\
    \ nearly everyone does on our platform:<strong> play video games.</strong> Over\
    \ 90% of our users play games, spending a combined 1.5 billion hours playing thousands\
    \ of unique titles on Discord each month. Discord plays a uniquely important role\
    \ in the future of gaming. We are focused on making it easier and more fun for\
    \ people to talk and hang out before, during, and after playing games.</p></div><p>Come\
    \ build the future of Discord\u2019s business with us! We are looking for impact-focused\
    \ engineers to join our world-class Revenue group as we accelerate Discord\u2019\
    s growth through the creation of compelling paid products. These products allow\
    \ us to grow our business while keeping Discord\u2019s core functionality free,\
    \ and without selling ads or user data.&nbsp; You will be reporting to the Engineering\
    \ Manager of Payments.&nbsp; To learn more about Discord Engineering, take a look\
    \ at our&nbsp;<a href=\"https://blog.discord.com/tagged/engineering\">engineering\
    \ blog!</a></p> <p><strong>What You'll Be Doing</strong></p> <ul> <li>Work with\
    \ engineers on the team to build the checkout and payments system that underpins\
    \ Discord\u2019s existing business lines, and enable new revenue streams across\
    \ Web, Android, and iOS</li> <li>Own projects end to end \u2014 you\u2019ll be\
    \ responsible for working with Product to refine requirements, creating a technical\
    \ spec, implementing changes, and seeing the project through to launch</li> <li>Work\
    \ on projects to expand our payment method coverage and optimize our checkout\
    \ funnel</li> <li>Integrate with 3rd party payment gateways and other vendors\
    \ to support our purchase flows</li> <li>Support product teams by evolving our\
    \ multi-tenant payments platform to enable new monetization features and product\
    \ lines</li> <li>Partner with Product, Finance and Customer Success to improve\
    \ processes and workflows. Deliver experiments on new workflows / systems and\
    \ iterate based on feedback</li> <li>Work closely with Safety and Fraud operations\
    \ teams to implement new fraud mitigations</li> <li>Improve reliability, observability,\
    \ and stability of Discord\u2019s billing system</li> </ul> <p><strong>What you\
    \ should have</strong></p> <ul> <li><strong>5+ years of software engineering experience.</strong>\
    \ Deep expertise in backend development (Python); working knowledge of frontend\
    \ technologies (React, TypeScript) to contribute across the full stack when needed</li>\
    \ <li><strong>You have a growth mindset.</strong> You view challenges and mistakes\
    \ as learning opportunities while building upon your successes. You push yourself\
    \ and those around you to continuously improve</li> <li><strong>You have a product\
    \ sense.</strong> You maintain a high degree of empathy for your internal and\
    \ external users, and seek feedback from them about your work</li> <li><strong>You\
    \ love experimentation.</strong> You get excited when numbers move by 1%</li>\
    \ </ul> <p><strong>Bonus Points</strong></p> <ul> <li>Experience working in the\
    \ payments/fintech domain</li> <li>Experience integrating with Stripe, Adyen,\
    \ and/or Braintree</li> </ul> <p><em><br>The US base salary range for this full-time\
    \ position is <span class=\"notion-enable-hover\" data-token-index=\"0\">$196,000\
    \ - $220,500</span>&nbsp;+ equity + benefits. Our salary ranges are determined\
    \ by role and level. Within the range, individual pay is determined by additional\
    \ factors, including job-related skills, experience, and relevant education or\
    \ training. Please note that the compensation details listed in US role postings\
    \ reflect the base salary only, and do not include equity, or benefits.<br></em></p><div\
    \ class=\"content-conclusion\"><p><strong>Why Discord?&nbsp;</strong><br><br>Discord\
    \ plays a uniquely important role in the future of gaming. We're a multiplatform,\
    \ multigenerational and multiplayer platform that helps people deepen their friendships\
    \ around games and shared interests. We believe games give us a way to have fun\
    \ with our favorite people, whether listening to music together or grinding in\
    \ competitive matches for diamond rank. <strong>Join us in our mission! Your future\
    \ is just a click away!</strong></p> <p><strong>Discord is committed to inclusion\
    \ and providing reasonable accommodations during the interview process. </strong>We\
    \ want you to feel set up for success, so if you are in need of reasonable accommodations,\
    \ please let your recruiter know.</p> <p><em><strong>Please see our Applicant\
    \ and Candidate Privacy Policy for details regarding Discord\u2019s collection\
    \ and usage of personal information relating to the application and recruitment\
    \ process by clicking&nbsp;<a href=\"https://discord.com/terms/applicant-candidate-privacy-policy\"\
    >HERE.</a></strong></em></p></div>"
