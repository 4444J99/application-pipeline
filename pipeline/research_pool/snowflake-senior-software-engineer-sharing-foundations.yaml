  description: 'Snowflake is about empowering enterprises to achieve their full potential
    — and people too. With a culture that’s all in on impact, innovation, and collaboration,
    Snowflake is the sweet spot for building big, moving fast, and taking technology
    — and careers — to the next level. The Sharing Foundation team builds software
    that connects customers via data and provides customers access to the Data Cloud.
    The team builds the revolutionary Data Sharing technology and Snowflake Data Marketplace
    infrastructure. AS A SENIOR SOFTWARE ENGINEER - SHARING FOUNDATIONS YOU WILL:
    Lead highly impactful initiatives around Snowflake Data Sharing and Snowflake
    Data Marketplace. Innovate and build highly secured and reliable software to allow
    customers to be data-driven. Architect and build systems that integrate open source
    technologies seamlessly with Snowflake - enabling our customers to build and share
    massive data lake architectures across platforms and across cloud providers. Collaborate
    with Snowflake''s open-source team and the Apache Iceberg community to contribute
    new features and enhance the Iceberg REST specification. Design and implement
    highly available distributed platforms within the global Snowflake. Revolutionize
    how organizations distribute, consume, and use data as a strategic business asset.
    Ensure operational readiness of the services and meet the commitments to our customers
    regarding reliability, availability and performance. OUR IDEAL SENIOR SOFTWARE
    ENGINEER - SHARING FOUNDATIONS, WILL HAVE: 7+ years industry experience designing,
    building and supporting large-scale distributed systems in production. Strong
    programming skills in Java, Scala, or C++ with an emphasis on performance and
    reliability. Deep understanding of distributed transaction processing, concurrency
    control, and high-performance query engines. Experience with open-source data
    lake formats (e.g., Apache Iceberg, Parquet, Delta) and the challenges associated
    with multi-engine interoperability. Experience building cloud-native services
    and working with public cloud providers like AWS, Azure, or GCP. A passion for
    open-source software and community engagement, particularly in the data ecosystem.
    Familiarity with data governance, security, and access control models in distributed
    data systems. BS/MS/PhD in Computer Science or related majors, or equivalent experience.
    ABOUT SHARING AND MARKETPLACE FOUNDATIONS: Learn more about Snowflake Marketplace
    : Learn more about Data Sharing: https://www.snowflake.com/workloads/data-sharing/
    Every Snowflake employee is expected to follow the company’s confidentiality and
    security standards for handling sensitive data. Snowflake employees must abide
    by the company’s data security plan as an essential part of their duties. It is
    every employee''s duty to keep customer information secure and confidential. Snowflake
    is growing fast, and we’re scaling our team to help enable and accelerate our
    growth. We are looking for people who share our values, challenge ordinary thinking,
    and push the pace of innovation while building a future for themselves and Snowflake.
    How do you want to make your impact? For jobs located in the United States, please
    visit the job posting on the Snowflake Careers Site for salary and benefits information:
    careers.snowflake.com'
