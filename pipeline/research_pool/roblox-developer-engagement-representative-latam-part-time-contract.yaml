    \ anywhere in the world, and on any device.</span><strong> </strong><span style=\"\
    font-weight: 400;\">We\u2019re on a mission to connect a billion people with optimism\
    \ and civility, and looking for amazing talent to help us get there.&nbsp;</span></p>\
    \ <p><span style=\"font-weight: 400;\">A career at Roblox means you\u2019ll be\
    \ working to shape the future of human interaction, solving unique technical challenges\
    \ at scale, and helping to create safer, more civil shared experiences for everyone.</span></p></div><p>The\
    \ Developer Relations team at Roblox is looking for new team members for our ever-growing\
    \ International Developer Engagement Team. We're looking for someone who is passionate\
    \ about Roblox and growing the local creator community in their region.</p> <p>This\
    \ is a 6-month part-time contract position.</p> <p><strong>You will:</strong></p>\
    \ <ul> <li>Develop an understanding of Roblox moderation rules and guidelines</li>\
    \ <li>Celebrate support and engage with upcoming and current international developers\
    \ on the platform</li> <li>Identify and engage with potential partners within\
    \ the developer community to build and maintain a strong partnership pipeline</li>\
    \ <li>Plan and execute online and offline community events, workshops, and initiatives\
    \ that inspire and connect developers&nbsp;</li> <li>Support translation and localization\
    \ efforts to ensure programs, communications, and resources are accessible and\
    \ culturally relevant to global audiences.</li> </ul> <p><strong>You have:</strong></p>\
    \ <ul> <li>Great understanding of Roblox and the Roblox community</li> <li>Good\
    \ standing regarding Roblox moderation history</li> <li>Excellent speaking and\
    \ writing skills in both English and Spanish</li> <li>Believe that helping the\
    \ community is crucial to the success of the company</li> <li>Motivated to help\
    \ empower and encourage our developer community</li> <li>Team-focused and experienced\
    \ in cross-team collaboration</li> <li>Knowledgeable, with an understanding of\
    \ community processes, methodologies and best practices</li> <li>Availability\
    \ to support and attend online and offline community events</li> </ul> <p><strong>You\
    \ are:</strong></p> <ul> <li>Fluent in both English and Spanish</li> <li>Bonus\
