  description: '<p>The Mobile team’s mission is to enable teams to work together effortlessly,
    even when they are away from their desktops. We partner closely with Product Designers,
    PMs, and other product engineering teams to continuously improve the Asana experience
    for our customers on-the-go. We work hard to maintain a codebase and a culture
    that is a joy to work in by combining mobile best practices with many of the innovative
    opportunities that our in-house frameworks provide.</p> <p>Software Engineers
    at Asana are quickly trusted to own major parts of both the codebase and our processes
    through the <a href="https://wavelength.asana.com/workstyle-aors/">Areas of Responsibility</a>
    system. We expect you to thrive in defining and solving problems, with mutual
    support from your peers.</p> <p>This role is based in our New York City office
    with an office-centric hybrid schedule. The standard in-office days are Monday,
    Tuesday, and Thursday. If you''re interviewing for this role, your recruiter will
    share more about the in-office requirements.</p> <p><strong>What you’ll achieve:</strong></p>
    <ul> <li>Ship fast and deliver high-quality experiences to our global users in
    close collaboration with Product and Design partners.</li> <li>Elevate engineering
    standards through strategic technical investments, delivering improved code quality,
    expanded test coverage, and reduced technical debt.</li> <li>Craft well-documented,
    well-structured, and well-tested code.</li> <li>Help the team improve by providing
    thoughtful feedback in code/design reviews and mentoring others.</li> <li>Accelerate
    Asana’s Mobile teams by leveraging the latest practices, tooling and SDKs.</li>
    <li>Own and contribute to AoRs (Areas Of Responsibility).</li> </ul> <p><strong>About
    you</strong></p> <ul> <li>3+ years of experience developing, releasing, and maintaining
    high-quality iOS applications, ideally using Swift.</li> <li>Aware of the latest
    developments in the iOS ecosystem.</li> <li>Advocate for leaving code better than
    you found it.</li> <li>Passion for crafting a delightful end-user experience.</li>
    <li>Commitment to continuous improvement and mentorship.</li> <li>Good judgment
    for balancing scrappiness and long-term code maintainability.</li> <li>Demonstrates
    curiosity about AI tools and emerging technologies, with a willingness to learn
    and leverage them to enhance productivity, collaboration, or decision-making.</li>
    </ul> <p>At Asana, we''re committed to building teams that include a variety of
    backgrounds, perspectives, and skills, as this is critical to helping us achieve
    our mission. If you''re interested in this role and don''t meet every listed requirement,
    we still encourage you to apply.</p> <p><strong>What we’ll offer</strong></p>
    <p>Our comprehensive compensation package plays a big part in how we recognize
    you for the impact you have on our path to achieving our mission. We believe that
    compensation should be reflective of the value you create relative to the market
    value of your role. To ensure pay is fair and not impacted by biases, we''re committed
    to looking at market value which is why we check ourselves and conduct a yearly
    pay equity audit.</p> <p>For this role, the estimated base salary range is between
    $171,000- $190,000. The actual base salary will vary based on various factors,
    including market and individual qualifications objectively assessed during the
    interview process. The listed range above is a guideline, and the base salary
    range for this role may be modified.</p> <p>In addition to base salary, your compensation
    package may include additional components such as equity, sales incentive pay
    (for most sales roles), and benefits. If you''re interviewing for this role, speak
    with your Talent Acquisition Partner to learn more about the total compensation
    and benefits for this role.</p> <p>We strive to provide equitable and competitive
    benefits packages that support our employees worldwide and include:</p> <ul> <li>Mental
    health, wellness &amp; fitness benefits</li> <li>Career coaching &amp; support</li>
    <li>Inclusive family building benefits</li> <li>Long-term savings or retirement
    plans</li> <li>In-office culinary options to cater to your dietary preferences&nbsp;</li>
    </ul> <p>These are just some of the benefits we offer, and benefits may vary based
    on role, country, and local regulations. If you''re interviewing for this role,
    speak with your Talent Acquisition Partner to learn more about the total compensation
    and benefits for this role.</p> <p>#LI-Hybrid</p><div class="content-conclusion"><p><strong>About
