  description: '<div class="content-intro"><h2><strong>About Starburst</strong></h2>
    <p>Starburst is the data platform for analytics, applications, and AI, unifying
    data across clouds and on-premises to accelerate AI innovation. Organizations—from
    startups to Fortune 500 enterprises in 60+ countries—rely on Starburst for fast
    data access, seamless collaboration, and enterprise-grade governance on an open
    hybrid data lakehouse. Wherever data lives, Starburst unlocks its full potential,
    powering data and AI from development to deployment. By future-proofing data architecture,
    Starburst helps businesses fuel innovation with AI.</p></div><p><strong>About
    the role&nbsp;</strong></p> <p>As a&nbsp;<strong>Staff Engineer</strong> on the
    Spark Job Manager and Starburst Enterprise team, you will own critical backend
    and platform components that orchestrate distributed compute (Spark, Trino) for
    enterprise customers. You will lead the design and implementation of JVM-based
    services and the surrounding infrastructure: Kubernetes deployments, Docker image
    strategy, CI/CD automation, AWS integrations, and secure enterprise authentication
    flows. This is a staff-level role requiring architectural leadership, cross-team
    influence, and long-term platform ownership.</p> <p><strong>As a Staff Software
    Engineer at Starburst, you will</strong>:&nbsp;</p> <ul> <li>Own critical backend
    and platform components that orchestrate distributed compute (Spark, Trino) for
    enterprise customers.</li> <li>Lead the design and implementation of JVM-based
    services and the surrounding infrastructure, including Kubernetes deployments,
    Docker image strategy, CI/CD automation, AWS integrations, and secure enterprise
    authentication flows.</li> <li>Provide architectural leadership, cross-team influence,
    and long-term platform ownership.</li> </ul> <p><strong>Some of the things we
    look for:</strong></p> <ul> <li><strong>Deep Backend Engineering &amp; Distributed
    Systems:</strong></li> <ul> <li>8+ years of professional backend experience, with
    strong expertise in Java (primary and required) and production experience building
    JVM-based services.</li> <li>Experience designing and operating distributed systems
    in production. Working with Spark, Trino/Presto, or comparable distributed compute
    engines is a strong plus.</li> <li>Extensive experience designing and evolving
    RESTful APIs, including validation, error modeling, pagination, filtering, backward-compatible
    versioning, and OpenAPI documentation.</li> </ul> <li><strong>Infrastructure &amp;
    Operations:</strong></li> <ul> <li>Hands-on production experience with Kubernetes
    (authoring manifests/Helm charts) and strong Docker experience (multi-stage builds,
    image optimization, security best practices).</li> <li>Experience owning CI/CD
    for complex Java codebases, using GitHub Actions (preferred) or Jenkins.</li>
    <li>Practical AWS experience with S3 (or S3-compatible object storage), IAM roles/policies,
    and AWS SSO.</li> <li>Familiarity with secure authentication mechanisms: OAuth2
    / OIDC, token-based auth, and session management.</li> <li>Experience implementing
    Metrics (Prometheus preferred), Distributed tracing (OpenTelemetry), and structured
    logging for JVM services is a plus.</li> </ul> <li><strong>Staff-Level Impact:</strong></li>
    <ul> <li>Proven experience leading architecture across multiple services or systems.</li>
    <li>Demonstrated ability to drive cross-team RFCs, break down ambiguous problems,
    influence engineering standards, and raise the technical bar through code reviews
    and mentorship.</li> <li>Own long-term platform health, not just feature delivery.</li>
    </ul> <li><strong>Highly Preferred Experience:</strong></li> <ul> <li>Experience
    building job orchestration platforms.</li> <li>Experience working in enterprise
    / B2B environments.</li> <li>Strong Python skills for automation and tooling.</li>
    <li>Experience running systems in hybrid or on-prem environments.</li> <li>Collaboration
    on open-source projects is a strong plus.</li> </ul> <li><strong>Ability to Travel</strong>:
    This role will require 25% in-person travel for purposes including but not limited
    to new hire onboarding, team and department offsites, customer engagements, and
    other company events. Actual travel expectations may vary by role and business
    needs.</li> </ul> <p><strong>Where could this role be based?</strong></p> <ul>
    <li>This role is based in our Warsaw office and follows a hybrid model, with an
    expectation of being onsite 2-3 days per week.</li> </ul> <p>&nbsp;</p> <p>Salary
    ranges: 440,000 - 540,000 PLN anually&nbsp;</p><div class="content-conclusion"><h2><strong>Build
    your career at Starburst</strong></h2> <p>All-Stars have the opportunity and freedom
    to realize their true potential. By building alongside top talent, we’re empowered
    to take ownership of our careers and drive meaningful change. Anchored in industry-proven
    technology and unprecedented success, All-Stars are taking on the challenge everyday
    to disrupt our industry – &nb'
