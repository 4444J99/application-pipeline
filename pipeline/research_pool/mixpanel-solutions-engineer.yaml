    involved in deal cycles with Account Executives and Partner Managers. You will
    be leading the technical qualification for customers’ use cases as well as delivering
    customized demos for prospects. You will work directly with leadership at our
    prospects and partners to understand business challenges that can be solved through
    an analytics platform and consult on how Mixpanel can solve those challenges.<strong><u><br><br></u>Responsibilities:<u><br></u></strong></p>
