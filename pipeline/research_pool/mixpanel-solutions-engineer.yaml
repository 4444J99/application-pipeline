    or sales engineering, or pre-sales role in a SAAS company</li> <li>Adept at managing
    complex projects with assorted stakeholders, working across teams and departments</li>
    <li>Understands analytics best practices and use cases across industries/verticals
    and can translate these strategies into tailored Partner onboarding &amp; training</li>
    <li>Desire and energy from making others successful - a “teach someone how to
    fish” mentality</li> <li>Has a passion for data and analytics, with the ability
