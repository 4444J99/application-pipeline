    a broad set of customers via Mixpanel’s partner ecosystem. More specifically,
    you will deliver seamless onboarding &amp; on-going enablement that educates Partners
    about the many facets of the Mixpanel solution including joint-value positioning,
    implementation, and product training. You will also collaborate with our Solution
    Engineering and Customer Success teams to share best practices and provide a best-in-class
    experience to our end customers via Partners.<br>In the first month, you will
    become a Mixpanel expert on both features and functionality, as well as implementation.
