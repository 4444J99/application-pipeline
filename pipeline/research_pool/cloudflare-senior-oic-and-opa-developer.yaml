  description: '<div class="content-intro"><div><strong>About Us</strong></div> <div>
    <p>At Cloudflare, we are on a mission to help build a better Internet. Today the
    company runs one of the world’s largest networks that powers millions of websites
    and other Internet properties for customers ranging from individual bloggers to
    SMBs to Fortune 500 companies. Cloudflare protects and accelerates any Internet
    application online without adding hardware, installing software, or changing a
    line of code. Internet properties powered by Cloudflare all have web traffic routed
    through its intelligent global network, which gets smarter with every request.
    As a result, they see significant improvement in performance and a decrease in
    spam and other attacks. Cloudflare was named to Entrepreneur Magazine’s Top Company
    Cultures list and ranked among the World’s Most Innovative Companies by Fast Company.&nbsp;</p>
    <p>At Cloudflare, we’re not looking for people who wait for a polished roadmap;
    we’re looking for the builders who see the cracks in the Internet that everyone
    else has simply learned to live with. We value candidates who have the instinct
    to spot a "normalized" problem and the AI-native curiosity to create a solution
    using the latest tools. Our culture is built on iteration, leveraging AI to ship
    faster today to make it better tomorrow, while ensuring that every improvement,
    no matter how small, is shared across the team to lift everyone up. If you’re
    the type of person who values curiosity over bureaucracy, and that AI is a partner
    in solving tough problems to keep the Internet moving forward, you’ll fit right
    in.</p> </div></div><p><strong>Available Locations: </strong>Bengaluru, India</p>
    <p><strong>About the Role:</strong></p> <p>The Senior OIC and OPA Developer is
    the definitive technical expert responsible for developing, governing, and standardizing
    all data movement and orchestration involving the Oracle Fusion ERP Cloud environment.
    This role designs the most complex and critical integration patterns using Oracle
    Integration Cloud and Oracle Process Automation ensuring technical solutions adhere
    to Enterprise Architecture and security standards.</p> <p><strong>Key Responsibilities:</strong></p>
    <ul> <li>Complex Integration Design: Architect and develop the most challenging,
    cross-functional, and real-time integration patterns for the Oracle Fusion program
    using Oracle Integration Cloud.</li> <li>Architecture &amp; Governance: Act as
    the technical gatekeeper for all Oracle integration and process automation design,
    ensuring strict adherence to enterprise standards. Define the long-term technical
    roadmap for the OIC/OPA platform.</li> <li>Technical Development: Personally drive
    the design and development of technical solutions (Interfaces, Conversions, Orchestrations
    and Workflows) within OIC, utilizing REST, SOAP, ERP, FTP, Other Application-specific
    Standard and Database adapters. Leverage Oracle AI Data (a.k.a Oracle ATP Database)
    for data staging and integration. Build BIP reports and ATP objects as needed
    to meet the requirements.</li> <li>Security &amp; Performance: Define and validate
    the technical security protocols for all endpoints and interfaces (e.g., OAuth,
    API Gateway configuration), ensuring data transmission is compliant and performant.</li>
    <li>Technical Mentorship: Serve as the top integration expert, providing technical
    leadership and direction to developers building integrations.</li> </ul> <p><strong>Required
    Qualifications:</strong></p> <ul> <li>10+ years of direct experience architecting,
    designing, and governing enterprise-level integrations for major ERP/SCM/GTM systems.</li>
    <li>Expert-level, hands-on knowledge of Oracle Integration Cloud including strong
    familiarity with its various adapters, mapping, and orchestration capabilities.</li>
    <li>Proven experience working directly with a central Enterprise Architecture
    organization to define and enforce integration standards.</li> <li>Deep understanding
    of SOA, microservices, API management, and security protocols.</li> </ul> <p><strong>Preferred
    Qualifications:</strong></p> <ul> <li>Experience in an organization transitioning
    to Oracle Cloud Ecosystem.</li> <li>Hands-on experience with other integration
    tools like GoLang, Boomi, etc.</li> <li>Experience setting up/using CI/CD tools
    like FlexDeploy</li> <li>General awareness of built-in adapter based integrations
    in various 3rd party softwares.</li> <li>Exposure to the Data Center Infrastructure
    industry</li> <li>Relevant professional product/functional certifications (e.g.,
    OIC/OPA, Database)</li> <li>Working knowledge of AI Agent Studio for Oracle Fusion
    Cloud Applications.</li> </ul> <p>Fraud Alert:&nbsp;Do not fall victim to recruitment
