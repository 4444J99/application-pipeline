  description: 'About Plane Plane is an incisive response to config-heavy, opinionated,
    and restrictive project management software. Check out our website . In just two
    years, Plane’s grown to #1 in its category on GitHub and become a viable open-core
    alternative to Jira, Monday, Wrike, Asana, ClickUp, and Linear, not to mention
    all-in-one tools like Notion or Obsidian. Our growth has come on the back of the
    product’s true flexibility without artificial limits, simple configurations that
    work out of the box, and thoughtfully packaged features that nurture our customers’
    growth instead of punishing it. As a modern product start-up, we obsess over new
    and power users equally. Our mission is to empower teams everywhere with the simplest,
    most delightful work management experience on the planet. Our vision is to become
    the WorkOS of the future with a workbench of unified tools and techniques that
    intuitively and progressively form a greater whole for knowledge workers. We’re
    well capitalized, backed by OSS Capital, and are revenue-positive. Our coworkers
    include ex-Microsoft, Deloitte, [24]7, Nutanix, and Yahoo! in our 50+ strong human
    force today. What you will do? Develop the backbone for a variety of user-centric
    features. Enhance the efficiency of real-time data synchronization across our
    platforms. Boost database and system performance through advanced caching techniques
    and connection pooling. Elevate our service''s reliability with superior observability,
    monitoring, and alert systems, enabling prompt incident responses. Expand our
    service''s capabilities with strategic architectural and infrastructural upgrades.
    Share our meaningful innovations with the open-source community. Set new industry
    standards for software development practices, aiming to deliver unparalleled quality
    to the global market. Skills You''ll Need to Bring 2 to 3 years of proven experience
    in developing high-quality backend systems. Proficient in programming, with extensive
    experience working across the full stack. Expertise in Python, with a strong ability
    to navigate the full stack environment. A self-starter attitude, with a commitment
    to taking responsibility for tasks. Expirenced in working on mono repos and micro
    services architecture. Demonstrated success in similar roles. A dedication to
    delivering high-quality products. Tech Django/Python, Postgres, RabbitMQ and Redis
    in the backend Hosted on AWS Cloud with k8s Experienced working in message queues
    and scheduling. Expirienced in using monitoring tools like DataDog and Sentry
    Tools: GitHub, Django, PGAdmin, Postman, Pytest Why Join Plane? Be part of a global
    product team driving meaningful impact worldwide. Thrive in a collaborative, innovation-driven
    environment that prioritizes continuous learning. Experience a vibrant and supportive
    company culture. Join a high-growth organization with exciting opportunities for
    advancement.'
