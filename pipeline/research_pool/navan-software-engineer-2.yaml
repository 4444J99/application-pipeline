  description: <p>Navan has transformed the corporate travel, payment, and expense
    landscape by consistently prioritizing user needs. As a Software Engineer II in
    the Flights group, you’ll play an essential part in building and scaling the next-generation
    flight platform, Navan’s flagship product that drives global business growth.
    This is a high-impact role where your work will impact customers worldwide. You’ll
    solve challenging problems, collaborate with engineers, product managers, and
    designers across the globe, and contribute to a platform trusted by major enterprises.</p>
    <p><strong>What You'll Do</strong></p> <ul> <li>Design and develop robust, high-performance
    features and core services that support the company’s flagship product and serve
    a global customer base.</li> <li>Apply technical expertise and creativity to address
    engineering challenges, driving improvements in reliability, performance, and
    user experience.</li> <li>Take end-to-end ownership of features—from design and
    development to deployment and operational support—ensuring exceptional quality
    and value for users.</li> <li>Work effectively as part of a global, cross-functional
    team, partnering with fellow engineers, product managers, designers, and business
    leaders to deliver impactful solutions and elevate team performance.</li> <li>Contribute
    to engineering culture by championing best practices in code quality, scalability,
    documentation, monitoring, and testing, fostering a culture of technical excellence,
    collaboration, and continuous improvement.</li> <li>Learn and grow by staying
    engaged with new technologies and industry trends, bringing a growth mindset and
    a passion for delivering elegant solutions to complex problems.</li> </ul> <p><strong>What
    We're Looking For</strong></p> <ul> <li>2-4 years of experience building and scaling
    complex systems in fast-paced, high-growth, or large-scale environments (open
    to exceptional candidates with less experience).</li> <li>Ownership mentality
    with a record of delivering production-quality, maintainable code, and supporting
    features post-release through monitoring and troubleshooting.</li> <li>Hands-on
    experience developing and maintaining consumer-facing or core business products
    at scale.</li> <li>Experience with distributed systems, microservices, and API
    design.</li> <li>Collaborative team player able to work effectively with global,
    cross-functional partners.</li> <li>Commitment to engineering best practices in
    testing, documentation, scalability, and code quality.</li> <li>Problem-solving
    mindset with a passion for tackling technically demanding and customer-impacting
    challenges.</li> <li>Domain knowledge in the travel industry (flights, bookings,
    or inventory management) is a plus.</li> <li>Experience in Java and Spring Boot.
    Hibernate is a plus.</li> </ul>
