    \ \u2014 including DoorDash, Flexport, and Compass \u2014 use Brex to proactively\
    \ control spend, reduce costs, and increase efficiency on a global scale.</p>\
    \ <p><span style=\"font-weight: 400;\">Working at Brex allows you to push your\
