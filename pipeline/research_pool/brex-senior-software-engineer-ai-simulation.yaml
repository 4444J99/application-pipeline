    \ office per week \u2014 Monday, Wednesday, and Thursday. As a perk, we also have\
    \ up to four weeks per year of fully remote work!</p> <p><strong>Responsibilities</strong></p>\
    \ <ul> <li>Evolve and scale a simulation and validation platform to continuously\
    \ stress-test Brex\u2019s AI products using large-scale synthetic data.</li> <li>Develop\
    \ evaluation mechanisms to detect regressions, edge cases, and failure modes in\
    \ non-deterministic systems prior to customer impact.</li> <li>Run continuous\
    \ testing in isolated, production-like environments and set quality gates, including\
    \ authority to block launches when standards are not met.</li> <li>Partner closely\
    \ with product engineering teams to improve system testability, isolation, and\
    \ overall robustness.</li> <li>Define and uphold company-wide standards for AI\
    \ feature quality, using simulation-driven insights to guide prompt and system\
    \ evolution, while driving the technical bar for a small, high-impact team.</li>\
    \ </ul> <p><strong>Requirements</strong></p> <ul> <li>Experience building and\
    \ owning complex software systems where correctness, reliability, and failure\
    \ modes are critical.</li> <li>Experience designing test, simulation, or validation\
    \ systems for non-deterministic or high-stakes environments.</li> <li>Strong systems\
    \ thinking, with the ability to decompose complex problems and reduce incidental\
    \ complexity.</li> <li>Demonstrated ability to influence product architecture\
    \ through quality, reliability, and launch-readiness constraints.</li> <li>Comfort\
    \ operating with real authority and cross-team influence, including blocking launches\
    \ and partnering across seniority levels to raise the quality bar.</li> </ul>\
    \ <p><strong>Bonus points</strong></p> <ul> <li>Previous experience on simulation\
    \ or testing of inherently complex systems (AI/ML, distributed systems, robotics,\
    \ IoT, medical devices, aerospace, defense, etc.).</li> <li>Experience building\
    \ internal platforms that became critical shared infrastructure.</li> <li>Strong\
    \ intuition for failure modes in real-world systems.</li> </ul> <p><strong>Compensation</strong></p>\
