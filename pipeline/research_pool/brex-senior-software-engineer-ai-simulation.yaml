    \ culture and believe your potential should only be limited by how big you can\
    \ dream. We make this a reality by empowering you with the tools, resources, and\
    \ support you need to grow your career.</span></p></div><p><strong>AI at Brex</strong></p>\
    \ <p>AI Engineering at Brex is redefining how businesses run their finances by\
    \ building intelligent, autonomous systems directly into the Brex platform. Our\
    \ teams develop AI agents that don\u2019t just surface insights\u2014they take\
    \ action, optimizing spend, managing workflows, and making real-time decisions\
    \ on behalf of our customers. By deeply integrating proprietary financial data\
    \ with product and platform infrastructure, we\u2019re turning complex financial\
    \ operations into simple, automated experiences and setting a new standard for\
    \ how modern finance works.</p> <p><strong>What you\u2019ll do</strong></p> <p>You\u2019\
    ll own Brex\u2019s simulation and validation platform for AI-powered products.\
    \ Your mandate is simple and unforgiving: ensure that every AI surface at Brex\
    \ is continuously scrutinized under extreme, realistic conditions \u2014 and that\
    \ teams can ship with confidence because of it.</p> <p>You\u2019ll build a system\
    \ that uses synthetic data and scenario generation as a recursive self-improvement\
    \ loop. Product teams will rely on it to catch regressions before customers do,\
    \ to validate new capabilities safely, and to evolve prompts and agent behavior\
    \ continuously. This platform will run against isolated, ephemeral environments\
    \ that mirror production closely enough to matter.</p> <p>This is not a research\
    \ role. It\u2019s about exercising real products, breaking them creatively, and\
    \ forcing the organization to get better.</p> <p><strong>Where you\u2019ll work</strong></p>\
    \ <p>This role will be based in our San Francisco office. We are a hybrid environment\
