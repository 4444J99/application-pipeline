  description: '<p>Bitwarden promotes better internet security and safety with the
    leading open source password management solution for individuals, teams, and business
    organizations. Our philosophy about security is that “we are all in this together”
    – and so we continue to offer a full-featured free version of Bitwarden so that
    everyone can be protected with strong password management. At the same time, we
    provide enterprise-grade solutions to some of the largest companies in the world,
    and will continue to innovate in the identity and authentication market as the
    world starts to grow beyond passwords. Read more on <a href="https://bitwarden.com/blog/">the
    Bitwarden blog</a>.&nbsp;</p> <p>As a Senior Software Engineer at Bitwarden, you
    will contribute directly to the future of the Bitwarden products while working
    with a great team and amazing open source community. We’re looking for someone
    who can take ownership of delivering valuable features throughout the entire development
    lifecycle and play a direct role in shaping our product and team.</p> <p>This
    is an all-remote team. We do not offer visa sponsorship at this time.</p> <p><strong>RESPONSIBILITIES</strong></p>
    <ul> <li>Research, evaluate, and experiment with emerging technologies, frameworks,
    and industry standards</li> <li>Build rapid prototypes and proof-of-concepts to
    validate new technical approaches</li> <li>Learn and implement new technologies
    independently</li> <li>Stay current with technology trends and assess their potential
    business impact</li> <li>Make informed technology choices with limited documentation
    and guidance</li> <li>Mentor team members on new technologies and development
    approaches</li> <li>Become an expert and authority on the Bitwarden codebase,
    including backend infrastructure, APIs, database, web app, browser extensions,
    desktop apps, and more</li> <li>Participate in hands-on development of the Bitwarden
    products</li> <li>Participate in code reviews, learning and spreading technical
    knowledge</li> </ul> <p><strong>WHAT YOU BRING TO BITWARDEN</strong></p> <ul>
    <li>Experience working in some or all of our stack: C#, TypeScript, Rust</li>
    <li>Proficiency using source control such as Git, SVN, Subversion, TFS, etc.</li>
    <li>Collaborative and adaptable mindset</li> <li>Openness and authenticity combined
    with excellent communication skills</li> <li>Excitement and enthusiasm for helping
    customers solve security and password challenges</li> <li>Excellent problem-solving
    skills – you might not know all the answers but you know how to find and communicate
    the solution</li> </ul> <p><strong>NICE-TO-HAVES</strong></p> <ul> <li>User of
    Bitwarden</li> <li>Startup experience</li> <li>Open source experience</li> <li>Experience
    in Azure, .NET, Rust. Electron, Angular, web browser extensions</li> </ul> <p><strong>WHAT
    TO EXPECT IN THE INTERVIEW PROCESS</strong></p> <ul> <li>Introduction with Recruiting
    Manager</li> <li>Interview with hiring manager</li> <li>Interview/s with team
    members</li> <li>References</li> </ul> <p><strong>A FEW REASONS TO WORK WITH US</strong></p>
    <ul> <li>Our user community loves us and we love them. Come to work each day with
    a sense of purpose as we bring a more secure internet experience to everyone from
    our friends and family to the world’s largest organizations.</li> <li>Become an
    expert. You’ll get immersed in the prominent technology markets of security and
    open source software.</li> <li>We are dedicated to building a diverse and talented
    team. Work remotely with motivated and supportive team members across the world.</li>
    <li>Learn and grow. Take on new challenges with the support of your team, and
    join our #growth-club to continue personal and professional development.&nbsp;</li>
    </ul> <p>&nbsp;</p> <p><em>In the United States, the starting base compensation
    range for this role is $140,000 - $200,000. Actual compensation may vary based
    on level, relevant experience, and skill set as assessed in the interview process,
    as well as market data by location. See our careers page for a list of benefits.
    Please note that compensation outside the U.S. will differ based on the market.</em></p>'
