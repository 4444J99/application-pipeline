  description: 'Greptile is the AI code reviewer that catches bugs in pull requests
    for thousands of software teams. We’re hiring our first Forward-Deployed Engineer
    to help enterprise customers evaluate and adopt Greptile. Trajectory 7,000+ customers
    Raised $30M from Benchmark, YC, Paul Graham, Initialized Team We have assembled
    a small, talent dense team who have scaled critical functions at companies like
    Stripe, Google, Figma, LinkedIn, etc. Responsibilities Partner with GTM and engineering
    team to run technical discovery and tailor Greptile to each customer’s stack (GitHub,
    GitLab, Bitbucket, Perforce, on-prem). Design and lead proof-of-concepts and pilots
    that demonstrate Greptile’s value in complex environments. Handle security and
    compliance diligence: answer questionnaires, document architectures, and unblock
    procurement. Build reference implementations and lightweight integrations to accelerate
    adoption. Act as the technical voice of the customer internally, surfacing requirements
    to product and engineering. Create reusable assets—demo environments, PoC templates,
    technical FAQs—that raise win rates across the team. Deeply understand the customer
    and be the bridge between GTM and engineering. Qualifications Have a software
    engineering background and can credibly talk to senior developers and CTOs. Have
    experience running PoCs and supporting technical customers. Have prior experience
    in a software engineering, solutions engineering, sales engineering, or customer-facing
    technical role at a devtools or infrastructure company. Are comfortable with Git
    workflows, CI/CD pipelines, and enterprise identity (SSO/SCIM, SAML, OIDC). Can
    quickly pick up new technologies and produce working examples or scripts on the
    fly. Write clearly and concisely—whether it’s a PoC plan, a security response,
    or a product gap report. Thrive in a fast-paced startup environment where you’ll
    be the first hire in this function. Why join us Be the first FDE at a fast-growing,
    technical startup—shaping how we sell and deliver to enterprise customers. Work
    directly with the founders and engineering team to influence product direction.
    Competitive salary and meaningful equity. In-person with the team in San Francisco.'
