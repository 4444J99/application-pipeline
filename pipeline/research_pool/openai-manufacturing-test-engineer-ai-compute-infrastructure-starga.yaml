  description: "About the Team OpenAI\u2019s Stargate organization is building the\
    \ physical infrastructure required to power frontier AI systems at massive scale.\
    \ The team operates across the full lifecycle of infrastructure development and\
    \ operations \u2014 from hardware, manufacturing, and partner readiness through\
    \ deployment, bring-up, and sustained production operations. That end-to-end ownership\
    \ model is a core part of how Stargate is being built. This is not a traditional,\
    \ heavily layered hardware organization. Stargate is intentionally staying lean\
    \ and is optimizing for hands-on operators who can work across design, manufacturing,\
    \ and deployment boundaries, influence partners quickly, and prevent operational\
    \ issues before they become system-level failures. About the Role As a Manufacturing\
    \ Test Engineer on Stargate, you will own the development of manufacturing test\
    \ strategies, tools, and execution practices for critical AI infrastructure hardware.\
    \ You will work at the intersection of hardware engineering, manufacturing partners,\
    \ infrastructure systems, and deployment teams to ensure that hardware shipped\
    \ into OpenAI environments is testable, reliable, and production-ready at scale.\
    \ In this role, you will translate product and system requirements into manufacturing\
    \ test coverage, drive the design of test stations and automation, and partner\
    \ closely with suppliers and contract manufacturers to identify, root-cause, and\
    \ eliminate yield issues and field escapes. This role is especially important\
    \ in an environment where OpenAI depends on external partners and needs technical\
    \ operators who can independently verify quality, challenge assumptions, and enforce\
    \ repeatable, controlled execution. Key Responsibilities Develop and deploy manufacturing\
    \ test solutions in collaboration with OpenAI\u2019s global manufacturing partners.\
    \ Define test requirements with NPI, hardware, and systems teams; drive Design\
    \ for Test (DFT) to ensure testability and manufacturability. Maintain stable\
    \ test operations for sustaining products, including deployment of software, firmware,\
    \ and hardware updates to manufacturing test systems. Build and maintain automated\
    \ test scripts to support functional testing, diagnostics, and new feature validation.\
    \ Lead initiatives to improve test coverage, reduce test time, and lower manufacturing\
    \ cost while maintaining product quality. Identify, analyze, and resolve manufacturing\
    \ yield issues and field escapes; drive root cause and corrective actions to closure.\
    \ Design, validate, and deploy test stations, fixtures, and tooling required for\
    \ scalable production testing. Partner with NPI, manufacturing and supplier teams\
    \ to ensure consistent and reliable test execution across sites. Develop and maintain\
    \ documentation for test processes, procedures, and system configurations to ensure\
    \ standardized practices. Qualifications Bachelor's degree in Electrical Engineering,\
    \ Computer Science, or equivalent practical experience. 5+ years of experience\
    \ in hardware engineering or manufacturing test engineering. Experience developing\
    \ and integrating manufacturing test systems using custom electronics, fixturing,\
    \ and instrumentation. Experience managing test systems and processes to improve\
    \ manufacturability and production quality. Preferred Qualifications Experience\
    \ testing server, networking, or data center hardware, including board and system-level\
    \ functional testing in manufacturing. Experience with Python or Shell scripting,\
    \ and familiarity with Linux-based environments. Knowledge of test station bring-up\
    \ and validation methodologies (e.g., gage R&R, correlation, calibration). Ability\
    \ to develop comprehensive test plans based on product specifications and execute\
    \ structured test procedures. Experience troubleshooting complex manufacturing\
    \ and system-level issues in collaboration with cross-functional teams. About\
    \ OpenAI OpenAI is an AI research and deployment company dedicated to ensuring\
    \ that general-purpose artificial intelligence benefits all of humanity. We push\
    \ the boundaries of the capabilities of AI systems and seek to safely deploy them\
    \ to the world through our products. AI is an extremely powerful tool that must\
    \ be created with safety and human needs at its core, and to achieve our mission,\
    \ we must encompass and value the many different perspectives, voices, and experiences\
    \ that form the full spectrum of humanity. We are an equal opportunity employer,\
    \ and we do not discriminate on the basis of race, religion, color, national origin,\
    \ sex, sexual orientation, age, veteran status, disability, genetic information,\
    \ or other applicable legally protected characteristic. For additional information,\
    \ please see OpenAI\u2019s Affirmative Action and Equal Employment Opportunity\
    \ Policy Statement . Background checks for applicants will be administered in\
    \ accordance with applicable law, and qualified applicants with arrest or conviction\
    \ records will be considered for employment consistent with those laws, including\
    \ the San Francisco Fair Chance Ordina"
