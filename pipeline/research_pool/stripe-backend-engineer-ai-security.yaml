    of the internet, and we have a staggering amount of work ahead. That means you
    have an unprecedented opportunity to put the global economy within everyone’s
    reach while doing the most important work of your career.</p> <h2><strong>About
    the team</strong></h2> <p>AI is moving fast and Stripe is moving fast to adopt
    it. But we need to make sure we do all of this safely, and for most of these tools
