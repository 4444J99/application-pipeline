    <p>This is a team that will be working in the low level components of our AI stack
    so both infrastructure and security experience are pluses. This space is moving
    fast so being comfortable with ambiguity and changes in priority are a must.</p>
    <p>This is a foundational role — you''d be the first engineer on the team.</p>
