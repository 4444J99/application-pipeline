    with CI/CD and Git workflows</li> <li data-section-id="cavech" data-start="1368"
    data-end="1427">Strong testing practices (unit and integration testing)</li> <li>You
    see engineering velocity as a strategic differentiator. You are driven by the
    goal of making our engineering org so fast and reliable that we out-innovate the
    market.</li> </ul>
