  description: <p>At Navan, our mission is to power the in-person connections that
    move people, ideas and businesses forward. We help our travelers focus on being
    there, not getting there and our Global Operations and Service team is central
    to this mission!</p> <p>As a member of our quickly growing Global Operations and
    Service team, you will be responsible for directly supporting our users’ travel
    needs. As owners of customer satisfaction, your role is to solve issues, communicate
    effectively, and collaborate with internal teams to remove any barriers for the
    traveler - all while providing a best-in-class customer experience. As the front
    line of our business, you will have a unique opportunity to provide regular feedback
    to our product, design and engineering teams as they work towards continually
    improving our customer facing and internal platforms. This is an exciting role
    where you will have a direct impact on our day to day operations, traveler experience
    and product development!</p> <p data-start="272" data-end="494">We are looking
    for a Senior Backend Engineer to join the Expense Platform team. You will build
    and scale distributed systems that power the full expense lifecycle, including
    expense creation, approvals, and reimbursements.</p> <p data-section-id="187pcd9"
    data-start="501" data-end="523"><strong data-start="505" data-end="523"><br>What
    You’ll Do</strong></p> <ul data-start="524" data-end="975"> <li data-section-id="1bd7622"
    data-start="524" data-end="595">Build and maintain backend microservices using
    Java and Spring Boot</li> <li data-section-id="81xt3o" data-start="596" data-end="658">Design
    and implement event-driven systems (Kafka, AWS SQS)</li> <li data-section-id="67zdai"
    data-start="659" data-end="726">Develop REST APIs and integrate with external
    financial systems</li> <li data-section-id="140g7mw" data-start="727" data-end="807">Work
    on expense workflows (reimbursements, cash advances, mileage, per diem)</li> <li
    data-section-id="12xiarh" data-start="808" data-end="865">Build and improve receipt
    ingestion and OCR pipelines</li> <li data-section-id="1rtpu3" data-start="866"
    data-end="925">Ensure system reliability, performance, and scalability</li> <li
    data-section-id="1skhivl" data-start="926" data-end="975">Write and maintain unit
    and integration tests</li> </ul> <hr data-start="977" data-end="980"> <p data-section-id="1hr9x9o"
    data-start="982" data-end="1012"><strong data-start="986" data-end="1012">What
    We’re Looking For</strong></p> <ul data-start="1013" data-end="1427"> <li data-section-id="1f4pqf7"
