    you''ll fit right in.</span></p> <h3><span style="font-size: 10pt;"><strong>What
    You’ll Do:</strong></span></h3> <p><span style="font-size: 10pt;">The marimo <strong>growth
    team</strong> is responsible for managing and growing the marimo community, playing
    a critical role in our goal of making marimo <em>the </em>standard Python used
    by millions of developers around the world. The marimo community is diverse, including
    AI/ML developers, backend developers, security engineers, data engineers, data
    scientists, natural scientists, professors, students, and more. The growth team''s
    mandate is to build scalable bottoms-up growth motions across these subcommunities,
    helping them transform their workflows with our next-generation notebook and bringing
    back feedback to the engineering team. You will be given high autonomy, and will
    be trusted to make a large impact.</span></p> <p><span style="font-size: 10pt;"><strong>About
    the role:</strong></span></p> <p><span style="font-size: 10pt;">As a senior developer
