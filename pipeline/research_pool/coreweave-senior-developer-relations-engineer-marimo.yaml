    —&nbsp;it <em>feels</em> like a next-gen reactive Python notebook, but is stored
    as pure Python that can be versioned with Git, deployed as a data app, run as
    a script, and reused as a module. Incubated initially with scientists at Stanford,
    marimo is now used by leading companies, labs, and universities around the world,
    with millions of downloads since launch and over 17,000 stars on our <a href="https://github.com/marimio-team/marimo">GitHub
    repository</a>.</span></p> <p><span style="font-size: 10pt;">On the marimo team,
