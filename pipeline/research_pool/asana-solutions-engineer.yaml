  description: <p>Asanaのソリューションコンサルタント（SC）は、営業プロセスにおける技術的な要（かなめ）として、顧客がAsanaの価値を正しく理解し、導入を決断するための支援を行います。単なる機能説明にとどまらず、顧客のビジネス課題を深く理解し「AsanaとAsana
    AIを導入することで、いかに日々の業務が効率化され、人が創造的な仕事に集中できるようになるか」を魅力的なデモンストレーションとストーリーで伝えます。AI時代の新しい働き方を、営業チームと二人三脚で顧客に提案していただきます。</p>
    <p>Asana Japanの技術チームの一員として、あなたは顧客の潜在的な痛みを理解し、AI含めたAsanaのテクノロジーがもたらす解決策を魅力的なストーリーとして語っていただきます。まだ完成されたスキルセットを持っていなくても、AI技術やSaaSの進化に強い関心を持ち、自ら学びながら顧客への価値提供スキルを磨いていきたい方の応募をお待ちしています。</p>
    <h2><strong>【勤務地・働き方】</strong></h2> <p>このポジションはAsana Japanの技術本部長にレポートします。</p>
    <p>私たちは、居住地に関わらず最適な人材をお迎えしたいと考えています。そのため、ご本人の状況に合わせて以下のいずれかの働き方を用意しています。</p> <ol>
    <li><strong>関東圏にお住まいの方：</strong> 東京オフィスを拠点とした、オフィス中心のハイブリッドスケジュール（原則 月・火・木曜出社）となります。</li>
    <li><strong>関東圏以外にお住まいの方（日本国内）：</strong> リモートワークでの勤務が可能です。ただし、チームビルディングや重要会議のため、<strong>月1〜2回程度、東京オフィスへの出社をお願いしています</strong>（詳細は面接時にご案内します）。</li>
    </ol> <h2><strong>【主な業務内容】</strong></h2> <ul> <li><strong>AI活用を中心とした顧客への提案・デモンストレーション</strong></li>
    <li>営業チームと連携し、主に新規顧客に対して顧客ごとの課題やニーズに合わせたAsanaおよびAsana AI（主にAI Studio）の製品デモンストレーションやプレゼンテーションを作成・実施する。</li>
    <li>顧客の業務フローをヒアリングし、AIによる自動化や効率化を組み込んだ最適な解決策（ソリューション）を設計・提案する。</li> <li><strong>価値訴求とROI（投資対効果）の可視化</strong></li>
    <li>顧客の抱える課題を定量的・定性的に分析し、AsanaとAsana AI導入によるビジネスインパクトやROIを算出・提示するためのサポートを行う。</li>
    <li>単に機能を売るのではなく、「AIと共に働く未来」というストーリーを構築し、顧客の意思決定を後押しする。</li> <li><strong>技術・セキュリティ関連質問への対応および導入プロセスの支援</strong></li>
    <li>顧客からの技術的な質問（セキュリティ、API連携、機能詳細など）に対して、迅速かつ正確に回答し、信頼を獲得する。</li> <li>顧客企業の購買プロセスや導入審査に必要な技術情報の提供を、正確かつタイムリーに行う。</li>
    <li><strong>社内連携とナレッジの共有</strong></li> <li>提案活動で得られた顧客のフィードバックや市場のニーズを、プロダクトチームやマーケティングチームに共有し、製品改善や販促活動に貢献する。</li>
    <li>チーム内で効果的だったデモシナリオや提案資料を共有・標準化し、SCチーム全体の提案力底上げに貢献する。</li> </ul> <h2><strong>【応募資格】</strong></h2>
    <ul> <li><strong>経験とドメイン知識</strong></li> <li><strong>IT業界におけるエンジニアリング、システム導入、またはテクニカルサポートなどの実務経験（3年以上）。</strong></li>
    </ul> <p><strong>※開発や技術的な実務経験をベースに、プリセールスやコンサルタントといった「顧客への価値提案」を行う職種へキャリアチェンジしたい方、またはその意欲がある方を強く歓迎します。</strong></p>
    <ul> <li><strong>ワークフロー、自動化、ビジネスプロセス管理（BPM）など、業務プロセスに関わるSaaS・ソフトウェアを直接取り扱った経験があればなお可。</strong></li>
    <li>※ SaaSまたはエンタープライズソフトウェアのプリセールス経験がある方は優遇します。</li> <li>※インフラやセキュリティ領域専業ではなく、ビジネスロジックやアプリケーション層の課題解決に関わった経験を重視します。</li>
    <li><strong>スキルとコンピテンシー</strong></li> <li><strong>AI・テクノロジーへの感度と学習力：</strong>
    LLMや生成AIなどの技術トレンドに強い関心を持ち、<strong>自らの業務でもAIツールを使いこなし、その利便性を実体験として語れること。</strong></li>
    <li><strong>ストーリーテリング能力：</strong> 顧客の課題を聞き出し、数字やデータを用いて魅力的な解決策としてプレゼンテーションできる能力。</li>
    <li><strong>分析的思考：</strong> 顧客の曖昧な課題を整理し、論理的な解決策へと落とし込むことができるスキル。</li> <li><strong>手続きやプロセスへの適応力：</strong>
    顧客企業のセキュリティ審査や書類作成といった「手続き」業務に対しても、導入に必要な重要プロセスとして認識し、根気強く丁寧に対応できること。</li> <li><strong>コミュニケーションと言語能力</strong></li>
    <li><strong>日本語によるネイティブレベルのコミュニケーション能力（口頭および記述）。</strong></li> <li><strong>英語力は必須ではありませんが、英語の読み書きに抵抗がないこと（会社が用意するAIツールを使用しての対応でも可）。</strong></li>
    <li>グローバルチームのナレッジ（英語）をキャッチアップし、自身の学習に活かすことが求められます。</li> <li><strong>マインドセット</strong></li>
    <li><strong>顧客への共感（Empathy）：</strong> 顧客の成功を第一に考え、真摯に向き合う姿勢。</li> <li><strong>成長意欲とプロアクティブな行動：</strong>
    受け身ではなく、自ら課題を見つけて行動し、チームや自身の成長にコミットできる方。</li> </ul> <p><strong>チームプレイヤー：</strong>
    営業やCSM、マーケティングなど、部門を超えたメンバーと円滑に連携し、共通のゴールに向かって協調できる方。</p> <hr> <p>As a Solutions
    Consultant (SC) at Asana, you serve as the technical linchpin in the sales process,
    helping customers correctly understand Asana's value and make the decision to
