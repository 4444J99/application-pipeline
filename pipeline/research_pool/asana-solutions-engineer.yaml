    the customer's business challenges and demonstrate—through compelling demonstrations
    and storytelling—"how Asana and <strong>Asana AI</strong> can streamline daily
    operations and empower people to focus on creative work." You will partner closely
    with the Sales team to propose new ways of working in the AI era.</p> <p>As a
    member of Asana Japan’s technical team, you will understand the customer's latent
    pains and narrate the solutions brought by Asana’s technology, including AI, as
    a compelling story. Even if you do not yet possess a complete skillset, we welcome
