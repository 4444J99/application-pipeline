    be directly working with customers to guide and influence their data warehousing
    architecture and decisions. You will be acting as a trusted advisor for senior
    executives and your in-depth technical knowledge will ensure our customers are
    successful in leveraging Databricks to solve their business problems.</p> <p>You
    will be the technical expert to support our field engineering teams internally
    and you will be expected to help enable the team to understand the key differentiators
    of our product against our competitors. You will partner with the Product Manager(s)
    to help to define the product direction based on local knowledge and inform our
    product strategy with our go-to-market field teams. You will not have any direct
    reports but will recruit and lead a group of specialists across the field dedicated
    to scale your impact.&nbsp;</p> <p>You will also be a thought leader externally
    to the market via speaking at conferences, online webinars, and blog posts. You
    will meet with customers to communicate the vision and gather feedback.</p> <p>You
    have expertise in cloud-based data warehousing technologies, modern data platform
    architectures, traditional data warehousing techniques and preferably industry
    domain knowledge. You will excel in creating and articulating a compelling value
    proposition for our customers and enabling Account Executives and Field Engineers
    to operate effectively using best practices and assets that you own and develop.</p>
