  description: 'Snowflake is about empowering enterprises to achieve their full potential
    — and people too. With a culture that’s all in on impact, innovation, and collaboration,
    Snowflake is the sweet spot for building big, moving fast, and taking technology
    — and careers — to the next level. The Data Governance team builds services, systems,
    and product features to help our customers govern all their data assets through
    the full lifecycle within Snowflake. We provide fine grained secure data access,
    data privacy guards, data lineage tracking, and auditability access. We leverage
    ML techniques across our product offerings to make the lives of Data Stewards
    easier. AS A SENIOR SOFTWARE ENGINEER IN DATA GOVERNANCE AT SNOWFLAKE, YOU WILL:
    Work closely with Product Managers to drive projects from idea formulation to
    design and implementation Design and build data governance features Solve real
    business needs at large scale by applying your software engineering and analytical
    problem solving skills Make trade-offs to design the best system for Snowflake
    customers'' needs Collaborate with engineers across teams to help deliver cross-functional
    initiatives OUR IDEAL CANDIDATE WILL HAVE: 7+ years of hands-on software engineering
    experience Fluency in Java required Experience with database fundamentals including
    working with SQL Systems programming skills including multi-threading, concurrency,
    etc. Some experience in database security or building data governance systems
    is a bonus BS in Computer Science or a related field; Masters or PhD preferred
    Every Snowflake employee is expected to follow the company’s confidentiality and
    security standards for handling sensitive data. Snowflake employees must abide
    by the company’s data security plan as an essential part of their duties. It is
    every employee''s duty to keep customer information secure and confidential. Snowflake
    is growing fast, and we’re scaling our team to help enable and accelerate our
    growth. We are looking for people who share our values, challenge ordinary thinking,
    and push the pace of innovation while building a future for themselves and Snowflake.
    How do you want to make your impact? For jobs located in the United States, please
    visit the job posting on the Snowflake Careers Site for salary and benefits information:
    careers.snowflake.com'
