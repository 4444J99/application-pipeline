  description: '<div class="content-intro"><p><span style="font-weight: 400;">Every
    day, tens of millions of people come to Roblox to explore, create, play, learn,
    and connect with friends in 3D immersive digital experiences– all created by our
    global community of developers and creators.&nbsp;</span></p> <p><span style="font-weight:
    400;">At Roblox, we’re building the tools and platform that empower our community
    to bring any experience that they can imagine to life. Our vision is to reimagine
    the way people come together, from anywhere in the world, and on any device.</span><strong>
    </strong><span style="font-weight: 400;">We’re on a mission to connect a billion
    people with optimism and civility, and looking for amazing talent to help us get
    there.&nbsp;</span></p> <p><span style="font-weight: 400;">A career at Roblox
    means you’ll be working to shape the future of human interaction, solving unique
    technical challenges at scale, and helping to create safer, more civil shared
    experiences for everyone.</span></p></div><p>Developer Monetization is the economic
    engine of Roblox, our team owns the surfaces and systems responsible for over
    70% of platform revenue. We build the products that let millions of creators monetize
    their work and that shape how hundreds of millions of users discover and purchase
    virtual goods across the world''s largest virtual economy.</p> <p>We''re building
    the next generation of that economy, including auto-generated storefronts, autonomous
    pricing systems, and personalized shopping experiences. All delivered at zero
    cost to the creator. We''re constantly reimagining what''s possible and the frontend
    is where all of this comes to life.</p> <p>As a Senior Software Engineer on this
    team, you''ll own critical user-facing products end-to-end, lead projects with
    high economic impact, and partner closely with product, design, data science,
    and ML teams. This is a high-ownership role with real room to grow for engineers
    who want to pair strong frontend craft with meaningful business impact.</p> <p><strong>You
    Will</strong></p> <ul> <li>Build intelligent monetization tools that automatically
    detect pricing drift, run experiments, optimize per-item pricing, and surface
    regional offers to users.</li> <li>Design and ship personalized shopping experiences
    that surface the right content to hundreds of millions of users across web and
    mobile.</li> <li>Build and operate services that power storefronts and pricing
    infrastructure — reliable, performant, and handling 20M+ QPS. Everything you ship
    here needs to work at a scale very few teams in the industry ever touch.</li>
    <li>Lead projects end-to-end: scope the work, make key technical decisions, run
    experiments, and iterate based on results.</li> <li>Partner with product, design,
    data science, and ML engineers to translate strategy into polished, high-performing
    user experiences.</li> </ul> <p>You Have</p> <ul> <li>3+ years of experience building
    production systems across the stack (backend services, APIs, and responsive frontend
    applications).</li> <li>Strong intuition for user experience. You notice when
    something feels off and you know how to fix it.</li> <li>Experience with A/B testing,
    experimentation, and using data to inform product decisions.</li> <li>Comfort
    leading projects across ambiguity: scoping work, coordinating with cross-functional
    partners, and driving to delivery.</li> <li>Bachelor''s degree in Computer Science,
    Computer Engineering, or a similar technical field (or equivalent experience).</li>
    <li>Bonus: Experience with e-commerce, monetization platforms, or personalization
    systems.</li> </ul> <p><strong>You Are</strong></p> <ul> <li><strong>User-obsessed.</strong>
    You care deeply about the people using what you build.</li> <li><strong>Entrepreneurial.</strong>
    You identify what matters most, propose solutions, and move.</li> <li><strong>Versatile.</strong>
    You''re comfortable moving between frontend and backend.</li> <li><strong>Impact-oriented.</strong>
    You measure your work by whether it moved the needle, not just deliverables.</li>
    <li><strong>Collaborative.</strong> You thrive working across engineering, product,
    design, and data science, and you''re comfortable influencing decisions beyond
    your own code.</li> </ul><div class="content-pay-transparency"><div class="pay-input"><div
    class="description"><p>For roles that are based at our headquarters in San Mateo,
    CA: The starting base pay for this position is as shown below. The actual base
    pay is dependent upon a variety of job-related factors such as professional background,
    training, work experience, location, business needs and market demand. Therefore,
    in some circumstances, the actual salary could fall outside of this expected range.
    This pay range is subject to change and may be modified in the future. All full-time
    employees are also eligible for equity compensation and for benefits as described
    on <strong><a href="https://careers.roblox.com/total-rewards">this page</a></strong>.</p></div><di'
