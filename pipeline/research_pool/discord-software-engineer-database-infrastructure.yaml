    Discord Performs Database Upgrades at Scale by Ethan Donowitz</a></li> </ul> </li>
    </ul> <p><em><br>The US base salary range for this full-time position is $160,000
    to $180,000 + equity + benefits. Our salary ranges are determined by role and
