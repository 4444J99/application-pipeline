    systems, and concurrency control fundamentals</li> <li>Proficiency with at least
    one statically-typed programming language: e.g. Rust, Go, Java, C, C++</li> <li>Comfortable
    working in fast paced environments</li> </ul> <p><strong>Bonus Points:</strong></p>
    <ul> <li>Experience with highly-available and distributed databases: e.g. ScyllaDB,
    Cassandra, Vitess, Postgres w/HA, etc.</li> <li>Experience with Rust</li> <li>Knowledge
