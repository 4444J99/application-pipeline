  description: '<div class="content-intro"><p>Discord is used by over 200 million
    people every month for many different reasons, but there’s one thing that nearly
    everyone does on our platform:<strong> play video games.</strong> Over 90% of
    our users play games, spending a combined 1.5 billion hours playing thousands
    of unique titles on Discord each month. Discord plays a uniquely important role
    in the future of gaming. We are focused on making it easier and more fun for people
    to talk and hang out before, during, and after playing games.</p></div><p>The
    Database Infrastructure team develops and operates all of Discord’s databases
    and data services. Those systems store the data of Discord''s 200M+ monthly active
    users—including trillions of messages! We work across multiple areas: databases,
    disk storage and Rust-based data access services. We''re a small team whose work
    has a huge impact on our company''s success and ability to grow!</p> <p>Some blog
    posts from the team:</p> <ul> <li><a href="https://discord.com/blog/how-discord-indexes-trillions-of-messages">How
    Discord Indexes Trillions of Messages</a></li> <li><a href="https://discord.com/blog/how-discord-stores-trillions-of-messages">How
    Discord Stores Trillions of Messages</a></li> <li><a href="https://discord.com/blog/how-discord-supercharges-network-disks-for-extreme-low-latency">How
    Discord Supercharges Network Disks for Extreme Low-Latency</a></li> </ul> <p><strong>You
    will:</strong></p> <ul> <li>Build and operate large-scale, reliable and performant
    data systems with ScyllaDB, PostgreSQL, ElasticSearch, Linux and Rust.</li> <li>Collaborate
    with product and infrastructure teams to develop storage primitives enabling all
    of Discord.</li> <li>Exercise "First Principles Thinking" to always deliver what
    matters most to our users.</li> <li>Work with a talented team of engineers who
    have built one of the largest communication platforms in the world.</li> </ul>
    <p><strong>You have:</strong></p> <ul> <li>2-4 years of experience with building
    backend infrastructure</li> <li>Ability to troubleshoot, debug, and test complex
