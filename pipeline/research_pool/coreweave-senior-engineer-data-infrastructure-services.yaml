    <p>We are seeking senior software engineers with specialization in database and
    stream processing who can help us fulfill the goal of our global datastore strategy
    and establish communication models for our data flow. This individual will work
    with a team of mixed skilled engineers and have the opportunity to work on the
    full range of rewarding challenges that come with the business of building a cloud
    in a communicative, supportive, and high-performing environment. As a member of
    the Data Platform Team you will have the opportunity to:</p> <ul> <li>Design and
