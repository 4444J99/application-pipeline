    solutions through APIs</li> <li>Participate in operations and scaling of relational
    data platforms.</li> <li>Develop a stream processing architecture and solve for
    scalability and reliability.&nbsp;</li> <li>Improve the performance, security,
    reliability, and scalability of our data platforms, and related services and participate
    in the teams on-call rotation.</li> <li>Establish guidelines, guard rails for
    data access and storage for stakeholder teams.</li> <li>Ensure compliance with
    standards for data protection regulation.</li> <li>Grow, change, invest in your
    teammates, be invested-in, share your ideas, listen to others, be curious, have
    fun, and, above all, be yourself.</li> </ul> <p><strong>Wondering if you’re a
    good fit? We believe in investing in our people, and value candidates who can
    bring their own diversified experiences to our teams – even if you aren''t a 100%
    skill or experience match. Here are some qualities we’ve found compatible with
    our team. If a portion of this resonates with you, we’d love to talk.&nbsp;</strong></p>
    <ul> <li>You have 5+ years of experience in a software or infrastructure engineering
    industry.</li> <li>You enjoy helping your colleagues achieve more with less effort.</li>
    <li>You have experience operating services in production and at scale and are
    versed in reliability engineering concepts such as the different types of testing,
    progressive deployments, error budgets, the role observability, and fault-tolerant
    design.</li> <li>You understand CAP theorem&nbsp; and concurrency models, can
    clearly define data models and establish guidelines around data management.&nbsp;</li>
    <li>You’re excited about new research in data structures.</li> <li>You’re familiar
    with one of the distributed NewSQL datastores such as CockroachDB, TiDB, YDB,
