    have experience with designing and operating these systems at scale.</li> <li>You’re
    familiar with Kubernetes and have interest or comfortable&nbsp; with using it
    for event-driven and/or stateful orchestration.</li> <li>You’re excited to have
    the opportunity to contribute to a Kubernetes operator in order to manage data
    systems.</li> <li>You know your way around a Linux distro, shell scripting, and
    the Linux storage and networking stacks.</li> <li>You can transform problems in
    elastic solutions, decompose them into achievable tasks, and socialize both to
