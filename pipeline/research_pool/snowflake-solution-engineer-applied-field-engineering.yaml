  description: 'Snowflake is about empowering enterprises to achieve their full potential
    — and people too. With a culture that’s all in on impact, innovation, and collaboration,
    Snowflake is the sweet spot for building big, moving fast, and taking technology
    — and careers — to the next level. Our Solution Engineering organization is seeking
    a Data Platform Architect, Transactional who can provide hands-on expertise and
    support while working with technical decision makers to design and architect transactional
    solutions built on the Snowflake Data Cloud. This is a strategic role that works
    closely with cross-functional teams, including product, engineering, and the broader
    field organization to ensure successful execution and customer adoption of Snowflake’s
    solutions. IN THIS ROLE YOU WILL GET TO: Convey the strategic advantages and technical
    application of Snowflake''s transactional capabilities, address client inquiries,
    and conduct follow-up engagements to facilitate sales progression. Articulate
    Snowflake''s transactional functionalities and provide a comparative analysis
    with competitor offerings for prospective clients. Ascertain client-defined success
    metrics for the adoption and utilization of Snowflake''s transactional features.
    Recognize, address, and reconcile discrepancies between Snowflake''s methodologies
    and client-specific requisites concerning transactional features. Provide comprehensive
    resolutions to client objections and concerns. Develop and deliver bespoke demonstrations
    that highlight Snowflake''s value proposition, tailored to address specific client
    requirements pertaining to transactional functionalities. Demonstrate the ability
    to elucidate Snowflake''s security, privacy, and governance considerations with
    respect to transactional workloads. Be the technical expert in the room that positions
    Snowflake’s transactional features and value to technical stakeholders at Snowflake’s
    customers across the Americas. Function as the principal technical authority,
    articulating Snowflake''s transactional functionalities and value proposition
    to technical stakeholders within customer organizations across the Americas. Collaborate
    with Snowflake account teams and customer advocates to define and execute Proof
    of Concepts, ensuring successful outcomes and demonstrable technical achievements
    that validate Snowflake''s capabilities, including comprehensive executive summaries
    and business value assessments. Develop and disseminate content to facilitate
    team and organizational growth, such as blog articles, conference presentations,
    and technical materials including notebooks and demonstrations. ON DAY ONE, WE
    WILL EXPECT YOU TO HAVE: 5+ years transactional architecture experience. Curiosity
    and drive to help companies leverage the Snowflake Data Cloud. Strong presentation
    skills to both technical and executive audiences, whether whiteboarding sessions
    or formal readouts and demos. Bachelor’s Degree required, Masters Degree in computer
    science, engineering, mathematics or related fields, or equivalent experience
    preferred. Knowledge of and experience with OLTP database technology (e.g. Snowflake,
    Postgres, Oracle, SQL Server etc.) Knowledge of indexing strategies for transactional
    workloads. BONUS POINTS FOR EXPERIENCE WITH THE FOLLOWING: Previous leadership
    experience. Previous FCTO experience. Practical database migration experience.
    1+ years of practical Snowflake experience. Every Snowflake employee is expected
    to follow the company’s confidentiality and security standards for handling sensitive
    data. Snowflake employees must abide by the company’s data security plan as an
    essential part of their duties. It is every employee''s duty to keep customer
    information secure and confidential. Snowflake is growing fast, and we’re scaling
    our team to help enable and accelerate our growth. We are looking for people who
    share our values, challenge ordinary thinking, and push the pace of innovation
    while building a future for themselves and Snowflake. How do you want to make
    your impact? For jobs located in the United States, please visit the job posting
    on the Snowflake Careers Site for salary and benefits information: careers.snowflake.com'
