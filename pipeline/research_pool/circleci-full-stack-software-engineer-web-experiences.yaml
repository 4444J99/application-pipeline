    \ through AI.</li> <li><strong>Collaborate &amp; Innovate:</strong> Partner with\
    \ members of a cross-functional team to dive deep into business problems, explore\
    \ creative solutions, weigh design tradeoffs, and prioritize work to deliver maximum\
