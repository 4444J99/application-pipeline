    \ care about how your code behaves in production. You're comfortable with monitoring,\
    \ debugging, and operating services in a complex distributed environment.</li>\
    \ <li><strong>Adaptability:</strong> You thrive in ambiguity \u2014 adjusting\
    \ to changing priorities, making conscious tradeoffs when guidance is limited\
    \ and information is incomplete, and instituting best practices when needed.</li>\
    \ </ul> <h2><strong>Bonus Skills (Nice to Have)</strong></h2> <ul> <li>Experience\
    \ with modern frontend performance optimization, accessibility standards, and\
    \ design systems.</li> <li>Knowledge of CI/CD tools, build systems, test automation,\
    \ and deployment strategies.</li> <li>Experience working with LLMs or AI-powered\
    \ engineering tools, including prompt design and practical application in development\
    \ workflows.</li> </ul> <h2><strong>We're Particularly Interested In People Who:</strong></h2>\
    \ <ul> <li>Consider themselves Product Developers \u2014 those who crave solving\
    \ complex customer problems, not just generating code.</li> <li>Are super curious\
    \ about how things work, new technologies, and new ways of doing things.</li>\
    \ <li>Leverage AI tools in their daily workflow and are excited about how AI is\
    \ changing how we build software.</li> <li>Work transparently and collaboratively\
