    \ While frontend-leaning, you're comfortable contributing to backend services\
    \ in Go. You understand API design and can work across the stack when needed.</li>\
    \ <li><strong>System Design:</strong> Experience designing systems and leading\
    \ projects from clarifying requirements through to delivery. You think about architecture,\
    \ not just features.</li> <li><strong>Code Quality:</strong> You write code that's\
    \ easily readable, testable, maintainable, and documented, with observability\
