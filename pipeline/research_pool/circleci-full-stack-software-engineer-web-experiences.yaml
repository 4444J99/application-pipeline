    \ we rapidly grow and evolve.</li> <li><strong>Write Code:</strong> Produce sustainable,\
    \ testable, high-quality, and high-performance code \u2014 primarily in React\
    \ and TypeScript on the frontend, with backend contributions in Go.</li> <li><strong>Own\
    \ the Customer Experience:</strong> Work closely with Design, Product, and Data\
    \ partners to translate customer insights into polished, performant interfaces\
    \ that developers love using.</li> <li><strong>Support &amp; Maintain:</strong>\
    \ Debug and support services in a complex distributed system. You care about how\
