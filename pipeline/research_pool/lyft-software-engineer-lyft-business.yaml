  description: '<p>At Lyft, our purpose is to serve and connect. We aim to achieve
    this by cultivating a work environment where all team members belong and have
    the opportunity to thrive.</p> <p>Lyft is looking for an experienced Backend Engineer
    from a scope of disciplines. We are growing our team with people who want to build,
    improve and incorporate technologies that make the lives of our community more
    enriched. As an engineer at Lyft, you''ll collaborate with teams like product,
    data science, analytics, and operations on code that empower us to iterate quickly,
    while focusing on delighting our passengers and drivers.</p> <p><strong>About
    the Team:</strong></p> <p><strong>The Business Travel &amp; Lyft Pass teams </strong>enable
    organizations to provide customized ride benefits at scale - whether that''s employees
    expensing business trips and earning rewards, patients accessing healthcare-compliant
    transportation, or transit riders connecting the first and last mile within geofenced
    service areas.</p> <p>As a backend engineer, you''ll build systems that power
    complex benefit rules, location restrictions, and integrations with expense providers
    like Concur and Expensify. This is a high-growth area for Lyft with meaningful
    impact potential.</p> <h2><strong>Responsibilities:</strong></h2> <ul> <li>Write
    well-crafted, well-tested, readable, maintainable code</li> <li>Have the ability
    to explain the various trade offs made in decisions</li> <li>Participate in code
    reviews to ensure code quality and distribute knowledge&nbsp;</li> <li>Implement
    tasks with good quality code leading to positive execution</li> <li>Participate
    in resolving ongoing incidents&nbsp;</li> <li>Unblock, support, effectively communicate,
    and obtain buy-in within your team to achieve results</li> </ul> <h2><strong>Experience:</strong></h2>
    <ul> <li>Minimum 3 years of software engineering industry experience</li> <li>BSc/MSc
    in Computer Engineering, Computer Science, related field or relevant work experience</li>
    <li>Experience with Python, Go.</li> <li>Ability to work with a low-ego, highly
    collaborative, and cross-functional team.</li> </ul> <h2><strong>Benefits:</strong><strong><br></strong></h2>
    <ul> <li>Great medical, dental, and vision insurance options with additional programs
    available when enrolled</li> <li>Mental health benefits</li> <li>Family building
    benefits</li> <li>Child care and pet benefits</li> <li>401(k) plan to help save
    for your future</li> <li>In addition to 12 observed holidays, salaried team members
    have discretionary paid time off, hourly team members have 15 days paid time off</li>
    <li>18 weeks of paid parental leave. Biological, adoptive, and foster parents
    are all eligible</li> <li>Subsidized commuter benefits</li> <li>Lyft Pink - Lyft
    team members get an exclusive opportunity to test new benefits of our Ridership
    Program</li> </ul> <p>Lyft is an equal opportunity employer committed to an inclusive
    workplace that fosters belonging. All qualified applicants will receive consideration
    for employment without regards to race, color, religion, sex, sexual orientation,
    gender identity, national origin, disability status, protected veteran status,
    age, genetic information, or any other basis prohibited by law. We also consider
    qualified applicants with criminal histories consistent with applicable federal,
    state and local law.</p> <p>Lyft highly values having employees working in-office
    to foster a collaborative work environment and company culture. This role will
    be in-office on a hybrid schedule — Team Members will be expected to work in the
    office 3 days per week on Mondays, Wednesdays, and Thursdays. Lyft considers working
    in the office at least 3 days per week to be an essential function of this hybrid
    role. Your recruiter can share more information about the various in-office perks
    Lyft offers. Additionally, hybrid roles have the flexibility to work from anywhere
    for up to 4 weeks per year. #Hybrid</p> <p>The expected base pay range for this
    position in the San Francisco area is $128,000 - $160,000. Salary ranges are dependent
    on a variety of factors, including qualifications, experience and geographic location.
    <strong>Range listed is not inclusive of potential equity offering, bonus or benefits.&nbsp;</strong>Your
    recruiter can share more information about the salary range and total compensation
    offerings specific to your working location and other factors during the hiring
    process.</p> <p>Total compensation is dependent on a variety of factors, including
    qualifications, experience, and geographic location. Your recruiter can share
    more information about the salary range specific to your working location and
    other factors during the hiring process.&nbsp;</p>'
