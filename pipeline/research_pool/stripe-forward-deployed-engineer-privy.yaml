  description: "<h2>Who we are</h2> <h3 id=\"about-privy\">About Privy</h3> <p>Our\
    \ mission is to make privacy and user ownership the default online. We build simple,\
    \ flexible developer tooling that make it easy to build products that put users\
    \ first. By leveraging modern cryptography, we shift the status quo around digital\
    \ ownership and protect the accounts and assets of millions of users.</p> <p>Learn\
    \ more about Privy:&nbsp;<a class=\" Link \" href=\"https://privy.io/blog/announcing-our-acquisition-by-stripe\"\
    \ data-js-controller=\"AnalyticsButton\" data-analytics-category=\"Links\" data-analytics-action=\"\
    Clicked\" data-analytics-label=\"Related content\">Privy and Stripe: Bringing\
    \ crypto to everyone</a></p> <p>Engineering at Privy is not just about writing\
    \ world-class code. We create software that turns complex technical systems into\
    \ delightful developer tools. We assemble tried-and-true primitives into intuitive,\
    \ responsive APIs and beautiful interfaces. We believe in open-source work and\
    \ transparency with our teammates and users. We encourage each other to think\
    \ big, run experiments and follow our curiosity so we can build better tooling\
    \ that lets developers shine and empower their users.</p> <h2>What you\u2019ll\
    \ do</h2> <p data-pm-slice=\"1 1 []\">We're looking for an exceptional Forward\
    \ Deployed Engineer to join our team and be the primary technical owner for building\
    \ out new capabilities with Privy's most important customers. In this role, you\
    \ will combine technical expertise with a deep understanding of customer and business\
    \ objectives to architect, develop, and deploy software features that address\
    \ customers\u2019 needs and evolve the capabilities of Privy\u2019s core products.&nbsp;Customer\
    \ obsession is a core part of Privy\u2019s culture. You\u2019ll work closely with\
    \ fellow engineers, product, and business teams to ensure Privy's customers achieve\
    \ their desired outcomes and are delighted by our products.</p> <h3>Responsibilities<span\
    \ style=\"font-weight: 400;\">&nbsp;</span></h3> <ul> <li>Work directly with customers\
    \ to understand their technical and operational objectives, scope requirements,\
    \ and prototype and propose software solutions</li> <li>Design, code, and launch\
    \ features that improve and innovate on Privy\u2019s core product using tools\
    \ like&nbsp;<strong>Typescript</strong>, <strong>React</strong>, and <strong>NextJS</strong>,\
    \ and fully owning end-to-end development</li> <li>Drive product deployments,\
    \ including configuration, testing, and troubleshooting</li> <li>Champion customer\
    \ success, ensuring customer feedback and pain points are understood, prioritized,\
    \ and pursued by the team</li> <li>Dive deep into customer codebases to understand\
    \ product usage, friction points, and uncover opportunities for improvements</li>\
    \ <li>Partner with internal stakeholders to continuously align product roadmap\
    \ and strategy with customer needs and objectives</li> </ul> <h2><strong>Who you\
    \ are</strong></h2> <p><span style=\"font-weight: 400;\">We\u2019re looking for\
    \ someone who meets the minimum requirements to be considered for the role. If\
    \ you meet these requirements, you are encouraged to apply. The preferred qualifications\
    \ are a bonus, not a requirement.</span></p> <h3>Minimum requirements</h3> <ul>\
    \ <li>5+ years of professional, hands on full-stack development experience with\
    \ languages such as JavaScript, TypeScript, React, Python, Go, or Java</li> <li>Excel\
    \ at rapid prototyping while maintaining appropriate quality standards</li> <li>Superb\
    \ problem solving skills and ability to understand the product and business side\
    \ of development (in other words, you see the big picture!)</li> <li>Experience\
    \ building and owning features end-to-end</li> <li>Excellent ability to communicate\
    \ and collaborate with both technical and non-technical stakeholders</li> <li>A\
    \ passion for handling ambiguity and picking up new technologies, frameworks,\
    \ and tools</li> <li>An entrepreneurial and high ownership mindset</li> <li>A\
    \ desire for impact and a deep sense of urgency for your work</li> </ul> <h3><strong>Preferred\
    \ qualifications</strong></h3> <ul> <li>Written open-source developer tooling</li>\
    \ <li>Published your work (code, presentations, papers, blog posts, etc.)</li>\
    \ <li>Experience building web3 applications</li> </ul>"
