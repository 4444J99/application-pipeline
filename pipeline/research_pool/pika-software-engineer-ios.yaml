  description: 'About the role At Pika, we are building groundbreaking tools for creators,
    empowering them to tell their stories with ease. With over $135M in funding and
    a passionate team, we’re on a mission to make video creation accessible to everyone.
    We''re looking for an iOS Engineer to help scale our mobile efforts as we continue
    to grow and gain users. What We’re Looking For 5+ years of professional experience
    building and shipping consumer-facing iOS applications. Strong proficiency in
    Swift and familiarity with the iOS ecosystem, including SwiftUI. Experience working
    on UI/UX with modern frameworks and a keen eye for detail. Proven ability efficiently
    and effectively contribute with high levels of design-consistency, functionality,
    and performance. Excellent problem-solving skills and a collaborative mindset.
    Preferred Skills Experience with video or multimedia apps is a strong plus. Working
    with social media and creative apps is a plus. Knowledge of core animation, graphics,
    and media frameworks. What We Offer Competitive salary: $175,000–$250,000, depending
    on experience and location. Equity in a fast-growing startup shaping the future
    of video creation. Comprehensive health benefits. A supportive and collaborative
    office culture— we’re all building and launching together. About Pika At Pika,
    we’re crafting a future where video creation is seamless, intuitive, and universally
    accessible. Our vision is set on a world where videos transcend entertainment,
    serving as a canvas for everyone''s unique expression. Harnessing AI''s transformative
    power, we aim to dismantle the technical barriers that have traditionally made
    video production an exclusive field. It’s about building the best technology that
    upholds the power of creativity—not just within our products but as an integral
    part of our culture. We’re a small team of energetic, smart and curious individuals.
    We value efficiency, collaboration, and creativity. We seek new team members who
    bring sharp intellect, a strong work ethic, and the ambition to make an impact.
    Here, you''ll find significant room for career advancement, supported by a culture
    that nurtures both individual and collective development. Our headquarters is
    based in Palo Alto, CA, and we work from the office 5 days a week.'
