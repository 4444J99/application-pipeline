    <li>Exceptional&nbsp;organizational&nbsp;skills&nbsp;→&nbsp;you&nbsp;juggle&nbsp;timelines,&nbsp;vendors,&nbsp;and&nbsp;moving&nbsp;parts&nbsp;without&nbsp;losing&nbsp;the&nbsp;thread</li>
    <li>Comfortable&nbsp;working&nbsp;cross-functionally&nbsp;with&nbsp;marketing,&nbsp;sales,&nbsp;and&nbsp;external&nbsp;partners</li>
