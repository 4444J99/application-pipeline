  description: <p><strong>About&nbsp;Buildkite</strong></p> <p>At Buildkite, our mission
    is to unblock every developer on the planet. We’ve rethought how software delivery
    should work and have built a platform that is fast, reliable, secure, and able
    to scale to the needs of the most demanding high-growth tech companies globally
    including Airbnb, Canva, Shopify, PagerDuty, and Lyft.</p> <p><strong>Job&nbsp;Overview</strong></p>
    <p>We're looking for a Developer Events Specialist to plan, coordinate, and execute
    the events and community programs that bring Buildkite into the rooms that matter.
    You'll own the logistics and on-the-ground experience for user conferences, community
    meetups, workshops, and sponsored event presences, creating moments that engage
    and excite engineers in attendance.</p> <p>This is a hands-on, logistics-first
    role. You'll manage the full event lifecycle from venue sourcing and vendor management
    through to day-of execution, working closely with our GTM and Brand teams to keep
    everything running smoothly and on-brand. You don't need to be a coder, but you
    do need to understand how software teams work and what good looks like in the
    SaaS and DevTools space.</p> <p><strong>🚀&nbsp;What&nbsp;You'll&nbsp;Do</strong></p>
    <p><strong>Own&nbsp;end-to-end&nbsp;event&nbsp;logistics</strong></p> <ul> <li>Plan&nbsp;and&nbsp;execute&nbsp;dev-focused&nbsp;events:&nbsp;user&nbsp;conferences,&nbsp;community&nbsp;meetups,&nbsp;workshops,&nbsp;dinners,&nbsp;and&nbsp;roundtables</li>
    <li>Manage&nbsp;vendors,&nbsp;venues,&nbsp;budgets,&nbsp;timelines,&nbsp;and&nbsp;all&nbsp;operational&nbsp;details&nbsp;from&nbsp;planning&nbsp;through&nbsp;to&nbsp;post-event&nbsp;wrap-up</li>
    <li>Build&nbsp;repeatable&nbsp;processes&nbsp;and&nbsp;checklists&nbsp;so&nbsp;each&nbsp;event&nbsp;runs&nbsp;more&nbsp;smoothly&nbsp;than&nbsp;the&nbsp;last</li>
    </ul> <p><strong>Build&nbsp;a&nbsp;consistent&nbsp;community&nbsp;presence</strong></p>
    <ul> <li>Help&nbsp;establish&nbsp;and&nbsp;grow&nbsp;Buildkite's&nbsp;presence&nbsp;in&nbsp;dev&nbsp;communities,&nbsp;with&nbsp;an&nbsp;initial&nbsp;focus&nbsp;on&nbsp;the&nbsp;Bay&nbsp;Area</li>
    <li>Maintain&nbsp;a&nbsp;calendar&nbsp;of&nbsp;recurring&nbsp;sponsored&nbsp;and&nbsp;co-marketing&nbsp;programs,&nbsp;owning&nbsp;the&nbsp;coordination&nbsp;of&nbsp;each</li>
    <li>Serve&nbsp;as&nbsp;a&nbsp;reliable&nbsp;point&nbsp;of&nbsp;contact&nbsp;for&nbsp;community&nbsp;partners,&nbsp;co-sponsors,&nbsp;and&nbsp;speakers</li>
    </ul> <p><strong>Support&nbsp;on-site&nbsp;capture&nbsp;and&nbsp;follow-through</strong></p>
    <ul> <li>Coordinate&nbsp;on-site&nbsp;logistics&nbsp;that&nbsp;enable&nbsp;content&nbsp;capture&nbsp;and&nbsp;attendee&nbsp;signal&nbsp;collection</li>
    <li>Liaise&nbsp;with&nbsp;GTM&nbsp;and&nbsp;Brand&nbsp;teams&nbsp;to&nbsp;ensure&nbsp;post-event&nbsp;follow-up&nbsp;happens&nbsp;on&nbsp;time&nbsp;and&nbsp;consistently</li>
    <li>Maintain&nbsp;simple&nbsp;tracking&nbsp;to&nbsp;connect&nbsp;event&nbsp;activity&nbsp;to&nbsp;downstream&nbsp;outcomes</li>
    </ul> <p><strong>Keep&nbsp;things&nbsp;organized&nbsp;and&nbsp;running</strong></p>
    <ul> <li>Maintain&nbsp;clear&nbsp;documentation&nbsp;for&nbsp;event&nbsp;plans,&nbsp;budgets,&nbsp;and&nbsp;vendor&nbsp;relationships</li>
    <li>Report&nbsp;on&nbsp;event&nbsp;outcomes&nbsp;honestly&nbsp;→&nbsp;what&nbsp;worked,&nbsp;what&nbsp;didn't,&nbsp;and&nbsp;what&nbsp;to&nbsp;change&nbsp;next&nbsp;time</li>
    <li>Manage&nbsp;multiple&nbsp;events&nbsp;simultaneously&nbsp;without&nbsp;dropping&nbsp;details</li>
    <li>Funnel&nbsp;attendee&nbsp;and&nbsp;lead&nbsp;information&nbsp;through&nbsp;GTM&nbsp;enrichment</li>
    <li>Liaise&nbsp;with&nbsp;GTM&nbsp;and&nbsp;Sales&nbsp;to&nbsp;ensure&nbsp;lifecycle&nbsp;momentum&nbsp;pre-&nbsp;and&nbsp;post-event</li>
    </ul> <p><strong>🎨&nbsp;What&nbsp;You&nbsp;Bring</strong></p> <ul> <li>3+ years
