  description: 'About Neon Neon is a global payments and e-commerce platform designed
    to help game publishers earn more money and independence from app stores. We believe
    commerce should be open and transparent: clear decisions, actionable insights,
    and aligned incentives. Founded by payments, fintech and gaming veterans, Neon
    focuses on product and partnership excellence: we share the playbook, co-pilot
    decisions, and abstract away risk and complexity for our customers. We’re replacing
    old-school, black-box relics with clear, modern, and developer-centric infrastructure.
    As an early team member, you’ll have the opportunity to shape and scale Neon’s
    product and culture, making a direct impact on our growth and success. You’ll
    join a collaborative, diverse team from world-class companies like Apple, Affirm,
    Unity, and Visa, backed by renowned VC''s including Thrive, a16z, Griffin Gaming,
    Ribbit, and Renegade. If you want to build disruptive technology, challenge the
    status quo, and help game creators thrive on their own terms, read on. About the
    Role Neon is seeking a Software Engineer who will help lead the development of
    one of our key work streams. As a design-minded engineer, you’ll bring ideas to
    life on a blank canvas, turning concepts into functional, beautiful products.
    You’ll be involved in the full stack of the technology, working hands-on to build
    and scale a core product that accelerates financial independence for game creators.
    What You’ll Do Develop and maintain both front‑end and back‑end components of
    the product Collaborate closely with product leaders, designers, and fellow engineers
    to define, design, and ship new features Ensure features are scalable, performant,
    secure, and user-friendly Write clean, maintainable, and efficient code, participate
    in code reviews, maintain documentation What We Look For 1+ year(s) software engineering
    experience Full-stack background, with strong focuses on React and TypeScript
    Excited about learning new things and flexing across the stack as the team evolves
    alongside you Highly productive, able to take ownership of key initiatives and
    deliver results Able to work from our offices in San Francisco or New York City
    Join Neon. Shape the Future of Gaming.'
