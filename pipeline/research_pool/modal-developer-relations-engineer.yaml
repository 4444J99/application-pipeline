  description: 'About Us: Modal provides the infrastructure foundation for AI teams.
    With instant GPU access, sub-second container startups, and native storage, Modal
    makes it simple to train models, run batch jobs, and serve low-latency inference.
    We have thousands of customers who rely on us for production AI workloads, including
    Lovable, Scale AI, Substack, and Suno. We''re a fast-growing team based out of
    NYC, SF, and Stockholm. We''ve hit 9-figure ARR and recently raised a Series B
    at a $1.1B valuation. Our investors include Lux Capital , Redpoint Ventures ,
    Amplify Partners , and Elad Gil . Working at Modal means joining one of the fastest-growing
    AI infrastructure organizations at an early stage, with many opportunities to
    grow within the company. Our team includes creators of popular open-source projects
    (e.g. Seaborn , Luigi ), academic researchers, international olympiad medalists,
    and experienced engineering and product leaders with decades of experience. The
    Role: Modal builds AI infrastructure products that developers love. That''s how
    we grew so quickly, and why word of mouth remains one of our most important channels
    today. In this role, you will primarily create and distribute technical content
    that is unique, educational, and practical. This content will be the first Modal
    touchpoint for many of our users. We want to not only showcase the power and developer
    experience of Modal, but also serve as a trusted resource for them when implementing
    new AI technologies. In this role, you will: Distill the latest advancements in
    AI technology and educate developers on how to incorporate them. Give demos/talks
    about Modal and adjacent tools at developer events. Engage with users in our community,
    both online (X, LinkedInReddit, Slack) and at in-person events. Build relationships,
    integrations, and joint marketing activities with other developer-focused companies
    Set objectives that are aligned with the greater GTM team and track the impact
    of the initiatives you work on. Requirements: We are looking for someone who:
    3+ years as a software engineer Is energized by the AI developer community and
    wants to help developers adopt new technologies. Loves teaching. Has excellent
    technical communication skills. Is metrics-driven and takes quantitative approaches
    to prioritizing initiatives. Is excited about working in-person in the NYC, SF
    or Stockholm office. Bonus: you''re not afraid to think outside the box when it
    comes to compelling technical content. Bonus: you already have a developer following
    on social media!'
