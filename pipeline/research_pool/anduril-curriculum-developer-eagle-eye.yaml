    \ events.</li> <li>Exceptional written, verbal, and visual communication skills.</li>\
    \ <li>High attention to detail and quality in documentation and deliverables.</li>\
    \ </ul> <h4>PREFERRED REQUIREMENTS</h4> <ul> <li>Familiarity with defense, aerospace,\
    \ robotics, virtual reality/augmented reality, or software systems.</li> <li>Experience\
    \ using authoring tools such as Adobe Captivate, Articulate Storyline, Techsmith\
    \ Camtasia, or similar.</li> <li>Understanding of Learning Management Systems\
    \ (LMS) and training tracking tools (e.g., Cornerstone).</li> <li>Bachelor\u2019\
    s degree in Instructional Design, Education, Technical Communication, or related\
    \ field.</li> <li>Work history with complex engineering or operations-focused\
    \ companies or Department of Defense</li> </ul> <p>&nbsp;</p><div class=\"content-pay-transparency\"\
    ><div class=\"pay-input\"><div class=\"title\">US Salary Range</div><div class=\"\
