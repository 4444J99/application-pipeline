    \ <li>Strong knowledge of instructional design models and frameworks, including\
    \ ADDIE, SAM, Gange\u2019s, Merrill\u2019s, and other adult learning theories.</li>\
    \ <li>Demonstrated experience project management skillsets, including: scope planning,\
    \ communications, stakeholder alignment, monitoring, and closure</li> <li>Experience\
    \ developing training content for diverse modalities (ILT, VILT, eLearning, performance\
