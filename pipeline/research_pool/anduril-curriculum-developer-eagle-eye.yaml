    \ <li>Maintain version control, documentation standards, and compliance with internal\
    \ training systems and platforms.</li> </ul> <h4>REQUIRED QUALIFICATIONS</h4>\
    \ <ul> <li>3\u20135 years of experience in curriculum development, instructional\
    \ design, or training program management\u2014ideally in a technical, engineering,\
