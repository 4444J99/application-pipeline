  description: '<div class="content-intro"><p><span style="font-weight: 400;">Every
    day, tens of millions of people come to Roblox to explore, create, play, learn,
    and connect with friends in 3D immersive digital experiences– all created by our
    global community of developers and creators.&nbsp;</span></p> <p><span style="font-weight:
    400;">At Roblox, we’re building the tools and platform that empower our community
    to bring any experience that they can imagine to life. Our vision is to reimagine
    the way people come together, from anywhere in the world, and on any device.</span><strong>
    </strong><span style="font-weight: 400;">We’re on a mission to connect a billion
    people with optimism and civility, and looking for amazing talent to help us get
    there.&nbsp;</span></p> <p><span style="font-weight: 400;">A career at Roblox
    means you’ll be working to shape the future of human interaction, solving unique
    technical challenges at scale, and helping to create safer, more civil shared
    experiences for everyone.</span></p></div><p><strong>WHY SAFETY?</strong></p>
    <p>At Roblox, we strive to connect a billion people with optimism and civility,
    and the Safety organization’s mission is to become the leader in civil immersive
    online communities. We systematically detect, remove, and prevent problematic
    accounts, content and behavior, and we make Roblox accounts secure and free from
    compromise. We cover a broad area of the tech spectrum, including machine learning,
    classifiers for 3D models, experimentation, automation, detection workflows, and
    AI-powered text filters. Aligned and partnering with product teams, we use this
    tool-belt to discover new opportunities, influence and shape the product roadmap
    and prioritization, build safety products, and measure the impact on our community
    of users and developers. In doing so, we keep Roblox safe, civil, and inclusive,
    and we foster positive relationships between people around the world.</p> <p><strong>WHY
    Account Infrastructure ?</strong></p> <p>Authenticating and authorizing the Roblox
    user base sets the foundation for every other feature on our platform. Users must
    be confident that their accounts are not used without their permission; we must
    empower them with auth/security controls that meet each user’s needs and just-in-time
    friction that adapts to each user’s unique risk profile. On top of that, we must
    offer these features in a way that will scale to 1 billion active users. As a
    member of the Account Infra Team, you will have a rare opportunity to sit at the
    convergence of adversarial problem solving and high scalability engineering. You
    will report to the Engineering Manager of Auth Infra and Account Security.<br><br></p>
    <p><strong>You Will:</strong></p> <ul> <li>Assume ownership of the complete lifecycle
    for full-stack features within Auth Infra and Account Security, encompassing technical
    specification, implementation, rollout, monitoring, and iteration, ensuring alignment
    with the designated pod roadmap.</li> <li>Engage in close collaboration with partner
    teams in Application Security, Roblox Core Services, and the broader Roblox Safety
    org.</li> <li>Define the architectural direction for scaling account authentication
    and security.</li> <li>Contribute to and maintain user authentication and security
    infra.</li> <li>Take complete responsibility for projects throughout their entire
    lifecycle.</li> <li>Drive cross-functional engagement and lead technical initiatives
    to ensure the widespread adoption and success of our core safety applications.</li>
    <li>Report directly to the Manager of Account Security and Infra.<br><br></li>
    </ul> <p><strong>You Have:</strong></p> <ul> <li>5+ years of experience in software
    development.</li> <li>Distributed Systems Architecture: Proven ability to design
    and implement robust, high-throughput microservices (handling thousands of requests
    per second) while maintaining a strict focus on system safety and security.&nbsp;</li>
    <li>Full-Stack Proficiency: Experience with both front-end (e.g., React, Vue,
    Angular) and back-end technologies (e.g.,= Python, Java, Go) to deliver end-to-end
    features.</li> <li>Safety-Driven Mindset: A strong commitment to designing, implementing,
    and maintaining systems that prioritize user safety, data integrity, and compliance
    with safety policies.</li> <li>Equivalent experience or a BS in Computer Science,
    Applied Math, Physics, Engineering, Statistics, or another technical field.</li>
    <li>Curious to learn new technologies and systematically grow your skills.</li>
    </ul> <p><strong>You Are:</strong></p> <ul> <li>Experienced (4+ years): You have
    extensive experience as a full-stack engineer, proficient in back-end development,
    working on complex, production-grade systems end-to-end.</li> <li>Analytical &amp;
    Data-Driven: You possess a strong ability to instrument, collect, and analyze
    user interaction data (e.g., A/B testing, usage metrics) to inform design decisions
    and continuously maximize user impact and product performance.'
