  description: '<p>The worldwide data management software market is massive (According
    to IDC, the worldwide database software market, which it refers to as the database
    management systems software market, was forecasted to be approximately $82 billion
    in 2023 growing to approximately $137 billion in 2027. This represents a 14% compound
    annual growth rate). At MongoDB we are transforming industries and empowering
    developers to build amazing apps that people use every day. We are the leading
    developer data platform and the first database provider to IPO in over 20 years.
    Join our team and be at the forefront of innovation and creativity.</p> <p>The
    Query Integration team is focused on building user-facing features on top of the
    core query engine and helping to integrate query with other products in the MongoDB
    ecosystem. This includes enhancing our <a href="https://www.mongodb.com/time-series">time-series
    product</a>, extending language support for analytics, helping grow our <a href="https://www.mongodb.com/atlas/search">Atlas
    Search</a> and Vector Search products with database support and adding workload
    telemetry to provide greater insight into how our database is used. Most of our
    development is in C++, but prior experience in C++ is not required. Our testing
    infrastructure is written in JavaScript and Python.&nbsp;</p> <p>This role can
    be based out of our US or Canadian offices or remotely in the North America region.</p>
    <h3>Candidate Profile</h3> <ul> <li>5+ years of experience in computer programming&nbsp;</li>
    <ul> <li>Experience in databases and/or data management systems is a huge plus,
    but not a requirement</li> </ul> <li>Hands-on experience building industrial-strength
    software</li> <li>Solid computer science fundamentals, with strong competencies
    in data structures, algorithms, and software design/architecture</li> <li>Experience
    with large code bases, preferably in C++</li> <li>B.Sc. in Computer Science or
    similar field, or equivalent practical experience</li> <li>Interest in the theory
    and practice of database query engines. Hands-on experience or M.Sc./Ph.D in the
    domain is a plus</li> </ul> <h3>Position Expectations</h3> <ul> <li>Understand
    and improve current functionality of the MongoDB query engine</li> <li>Contribute
    high quality C++ code and give and solicit feedback in code reviews</li> <li>Identify,
    design, implement, test, and support new features related to query performance
    and robustness, query language enhancements, diagnostics for query performance
    problems, and integration with other products and tools</li> <li>Work constructively
    with peers to deliver excellent technical solutions</li> </ul> <h3>Success Measures</h3>
    <ul> <li>In three months you’ll have contributed to the development of a project
    slated for the next major version, as well as fixed a few bugs in a minor version
    of our latest stable release series</li> <li>In six months, you’ll have taken
    on code review responsibilities and are independently delivering complex functionality
    and squashing bugs independently</li> <li>In twelve months, you’re contributing
    to the design of major new features and are helping to mentor new engineers on
    the team</li> </ul> <h3>About MongoDB</h3> <p>MongoDB is built for change, empowering
    our customers and our people to innovate at the speed of the market. We have redefined
    the database for the AI era, enabling innovators to create, transform, and disrupt
    industries with software. MongoDB’s unified database platform, the most widely
    available, globally distributed database on the market, helps organizations modernize
    legacy workloads, embrace innovation, and unleash AI. Our cloud-native platform,
    MongoDB Atlas, is the only globally distributed, multi-cloud database and is available
    across AWS, Google Cloud, and Microsoft Azure.</p> <p>With offices worldwide and
    over 60,000 customers, including 75% of the Fortune 100 and AI-native startups,
    relying on MongoDB for their most important applications, we’re powering the next
    era of software.</p> <p>Our compass at MongoDB is our <a href="https://www.mongodb.com/company">Leadership
    Commitment,</a> guiding how and why we make decisions, show up for each other,
    and win. It’s what makes us MongoDB.&nbsp;</p> <p>To drive the personal growth
    and business impact of our employees, we’re committed to developing a supportive
    and enriching culture for everyone. <a href="https://www.mongodb.com/company/blog/culture/employee-benefits-that-make-a-difference-at-mongodb">From
    employee affinity groups, to fertility assistance and a generous parental leave
    policy</a>, we value our employees’ wellbeing and want to support them along every
    step of their professional and personal journeys.<a href="https://www.mongodb.com/blog/channel/culture">
    Learn more about what it’s like to work at MongoDB</a>, and help us make an impact
    on the world!</p> <p>MongoDB is committed to providing any necessary accommodations
    for individuals with disabilities within our application and interview '
