    \ build out new features, and accelerate our path toward product-market fit. As\
    \ we scale, your work will directly impact our global community and support the\
    \ company\u2019s top-line growth.</p> <p><strong>You Have:</strong></p> <ul> <li>An\
    \ undergraduate/graduate degree in computer science, engineering or a related\
    \ field.</li> <li>2+ years of experience in working on microservice architectures\
    \ with a proven track record in addressing scalability and reliability challenges.</li>\
    \ <li>1+ years of experience building systems behind consumer-facing APIs that\
    \ can handle large numbers of concurrent users.</li> <li>Strong understanding\
    \ of server-side development and design principles, with proficiency in at least\
    \ one compiled language such as C#, C++, Java, Golang, or other.</li> <li>Strong\
    \ product intuition - you think in terms of user experience, tradeoffs, and measurable\
    \ outcomes, as well as system design.</li> <li>A track record of leveraging AI-assisted\
    \ development tools to maximize engineering velocity, allowing you to rapidly\
    \ prototype, iterate on complex logic, and move from ideation to production-ready\
