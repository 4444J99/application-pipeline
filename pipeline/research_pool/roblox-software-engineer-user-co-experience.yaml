    \ teams (infrastructure, matchmaking, chat, voice, trust and safety) to integrate\
    \ multiple systems in a reusable, performant and safe manner.</li> <li>Self-organize\
    \ and take ownership of projects throughout their full lifecycle.</li> <li>Maintain\
