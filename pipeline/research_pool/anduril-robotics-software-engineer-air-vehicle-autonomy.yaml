    \ bringing cutting-edge autonomy, AI, computer vision, sensor fusion, and networking\
    \ technology to the military in months, not years.</p></div><h3><strong>ABOUT\
    \ THE TEAM</strong></h3> <p>The Air Dominance &amp; Strike team at Anduril develops\
    \ aerial and multi-domain robotic systems. The team is responsible for taking\
    \ products like Fury (unmanned fighter jet) and Barracuda (air-breathing cruise\
    \ missile) from concept to product. The team also develops Lattice for Mission\
    \ Autonomy, Anduril\u2019s premier software platform that enables masses of Fury,\
    \ Barracuda, and other first and third party robots to collaborate across various\
    \ missions. We work in close coordination with specialist teams like Perception,\
    \ Motion Planning, Hardware, and Test Engineering to solve some of the hardest\
    \ problems facing our customers. We are looking for software engineers and roboticists\
    \ excited about creating a powerful autonomy software stack that includes computer\
    \ vision, motion planning, SLAM, controls, estimation, and secure communications.<br><br><strong>WHAT\
    \ YOU'LL DO</strong></p> <ul> <li>Write and maintain core libraries and services\
