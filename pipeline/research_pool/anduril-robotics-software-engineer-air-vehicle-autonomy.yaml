    \ <li>Own major feature development and rollout of large, complex features for\
    \ our products - recent examples include developing terminal-phase autonomy for\
    \ various air vehicles and developing a test plan on live surrogates.</li> <li>Work\
    \ closely with Anduril and 3rd party vehicle hardware teams, as well as operational\
    \ subject matter experts (fighter pilots, UAV operators, etc.) to align on requirements\
    \ during product development and iterate towards a final design.</li> </ul> <h4><strong>REQUIRED\
