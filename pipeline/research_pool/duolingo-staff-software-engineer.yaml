    our users and employees alike. You’ll have limitless learning opportunities, mentorship
    and collaboration with world-class minds, and a variety of projects with large
    scopes — while doing work that’s both fun and meaningful.&nbsp;</p> <p>Join our
    life-changing mission to develop education for our half a billion (and growing!)
    learners around the world.</p> <hr> <h2><strong>About the role</strong></h2> <p>We’re
