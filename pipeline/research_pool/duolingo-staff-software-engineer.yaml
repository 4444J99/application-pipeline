    Duolingo’s key business metric DAU, worldwide!</p> <p>&nbsp;</p> <h4><strong><img
    style="max-width: 100%;" src="https://careers.duolingo.com/274c0c8ca00d7c576894.svg"
    alt="icon-brain-16px" width="17" data-is360="0">&nbsp; You will...</strong></h4>
