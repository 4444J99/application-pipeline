  description: 'Snowflake is about empowering enterprises to achieve their full potential
    — and people too. With a culture that’s all in on impact, innovation, and collaboration,
    Snowflake is the sweet spot for building big, moving fast, and taking technology
    — and careers — to the next level. Snowflake is a global platform where thousands
    of organizations store and process their data. Our Data Marketplace allows our
    customers to exchange data across geographies, organizationions and cloud providers.
    We are now building an App Marketplace on top of the Data Marketplace. Think of
    it as an App Store or Play Store but with the apps running on the Snowflake Cloud,
    not phones. Snowflake is becoming an application platform. It’s a new, big, and
    differentiating feature for Snowflake and our customers. The Native Apps team
    in Toronto is in the center of this innovation. We’re working on the core building
    blocks for the apps to support the app lifecycle - creation, versioning, global
    rollouts, installation and execution in a secure sandbox. We enable app runtimes
    for multiple languages and execution models. We deal with many aspects of the
    app framework from access control and permissions, through IP protection to UI
    frameworks. We’re still early in our journey and we are looking for talented and
    passionate engineers to innovate with us. Our big, multi-year goal is to launch
    a hugely successful app ecosystem. We count not only on your deep tech expertise
    and problem solving skills but also on eagerness to evangelize the new platform
    among developers. AS A SOFTWARE ENGINEER FOR NATIVE APPS, YOU WILL: Drive high
    impact initiatives that span our product areas and tech stack including Java ,
    python and golang Promote strong collaboration within a cross functional team,
    including design, product management. Deliver features requiring close coordination
    with cross-functional teams Be a strong contributor to the product vision and
    drive team planning. Build for scale and high performance. OUR IDEAL CANDIDATE
    WILL HAVE: 2+ years hands-on software development experience, including significant
    experience in backend software development Deep understanding of distributed design
    architecture, good API design patterns, security, performance and scale. Knowledge
    of data development tools, data infrastructure, or ML is a plus. You go to work
    everyday striving to be the very best you can be. You''re undaunted by ambiguity
    and are motivated to drive impact. ABOUT APPS AND SNOWFLAKE: Snowflake Native
    Apps Snowflake for Applications and Collaboration Snowflake Marketplace Life at
    Snowflake Canada Our Human Resources Department may use artificial intelligence
    to support its administrative processes. This role is available and may represent
    a new position. This role is exempt from Ontario’s job posting requirements. Snowflake
    is growing fast, and we’re scaling our team to help enable and accelerate our
    growth. We are looking for people who share our values, challenge ordinary thinking,
    and push the pace of innovation while building a future for themselves and Snowflake.
    How do you want to make your impact? For jobs located in the United States, please
    visit the job posting on the Snowflake Careers Site for salary and benefits information:
    careers.snowflake.com'
