  description: "<div class=\"content-intro\"><p><strong>Why join us</strong></p> <p>Brex\
    \ is the AI-powered spend platform. We help companies spend with confidence with\
    \ integrated corporate cards, banking, and global payments, plus intuitive software\
    \ for travel and expenses. Tens of thousands of companies from startups to enterprises\
    \ \u2014 including DoorDash, Flexport, and Compass \u2014 use Brex to proactively\
    \ control spend, reduce costs, and increase efficiency on a global scale.</p>\
    \ <p><span style=\"font-weight: 400;\">Working at Brex allows you to push your\
    \ limits, challenge the status quo, and collaborate with some of the brightest\
    \ minds in the industry. We\u2019re committed to building a diverse team and inclusive\
    \ culture and believe your potential should only be limited by how big you can\
    \ dream. We make this a reality by empowering you with the tools, resources, and\
    \ support you need to grow your career.</span></p></div><p><strong>Engineering\
    \ at Brex</strong></p> <p>Engineering at Brex is about building systems that scale\
    \ with speed and intention. Our teams span Software, Data, Security, and IT, and\
    \ operate with high autonomy and deep collaboration. We tackle hard technical\
    \ problems, own our outcomes, and push for excellence at every level \u2014 from\
    \ architecture to deployment. It\u2019s an environment where engineering is a\
    \ craft, and builders become leaders.</p> <p><strong>About the Team:</strong></p>\
    \ <p>The Frontend Platform team builds and maintains the core web, mobile, and\
    \ design systems infrastructure behind every customer-facing experience at Brex.\
    \ The team is responsible for the stability, performance, and scalability of our\
    \ frontend applications, and for creating an excellent developer experience for\
    \ the teams that build them.</p> <p>In this role, you\u2019ll join a high-impact\
    \ Web pod that partners closely with designers, product teams, and other engineers\
    \ across the company. Together, you\u2019ll drive the adoption of frontend architectural\
    \ patterns, improve our product experience, and help define the future of frontend\
    \ at Brex.</p> <p><strong>What you\u2019ll do</strong></p> <ul> <li>Own and contribute\
    \ to platform, infrastructure, and developer experience improvements that impact\
    \ all frontend engineers at Brex.</li> <li>Define and implement scalable patterns\
    \ for data fetching, state management, and cross-product reusability in partnership\
    \ with design system and product engineers.</li> <li>Set and uphold a high bar\
    \ for quality, including performance, testing, accessibility, and observability.</li>\
    \ <li>Own problems end-to-end: designing, implementing, testing, managing stakeholders,\
    \ and measuring impact.</li> </ul> <p><strong>Where you\u2019ll work</strong></p>\
    \ <p>This role will be based in our S\xE3o Paulo office. We are a hybrid environment\
    \ that combines the energy and connections of being in the office with the benefits\
    \ and flexibility of working from home. We currently require a minimum of three\
    \ coordinated days in the office per week \u2013 Monday, Wednesday and Thursday.\
    \ As a perk, we also have up to four weeks per year of fully remote work!</p>\
    \ <p><strong>Requirements:</strong></p> <ul> <li>Several years of experience building\
    \ modern web applications using React, JavaScript/TypeScript, GraphQL, and modern\
    \ CSS.</li> <li>Demonstrated interest in developer experience and platform engineering,\
    \ with experience improving shared infrastructure, standards, or tooling.</li>\
    \ <li>Solid testing practices and experience building reliable, maintainable client-side\
    \ systems across browsers.</li> <li>Comfort managing projects and collaborating\
    \ cross-functionally to balance competing requirements and priorities.</li> </ul>\
    \ <p><strong>Bonus points:</strong></p> <ul> <li>Familiarity with complex frontend\
    \ migrations, refactors, or large-scale architectural changes.</li> <li>Strong\
    \ intuition for balancing pragmatism with innovation when evaluating new technologies.</li>\
    \ <li>Interest in emerging developer productivity tools, including agentic coding\
    \ workflows.</li> </ul><div class=\"content-conclusion\"><p><em>Please be aware,\
    \ job-seekers may be at risk of targeting by malicious actors looking for personal\
