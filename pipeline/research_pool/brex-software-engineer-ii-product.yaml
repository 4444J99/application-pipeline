  description: "<div class=\"content-intro\"><p><strong>Why join us</strong></p> <p>Brex\
    \ is the AI-powered spend platform. We help companies spend with confidence with\
    \ integrated corporate cards, banking, and global payments, plus intuitive software\
    \ for travel and expenses. Tens of thousands of companies from startups to enterprises\
    \ \u2014 including DoorDash, Flexport, and Compass \u2014 use Brex to proactively\
    \ control spend, reduce costs, and increase efficiency on a global scale.</p>\
    \ <p><span style=\"font-weight: 400;\">Working at Brex allows you to push your\
    \ limits, challenge the status quo, and collaborate with some of the brightest\
    \ minds in the industry. We\u2019re committed to building a diverse team and inclusive\
    \ culture and believe your potential should only be limited by how big you can\
    \ dream. We make this a reality by empowering you with the tools, resources, and\
    \ support you need to grow your career.</span></p></div><p><strong>Engineering\
    \ at Brex</strong></p> <p>The Engineering team includes Data, IT, Security, and\
    \ Software, and is responsible for building innovative products and infrastructure\
    \ for both internal and external users. We have multiple autonomous and collaborative\
    \ teams who are eager to learn, teach, and constantly improve how things work.\
    \ Together, we strive to build robust and scalable systems that enable Brex to\
    \ grow rapidly and help our customers reach their full potential.</p> <p><strong>Where\
    \ you\u2019ll work<br></strong></p> <p>This role will be based in our S\xE3o Paulo\
    \ office. We are a hybrid environment that combines the energy and connections\
    \ of being in the office with the benefits and flexibility of working from home.\
    \ We currently require a minimum of two coordinated days in the office per week,\
    \ Wednesday and Thursday. Starting February 2, 2026, we will require 3 days per\
    \ week in the office - Monday, Wednesday and Thursday. As a perk, we also have\
    \ up to four weeks per year of fully remote work!</p> <p><strong>What you\u2019\
    ll do</strong></p> <p>We are looking for folks with an interest in building products\
    \ and tools, who are comfortable dealing with a lot of moving pieces. You will\
    \ be building customer-facing products that will drive direct business impact\
    \ and shape our long-term technical vision with a high-quality bar. You will have\
    \ the opportunity to learn and push the frontier of providing the best financial\
    \ software experience to help companies grow. You will be encouraged to be metric\
    \ and data-driven and to think creatively to help Brex scale and prepare for the\
    \ new markets we are about to enter.&nbsp;<br><br></p> <p><strong>Responsibilities</strong></p>\
    \ <ul> <li>Design and build strong, resilient, and robust APIs, libraries, and\
    \ tools to power Brex engineers and operations</li> <li>Own functionality and\
    \ scalability features by taking responsibility from inception to deployment</li>\
    \ <li>Be responsible for full software development lifecycle: design, development,\
    \ testing, and operating in production</li> <li>Uphold our high engineering standards\
    \ and bring consistency to the codebases, infrastructure, and processes you will\
    \ encounter</li> </ul> <p><strong>Requirements</strong></p> <ul> <li>3+ years\
    \ of experience working as a software engineer</li> <li>Experience creating libraries\
    \ and tools for engineers and operations</li> <li>Experience building and designing\
    \ scalable backend systems&nbsp;</li> <li>Experience working with SQL or NoSQL\
    \ databases&nbsp;</li> <li>Familiarity with software engineering development cycles&nbsp;</li>\
    \ <li>Experience working with backend programming languages (Java, Kotlin, Python)</li>\
    \ <li>Ability to hold yourself and the team to high standards</li> <li>Strong\
    \ communication and interpersonal skills</li> <li>English proficiency/fluency,\
    \ both written and speaking (note: interviews will be conducted in English)</li>\
    \ </ul> <p><strong>Bonus points</strong></p> <ul> <li>Experience collaborating\
    \ with experts in product, design, and operations</li> <li>Familiarity with functional\
    \ programming languages&nbsp;</li> <li>Strong writing skills</li> <li>Proactive\
    \ approach</li> </ul><div class=\"content-conclusion\"><p><em>Please be aware,\
    \ job-seekers may be at risk of targeting by malicious actors looking for personal\
    \ data. Brex recruiters will only reach out via LinkedIn or email with a&nbsp;<a\
