  description: <h2>Role Description</h2> <div> <p>As a Staff Backend Software Engineer
    focused on the Commerce Platform within the Business Platform org, you will play
    a critical role in building and evolving the systems that power how Dropbox monetizes
    its products across all sales motions. You will own and influence systems spanning
    Salesforce CRM, CPQ, Billing, Partner Portal, and their integrations into the
    broader Commerce ecosystem, driving improvements in platform architecture, system
    simplification, and data consistency across complex, distributed workflows.</p>
    <p>You will be responsible for driving technical strategy across a highly customized,
    revenue-critical platform, including planning and executing modernization efforts,
    measuring system reliability and data integrity, and evaluating tradeoffs between
