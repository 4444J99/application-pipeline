    \ As the world enters an era of strategic competition, Anduril is committed to\
    \ bringing cutting-edge autonomy, AI, computer vision, sensor fusion, and networking\
    \ technology to the military in months, not years.</p></div><h3>ABOUT THE TEAM</h3>\
    \ <p>The Imaging team is responsible for tackling the most difficult problems\
    \ involving computer vision, perception, electro-optical, infrared, and sensor\
    \ data. The team develops state-of-the-art imaging systems across both hardware\
    \ and software. Their products are deployed to tackle the most significant security\
    \ challenges of America and its allies.</p> <h3>ABOUT THE JOB</h3> <p>We are seeking\
    \ an ambitious Software Engineer on our Imaging Interfaces team to help solve\
    \ a wide variety of problems involving networking, systems integration, and scalability;\
    \ all while supporting ongoing efforts in the field. Your role will be instrumental\
    \ in expanding the integration of these cameras with the broader Anduril ecosystem,\
    \ as well as ensuring the systems can operate standalone in austere environments.</p>\
    \ <p><strong>WHAT YOU\u2019LL DO</strong></p> <ul> <li>Own software system success\
    \ for assets deployed to customers and events.</li> <li>Maintain an end-to-end\
    \ systems understanding of the Imaging team\u2019s devices, you will be well-positioned\
    \ to optimize how these software services interact.</li> <li>Develop and implement\
    \ modular software usable between devices with similar software stacks, but varying\
    \ functionality.</li> <li>Triage issues, identify root causes, and coordinate\
    \ next-steps.</li> <li>Collaborate across multiple teams to plan, build, and test\
    \ complex functionality.</li> <li>Develop and maintain user support workflows.</li>\
    \ <li>Work on challenging problems in a fast-paced environment.</li> <li>Travel\
    \ expected approximately 15% of the time for testing.</li> </ul> <p><strong>REQUIRED\
