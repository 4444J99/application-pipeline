  description: '<div class="content-intro"><p><span style="font-family: arial, helvetica,
    sans-serif; font-size: 10pt;">At Relativity Space, we’re building rockets to serve
    today’s needs and tomorrow’s breakthroughs. Our&nbsp;Terran R vehicle will deliver
    customer payloads to orbit, meeting the growing demand for launch&nbsp;capacity.
    But that’s just the start. Achieving commercial success with Terran R will unlock
    new&nbsp;opportunities to advance science, exploration, and innovation, pioneering
    progress that reaches beyond&nbsp;the known.</span></p> <p><span style="font-family:
    arial, helvetica, sans-serif; font-size: 10pt;">Joining Relativity means becoming
    part of something where autonomy, ownership, and impact exist at every level.
    Here, you''re not just executing tasks; you''re solving problems that haven’t
    been solved before, helping develop a rocket, a factory, and a business from the
    ground up. Whether you’re in propulsion, manufacturing, software, avionics, or
    a corporate function, you’ll collaborate across teams, shape decisions, and see
    your work come to life in record time. Relativity is a place where creativity
    and </span><span style="font-family: arial, helvetica, sans-serif; font-size:
    10pt;">technical rigor go hand in hand, and your voice will help define the stories
    we’re writing together. Now&nbsp;is a unique moment in time where it’s early enough
    to leave your mark on the product, the process, and&nbsp;the culture, but far
    enough along that Terran R is tangible and picking up momentum. The most&nbsp;meaningful
    work of your career is waiting. Join us.</span></p></div><p><span style="font-family:
    arial, helvetica, sans-serif; font-size: 10pt;"><strong><span data-contrast="auto">About
    the Team:&nbsp;</span></strong><span data-contrast="auto">&nbsp;</span> <span
    data-contrast="auto">&nbsp; &nbsp; &nbsp;</span> </span></p> <p><span style="font-family:
    arial, helvetica, sans-serif; font-size: 10pt;">The Launch team operates at the
    intersection of every major aspect of Terran R, from stages and payloads to ground
    systems, launch, landing, and refurbishment. The Cape is the only place where
    you see it all come together, offering a level of exposure and responsibility
    unmatched elsewhere in the program. This is where first flights happen, where
    history is built on top of history, and where the scale of what''s underway is
    unlike anything in modern aerospace. The mission stays the same, but the work
    evolves with every milestone: from first launch to reuse, high-cadence operations,
    and beyond. If you''re looking to define what''s next in space launch and write
    a new playbook, not just repeat what’s already been done, this is where it happens.</span></p>
