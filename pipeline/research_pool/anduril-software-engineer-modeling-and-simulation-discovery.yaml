    ><div class=\"title\">US Salary Range</div><div class=\"pay-range\"><span>$191,000</span><span\
    \ class=\"divider\">&mdash;</span><span>$253,000 USD</span></div></div></div><div\
    \ class=\"content-conclusion\"><p><span data-contrast=\"auto\">The salary range\
