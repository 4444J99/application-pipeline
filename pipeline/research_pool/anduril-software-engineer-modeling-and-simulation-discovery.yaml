  description: "<div class=\"content-intro\"><p>Anduril Industries is a defense technology\
    \ company with a mission to transform U.S. and allied military capabilities with\
    \ advanced technology. By bringing the expertise, technology, and business model\
    \ of the 21st century\u2019s most innovative companies to the defense industry,\
    \ Anduril is changing how military systems are designed, built and sold. Anduril\u2019\
    s family of systems is powered by Lattice OS, an AI-powered operating system that\
    \ turns thousands of data streams into a realtime, 3D command and control center.\
    \ As the world enters an era of strategic competition, Anduril is committed to\
    \ bringing cutting-edge autonomy, AI, computer vision, sensor fusion, and networking\
    \ technology to the military in months, not years.</p></div><h3><strong>ABOUT\
    \ THE TEAM</strong></h3> <p>The Discovery team at Anduril is at the forefront\
    \ of incubating and maturing high-potential, software-defined, AI-native offerings\
    \ that meet the toughest, newest challenges across hardware, software, space,\
    \ and cyber domains. We're the architects of mission autonomy and mesh networking,\
    \ delivering scalable hardware solutions that meet some of the most urgent national\
    \ security needs. By working hand-in-hand with elite teams in Perception, AI,\
    \ Motion Planning, Hardware, Test Engineering, Space, Networking, and Vehicle\
    \ hardware, we craft cutting-edge, end-to-end systems that redefine mission success.</p>\
    \ <h3><strong>ABOUT THE JOB</strong></h3> <p>As a Software Engineer focused on\
    \ Modeling and Simulation on the Discovery team, you will develop, integrate,\
    \ and maintain high-fidelity virtual representations of both first-party and third-party\
    \ vehicles across various domains, including satellites, missiles, and radars.\
    \ You will be responsible for integrating these models with software-in-the-loop\
    \ and hardware-in-the-loop testing systems, as well as federating simulation systems\
    \ to enable complex simulations involving third-party systems.<br><br>Above all,\
    \ a Modeling and Simulation Software Engineer must embody a \"Whatever It Takes\"\
    \ mindset\u2014executing tasks expediently, scalably, and pragmatically while\
    \ keeping the mission at the forefront. You will make sound engineering decisions\
    \ to deliver successful outcomes on time and with high quality. Beyond building\
    \ our systems, you will also work directly with customers to deploy them.<br><br><strong>WHAT\
    \ YOU\u2019LL DO</strong></p> <ul> <li>Work on challenging problems in a fast-paced\
    \ environment from across our portfolio of programs and products:</li> <li>Simulation\
    \ solutions for Guidance, Navigation and Control algorithm development</li> <li>Software-In-The-Loop\
    \ (SITL) solutions</li> <li>Hardware-In-The-Loop (HITL) solutions</li> <li>Monte-Carlo\
    \ simulation analysis</li> <li>Simulation and Test data analysis tools and processes</li>\
    \ <li>Work with multi-disciplinary subject matter experts to understand and adequately\
    \ model pertinent sub-system, system and system of system dynamics</li> <li>Work\
    \ with internal and external customers to understand simulation requirements and\
    \ develop efficient modeling and simulation solutions</li> <li>Identify problems;\
    \ solve them: implement robust, high-quality solutions</li> </ul> <h4><strong>REQUIRED\
    \ QUALIFICATIONS</strong></h4> <ul> <li>Currently possesses and is able to maintain\
    \ an active U.S. Top Secret security clearance</li> <li>Bachelor\u2019s Degree\
    \ or higher in engineering, computer science, mathematics, physics, chemistry,\
    \ or related technical discipline</li> <li>Experience with aerospace/aeronautical\
    \ systems (including rotorcraft/VTOL/skid-to-turn)</li> <li>Experience in flight\
    \ dynamics/platform physics and control</li> <li>Proficiency with C/C++</li> <li>Advanced\
    \ proficiency with scientific computing systems (Mathworks products (e.g., MATLAB,\
    \ SIMULINK etc.), scientific Python (e.g., numpy, scipy)</li> <li>Flight test\
    \ data processing/sim correlation experience</li> <li>Experience with developing\
    \ sub-system and system level models (Air vehicle, ground vehicles, ground based\
    \ sensors and other types of complex systems)</li> </ul> <h4><strong>PREFERRED\
    \ QUALIFICATIONS</strong></h4> <ul> <li>Advanced proficiency with C/C++ and Python</li>\
    \ <li>Flight test support experience</li> <li>Experience with SITL and HITL simulation\
    \ infrastructure design, development and deployment for complex systems</li> <li>Experience\
    \ with developing emulated/simulation interfaces for on-board avionics</li> </ul>\
