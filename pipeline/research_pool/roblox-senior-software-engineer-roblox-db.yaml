    \ replication protocols, sharding, and query-planner enhancements\u2014that push\
    \ latency, throughput, and availability boundaries.</li> <li><strong>Evolve the\
    \ control plane</strong>&nbsp;to deliver elastic scaling, autonomous healing,\
    \ and zero-downtime schema or tenant moves across global regions.</li> <li><strong>Profile\
    \ and optimize</strong>&nbsp;critical code paths using kernel-level tracing and\
    \ advanced performance tooling; drive systematic tail-latency reductions.</li>\
    \ <li><strong>Establish engineering best practices</strong>&nbsp;by leading design\
    \ reviews, performance benchmarks, failure drills, and post-incident retrospectives.</li>\
    \ <li><strong>Automate everything</strong>: develop frameworks for testing, CI/CD,\
    \ rollout safety, observability, and autoscaling so that the platform operates\
    \ hands-off at scale.</li> <li><strong>Mentor and unblock engineers</strong>,\
    \ fostering deep database craftsmanship and disseminating knowledge across Storage,\
    \ Platform, and product teams.</li> <li><strong>Engage with the open-source community</strong>\u2014\
    upstreaming patches, presenting learnings, and influencing the future of Postgres,\
    \ RocksDB and related ecosystems.</li> </ul> <p><strong>You have:</strong></p>\
    \ <ul> <li><strong>3+ years</strong>&nbsp;of experience in software engineering\
    \ or a relevant field</li> <li>Deep experience with building and operating&nbsp;<strong>large-scale\
    \ distributed databases</strong>&nbsp;or storage engines (e.g., PostgreSQL, MySQL/InnoDB,\
    \ RocksDB, Spanner, Aurora, AlloyDB).</li> <li>Deep expertise in&nbsp;<strong>database\
    \ internals</strong>\u2014B-trees, MVCC, WAL, query optimization, buffer management\u2014\
    and strong skills in&nbsp;<strong>C/C++, GO or Rust</strong>.</li> <li>Hands-on\
    \ experience with&nbsp;<strong>consensus algorithms</strong>&nbsp;(Raft, Paxos)\
    \ and multi-region replication models that deliver strong consistency and high\
    \ availability.</li> <li>Proven success shipping&nbsp;<strong>high-QPS, low-latency\
    \ services</strong>&nbsp;on container orchestration stacks (Kubernetes or Nomad)\
    \ with comprehensive observability.</li> <li>Ability to turn ambiguous product\
    \ requirements into a clear technical roadmap and influence cross-functional stakeholders.</li>\
    \ <li>Passion for&nbsp;<strong>automation, rigorous testing, and data-driven decision-making</strong>&nbsp;that\
    \ raises the reliability and efficiency bar.</li> <li><strong>Bonus:</strong>&nbsp;upstream\
    \ contributions to PostgreSQL, RocksDB or other OSS databases; familiarity with\
    \ disaggregated storage, HTAP workloads, or custom query languages.</li> </ul><div\
