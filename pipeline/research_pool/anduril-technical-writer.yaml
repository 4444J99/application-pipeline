  description: "<div class=\"content-intro\"><p>Anduril Industries is a defense technology\
    \ company with a mission to transform U.S. and allied military capabilities with\
    \ advanced technology. By bringing the expertise, technology, and business model\
    \ of the 21st century\u2019s most innovative companies to the defense industry,\
    \ Anduril is changing how military systems are designed, built and sold. Anduril\u2019\
    s family of systems is powered by Lattice OS, an AI-powered operating system that\
    \ turns thousands of data streams into a realtime, 3D command and control center.\
    \ As the world enters an era of strategic competition, Anduril is committed to\
    \ bringing cutting-edge autonomy, AI, computer vision, sensor fusion, and networking\
    \ technology to the military in months, not years.</p></div><h3>Team Overview</h3>\
    \ <p>Anduril\u2019s Deployments team is a cross-functional group that partners\
    \ with every business line and supports all products that Anduril builds. Our\
    \ responsibilities include product operations, training and adoption, along with\
    \ user documentation and several other functions. We are seeking an experienced\
    \ technical writer to build and maintain user documentation for our Maritime products.\
    \ We believe that the quality of our documentation should reflect the quality\
    \ of our products, which are world-class.<br><br></p> <h3>Role Specifics</h3>\
    \ <p>As a technical writer, your mission is to partner with our Maritime Product\
    \ and Operations teams to deliver accurate, updated, and easy-to-understand documentation\
    \ on how to use Anduril products. You will do whatever it takes to organize our\
    \ engineering and program delivery functions in this mission. In this role, you\
    \ will work closely with Engineering, Operations, and various subject matter experts\
    \ to understand our products, identify user workflows, and use documentation to\
    \ close the gap. As such, the Technical Writer will play a foundational role in\
    \ setting the bar for tone, voice, and quality across our written artifacts.<br><br>With\
    \ Anduril\u2019s focus on defense and national security, user documentation plays\
    \ a critical role in ensuring front-line operators know how to leverage the \u201C\
    Arsenal of Democracy.\u201D Your mission is to make the process of learning how\
    \ to operate systems as easy and seamless as possible, with exceptionally written\
    \ and presented artifacts.<br><br>You will identify relevant stakeholders and\
    \ lead them through a documentation roadmap with established key milestones and\
    \ targets. This will require an in-depth understanding of what teams are relevant\
    \ to documentation, and what an organized effort toward collaboration, entails.\
    \ You are to ensure that stakeholders are engaged at the right time, and you will\
    \ guide them towards a finished user-facing document that plainly meets customer\
    \ needs. Finally, you will work with our account teams to ensure that contract\
    \ deliverables are accurate, on-time, and in the right format.<br><br>Written\
    \ content artifacts under this charter may include things like: technical manuals,\
    \ operational manuals, maintenance manuals, procedures, checklists, templates,\
    \ user guides, troubleshooting guides, and release notes. You will partner with\
    \ account, product, and engineering teams across all phases of product development\
    \ to ensure users have the right documentation available.<br><br></p> <h3>What\
    \ you\u2019ll do</h3> <ul> <li>Generate, review, and edit documentation that is\
    \ user-focused. Work with Engineering and Operations to deliver task, conditions,\
    \ standard-centric documentation</li> <li>Research Anduril products and scope\
    \ Tech Data deliverables for Programs of Record with DOD customers, and write\
    \ Data Modules in S1000d xml, using Rapid Author.</li> <li>Evaluate and prioritize\
    \ tasks required to successfully support product documentation efforts and keep\
    \ them on track. Help drive the best decision for the company by using a data-driven\
    \ approach and consider input from stakeholders to ensure well-informed decisions.\
    \ You should be prepared to fill gaps that represent risks to the documentation\
    \ roadmap</li> <li>Communicate and help manage expectations. Ensure risks are\
    \ noted with adequate time, mitigations are identified, and resources are allocated</li>\
    \ <li>Help build a culture of technical documentation by creating process and\
    \ training for others to contribute content. Refine our product maturity framework\
    \ so that documentation is a meaningful step towards productization of new systems.</li>\
    \ </ul> <p>&nbsp;</p> <h3>Required Qualifications</h3> <ul> <li>5+ years of demonstrated\
    \ excellence generating XML-based technical documentation, preferably in a DOD\
    \ space (preferably Navy)</li> <li>Experience reading and interpreting engineering\
    \ documentation</li> <li>Experience building structured content in XML in a tool\
    \ such as Xmetal</li> <li>Strong communication (written and verbal) and interpersonal\
    \ skills, with emphasis on technical subjects</li> <li>Must thrive with autonomy\
    \ and responsibility, managing competing priorities and tight deadlines. Impeccable\
    \ project-management"
