  description: '<p>At Lyft, our purpose is to serve and connect. We aim to achieve
    this by cultivating a work environment where all team members belong and have
    the opportunity to thrive.</p> <p>Lyft is looking for product-focused server software
    engineers for our Rider Team. We are growing our team with people who want to
    build, improve, and incorporate technologies that enrich the lives of our community.
    As an engineer at Lyft, you''ll collaborate with teams like product, data science,
    analytics, and operations on code that empowers us to iterate quickly while focusing
    on delighting our passengers and drivers.</p> <p>The Rider Golden Path team builds
    the core user-facing app experience for requesting and completing a ride. You’ll
    help bring the next iterations of our home screen, ride mode selector, driver
    matching states and more to life.</p> <h2><strong>Responsibilities:</strong></h2>
    <ul> <li>Write well-crafted, well-tested, readable, maintainable code</li> <li>Participate
    in code reviews to ensure code quality and distribute knowledge&nbsp;</li> <li>Participate
    in our team''s on call rotation. Identify, triage, debug and resolve issues/bugs
    across our various applications and platforms</li> <li>Have the ability to explain
    the various trade offs made in decisions</li> <li>Manage project priorities, deadlines,
    and deliverables.</li> </ul> <h2><strong>Experience:</strong></h2> <ul> <li>BS/MS
    or equivalent in Computer Engineering, Computer Science, or related field or equivalent
    practical experience</li> <li>Experience with Python and/or Go.</li> <li>Proficiency
    in object-oriented programming</li> <li>Experience working with data structures
    or algorithms&nbsp;</li> <li>Ability to work with a low-ego, highly collaborative,
    and cross-functional team</li> <li>Bonus points: experience pursuing side projects
    or open-source projects</li> </ul> <h2><strong>Benefits:</strong></h2> <ul> <li>Extended
    health and dental coverage options, along with life insurance and disability benefits</li>
    <li>Mental health benefits</li> <li>Family building benefits</li> <li>Child care
    and pet benefits</li> <li>Access to a Lyft funded Health Care Savings Account</li>
    <li>RRSP plan with company match to help save for your future</li> <li>In addition
    to provincial observed holidays, salaried team members are covered under Lyft''s
    flexible paid time off policy. The policy allows team members to take off as much
    time as they need (with manager approval). Hourly team members get 15 days paid
    time off, with an additional day for each year of service&nbsp;</li> <li>Lyft
    is proud to support new parents with 18 weeks of paid time off, designed as a
    top-up plan to complement provincial programs. Biological, adoptive, and foster
    parents are all eligible.</li> <li>Subsidized commuter benefits and Lyft ride
    credits</li> </ul> <p>Lyft is committed to creating an inclusive workforce that
    fosters belonging. Lyft believes that every person has a right to equal employment
    opportunities without discrimination because of race, ancestry, place of origin,
    colour, ethnic origin, citizenship, creed, sex, sexual orientation, gender identity,
    gender expression, age, marital status, family status, disability, pardoned record
    of offences, or any other basis protected by applicable law or by Company policy.
    Lyft also strives for a healthy and safe workplace and strictly prohibits harassment
    of any kind.&nbsp; Accommodation for persons with disabilities will be provided
    upon request in accordance with applicable law during the application and hiring
    process. Please contact your recruiter if you wish to make such a request.</p>
    <p>Lyft highly values having employees working in-office to foster a collaborative
    work environment and company culture. This role will be in-office on a hybrid
    schedule — Team Members will be expected to work in the office at least 3 days
    per week, including on Mondays, Wednesdays, and Thursdays. Lyft considers working
    in the office at least 3 days per week to be an essential function of this hybrid
    role. Your recruiter can share more information about the various in-office perks
    Lyft offers. Additionally, hybrid roles have the flexibility to work from anywhere
    for up to 4 weeks per year. #Hybrid</p> <p>The expected base pay range for this
    position in the Toronto area is CAD $88,000 - CAD $110,000, not inclusive of potential
    equity offering, bonus or benefits. Salary ranges are dependent on a variety of
    factors, including qualifications, experience and geographic location. Your recruiter
    can share more information about the salary range specific to your working location
    and other factors during the hiring process.</p> <p>Lyft may use artificial intelligence
    to screen applicants, however, Lyft employees make the ultimate selection and
    hiring decisions.</p> <p>This job fills an existing vacancy.</p>'
