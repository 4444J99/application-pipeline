    \ of unique titles on Discord each month. Discord plays a uniquely important role\
    \ in the future of gaming. We are focused on making it easier and more fun for\
    \ people to talk and hang out before, during, and after playing games.</p></div><p>Discord\
    \ is about giving people the power to create space to find belonging in their\
    \ lives. Trusted by millions of people to keep their communications secure, private,\
    \ and out of the hands of evildoers, security and privacy are necessary to Discord's\
    \ success.</p> <p>We're looking for a Senior Detection and Response Engineer to\
    \ join our Detection &amp; Response Team (DART). We're an engineering-focused\
    \ team that build scalable detection systems, automate response workflows, and\
    \ develop tooling that lets us stay ahead of threats rather than just react to\
    \ them. If you're an engineer who's passionate about security and loves turning\
    \ investigative insights into durable, automated solutions, read on!</p> <p><strong>What\
    \ you\u2019ll do:</strong></p> <ul> <li><strong>Build detection systems at scale.</strong>\
    \ Design and implement detections across cloud infrastructure, applications, and\
    \ enterprise systems using large-scale log analysis and behavioral signals.</li>\
    \ <li><strong>Engineer response automation.</strong> Develop tooling and workflows\
    \ that reduce mean time to detection and response - turning manual playbooks into\
    \ code.</li> <li><strong>Lead incident response.</strong> Serve as a subject matter\
    \ expert during security incidents, driving investigations from initial triage\
    \ through root cause analysis and remediation.</li> <li><strong>Architect observability.</strong>\
    \ Partner with internal teams to identify new telemetry sources, improve log coverage,\
    \ and ensure we have visibility where it matters.</li> <li><strong>Hunt proactively.</strong>\
    \ Use threat intelligence and behavioral analysis to find malicious activity before\
    \ alerts fire - then turn those hunts into production detections.</li> <li><strong>Ship\
    \ production code.</strong> Contribute to a fast-moving codebase, deploying detection\
    \ logic and automation tooling to production environments.</li> <li><strong>Mentor\
    \ and elevate.</strong> Partner with our embedded response team - coaching on\
    \ investigative techniques, detection engineering principles, and incident handling.\
    \ Help build a culture of continuous learning and technical excellence.</li> </ul>\
    \ <p><strong>What you have:</strong></p> <ul> <li>3+ years in Detection and Response\
    \ as a senior IC, with demonstrated experience building (not just operating) security\
    \ tooling</li> <li>3+ years programming in Python or similar - you\u2019ll write\
    \ production code, not just scripts</li> <li>Strong experience with cloud security\
    \ monitoring and investigations</li> <li>Experience in building detections from\
    \ large datasets and automating incident response processes</li> <li>Deep knowledge\
    \ of attacker TTPs, malware analysis, and threat hunting methodologies</li> <li>Experience\
    \ with container orchestration (Kubernetes) and/or serverless technologies (Cloud\
    \ Functions, Workers)</li> <li>Familiarity with distributed systems observability\
    \ and log analysis at scale</li> </ul> <p><strong>Bonus Points:</strong></p> <ul>\
    \ <li>Hands-on experience with Panther SIEM</li> <li>Background in BeyondCorp\
    \ / Zero-trust environments</li> <li>Experience with Cloudflare security tooling</li>\
    \ <li>Contributions to open-source security projects</li> </ul> <p>&nbsp;</p>\
