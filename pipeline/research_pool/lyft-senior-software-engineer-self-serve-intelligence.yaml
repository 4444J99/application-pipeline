    experiences without agent involvement through intelligent solutions in AI Assist
    (e.g. AI Agents), automations, and self-serve workflows. We''re building backend
    systems, APIs, and AI-powered products that fundamentally rethink how customers
    get help — combining robust engineering with GenAI to deliver reliable, scalable
    self-serve experiences.</p> <p>As a Senior Software Engineer on the Self-Serve
