  description: "<p>When the Space Shuttle approached the International Space Station,\
    \ two vehicles built by different teams, in different countries, with fundamentally\
    \ different engineering philosophies and systems, had to connect perfectly. The\
    \ Rendezvous, Proximity Operations, and Docking (RPOD) subsystems were engineered\
    \ to handle complex mismatches such as different power systems, communication\
    \ protocols, and technical architectures. Get it wrong, and you have an expensive\
    \ and potentially catastrophic problem in low Earth orbit.</p> <p>Mercury announced\
    \ on December 19, 2025 that we submitted an application to the OCC for a national\
    \ bank charter and applied for FDIC deposit insurance. In other words, Mercury\
    \ is building a bank. As part of this work, we will be connecting our modern,\
    \ product-focused engineering systems to enterprise core banking systems and payment\
    \ networks built in a different era, with different assumptions and different\
    \ interfaces. Mercury\u2019s Banking Integration Platform as a Service team is\
    \ like NASA\u2019s RPOD team, building our integration subsystems that are technically\
    \ correct and operationally trustworthy.</p> <p>This is some of the most consequential\
    \ infrastructure work at Mercury. Every account opening, every monetary transaction,\
    \ and every balance call will flow through the systems you build. Product teams\
    \ across the company will depend on clean abstractions that hide the complexity\
    \ underneath. You'll be one of the few engineers at Mercury who truly understands\
    \ the full depth of our Bank Core* and all its internal and external integrations.</p>\
    \ <p>In this role, you will:</p> <ul> <li>Build Mercury\u2019s integration with\
    \ <a href=\"https://www.ffiec.gov/about/mission\">an FFIEC-approved</a> bank core\
    \ and the connections to payment networks.</li> <li>Design internal APIs that\
    \ give product teams simple, consistent interfaces to complex external systems.</li>\
    \ <li>Handle the messy realities of enterprise integrations such as retries, failures,\
    \ format mismatches, and downtime.</li> <li>Build data pipelines that keep Mercury's\
    \ systems in sync with our bank core.</li> <li>Own monitoring, alerting, and recovery\
    \ for our most critical external connections.</li> <li>Partner with many other\
    \ teams at Mercury to define clean boundaries and reliable contracts.</li> <li>Help\
    \ shape the technical architecture of Mercury Bank*.</li> </ul> <p>You should:</p>\
    \ <ul> <li>Have direct experience with either a bank core that has achieved <a\
    \ href=\"https://www.ffiec.gov/about/mission\">FFIEC-compliance</a> (such as FIS)\
    \ or that of a US-based <a href=\"https://www.fsb.org/2025/11/2025-list-of-global-systemically-important-banks-g-sibs/\"\
    >Global Systemically Important Bank (G-SIB)</a> .</li> <li>Understand how core\
    \ banking systems work: accounts, transactions, ledgers, and the data models underneath.</li>\
    \ <li>Be a product-minded engineer who thinks about the developers consuming your\
    \ APIs, not just the systems you\u2019re connecting to.</li> <li>Thrive in environments\
    \ where you're building something new rather than maintaining something established.</li>\
    \ <li>Be comfortable with our tech stack (Haskell and TypeScript) or ready to\
    \ learn.</li> <li>Have strong opinions about building reliable, maintainable systems.</li>\
    \ </ul> <p>We encourage you to try our<a href=\"https://demo.mercury.com/dashboard\"\
    > demo site</a> if you\u2019re interested in applying for the role.</p> <p>The\
    \ total rewards package at Mercury includes base salary, equity, and benefits.&nbsp;</p>\
    \ <p>Our salary and equity ranges are highly competitive within the SaaS and fintech\
    \ industry and are updated regularly using the most reliable compensation survey\
    \ data for our industry. New hire offers are made based on a candidate\u2019s\
    \ experience, expertise, geographic location, and internal pay equity relative\
    \ to peers.</p> <p>Our target new hire base salary ranges for this role are the\
    \ following:</p> <ul> <li>US employees (any location): $166,600 - $250,900</li>\
    \ <li>Canadian employees (any location): CAD 157,400 - 237,100</li> </ul> <p><em>*\
    \ Unless we are granted regulatory approval otherwise, we are still not a bank,\
    \ so our standard disclaimer still applies: Mercury is a fintech company, not\
    \ an FDIC-insured bank. Banking services provided through Choice Financial Group\
    \ and Column N.A., Members FDIC.</em></p> <p>Mercury values diversity &amp; belonging\
    \ and is proud to be an Equal Employment Opportunity employer. All individuals\
