  description: About Beam Every housing and infrastructure project in America is slowed
    down by stacks of paperwork, manual administrative tasks, and poor financial tracking.
    Beam builds the software and financial tools to automate these tedious parts of
    construction—helping America’s builders focus on what they do best. Beam’s product
    helps construction businesses incorporate fintech and AI into their workflows,
    from project estimating to bill payments to expense management—driving massive
    efficiency gains, ultimately enabling more projects to get off the ground. Beam
    is backed by Accel , Zigg , Susa , and other top venture investors. Our team is
    in-person in a beautiful office in the Financial District of San Francisco. Our
    team previously worked at Stripe, Pipe, Traba, Fieldwire, and more. What you’ll
    do Build Beam’s product & infrastructure. The goal of each member of Beam’s engineering
    team is “maximizing the team’s delivered quality product”. As a member of this
    team, you’ll build products end-to-end, develop patterns that help the team build
    faster, and contribute to making the team as a whole run more smoothly. We want
    teammates who are obsessed with solving our customers’ problems, and who want
    to accomplish this by scaling up the team’s output instead of scaling up hiring.
    You will Design and build APIs and frontend for new products & features Iterate
    on patterns & tooling to improve productivity Work directly with customers Work
    closely with product and design to deliver exceptional user experiences Make improvements
    to our engineering and product development processes Help ensure our products
    are secure, reliable, and performant You might be a fit if You have 2+ years of
    work experience building high-quality code/products in fast-paced environments
    You’re excited to learn new things and make improvements to our systems You enjoy
    thinking from first principles and delivering the best results You’re excited
    to take on complex, open-ended problems You’re excited about improving construction
    and development
