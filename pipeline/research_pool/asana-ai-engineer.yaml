  description: <p>We're looking for a <strong>AI Engineer. </strong>The Enterprise
    AI team is a new, agile group of builders dedicated to empowering Asana’s internal
    functions through the design and implementation of scalable AI workflows. We partner
    cross-functionally with business and engineering teams, maintaining tight feedback
    loops with our users to ensure our solutions directly enhance critical GTM processes.
    By automating high-value business logic, we serve as a critical pillar in driving
    Asana’s broader goal of building the Agentic Enterprise Foundations.</p> <p>This
    role is based in our Warsaw office with an office-centric hybrid schedule. The
    standard in-office days are Monday, Tuesday, and Thursday. Most Asanas have the
    option to work from home on Wednesdays. Working from home on Fridays depends on
    the type of work you do, and your recruiter can share more about the in-office
    requirements.</p> <p><strong>We offer a Contract of Employment (UoP) for our employees
    in Poland.</strong></p> <p>&nbsp;</p> <p><strong>What you’ll achieve</strong></p>
    <ul> <li>Own the AI integration layer, architecting the connective tissue between
    foundational LLMs and our core GTM stack (e.g., Salesforce, Databricks) to automate
    high-value business logic.</li> <li>Design prompting strategies, orchestration
    logic, and tool integrations that enable AI systems to retrieve data, reason over
    context, and take action across internal systems.</li> <li>Build AI data infrastructure,
    including retrieval pipelines and RAG systems, to ensure AI outputs are grounded
    in accurate product documentation and customer insights.</li> <li>Design and deploy
    intuitive AI interfaces - ranging from Slack apps to Chrome extensions - to bring
    AI directly into existing user workflows.</li> <li>Lead the transition from POC
    to production, rapidly prototyping AI pilots while ensuring underlying architectures
    are optimized for performance, security, and scale.</li> <li>Partner with GTM
    and RevOps stakeholders to identify process friction and translate business requirements
    into technical AI solutions that drive revenue.<br><br></li> </ul> <p><strong>About
    you</strong></p> <ul> <li class="p1"><strong>5+ years</strong> of experience designing,
    building, and deploying AI-driven or intelligent systems in enterprise environments.</li>
    <li class="p1"><strong>At least 1+ year of hands-on experience</strong> working
    with Generative AI technologies such as Large Language Models (LLMs), Retrieval-Augmented
    Generation (RAG), and prompt engineering.<span class="Apple-converted-space">&nbsp;</span></li>
    <li>Strong proficiency in Python and SQL, with the ability to confidently process
    data, build integrations, and extend automation platforms.</li> <li>Proven experience
    building AI-powered applications, agents, or LLM-powered automations that deliver
    measurable business value beyond basic chatbots.</li> <li>Hands-on expertise with
    agent frameworks (e.g., LangChain, LlamaIndex) and designing multi-step reasoning
    workflows.</li> <li>Experience building reliable, business-critical workflows
    using automation and iPaaS platforms like n8n, Workato, or Zapier.</li> <li>A
    business-first mindset with an understanding of GTM motions and the ability to
    identify where AI creates the most strategic leverage.</li> <li>Strong communicator
    capable of explaining complex automation logic and AI behavior to non-technical
    stakeholders across Sales and Marketing.</li> <li>Demonstrates curiosity about
    AI tools and emerging technologies, with a willingness to learn and leverage them
    to enhance productivity, collaboration, or decision-making.<br><br></li> </ul>
    <p>At Asana, we're committed to building teams that include a variety of backgrounds,
    perspectives, and skills, as this is critical to helping us achieve our mission.
    If you're interested in this role and don't meet every listed requirement, we
    still encourage you to apply.</p> <p>&nbsp;</p> <p><strong>What we’ll offer</strong></p>
    <ul> <li>Generous, transparent and fair compensation system (base salary and RSUs)</li>
    <li>Contract of Employment (and the option of 50% tax deductible costs for author’s
    rights usage in respect of applicable roles )&nbsp;</li> <li>Health insurance
    with dental and travel coverage (Lux Med)&nbsp;</li> <li>Breakfast and lunch catering
    on the days that you work from the office</li> <li>Vacation allowance</li> <li>Career
    growth budget&nbsp;</li> <li>Home office setup budget&nbsp;</li> <li>Gym/Fitness
    card</li> <li>Fertility healthcare and family-forming support with <a href="https://www.get-carrot.com/">Carrot</a></li>
    <li>Mental Health Support in Modern Health</li> <li>Group life insurance</li>
    <li>MacBooks with all necessary accessories</li> </ul> <p>For this role, the estimated
    base salary range is between 26,417 - 29,583 zł PLN gross per month (subject to
    all taxes and necessary deductions). The actual base salary will vary based on
    various factors, including market and individual qualifications objectively assessed
