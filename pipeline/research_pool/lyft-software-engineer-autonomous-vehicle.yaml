    \ <h2 class=\"p3\"><strong>Experience:</strong></h2> <ul class=\"ul1\"> <li>+3\
    \ years of Backend Software Engineering industry experience</li> <li>Experience\
    \ with object-oriented programming</li> <li>Experience in distributed systems</li>\
    \ <li>Experience working with databases, relational or NoSQL</li> <li>Write clear,\
    \ scalable and clear design documentation</li> <li>Design, build and improve a\
    \ set of team owned components</li> </ul> <p>This role needs onsite availability\
    \ in Mexico City once per week.</p> <p>Please submit your resume in English.<br><br></p>"
