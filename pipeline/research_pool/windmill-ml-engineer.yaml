  description: 'Windmill is building the future of performance. Windmill is the first
    performance review system people actually like. It uses AI to remember every 1:1,
    project milestone, and piece of feedback automatically so reviews take minutes,
    not days. Managers feel prepared, employees feel seen, and HR teams finally have
    a process everyone appreciates. On average, reviews take 6 hours less per person,
    and 93% of employees report being satisfied with the process. Learn more: gowindmill.com
    We''re looking for candidates with experience in: Model Development & Deployment
    : Design, build, and deploy scalable machine learning models to enhance product
    features, optimize performance, and drive intelligent automation. Algorithm Optimization
    : Fine-tune and optimize machine learning algorithms to improve accuracy, efficiency,
    and real-time performance within the product environment. Cross-Functional Collaboration
    : Work closely with data scientists, software engineers, and founders to integrate
    machine learning solutions that solve complex product challenges for our users
    Scalable Infrastructure : Develop and maintain robust machine learning pipelines
    and data infrastructure, ensuring the models can efficiently handle large-scale
    data processing and deployment needs. Continuous Learning & Innovation : Stay
    up-to-date with the latest research in machine learning, artificial intelligence,
    and data science to identify opportunities for applying cutting-edge techniques
    that drive product innovation. Note: We''re a New York based company, and want
    our team working together in the office. If you''re not interested in considering
    relocation to New York, this may not be the right opportunity.'
