    feature teams and volunteer contributor needs;</li> <li>Coaching and mentoring
    teammates to support continuous growth and confidence in both technical and interpersonal
    skills.</li> </ul> <p><strong>Qualities we are looking for:</strong></p> <ul>
    <li><strong>Clear communicator:</strong> You explain complex ideas simply and
    foster shared understanding across engineering, product, and non-technical audiences;</li>
    <li><strong>Outcome-oriented:</strong> You prioritize work that delivers value
    to users and aligns with organizational goals. You balance ideal solutions with
    the constraints of scale, legacy, and user expectations;</li> <li><strong>Accountable:</strong>
    You own your work end-to-end and help establish a culture of responsibility and
    follow-through;</li> <li><strong>Candid and respectful:</strong> You offer feedback
    directly, constructively, and with care - and invite the same in return. You support
    growth by challenging ideas, not people;</li> <li><strong>Collaborative leadership:
    </strong>You inspire trust and progress through support, example, and thoughtful
    contributions.</li> </ul> <p><strong>Requirements:</strong></p> <ul> <li>Commitment
    to the Foundation''s <a href="https://wikimediafoundation.org/about/mission/#:~:text=The_mission_of_the_Wikimedia,disseminate_it_effectively_and_globally.">Mission</a>
    and <a href="https://wikimediafoundation.org/about/values/">Values</a>;</li> <li>Extensive
    experience in backend software engineering;</li> <li>Familiarity with platform
    or infrastructure products that serve internal or external engineering teams;</li>
    <li>Experience with databases and event streams, including schema design, query
    optimization, and efficient data access patterns;</li> <li>Deep understanding
    of software architecture, testing methodologies, and system design;</li> <li>Strong
    experience in observability practices: setting up metrics, logging, monitoring,
    and alerting;</li> <li>Familiarity with incident response, root cause analysis,
    and follow-up processes;</li> <li>Experience working with CI/CD pipelines and
    automated test infrastructure.</li> </ul> <p><strong>Additionally, we’d love it
    if you have:</strong></p> <ul> <li>Experience developing frameworks (designing
