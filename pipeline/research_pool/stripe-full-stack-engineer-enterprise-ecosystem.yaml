  description: "<h2>Who we are</h2> <h3>About Stripe</h3> <p><span style=\"font-weight:\
    \ 400;\">Stripe is a financial infrastructure platform for businesses. Millions\
    \ of companies\u2014from the world\u2019s largest enterprises to the most ambitious\
    \ startups\u2014use Stripe to accept payments, grow their revenue, and accelerate\
    \ new business opportunities. Our mission is to increase the GDP of the internet,\
    \ and we have a staggering amount of work ahead. That means you have an unprecedented\
    \ opportunity to put the global economy within everyone\u2019s reach while doing\
    \ the most important work of your career.</span></p> <h3>About the team</h3> <p>Stripe's\
    \ Enterprise and Ecosystem team is focused on enhancing migration, activation,\
    \ and cross-product experiences for enterprises. This position is based in Toronto,\
    \ Canada, and will be integral to a growing team, collaborating closely with product\
    \ and customer-facing teams.</p> <p>Team Matching: exact team matching for one\
    \ of the subteams will begin during final stages. Please note we may also consider\
    \ you for different orgs based on your experience, location, etc. More information\
    \ on our team matching process can be found <a href=\"https://docs.google.com/document/d/1zvJkO2c7GzukHG-_oqc5wbOLajpuh5FjbmZPcZPU1o0/edit?tab=t.0#heading=h.ahb3b6nrktv1\"\
    >here</a>.&nbsp;</p> <h2>What you\u2019ll do</h2> <p>As a Full-Stack Engineer\
    \ on the Enterprise and Ecosystem team, you will be a key contributor in building\
    \ and scaling the next generation of Stripe's connectivity with global commerce\
    \ systems. This role is crucial to building and managing integrations with leading\
    \ Ecommerce, CRM, and ERP systems to help our users activate faster and realize\
    \ greater value from Stripe. You will focus on developing the infrastructure that\
    \ powers unified connectors for various partners, ensuring seamless and rapid\
    \ integration of Stripe's products.</p> <h3>Responsibilities</h3> <ul> <li>Developing\
    \ and maintaining a set of connectors and integrations for partners like Shopify,\
    \ and Salesforce.</li> <li>Build out Stripe services and infrastructure to facilitate\
    \ transactional flows and data migration.</li> <li>Launching specific, high-impact\
    \ projects in the first six months, such as a new payments-agnostic billing connector.</li>\
    \ <li>Acting as a self-starter and driving technical ownership for projects, given\
    \ the nature of the role requires a highly self-sufficient contributor.</li> <li>Collaborating\
    \ with other engineering teams, particularly those focused on underlying infrastructure,\
    \ to ensure cohesion and scale.</li> </ul> <h2><strong>Who you are</strong></h2>\
    \ <p>We\u2019re looking for someone who meets the minimum requirements to be considered\
    \ for the role. If you meet these requirements, you are encouraged to apply. The\
    \ preferred qualifications are a bonus, not a requirement.</p> <h3>Minimum requirements</h3>\
    \ <ul> <li>4-12+ years of industry software engineering experience (does not include\
    \ internships nor includes co-ops)</li> <li>Strong full-stack capabilities; comfortable\
    \ writing code on core Stripe systems while also understanding external partner\
    \ systems.</li> <li>Proficient in a modern web stack and have shipped production\
    \ level code.</li> <li>Foundational understanding and ability to read the code/interfaces\
    \ of partner systems (e.g., Salesforce, Oracle, Netsuite) to facilitate complex\
    \ integrations.</li> <li>Adaptable, intuitive, and capable of quickly solving\
    \ complex, multi-system problems.</li> <li>Self-motivating and thrive in an environment\
    \ where you are expected to take full ownership of your projects and deliverables.</li>\
    \ </ul> <h3><strong>Preferred qualifications</strong></h3> <ul> <li>Prior experience\
    \ building connectors, or deep integrations with major Ecommerce, CRM, or ERP\
    \ platforms.</li> <li>Experience with payments or subscriptions systems.</li>\
    \ <li>A background that demonstrates an ability to rapidly learn new systems and\
    \ navigate unfamiliar technical domains effectively.</li> </ul> <p>If you are\
    \ passionate about building cutting-edge solutions that empower businesses worldwide,\
    \ we would love to hear from you! Please submit your application detailing your\
    \ experience and why you believe you would be a great fit for the team.</p>"
