    \ Thursday. As a perk, we also have up to four weeks per year of fully remote\
    \ work.</p> <p><strong>Responsibilities:</strong></p> <ul> <li>Collaborate with\
    \ engineers across the company to build new features and products end-to-end.</li>\
    \ <li>Work alongside user-facing teams like Sales and Support to deeply understand\
    \ our customers' needs.</li> <li>Design and implement solutions to improve our\
