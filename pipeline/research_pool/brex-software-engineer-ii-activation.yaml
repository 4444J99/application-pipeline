    \ minds in the industry. We\u2019re committed to building a diverse team and inclusive\
    \ culture and believe your potential should only be limited by how big you can\
    \ dream. We make this a reality by empowering you with the tools, resources, and\
    \ support you need to grow your career.</span></p></div><p><strong>Engineering\
    \ at Brex</strong></p> <p>Engineering at Brex is about building systems that scale\
    \ with speed and intention. Our teams span Software, Data, Security, and IT, and\
    \ operate with high autonomy and deep collaboration. We tackle hard technical\
    \ problems, own our outcomes, and push for excellence at every level \u2014 from\
    \ architecture to deployment. It\u2019s an environment where engineering is a\
    \ craft, and builders become leaders.</p> <p><strong>What you\u2019ll do</strong></p>\
    \ <p>As a Software Engineer on our Activation team, you will work across the entire\
    \ Brex stack to build solutions that will quickly and efficiently get credit and\
    \ risk-worthy customers through the onboarding and activation funnel while decreasing\
    \ time-to-ramp for new customers.</p> <p><strong>Where you\u2019ll work</strong></p>\
    \ <p>This role will be based in our S\xE3o Paulo office. We are a hybrid environment\
    \ that combines the energy and connections of being in the office with the benefits\
