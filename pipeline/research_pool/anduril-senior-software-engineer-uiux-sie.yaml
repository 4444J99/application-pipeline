    \ like cluster provisioning, application deployment, and environment management\
    \ that serve both technical and non-technical users</li> <li>Collaborate closely\
    \ with SREs, platform engineers, and external customers to understand pain points\
    \ and rapidly iterate on features</li> <li>Champion UX best practices and advocate\
    \ for the end-user experience in technical discussions</li> <li>Build and maintain\
    \ design systems and reusable component libraries to ensure consistency across\
    \ the platform</li> <li>Implement observability and monitoring into the UI layer\
    \ to track user behavior and system health</li> <li>Lead the technical direction\
    \ for front-end architecture, tooling, and development practices on the team</li>\
    \ </ul> <h4>CUSTOMER &amp; STAKEHOLDER ENGAGEMENT</h4> <ul> <li>Collaborate with\
    \ business lines to scope UI/engineering deliverables</li> <li>Support customer\
    \ meetings and demonstrations, explaining technical capabilities and constraints</li>\
    \ <li>Work with military stakeholders to ensure UI implementations support successful\
    \ mission outcomes from prototyping through production phases</li> </ul> <h4>REQUIRED\
    \ QUALIFICATIONS</h4> <ul> <li>Bachelor's degree in Computer Science, Design,\
    \ or related field; or equivalent industry experience</li> <li>5+ years of professional\
    \ software development experience with a strong focus on UI/UX development</li>\
    \ <li>Expert-level proficiency in modern JavaScript/TypeScript and React for building\
    \ production web applications</li> <li>Experience building full-stack applications,\
    \ including back-end API development in languages such as Go, Python, or similar</li>\
    \ <li>Strong understanding of UX principles, design systems, and creating intuitive\
    \ user experiences for technical products</li> <li>Experience with data visualization\
