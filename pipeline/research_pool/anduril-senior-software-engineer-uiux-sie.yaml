    \ infrastructure health, deployments, and operations</li> <li>Develop robust back-end\
    \ services and APIs (Go) to support the UI layer, integrating with Kubernetes,\
    \ CI/CD systems, and cloud providers</li> <li>Create compelling data visualizations\
    \ and interactive dashboards that surface metrics, logs, and deployment status\
