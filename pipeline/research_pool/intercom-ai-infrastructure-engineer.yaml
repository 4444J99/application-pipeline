    <p>Our AI agent Fin, the most advanced customer service AI agent on the market,
    lets businesses deliver always-on, impeccable customer service and ultimately
    transform their customer experiences for the better. Fin can also be combined
    with our Helpdesk to become a complete solution called the Intercom Customer Service
    Suite, which provides AI enhanced support for the more complex or high touch queries
    that require a human agent.&nbsp;</p> <p>Founded in 2011 and trusted by nearly
    30,000 global businesses, Intercom is setting the new standard for customer service.
    Driven by our core values, we push boundaries, build with speed and intensity,
    and consistently deliver incredible value to our customers.</p></div><h2><strong>What''s
    the opportunity?</strong></h2> <p>We’re looking for Senior+ AI Infrastructure
    Engineers to build the systems that train and serve Intercom’s next generation
    of AI products.</p> <p>Intercom is an AI company that builds from the GPU all
    the way up to a user agent that resolves millions of customer service queries
    a month.&nbsp;</p> <p>You’ll join a small, highly technical team working at the
    cutting edge of modern AI infrastructure. The AI Infra team built the training
    pipelines and runs the inference for custom models like Fin Apex, which outperforms
    frontier models in customer service tasks, and is the foundation of the AI Group''s
    full stack approach to AI.</p> <p><strong>We’re particularly interested in engineers
    who have:</strong></p> <ul> <li>A track record of working on <strong>model training</strong>
    or <strong>model inference at scale</strong>, or on <strong>low‑level GPU coding</strong>
    (e.g. CUDA, Triton). Experience with one is great, multiple is even better.</li>
    </ul> <h2><strong>What will I be doing?</strong></h2> <p>As a Senior AI Infrastructure
    Engineer focused on model training and inference, you will:</p> <ul> <li>Implement
    and scale <strong>training pipelines</strong> for large transformer and LLM models,
    from data ingestion and preprocessing through distributed training and evaluation.</li>
    <li>Build and optimize <strong>inference services</strong> that deliver low‑latency,
    high‑reliability experiences for our customers, including autoscaling, routing,
    and fallbacks.</li> <li>Work on <strong>GPU‑level performance</strong>: tuning
    kernels, improving utilization, and identifying bottlenecks across our training
    and inference stack.</li> <li>Collaborate closely with ML scientists to implement
    cutting edge training and inference methods and bring them to production.</li>
    <li>Play an active role in <strong>hiring, mentoring, and developing</strong>
    other engineers on the team.</li> <li>Raise the bar for <strong>technical standards,
    reliability, and operational excellence</strong> across Intercom’s AI platform.</li>
    </ul> <h2><strong>Profile we’re looking for:</strong></h2> <p>These are indicative,
    not hard requirements</p> <p>We’re looking to hire <strong>Senior+ AI Infrastructure
    Engineers</strong>. You’re likely a great fit if:</p> <ul> <li>You have <strong>5+
    years of experience in software engineering</strong>, with a strong track record
    of shipping high‑quality products or platforms.</li> <li>You hold a <strong>degree
    in Computer Science, Computer Engineering, or a related field</strong> (or you
    have equivalent experience with very strong fundamentals).</li> <li>You have hands‑on
    experience with <strong>one or more</strong> of the following:</li> <ul> <li><strong>Model
    training</strong> (especially transformers and LLMs).</li> <li><strong>Model inference</strong>
    at scale (again, especially transformers and LLMs).</li> <li><strong>Low‑level
    GPU work</strong>, such as writing <strong>CUDA</strong> or <strong>Triton</strong>
    kernels.</li> </ul> <li>Comfortable working in production environments at <strong>meaningful
    scale</strong> (traffic, data, or organizational).</li> <li>You communicate clearly,
    can explain complex technical topics to different audiences, and enjoy close collaboration
    with both engineers and non‑engineers.</li> <li>You take pride in strong <strong>technical
    fundamentals</strong>, love learning, and are willing to invest in your own development.</li>
    <li>Have deep knowledge of at least one programming language (for example Python,
    Ruby, Java, Go, etc.). Specific language experience is less important than your
    ability to write clean, reliable code and learn new stacks quickly.</li> </ul>
