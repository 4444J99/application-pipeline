    semantic model-aware prompting for SQL, and verification/repair Design evals and
    hillclimb : create golden sets, create rubrics and metrics, analyze errors, run
    experiments to hill climb on the metrics. Partner with product and infra : translate
    customer problems into products and experiments. Collaborate with infrastructure
    teams to productionize improvements. Lead a team of engineers towards building
    great products Requirements: Bachelor’s degree in Computer Science, Engineering,
    Statistics or a related field. Master’s or higher degree preferred but not a requirement.
    5+ years of experience shipping AI features in production. Proficiency in programming
    languages such as Python, Go Strong communication skills and ability to collaborate
    effectively in a team environment. (Optional) Experience working with text2sql,
    data modeling, data analysis, retrieval systems, and semantic layers is a plus.
    About Snowflake Snowflake is the AI Data Cloud trusted by the world''s most innovative
    companies. We''re shipping production-ready AI applications at scale and want
    you to join us in building the future of how businesses interact with their data
