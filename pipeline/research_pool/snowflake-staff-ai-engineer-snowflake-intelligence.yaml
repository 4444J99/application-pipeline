    — and careers — to the next level. About the Role The Cortex Apps team is building
    the future of AI for enterprise data. See our flagship product in action: Talk
    To Your Data: Snowflake Intelligence Demo . Your work will directly impact how
    businesses understand and leverage their data. You''ll own the full AI engineering
    lifecycle: design, prompt/tool engineering, evals, deployment, measurement, and
    optimization. You''ll work with a small, high-powered modeling and infrastructure
    team. What you will do in this role: Own features end-to-end for Snowflake Cortex
    products. Build agentic workflows, NL-to-SQL on semantic layers, search. Build
