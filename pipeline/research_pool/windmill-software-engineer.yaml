  description: 'Windmill is building the future of performance. Windmill is the first
    performance review system people actually like. It uses AI to remember every 1:1,
    project milestone, and piece of feedback automatically so reviews take minutes,
    not days. Managers feel prepared, employees feel seen, and HR teams finally have
    a process everyone appreciates. On average, reviews take 6 hours less per person,
    and 93% of employees report being satisfied with the process. Learn more: gowindmill.com
    We are NYC based and work together in person. If you are not open to relocating
    to New York, this is not the right opportunity. We are looking for candidates
    who are: Self starters, who are curious to learn new things Individuals with a
    strong interest in AI, and hands on experience with the latest technologies Experienced
    in software engineering and a deeper level understanding of computing and theory.
    Knowledgable in Node.JS, Typescript and Postgres Experienced in building and launching
    a side project The right candidates have: 3-8 years of professional engineering
    experience Strong communication skills and an ability to simplify complex problems
    A bias to action Strong interest and curiosity around our product A desire to
    drive an outsized impact at a fast paced and growing company About Windmill: Founded
    in 2023 by Brian Distelburger (Co-Founder of Yext), Max Shaw (SVP of Product at
    Yext) and Mark Tanner (VP Strategy at Saturn), Windmill is building the AI Management
    system of the future. Windmill is at the cutting edge of AI and how it will change
    the future of company building.'
