    \ and manage APIs using API Manager and Anypoint Exchange</li> <li>Collaborate\
    \ with architects and engineering teams to define integration patterns and standards</li>\
    \ <li>Support CI/CD pipelines and automated deployments for MuleSoft applications</li>\
    \ <li>Troubleshoot production issues and provide ongoing support for integration\
