    \ and DevOps practices</li> <li>Familiarity with cloud platforms such as AWS,\
    \ Azure, or GCP</li> <li>Strong debugging, performance tuning, and troubleshooting\
    \ skills</li> <li>Excellent collaboration and communication skills in cross-functional\
    \ environments</li> </ul> <p><strong>Preferred Qualifications</strong></p> <ul>\
    \ <li>Experience designing enterprise integration architectures</li> <li>Experience\
    \ with event-driven architecture, messaging systems, or streaming platforms</li>\
    \ <li>Experience working in Agile or Scrum development environments<em><br></em></li>\
    \ </ul> <p><em>Candidates must reside in or be willing to relocate to the San\
    \ Francisco Bay Area (Alameda, Contra Costa, Marin, Napa, San Francisco, San Mateo,\
    \ Santa Clara, Solano, and Sonoma counties). Relocation assistance may be available.&nbsp;</em></p>\
    \ <p><em>The US base salary range for this full-time position is $192,000 to $216,000\
