    \ user experience.</li> <li>Evaluate the systems and technology in place today\
    \ while proposing systems and architecture that can scale for the future.&nbsp;</li>\
    \ <li>Have the opportunity to mentor new hires.</li> </ul> <h3><strong>Qualifications</strong></h3>\
    \ <ul> <li>Has 5+ years of relevant experience in back-end development.</li> <li>Displays\
