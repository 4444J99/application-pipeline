    \ and data structures.</li> <li>Demonstrates perseverance when faced with tough\
    \ technical issues.</li> <li>Has some experience with AWS or other cloud offerings\
    \ (GCP, Azure, etc.).</li> <li>Has experience building, deploying, and debugging\
    \ production systems at scale.</li> <li>Cares about the end-user experience and\
    \ strives to ensure high quality.</li> <li>Has a demonstrated ability to work\
    \ independently with minimal guidance, proactively manages tasks and priorities\
    \ across multiple projects, analyzes and executes work efficiently, collaborates\
    \ effectively with cross-functional teams, and thrives in fast-paced, results-driven\
    \ environments.</li> </ul> <h3><strong>Support for you, professionally and personally</strong></h3>\
