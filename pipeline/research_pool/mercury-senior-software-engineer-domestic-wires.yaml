    \ an FDIC-insured bank. Banking services provided through Choice Financial Group\
    \ and Column N.A., Members FDIC.</em></p> <p><strong>What You\u2019ll Do</strong></p>\
    \ <ul> <li><strong>Lead Projects End-to-End:</strong> Drive technical projects\
