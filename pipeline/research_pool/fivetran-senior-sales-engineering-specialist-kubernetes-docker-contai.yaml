    more organizations continue to leverage our technology every day to become truly
    data-driven.</p></div><p><span style="font-size: 10pt;"><strong>About the Role</strong></span></p>
    <p><span style="font-size: 10pt;">Fivetran is building data pipelines to power
    the modern data stack for thousands of companies.</span></p> <p><span style="font-size:
    10pt;">We’re looking for a talented presales individual with deep expertise in
    containerization to join our global sales engineering specialist team. As a Sales
    Engineering Specialist focused on our Hybrid Deployment architecture, you will
    work closely with our sales and field sales engineering teams to accelerate our
    customers’ and prospects’ understanding of the value of our Hybrid Deployment
    model, an architecture steeped in containerization, Kubernetes, Docker and Podman.
    In addition, you will be tasked with working cross-functionally with our SRE and
    Product teams to ensure comprehensive support for Hybrid Deployment mechanisms
    and services.</span></p> <p><span style="font-size: 10pt;">This is a full-time
    position based remotely in the United States.</span></p> <p><span style="font-size:
    10pt;"><strong>Technologies You’ll Use</strong></span></p> <p><span style="font-size:
    10pt;">In this role, you will be expected to have a deep understanding of the
    following technologies:</span></p> <ul> <li style="font-size: 10pt;"><span style="font-size:
    10pt;">Container management software including Kubernetes, Docker, and Podman.</span></li>
    <li style="font-size: 10pt;"><span style="font-size: 10pt;">Fivetran''s data integration
    platform, deployment and connectivity methods, and automation/abstraction technologies
    for infrastructure creation and management.</span></li> <li style="font-size:
    10pt;"><span style="font-size: 10pt;">Cloud computing platforms such as AWS, Azure,
    and Google Cloud Platform, especially their Kubernetes managed services Amazon
    Elastic Kubernetes Service, Azure Kubernetes Service, and Google Kubernetes Engine.
    Plus, the networking considerations that arise working with these technologies.</span></li>
    <li style="font-size: 10pt;"><span style="font-size: 10pt;">Other data architecture
    considerations critical to our customers’ success: databases, high availability,
    SaaS applications and their APIs, GenAI architectures, cloud data warehouses,
    business intelligence, etc.</span></li> </ul> <p><span style="font-size: 10pt;"><strong>What
    You’ll Do</strong></span></p> <ul> <li style="font-size: 10pt;"><span style="font-size:
    10pt;">Create, secure, network, and validate containerized hybrid deployment data
    pipeline architectures in conjunction with our customers, account executives,
    and field sales engineering teams, for maximum scalability and security.</span></li>
    <li style="font-size: 10pt;"><span style="font-size: 10pt;">Work closely with
    Fivetran’s Product and engineering teams to ensure our Hybrid Deployment capabilities
    are fit for purpose, secure, cost-effective, and well implemented.</span></li>
    <li style="font-size: 10pt;"><span style="font-size: 10pt;">Stay up-to-date on
    the latest technologies and trends in containerization, security, autoscaling
    and secure data management.</span></li> <li style="font-size: 10pt;"><span style="font-size:
    10pt;">Teach, enable, and coach your peers at Fivetran on the virtues and techniques
    of Hybrid Deployment and how to deliver its value to customers.</span></li> </ul>
    <p><span style="font-size: 10pt;"><strong>Skills We’re Looking For</strong></span></p>
    <ul> <li style="font-size: 10pt;"><span style="font-size: 10pt;">2+ years of extensive
    work with Kubernetes or Docker, and/or other container technologies.</span></li>
    <li style="font-size: 10pt;"><span style="font-size: 10pt;">Hands-on expertise
    with modern cloud, on-premise, and hybrid-cloud data architectures and connectivity
    mechanisms.</span></li> <li style="font-size: 10pt;"><span style="font-size: 10pt;">Strong
    analytical and problem-solving skills, particularly in the context of containerized
    architectures, preferably in customer contexts.</span></li> <li style="font-size:
    10pt;"><span style="font-size: 10pt;">Passion for secure, scalable data pipelines.</span></li>
    <li style="font-size: 10pt;"><span style="font-size: 10pt;">Curiosity to learn
    and assimilate technical information quickly, enthusiasm to share and teach others.</span></li>
    </ul> <p><span style="font-size: 10pt;">This position qualifies for Fivetran’s
    incentive plan, and it’s common for employees in this role to achieve the total
