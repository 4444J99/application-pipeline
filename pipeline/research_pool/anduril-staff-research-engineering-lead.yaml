  description: "<div class=\"content-intro\"><p>Anduril Industries is a defense technology\
    \ company with a mission to transform U.S. and allied military capabilities with\
    \ advanced technology. By bringing the expertise, technology, and business model\
    \ of the 21st century\u2019s most innovative companies to the defense industry,\
    \ Anduril is changing how military systems are designed, built and sold. Anduril\u2019\
    s family of systems is powered by Lattice OS, an AI-powered operating system that\
    \ turns thousands of data streams into a realtime, 3D command and control center.\
    \ As the world enters an era of strategic competition, Anduril is committed to\
    \ bringing cutting-edge autonomy, AI, computer vision, sensor fusion, and networking\
    \ technology to the military in months, not years.</p></div><p>We are seeking\
    \ a <strong>Research Engineer</strong> to drive innovations in autonomous vehicle\
    \ technology using deep learning and reinforcement learning. In this dynamic role,\
    \ you will design state-of-the-art algorithms and systems that enable safe, efficient,\
    \ and intelligent autonomous capabilities. Today, employing mass quantities of\
    \ \u201Cautonomous\u201D robots requires heavy human oversight and execution.\
    \ Anduril is leveraging AI approaches to offload operator burden and speed up\
    \ execution via realtime monitoring, recommendations to users, and multi-modal\
    \ interaction patterns. You will apply proven and un-proven approaches to create\
    \ prototypes for expanding the capability of autonomous systems.</p> <h4>What\
    \ You\u2019ll Do</h4> <ul> <li><strong>Develop Advanced Algorithms</strong> -\
    \ Design and implement deep learning and reinforcement learning algorithms to\
    \ improve sensor perception, prediction, and decision-making for autonomous vehicles.</li>\
    \ <li><strong>Apply Agentic Reasoning</strong> - Design and implement integrated\
    \ agents and AI models to solve for end-user autonomous systems workflows.</li>\
    \ <li><strong>End-to-End System Integration</strong> - Collaborate with cross-functional\
    \ teams to integrate research prototypes into robust, production-ready systems\
    \ including simulation environments and real-world platforms.</li> <li><strong>Research\
    \ &amp; Experimentation</strong> - Conduct research into reinforcement learning\
    \ strategies and deep architectures, iterate on experimental designs, and evaluate\
    \ performance using rigorous quantitative metrics.</li> <li><strong>Data-Driven\
    \ Innovation </strong>-<strong> </strong>Utilize real-world and synthetic data\
    \ to enhance model robustness and generalization, leveraging scalable training\
    \ pipelines on distributed systems.</li> </ul> <h4>Required Qualifications</h4>\
    \ <ul> <li>PhD or Master\u2019s degree in Computer Science, Robotics, Machine\
    \ Learning, or a related field, or equivalent practical experience.</li> <li>Demonstrated\
    \ proficiency in deep learning frameworks (e.g., PyTorch, TensorFlow, JAX) including\
    \ LLM fine-tuning.</li> <li>Solid experience with reinforcement learning methods\
    \ and their application to autonomous systems.</li> <li>Experience with simulation\
    \ or real-world validation for autonomous vehicles is highly desirable.</li> <li>Proven\
    \ experience in deep learning research and development, particularly in generative\
    \ AI. This includes diffusion models and autoregressive generative models.</li>\
    \ </ul> <p><strong>Preferred Qualifications</strong></p> <ul> <li>Novel application\
    \ track record and experience including first author publications, participation\
    \ in peer reviewed conferences, contribution to open source projects, and demonstrated\
    \ contribution to the ML and AI community.</li> <li>Experience in multi-modal\
    \ sensor data processing (e.g., cameras, LiDAR, radar).</li> <li>Familiarity with\
    \ ML Ops best practices, including model versioning and reproducible research\
    \ pipelines.</li> <li>Strong programming skills in Python and familiarity with\
    \ C/C++ is a plus.</li> <li>General software engineering experience solving motion\
    \ planning or related robotics problems.</li> </ul><div class=\"content-pay-transparency\"\
