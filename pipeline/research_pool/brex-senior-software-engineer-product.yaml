  description: "<div class=\"content-intro\"><p><strong>Why join us</strong></p> <p>Brex\
    \ is the AI-powered spend platform. We help companies spend with confidence with\
    \ integrated corporate cards, banking, and global payments, plus intuitive software\
    \ for travel and expenses. Tens of thousands of companies from startups to enterprises\
    \ \u2014 including DoorDash, Flexport, and Compass \u2014 use Brex to proactively\
    \ control spend, reduce costs, and increase efficiency on a global scale.</p>\
    \ <p><span style=\"font-weight: 400;\">Working at Brex allows you to push your\
    \ limits, challenge the status quo, and collaborate with some of the brightest\
    \ minds in the industry. We\u2019re committed to building a diverse team and inclusive\
    \ culture and believe your potential should only be limited by how big you can\
    \ dream. We make this a reality by empowering you with the tools, resources, and\
    \ support you need to grow your career.</span></p></div><p><strong>Engineering\
    \ at Brex</strong></p> <p>Engineering at Brex is about building systems that scale\
    \ with speed and intention. Our teams span Software, Data, Security, and IT, and\
    \ operate with high autonomy and deep collaboration. We tackle hard technical\
    \ problems, own our outcomes, and push for excellence at every level \u2014 from\
    \ architecture to deployment. It\u2019s an environment where engineering is a\
    \ craft, and builders become leaders.</p> <p><strong>What you\u2019ll do</strong></p>\
    \ <p>As an engineer at Brex, you will help develop new products from concept to\
    \ launch, whether for a 5-person startup or a 5,000-person-strong enterprise.\
    \ We\u2019re looking for folks with an interest in building products and tools,\
    \ and who are comfortable in dealing with lots of moving pieces. You\u2019ll be\
    \ building customer-facing products that will drive direct business impact and\
    \ shape our long-term technical vision with a high-quality bar. You'll have the\
    \ opportunity to learn and push the frontier of providing the best financial software\
    \ experience to help companies grow. You\u2019ll be encouraged to be metric and\
    \ data-driven and to think creatively to help Brex scale and get prepared for\
    \ the new markets we are about to enter.&nbsp;</p> <p><strong>Where you\u2019\
    ll work</strong></p> <p>This role will be based in our San Francisco office. We\
    \ are a hybrid environment that combines the energy and connections of being in\
    \ the office with the benefits and flexibility of working from home. We currently\
    \ require a minimum of three coordinated days in the office per week, Monday,\
    \ Wednesday and Thursday. As a perk, we also have up to four weeks per year of\
    \ fully remote work!</p> <p><strong>Responsibilities:</strong></p> <ul> <li>Collaborate\
    \ with engineers across the company to build new features and products end-to-end.</li>\
    \ <li>Work alongside user-facing teams like Sales and Support to deeply understand\
    \ our customers' needs.</li> <li>Design and implement solutions to improve our\
    \ customers' banking experiences.</li> <li>Own problems end-to-end, from user\
    \ experience and data models to scalability, operability, and ongoing metrics.</li>\
    \ <li>Tune and polish features to a high degree of excellence.</li> </ul> <p><strong>Requirements:</strong></p>\
    \ <ul> <li>7+ years of professional experience designing, developing, and deploying\
    \ full-stack applications.</li> <li>Experience building and designing scalable\
    \ backend systems</li> <li>Experience working with SQL or NoSQL databases</li>\
    \ <li>Experience working with backend programming languages (Java, Kotlin, Python)</li>\
    \ <li>Familiarity with software engineering development cycles</li> <li>Ability\
    \ to hold yourself and the team to high standards</li> <li>Strong communication\
    \ and interpersonal skills</li> </ul> <p><strong>Compensation:</strong></p> <p>The\
    \ expected salary range for this role is $192,000-$240,000 + Equity. However,\
    \ the starting base pay will depend on a number of factors including the candidate\u2019\
    s location, skills, experience, market demands, and internal pay parity. Depending\
    \ on the position offered, equity and other forms of compensation may be provided\
    \ as part of a total compensation package.</p><div class=\"content-conclusion\"\
    ><p><em>Please be aware, job-seekers may be at risk of targeting by malicious\
    \ actors looking for personal data. Brex recruiters will only reach out via LinkedIn\
    \ or email with a&nbsp;<a class=\"c-link\" href=\"http://brex.com/\" target=\"\
    _blank\" data-stringify-link=\"http://brex.com\" data-sk=\"tooltip_parent\">brex.com</a>&nbsp;domain.\
    \ Any outreach claiming to be from Brex via other sources should be ignored.</em></p></div>"
