    websites. The company’s products include Grammarly’s writing assistance, Coda’s
    collaborative workspaces, Mail’s inbox management, and Go, the proactive AI assistant
    that understands context and delivers help automatically. Founded in 2009, Superhuman
    empowers over 40 million people, 50,000 organizations, and 3,000 educational institutions
    worldwide to eliminate busywork and focus on what matters. Learn more at <span
    class="s1"><a href="http://superhuman.com/">superhuman.com</a></span> and about
    our <a href="https://blog.superhuman.com/our-values/"><span class="s1">values
    here</span></a>.</p> <h3><strong>The Opportunity&nbsp;</strong></h3> <p>To achieve
    our ambitious goals, we’re looking for Software Engineers to join our engineering
    teams. Front-End engineers build and own user-focused interfaces, work closely
    with Product and Design teams, and collaborate with other functional teams across
    the Engineering organization.&nbsp;</p> <p>Superhuman''s engineers and researchers
    have the freedom to innovate and uncover breakthroughs—and, in turn, influence
    our product roadmap. The complexity of our technical challenges is growing rapidly
    as we scale our interfaces, algorithms, and infrastructure. You can hear more
    from our team on our<a href="http://grammarly.com/blog/engineering"> technical
    blog</a>.</p> <p>Superhuman is growing rapidly. There are opportunities to join
    a team, learn from experienced peers, and build product offerings and teams from
    the ground up. Within our growing engineering organization, there is plenty of
    room for ownership and direct impact on users.</p> <p>As a Software Engineer at
    Superhuman, you will:</p> <ul> <li>Ship production-grade code to over 40 million
    daily active users.</li> <li>Grow and maintain the team’s technical excellence
    by focusing on best practices for the team and product.</li> <li>Contribute to
    the company''s technical culture.</li> <li>Harness engagement metrics to identify
    and build new impactful features.</li> <li>Work on fun and technically challenging
    projects to deliver impactful apps on popular browsers.</li> <li>Use React and
    TypeScript while building super-refined and elegant user interfaces.</li> <li>Collaborate
    with internal teams such as Core, Growth, Enterprise, Trust, and Data to deliver
    delightful product offerings to our customers.</li> <li>Make a meaningful impact
    on the lives of writers everywhere!</li> </ul> <h3><strong>Qualifications</strong></h3>
    <ul> <li>Brings at least 3 years of experience in front-end development.</li>
    <li>Has expert-level software engineering fundamentals, including knowledge of
