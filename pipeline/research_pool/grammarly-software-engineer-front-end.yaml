    HTML, and CSS.</li> <li>Has&nbsp;extensive experience with ReactJS, AngularJS,
    or similar UI frameworks.</li> <li>Tackles infrastructure challenges when needed.</li>
    <li>Has experience with modern web client development and testing tools.</li>
    <li>Has a deep understanding and extensive knowledge of continuous integration
    and delivery methods.</li> </ul> <p>Bonus points for:&nbsp;</p> <ul> <li>Functional
    programming experience.</li> <li>Experience running experiments and A/B tests.&nbsp;</li>
    </ul> <h3><strong>Support for you, professionally and personally</strong></h3>
    <ul> <li><em>Professional growth</em>: We hire people we trust, and we give team
    members autonomy to do their best work. We also support professional development
    with training, coaching, and regular feedback.</li> <li><em>A connected team</em>:
    Superhuman builds a product that helps people connect, and we apply this mindset
    to our own team. We have a highly collaborative culture. We also take time to
    celebrate our colleagues and accomplishments with global, local, and team-specific
    events and programs.</li> <li><em>Comprehensive benefits</em>: Superhuman offers
    all team members competitive pay along with a benefits package that includes superior
    healthcare. We also offer ample and defined time off, catered lunches, gym and
    recreation stipends, admission discounts, and more.</li> <li><em>Relocation support:
    </em>We can help you relocate to Berlin and make the experience smooth and easy.
    Superhuman provides a relocation bonus, legal and visa support, temporary housing,
    moving support and travel expenses, assistance in finding schools for your kids—and
    all other information you might need.</li> </ul> <h3><strong>We encourage you
    to apply</strong></h3> <'
