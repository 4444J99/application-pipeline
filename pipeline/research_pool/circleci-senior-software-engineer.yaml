  description: '<h2><strong>About CircleCI Engineering</strong></h2> <p>CI/CD has
    been solved. Now it''s being reinvented. AI agents don''t just run pipelines.
    They write code, trigger builds, interpret failures, and propose fixes. The interfaces
    that developers use to understand and trust that work don''t exist yet. We''re
    building them.</p> <p>At CircleCI, our guiding principles aren''t posters on a
    wall. We learn fast: we run experiments, accept failure, and scale what works.
    We think like the customer: every decision connects back to the developer sitting
    in front of a failing build at 2 am. We own the outcome: not just our slice of
    it, but the whole thing. If that''s how you already work, you''ll fit here.</p>
    <h2><strong>Team-Agnostic Placement</strong></h2> <p>We don''t hire for a team.
    We hire for CircleCI. Where you land depends on where your strengths create the
    most leverage, and we figure that out together. You might own the CI pipeline
    experience, deploy and release tooling, notification infrastructure, monetization
    flows, AI agent surfaces, or the foundational web platform. The through line across
    all of it is the same: full-stack ownership, a high bar for craft, and work that
    directly shapes how tens of thousands of developers experience CircleCI every
    day.</p> <h2><strong>What You''ll Do</strong></h2> <ul> <li><strong>Build AI-natively.</strong>
    AI is how we work. It''s not a productivity layer on top of engineering, but the
    default starting point for how problems get approached and solved.</li> <li><strong>Set
    technical direction.</strong> You define the approach others build from. When
    the problem is complex or the answer isn''t obvious, you''re the person who leads
    the design discussion, writes the ADR, and makes the call.</li> <li><strong>Invent
    new interfaces.</strong> Software delivery is being reinvented. Pipelines run
    autonomously, generate fixes, and surface results that need human judgment. The
    tools developers use to understand, trust, and act on that work don''t exist yet.
    You''ll define what they look like and establish the patterns the team builds
    on.</li> <li><strong>Own the full stack.</strong> Build features end-to-end in
    Go, React, and TypeScript. You don''t hand off at a layer boundary. You own the
    outcome.</li> <li><strong>Obsess over craft.</strong> Reliability and responsiveness
    are design concerns, not afterthoughts. Care about how the interface holds up
    when stakes are high and hold your team to that same standard.</li> <li><strong>Champion
    observability.</strong> Use Honeycomb, Datadog, and Rollbar to understand and
    improve your systems. Operational data drives stability, not just incident response.</li>
    <li><strong>Close gaps and fix the conditions that created them.</strong> You''ll
    notice gaps and close them. When a gap reflects something broken in how the team
    works, you fix that too.</li> </ul> <h2><strong>What You''ll Bring</strong></h2>
    <ul> <li><strong>AI-native engineering practices.</strong> You use AI tools daily
    and can speak to what you''ve built, where they changed your approach, and where
    they fall short.</li> <li><strong>A track record of shipping.</strong> You''ve
    built something real and put it in front of users. 5+ years of production full-stack
    experience, with latency, responsiveness, and reliability treated as design concerns,
    not afterthoughts.</li> <li><strong>Full-stack depth.</strong> Strong React and
    TypeScript. Comfortable owning backend services in Go: API design, data modeling,
    service integration.</li> <li><strong>System design.</strong> You lead architectural
    decisions on complex systems. You make conscious tradeoffs, document your reasoning,
    and create the foundation others build on.</li> <li><strong>Adaptability.</strong>
    You don''t just thrive in ambiguity, you reduce it for others. You turn unclear
    requirements into a direction the team can execute on.</li> <li><strong>Technical
    leadership.</strong> You mentor engineers, give direct feedback on technical direction,
    and raise the quality bar through how you engage in reviews and design discussions,
    not just what you ship.</li> </ul> <h2><strong>Sound like you?</strong></h2> <p>You''ve
    stopped waiting for AI to mature and are already building with it, not as a productivity
    trick, but as a core part of how you think about problems. You care about the
    product as much as the code. You''re drawn to work where the patterns don''t exist
    yet and the best answer requires you to invent it. If that''s how you already
    operate, we want to talk.</p><div class="content-pay-transparency"><div class="pay-input"><div
    class="title">Canada Base Pay Range</div><div class="pay-range"><span>$156,000</span><span
    class="divider">&mdash;</span><span>$196,000 CAD</span></div></div></div><div
    class="content-conclusion"><p></p> <p>We will ensure that individuals with disabilities
    are provided reasonable&nbsp;accommodation to participate in the job application
    or interview process, to perform&nbsp;essential job functions, and to receive
    other benefits'
