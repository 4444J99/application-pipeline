  description: "<p>Since the dawn of aviation, pilots have faced the constant challenge\
    \ of air resistance, much like sailors navigating the friction of water. Amidst\
    \ this relentless struggle, the <em>trim tab</em> emerges as an ingenious yet\
    \ understated marvel. Just as the wheel revolutionized transportation by easing\
    \ movement over land, the <em>trim tab</em> simplifies flight, allowing for smoother\
    \ navigation through the skies. It embodies the elegance of simplicity in engineering,\
    \ transforming the demanding task of controlling an aircraft into a more graceful\
    \ and manageable endeavor.</p> <p>At Mercury, we are committed to crafting an\
    \ exceptional banking* experience for startups. Our team is passionately focused\
    \ on ensuring our product not only meets but anticipates the needs of our customers.</p>\
    \ <p>Our product engineering group is growing and we\u2019re looking to hire backend\
    \ and full-stack engineers. We\u2019re a team of pragmatic, product-minded engineers\
    \ motivated by the desire to create lovable products that rescue our customers\
    \ from frustrating, expensive legacy industry tools.&nbsp;</p> <p><strong>As part\
    \ of this role, you will:</strong></p> <ul> <li>Feel a strong sense of product\
    \ ownership and actively seek responsibility \u2013 we often self-organize on\
    \ small/medium projects, and we want someone excited to help shape and build Mercury\u2019\
    s future.</li> </ul> <ul> <li>Work in an autonomous environment on a close-knit\
    \ team, with a \u201Cstartup within a startup\u201D feel.&nbsp;</li> </ul> <ul>\
    \ <li>Partner closely with designers and product leaders to ship lovable experiences.\
    \ We want to transcend the status quo for banking and fintech software, and many\
    \ of our customers are startups and appreciate our slick, magical designs.</li>\
    \ <li>Join a small but mighty team of experienced product engineers within one\
    \ of our Mercury product groups (Banking, Everyday Experiences, Expansion, Risk).&nbsp;</li>\
    \ </ul> <p><strong>The ideal candidate for the role:</strong></p> <ul> <li>Has\
    \ 1-4 years of backend or full-stack development experience, with knowledge of\
    \ or excitement to learn Haskell, React, TypeScript, and Redux.</li> </ul> <ul>\
    \ <li>Is passionately product-minded and has experience building and shipping\
    \ new products.</li> <li>Empathizes with users and can channel their perspective\
    \ to build lovable products.</li> <li>Can balance tradeoffs and find creative\
    \ solutions to accomplish goals.</li> <li>Communicates and collaborates effectively\
    \ with peers and cross-functional counterparts.</li> </ul> <p>If this role interests\
    \ you, we invite you to explore our public demo at <a href=\"https://demo.mercury.com\"\
    >demo.mercury.com</a>.&nbsp;</p> <p>The total rewards package at Mercury includes\
    \ base salary, equity (stock options/RSUs), and benefits. Our salary and equity\
    \ ranges are highly competitive within the SaaS and fintech industry and are updated\
    \ regularly using the most reliable compensation survey data for our industry.\
    \ New hire offers are made based on a candidate\u2019s experience, expertise,\
    \ geographic location, and internal pay equity relative to peers.</p> <p>Our target\
    \ new hire base salary ranges for this role are the following:</p> <ul> <li>US\
    \ employees (any location): $122,400 - $158,400 USD</li> <li>Canadian employees\
    \ (any location): CAD 115,700 - 149,700</li> </ul> <p><em>*Mercury is a fintech\
    \ company, not an FDIC-insured bank. Banking services provided through Choice\
    \ Financial Group and Column N.A., Members FDIC.</em></p> <p>Mercury values diversity\
    \ &amp; belonging and is proud to be an Equal Employment Opportunity employer.\
    \ All individuals seeking employment at Mercury are considered without regard\
    \ to race, color, religion, national origin, age, sex, marital status, ancestry,\
    \ physical or mental disability, veteran status, gender identity, sexual orientation,\
    \ or any other legally protected characteristic. We are committed to providing\
    \ reasonable accommodations throughout the recruitment process for applicants\
    \ with disabilities or special needs. If you need assistance, or an accommodation,\
    \ please let your recruiter know once you are contacted about a role.</p> <p>We\
    \ use Covey as part of our hiring and / or promotional process for jobs in NYC\
    \ and certain features may qualify it as an AEDT. As part of the evaluation process\
    \ we provide Covey with job requirements and candidate submitted applications.\
    \ We began using&nbsp;<a href=\"https://getcovey.com/product/covey-scout-inbound\"\
    >Covey Scout for Inbound </a>on January 22, 2024. Please see the independent bias\
    \ audit report covering our use of Covey&nbsp;<a href=\"https://getcovey.com/nyc-local-law-144\"\
    >here</a>.</p> <p><span data-sheets-root=\"1\">#LI-DNI</span></p>"
