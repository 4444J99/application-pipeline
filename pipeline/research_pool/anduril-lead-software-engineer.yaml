    \ impact on next-generation defense technology, working with state-of-the-art\
    \ robotics and autonomous systems. You'll be part of a team that values innovation,\
    \ quick iteration, and delivering high-quality solutions that meet real-world\
    \ needs.</p> <p><em>Must be eligible to obtain and maintain an active U.S. Secret\
