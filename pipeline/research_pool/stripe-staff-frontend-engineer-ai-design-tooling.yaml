  description: "<h2>Who we are</h2> <h3>About Stripe</h3> <p>Stripe is a financial\
    \ infrastructure platform for businesses. Millions of companies\u2014from the\
    \ world's largest enterprises to the most ambitious startups\u2014use Stripe to\
    \ accept payments, grow their revenue, and accelerate new business opportunities.\
    \ Our mission is to increase the GDP of the internet, and we have a staggering\
    \ amount of work ahead. That means you have an unprecedented opportunity to put\
    \ the global economy within everyone's reach while doing the most important work\
    \ of your career.</p> <h3>&nbsp;</h3> <h3>About the Team</h3> <p>At Stripe, we\
    \ believe that craft and beauty are essential to building tools that people and\
    \ businesses around the world love and trust. Designers at Stripe sweat every\
    \ detail, balancing utility, usability, and beauty in everything we ship. These\
    \ are not just nice-to-have qualities but core to our operating principles and\
    \ mission. As an AI Staff Software Engineer, you will be the architect of the\
    \ engine that powers this obsession by designing and building internal AI tools\
    \ that accelerate prototyping, inspire experimentation and innovation, and get\
    \ us to production-ready ideas even faster. You must be doggedly curious, technical\
    \ but creative, deeply familiar with the AI landscape, and obsessed with the ever-changing\
    \ intersection of code, design, and systems thinking.</p> <h2>&nbsp;</h2> <h2>What\
    \ you\u2019ll do</h2> <ul> <li>Partner with designers to understand their workflow\
    \ and responsibilities and imagine AI-powered tools and agents that left-shift\
    \ and accelerate prototyping.</li> <li>Own the development and evolution of scalable,\
    \ reliable, and production-quality front-end code.</li> <li>Create documentation\
    \ and workflows that help teams adopt and master these tools quickly and efficiently.</li>\
    \ <li>Write clean, maintainable software that works within Stripe\u2019s stack.</li>\
    \ <li>Drive technical decisions and implementation from start to finish and through\
    \ support and iteration.</li> <li>Ensure all tooling meets Stripe\u2019s expectations\
    \ around quality, security, and performance.</li> </ul> <h2>&nbsp;</h2> <h2>Who\
    \ you are</h2> <ul> <li>10+ years of experience coding production-ready software.&nbsp;</li>\
    \ <li>Confidence with both frontend languages, like React and TypeScript, and\
    \ backend languages, like Express, Ruby.&nbsp;</li> <li>Experience with, or deep\
    \ curiosity about building AI-augmented workflows (through LLMs, foundation models,\
    \ agents, or custom tooling)</li> <li>Builder or entrepreneurial spirit with a\
    \ passion for exploring personal and creative side projects</li> <li>Proficiency\
    \ in building high-craft front-end experiences and scalable APIs, complemented\
    \ by a working knowledge of backend infrastructure and deployment workflows.</li>\
