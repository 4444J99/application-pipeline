  description: '<p><strong>FEQ427R80</strong></p> <p>As a&nbsp;Senior Solutions Engineer
    (Analytics, AI, Big Data, Public Cloud), you will guide the technical evaluation
    phase in a hands-on environment throughout the sales process.&nbsp;You will help
    our customers to achieve tangible data-driven outcomes through the use of our
    Databricks Lakehouse Platform, helping data teams complete projects and integrate
    our platform into their enterprise Ecosystem. You''ll grow as a leader in your
    field, while finding solutions to our customers'' biggest challenges in big data,
    analytics, data engineering and data science problems.</p> <p>The impact you will
    have:</p> <ul> <li>You will be a Big Data Analytics expert on aspects of architecture
    and design</li> <li>Engage with the technical community by leading presentations
    , workshops, seminars and meet-ups</li> <li>Lead your clients through evaluating
    and adopting Databricks including hands-on Spark programming and integration with
    the wider cloud ecosystem</li> <li>Support your customers by authoring reference
    architectures, how-tos, and demo applications</li> <li>Integrate Databricks with
    3rd-party applications to support customer architectures</li> <li>Together with
    your Account Executive, you will form successful relationships with clients throughout
    your assigned territory to provide technical and business value</li> </ul> <p>What
    we look for:&nbsp;</p> <ul> <li>Consulting , pre-sales or post sales experience
    working with external clients across a variety of industry markets</li> <li>Core
    strength in either data engineering or data science advantageous</li> <li>5+ years
    of experience demonstrating technical concepts, including presenting and white-boarding</li>
    <li>4+ years of experience designing architectures within a public cloud (AWS,
    Azure or GCP)</li> <li>4+ years of experience with Big Data technologies, including
    Spark, AI, Data Science, Data Engineering, Hadoop, Cassandra, and others</li>
    <li>Solid coding experience in Python, R, Java, Spark or Scala</li> </ul><div
