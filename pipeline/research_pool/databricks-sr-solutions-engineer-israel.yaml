  description: '<p>At Databricks, our core values are at the heart of everything we
    do. Our culture of proactiveness and a customer-centric mindset guides us to create
    a unified platform that makes data science and analytics accessible to everyone.
    We aim to inspire our customers to make informed decisions that push their business
    forward. We provide a user-friendly and intuitive platform that makes it easy
    to turn insights into action and fosters a culture of creativity, experimentation,
    and continuous improvement.</p> <p>You will be an essential part of this mission,
    using your technical expertise to demonstrate how our Data and Intelligence Platform
    can help customers solve their complex data challenges.</p> <p>You''ll work with
    a collaborative, customer-focused team that values innovation and creativity.
    You''ll use your skills to create customized solutions to help our customers achieve
    their goals and guide their businesses forward.</p> <p>Join us in our quest to
    change how people work with data and make a better world!<br><br></p> <p><strong>The
    impact you will have:</strong></p> <ul> <li>Form successful relationships with
    clients throughout your assigned territory, providing technical and business value
    to Databricks customers in collaboration with Account Executives.</li> <li>Operate
    as an expert in big data analytics to excite customers about Databricks. You will
    develop into a ‘champion’ and trusted advisor on multiple issues of architecture,
    design, and implementation to lead to the successful adoption of the Databricks
    Data Intelligence Platform.</li> <li>Scale best practices in your field and support
    customers by authoring reference architectures, how-tos, and demo applications,
    and help build the Databricks community in your region by leading workshops, seminars,
    and meet-ups.</li> <li>Grow your knowledge and expertise to the level of a technical
    and/or industry specialist.</li> </ul> <p><strong>What we look for:</strong></p>
    <ul> <li>Engage customers in technical sales, challenge their questions, guide
    clear outcomes, and communicate technical and value propositions.</li> <li>Passion
    for delivering technical propositions, identifying customers'' pain points and
    explaining essential areas for business value to develop a trusted advisor skillset.</li>
    <li>Knowledgeable in a core Big Data Analytics domain with some exposure to advanced
    Data Engineering and/or Data science use cases.</li> <li>Experience diving deeper
    into solution architecture and expertise with at least one major public cloud
    platform.</li> <li>Code in a core programming language like Python, Java, or Scala.</li>
    <li>A foundational understanding of Apache Spark™ architecture is preferable;
    hands-on skills will benefit the role.</li> </ul> <p><strong>Notes on mandatory
    requirements:</strong></p> <ul> <li>Flexibility to travel (up to 20-30% as required
    for customer meetings, events, and training).</li> <li>Business proficiency in
    Hebrew and English is required. Fluency in additional regional languages may be
    advantageous.</li> </ul><div class="content-conclusion"><p><strong>About Databricks</strong></p>
    <p><span style="font-family: arial, sans-serif;">Databricks is the data and AI
