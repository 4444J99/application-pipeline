  description: "About Us: At LangChain, our mission is to make intelligent agents\
    \ ubiquitous. We build the foundation for agent engineering in the real world,\
    \ helping developers move from prototypes to production-ready AI agents that teams\
    \ can rely on. We began as widely adopted open-source tools and have grown to\
    \ also offer a platform for building, evaluating, deploying, and operating agents\
    \ at scale. Today, LangChain, LangGraph, LangSmith, and Agent Builder are used\
    \ by teams shipping real AI products across startups and large enterprises. Millions\
    \ of developers trust LangChain to power AI teams at companies like Replit, Clay,\
    \ Coinbase, Workday, Lyft, Cloudflare, Harvey, Rippling, Vanta, and 35% of the\
    \ Fortune 500 . With $125M raised at Series B from IVP, Sequoia, Benchmark, CapitalG,\
    \ and Sapphire Ventures , we\u2019re at a stage where we\u2019re continuing to\
    \ develop new products, growth is accelerating, and all team members have meaningful\
    \ impact on what we build and how we work together. LangChain is a place where\
    \ your contributions can shape how this technology shows up in the real world.\
    \ About the Team: The Enterprise Readiness team builds the systems that allow\
    \ large organizations to securely adopt and scale LangChain in production. The\
    \ team focuses on identity, authentication, authorization, billing, compliance,\
    \ and tenant management to ensure our platform meets the security and operational\
    \ requirements of enterprise customers. About the Role: LangChain is hiring a\
    \ Senior Backend Engineer focused on Enterprise Readiness & Identity to build\
    \ the features that make our platform secure, compliant, and scalable for enterprise\
    \ customers. This is a high-impact role on a newly formed team working at the\
    \ intersection of authentication, authorization, billing, security, compliance,\
    \ and tenant management. You\u2019ll collaborate closely with infrastructure,\
    \ product, GTM teams, and our largest enterprise users to shape the foundation\
    \ of our enterprise offerings. Location: In-person 5 days/week in New York City,\
    \ San Francisco, or Boston. What You'll Do: Design and implement backend services\
    \ (Python/Go) powering enterprise authentication, authorization, billing, and\
    \ tenant provisioning Build and evolve systems for SAML, SCIM, OAuth2, and single\
    \ sign-on (SSO) integrations Develop robust role-based and attribute-based access\
    \ control systems (RBAC/ABAC) at organizational scale Build and scale billing\
    \ infrastructure including invoicing, usage-based charging, and flexible pricing\
    \ model support Implement audit logging, usage tracking, and metering pipelines\
    \ to support compliance and billing accuracy Optimize enterprise onboarding and\
    \ tenant lifecycle management for reliability and scalability Collaborate with\
    \ security and compliance teams to support SOC2, GDPR, and other regulatory requirements\
    \ Partner with infrastructure engineers to ensure identity and enterprise features\
    \ are performant, reliable, and observable Engage directly with enterprise customers\
    \ to translate requirements into secure, scalable platform capabilities Write\
    \ clean, maintainable, and well-documented backend code What You'll Bring: Technical\
    \ experience 5+ years of backend engineering experience with Python or Go (both\
    \ preferred) Deep knowledge of authentication and identity standards including\
    \ OAuth2, SAML, JWTs, and SCIM Experience building and scaling access control\
    \ systems such as RBAC or ABAC frameworks Experience building billing or usage\
    \ infrastructure in SaaS environments Familiarity with Postgres, Redis, APIs,\
    \ and modern distributed backend infrastructure Enterprise systems experience\
    \ Comfort navigating enterprise security, compliance, and multi-tenant architectures\
    \ Prior experience building enterprise-grade SaaS platforms or developer platforms\
    \ Working style Strong ownership mindset and ability to thrive in fast-paced,\
    \ unstructured startup environments Nice to Have: Background in security, observability,\
    \ or developer infrastructure Familiarity with LLMs, GenAI applications, or agentic\
    \ frameworks Compensation & Benefits: We offer competitive compensation that includes\
    \ base salary, meaningful equity, and benefits such as health and dental coverage,\
    \ flexible vacation, a 401(k) plan, and life insurance. Actual compensation will\
    \ vary based on role, level, and location. For team members in the EU and UK,\
    \ we provide locally competitive benefits aligned with regional norms and regulations.\
    \ Annual salary range: $175,000- $225,000"
