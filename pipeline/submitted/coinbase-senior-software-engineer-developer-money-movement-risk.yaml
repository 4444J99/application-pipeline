  description: '<div class="content-intro"><p>Ready to be pushed beyond what you think you’re capable of?</p> <p>At Coinbase, our mission is to increase economic freedom in the world. It’s a massive, ambitious opportunity that demands the best of us, every day, as we build the emerging onchain platform — and with it, the future global financial system.</p> <p>To achieve our mission, we’re seeking a very specific candidate. We want someone who is passionate about our mission and who believes in the power of crypto and blockchain technology to update the financial system. We want someone who is eager to leave their mark on the world, who relishes the pressure and privilege of working with high caliber colleagues, and who actively seeks feedback to keep leveling up. We want someone who will run towards, not away from, solving the company’s hardest problems.</p> <p>Our <a href="https://www.coinbase.com/mission">work culture</a> is intense and isn’t for everyone. But if you want to build the future alongside others who excel in their disciplines and expect the same from you, there’s no better place to be.</p> <p>While many roles at Coinbase are remote-first, we are not remote-only. In-person participation is required throughout the year. Team and company-wide offsites are held multiple times annually to foster collaboration, connection, and alignment. Attendance is expected and fully supported.</p></div><p>On the Money Movement team, we’re building the core infrastructure for stablecoin-based payments, enabling fast, secure, and scalable transfers across borders and platforms. This work underpins how value moves across the Coinbase ecosystem and beyond.</p> <p>As a Senior Software Engineer on the CDP Payment Risk team, you will design, build, and scale the real-time risk infrastructure that protects Coinbase’s developer payment flows — including fraud detection and transaction scoring across multi-currency, cross-border payouts. Beyond core backend engineering, this role requires hands-on ownership of ML systems: developing risk models, data pipelines, and integrating state-of-the-art LLM agents into automated risk decisioning. You will serve as the DRI for risk controls as CDP expands into new markets and payment rails (e.g., PIX, SPEI, Faster Payments), ensuring USDC↔fiat flows remain secure while maintaining a seamless customer experience.</p> <p><strong>What you’ll be doing (ie. job duties):</strong></p> <p>• Own critical risk outcomes across CDP’s payment platform, including fraud loss, abuse prevention, and user friction — continuously optimizing the trade-off between risk and seamless customer experience.<br>• Develop deep domain expertise in global payment systems and CDP products/APIs (onramps, offramps, transfers, payouts), helping shape a world-class crypto payment risk architecture as these platforms scale worldwide.<br>• Design and build state-of-the-art risk decisioning systems, including core components such as policy/rule engines, machine learning models, real-time scoring services, and autonomous risk evaluation agents.<br>• Architect and implement high-throughput data pipelines (batch, real-time, and streaming) that power risk detection, monitoring, experimentation, and model training at global scale.<br>• Develop advanced detection capabilities spanning classical machine learning, graph-based methods, anomaly detection, and agentic AI systems to proactively identify and mitigate fraud and abuse.<br>• Lead innovation at the intersection of risk, fraud, and agentic AI, conducting cutting-edge research and translating it into production systems.<br>• Contribute to the broader technical community through publications, open research, or engineering blog posts, helping establish Coinbase as a leader in next-generation payment risk technology.</p> <p><strong>What we look for in you:</strong></p> <ul> <li>Minimum 3 years of software engineering experience</li> <li>Experience building real-time risk/fraud detection systems at scale</li> <li>Designing, building, and maintaining production services in a service-oriented
    architecture</li> <li>Experience with payment risk — chargebacks, unauthorized transactions, account takeover, payment fraud typologies</li> <li>Experience with rules engines and/or ML-based risk scoring (feature engineering, model serving, decisioning)</li> <li>Working with cross-border payment flows and the risk implications of multi-currency, multi-rail settlement</li> <li>Leadership skills to develop other engineers and influence risk strategy</li> <li>Demonstrates the ability to responsibly use generative AI tools and copilots (e.g., LibreChat, Gemini, Glean) in daily workflows, continuously learn as tools evolve, and apply human‑in‑the‑loop practices to deliver business‑ready outputs and drive measurable improvements in efficiency, cost, and quality.</li> </ul> <p><strong>Nice to haves:</strong></p> <ul> <li>Experience in rapid company growth (from startup to mid-size).</li> <li>Experience at a fin'
