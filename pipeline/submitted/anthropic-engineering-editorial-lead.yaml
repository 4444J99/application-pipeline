  description: "<div class=\"content-intro\"><h2><strong>About Anthropic</strong></h2>\
    \ <p>Anthropic\u2019s mission is to create reliable, interpretable, and steerable\
    \ AI systems. We want AI to be safe and beneficial for our users and for society\
    \ as a whole. Our team is a quickly growing group of committed researchers, engineers,\
    \ policy experts, and business leaders working together to build beneficial AI\
    \ systems.</p></div><h2><strong>About the role</strong></h2> <p>Anthropic is looking\
    \ for an Editorial Lead to own our engineering blog \u2014 one of the most visible\
    \ ways we share how we build, what we learn, and why it matters. This is a role\
    \ for someone who can bridge the gap between highly technical work and a broad,\
    \ curious readership, turning complex engineering stories into posts that are\
    \ rigorous, accessible, and compelling to read.</p> <p>You\u2019ll work closely\
    \ with engineering and research teams to identify the stories worth telling, then\
    \ lead the editorial process from first draft through to publication. This isn\u2019\
    t a role where you\u2019ll be writing everything yourself \u2014 a big part of\
    \ the job is drawing out great writing from engineers who have deep expertise,\
    \ and helping them turn that expertise into something the wider world can learn\
    \ from.</p> <h2><strong>Responsibilities</strong></h2> <ul> <li>Define and maintain\
    \ the editorial strategy for the engineering blog, including editorial calendar,\
    \ content mix, and voice and tone guidelines</li> <li>Source and develop blog\
    \ post ideas in collaboration with engineering and research teams, identifying\
    \ work that is well-suited to external publication</li> <li>Edit posts end-to-end\
    \ \u2014 from substantive feedback on structure and clarity through to line-level\
    \ polish \u2014 while preserving technical accuracy and the author\u2019s voice</li>\
    \ <li>Coach and support engineers through the writing and revision process, helping\
    \ produce strong drafts and building their confidence as contributors over time</li>\
    \ <li>Work with engineering leadership and developer relations to ensure published\
