  description: '<p>Toast creates technology to help restaurants and local businesses succeed in a digital world, helping business owners operate, increase sales, engage customers, and keep employees happy.</p> <p>We are looking for a Senior Software Engineer to join our team! As a Senior Software Engineer, Backend within the Business Technology Transformation team, you will be a high-impact contributor directly influencing Toast''s financial success. Your traditional software engineering expertise will be essential across internal groups as the company expands. Specifically, within the cross-system Orders and Subscriptions team, you will be accountable for order and subscription data, from initial customer signing up to billing. The team''s mission is focused on revenue optimization and growth, driving increased recurring revenue, and enabling new go-to-market strategies through advanced pricing and billing models. Your responsibilities will cover managing the customer lifecycle after Sales and before Customer Onboarding processes, which includes orders, amendments, upsells, downsells, and renewals, leveraging service integrations between core systems like Salesforce and Zuora. Ultimately, the goal is to enhance system stability, improve the experience for customers and stakeholders through automation, and reduce the volume of customer care tickets.</p> <p><strong>A day in the life (Responsibilities)&nbsp;</strong></p> <ul> <li>Work on large-scope, high-impact projects driving significant business value.</li> <li>Design, implement, and maintain scalable, secure, and cost-effective backend systems.</li> <li>Collaborate and communicate with cross-functional product teams.</li> <li>Implement and maintain new and legacy platform integrations.</li> <li>Plan and execute application integration with existing systems.</li> <li>Draft technical designs, engineering, and testing plans for integrations.</li> <li>Work with QA automation team members to develop and automate end-to-end and unit testing for stability.</li> <li>Manage and optimize data storage, application performance, high availability, and comprehensive monitoring/alerting.</li> <li>Utilize CI/CD pipelines and containerization for automated deployment and testing.&nbsp;</li> </ul> <p><strong>What you''ll need to thrive (Requirements)</strong></p> <ul> <li>3+ years of software engineering experience, preferably in a backend role.</li> <li>Bachelor’s in Computer Science or equivalent</li> <li>Experience delivering high-quality, reliable services to production using languages such as Java, Kotlin, or other object-oriented languages.</li> <li>Experience working with REST, XML, and JSON.</li> <li>Strong understanding of query languages, data manipulation, and distribution.</li> <li>Excellent documentation, QA, version control, and attention to detail skills.</li> </ul> <p><strong>What will help you stand out (Nonessential Skills/Nice to Haves)</strong></p> <ul> <li>Experience with Workato or a similar iPaaS.</li> <li>Exposure to distributed systems, scaling challenges, SaaS, SQL, JS, &amp; Pulsar is a plus.</li> <li>Experience with Enterprise Applications like Salesforce, NetSuite, or Zuora Billing.</li> </ul> <p>&nbsp;</p> <p data-pm-slice="1 1 []"><strong>AI at Toast</strong></p> <p>At Toast, one of our company values is that we''re hungry to build and learn. We believe learning new AI tools empowers us to build for our customers faster, more independently, and with higher quality. We provide these tools across all disciplines, from Engineering and Product to Sales and Support, and are inspired by how our Toasters are already driving real value with them. The people who thrive here are those who embrace changes that let us build more for our customers; it’s a core part of our culture.</p> <p>&nbsp;</p> <p><strong>Our Total Rewards Philosophy&nbsp;</strong><br>We strive to provide competitive compensation and benefits programs that help to attract, retain, and motivate the best and brightest people in our industry. Our total rewards package goes beyond great earnings potential
    and provides the means to a healthy lifestyle with the flexibility to meet Toasters’ changing needs. Learn more about our benefits at&nbsp;<a class="c-link" href="https://careers.toasttab.com/toast-benefits" target="_blank" data-stringify-link="https://careers.toasttab.com/toast-benefits" data-sk="tooltip_parent">https://careers.toasttab.com/toast-benefits</a>.</p> <p><br><br></p><div class="content-pay-transparency"><div class="pay-input"><div class="description"><p><span style="font-weight: 400;">The base salary range for this role is listed below. The starting salary will be determined based on skills and experience. </span>In addition to base salary, our total rewards components include cash compensation (overtime, bonus/commissions, if eligible), benefits, and equity (if eligible).</p></div><div class="title">Pay Range</div><div class="pay-range"><span>$138,000</span><span class="divider">&mdash;</spa'
