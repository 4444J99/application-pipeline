  description: '<p>We’re a new team building AI-assisted tools to make Datadog developers more effective, by autonomously generating tests, fixing bugs, and improving performance.</p> <p>We’re looking for a product-minded generalist to help us quickly define and ship products that make all Datadog customers 10x developers.</p> <p><em>At Datadog, we place value in our office culture - the relationships and collaboration it builds and the creativity it brings to the table. We operate as a hybrid workplace to ensure our Datadogs can create a work-life harmony that best fits them.</em></p> <h4>What You’ll Do:</h4> <ul> <li>Work closely with our users, designers, PMs, and data scientists on cutting edge and delightful LLM-based agents.</li> <li>Work on prompts, evals, and agent tools for working with code, and on the engineering to productionize these systems and integrate them with Datadog products.</li> <li>Prototype and see what works well in the real world, iterate closely with our users, and then ship.</li> <li>Follow the latest research on LLM prompting, agents, and code editing.</li> <li>Work with other Datadog teams to expand capabilities, for example integrating with the Datadog IDE extensions to deliver a CoPilot-like assistant, or Dynamic Instrumentation to collect more runtime data from production and pre-production environments.</li> </ul> <h4>Who You Are:</h4> <ul> <li>You’re a backend engineer with at least 5 years of professional experience (Go, Java, Python) who values code simplicity and performance. You’ve shipped software that uses LLMs to production.</li> <li>You are passionate about Generative AI and its ability to help software engineers be more productive.</li> <li>You have relevant experience with Large Language Models, large-scale systems and data sets, machine learning, or adjacent fields.</li> <li>You are a great community ambassador and can drive hard technical conversations towards a pragmatic solution.</li> <li>You want to work in a fast, high-growth startup environment that respects its engineers and customers.</li> <li>You have experience writing developer tools (such as IDEs, static code analysis tools, or compilers).</li> <li>You have demonstrated ability to use AI coding tools in day-to-day workflows and validate, critique, and refine AI-generated output</li> <li>You’re motivated to push the boundaries of how AI can improve software engineering best practices and contribute to building AI-enabled products</li> </ul> <p><em>Datadog values people from all walks of life. We understand not everyone will meet all the above qualifications on day one. That''s okay. If you’re passionate about technology and want to grow your skills, we encourage you to apply.<br><br></em></p> <h4>Benefits and Growth:</h4> <ul> <li>Get to build tools for software engineers, just like yourself. And use the tools we build to accelerate our development.</li> <li>Have a lot of influence on product direction and impact on the business.</li> <li>Work with skilled, knowledgeable, and kind teammates who are happy to teach and learn.</li> <li>Competitive global benefits.</li> <li>Continuous professional development.<br><br></li> </ul> <p><em>Benefits and Growth listed above may vary based on the country of your employment and the nature of your employment with Datadog.</em></p> <p style="color: white;">#LI-Hybrid</p><div class="content-pay-transparency"><div class="pay-input"><div class="description"><p>Datadog offers a competitive salary and equity package, and may include variable compensation. Actual compensation is based on factors such as the candidate''s skills, qualifications, and experience. In addition, Datadog offers a wide range of best in class, comprehensive and inclusive employee benefits for this role including healthcare, dental, parental planning, and mental health benefits, a 401(k) plan and match, paid time off, fitness reimbursements, and a discounted employee stock purchase plan.</p></div><div class="title">The reasonably estimated yearly salary for this role at Datadog is:</div><div class="pay-range"><span>$187,000</span><span
    class="divider">&mdash;</span><span>$240,000 USD</span></div></div></div><div class="content-conclusion"><hr> <p><strong>About Datadog:&nbsp;</strong></p> <p>Datadog (NASDAQ: DDOG) is a global SaaS business, delivering a rare combination of growth and profitability. We are on a mission to break down silos and solve complexity in the cloud age by enabling digital transformation, cloud migration, and infrastructure monitoring of our customers’ entire technology stacks. Built by engineers, for engineers, Datadog is used by organizations of all sizes across a wide range of industries. Together, we champion professional development, diversity of thought, innovation, and work excellence to empower continuous growth. Join the pack and become part of a collaborative, pragmatic, and thoughtful people-first community where we solve tough problems, take smart risks, and celebrate one another. Le'
