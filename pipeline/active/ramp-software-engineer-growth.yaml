  description: "About Ramp Ramp is building the smart infrastructure for finance teams,\
    \ embedded in the transaction flow of every dollar a business spends. We automate\
    \ how over $100B in annualized spend flows in and out of 50,000+ companies: authorizing\
    \ payments, flagging risk, categorizing spend, and closing books. The problems\
    \ are high-stakes, data-dense, and unforgiving. We hire people with high agency\
    \ and high urgency. We look for slope over intercept. We care less about where\
    \ you trained and more about what you\u2019ve built. At Ramp, everyone is a builder\
    \ who owns problems end to end and makes consequential decisions that shape the\
    \ outcome. The median Ramp customer saves 5% and grows revenue 16% in their first\
    \ year \u2013 far in excess of businesses operating without Ramp. We believe every\
    \ ambitious company deserves the same. If you want to build systems that directly\
    \ shape how companies move and manage billions, Ramp is the place to do it. About\
    \ the Role The Core Growth team owns the product platform that powers nearly every\
    \ growth channel at Ramp. As an engineer here, you\u2019ll own applications that\
    \ power our product-led growth engine and work cross-functionally to expand Ramp's\
    \ serviceable market. You\u2019ll partner with product, data, and design, and\
    \ work directly with stakeholders across growth, sales, marketing, and finance\
    \ to accelerate Ramp\u2019s growth. This role offers the opportunity to shape\
    \ Ramp\u2019s growth engine with high ownership and direct impact. Check out our\
    \ Engineering Blog to learn more about our tech stack, mission, and values! What\
    \ You\u2019ll Do Build software to grow Ramp to its next millions of users Scale\
    \ our customer success, sales, and marketing functions through automation and\
    \ AI assistance Drive business outcomes through metric-driven software development\
    \ Work in a dynamic engineering team with partners in product, data, and design\
    \ Own the customer journey from discovering and applying to Ramp through onboarding,\
    \ activating onto our product suite, and expanding usage over time What You Need\
    \ Minimum of 3 years of experience in a software development role Experience shipping\
    \ fast, reliable applications using modern development tools and infrastructure\
    \ Ability to thrive in a fast-paced, constantly improving, start-up environment\
    \ that focuses on solving problems with iterative technical solutions Ability\
    \ to improvise and develop creative solutions when common approaches fail. Strong\
    \ value of pragmatism over idealism in times of uncertainty Perpetual curiosity\
    \ and passion for honing your craft Nice-to-Haves Start up experience as a technical\
    \ co/founder or early engineer Experience with the modern data stack - including\
    \ ETL tools like Fivetran, workflow orchestrators like Airflow, and data platforms\
    \ like Snowflake Experience with applying AI/LLMs in production use cases Strong\
    \ perspective on engineering development cycle (system design, documentation +\
    \ testing, best practices for codebase development) Understanding of the tools\
    \ that power marketing/sales automation, personalization, and analytics Benefits\
    \ (for U.S.-based full-time employees) 100% medical, dental & vision insurance\
    \ coverage for you Partially covered for your dependents One Medical annual membership\
    \ 401k (including employer match on contributions made while employed by Ramp)\
    \ Flexible PTO Fertility HRA (up to $10,000 per year) Parental Leave Unlimited\
    \ AI token usage Pet insurance Centralized home-office equipment ordering for\
    \ all employees Health and Wellness stipend In-office perks: lunch, snacks, drinks,\
    \ and more Budget for intra-office travel Relocation support to NYC or SF (as\
    \ needed) Referral Instructions If you are being referred for the role, please\
    \ contact that person to apply on your behalf. Other notices Pursuant to the San\
    \ Francisco Fair Chance Ordinance, we will consider for employment qualified applicants\
    \ with arrest and conviction records. Beware of recruiting scams: Ramp will only\
    \ contact you through official @ Ramp.com email addresses and will never ask for\
    \ payment or sensitive personal information during the hiring process. Ramp Applicant\
    \ Privacy Notice"
