    from a customer-focused perspective and use data to propose high ROI improvements
    to our product and operations</li> <li>Collaborate with colleagues and other teams
    in Atlas to scope, spec and deliver new features</li> <li>Define your top priorities
    and focuses, communicate them, and execute against them</li> <li>Improve and maintain
    our codebase by applying best practices and fundamental software design principles</li>
    </ul> <h3>Candidate Profile</h3> <ul> <li>3+ years experience in software engineering,
