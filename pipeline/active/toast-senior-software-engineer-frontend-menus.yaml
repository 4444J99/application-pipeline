  description: '<p><strong>Location(s):&nbsp;</strong>US (remote), Boston (hybrid),
    or New York (hybrid)</p> <p><strong>Role focus: </strong>Fullstack, frontend leaning</p>
    <p>&nbsp;</p> <p>Every restaurant is unique, and a restaurant’s menu expresses
    its individual brand and product offerings. Inside a Toast restaurant, the definition
    of the menu becomes the common language between guests, servers, and the kitchen.
    In our digital ordering products, a great menu serves as both a billboard and
    a roadmap to an excellent dining experience. It is the central hub for restaurant
    configuration– it determines what guests can order, how the dishes are presented
    and priced in different contexts, where they are routed for fulfillment and how
    they are coursed, how they are prepared, whether the ingredients are still available,
    and how they are classified for reporting. A menu is always evolving: kitchens
    create new dishes, managers experiment with pricing and presentation, and staff
    optimize the menu for restaurant operations.&nbsp;</p> <p>We create products to
    satisfy the vast breadth of our restaurants, from single-location coffee shops
    to complex enterprise brands with thousands of locations. We offer an extremely
    powerful and configurable menu platform, and our team exists to ensure that this
    flexibility can be managed effectively at any scale. This includes feature-rich
    menu data models, APIs for both first and third party integrations (eg: DoorDash
    and other ordering partners), and the user experiences for configuring menus that
    meet a vast variety of needs, from complex customer segments (eg: Pizza shops)
    to our evolving Retail platform.&nbsp;</p> <p>We are looking for a senior engineer
    who is motivated by these challenges and eager to transform our menus architecture
    to meet the dynamic needs of our customers and our rapidly growing business. Come
    join our team to make an impact on this critical domain that affects all Toast
    customers!</p> <p><strong>About this </strong><strong><em>roll</em></strong><strong>*
    (Responsibilities)&nbsp;</strong></p> <ul> <li>Lead frontend architecture decisions
    for complex, high-scale menu management workflows</li> <li>Design scalable, maintainable,
    and reliable UI patterns that support enterprise customers managing thousands
    of locations</li> <li>Build, deploy, and maintain resilient, scalable features
    within Toast’s menu management platform</li> <li>Collaborate with UX, PM, QA and
    Engineering to define, design, and build best-in-class solutions in a complex
    and fast-moving environment</li> <li>Champion best practices for development,
    deployment and quality life-cycles</li> <li>Contribute to and evolve Toast’s design
    system and shared frontend libraries to ensure consistency and scalability across
    products</li> <li>Guide the growth &amp; development of peer engineers with mentoring
    and coaching</li> <li>Collaborate with team to plan and estimate work</li> <li>Influence
    frontend standards and best practices across Toast R&amp;D</li> </ul> <p><strong>Do
    you have the right </strong><strong><em>ingredients*</em></strong><strong>? (Requirements)</strong></p>
    <ul> <li>5+ years of experience building and maintaining production software systems</li>
    <li>Bachelor’s degree in Computer Science, Software Engineering, Computer Engineering,
