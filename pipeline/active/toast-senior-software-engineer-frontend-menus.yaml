    building large-scale React applications with TypeScript</strong></li> <li>Experience
    designing scalable component architectures and managing complex client-side state
    in large applications</li> <li>Experience designing and consuming GraphQL and
    REST APIs, including schema evolution, versioning, and client-side data management
    strategies</li> <li>Actively leverages AI-assisted development tools to accelerate
    iteration, improve code quality, and enhance architectural exploration</li> <li>Demonstrated
    ability to lead the design and delivery of high-impact, scalable solutions in
    complex, data-intensive user interfaces</li> <li>Experience contributing to or
    evolving shared component libraries or design systems used across multiple teams</li>
    <li>Experience monitoring and debugging production frontend systems using logging,
    metrics, and tracing tools</li> <li>Strong leadership and mentoring skills</li>
    <li>Excellent communication skills, with the ability to articulate complex technical
    concepts to diverse audiences</li> <li>Passionate about driving innovation and
    continuously improving engineering practices</li> </ul> <p data-pm-slice="1 1
