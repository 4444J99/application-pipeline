    a whole. Our team is a quickly growing group of committed researchers, engineers,
    policy experts, and business leaders working together to build beneficial AI systems.</p></div><h2>About
    the role</h2> <p>The Corporate Infrastructure team builds and operates the platform
    layer the rest of IT Engineering runs on — cloud infrastructure hosting our internal
    services, the CI/CD that ships IT''s own code, the observability stack across
    the corporate environment, and the cross-system automation that wires together
    tools never designed to talk to each other.</p> <p>You''ll build deployment pipelines
    and internal tooling that let IT Engineering ship like a product team. You''ll
    define SLOs for corporate services, build the monitoring to know when we''re missing
    them, and run on-call for the things you deploy. You''ll partner with our network
    and AV engineers as their infrastructure counterpart — automating physical-world
    systems, building the telemetry that tells us an office is degraded before someone
    files a ticket. The scope is broad and the team is deliberately small, which means
    you''ll need depth across cloud, CI, and observability, strong judgment about
    where to invest, and a bias toward infrastructure-as-code over heroic manual fixes.</p>
    <p>You''ll report into IT Engineering and partner closely with Security, Network
    Engineering, and the broader IT org on the systems they depend on. This role is
    high-autonomy: you''ll own the infrastructure roadmap, make architecture decisions,
    and be the engineer the rest of IT builds on. Your work will directly shape how
    we scale to AI Safety Level 4 and beyond.</p> <h2>Responsibilities</h2> <ul> <li>Build
    and operate the cloud infrastructure that hosts IT''s internal services</li> <li>Design
