    <li>Improve the safety, speed, and correctness of infrastructure changes.</li>
    <li>Lead technical initiatives that reduce manual operations and eliminate error-prone
    workflows.</li> <li>Balance <strong>reliability, security, and cost efficiency</strong>
    at global scale.</li> <li>Mentor engineers and raise the technical bar across
    the organization.</li> </ul> <p>&nbsp;</p> <p><strong>Who You Are:&nbsp;</strong></p>
