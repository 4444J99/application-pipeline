  description: 'ABOUT POOLSIDE In this decade, the world will create Artificial General
    Intelligence. There will only be a small number of companies who will achieve
    this. Their ability to stack advantages and pull ahead will define the winners.
    These companies will move faster than anyone else. They will attract the world''s
    most capable talent. They will be on the forefront of applied research, engineering,
    infrastructure and deployment at scale. They will continue to scale their training
    to larger & more capable models. They will be given the right to raise large amounts
    of capital along their journey to enable this. They will create powerful economic
    engines. They will obsess over the success of their users and customers. Poolside
    exists to be this company : to build a world where AI will be the engine behind
    economically valuable work and scientific progress. We believe the fastest way
    to reach AGI lies in accelerating software development itself, by reshaping the
    developer experience with agentic systems, coding assistants, and the frontier
    models that power them. We deploy these systems directly into the development
    environments of security-conscious enterprises. ABOUT OUR TEAM We were founded
    in the US and have our home there, but our team is distributed across Europe and
    North America. We get our fix of in-person collaboration (and croissants) in Paris
    each month for 3 days, always Monday-Wednesday, with an open invitation to stay
    the whole week. We also do longer off-sites once a year. Our team is a multidisciplinary
    blend of research, engineering, and business experts. What unites us is our deep
    care for what we build together. We’re in a race that requires hard work, intellectual
    curiosity, and obsession; to balance this intensity, we’ve assembled a team of
    low ego and kind-hearted individuals who have built the special culture Poolside
    has. By building collaboratively and with intention, we create a compounding effect
    that moves the entire company forward towards our mission: reaching AGI through
    intelligence systems built for software development. ABOUT THE ROLE You’ll join
    our Applied Research Engineering group to help build poolside’s coding agents.
    Your work will center on building the core agent framework, the supporting tools,
    and the orchestration environment needed to run coding agents securely, reliably,
    and at scale. We’re looking for strong software engineers with a passion for building
    reliable, high-performance systems. Experience (or strong interest) in AI coding
    agents is a significant plus. In this role, you’ll collaborate closely with our
    product engineering and research teams to continuously build and improve our platform
    for coding agents. YOUR MISSION Help us design and deliver the most capable AI
    agents for software engineering tasks, pushing the boundaries of what AI agents
    can do. RESPONSIBILITIES Design, build, and maintain the core framework for poolside’s
    coding agents Develop scalable, secure, and isolated runtime environments to run
    agents in complex enterprise environments Collaborate with research and product
    teams to prototype, develop, and evaluate new agent capabilities Continuously
    improve the performance, reliability, and developer experience of our platform
    SKILLS & EXPERIENCE Solid understanding of AI agents, or a strong interest in
    developing expertise in this area Strong programming skills in either Go, C, C++
    or Python (we are open to polyglot engineers from other languages) Plus: Experience
    in large scale, distributed data systems Plus: Familiarity with container runtimes,
    microVMs, or sandboxing systems PROCESS Intro call with a member of our team Technical
    Interview(s) with a member of our engineering team Team fit call with the People
    team Final interview with one of our Founding engineers BENEFITS Fully remote
    work & flexible hours 37 days/year of vacation & holidays Health insurance allowance
    for you & dependents Company-provided equipment Well-being, always-be-learning
    & home office allowances Frequent team get togethers Diverse & inclusive people-first
    culture'
