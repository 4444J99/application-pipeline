    <hr> <p><strong>About Gusto</strong></p> <p><span style="font-weight: 400;">At
    Gusto, we''re on a mission to grow the small business economy. We handle the hard
    stuff—like payroll, health insurance, 401(k)s, and HR—so owners can focus on their
    craft and customers. With teams in Denver, San Francisco, and New York, we’re
    proud to support more than 400,000 small businesses across the country, and we’re
    building a workplace that represents and celebrates the customers we serve. Learn
    more about our </span><a href="https://gusto.com/about/careers/total-rewards"><span
    style="font-weight: 400;">Total Rewards philosophy</span></a><span style="font-weight:
    400;">.&nbsp;</span></p></div><h2>About the role</h2> <p>Gusto is looking for
    a Staff AI/ML Engineer to join the Applied Data Science team at Gusto Retirement-App.&nbsp;This
    is a critical role to build AI and ML framework and infrastructure to enable us
    to strengthen and optimize how data is used to enable customer journey and experience
    at Gusto.</p> <h2>Here’s what you’ll do day-to-day</h2> <ul> <li><strong>Develop,
    test, and deploy</strong> AI/ML models to solve complex business problems, such
    as anomaly detection, personalized experience, generative AI application, algorithm
    &amp; optimization.</li> <li>Transition models from proof-of-concept to <strong>production-ready
    solutions</strong>, ensuring scalability and performance.</li> <li>Review and
    contribute to codebases, participate in pull requests, and maintain <strong>high-quality
    engineering standards</strong>.</li> <li>Work with <strong>containerized environments
    </strong>to deploy, monitor, and troubleshoot ML services.</li> <li>Collaborate
    closely with <strong>cross-functional teams</strong>, including analytics, engineering,
    products and business stakeholders, to align solutions with organizational needs.</li>
    <li>Become a <strong>domain expert</strong> in key business areas, enabling you
    to craft intelligent, impactful data-driven solutions.</li> </ul> <h2>Here’s what
    we’re looking for</h2> <ul> <li><strong>PhD with 3+ years</strong> or <strong>MS
    with 5+ years</strong> of industry experience in applied ML/GenAI, data science,
    or a related field.</li> <li><strong>Proven track record</strong> of developing
    and deploying ML solutions in production, from PoC to scalable systems.</li> <li><strong>Strong
    programming skills</strong> (Python, Javascript, C++, Java, or Scala) and proficiency
    in SQL for data extraction and manipulation.</li> <li><strong>Hands-on experience</strong>
    with cloud platforms (AWS, GCP, or Azure), MLOps, and containerization (Docker,
    Kubernetes).</li> <li><strong>Ability to work cross-functionally</strong>, translating
    business needs into AI-driven solutions and communicating effectively with technical
    and non-technical stakeholders.</li> </ul> <p>Our cash compensation amount for
    this role is targeted at $230k-280k for San Francisco, New York, and Seattle $205k
    - 255k in Los Angeles, $185k-234k in Denver, and 200k-250k CAD for Toronto. Final
    offer amounts are determined by multiple factors including candidate experience
    and expertise and may vary from the amounts listed above.</p><div class="content-conclusion"><hr>
    <p><span style="font-weight: 400;">Gusto has physical office spaces in Denver,
    San Francisco, and New York City. Employees who are based in those locations will
    be expected to work from the office on designated days approximately <strong>2-3
    days </strong>per week (or more depending on role). The same office expectations
    apply to all Symmetry roles, Gusto''s subsidiary, whose physical office is in
    Scottsdale.</span></p> <p>Note: The San Francisco office expectations encompass
    both the San Francisco and San Jose metro areas.&nbsp;</p> <p>When approved to
    work from a location other than a Gusto office, a secure, reliable, and consistent
    internet connection is required. This includes non-office days for hybrid employees.</p>
    <hr> <p><span style="font-weight: 400;">Our customers come from all walks of life
    and so do we. We hire great people from a wide variety of backgrounds, not just
    because it''s the right thing to do, but because it makes our company stronger.
    If you share our values and our enthusiasm for small businesses, you will find
    a home at Gusto.&nbsp;</span></p> <p><span style="font-weight: 400;">Gusto is
