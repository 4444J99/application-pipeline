  description: <h2><strong>Who we are</strong></h2> <h3><strong>About Stripe&nbsp;</strong></h3>
    <p>Stripe is a financial infrastructure platform for businesses. Millions of companies—from
    the world’s largest enterprises to the most ambitious startups—use Stripe to accept
    payments, grow their revenue, and accelerate new business opportunities. Our mission
    is to increase the GDP of the internet, and we have a staggering amount of work
    ahead. That means you have an unprecedented opportunity to put the global economy
    within everyone’s reach while doing the most important work of your career.</p>
    <h3><strong>About the organization&nbsp;</strong></h3> <p>Stripe Infrastructure
    is responsible for the reliability, scale, performance, and cost of Stripe’s systems
    and the productivity and sentiment of Stripe’s people.&nbsp;</p> <p>You may work
    on a wide variety of critical business areas including:&nbsp;</p> <ul> <li><strong>Core
    Infrastructure - </strong>We’re the home for Stripe's critical tier0 infrastructure
    systems (Compute, Networking, DocumentDB, Distributed Caching and High assurance
    engineering). We build the foundational platform for Stripe products and services
    to allow them to operate at scale. We drive reliability, availability, efficiency
    and scalability of these systems<strong>.</strong></li> <li><strong>Developer
    Infrastructure - </strong>We’re responsible for the productivity of all developers
    at Stripe. Ensure Stripe’s engineers have a reliable, fast, and easy-to-use inner
    dev loop to maximize productivity while building everything from low-latency microservices
    to large-scale data pipelines and machine learning models</li> <li><strong>Data
    Infrastructure -&nbsp; </strong>We’re responsible for offering data serving infrastructure
    spanning across data warehouse analytics, streaming analytics and search capabilities.
    The stack is supported by a collection of internally developed large scale distributed
    services and several popular open source technologies like Trino/Presto, Apache
    Pinot, Hive Metastore, ElasticSearch etc. The systems we own support all of the
    data serving needs of high scale services and thousands of individual Stripes
    across the company.&nbsp;</li> <li><strong>Admin Platform - </strong>We empower
    Stripes to quickly build secure and delightful internal products in service of
    their users.</li> <li><strong>Service Platform - </strong>We enable engineering
    teams at Stripe to easily write and ship useful services that correctly, reliably,
    and efficiently leverage platform capabilities.</li> <li><strong>Developer Productivity
    AI</strong> - We're responsible for doubling Stripe's engineering velocity through
    effective use of LLMs. We own Minions, Stripe’s one-shot, end-to-end coding agents.&nbsp;</li>
    </ul> <p><strong>Team Matching:</strong> exact team matching for one of the subteams
    will begin during final stages.<em>&nbsp;</em><em>Please note we may also consider
    you for different orgs based on your experience, location, etc.&nbsp;</em>More
    information on our team matching process can be found <a href="https://docs.google.com/document/d/1zvJkO2c7GzukHG-_oqc5wbOLajpuh5FjbmZPcZPU1o0/edit?tab=t.0#heading=h.ahb3b6nrktv1">here</a>.</p>
    <h3><strong>What you’ll do</strong></h3> <p>You will work on projects that span
    technologies, systems, and processes where you will design, build, test, and ship
    great code every day.</p> <p><strong>Responsibilities</strong></p> <ul> <li>Build
    a great customer experience for internal and external Stripe teams using our infrastructure</li>
    <li>Participate in roadmap planning and prioritization</li> <li>Deliver value
    through a strong collaborative approach with multiple customers and stakeholders
    across Stripe</li> <li>Debug production issues across services and several levels
    of the stack</li> </ul> <h3><strong>Who you are</strong></h3> <p>We’re looking
    for someone who meets the minimum requirements to be considered for the role.
    If you meet these requirements, you are encouraged to apply. The preferred qualifications
    are a bonus, not a requirement.</p> <h3><strong>Minimum Requirements&nbsp;</strong></h3>
    <ul> <li>Strong software engineering skills and a passion for one of the areas
    above.</li> <li>Ability to write high quality code (in programming languages like
    Go, Java, C/C++ etc)</li> <li>2-12+ years of professional hands-on software development
    experience, able to write well-factored algorithms and have experience with commonly
    used data structure and algorithms</li> <li>Hands-on experience contributing to
    or building large scale distributed systems</li> <li>Strong collaboration skills,
    can work across workstreams within your team and contribute to your peers’ success</li>
    <li>Customer obsession, ability to articulate and represent customer experience
    in various forums to drive the right outcome</li> <li>Have the ability to thrive
    on a high level of autonomy, responsibility, and think of yourself as entrepreneurial</li>
    </ul> <h3><strong>Preferred Qualifications</strong><
