  description: "<div class=\"content-intro\"><p>Lithic is the modern card issuing\
    \ and processing platform empowering ambitious financial companies to build the\
    \ future of payments.</p> <p>Our infrastructure powers card programs for 100+\
    \ innovative clients, from fintechs reimagining credit and digital banking to\
    \ platforms transforming disbursements and spend management. Companies like Mercury,\
    \ Flex, and Novo rely on Lithic's developer-friendly APIs, direct network connections,\
    \ and flawless reconciliation to launch and scale card programs in weeks, not\
    \ years.</p> <p>We're building a future where access to better financial products\
    \ materially improves people's lives, free from the constraints of 30-year-old\
    \ mainframes and legacy processors. We're proud to be backed by world-class investors\
    \ who share that vision, including Bessemer Venture Partners, Index Ventures,\
    \ Spark Capital, Stripes, and Mastercard, along with many others.</p> <p>We're\
    \ a team of 160+ across 26 states and 7 countries, headquartered in New York City.\
    \ Our values (Customer Centricity, Deliver Excellence, Act Like an Owner, Iterate\
    \ Iterate Iterate, Teach Others, and Be a Good Neighbor) shape how we work and\
    \ grow as a team.</p></div><p>We are hiring a <strong>Senior Software Engineer</strong>\
    \ for our Treasury team to lead Lithic\u2019s next phase of growth. The Treasury\
    \ team maintains and builds the backend services that manage the flow of funds\
    \ between Lithic and third parties. This includes our ledger, ACH and wire infrastructure,\
    \ and associated reconciliation.&nbsp;The systems we maintain have high standards\
    \ of reliability and correctness.&nbsp;You will become an expert in the card payments\
    \ space. The Treasury team primarily uses Python for their tech stack.</p> <h3><strong>What\
    \ You'll Do:</strong></h3> <ul> <li>Ensure high reliability and correctness for\
    \ Lithic\u2019s ledger and orchestrated funds flows</li> <li>Develop new features\
    \ to better serve Lithic customers</li> <li>Ensure that the team is delivering\
    \ reliable, secure, and scalable code with minimal tech debt</li> <li>Own initiatives\
    \ from planning to launch, keeping stakeholders informed and aligned along the\
    \ way</li> <li>Lead efforts to improve systems and processes within the team</li>\
    \ <li>Participate in the team on-call rotation</li> </ul> <h3><strong>What You\
    \ Bring</strong></h3> <ul> <li>Thrive at turning requirements into working software\
    \ swiftly</li> <li>Enjoy working in a fast-moving environment</li> <li>Experience\
    \ shipping in production environment and leading projects</li> <li>Strong distributed\
    \ system instincts and design skills</li> <li>Experience in or desire to learn\
    \ Python</li> <li>Ability to lead cross-functional projects and step in as a strong\
    \ individual contributor</li> <li>Growth mindset and continuous desire to learn\
    \ and improve</li> <li>An interest in fintech and the payments space is preferred</li>\
    \ </ul> <p>The annual US salary range for this role is $160,000 - $200,000 plus\
    \ equity. This salary range may be inclusive of several career levels at Lithic\
    \ and will be narrowed during the interview process based on the candidate\u2019\
    s experience and qualifications.</p> <p>This is a remote position. However, candidates\
    \ must be located in the United States, Canada, Netherlands, Poland, or Czech\
    \ Republic. We do not offer visa sponsorship or assistance.</p> <p>&nbsp;</p><div\
    \ class=\"content-conclusion\"><h3>Benefits for Full-Time US Employees:</h3> <ul>\
    \ <li>Unlimited PTO</li> <li>12-weeks fully paid parental leave</li> <li>4-Week\
    \ Fully Paid Sabbatical (earned at your 5-year anniversary)</li> <li>Work From\
    \ Anywhere: work from anywhere in the world 4-weeks each year</li> <li>3% cashback\
    \ on card purchases with your complimentary <a href=\"http://Privacy.com\">Privacy.com</a>\
    \ employee account</li> <li>Health, vision, and dental insurance; HSA Contribution\
    \ Match</li> <li>401(k) match</li> <li>Voluntary Life Insurance and STD/LTD</li>\
    \ </ul> <p data-pm-slice=\"0 0 []\">NYC-based employees work from our SoHo office\
    \ three days a week. Tuesdays and Thursdays are our core days, and you'll choose\
    \ a third day that works for your schedule and team needs.</p> <p>In-office employees\
    \ receive:&nbsp;</p> <ul> <li>Commuter benefit</li> <li>Catered lunch every Tuesday\
    \ and Thursday</li> </ul></div>"
