    deliver different features.</p> <p><strong>What you''ll be doing:</strong></p>
    <ul> <li>Articulate a long term vision for maintaining and scaling our backend
    systems.</li> <li>Work with engineers, designers, product managers and senior
    leadership to turn our product and technical vision into a tangible roadmap every
    quarter.</li> <li>Write high quality, well tested code to meet the needs of your
    customers</li> </ul> <p><strong>What we look for in you:</strong></p> <ul> <li>You
    have at least 2+ years of experience in software engineering.</li> <li>You’ve
