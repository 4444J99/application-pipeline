  description: "Why Harvey At Harvey, we\u2019re transforming how legal and professional\
    \ services operate \u2014 not incrementally, but end-to-end. By combining frontier\
    \ agentic AI, an enterprise-grade platform, and deep domain expertise, we\u2019\
    re reshaping how critical knowledge work gets done for decades to come. This is\
    \ a rare chance to help build a generational company at a true inflection point.\
    \ With 1000+ customers in 58+ countries, strong product-market fit, and world-class\
    \ investor support, we\u2019re scaling fast and defining a new category in real\
    \ time. The work is ambitious, the bar is high, and the opportunity for growth\
    \ \u2014 personal, professional, and financial \u2014 is unmatched. Our team is\
    \ sharp, motivated, and deeply committed to the mission. We move fast, operate\
    \ with intensity, and take real ownership of the problems we tackle \u2014 from\
    \ early thinking to long-term outcomes. We stay close to our customers \u2014\
    \ from leadership to engineers \u2014 and work together to solve real problems\
    \ with urgency and care. If you thrive in ambiguity, push for excellence, and\
    \ want to help shape the future of work alongside others who raise the bar, we\
    \ invite you to build with us. At Harvey, the future of professional services\
    \ is being written today \u2014 and we\u2019re just getting started. Role Overview\
    \ As a senior member of our founding Forward Deployed Engineer (FDE) team, you\u2019\
    ll embed with Harvey\u2019s enterprise customers (Am Law firms, in-house teams\
    \ at large enterprises, and other professional services organizations) to turn\
    \ cutting\u2011edge AI systems into production\u2011grade workflows that deliver\
    \ measurable outcomes fast. You\u2019ll move from prototype to deployment quickly,\
    \ surface patterns from the field, and feed them back into Harvey\u2019s platform\
    \ and product roadmap. You\u2019ll start from open\u2011ended, high\u2011leverage\
    \ problems, design and implement end\u2011to\u2011end solutions with real users\
    \ and data, and ship to production under tight feedback loops. This role is based\
    \ in New York, NY. We use an in-person work model and offer relocation assistance\
    \ to new employees.. What You'll Do Embed with customers to map out workflows,\
    \ de\u2011risk constraints, and define crisp success metrics for custom builds.\
    \ Design \u2192 prototype \u2192 productionize custom workflows: customize knowledge\
    \ sources and retrieval pipelines, tool use/agents, prompts, and guardrails; then\
    \ harden them for reliability, observability, and scale. Integrate workflows with\
    \ clients systems (DMS, KM, ticketing, identity/SSO) and data sources; standing\
    \ up secure connectors to the rest of the Harvey platform. Build and maintain\
    \ evals & harnesses that capture real\u2011world quality on a client-by-client\
    \ basis, wiring those signals into iteration loops and model choices. Operationalize\
    \ adoption: run training, write crisp runbooks, and hand-off durable playbooks\
    \ to customer champions\u2014and to Harvey product/eng\u2014so wins scale beyond\
    \ one account. Surface field patterns (recurring prompts, tools, workflows, failure\
    \ modes) that inform platform capabilities and future product bets. How you will\
    \ make a 10x Impact High Beta : You understand that volatility is the normal course\
    \ of action, and you embrace it. You assume failure is the most likely outcome,\
    \ so you fail fast and learn. You are transparent about failure, and you actively\
    \ try to kill your own ideas by tackling the hardest problems first. You don\u2019\
    t subscribe to sunk costs. Unreasonable hospitality : You practice unreasonable\
    \ hospitality, grounding your technical work in a deep obsession with the customer.\
    \ You will spend as much time understanding the \"why\" from users as you do building\
    \ the \"what,\" ensuring our bets are aimed at solving real, meaningful problems.\
    \ Action, action, and still more action : You live by a relentless bias for action.\
    \ You believe progress is measured by what you build and learn, not what you discuss\
    \ in meetings. You prioritize shipping and getting real-world feedback over perfecting\
    \ a plan on paper. Contrarian, with common sense : You constantly think about\
    \ what\u2019s missing, not what\u2019s working well today. You feel uncomfortable\
    \ when an idea becomes consensus. But you match ambitious ideas with pragmatic\
    \ execution. You find the most straightforward path to de-risk a complex concept,\
    \ focusing on proving value quickly rather than over-engineering a solution. What\
    \ You Have 5+ years building and operating production software with meaningful\
    \ 0\u21921 ownership and the ability to operate under ambiguity. Experience building\
    \ LLM\u2011powered applications (retrieval, tools/agents, structured outputs,\
    \ prompt/runtime safety) and taking them to production. Comfort working directly\
    \ with customers\u2014from scoping ambiguous problems to shipping, integrating,\
    \ training, and iterating on adoption. Practical experience with evals (designing\
    \ task suites, pipelines, and dashboards that reflect user quality); you use evals\
    \ to drive model/product decisions. Clear, concise communication; low\u2011ego\
    \ collaboration; appetite for in\u2011person pairing with teammates and customers\
    \ in NYC. Compensation Range $200,000-"
