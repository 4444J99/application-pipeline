    and machine learning. As a member of our team, you will exercise and develop expertise
    in those areas, using open-source projects such as Apache Spark™, MLflow, and
    Delta Lake. This is a customer-facing role, where you will work with customers,
    your teammates, the product team, and our post-sales teams, to identify use cases
    for Databricks, develop architectures and solutions using our platform, and guide
    customers through the implementation, to accomplish value. In that process, you
    will build relationships with our customers, find and build champions, and become
    a trusted advisor. You will report to the Sr. Field Engineering Manager for the
    team.</p> <p><strong>The impact you will have:</strong></p> <ul> <li>Partner with
    the sales team to help customers understand how Databricks can help solve their
    business problems</li> <li>Provide technical leadership for customers to evaluate
    and adopt Databricks</li> <li>Consult on big data architecture, implement proof
    of concepts for strategic customer projects, data science and machine learning
    projects, and validate integrations with cloud services and other 3rd party applications</li>
    <li>Build and present references architectures, how-tos, and demo applications
    for customers</li> <li>Become an expert in, and promote Databricks inspired open-source
