    through meetups, conferences, and webinars</li> <li>Travel to customers in your
    region</li> </ul> <p><strong>What we look for:</strong></p> <ul> <li>4+ years
    in a customer-facing pre-sales, technical architecture, or consulting role</li>
    <li>Experience designing and architecting distributed data systems</li> <li>Comfortable
