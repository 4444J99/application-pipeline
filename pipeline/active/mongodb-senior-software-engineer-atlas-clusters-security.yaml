  description: '<p>MongoDB is seeking a senior software engineer to join the Atlas
    Clusters Organization. The organization is responsible for building MongoDB Atlas,
    our database as a service offering and fastest growing product.<strong> </strong>Atlas
    allows users to deploy fault-tolerant, secure, globally distributed MongoDB clusters
    in just minutes. This includes developing software to interface with the three
    major cloud providers (AWS, Azure, and GCP) in order to bring security, durability,
    availability, and performance to all deployments of MongoDB.</p> <p>The Atlas
    Clusters Security team creates a first-in-class cloud database security experience
    for our wide range of sophisticated customers. Our team develops and maintains
    systems for cluster networking, data encryption, database authentication, and
    more–enabling countless mission critical applications across the world.</p> <p>This
    role can be based in New York City for our hybrid working model, or remotely on
    the East Coast.</p> <h3>What you’ll do</h3> <ul> <li>Build and design new features
    for MongoDB Atlas</li> <li>Contribute to and lead complex technical projects</li>
    <li>Work closely with product and design teams, considering the user’s perspective
    while building technical solutions</li> <li>Work with customers and support engineers
    to fix issues</li> <li>Collaborate with team members to develop our codebase,
    best practices, and design principles</li> <li>Learn from and mentor other team
    members</li> </ul> <h3>We’re looking for someone who</h3> <ul> <li>Has at least
    5 years of professional software development experience</li> <li>Is skilled at
    writing large-scale, distributed backend systems in a compiled language (Java,
    C#, Go, etc.)</li> <li>Is comfortable working across the stack of a modern web
    application (e.g. React, TypeScript)</li> <li>Has experience with at least one
    major cloud provider technology (AWS, Azure, GCP)</li> <li>Has led the launch
    of a new module and maintained it in production</li> <li>Is eager to solve tough
    problems</li> <li>Has excellent communication skills</li> <li>Is curious, collaborative,
    and motivated</li> </ul> <h3>Special requirements</h3> <ul> <li>Be a US Citizen</li>
    </ul> <h3>Success measures</h3> <ul> <li>In 3 months, you''ll have shipped code
    into production and collaborated with the team to solve tough problems</li> <li>In
    6 months, you''ll have contributed to a large project</li> <li>In 12 months, you''ll
    have designed new features, led development work, and become a go-to expert on
    parts of the system</li> </ul> <h3>About MongoDB</h3> <p>MongoDB is built for
    change, empowering our customers and our people to innovate at the speed of the
    market. We have redefined the database for the AI era, enabling innovators to
    create, transform, and disrupt industries with software. MongoDB’s unified database
    platform, the most widely available, globally distributed database on the market,
    helps organizations modernize legacy workloads, embrace innovation, and unleash
    AI. Our cloud-native platform, MongoDB Atlas, is the only globally distributed,
    multi-cloud database and is available across AWS, Google Cloud, and Microsoft
    Azure.</p> <p>With offices worldwide and over 60,000 customers, including 75%
    of the Fortune 100 and AI-native startups, relying on MongoDB for their most important
    applications, we’re powering the next era of software.</p> <p>Our compass at MongoDB
    is our <a href="https://www.mongodb.com/company">Leadership Commitment,</a> guiding
    how and why we make decisions, show up for each other, and win. It’s what makes
    us MongoDB.&nbsp;</p> <p>To drive the personal growth and business impact of our
    employees, we’re committed to developing a supportive and enriching culture for
    everyone. <a href="https://www.mongodb.com/company/blog/culture/employee-benefits-that-make-a-difference-at-mongodb">From
    employee affinity groups, to fertility assistance and a generous parental leave
    policy</a>, we value our employees’ wellbeing and want to support them along every
    step of their professional and personal journeys.<a href="https://www.mongodb.com/blog/channel/culture">
    Learn more about what it’s like to work at MongoDB</a>, and help us make an impact
    on the world!</p> <p>MongoDB is committed to providing any necessary accommodations
    for individuals with disabilities within our application and interview process.
    To request an accommodation due to a disability, please inform your recruiter.</p>
    <p>MongoDB, Inc. provides equal employment opportunities to all employees and
    applicants for employment and prohibits discrimination and harassment of any type
    and makes all hiring decisions without regard to race, color, religion, age, sex,
    national origin, disability status, genetics, protected veteran status, sexual
    orientation, gender identity or expression, or any other characteristic protected
    by federal, state or local laws.</p> <p>Req ID: 1273368223</p><div class="content-pay-transparency"><div
    class="pay-input"><div class="description"><p'
