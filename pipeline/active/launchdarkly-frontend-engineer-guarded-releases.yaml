    productivity and technical excellence.</p> </li> <li> <p data-renderer-start-pos="7425"
    data-local-id="29df714b275b"><strong data-renderer-mark="true">Actively lead and
    contribute to code reviews, spec reviews, and architecture design</strong>, ensuring
    alignment with best practices, long-term scalability, and maintainability. Your
    experience will drive thorough and thoughtful evaluation of solutions, while providing
    constructive feedback that elevates the quality of the codebase.</p> </li> <li>
    <p data-renderer-start-pos="7754" data-local-id="2c87755a6ecb"><strong data-renderer-mark="true">Play
    a key role in advancing engineering standards, tooling, and processes</strong>
    across the technology organization. By identifying areas for improvement and implementing
    process innovations, you will shape a more efficient and effective development
    environment, empowering teams to deliver high-quality features faster.</p> </li>
    <li> <p data-renderer-start-pos="8072" data-local-id="75cae4f5f30e"><strong data-renderer-mark="true">Stay
    at the forefront of frontend development trends, experimentation, and data-driven
