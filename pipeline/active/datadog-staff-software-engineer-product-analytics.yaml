  description: "<p>Product Analytics is expanding, and we\u2019re looking for an experienced\
    \ Staff Engineer to lead the technical direction of our user analytics platform.\
    \ This group builds services that help customers understand users behaviors: when\
    \ they return, where they drop off, and how product changes affect retention and\
    \ growth.</p> <p>This is a young and fast-growing product area for Datadog. It\
    \ brings new types of users into the platform extending our reach beyond our traditional\
    \ engineering audience: Product Managers, Designers and Growth teams. To support\
    \ this growth, we need to push our backend further: query older data, adapt our\
    \ storage patterns, and design systems optimized for analytics rather than technical\
    \ telemetry.</p> <p>In this role, you will drive the architecture, evaluation,\
    \ and delivery of systems that allow customers to explore over a year of behavioral\
    \ data, run complex funnel and retention queries at scale, and do so with low\
    \ latency and high reliability.</p> <p><em>At Datadog, we value our office culture\
    \ \u2013 the relationships and collaboration it builds and the creativity it brings.\
    \ We operate as a hybrid workplace to ensure our Datadogs can create a work-life\
    \ harmony that best fits them.</em></p> <p>&nbsp;</p> <p><strong>What You'll Do:</strong></p>\
    \ <ul> <li>Partner closely with engineering, product, and design to architect\
    \ and deliver a backend platform purpose-built for product analytics workloads.</li>\
    \ <li>Lead high-visibility technical initiatives, including: <ul> <li>Long-term\
    \ data storage and retrieval for year-plus behavioral datasets.</li> <li>Distributed\
    \ query patterns for funnel, retention, and segmentation analysis.</li> <li>Caching\
    \ and optimization layers tailored to large analytical queries.</li> <li>Build-vs-buy\
    \ evaluations, including collaboration with internal platform teams and integration\
    \ of open-source tools where appropriate.</li> </ul> </li> <li>Define the technical\
    \ roadmap for Product Analytics and align multiple engineering teams around shared\
    \ goals and architectural principles.</li> <li>Work across organizations to bridge\
    \ product needs with the right internal or external technologies.</li> <li>Provide\
    \ technical mentorship and help grow the next generation of senior engineers within\
    \ the team.</li> </ul> <p>&nbsp;</p> <p><strong>Who You Are:</strong></p> <ul>\
    \ <li>You have a BS/MS/PhD in a scientific field or equivalent experience.</li>\
    \ <li>10+ years of backend engineering experience.</li> <li>Strong background\
    \ in distributed systems and large-scale data processing.</li> <li>Deep experience\
    \ with SQL, query optimization, and large analytical datasets.</li> <li>Comfortable\
    \ leading build/buy evaluations and integrating open-source or third-party systems\
    \ when needed.</li> <li>Effective communicator able to explain technical tradeoffs\
