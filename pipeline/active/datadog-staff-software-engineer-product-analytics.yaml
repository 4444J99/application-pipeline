    \ you\u2019re motivated to push the boundaries of how AI can improve software\
    \ engineering best practices and contribute to building AI-enabled products.</li>\
    \ </ul> <p><em><span style=\"font-weight: 400;\">Datadog values people from all\
    \ walks of life. We understand not everyone will meet all the above qualifications\
    \ on day one. That's okay. If you\u2019re passionate about technology and want\
    \ to grow your skills, we encourage you to apply.&nbsp;</span></em></p> <p>&nbsp;</p>\
    \ <p><strong>Benefits and Growth:</strong></p> <ul> <li>New hire stock equity\
