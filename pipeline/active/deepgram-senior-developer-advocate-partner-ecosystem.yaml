  description: 'Company Overview Deepgram is the leading platform underpinning the
    emerging trillion-dollar Voice AI economy, providing real-time APIs for speech-to-text
    (STT), text-to-speech (TTS), and building production-grade voice agents at scale.
    More than 200,000 developers and 1,300+ organizations build voice offerings that
    are ‘Powered by Deepgram’, including Twilio, Cloudflare, Sierra, Decagon, Vapi,
    Daily, Cresta, Granola, and Jack in the Box. Deepgram’s voice-native foundation
    models are accessed through cloud APIs or as self-hosted and on-premises software,
    with unmatched accuracy, low latency, and cost efficiency. Backed by a recent
    Series C led by leading global investors and strategic partners, Deepgram has
    processed over 50,000 years of audio and transcribed more than 1 trillion words.
    There is no organization in the world that understands voice better than Deepgram.
    Company Operating Rhythm At Deepgram, we expect an AI-first mindset—AI use and
    comfort aren’t optional, they’re core to how we operate, innovate, and measure
    performance. Every team member who works at Deepgram is expected to actively use
    and experiment with advanced AI tools, and even build your own into your everyday
    work. We measure how effectively AI is applied to deliver results, and consistent,
    creative use of the latest AI capabilities is key to success here. Candidates
    should be comfortable adopting new models and modes quickly, integrating AI into
    their workflows, and continuously pushing the boundaries of what these technologies
    can do. Additionally, we move at the pace of AI. Change is rapid, and you can
    expect your day-to-day work to evolve just as quickly. This may not be the right
    role if you’re not excited to experiment, adapt, think on your feet, and learn
    constantly, or if you’re seeking something highly prescriptive with a traditional
    9-to-5. About Deepgram Deepgram is the leading voice AI platform for developers;
    building speech-to-text (STT), text-to-speech (TTS) and full speech-to-speech
    (STS), enterprise-grade, voice agent offerings. Over 200,000 developers build
    with Deepgram’s voice-native foundational models – accessed through APIs, well
    known partners or as self-managed software – due to our unmatched accuracy, latency
    and pricing. Customers include software companies building voice products, co-sell
    partners working with large enterprises, and enterprises solving internal voice
    AI use cases. The company ended 2024 cash-flow positive with 400+ enterprise customers,
    3.3x annual usage growth across the past 4 years, over 50,000 years of audio processed
    and over 1 trillion words transcribed. There is no organization in the world that
    understands voice better than Deepgram. About the Role As a Senior Developer Advocate
    focused on our Partner Ecosystem, you are the technical bridge between Deepgram
    and the platforms our developers build with every day — Pipecat, Livekit, AWS,
    and others as the ecosystem grows. Your mission is to ensure developers who discover
    Deepgram through a partner ecosystem have an excellent experience: working integrations,
    clear documentation, visible community presence, and a fast path to production.
    You do this by shipping high-fidelity integration recipes, maintaining deep relationships
    with partner engineering and DevRel teams, and systematically auditing the developer
    journey across each partner stack. You are a "First Builder" who thrives on solving
    the complex challenges that arise when integrating real-time voice AI into partner
    platforms, and a compelling storyteller who turns that work into content that
    moves developers from "is this possible?" to "this is in production." What You’ll
    Do Ship Partner Integration Recipes: Architect and open-source complete, runnable
    examples that demonstrate Deepgram within partner stacks like Pipecat, Livekit,
    and AWS. Each recipe includes working code, a guide written for that partner''s
    developers, and coordination to get it referenced in partner docs. Audit & Map
    the Partner DX: Walk each partner integration as a developer would — discovery,
    docs, setup, first API call. Document every friction point. Produce gap analyses
    that categorize what''s working, what''s broken or stale, and what''s missing.
    Use these to drive prioritization. Own Partner Relationships: Build and maintain
    ongoing relationships with partner engineering and DevRel teams. Establish regular
    check-in cadences, understand their roadmaps, and negotiate co-documentation and
    joint content opportunities. Be the "Zero-Index" Sensor for Partners: Act as the
    first customer for every partner integration. When something''s broken, confusing,
    or missing — you find it first and route it to the right internal team, whether
    that''s Product, Engineering, or Docs. Synthesize Cross-Functional Intel: Gather
    signals from Field Engineering, GTM, Product, and partner contacts. Maintain living
    partner context docs that capture relationship status, workstreams, commitments,
    gaps, and next steps. Show Up in Partner C'
