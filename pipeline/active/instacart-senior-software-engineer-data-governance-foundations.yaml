  description: '<div class="content-intro"><p><strong>We''re transforming the grocery
    industry</strong></p> <p><span class="im">At Instacart, we invite the world to
    share love through food because we believe everyone should have access to the
    food they love and more time to enjoy it together. Where others see a simple need
    for grocery delivery, we see exciting complexity and endless opportunity to serve
    the varied needs of our community. We work to deliver an essential service that
    customers rely on to get their groceries and household goods, while also offering
    safe and flexible earnings opportunities to Instacart Personal Shoppers.</span></p>
    <p>Instacart has become a lifeline for millions of people, and we’re building
    the team to help push our shopping cart forward. If you’re ready to do the best
    work of your life, come join our table.</p> <p><strong>Instacart is a Flex First
    team </strong></p> <p>There’s no one-size fits all approach to how we do our best
    work. Our employees have the flexibility to choose where they do their best work—whether
    it’s from home, an office, or your favorite coffee shop—while staying connected
    and building community through regular in-person events. <a href="https://www.instacart.careers/flex-first"
    target="_blank" data-saferedirecturl="https://www.google.com/url?q=https://instacart.careers/remote/&amp;source=gmail&amp;ust=1651869232122000&amp;usg=AOvVaw37OlxP8hAKN7nq4YwHQH7e">Learn
    more about our flexible approach to where we work.</a></p></div><p><strong>About
    the Team</strong></p> <p>Instacarts Data Governance &amp; Foundations team builds
    and operates the core systems that power the company''s data ecosystem — a modern
    data lakehouse at scale, spanning ingestion, stream processing, analytical compute,
    and self-serve tooling. You''ll join a collaborative team of 6–7 engineers responsible
    for keeping a highly reliable production platform running today while architecting
    the infrastructure that will serve the business for the next 3–5 years.</p> <p>This
    is a high-ownership, high-autonomy role. Architectural decisions carry both technical
    and financial weight, and you''ll be expected to drive direction, not just execute
    it. You''ll work closely with engineering leadership and cross-functional partners
    across Data Science, ML Platform, Ads Infrastructure, Finance Engineering, and
    senior stakeholders throughout the organization.</p> <p><strong>About the Job</strong></p>
    <ul> <li>Define and drive multi-year architecture roadmaps for large-scale data
    ingestion and processing infrastructure, setting technical direction that balances
    reliability, scalability, and cost.</li> <li>Own end-to-end platform initiatives
    — from build vs. buy decisions and migration design through production rollout
    and risk management — across Kafka-based streaming and Postgres-based systems.</li>
    <li>Partner with vendors (Snowflake, Databricks, Confluent) on technical integration,
    contract evaluation, and TCO modeling to inform infrastructure investment decisions.</li>
    <li>Collaborate with various teams to embed governance and compliance controls
    (SOX, CPRA, GDPR) directly into platform architecture and data lifecycle management.</li>
    <li>Optimize infrastructure spend at scale: identify cost reduction opportunities
    across compute, storage, and pipeline efficiency; manage multi-million dollar
    infrastructure budgets.</li> <li>Write compelling architecture documents, strategy
    memos, and proposals that drive alignment with engineering leadership and senior
    stakeholders across the organization.</li> <li>Mentor engineers on the team, model
    strong engineering culture, and help grow a high-performing data infrastructure
    organization.</li> <li>Collaborate with Data Science, ML Platform, Ads Infrastructure,
    Finance Engineering, and Product teams to ensure the platform meets evolving needs.</li>
    </ul> <p><strong>About You</strong></p> <ul> <li>5+ years of software engineering
    focused on data infrastructure or distributed systems at scale, in a high-growth,
    data-intensive environment.</li> <li>Experience in modern data lakehouse architectures
    and open table formats — Apache Iceberg, Delta Lake, Hudi — with strong understanding
    of compute/storage trade-offs.</li> <li>Hands-on experience with distributed query
    and compute systems (Trino, Spark, ClickHouse) including performance tuning and
    production reliability work.</li> <li>Proven depth in event-driven infrastructure:
    Kafka for high-throughput data ingestion and Flink (or equivalent) for stream
    processing at scale.</li> <li>Track record owning and executing major platform
    transitions, including migration design, phased rollout, and risk management under
    production constraints.</li> <li>Experience building business cases for infrastructure
    investments: cost-benefit analysis, TCO modeling, and presenting recommendations
    to leadership.</li> <li>Exceptional written technical communication — clear architecture
    docs, strategy memos, and cross-team proposals that drive decisions and alignment.<'
