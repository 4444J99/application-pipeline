  description: <div class="content-intro"><h3><strong>About Us</strong></h3> <div>Temporal
    is an open source programming model that can simplify code, make applications
    more reliable, and help developers focus on the important things like delivering
    features faster. We are on a mission to be the reliable foundation of every developer’s
    toolbox, and are building the team that will make that happen.</div> <div>&nbsp;</div>
    <div>Our values guide us —they are present in how we show up, make decisions,
    and work together to make an impact. We’re curious, driven, collaborative, genuine
    and humble.</div> <div>&nbsp;</div> <div>Temporal is growing and we are looking
    for those who share our values, challenge 'standard' thinking, and want to influence
    our future. If you have a passion for improving the developer experience, building
    world-class open-source software and communities, and want to be a part of our
    amazing team, we'd love to hear from you!</div></div><h3>Summary</h3> <p>Join
    our dynamic team as a Senior Software Engineer on the Temporal Cloud team, where
    you'll play a pivotal role in building and operating the infrastructure that powers
    Temporal's managed cloud offering. Our work spans several key domains:</p> <ul>
    <li><strong>Namespace Management &amp; Enterprise Features</strong> - Building
    and operating the Namespace platform across AWS, GCP, and Azure, managing provisioning
    workflows, and delivering enterprise capabilities such as audit logs, export history,
    notifications, and control plane data pipelines</li> <li><strong>Billing, Metering,
    Onboarding &amp; Offboarding</strong> - Managing customer lifecycle operations
    including usage metering, billing systems, customer onboarding workflows, and
    offboarding processes</li> <li><strong>Identity &amp; Access Management</strong>
    - Developing secure authentication and authorization frameworks that enable customers
    to manage and access their Temporal Cloud resources safely</li> <li><strong>Cloud
    Foundation &amp; Developer Experience</strong> - Ensuring platform reliability,
    availability, and developer productivity across the entire cloud infrastructure,
    including Cloud API, Terraform provider, and CLI tooling</li> </ul> <p>In this
    position, you'll directly contribute to the scalability, reliability, and security
    of Temporal Cloud, empowering you to substantially impact our technology and the
    thousands of customers who depend on it.</p> <h3>What You'll Do</h3> <ul> <li>Design,
    build, and maintain systems across namespace management, IAM, enterprise features,
    and cloud infrastructure</li> <li>Build and operate the Namespace platform across
    AWS, GCP, and Azure, including provisioning workflows and resource management</li>
    <li>Implement enterprise capabilities such as audit logs, export history, notifications,
    and control plane data pipelines</li> <li>Develop security and access control
    features that enable enterprise customers to manage their cloud deployments safely</li>
    <li>Contribute to platform reliability, availability, and developer productivity
    initiatives</li> <li>Collaborate with product, engineering, and infrastructure
    teams to deliver high-quality solutions aligned with customer needs</li> <li>Participate
    in on-call rotation to ensure system reliability and respond to production incidents</li>
    <li>Contribute to architectural decisions and technical design reviews for cloud
    platform features</li> </ul> <h3>What You'll Bring</h3> <ul> <li>5+ years of professional
    software engineering experience building and operating production systems</li>
    <li>Strong understanding of distributed systems concepts including concurrency,
    consistency, and fault tolerance</li> <li>Proficiency in Go or similar systems-level
    programming languages</li> <li>Experience with cloud platforms such as AWS, Azure,
    or Google Cloud</li> <li>Demonstrated ability to design and implement scalable,
    reliable systems and APIs</li> <li>Strong debugging and problem-solving skills
    with the ability to investigate complex production issues</li> <li>Excellent collaboration
    and communication skills with the ability to work effectively across teams</li>
    <li>Self-motivated with the ability to work independently and take ownership of
    features from design through deployment</li> </ul> <h3>Nice to Haves</h3> <ul>
    <li>Prior experience with Temporal or workflow orchestration systems</li> <li>Experience
    building IAM systems, authentication, or authorization frameworks</li> <li>Experience
    with Kubernetes, containerization, and cloud-native infrastructure</li> <li>Background
    in multi-tenant SaaS platforms and enterprise feature development</li> <li>Familiarity
    with infrastructure-as-code tools and practices</li> </ul> <h3><strong data-start="3118"
    data-end="3134">Compensation</strong></h3> <ul> <li>The estimated pay range for
    this role is $176,000 - $237,000 depending on experience and location.</li> <li>This
    role is also eligible to participate in Temporal’s equity plan.</li> </ul><div
