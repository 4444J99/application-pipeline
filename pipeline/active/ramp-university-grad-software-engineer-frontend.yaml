  description: "About Ramp Ramp is building the smart infrastructure for finance teams,\
    \ embedded in the transaction flow of every dollar a business spends. We automate\
    \ how over $100B in annualized spend flows in and out of 50,000+ companies: authorizing\
    \ payments, flagging risk, categorizing spend, and closing books. The problems\
    \ are high-stakes, data-dense, and unforgiving. We hire people with high agency\
    \ and high urgency. We look for slope over intercept. We care less about where\
    \ you trained and more about what you\u2019ve built. At Ramp, everyone is a builder\
    \ who owns problems end to end and makes consequential decisions that shape the\
    \ outcome. The median Ramp customer saves 5% and grows revenue 16% in their first\
    \ year \u2013 far in excess of businesses operating without Ramp. We believe every\
    \ ambitious company deserves the same. If you want to build systems that directly\
    \ shape how companies move and manage billions, Ramp is the place to do it. Explore\
    \ our Engineering Blog & Emerging Talent Blog for insights into our tech and values!\
    \ About the Role Ramp is, at its core, an engineering company, and is on a mission\
    \ to build the best engineering team in the US! We are looking for frontend and\
    \ full-stack engineering interns who are excited to be part of our early story\
    \ and help us build a diverse and vibrant tech community. Our ideal candidate\
    \ has a deep understanding of JavaScript, a passion for web performance, and can\
    \ creatively come up with solutions to solve customer's needs. Our tech stack\
    \ currently involves TypeScript, React, Vite, and Ryu, our in-house design system.\
    \ What You'll Do Build performant, beautiful, and usable interfaces that solve\
    \ for growing businesses with complex needs Ship products and services in cross-functional\
    \ teams Work with sales and business teams to incorporate and productize customer\
    \ feedback Help establish engineering processes, tools, and systems that will\
    \ allow us to scale the code base, productivity, and the team What You'll Need\
    \ Graduating with a B.S. (or higher) in Computer Science or a related technical\
    \ field; this role is ideal for a candidate with an expected graduation date in\
    \ or around May 2026 given the deferred start date in Summer/Fall 2026 Proficiency\
    \ in JavaScript, with a knack for getting the visuals right Experience with one\
    \ or more object-oriented programming languages Track record of shipping high\
    \ quality products and features or a portfolio of side projects Ability to turn\
    \ business and product ideas into engineering solutions Desire to work in a fast-paced\
    \ environment, continuously grow, and master your craft Alignment with Ramp\u2019\
    s core values of enabling businesses to grow more by spending less Nice to Haves\
    \ Proficiency in React v16+ Familiarity with or desire to learn our tech stack,\
    \ which includes, but not limited to: Flask (Python), Elixir, AWS, RabbitMQ, PostgreSQL\
    \ Passion for, or curiosity to learn, financial technology Compensation The annual\
    \ salary/OTE range for the target level for this role in NYC is $142,000 to $175,000\
    \ + target equity + benefits (including medical, dental, vision, and 401(k) Benefits\
    \ (for U.S.-based full-time employees) 100% medical, dental & vision insurance\
    \ coverage for you Partially covered for your dependents One Medical annual membership\
    \ 401k (including employer match on contributions made while employed by Ramp)\
    \ Flexible PTO Fertility HRA (up to $10,000 per year) Parental Leave Unlimited\
    \ AI token usage Pet insurance Centralized home-office equipment ordering for\
    \ all employees Health and Wellness stipend In-office perks: lunch, snacks, drinks,\
    \ and more Budget for intra-office travel Relocation support to NYC or SF (as\
    \ needed) Referral Instructions If you are being referred for the role, please\
    \ contact that person to apply on your behalf. Other notices Pursuant to the San\
    \ Francisco Fair Chance Ordinance, we will consider for employment qualified applicants\
    \ with arrest and conviction records. Beware of recruiting scams: Ramp will only\
    \ contact you through official @ Ramp.com email addresses and will never ask for\
    \ payment or sensitive personal information during the hiring process. Ramp Applicant\
    \ Privacy Notice"
