  description: 'About Neon Neon is a global payments and e-commerce platform designed
    to help game publishers earn more money and independence from app stores. We believe
    commerce should be open and transparent: clear decisions, actionable insights,
    and aligned incentives. Founded by payments, fintech and gaming veterans, Neon
    focuses on product and partnership excellence: we share the playbook, co-pilot
    decisions, and abstract away risk and complexity for our customers. We’re replacing
    old-school, black-box relics with clear, modern, and developer-centric infrastructure.
    As an early team member, you’ll have the opportunity to shape and scale Neon’s
    product and culture, making a direct impact on our growth and success. You’ll
    join a collaborative, diverse team from world-class companies like Apple, Affirm,
    Unity, and Visa, backed by renowned VC''s including Thrive, a16z, Griffin Gaming,
    Ribbit, and Renegade. If you want to build disruptive technology, challenge the
    status quo, and help game creators thrive on their own terms, read on. About the
    Role Neon is hiring its first dedicated Infrastructure Engineer to build the foundation
    that powers our platform as we scale. You''ll take ownership of infrastructure,
    tooling, and systems reliability, working closely with engineering leadership
    to ensure our platform remains fast, reliable, and ready for growth. This is a
    hands-on, high-impact role with broad scope, ideal for someone who enjoys being
    a craftsperson and shaping systems from the ground up. What You''ll Do Lead infrastructure
    development across AWS, including compute, storage, and networking Design and
    maintain data pipelines and internal tooling Build and maintain Terraform configurations
    and deployment workflows Partner with engineers to ensure environments are scalable,
    secure, and reliable Build and maintain internal frameworks in TypeScript What
    We Look For 2+ years of software engineering experience with focus on infrastructure
    or platform engineering Experience with AWS, IaC (e.g. Terraform), and modern
    deployment frameworks (ECS, DynamoDB, Aurora, Redis, Snowflake) preferred Comfortable
    writing code (TypeScript preferred) Comfortable working across a wide surface
    area and context-switching between projects Collaborative mindset with excitement
    about being the founding infrastructure hire Able to work from our offices in
    San Francisco or New York City'
