  description: '<p>Every new business that applies to Mercury is like a new star appearing
    in the night sky. On its own, it’s a single point of light. But when we look closer,
    patterns emerge—data trails from partners, filings, founders, and financial histories—all
    connecting to form a larger constellation.</p> <p>That’s what our Risk product
    engineering teams do at Mercury. We guide thousands of business applications through
    our systems—each one unique, each one needing a smooth and trustworthy landing.
    The challenge: keep everything moving fast without compromising safety. Every
    day, our work helps founders open their first account, launch their next idea,
    and accelerate their growth like rocketships.</p> <p>Our mission is to build the
    intelligent, automated systems and operational tools that make this possible—where
    machine learning, AI, and human judgment work seamlessly together to power the
    next generation of business banking*. We use intelligence to detect risks earlier,
    make real-time decisions with confidence, and enable instant, delightful account
    approvals that keep pace with the builders we serve.</p> <p>When we do it right,
    the result is quiet brilliance: onboarding that feels effortless, even though
    it’s powered by galaxies of data, precision, and care.</p> <p>We’re looking for
    a Staff Software Engineer to contribute with building the systems and tools that
    make it all happen—from application approvals to ongoing and enhanced due diligence—ensuring
    every business that joins Mercury is both safe and their experience is delightful.</p>
    <p><strong>As part of this role, you will:</strong></p> <ul> <li>Lead the architecture,
    implementation, and long-term roadmap for core systems which support multiple
    fraud prevention use cases.</li> <li>Own the end-to-end delivery of large cross-function
    projects, translating ambiguous high impact problems into strategy and execution,
    make pragmatic tradeoffs, and drive teams to measurable outcomes.</li> <li>Design,
    build, and operate highly available, low-latency, backend systems that enable
    real-time scoring and decisioning for fraud prevention.</li> <li>Partner with
    Data Science and ML teams to productionize models, build reliable ML data pipelines,
    and enable real-time model serving.</li> <li>Establish and elevate department
    level best practices, review designs, drive engineering quality, and act as a
    trusted advisor on architectural tradeoffs.</li> <li>Mentor and grow engineers,
    documenting learnings and sharing technical direction through writing, 1:1s, and
    team meetings</li> <li>Navigate and influence multiple stakeholders, help align
    teams, communicate tradeoffs to technical and non-technical partners, and independently
    resolve cross team issues.</li> </ul> <p><strong>The ideal candidate for the role:</strong></p>
    <ul> <li>Has 7-10+ years of software development experience, with a strong focus
    on the backend, with a knowledge of or excitement to learn Haskell.</li> <li>Has
    been an experienced technical lead making architectural decisions in the past
    and seen the impact of those decisions over time. You should be able to clearly
    articulate your technical opinions and lay out tradeoffs.</li> <li>Is passionately
    product-minded and has experience building and shipping new products balancing
    reliability and velocity.</li> <li>Is someone comfortable driving discussions
    in areas with ambiguous ownership, approaches them with empathy, and delights
    in getting outcomes. Our work touches many other teams and areas of the product;
    you’ll have a lot of autonomy and the expectation is you’ll use that to seek out
    ways to have an impact.</li> <li>Is ridiculously helpful, taking initiative to
    make your coworkers’ lives easier by investing time to mentor and proactively
    share your knowledge and learnings through writings, 1:1s, and team meetings.</li>
    <li>Experience in fintech, fraud systems, or the broader risk domain is a strong
    plus.</li> </ul> <p>If this role interests you, we invite you to explore our public
    demo at <a href="https://personal-demo.mercury.com">personal-demo.mercury.com</a>.&nbsp;</p>
    <p>The total rewards package at Mercury includes base salary, equity (stock options),
    and benefits. Our salary and equity ranges are highly competitive within the SaaS
    and fintech industry and are updated regularly using the most reliable compensation
    survey data for our industry. New hire offers are made based on a candidate’s
    experience, expertise, geographic location, and internal pay equity relative to
    peers.</p> <p>Our target new hire base salary ranges for this role are the following:</p>
    <ul> <li>US employees (any location): $239,000 - $298,800</li> <li>Canadian employees
    (any location): CAD 225,900 - 282,400</li> </ul> <p><em>*Mercury is a fintech
    company, not an FDIC-insured bank. Banking services provided through Choice Financial
    Group and Column N.A., Members FDIC.</em></p> <p>Mercury values diversity &amp;
    belonging and is proud to be an Equal Employment Opportunity employer. A'
