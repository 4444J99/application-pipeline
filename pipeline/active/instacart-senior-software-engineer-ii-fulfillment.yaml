    solutions.&nbsp;<br><br></p> <h1>About the Job</h1> <ul> <li>Develop and implement
    core platform solutions for pioneering product launches that revolutionize the
    digital grocery landscape.</li> <li>Define and advance a three-year technological
    vision to enhance innovation and platform scalability.</li> <li>Collaborate with
    product and business teams to generate impactful ideas and insights.</li> <li>Analyze
