    closely with other engineering teams, and help raise the bar on how payroll capabilities
    are built and consumed across the company.</p> <p><strong>About the Team:</strong></p>
    <p>The Payroll Platform team builds the foundational services that make payroll
    possible at Gusto. Our customers are internal product teams building payroll,
    time, contractor, and accountant experiences, as well as external partners through
    Gusto Embedded Payroll. We focus on creating reliable, performant, and well-designed
    APIs that abstract away payroll complexity and enable teams to move faster with
    confidence. Our work sits at the intersection of backend product engineering,
    developer experience, and large-scale systems in a highly regulated domain.</p>
    <p><strong>Here’s what you’ll do day-to-day:</strong></p> <ul> <li>Design, build,
    and maintain backend services and APIs that support core payroll workflows and
    are consumed by multiple Gusto engineering teams</li> <li>Own a primary domain
    within the Payroll Platform, taking responsibility for system health, correctness,
    scalability, and long-term evolution</li> <li>Act as a technical partner to other
    engineering teams, collaborating closely to understand their needs, guide platform
    adoption, and co-design solutions that scale across use cases</li> <li>Author
    and drive architecture and design documents, contributing to technical direction
    while balancing near-term delivery with long-term platform goals</li> <li>Improve
    system performance, reliability, and observability as we scale payroll processing
    for hundreds of thousands of businesses</li> <li>Collaborate cross-functionally
    with Product, Design, Data, Compliance, and Operations to deliver compliant and
    customer-impacting solutions</li> <li>Routinely leverage AI-assisted development
    tools to accelerate development, improve code quality, and documentation, and
    help normalize and spread effective usage across the team.</li> </ul> <p><strong>&nbsp;</strong></p>
    <p><strong>Here’s what we''re looking for:</strong></p> <ul> <li> <ul> <li>8+
    years of professional software engineering experience, with a strong focus on
    backend development</li> <li>Experience building and scaling internal platforms,
    shared services, or foundational APIs that support multiple product teams</li>
    <li>Proven ability to work independently on ambiguous problems, from understanding
    the business need through delivery and iteration</li> <li>Strong system design
    skills, including experience with performance optimization, scalability, and reliability
    in production systems</li> <li>Actively uses AI-assisted development tools (LLMs,
    Claude Code, Cursor) in daily engineering work and is comfortable helping teams
    adopt effective, responsible usage</li> <li>Experience collaborating across teams
    and acting as a technical partner in a product-focused engineering organization</li>
    <li>Proficiency in one or more backend programming languages; experience with
    Ruby is strongly preferred but not required</li> </ul> </li> </ul> <p><strong>Please
    note that travel to Gusto’s Denver office for onboarding is required for this
    position.</strong> If you have any questions regarding this requirement, please
    share with your recruiter.</p> <p>Our cash compensation amount for this role is
    targeted at $163,000/yr to $204,000/yr in Denver &amp; most remote locations,
    and $197,000/yr to $247,000/yr for San Francisco, Seattle &amp; New York. Stock
    equity is additional. Final offer amounts are determined by multiple factors including
    candidate experience and expertise and may vary from the amounts listed above.</p>
