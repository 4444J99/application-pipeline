    technical excellence across reliability, correctness, observability, and security</li>
    <li>Mentor engineers and raise the technical bar through design reviews, architecture
    discussions, and hands-on leadership</li> <li>Influence platform direction beyond
    your immediate team by aligning with adjacent organizations and company-wide initiatives</li>
    </ul> <p><strong>What you bring</strong></p> <ul> <li>10+ years of experience
    building and operating large-scale, distributed systems in production environments</li>
    <li>Expertise in backend development using languages such as Go, Python, or Java,
    with deep knowledge of cloud-native architectures</li> <li>3+ years leading large-scale
    technical initiatives, with ownership spanning multiple teams or complex systems</li>
    <li>Strong grasp of system design, data modeling, and software engineering fundamentals</li>
    <li>Proven ability to simplify complex problems, make sound tradeoffs, and drive
    alignment across diverse stakeholders</li> <li>Strong ownership mindset with a
    track record of delivering high-impact, end-to-end product outcomes and raising
    team-wide technical standards</li> <li>Demonstrated experience mentoring and developing
    engineers, fostering technical excellence and long-term career growth</li> </ul>
