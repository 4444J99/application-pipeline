    target="_blank">An estimated $124 trillion of assets</a> will be inherited by
    younger generations in the next two decades. The largest transfer of wealth in
    human history. If you’re ready to be at the epicenter of this historic cultural
    and financial shift, keep reading.</p></div><h2><strong>About the team + role</strong></h2>
    <p>We are building an elite team, applying frontier technologies to the world’s
    biggest financial problems. We’re looking for bold thinkers. Sharp problem-solvers.
    Builders who are wired to make an impact. Robinhood isn’t a place for complacency,
    it’s where ambitious people do the best work of their careers. We’re a high-performing,
    fast-moving team with ethics at the center of everything we do. Expectations are
    high, and so are the rewards.</p> <p>Our ultimate goal is to be a leader in democratizing
    access to private and public equity markets by making those assets available on-chain
    and be tradable 24/7.</p> <p>As a Staff Software Engineer in this role, you will
    work on the most critical projects across Tokenization, Robinhood Chain, and the
    Robinhood Wallet. Most importantly, you will proactively coach and uplift other
    team members, drive engineering excellence, and set the highest bar for quality.</p>
    <p><strong>This role is based in our Menlo Park, CA or New York, NY office(s),
    with in-person attendance expected at least 3 days per week.&nbsp;</strong></p>
    <p>At Robinhood, we believe in the power of in-person work to accelerate progress,
    spark innovation, and strengthen community. Our office experience is intentional,
    energizing, and designed to fully support high-performing teams.</p> <p><strong>What
    you’ll do</strong></p> <ul> <li>Own the technical vision and execution for Robinhood
    Chain, the Tokenization Engine, and the Robinhood Wallet</li> <li>Design, build,
    and operate the core services that power Robinhood Chain, the Tokenization Engine,
    and the Robinhood Wallet</li> <li>Remain deeply hands-on by writing production
