    initiatives.</li> <li>Meet regularly with Product and Design to fine tune requirements.</li>
    <li>Attend agile ceremonies to help your team plan out their work and get it done.</li>
    <li>Work across squads to improve Engineering practices at Calendly.</li> <li>Review
    implementation plans and pull requests from your peers.</li> <li>Mentor and coach
    other team members.</li> </ul> <p>&nbsp;</p> <p><strong>What do we need from you?</strong></p>
    <ul> <li>8+ years of Software Development experience at a SaaS or technology company.</li>
    <li>Professional experience with Node is preferred. Experience with React or a
    comparable UI framework is also desirable.</li> <li>Professional experience with
    TypeScript.&nbsp;</li> <li>Ability to adapt to new technologies, changing requirements,
    and evolving organizational needs</li> <li>Hands-on experience with Service-Oriented
