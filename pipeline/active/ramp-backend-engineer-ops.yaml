  description: "About Ramp Ramp is building the smart infrastructure for finance teams,\
    \ embedded in the transaction flow of every dollar a business spends. We automate\
    \ how over $100B in annualized spend flows in and out of 50,000+ companies: authorizing\
    \ payments, flagging risk, categorizing spend, and closing books. The problems\
    \ are high-stakes, data-dense, and unforgiving. We hire people with high agency\
    \ and high urgency. We look for slope over intercept. We care less about where\
    \ you trained and more about what you\u2019ve built. At Ramp, everyone is a builder\
    \ who owns problems end to end and makes consequential decisions that shape the\
    \ outcome. The median Ramp customer saves 5% and grows revenue 16% in their first\
    \ year \u2013 far in excess of businesses operating without Ramp. We believe every\
    \ ambitious company deserves the same. If you want to build systems that directly\
    \ shape how companies move and manage billions, Ramp is the place to do it. Join\
    \ our growing Ops Engineering team and help build internal tooling and infrastructure\
    \ that empowers operators at Ramp. As an internal-facing team, you'll work directly\
    \ with our operations teams to design, implement, and scale tools and systems\
    \ that enable them to serve our customers more efficiently and effectively. Much\
    \ of our work involves managing the Retool platform, building custom tooling on\
    \ top of platforms like Zendesk, developing internal API to support internal operations,\
    \ and creating operator-facing applications that help our ops teams move faster\
    \ and deliver better customer experiences. Ramp is, at its core, an engineering\
    \ company, and is on a mission to build the best engineering team in the world!\
    \ The Ops Engineering team is highly cross-functional, working closely with operations,\
    \ customer support, and other internal stakeholders to solve a wide range of infrastructure\
    \ and tooling challenges. Our ideal candidate has a strong sense of ownership\
    \ and enjoys owning projects from inception to scaling them in production. We\
    \ value people who take pride in their work, and show an aptitude for learning\
    \ quickly whether they're familiar with our stack or not. You'll be working with\
    \ a nimble team of committed and talented engineers and having a large, long-term\
    \ impact on technical design and engineering culture. We are intentionally pushing\
    \ to use AI to automate workflows end-to-end, reducing manual toil and standardizing\
    \ patterns across Retool, Zendesk, and our internal APIs. What You'll Do Design\
    \ and build full-stack internal applications and tools that empower operations\
    \ teams to work more efficiently and deliver exceptional customer experiences\
    \ Develop robust backend services and APIs that power internal tooling, ensuring\
    \ scalability, reliability, and performance Build integrations with third-party\
    \ platforms like Retool, Zendesk, and other operational systems to create seamless\
    \ workflows Leverage AI tooling and capabilities to build intelligent automation,\
    \ enhance operator productivity, and improve decision-making within internal tools\
    \ Create data-driven features and analytics that provide operations teams with\
    \ actionable insights and improved visibility Collaborate closely with operations\
    \ stakeholders to understand pain points, gather requirements, and iterate on\
    \ solutions that solve real business problems Write clean, maintainable, and well-tested\
    \ code following software engineering best practices Participate in code reviews,\
    \ mentor team members, and contribute to the growth of engineering culture Own\
    \ features end-to-end from design through deployment, monitoring, and iteration\
    \ based on user feedback Participate in an On Call rotation to resolve critical\
    \ issues impacting internal users What You'll Need 5+ years of software engineering\
    \ experience building and shipping production applications Strong proficiency\
    \ in modern programming languages such as Python, TypeScript/Node.js, or similar\
    \ Experience building full-stack applications with modern frameworks (React, Next.js,\
    \ or similar for frontend) Solid understanding of backend architecture, API design,\
    \ and database systems (PostgreSQL, Redis, etc.) Demonstrated aptitude for working\
    \ with AI technologies, including experience integrating LLMs, building AI-powered\
    \ features, or applying AI to solve business problems Experience building internal\
    \ tools or working closely with non-technical stakeholders to understand and solve\
    \ their problems Strong product sense and user empathy, with ability to translate\
    \ business requirements into technical solutions Familiarity with cloud infrastructure\
    \ (AWS preferred) and modern DevOps practices Excellent communication skills and\
    \ ability to work cross-functionally with operations, product, and engineering\
    \ teams Strong sense of ownership and bias toward action, with ability to move\
    \ quickly and iterate based on feedback Experience with platforms like Retool,\
    \ Zendesk, or similar internal tooling platforms is a plus Benefits (for U.S.-based\
    \ full-time employees) 100% medical, dental & vision insurance cove"
