  description: '<p>Toast is driven by building the restaurant platform that helps
    restaurants adapt, take control, and get back to what they do best: building the
    businesses they love. We are looking for a Staff Software Engineer to join the
    Toast Tables team.</p> <p>Toast Tables is a fast-growing, fully integrated waitlist
    and reservations platform that allows restaurants to generate and manage demand.
    It ties in with many of Toast’s other systems so that restaurants can bring a
    magical, fully digital, end-to-end experience to guests.</p> <p><strong>Who We
    Are</strong></p> <p>The Toast Tables team at Toast is all about creating exceptional
    reservations experiences for restaurants and their guests. We’re product-obsessed,
    focused on innovation, and committed to building scalable, reliable solutions
    that are used by millions of restaurant-goers every day. If you’re ready to make
    an impact on a massive scale, this is the place for you.</p> <p><strong>A day
    in the life (Responsibilities)&nbsp;</strong></p> <p>In this role, you''ll get
    to work on a wide variety of projects, using your technical chops to influence
    not just the code, but also product and business strategies. This is a golden
    opportunity for a hands-on, entrepreneurial engineer who thrives in a modern tech
    stack environment and loves solving real-world problems through technology. Here’s
    what you’ll be doing:</p> <ul> <li>Design, scope, and implement cutting-edge solutions
    using a mix of technologies.</li> <li>Enhance the platform to boost performance,
    usability, and scalability.</li> <li>Collaborate closely with Design and Product
    stakeholders to ensure we are building the right solutions to the right problems</li>
    <li>Identify high-impact opportunities with your team and turn them into reality.</li>
    <li>Be an awesome teammate who’s all in on collaboration and collective success.</li>
    <li>Work across teams to ensure that every part of our product ecosystem works
    seamlessly together to deliver the best possible experience for our customers.</li>
    </ul> <p><strong>What you''ll need to thrive (Requirements)</strong></p> <ul>
    <li>8+ years of experience in software engineering, with a strong background in
    back-end development using Java, Kotlin, or other object-oriented languages</li>
    <li>Proficient with modern API standards and technologies (e.g. REST, GraphQL)</li>
    <li>Proficient with relational databases and alternative data stores</li> <li>Experience
    with distributed systems, enterprise messaging systems, and/or microservices</li>
    <li>Demonstrated ability to deliver high-impact, scalable solutions in complex,
    multi-product environments.</li> <li>Strong leadership and mentoring skills, with
    a track record of guiding teams through architectural transformations.</li> <li>Excellent
    communication skills, with the ability to articulate complex technical concepts
    to diverse audiences.</li> <li>Passionate about driving innovation and continuously
    improving engineering practices.</li> </ul> <p data-pm-slice="1 1 []"><strong>AI
    at Toast</strong></p> <p>At Toast, one of our company values is that we''re hungry
    to build and learn. We believe learning new AI tools empowers us to build for
