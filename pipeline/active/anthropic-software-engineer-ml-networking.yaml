    movement over the network</li> <li>Benchmark software for a new networking environment</li>
    <li>Implement a new collective algorithm to improve latency</li> <li>Optimize
    congestion control algorithms for large-scale synchronous workloads</li> <li>Debug
    kernel-level network latency spikes</li> </ul><div class="content-pay-transparency"><div
