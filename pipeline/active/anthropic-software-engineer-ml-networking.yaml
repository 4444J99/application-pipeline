    class="title">Annual Salary:</div><div class="pay-range"><span>$280,000</span><span
    class="divider">&mdash;</span><span>$850,000 USD</span></div></div></div><div
    class="content-conclusion"><h2><strong>Logistics</strong></h2> <p><strong>Education
    requirements: </strong>We require at least a Bachelor''s degree in a related field
