    a whole. Our team is a quickly growing group of committed researchers, engineers,
    policy experts, and business leaders working together to build beneficial AI systems.</p></div><h2><strong>Role
    Summary</strong></h2> <p>A systems-level engineer specializing in network infrastructure
    and network optimization, with expertise in building and maintaining software
    that interacts with networks. You will be responsible for writing and maintaining
    software that interfaces between our accelerators and our high-speed networks.
    This role requires deep technical knowledge of network protocols, kernel-space
    and/or user-space networks, interfacing with hardware, and the ability to debug
    and optimize distributed software at the network level.</p> <h2><strong>You may
    be a good fit if you have:</strong></h2> <h3><strong>Networking Systems Engineering:</strong></h3>
    <ul> <li>Expert-level proficiency with network protocols and networking concepts</li>
    <li>Deep kernel networking: TCP/IP stack internals, XDP, eBPF, io_uring, and epoll</li>
    <li>User-space networking: DPDK, RDMA, kernel bypass techniques</li> <li>Understanding
    of how to build higher-level abstractions like collectives and RPC</li> <li>Skilled
    at diagnosing and resolving networking issues in distributed systems, especially
    at OSI model layers 2-4</li> </ul> <h3><strong>Low-Level Systems and OS Programming:</strong></h3>
    <ul> <li>Strong programming skills in a systems programming language, including
    memory management, lock-free data structures, and NUMA-aware programming</li>
    <li>Software, driver, and OS performance optimization tools and techniques</li>
    <li>Comfort with or desire to learn Rust</li> </ul> <h2><strong>Strong candidates
    may have:</strong></h2> <ul> <li>Understanding of ML accelerators and accelerator
    drivers</li> <li>Demonstrated ability to design new network protocols</li> <li>Experience
    with PCIe and drivers for PCIe devices</li> <li>Expertise in algorithms used in
    networking, including compression and graph algorithms</li> <li>Experience programming
    on SmartNICs</li> <li>5+ years of experience in systems programming or network
    programming</li> <li>Often comes from backgrounds in: HPC, telecommunications,
    host networking software, OS/kernel engineering, or embedded systems</li> <li>Strong
    debugging mindset with patience for complex, multi-layered issues</li> </ul> <h2><strong>Representative
