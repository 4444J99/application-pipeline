  description: '<h2><strong>Who we are</strong></h2> <h3><strong>About Privy</strong></h3>
    <p>Our mission is to make privacy and user ownership the default online. We build
    simple, flexible developer tooling that make it easy to build products that put
    users first. By leveraging modern cryptography, we shift the status quo around
    digital ownership and protect the accounts and assets of millions of users.</p>
    <p>Engineering at Privy is not just about writing world-class code. We create
    software that turns complex technical systems into delightful developer tools.
    We assemble tried-and-true primitives into intuitive, responsive APIs and beautiful
    interfaces. We believe in open-source work and transparency with our teammates
    and users. We encourage each other to think big, run experiments and follow our
    curiosity so we can build better tooling that lets developers shine and empower
    their users.</p> <p>Learn more about Privy: <a href="https://privy.io/blog/announcing-our-acquisition-by-stripe">Privy
    and Stripe: Bringing crypto to everyone</a></p> <h2><strong>What you’ll do</strong></h2>
    <p>As our first Developer Experience Engineer hire at Privy, you will bridge the
    gaps between our product and developer community. You will be responsible for
    improving developer experience, reducing support burden through proactive education,
    and building developer advocacy initiatives to drive adoption and engagement of
    our product. Customer obsession is a core part of Privy’s culture. You’ll work
    closely with fellow engineers, product, and business teams to ensure Privy''s
    customers needs are met.&nbsp;</p> <h3><strong>Responsibilities</strong></h3>
    <ul> <li>Create and maintain code samples, starter repos, and recipes that help
    developers integrate our product effectively</li> <li>Establish and create a regular
    cadence of developer-focused content (blog posts, video tutorials, code samples)</li>
    <li>Collaborate with internal teams to organize our documentation, prioritize
    content gaps and improvements, and gather developer feedback on all content effectiveness.</li>
    <li>Engage with the developer community through industry events, hackathons, and
    other channels.&nbsp;</li> </ul> <h2><strong>Who you are</strong></h2> <h3><strong>Minimum
    requirements</strong></h3> <ul> <li>6+ years of experience in a developer advocacy,
    technical evangelism, technical writing or similar role.</li> <li>Adept programming
    skills and a deep understanding of the technologies the company uses.&nbsp;</li>
    <li>Excellent written and verbal communication skills, with the ability to explain
    complex concepts in a clear and concise manner.&nbsp;</li> <li>Passion for building
    and engaging with developer communities.&nbsp;</li> <li>Strong problem solving
    skills, identify and solve technical challenges.&nbsp;</li> <li>Ability to build
    relationships, collaborate with others, and work effectively in a team environment.&nbsp;</li>
    </ul> <h3><strong>Preferred qualifications</strong></h3> <ul> <li>Strong preference
    for experience in an API-based business and in payments, fintech, or crypto.</li>
    </ul>'
