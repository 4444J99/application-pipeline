  description: 'About Ramp Ramp is building the smart infrastructure for finance teams,
    embedded in the transaction flow of every dollar a business spends. We automate
    how over $100B in annualized spend flows in and out of 50,000+ companies: authorizing
    payments, flagging risk, categorizing spend, and closing books. The problems are
    high-stakes, data-dense, and unforgiving. We hire people with high agency and
    high urgency. We look for slope over intercept. We care less about where you trained
    and more about what you’ve built. At Ramp, everyone is a builder who owns problems
    end to end and makes consequential decisions that shape the outcome. The median
    Ramp customer saves 5% and grows revenue 16% in their first year – far in excess
    of businesses operating without Ramp. We believe every ambitious company deserves
    the same. If you want to build systems that directly shape how companies move
    and manage billions, Ramp is the place to do it. About the Role The Risk Engineering
    team builds the systems that enable Ramp to move quickly without compromising
    trust. As an engineer on Risk, you’ll own systems that influence $100+ billion
    in annual payment volume through millions of decisions across our product stack
    in support of the most ambitious FinTech portfolio in the United States. We are
    looking for a backend engineer to own the technical roadmap for limit management,
    portfolio optimization, and agentic workflows. You will build robust systems,
    automate complex operational tasks, and maintain the high-frequency controls that
    power all of Ramp’s products. If you are obsessed with correctness, excited by
    ambiguity, and passionate about problems at the intersection of distributed systems
    and financial strategy, this role is for you. What You''ll Do Architect scalable,
    stateful systems for automated limit management to optimize Ramp’s charge card
    portfolio. Envision and build the next generation of agents and tools that automate
    manual Risk decisions and increase operational efficiency. Develop high-volume,
    low-latency Risk controls to support Ramp’s expansion into new products, customer
    segments, and geographies. Design and build real-time decisioning systems spanning
    the entirety of a business’ tenure on Ramp. Partner closely with analysts, data
    scientists and product to translate risk strategies into reliable software. What
    You Need 2+ years of backend engineering experience. Proficiency in Python or
    a comparable backend language. Experience working with distributed systems and
    async frameworks. Proficiency with converting abstract business problems into
    robust data models and technical specs. Experience building or operating systems
    with strict auditability, observability, and correctness guarantees. High ownership
    mentality – you care deeply about the systems you build. Ability to work closely
    with non-engineering partners (Risk Strategy, Ops, Sales) to create impact. Nice
    to Haves Experience leveraging AI/LLMs for development or for internal workflows.
    Interest in financial optimization problems. Willingness to learn and move fast
    while holding the bar on correctness. Defensive programming aptitude. Experience
    using feature stores, rule engines and ML platforms in production. Benefits (for
    U.S.-based full-time employees) 100% medical, dental & vision insurance coverage
    for you Partially covered for your dependents One Medical annual membership 401k
    (including employer match on contributions made while employed by Ramp) Flexible
    PTO Fertility HRA (up to $10,000 per year) Parental Leave Unlimited AI token usage
    Pet insurance Centralized home-office equipment ordering for all employees Health
    and Wellness stipend In-office perks: lunch, snacks, drinks, and more Budget for
    intra-office travel Relocation support to NYC or SF (as needed) Referral Instructions
    If you are being referred for the role, please contact that person to apply on
    your behalf. Other notices Pursuant to the San Francisco Fair Chance Ordinance,
    we will consider for employment qualified applicants with arrest and conviction
    records. Beware of recruiting scams: Ramp will only contact you through official
    @ Ramp.com email addresses and will never ask for payment or sensitive personal
    information during the hiring process. Ramp Applicant Privacy Notice'
