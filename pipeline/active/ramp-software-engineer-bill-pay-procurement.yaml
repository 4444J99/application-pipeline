  description: 'About Ramp Ramp is building the smart infrastructure for finance teams,
    embedded in the transaction flow of every dollar a business spends. We automate
    how over $100B in annualized spend flows in and out of 50,000+ companies: authorizing
    payments, flagging risk, categorizing spend, and closing books. The problems are
    high-stakes, data-dense, and unforgiving. We hire people with high agency and
    high urgency. We look for slope over intercept. We care less about where you trained
    and more about what you’ve built. At Ramp, everyone is a builder who owns problems
    end to end and makes consequential decisions that shape the outcome. The median
    Ramp customer saves 5% and grows revenue 16% in their first year – far in excess
    of businesses operating without Ramp. We believe every ambitious company deserves
    the same. If you want to build systems that directly shape how companies move
    and manage billions, Ramp is the place to do it. About the Role Over the past
    few years at Ramp, we''ve reimagined how businesses manage spend, and the backbone
    of that vision is Procure-to-Pay. The P2P team builds the systems that connect
    vendors, invoices, and payments into one seamless, automated flow. It''s where
    billions of dollars move through our platform, and every line of code matters.
    We''re looking for a backend engineer who loves complex systems, obsesses over
    correctness, and wants to shape how money moves in modern finance software. You''ll
    help design and scale the infrastructure that powers our payment rails, ensures
    auditability across products, and unlocks the next wave of AI-driven automation.
    It''s a chance to work on systems that actually move money, with a team that cares
    deeply about precision, reliability, and scale. The problems are tough, the stakes
    are high, and the impact is massive. What You''ll Do Design and build core P2P
    systems, from invoice ingestion and approval workflows to payment orchestration
    and reconciliation logic. Enable AI agents to classify, validate, and process
    invoices automatically, reducing manual review and accelerating financial close.
    Own backend services that process large volumes of financial events across Bill
    Pay, Procurement, and Treasury. Collaborate cross-functionally with Product, Finance,
    and Data to translate accounting and compliance policies into robust, testable
    code. Extend Ramp’s financial ledger to handle new transaction types, international
    payments, and automated audit trails. Drive technical excellence around reliability,
    observability, and data integrity in systems where correctness directly impacts
    financial reporting. Continuously improve developer tooling and internal APIs
    that make P2P data accessible across Ramp’s product ecosystem. What You Need 3+
    years of backend engineering experience, ideally in fintech, payments, or transactional
    systems. Proven experience designing and maintaining data-intensive distributed
    systems with strong consistency and auditability requirements. Deep knowledge
    of Python (or a comparable backend language) and SQL. Comfort building event-driven
    systems and scaling high-volume, low-latency architectures. Strong system design
    and debugging skills; you care about correctness as much as speed. Ability to
    work closely with finance, risk, and product stakeholders to translate business
    rules into software logic. Passion for building systems that are precise, reliable,
    and extensible as Ramp scales globally. Nice to Have Experience with accounts
    payable, payments, or reconciliation systems. Familiarity with accounting or ERP
    integrations (e.g. NetSuite, QuickBooks, Oracle). Background in compliance-heavy
    or regulated domains. Exposure to AI-driven automation or interest in working
    with AI/ML teams to build intelligent finance workflows. Desire to move quickly
    while maintaining an uncompromising standard for data accuracy and auditability.
    Benefits (for U.S.-based full-time employees) 100% medical, dental & vision insurance
    coverage for you Partially covered for your dependents One Medical annual membership
    401k (including employer match on contributions made while employed by Ramp) Flexible
    PTO Fertility HRA (up to $10,000 per year) Parental Leave Unlimited AI token usage
    Pet insurance Centralized home-office equipment ordering for all employees Health
    and Wellness stipend In-office perks: lunch, snacks, drinks, and more Budget for
    intra-office travel Relocation support to NYC or SF (as needed) Referral Instructions
    If you are being referred for the role, please contact that person to apply on
    your behalf. Other notices Pursuant to the San Francisco Fair Chance Ordinance,
    we will consider for employment qualified applicants with arrest and conviction
    records. Beware of recruiting scams: Ramp will only contact you through official
    @ Ramp.com email addresses and will never ask for payment or sensitive personal
    information during the hiring process. Ramp Applicant Privacy Notice'
