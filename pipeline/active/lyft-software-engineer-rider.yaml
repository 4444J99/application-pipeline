  description: "<p>At Lyft, our purpose is to serve and connect. We aim to achieve\
    \ this by cultivating a work environment where all team members belong and have\
    \ the opportunity to thrive.</p> <p>Lyft is looking for software engineers from\
    \ a scope of disciplines. We are growing our team with people who want to build,\
    \ improve and incorporate technologies that make the lives of our community more\
    \ enriched. As an engineer at Lyft, you'll collaborate with teams like product,\
    \ design, data science, analytics, and operations on code that empower us to iterate\
    \ quickly, while focusing on delighting our passengers and drivers.</p> <p>The\
    \ Rider organization is focused on building a seamless, best-in-class rideshare\
    \ experience for riders. From the foundational functionality of requesting a ride\
    \ to the tailored interactions with your flight, we sweat the small stuff to help\
    \ make Lyft the best transportation solution. As a Software Engineer on the Rider\
    \ Team, you will work hand in hand with various teams across Lyft, fostering collaboration,\
    \ and driving innovation to improve riders' experience with rideshare.</p> <h2>Responsibilities:</h2>\
    \ <ul> <li>Write well-crafted, well-tested, readable, maintainable code</li> <li>Participate\
    \ in code reviews to ensure code quality and distribute knowledge&nbsp;</li> <li>Participate\
    \ in our team on-call rotation. Identify, triage, debug and resolve issues/bugs\
    \ across our various applications and platforms</li> <li>Have the ability to explain\
    \ the various trade offs made in decisions</li> <li>Manage project priorities,\
    \ deadlines, and deliverables.</li> <li>Partner with product managers, designers,\
    \ scientists, and other engineering teams to build complex features and products\
    \ from idea to positive execution</li> </ul> <h2>Experience:</h2> <ul> <li>BS/MS\
    \ or equivalent in Computer Engineering, Computer Science, or related field or\
    \ equivalent practical experience</li> <li>Experience with Python, Go.</li> <li>Proficiency\
    \ in object-oriented programming</li> <li>Experience working with data structures\
    \ or algorithms&nbsp;</li> <li>Ability to work with a low-ego, highly collaborative,\
    \ and cross-functional team</li> <li>Bonus points: experience pursuing side projects\
    \ or open-source projects</li> </ul> <h2><strong>Benefits:</strong><strong><br></strong></h2>\
    \ <ul> <li>Great medical, dental, and vision insurance options with additional\
    \ programs available when enrolled</li> <li>Mental health benefits</li> <li>Family\
    \ building benefits</li> <li>Child care and pet benefits</li> <li>401(k) plan\
    \ with company match to help save for your future</li> <li>In addition to 12 observed\
    \ holidays, salaried team members have discretionary paid time off, hourly team\
    \ members have 15 days paid time off</li> <li>18 weeks of paid parental leave.\
    \ Biological, adoptive, and foster parents are all eligible</li> <li>Subsidized\
    \ commuter benefits</li> <li>Monthly Lyft credits and complimentary Lyft Pink\
    \ membership</li> </ul> <p>Lyft is an equal opportunity employer committed to\
    \ an inclusive workplace that fosters belonging. All qualified applicants will\
    \ receive consideration for employment without regards to race, color, religion,\
    \ sex, sexual orientation, gender identity, national origin, disability status,\
    \ protected veteran status, age, genetic information, or any other basis prohibited\
    \ by law. We also consider qualified applicants with criminal histories consistent\
    \ with applicable federal, state and local law.</p> <p>Lyft highly values having\
    \ employees working in-office to foster a collaborative work environment and company\
    \ culture. This role will be in-office on a hybrid schedule \u2014 Team Members\
    \ will be expected to work in the office 3 days per week on Mondays, Wednesdays,\
    \ and Thursdays. Lyft considers working in the office at least 3 days per week\
    \ to be an essential function of this hybrid role. Your recruiter can share more\
    \ information about the various in-office perks Lyft offers. Additionally, hybrid\
    \ roles have the flexibility to work from anywhere for up to 4 weeks per year.\
    \ #Hybrid</p> <p>The expected base pay range for this position in the New York\
    \ City area is $108,000 - $135,000, not inclusive of potential equity offering,\
    \ bonus or benefits. Salary ranges are dependent on a variety of factors, including\
    \ qualifications, experience and geographic location. Your recruiter can share\
    \ more information about the salary range specific to your working location and\
    \ other factors during the hiring process.</p>"
