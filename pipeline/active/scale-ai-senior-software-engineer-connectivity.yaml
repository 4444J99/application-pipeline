  description: '<h2><strong>Senior Software Engineer, Platform — Connectivity</strong></h2>
    <p>The Connectivity team owns the core platform that enables Scale to continuously
    generate, evaluate, and deliver high-quality training data to our customers. Our
    systems sit at the center of Scale’s data and AI infrastructure, powering large-scale
    workflows while supporting frontier AI capabilities such as multi-modality, long-horizon
    reasoning, and agentic behavior.</p> <p>We’re looking for a senior engineer with
    <strong>deep experience</strong> <strong>building robust platforms</strong>, someone
    who brings strong architectural judgment, a bias toward correctness and reliability,
    and the ability to design systems that scale and evolve cleanly over time. This
    is a backend-heavy role with full-stack expectations and significant ownership
    from design through long-term operation.</p> <h3><strong>What You’ll Do</strong></h3>
    <ul> <li><strong>Design and own foundational platform systems</strong> that support
    scalable data generation, evaluation, and bespoke customer delivery across Scale’s
    ecosystem.</li> <li><strong>Architect extensible, production-grade services</strong>
    that can support frontier AI workflows, including multi-modal inputs, long-running
    processes, and agentic orchestration.</li> <li><strong>Build and operate distributed
    systems at scale</strong>, with strong guarantees around correctness, reliability,
    observability, and cost efficiency.</li> <li><strong>Integrate with public LLM
    APIs</strong> and AI services, designing abstractions that are resilient to model
    churn, latency variability, and evolving usage patterns.</li> <li><strong>Design
    and maintain data transformation and processing systems</strong>, supporting complex
    schema evolution, customization, and high-throughput workloads.</li> <li><strong>Partner
    closely with infrastructure, product, and customer-facing teams</strong> to define
    requirements, shape technical direction, and deliver seamless integration experiences
    for customers.</li> <li><strong>Lead multi-quarter technical initiatives</strong>,
    including authoring and driving a 6+ month technical roadmap for major platform
    investments.</li> <li><strong>Apply strong engineering judgment in ambiguous problem
    spaces</strong>, balancing speed with long-term maintainability and operational
    excellence.</li> <li><strong>Raise the quality bar</strong> through thoughtful
    system design reviews, rigorous code reviews, and mentorship grounded in real-world
    production experience.</li> </ul> <h3><strong>Ideal Experience</strong></h3> <ul>
    <li>7+ years of professional software engineering experience, with a strong background
    in building and operating large-scale, production-grade platforms.<br><br></li>
    <li>Deep expertise in distributed systems and cloud-native architectures, including
    Kubernetes, microservices, event-driven systems, caching, and production databases.<br><br></li>
    <li>Proven ability to lead multi-quarter technical initiatives, work effectively
    across cross-functional teams, and apply strong architectural judgment in ambiguous
    environments.<br><br></li> <li>Preferred: Experience integrating with public LLM
    APIs and designing systems that handle scale, reliability, latency, and cost tradeoffs.<br><br></li>
    </ul> <p>Preferred: Experience building or operating data processing and transformation
    systems supporting complex workflows and evolving schemas.</p><div class="content-pay-transparency"><div
