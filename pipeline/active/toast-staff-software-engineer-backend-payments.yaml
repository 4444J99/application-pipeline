  description: '<p><strong>Location(s): </strong>US (remote), Boston (hybrid), or
    New York (hybrid)</p> <p>&nbsp;</p> <p>Toast is driven by building the restaurant
    platform that helps restaurants adapt, take control, and get back to what they
    do best: building the businesses they love.&nbsp;</p> <p>We’re not your traditional
    tech company and we don’t aim to be. Going against the grain is in our DNA. Building
    a revolutionary product begins with revolutionary thinking. That’s why we value
    diversity of background and lived experience. Together, we empower restaurants
    of all sizes to build great teams, increase revenue, improve operations, and delight
    their guests. We pair our deep understanding of the restaurant industry with powerful
    cloud based software and restaurant-grade hardware to deliver an intuitive all-in-one
    platform. Join us on our mission to empower the restaurant community to delight
    guests, do what they love, and thrive.</p> <p><strong><em>Bready</em></strong><strong>*
    to make a change?</strong></p> <p>Fintech at Toast operates one of the most critical
    portions of the Toast infrastructure: processing payments on behalf of our restaurants
    and ensuring that restaurants are paid in a timely manner. Payment processing
    is a key source of Toast’s revenue and also the lifeblood of our customers; we
    process millions of dollars in transactions per day.&nbsp;</p> <p>We are seeking
    a Staff Software Engineer to join our Payments team to build out our unified payment
    processing solution. This platform offers a single, integrated service for payment
    acceptance across various channels and supports a configurable enterprise approach.
    It is designed to allow a build-once, available-to-all strategy for both existing
    and emerging payment methods. The successful candidate will guide and contribute
    to the development of services providing supporting and core functionality within
    and around this payment processing solution.</p> <p><strong>About this </strong><strong><em>roll</em></strong><strong>*
    (Responsibilities)&nbsp;</strong></p> <ul> <li>Plan, design, build, and deliver
    features for Toast’s payments products&nbsp;</li> <li>Plan, develop, and implement
    best practices such as automated test suites to ensure the code shipped to our
    customers meets the highest quality standards</li> <li>Roll - pun intended! -
    features out to customers, including monitoring for success</li> <li>Collaborate
    with our PM (and UX) on the definition and design of features&nbsp;&nbsp;</li>
    <li>Collaborate and partner with a wide array of teams across Toast in order to
    spread knowledge inter- and intra-team</li> <li>Lead and work with experienced
    engineers to deliver design and code review&nbsp;</li> </ul> <p><strong>Do you
    have the right </strong><strong><em>ingredients*</em></strong><strong>? (Requirements)</strong></p>
    <ul> <li>8+ years of experience in designing and implementing robust backend services</li>
    <li>Ability to step into a technical leadership role on the team, guiding/coaching/mentor
    more junior engineers on best practices in architecture, design, coding, testing,
    deployment, etc.</li> <li>Proven ability to design and develop scalable and secure
    APIs that integrate with various internal/external systems</li> <li>Applied knowledge
    of best practices in API lifecycle management, including versioning, documentation,
    and deprecation strategies, with the ability to share this amongst the team and
    peers</li> <li>Demonstrated experience with microservices architecture and containerization
    technologies for enhanced scalability and maintainability</li> </ul> <p><strong>Special
    Sauce (*Nice to Haves)</strong></p> <ul> <li>Demonstrated proficiency with DynamoDB
    or PostgreSQL</li> <li>Proficiency in Kotlin (or Java and willing to learn Kotlin)
    and Kotlin-specific frameworks and libraries for building efficient backend solutions</li>
    <li>Experience with modern data architectures (event sourcing, OLAP, ETL/ELT,
    streaming data)</li> <li>Experience designing payments APIs</li> <li>Familiarity
    with PCI-DSS</li> <li>Familiarity with AI-augmented development workflows and
    tools (e.g., Claude Code, GitHub Copilot, Codex, or similar)</li> </ul> <p data-pm-slice="1
    1 []"><strong>AI at Toast</strong></p> <p>At Toast, one of our company values
    is that we''re hungry to build and learn. We believe learning new AI tools empowers
    us to build for our customers faster, more independently, and with higher quality.
    We provide these tools across all disciplines, from Engineering and Product to
    Sales and Support, and are inspired by how our Toasters are already driving real
    value with them. The people who thrive here are those who embrace changes that
    let us build more for our customers; it’s a core part of our culture.</p> <p data-pm-slice="1
    1 []"><strong>Our Total Rewards Philosophy&nbsp;<br></strong>We strive to provide
    competitive compensation and benefits programs that help to attract, retain, and
