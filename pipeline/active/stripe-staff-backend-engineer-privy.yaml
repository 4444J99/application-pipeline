  description: '<h2><strong>Who we are</strong></h2> <h3><strong>About Privy</strong></h3>
    <p>Our mission is to make privacy and user ownership the default online. We build
    simple, flexible developer tooling that make it easy to build products that put
    users first. By leveraging modern cryptography, we shift the status quo around
    digital ownership and protect the accounts and assets of millions of users.</p>
    <p>Learn more about Privy: <a href="https://privy.io/blog/announcing-our-acquisition-by-stripe">Privy
    and Stripe: Bringing crypto to everyone</a></p> <h2><strong>What you’ll do</strong></h2>
    <p>Engineering at Privy is not just about writing world-class code. We create
    software that turns complex technical systems into delightful developer tools.
    We assemble tried-and-true primitives into intuitive, responsive APIs and beautiful
    interfaces. We believe in open-source work and transparency with our teammates
    and users. We encourage each other to think big, run experiments and follow our
    curiosity so we can build better tooling that lets developers shine and empower
    their users.</p> <h2><strong>Who you are</strong></h2> <h3><strong>Minimum requirements</strong></h3>
    <ul> <li>8+ years of experience building and maintaining a production system at
    scale</li> <li>An understanding of modern API development best practices and design</li>
    <li>Experience in building data models, managing database migrations and best
    practices, and infrastructure configuration</li> <li>An ability to thrive in a
    fast paced environment.</li> <li>A growth mindset and a constant curiosity and
    fearlessness to dive into the unknown.</li> <li>An ability to write maintainable,
    well-tested, modular code, but also be pragmatic about moving fast.</li> <li>Excellent
    written and verbal communication skills, including the ability to write clear
    technical documentation.</li> </ul> <h3><strong>Preferred qualifications</strong></h3>
    <ul> <li>Strong preference for experience in an API-based business and in payments,
    fintech, or crypto.</li> <li>Written open-source developer tooling</li> <li>Published
    about your work (open source code, internal or external presentations, blog posts,
    etc.)</li> <li>Past experience working in authentication or security</li> </ul>'
