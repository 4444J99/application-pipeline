  description: '<p>Toast creates technology to help restaurants and local businesses
    succeed in a digital world, helping business owners operate, increase sales, engage
    customers, and keep employees happy.</p> <p>As a Senior Software Engineer within
    the <strong>Business Technology Transformation (BTT)</strong> team, you will be
    the technical engine behind Toast’s physical product journey. You will work on
    high-impact projects that ensure our customers receive their hardware on time
    by optimizing the systems that govern inventory and delivery.</p> <p><strong>A
    day in the life (Responsibilities)&nbsp;</strong></p> <ul> <li><strong>System
    Integration:</strong> Plan and execute complex integrations between our core restaurant
    platform and Supply Chain systems like <strong>NetSuite ERP</strong>, <strong>Salesforce</strong>,
    and <strong>Shipium</strong>.</li> <li><strong>Technical Design:</strong> Draft
    high-level technical designs and engineering plans for scalable services that
    handle large transactional volumes.</li> <li><strong>Order Lifecycle Management:</strong>
    Implement and maintain both new and legacy integrations across disparate platforms
    to ensure a seamless <strong>Order Management flow</strong>.</li> <li><strong>Quality
    &amp; Stability:</strong> Develop and automate end-to-end testing to provide confidence
    in production releases, conducting root-cause analysis when issues arise.</li>
    <li><strong>Collaboration:</strong> Partner closely with Product Owners and stakeholders
    in Supply Chain, Finance, and Operations to translate business goals into technical
    reality.</li> </ul> <p><strong>What you''ll need to thrive (Requirements)</strong></p>
    <ul> <li><strong>Backend Expertise:</strong> 5-7+ years of experience delivering
    high-quality, reliable services using <strong>Java</strong>, <strong>Kotlin</strong>,
    or other object-oriented languages.</li> <li><strong>Supply Chain Knowledge:</strong>
    Familiarity with the technical logic behind <strong>Order Management</strong>,
    <strong>Warehouse Management (WMS)</strong>, or <strong>Transportation Management
    (TMS)</strong> systems.</li> <li><strong>Integration Proficiency:</strong> Proven
    experience working with <strong>REST</strong>, <strong>XML</strong>, and <strong>JSON</strong>
    to connect disparate enterprise applications.</li> <li><strong>Data Mastery:</strong>
    A strong understanding of data manipulation and distribution, ensuring data integrity
    across multiple systems.</li> <li><strong>Technical Rigor:</strong> Excellent
    version control and QA skills, with a focus on building scalable technology that
    avoids future tech debt.</li> </ul> <p><strong>What will help you stand out (Nonessential
    Skills/Nice to Haves)</strong></p> <ul> <li><strong>Enterprise Platforms:</strong>
    Hands-on experience with <strong>NetSuite</strong> (SuiteScript), <strong>Salesforce</strong>,
    or <strong>Zuora Billing</strong>.</li> <li><strong>iPaaS Tools:</strong> Experience
    with <strong>Workato</strong> or similar integration platforms.</li> <li><strong>Modern
    Infrastructure:</strong> Exposure to distributed systems, <strong>SQL</strong>,
    and messaging services like <strong>Pulsar</strong>.</li> <li><strong>CI/CD:</strong>
    Practical experience with CI/CD best practices in a cloud-based environment.<br><br></li>
    </ul> <p data-pm-slice="1 1 []"><strong>AI at Toast</strong></p> <p>At Toast,
    one of our company values is that we''re hungry to build and learn. We believe
    learning new AI tools empowers us to build for our customers faster, more independently,
    and with higher quality. We provide these tools across all disciplines, from Engineering
    and Product to Sales and Support, and are inspired by how our Toasters are already
    driving real value with them. The people who thrive here are those who embrace
    changes that let us build more for our customers; it’s a core part of our culture.</p>
    <p><strong>Our Total Rewards Philosophy&nbsp;</strong><br>We strive to provide
    competitive compensation and benefits programs that help to attract, retain, and
    motivate the best and brightest people in our industry. Our total rewards package
    goes beyond great earnings potential and provides the means to a healthy lifestyle
    with the flexibility to meet Toasters’ changing needs. Learn more about our benefits
    at&nbsp;<a href="https://careers.toasttab.com/toast-benefits">https://careers.toasttab.com/toast-benefits</a>.</p>
    <p>&nbsp;</p><div class="content-pay-transparency"><div class="pay-input"><div
    class="description"><p><span style="font-weight: 400;">The base salary range for
    this role is listed below. The starting salary will be determined based on skills
    and experience. </span>In addition to base salary, our total rewards components
    include cash compensation (overtime, bonus/commissions, if eligible), benefits,
    and equity (if eligible).</p></div><div class="title">Pay Range</div><div class="pay-range"><span>$138,000</span><span
    class="divider">&mdash;</span><span>$221,000 USD</span></div></div></div><div
    class="content-c'
