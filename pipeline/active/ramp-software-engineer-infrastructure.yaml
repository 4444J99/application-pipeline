  description: 'About Ramp Ramp is building the smart infrastructure for finance teams,
    embedded in the transaction flow of every dollar a business spends. We automate
    how over $100B in annualized spend flows in and out of 50,000+ companies: authorizing
    payments, flagging risk, categorizing spend, and closing books. The problems are
    high-stakes, data-dense, and unforgiving. We hire people with high agency and
    high urgency. We look for slope over intercept. We care less about where you trained
    and more about what you’ve built. At Ramp, everyone is a builder who owns problems
    end to end and makes consequential decisions that shape the outcome. The median
    Ramp customer saves 5% and grows revenue 16% in their first year – far in excess
    of businesses operating without Ramp. We believe every ambitious company deserves
    the same. If you want to build systems that directly shape how companies move
    and manage billions, Ramp is the place to do it. About the Role Ramp is, at its
    core, an engineering company, and is on a mission to build the best engineering
    team in the world! They are highly cross-functional, and eager to solve a wide
    range of engineering challenges. Our ideal candidate has a strong sense of ownership
    and enjoys owning projects from inception to scaling it in production. We value
    people who take pride in their work, and show an aptitude for learning quickly
    whether they’re familiar with our stack or not.You’ll be working with a nimble
    team of committed and talented engineers and having a large, long-term impact
    on technical design and engineering culture. Our ideal candidate possesses a deep
    knowledge of AWS, or an equivalent cloud provider and will assist in constructing
    the upcoming versions of our database infrastructure. They have been accountable
    for deploying production databases and have experience handling scale, concurrency,
    fault tolerance, and idempotency. They exhibit a strong sense of ownership, promptly
    addressing high-urgency issues, and they also mentor and foster the growth of
    every other team member. What You’ll Do Influence and implement the next generation
    of Ramp''s database, real-time queue, or container orchestration infrastructure
    Work across our engineering organization to introduce and scale best practices
    with cloud-native technologies like Cloudflare, Amazon ALB, Service Discovery,
    ECS/EKS, Celery, Kafka, Amazon Aurora PostgreSQL, Elasticache Redis, and S3 Build
    abstractions within Terraform to simplify the architecture and increase velocity
    and ownership Find solutions to Ramp''s toughest scaling, performance, and low
    latency problems Participate in an On Call rotation to solve critical production
    events What You Need 2+ of experience shipping high-quality architectures for
    critical systems preferred Production experience in AWS, GCP, or Azure An ability
    to think through customer requirements and come up with high-impact ways to quickly
    solve their problems Expertise in a production deployment of Infrastructure-as-Code
    i.e. Terraform Proficiency in an object-oriented programing language Deep experience
    in one of the following : Large-scale SQL database administration (e.g. PostgreSQL,
    MySQL) Real-time queue systems (e.g. Kafka, Celery, SQS, Temporal) Container Orchestration/Web
    Server Administration (ECS/Kubernetes, Load Balancing, Gunicorn, Flask) Benefits
    (for U.S.-based full-time employees) 100% medical, dental & vision insurance coverage
    for you Partially covered for your dependents One Medical annual membership 401k
    (including employer match on contributions made while employed by Ramp) Flexible
    PTO Fertility HRA (up to $10,000 per year) Parental Leave Unlimited AI token usage
    Pet insurance Centralized home-office equipment ordering for all employees Health
    and Wellness stipend In-office perks: lunch, snacks, drinks, and more Budget for
    intra-office travel Relocation support to NYC or SF (as needed) Referral Instructions
    If you are being referred for the role, please contact that person to apply on
    your behalf. Other notices Pursuant to the San Francisco Fair Chance Ordinance,
    we will consider for employment qualified applicants with arrest and conviction
    records. Beware of recruiting scams: Ramp will only contact you through official
    @ Ramp.com email addresses and will never ask for payment or sensitive personal
    information during the hiring process. Ramp Applicant Privacy Notice'
