  description: '<h2 id="who-we-are">Who we are</h2> <h3 id="about-privy">About Privy</h3>
    <p>Our mission is to make privacy and user ownership the default online. We build
    simple, flexible developer tooling that make it easy to build products that put
    users first. By leveraging modern cryptography, we shift the status quo around
    digital ownership and protect the accounts and assets of millions of users.</p>
    <p>Learn more about Privy:&nbsp;<a class=" Link " href="https://privy.io/blog/announcing-our-acquisition-by-stripe"
    data-js-controller="AnalyticsButton" data-analytics-category="Links" data-analytics-action="Clicked"
    data-analytics-label="Related content">Privy and Stripe: Bringing crypto to everyone</a></p>
    <h3>About the team</h3> <p>Engineering at Privy is not just about writing world-class
    code. We create software that turns complex technical systems into delightful
    developer tools. We assemble tried-and-true primitives into intuitive, responsive
    APIs and beautiful interfaces. We believe in open-source work and transparency
    with our teammates and users. We encourage each other to think big, run experiments
    and follow our curiosity so we can build better tooling that lets developers shine
    and empower their users.</p> <h2>What you’ll do</h2> <p>As a small team that builds
    for other developers, we believe engineering and product are inextricably connected.
    You''ll be surrounded by a team with as much of a commitment to building and operating
    infrastructure as you are.&nbsp;</p> <ul> <li>Manage and architect multi-tenant
    infrastructure that serves billions of requests every month</li> <li>Design our
    build and deploy systems across the stack, from SDKs to apps to high-traffic APIs
    to complex secure enclaves, and more – all for a team that ships daily</li> <li>Drive
    observability across our product and help keep our systems up and performant in
    our role in the most critical parts of our customers'' stacks</li> <li>Advocate
    for making the right technical investments at the right time in a company with
    ever-evolving technical needs</li> </ul> <h2><strong>Who you are</strong></h2>
    <h3>Minimum requirements</h3> <ul> <li>8+ years of experience in building highly
    available production systems</li> <li>Knowledge of Typescript or Python, Terraform
    or similar, Cloudflare, and AWS infrastructure</li> <li>An understanding of modern
    web and API development best practices</li> <li>Experience building delightfully
    simple developer experiences</li> </ul> <h3><strong>Preferred qualifications</strong><span
    style="font-weight: 400;">&nbsp;</span></h3> <ul> <li>An ability to quickly learn
    new skills and take on new challenges</li> <li>Experience at rapidly growing startups
    and the flexibility it requires</li> <li>Excitement about authentication, security,
    or in web3</li> <li>An understanding of EC2 Nitro Enclaves and ASGs/Kubernetes</li>
    </ul>'
