  description: '<p><strong>Who We Are</strong></p> <p>Toast creates technology to
    help restaurants and local businesses succeed in a digital world, helping business
    owners operate, increase sales, engage customers, and keep employees happy.</p>
    <p>&nbsp;</p> <p><strong>Are you bready* for a change? (team info)</strong></p>
    <p>Our Catering &amp; Events team is expanding Toast’s reach into an exciting
    and growing space: helping restaurants, caterers and venues manage everything
    from office catering to large-scale events. Whether it’s a wedding, a corporate
    lunch, or a holiday catering rush, our software powers the experiences that matter
    most to our customers and their guests.</p> <p>As a Software Engineer II on the
    Catering &amp; Events team, you’ll help build and evolve a product that enables
    customers to manage complex catering and event workflows with ease. You’ll work
    across the stack to deliver high-impact features that reach real customers quickly.
    This is a highly collaborative role where you’ll partner closely with product
    managers and designers to bring ideas to life.</p> <p>You’ll thrive here if you
    enjoy moving fast, learning from customers, and iterating on products in a tight
    feedback loop.<br><br></p> <p><strong>About this </strong><strong><em>roll</em></strong><strong>*
    </strong>(Responsibilities)&nbsp;</p> <ul> <li>Build and ship new features across
    our full-stack platform&nbsp;</li> <li>Improve and scale existing systems to support
    a growing and evolving customer base</li> <li>Collaborate closely with Product
    and Design to deliver intuitive, high-quality user experiences</li> <li>Contribute
    to architectural and technical decisions within a modern microservices environment</li>
    <li>Write clean, maintainable, and well-tested code</li> <li>Participate in code
    reviews and provide thoughtful feedback to peers</li> <li>Learn from and collaborate
    with senior engineers to grow your technical expertise</li> <li>Leverage cutting
    edge AI tools to enhance your development workflow, improve velocity, and help
    pioneer new approaches to building - contributing to a culture of innovation and&nbsp;</li>
    </ul> <p><strong>Do you have the right </strong><strong><em>ingredients*</em></strong><strong>?</strong>
    (Requirements)</p> <ul> <li>Experience building web applications, with the ability
    to contribute across the stack (frontend and/or backend)</li> <li>Familiarity
    with modern backend technologies (Java or Kotlin strongly preferred)</li> <li>Experience
    or interest in frontend development using React and JavaScript</li> <li>Understanding
    of distributed systems or microservice-based architectures</li> <li>Ability to
    work independently on scoped problems while collaborating with a broader team</li>
    <li>Strong problem-solving skills and a product-oriented mindset</li> <li>Passionate
    about making users happy and seeing people use your product in the wild</li> <li>Enthusiastic
    to employ AI-based tooling to expand impact and improve work.<br><br></li> </ul>
    <p data-pm-slice="1 1 []"><strong>AI at Toast</strong></p> <p>At Toast, one of
