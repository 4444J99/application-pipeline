  description: '<h2>Who we are</h2> <h3>About the Organization&nbsp;</h3> <p>Link
    is a digital wallet designed for effortless and secure online payments and digital
    transactions. With Link, consumers enjoy convenience and peace of mind: it works
    on any device or browser, is backed by the highest security mechanisms, offers
    purchase protections on eligible items, and ensures seamless and quick payments.
    Across the Link Engineering org, we focus on building delightful payment experiences
    and to allow our global consumer base to pay with their preferred payment methods.
    Our team’s work spans the entire stack from front-end experiences, to infrastructure
    that supports low-latency transactions, to intelligent systems that help protect
    consumers and merchants from bad actors.</p> <p>Team Matching: exact team matching
    for one of the subteams will begin during final stages. Please note we may also
    consider you for different orgs based on your experience, location, etc. More
    information on our team matching process can be found <a href="https://docs.google.com/document/d/1zvJkO2c7GzukHG-_oqc5wbOLajpuh5FjbmZPcZPU1o0/edit?tab=t.0#heading=h.ahb3b6nrktv1">here</a>.</p>
    <h2>What you’ll do</h2> <p>We’re looking for engineers who want to make an impact
    on payments at a global scale. You’ll play a key role in expanding our product
    suite and the infrastructure that supports it. Our team collaborates with many
    cross-functional teams and many other teams across Stripe to deliver innovative
    solutions that address evolving user needs.</p> <h3>Responsibilities</h3> <ul>
    <li>Build and design the next generation of Stripe products, to meet the high
    growth needs of our company and customers for years to come.</li> <li>Debug and
    solve critical production issues across services and multiple levels of the stack</li>
    <li>Mentor engineers to help them grow</li> <li>Collaborate with stakeholders
    across the company to build new features at large-scale, while improving internal
    engineering standards, tooling, and processes</li> <li>Collaborate effectively
    in a distributed and hybrid team, maintaining open communication and strong connections
    with colleagues</li> </ul> <h2>Who you are</h2> <p>We''re looking for someone
    who meets the minimum requirements to be considered for the role. If you meet
    these requirements, you are encouraged to apply. The preferred qualifications
    are a bonus, not a requirement.</p> <h3>Minimum requirements</h3> <ul> <li>2-10+
    years of industry software engineering experience (does not include internships
    nor includes co-ops)</li> <li>Strong coding skills in any programming language&nbsp;</li>
    <li>Strong collaboration skills, can work across workstreams within your team
    and contribute to your peers’ success</li> <li>Have the ability to thrive on a
    high level of autonomy, responsibility, and think of yourself as entrepreneurial</li>
    <li>Interest in working as a generalist across varying technologies and stacks
    to solve problems and delight both internal and external users</li> </ul> <h3>Preferred
    Qualifications</h3> <ul> <li>Experience with large-scale financial tracking systems</li>
    <li>Good understanding and practical knowledge in cloud based services (e.g. gRPC,
    GraphQL, Docker/Kubernetes, cloud services such as AWS, etc.)&nbsp;</li> </ul>'
