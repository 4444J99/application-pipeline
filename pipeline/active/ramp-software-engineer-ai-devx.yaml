  description: 'About Ramp Ramp is building the smart infrastructure for finance teams,
    embedded in the transaction flow of every dollar a business spends. We automate
    how over $100B in annualized spend flows in and out of 50,000+ companies: authorizing
    payments, flagging risk, categorizing spend, and closing books. The problems are
    high-stakes, data-dense, and unforgiving. We hire people with high agency and
    high urgency. We look for slope over intercept. We care less about where you trained
    and more about what you’ve built. At Ramp, everyone is a builder who owns problems
    end to end and makes consequential decisions that shape the outcome. The median
    Ramp customer saves 5% and grows revenue 16% in their first year – far in excess
    of businesses operating without Ramp. We believe every ambitious company deserves
    the same. If you want to build systems that directly shape how companies move
    and manage billions, Ramp is the place to do it. About the Role As a Staff Software
    Engineer on our AI DevX team, you''ll architect and own the developer tooling
    and infrastructure that enables hundreds of engineers to build software faster
    with AI. You''ll act as both a technical owner and a multiplier: shipping platforms
    that accelerate agent-driven engineering, while shaping best practices that scale
    across the organization. You will be expected to take ownership of critical AI
    DevX systems while also influencing Ramp''s broader AI strategy and engineering
    culture. Our ideal candidate combines deep software engineering expertise with
    a passion for AI, an obsession with developer productivity, strong collaborative
    instincts, and proven experience shipping and maintaining tools that developers
    rely on daily. What You''ll Do Stay at the forefront of the AI development ecosystem.
    Deeply understand model capabilities, evaluate emerging tools critically, and
    make informed decisions about when and how to adopt new technologies Drive proficiency
    with the most effective AI coding tools and practices across the engineering organization
    Build platforms that help our devs offload more work to AI and empower AI to perform
    better when doing Ramp dev work Gather developer feedback, identify friction points,
    and iterate on solutions that improve developer velocity Grow AI vendor partnerships
    and serve as the advocate for Ramp’s engineers What You''ll Need Typically 8+
    years of professional software engineering experience Deep backend engineering
    expertise spanning infrastructure, services, and data systems Python proficiency;
    Strong Bash/Unix fundamentals You thrive in your terminal, instinctively crafting
    reusable tools as you work Obsessed with productivity, automation, and optimization
    Prior experience working in a fast-paced startup environment Strong AI fluency
    and AI coding tool proficiency Nice to Haves Active power user of AI coding agents
    Proven track record shipping and maintaining developer tools Demonstrated experience
    building AI-powered systems Experience leading technical teams and owning technical
    roadmaps Forward-deployed engineering or public speaking/writing experience Background
    in AI/ML; Able to read and understand AI research papers Expertise in: Data Engineering,
    Frontend Engineering, Docker, Terraform Benefits (for U.S.-based full-time employees)
    100% medical, dental & vision insurance coverage for you Partially covered for
    your dependents One Medical annual membership 401k (including employer match on
    contributions made while employed by Ramp) Flexible PTO Fertility HRA (up to $10,000
    per year) Parental Leave Unlimited AI token usage Pet insurance Centralized home-office
    equipment ordering for all employees Health and Wellness stipend In-office perks:
    lunch, snacks, drinks, and more Budget for intra-office travel Relocation support
    to NYC or SF (as needed) Referral Instructions If you are being referred for the
    role, please contact that person to apply on your behalf. Other notices Pursuant
    to the San Francisco Fair Chance Ordinance, we will consider for employment qualified
    applicants with arrest and conviction records. Beware of recruiting scams: Ramp
    will only contact you through official @ Ramp.com email addresses and will never
    ask for payment or sensitive personal information during the hiring process. Ramp
    Applicant Privacy Notice'
