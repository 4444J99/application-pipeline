  description: 'At LiveKit, we build open-source APIs to power the future of computing.
    We are a company of engineers building software stacks for other engineers. You''ll
    thrive at LiveKit if you: obsess over crafting APIs and abstractions that are
    simple, durable, and practical care deeply about developer experience and clean
    design are known as the person who can untangle hard architectural problems can
    move quickly from idea → design → implementation form strong technical opinions
    and defend them thoughtfully enjoy learning new systems, tools, and technologies
    The best way to impress us is with thoughtful Issues or PRs on our GitHub repos
    😊 About this role We’re looking for an experienced engineer to help build the
    Agents framework . The Agents framework enables developers to build AI-driven
    server applications that can see, hear, and speak in real time . It’s an open-source
    platform designed for building realtime, agentic applications. In this role, you''ll
    help design and implement the core Python framework that developers rely on to
    build AI agents. You’ll work on the APIs, abstractions, and architecture that
    define how developers interact with the system. This role is ideal for someone
    who enjoys framework design, open-source development, and building tools other
    engineers love to use. What You''ll Do Design and implement core components of
    the Agents Python framework Define APIs and abstractions that developers rely
    on Own features from design through implementation Identify simple and elegant
    solutions to complex design problems Propose and debate architectural decisions
    that shape the framework Ensure new features integrate cleanly with the broader
    ecosystem Collaborate with engineers across Python, Node, and Rust systems Who
    You Are Strong experience building production systems in Python Excellent API
    design instincts and strong engineering taste Able to independently drive projects
    from idea to completion Solid experience building SDKs, frameworks, or developer
    tools Comfortable navigating complex systems and making design tradeoffs Able
    to clearly communicate technical ideas and architectural decisions Nice to have:
    Open-source contributions or libraries you maintain Experience building LLM-based
    or agentic applications Familiarity with TypeScript / JavaScript ecosystems Our
    Commitments to You An opportunity to build infrastructure for the next generation
    of AI applications The chance to work on open-source software used by developers
    around the world A small, high-caliber engineering team that values craft and
    technical excellence Competitive salary and equity package Health, dental, and
    vision benefits Flexible vacation policy'
