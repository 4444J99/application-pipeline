  description: '<p><strong>Location(s):&nbsp;</strong>US (remote), Boston (hybrid),
    or New York (hybrid)</p> <p><strong>Role focus: </strong>Fullstack, backend leaning</p>
    <p>&nbsp;</p> <p>Toast creates technology to help restaurants and local businesses
    succeed in a digital world, helping business owners operate, increase sales, engage
    customers, and keep employees happy.</p> <p>Every restaurant is unique, and a
    restaurant’s menu expresses its individual brand and product offerings. Inside
    a Toast restaurant, the definition of the menu becomes the common language between
    guests, servers, and the kitchen. In our digital ordering products, a great menu
    serves as both a billboard and a roadmap to an excellent dining experience. It
    is the central hub for restaurant configuration– it determines what guests can
    order, how the dishes are presented and priced in different contexts, where they
    are routed for fulfillment and how they are coursed, how they are prepared, whether
    the ingredients are still available, and how they are classified for reporting.
    A menu is always evolving: kitchens create new dishes, managers experiment with
    pricing and presentation, and staff optimize the menu for restaurant operations.&nbsp;</p>
    <p>We create products to satisfy the vast breadth of our restaurants, from single-location
    coffee shops to complex enterprise brands with thousands of locations. We offer
    an extremely powerful and configurable menu platform, and our team exists to ensure
    that this flexibility can be managed effectively at any scale. This includes feature-rich
    menu data models, APIs for both first and third party integrations (eg: DoorDash
    and other ordering partners), and the user experiences for configuring menus that
    meet a vast variety of needs, from complex customer segments (eg: Pizza shops)
    to our evolving Retail platform.&nbsp;</p> <p>We are looking for a senior engineer
    who is motivated by these challenges and eager to transform our menus architecture
    to meet the dynamic needs of our customers and our rapidly growing business. Come
    join our team to make an impact on this critical domain that affects all Toast
    customers!</p> <p><strong>A day in the life (Responsibilities)</strong></p> <ul>
    <li>Design, build, deploy, and maintain highly resilient and scalable features
    in Toast’s menu management products through full-stack development</li> <li>Collaborate
    with UX, PM, QA and Engineering to define, design, and build best-in-class solutions
    in a complex and fast-moving environment</li> <li>Champion best practices for
    development, deployment and quality life-cycles</li> <li>Contribute to Toast’s
    internal libraries&nbsp;</li> <li>Guide the growth &amp; development of peer engineers
    with mentoring and coaching</li> <li>Collaborate with team to plan and estimate
    work</li> <li>Share best practices with other frontend engineers across Toast
    R&amp;D&nbsp;</li> </ul> <p><strong>What you''ll need to thrive (Requirements)</strong></p>
    <ul> <li>5+ years of experience in back-end development using Java, Kotlin, or
    other object-oriented languages</li> <li>Bachelor’s degree in Computer Science,
    Software Engineering, Computer Engineering, or related field.</li> <li>Proficient
    with modern API standards and technologies (e.g. REST, GraphQL)</li> <li>Proficient
    with relational databases and alternative data stores</li> <li>Experience with
    distributed systems, enterprise messaging systems, and/or microservices</li> <li>Demonstrated
    ability to deliver high-impact, scalable solutions in complex, multi-product environments</li>
    <li>Strong leadership and mentoring skills</li> <li>Excellent communication skills,
    with the ability to articulate complex technical concepts to diverse audiences</li>
    <li>Passionate about driving innovation and continuously improving engineering
    practices</li> </ul> <p data-pm-slice="1 1 []"><strong>AI at Toast</strong></p>
    <p>At Toast, one of our company values is that we''re hungry to build and learn.
    We believe learning new AI tools empowers us to build for our customers faster,
    more independently, and with higher quality. We provide these tools across all
    disciplines, from Engineering and Product to Sales and Support, and are inspired
    by how our Toasters are already driving real value with them. The people who thrive
    here are those who embrace changes that let us build more for our customers; it’s
    a core part of our culture.</p> <p data-pm-slice="1 1 []"><strong>Our Total Rewards
    Philosophy&nbsp;<br></strong>We strive to provide competitive compensation and
    benefits programs that help to attract, retain, and motivate the best and brightest
    people in our industry. Our total rewards package goes beyond great earnings potential
    and provides the means to a healthy lifestyle with the flexibility to meet Toasters’
    changing needs. Learn more about our benefits at&nbsp;<a class="c-link" href="https://careers.toasttab.com/toast-benefits"
    target="_blank" data-stringify-link="https://careers.toasttab.com/toast-benefits"
