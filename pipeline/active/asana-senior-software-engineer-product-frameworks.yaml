  description: '<p>The Product Frameworks team’s goal is to make product engineers
    and AI agents more effective building software with Asana''s product frameworks.
    We’re looking for a Senior Software Engineer to modernize our custom, home-built
    frameworks and lead them toward industry-standard, open-source best practices.</p>
    <p>Your work will empower our product engineering organization to build and ship
    with high velocity within an evolving multithreaded agentic world. You will identify
    friction points in our proprietary systems and architect new approaches that are
    easier, safer, and AI-native. You will use AI to work more effectively and build
    the foundation for both product engineers and AI agents working with our frameworks.</p>
    <p>This role is based in our New York City office with an office-centric hybrid
    schedule. Along with most Asanas, you’ll work from this office in person on Mondays,
    Tuesdays, and Thursdays. Most Asanas have the option to work from home on Wednesdays
    and Fridays. If you''re interviewing for this role, your Talent Acquisition Partner
    will share more about the in-office requirements.</p> <p><strong>What You’ll Achieve:</strong></p>
    <ul> <li>Modernize and iterate on Asana’s custom, home-built frameworks to align
    with modern industry standards.</li> <li>Leverage AI agents to speed up migrating
    from Asana’s legacy systems to modern open-source frameworks.</li> <li>Partner
    with product engineering teams to identify opportunities to speed up development
    at Asana, and adopt modern best practices across Asana''s monorepo.</li> <li>Support
    product engineering teams through office hours and presentations on our frameworks.</li>
    </ul> <p><strong>About You:</strong></p> <ul> <li>5+ years of experience in software
    engineering, or equivalent practical experience.</li> <li>Comfortable transitioning
    between different areas of a large codebase.</li> <li>Interested in using AI agents
    to migrate legacy systems to open source best practices.</li> <li>A collaborative
    approach to accelerating development cycles through agentic workflows (ex: Claude
    Code, Cursor).</li> <li>You value learning software best practices and sharing
    that knowledge through mentoring and teaching.</li> <li>Experience driving complex
    technical projects, sometimes spanning multiple teams, and you know when to ask
    for help and find answers from other people.</li> <li>Able to make and articulate
    technical tradeoffs in decisions that have cross-cutting impact.</li> <li>Familiar
    with full-stack development, for example using technologies like TypeScript, React,
    and GraphQL.</li> </ul> <p><strong>What we’ll offer:</strong></p> <p>Our comprehensive
    compensation package plays a big part in how we recognize you for the impact you
    have on our path to achieving our mission. We believe that compensation should
    be reflective of the value you create relative to the market value of your role.
    To ensure pay is fair and not impacted by biases, we''re committed to looking
    at market value which is why we check ourselves and conduct a yearly pay equity
    audit.</p> <p>For this role, the estimated base salary range is between $202,000-$230,000.
    The actual base salary will vary based on various factors, including market and
    individual qualifications objectively assessed during the interview process. The
    listed range above is a guideline, and the base salary range for this role may
    be modified.</p> <p>In addition to base salary, your compensation package may
    include additional components such as equity, sales incentive pay (for most sales
    roles), and benefits. If you''re interviewing for this role, speak with your Talent
    Acquisition Partner to learn more about the total compensation and benefits for
    this role.</p> <p>We strive to provide equitable and competitive benefits packages
    that support our employees worldwide and include:</p> <ul> <li>Mental health,
    wellness &amp; fitness benefits</li> <li>Career coaching &amp; support</li> <li>Inclusive
    family building benefits</li> <li>Long-term savings or retirement plans</li> <li>In-office
    culinary options to cater to your dietary preferences&nbsp;</li> </ul> <p>These
    are just some of the benefits we offer, and benefits may vary based on role, country,
    and local regulations. If you''re interviewing for this role, speak with your
    Talent Acquisition Partner to learn more about the total compensation and benefits
    for this role.</p> <p>#LI-Hybrid</p><div class="content-conclusion"><p><strong>About
    us</strong></p> <p data-pm-slice="1 1 []">Asana is a leading platform for human
    + AI collaboration. Millions of teams around the world rely on Asana to achieve
    their most important goals, faster. Asana has been named to Fortune''s Best Workplaces
    for 7+ years and recognized by Fast Company, Forbes, and Gartner for excellence
    in workplace culture and innovation. We offer an exceptional office-centric culture
    while adopting the best elements of hybrid models to ensure that every one of
    our global team members can work together effortlessly. '
