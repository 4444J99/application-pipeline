  description: '<div class="content-intro"><p>Ready to be pushed beyond what you think
    you’re capable of?</p> <p>At Coinbase, our mission is to increase economic freedom
    in the world. It’s a massive, ambitious opportunity that demands the best of us,
    every day, as we build the emerging onchain platform — and with it, the future
    global financial system.</p> <p>To achieve our mission, we’re seeking a very specific
    candidate. We want someone who is passionate about our mission and who believes
    in the power of crypto and blockchain technology to update the financial system.
    We want someone who is eager to leave their mark on the world, who relishes the
    pressure and privilege of working with high caliber colleagues, and who actively
    seeks feedback to keep leveling up. We want someone who will run towards, not
    away from, solving the company’s hardest problems.</p> <p>Our <a href="https://www.coinbase.com/mission">work
    culture</a> is intense and isn’t for everyone. But if you want to build the future
    alongside others who excel in their disciplines and expect the same from you,
    there’s no better place to be.</p> <p>While many roles at Coinbase are remote-first,
    we are not remote-only. In-person participation is required throughout the year.
    Team and company-wide offsites are held multiple times annually to foster collaboration,
    connection, and alignment. Attendance is expected and fully supported.</p></div><p>The
    CDP Foundations team owns the core data model and primitives that power the Coinbase
    Developer Platform. We build the foundational layer that defines how organizations
    structure themselves, how users and customers are represented and verified, how
    funds are contained and owned, and how access is controlled.</p> <p><strong>What
    you’ll be doing (ie. job duties):</strong><strong>&nbsp;</strong></p> <ul> <li>Build,
    deploy, and maintain scalable, secure, and high-performing backend services in
    a microservices/distributed architecture</li> <li>Define internal and customer-facing
    APIs that serve as the building blocks for CDP</li> <li>Author technical design
    documents (TDDs),&nbsp; providing technical leadership and driving clarity across
    complex projects</li> <li>Lead end-to-end delivery of projects through implementation,
    deployment, and monitoring</li> <li>Improve and maintain operational excellence
    standards across the team, proactively addressing technical debt and driving improvements
    in reliability and observability</li> <li>Participate in code reviews and on-call
    rotation, lead incident response, and foster a team-wide environment that welcomes
    constructive feedback to maintain high code quality standards</li> </ul> <p><strong>What
    we look for in you (ie. job requirements):</strong><strong>&nbsp;</strong></p>
    <ul> <li>5+ years of experience in backend software development, with a strong
    focus on backend systems</li> <li>Expertise in languages such as Golang (preferred),
    C, Rust or Python&nbsp;</li> <li>Experience with databases (PostgreSQL, MySQL,
    MongoDB), caching systems (Redis, Memcached), and message queues (Kafka, RabbitMQ)</li>
    <li>Solid understanding of distributed systems, microservices architecture, and
    event-driven architectures</li> <li>Comprehensive knowledge of RESTful API design
    principles and experience with API development, integration and authentication
    protocols like OAuth and JWT</li> <li>Familiarity with AWS and containerization
    using Kubernetes</li> <li>Understanding of web security best practices and experience
    with implementing secure coding practices for financial systems</li> <li>Excellent
    communication and collaboration skills</li> <li>Bachelor''s or Master''s degree
    in Computer Science, Software Engineering, or equivalent experience</li> </ul>
    <p><strong>Nice to haves:</strong></p> <ul> <li>Experience designing public-facing
    APIs</li> <li>Experience building financial platforms or fintech systems</li>
    <li>Experience with crypto/onchain ecosystem (but not required)</li> </ul> <p><span
