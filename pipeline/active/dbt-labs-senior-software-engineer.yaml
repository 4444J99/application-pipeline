  description: '<div class="content-intro"><p><strong>About Us&nbsp;</strong></p>
    <p>dbt Labs is the pioneer of analytics engineering, helping data teams transform
    raw data into reliable, actionable insights. Since 2016, we’ve grown from an open
    source project into the leading analytics engineering platform, now used by over
    90,000 teams every week, driving data transformations and AI use cases.&nbsp;</p>
    <p>As of February 2025, we’ve surpassed $100 million in annual recurring revenue
    (ARR) and serve more than 5,400 dbt Platform customers, including AstraZenica,
    Sky, Nasdaq, Volvo, JetBlue, and SafetyCulture.&nbsp;</p> <p>We’re backed by top-tier
    investors including Andreessen Horowitz, Sequoia Capital, and Altimeter. At our
    core, we believe in empowering data practitioners:</p> <ul> <li>Reliable, high-quality
    data is the fuel that propels AI-powered data engineering. </li> <li>AI is changing
    data work, fast. dbt’s data control plane keeps data engineers ahead of that curve.</li>
    <li>We empower engineers to deliver reliable, governed data faster, cheaper, and
    at scale.</li> </ul> <p>dbt Labs is now synonymous with analytics engineering,
    defining the modern data stack and serving as the data control plane for enterprise
    teams around the world. And we’re just getting started.. We’re growing fast and
    building a team of passionate, curious people across the globe. Learn more about
    what makes us special by checking out our <a href="https://www.getdbt.com/about-us/values">values</a>.</p></div><h2>About
    the Role</h2> <p>We are building the next foundational layer of the analytics
    stack: an <strong>Enterprise Context Platform</strong> that captures, stores,
    and exposes organizational decision memory.</p> <p>As a seasoned engineer on Context
    Platform Systems, you will architect and build the <strong>durable memory substrate</strong>
    that powers agentic analytics workflows. This platform stores not just metadata,
    but <em>meaning</em>: decisions, intent, rationale, and history — and makes it
    safely accessible to humans, agents, and applications.</p> <p>This is a greenfield,
    high-leverage role with company-level impact.</p> <hr> <h2>What You’ll Do</h2>
    <ul> <li>Prototype apt technical solutions and find best fits for the context
    engine. Architect and build the core <strong>Context Platform</strong></li> <li>Design
    schemas and primitives for <strong>Decision Memory</strong> and enterprise context</li>
    <li>Own context storage systems (graph, vector, event/time-based)</li> <li>Build
    read/write/query APIs used by agents, products, and external apps</li> <li>Design
    permission-aware, auditable context access</li> <li>Ensure the context engine
    is interoperable, portable, and zero-lock-in by design</li> <li>Partner closely
    with agentic systems engineers and product leadership</li> </ul> <hr> <h2>What
    You’ll Own</h2> <ul> <li>Context schemas and schema evolution strategies</li>
    <li>Storage and data modeling choices</li> <li>Platform APIs and interfaces</li>
    <li>Security, identity propagation, and audit foundations</li> <li>Long-term scalability
    and correctness of context data</li> </ul> <hr> <h2>What You Won’t Own</h2> <ul>
    <li>Agent behavior or orchestration logic</li> <li>Business rules or governance
    policy decisions</li> <li>Product UI or workflow automation</li> </ul> <p>(Those
    are consumers of the platform you build.)</p> <hr> <h2>What We’re Looking For</h2>
    <ul> <li>Significant experience building distributed systems, data platforms,
    or infrastructure</li> <li>Comfort operating in ambiguous, greenfield problem
    spaces</li> <li>Deep expertise in data modeling and schema design</li> <li>Experience
    designing shared platforms used by many teams</li> <li>Strong instincts around
    APIs, contracts, and backward compatibility</li> <li>Ability to reason about systems,
    not just components</li> </ul> <hr> <h2>Nice to Have</h2> <ul> <li>Experience
    with knowledge graphs, metadata systems, or search/retrieval systems</li> <li>Experience
    building systems with governance, auditability, or compliance requirements</li>
    <li>Familiarity with dbt or modern analytics stacks or developer tooling</li>
    </ul> <hr> <h2>Why This Role Matters</h2> <p>If this platform is built correctly:</p>
    <ul> <li>Agents become trustworthy</li> <li>Governance scales without slowing
    teams down</li> <li>We become the <strong>System of Decision</strong> for analytics</li>
    </ul> <p>This role lays the foundation for the next S-curve of the company.</p>
    <p>&nbsp;</p><div class="content-conclusion"><p>dbt Labs is an equal opportunity
    employer, committed to building an inclusive team that welcomes diverse perspectives,
    backgrounds, and experiences. Even if your experience doesn’t perfectly align
    with the job description, we encourage you to apply—we value potential just as
    much as a perfect resume.</p> <p><span style="font-weight: 400;">Want to learn
    more about our focus on Diversity, Equity and Inclusion at dbt Labs? Check out
    our DEI <a href="https://www.getdbt.com/about-us/dei">page</a>.<'
