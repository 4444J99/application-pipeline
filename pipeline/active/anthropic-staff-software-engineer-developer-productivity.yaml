  description: "<div class=\"content-intro\"><h2><strong>About Anthropic</strong></h2> <p>Anthropic’s mission is to create reliable, interpretable, and steerable AI systems. We want AI to be safe and beneficial for our users and for society as a whole. Our team is a quickly growing group of committed researchers, engineers, policy experts, and business leaders working together to build beneficial AI systems.</p></div><h2 class=\"heading\"><strong>About the Role</strong></h2> <p>Anthropic's Infrastructure organization is foundational to our mission of developing AI systems that are reliable, interpretable, and steerable. The systems we build determine how quickly we can train new models, how reliably we can run safety experiments, and how effectively we can scale Claude to millions of users — demonstrating that safe, reliable infrastructure and frontier capabilities can go hand in hand.</p> <p>Developer Productivity owns the end-to-end experience of how engineers and researchers at Anthropic develop, build, test, and ship code at scale — from the source control and language ecosystems that underpin our monorepo, to the build and CI infrastructure that keeps thousands of daily builds running reliably across multiple cloud providers, to the developer acceleration tooling that deeply integrates Claude into engineering workflows.</p> <p><em>Team Matching: Team matching is determined after the interview process based on interview performance, interests, and business priorities. Please note we may also consider you for different Infrastructure teams. </em></p> <h2 class=\"heading\"><strong>Responsibilities:</strong></h2> <ul> <li>Own the technical strategy and roadmap for your area, translating team-level goals into concrete execution plans</li> <li>Define infrastructure architecture, ensuring the hardest problems get solved — whether by you directly or by working through others</li> <li>Design and build scalable, reliable distributed infrastructure and shared libraries that support high-volume workloads across all engineering teams</li> <li>Own and evolve build environments, package management, and dependency systems to enable fast, reproducible builds</li> <li>Define and implement language ecosystem standards, tooling, and frameworks that drive developer productivity across research and production workloads</li> </ul> <h2><strong>You may be a good fit if you:</strong></h2> <ul> <li>Have 10+ years (not including internships or co-ops) of experience in a Software Engineer role, building and operating large-scale developer infrastructure</li> <li>Have 3+ years (not including internships or co-ops) of experience leading large scale, complex projects or teams as an engineer or tech lead</li> <li>Have deep experience with build systems, CI/CD pipelines, and/or developer tooling in a large monorepo environment</li> <li>Have strong proficiency in Python, Rust and/or Go</li> <li>Are obsessed with developer productivity and reducing friction in the software development lifecycle</li> <li>Have experience with container orchestration and infrastructure at scale</li> <li>Have excellent communication skills and enjoy supporting internal partners to improve their development experience</li> <li>Are excited about designing foundational systems and are comfortable working independently on ambiguous, high-impact technical challenges</li> </ul> <h2><strong>Strong candidates may have:</strong></h2> <ul> <li>Experience with CI orchestration tools (Buildkite, Jenkins, GitHub Actions, or similar) and merge queue management at scale</li> <li>Experience building or operating remote build execution systems (Bazel Remote Execution API, BuildBarn, BuildBuddy, or similar)</li> <li>Experience with Nix/NixOS/Docker and managing large image / package sets at scale</li> <li>Experience building CLI tools, developer-facing services, and GitHub API and automation workflows</li> </ul> <p><em>Deadline to apply: None. Applications will be reviewed on a rolling basis.</em></p><div class=\"content-pay-transparency\"><div class=\"pay-input\"><div class=\"description\"\
    ><p>The annual compensation range for this role is listed below.&nbsp;</p> <p>For sales roles, the range provided is the role’s On Target Earnings (\"OTE\") range, meaning that the range includes both the sales commissions/sales bonuses target and annual base salary for the role.</p></div><div class=\"title\">Annual Salary:</div><div class=\"pay-range\"><span>$405,000</span><span class=\"divider\">&mdash;</span><span>$485,000 USD</span></div></div></div><div class=\"content-conclusion\"><h2><strong>Logistics</strong></h2> <p><strong>Education requirements: </strong>We require at least a Bachelor's degree in a related field or equivalent experience.<strong><br><br>Location-based hybrid policy:</strong> Currently, we expect all staff to be in one of our offices at least 25% of the time. However, some roles may require more time in our offices.</p> <p><strong data-stringify-type=\"bold\">Visa sponsorship:</strong>&nbsp;We do sponsor"
