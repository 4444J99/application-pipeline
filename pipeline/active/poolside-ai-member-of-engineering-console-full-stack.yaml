  description: 'ABOUT POOLSIDE In this decade, the world will create Artificial General
    Intelligence. There will only be a small number of companies who will achieve
    this. Their ability to stack advantages and pull ahead will define the winners.
    These companies will move faster than anyone else. They will attract the world''s
    most capable talent. They will be on the forefront of applied research, engineering,
    infrastructure and deployment at scale. They will continue to scale their training
    to larger & more capable models. They will be given the right to raise large amounts
    of capital along their journey to enable this. They will create powerful economic
    engines. They will obsess over the success of their users and customers. Poolside
    exists to be this company : to build a world where AI will be the engine behind
    economically valuable work and scientific progress. We believe the fastest way
    to reach AGI lies in accelerating software development itself, by reshaping the
    developer experience with agentic systems, coding assistants, and the frontier
    models that power them. We deploy these systems directly into the development
    environments of security-conscious enterprises. ABOUT OUR TEAM We were founded
    in the US and have our home there, but our team is distributed across Europe and
    North America. We get our fix of in-person collaboration (and croissants) in Paris
    each month for 3 days, always Monday-Wednesday, with an open invitation to stay
    the whole week. We also do longer off-sites once a year. Our team is a multidisciplinary
    blend of research, engineering, and business experts. What unites us is our deep
    care for what we build together. We''re in a race that requires hard work, intellectual
    curiosity, and obsession; to balance this intensity, we''ve assembled a team of
    low ego and kind-hearted individuals who have built the special culture Poolside
    has. By building collaboratively and with intention, we create a compounding effect
    that moves the entire company forward towards our mission: reaching AGI through
    intelligence systems built for software development. ABOUT THE ROLE You''ll be
    working on our Console team focused on building the control plane and management
    UI that powers every poolside deployment in a customer environment. The Console
    is the operational backbone of enterprise instances — the surface through which
    platform teams provision, configure, monitor, and interact with their poolside
    deployment. You''ll collaborate closely with our infrastructure and product engineering
    teams, with your work sitting at the intersection of backend systems, orchestration,
    and the user-facing layer. Day to day, you''ll design and build the APIs and backend
    services that underpin the Console, instrument those systems with telemetry to
    give operators deep visibility into deployment health, and contribute to the frontend
    where it matters to close the loop. The work spans real production concerns —
    reliability, observability, and correctness — alongside forward-looking platform
    design as poolside scales into more enterprise environments. This is a rare opportunity
    to shape how some of the world''s most security-conscious organizations deploy
    and operate frontier AI. YOUR MISSION To deliver a reliable, observable, and enterprise-ready
    control plane that gives operators complete confidence in every poolside deployment.
    RESPONSIBILITIES Design and build the backend services and APIs powering the Console,
    including provisioning flows, configuration management, and runtime control of
    poolside instances Design new agentic experiences and blend the worlds of frontier
    innovation with enterprise-grade visibility Instrument Console systems with telemetry
    — metrics, structured logging, distributed tracing — to give operators and on-call
    engineers full visibility into deployment health and system behavior Own features
    end-to-end across the Console stack, contributing to the frontend UI where needed
    to connect backend state to the operator experience Collaborate with infrastructure
    and platform teams to integrate orchestration layers (including Kubernetes-based
    workload management) into the Console''s control surface Define and uphold reliability
    standards for Console services: alerting strategies, graceful degradation patterns,
    and incident response tooling Contribute to architectural decisions as the Console
    evolves toward supporting multi-environment and multi-tenant deployment scenarios
    SKILLS & EXPERIENCE Solid understanding of AI Agents, agent orchestration, harness
    engineering or a strong interest in developing expertise in this area Strong computer
