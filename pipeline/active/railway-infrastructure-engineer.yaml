  description: "This is a remote position available anywhere in the world! Linkedin\
    \ makes us show a country, but we hire the best people wherever they are. Our\
    \ core mission at Railway is to make software engineers higher leverage. We believe\
    \ that people should be given powerful tools so that they can spend less time\
    \ setting up to do, and more time doing. Building the infrastructure which powers\
    \ the Railway engine is the most core problem at Railway. As a infrastructure\
    \ engineer, you will be directly responsible for exposing the knobs, bells, and\
    \ whistles that allow the users to build to the wildest dreams. The tools you\
    \ build will be instrumental in not only scaling internal operations, but scaling\
    \ the company to infinite and beyond! About The Role For this role, you will:\
    \ Build system-level software: our challenges aren't your usual kube-fits-all\
    \ variety, so be prepared to build things from scratch based on first principles\
    \ Have a strong understanding or curiosity of OS level primitives - our business\
    \ hinges on efficiency, so that means being masters of CPU, Memory, Network and\
    \ the Kernel that wields it Be a student of both distributed systems and simplicity\
    \ - you know how to reach for the RAFT but you also know how far you can get with\
    \ Postgres Roll with the boring: build Golang/Rust GRPC services from scratch\
    \ to expose your complex capabilities to the wider company in a scalable and performant\
    \ manner This is a high impact, high agency role with direct effect on company\
    \ culture, trajectory, and outcome You may be oncall from time to time in this\
    \ role About You A strong understanding of distributed systems. You enjoy building\
    \ fault tolerant, resilient, and scalable services A solid intuition about how\
    \ long your solutions will last. All systems age. In startups, we can hope for\
    \ 2-3 orders of magnitude, or 12-18mo. The tact to implement your solution, creator\
    \ monitors for it\u2019s error boundaries, and document any requirements for when\
    \ you\u2019re not around A great sense of direction and prioritization when it\
    \ comes to dealing with the ambiguity of an early stage startup A sense of grit\
    \ to dive into a problem, implement a solution, scale that solution, and replace\
    \ it when needed A great set of communication skills for getting your point across,\
    \ solution implemented, and beyond We value and love to work with diverse persons\
    \ from all backgrounds Things to know For better or worse, we're a startup; our\
    \ team dynamics are different from companies of different sizes and stages. We're\
    \ distributed ALL across the globe, and that's only going to be more and more\
    \ distributed. As a result, stuff is ALWAYS happening. We do NOT expect you to\
    \ work all the time, but you'll have to be diligent about your boundaries because\
    \ the end of your day may overlap with the start of someone else's. We're a small\
    \ team, with high ownership, who are not only passionate about what we do, but\
    \ seek to be exceptional as well. At the time of writing we're 21, serving hundreds\
    \ of thousands of users. There's a lot of stuff going on, and a lot of ambiguity.\
    \ We want you to own it. We believe that ownership is a key to growth, and part\
    \ of that growth is not only being able to make the choices, but owning the success,\
    \ or failure, that comes with those choices. Benefits and perks At Railway, we\
    \ provide best in class benefits. Great salary, full health benefits including\
    \ dependents, strong equity grants, equipment stipend, and much more. For more\
    \ details, check back on the main careers page . Beyond compensation, there are\
    \ a few things that we believe that make working at Railway truly unique: Autonomy\
    \ : We have very few meetings. Just a Monday and a Friday to go over the Company\
    \ Board. We think your time is sacred, whether it's at work, or outside of work.\
    \ Ownership : We're a company with a high ownership, high autonomy culture. We\
    \ hope that you'll come in, help us, and over the course of many years do the\
    \ best work of your life. When we bring you onboard, we expect you to change the\
    \ company. Novel problems/solutions : We're a startup that's well funded, with\
    \ cool problems, which lets us implement novel solutions! We abhor \u201Cbusywork\u201D\
    \ and think, whether it's community, engineering, operations, etc there's always\
    \ opportunity for creative and high leverage solutions. Growth : We want you to\
    \ grow with us, but we know that talent is loaned, so when you figure out what\
    \ area you want to grow in next, whether it's at Railway or outside, we'll make\
    \ sure you land there. How we hire No tricks. No surprises. Here's the entire\
    \ process: Talk with us about the role This is completely open ended and we're\
    \ just trying to see who you are, what you want to do, and where you wanna go.\
    \ Work on a small project to discuss in the interview Asynchronously implement\
    \ the following: Pre-interview: Architect a Container Provisioning Engine to power\
    \ something like Railway You can, and SHOULD! ask us questions ahead of time.\
    \ Review your solution with the Team You'll sit down with someone on the team\
    \ and"
