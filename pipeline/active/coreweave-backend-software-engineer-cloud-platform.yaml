    cohesive interfaces to manage them via our Console UI, REST/gRPC API, Infrastructure-as-code,
    CLI and SDKs. We also own our billing platform and administrative tools for internal
    and external customers. We’re looking to grow our team across multiple experience
    levels to meet the growing demand for CoreWeave services.</p> <p>As a Backend
    Software Engineer on the Cloud Platform team, you will play a key role in designing,
    building, scaling, and maintaining the backend systems described above. You’ll
    be working at the intersection of design, developer experience, and platform architecture
    to help scale CoreWeave’s Cloud Platform. Some of what you’ll work on:&nbsp;</p>
    <ul> <li>Collaborate closely with cross-functional teams across CoreWeave, including
    frontend engineers, product managers and designers to shape the team’s strategy
    and roadmap.</li> <li>Design, develop, and maintain scalable, secure and performant
    backend services, APIs, and databases for our next-generation systems.</li> <li>Participate
    in design discussions and architectural decisions to drive technical solutions
    that align with our business goals.</li> <li>Contribute to software development
    best-practices, including writing maintainable and testable code and participating
    in thorough code reviews.</li> <li>Debug and resolve production issues in a timely
    manner, providing high-level support when necessary.</li> <li>Work with a passionate
    team of engineers in an iterative, high-trust agile environment.</li> </ul> <p><strong>Minimum
    Qualifications:</strong></p> <ul> <li>3+ years of Professional experience building
    and maintaining production-grade backend services.</li> <li>Strong proficiency
    in one or more of Go, Python, or TypeScript.</li> <li>Experience with authentication,
    authorization and security best practices.</li> <li>Familiarity with observability
    practices including metrics and logging.</li> <li>Solid understanding of CI/CD
    and software testing best-practices.</li> <li>Solid understanding of database
    design and experience with SQL</li> <li>Excellent communication skills, with the
    ability to work effectively with both technical and non-technical team members.</li>
    <li>Demonstrated ownership of code quality, performance, and maintainability from
    development through production.</li> <li class="li1"><span class="s1">Bachelors
    Degree in computer science, mathematics, electrical engineering or similar fields.&nbsp;</span></li>
    </ul> <p><strong>Preferred Qualifications:</strong><strong><br></strong></p> <ul>
    <li>Experience with Kubernetes and a conceptual understanding of its major components.</li>
    <li>Prior experience building reliable and scalable platform services that process
    large amounts of data.</li> <li>Proven experience with Prometheus/PromQL, including
    optimizing time series queries, and/or integrating Prometheus with large-scale
    systems for monitoring and analytics.</li> <li>Experience with managing cloud
    infrastructure (AWS, GCP, etc.)</li> <li>Familiarity with Infrastructure-as-Code
    tools and practices.</li> </ul> <p><strong>PLEASE NOTE: We are hiring across multiple
