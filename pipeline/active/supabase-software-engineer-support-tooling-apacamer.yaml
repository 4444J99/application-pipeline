  description: "About the Role We\u2019re looking for an experienced Software Engineer\
    \ to join our Support Tooling team and help build and evolve the internal systems\
    \ that power Supabase\u2019s support and operational workflows. You\u2019ll work\
    \ closely with Support, Infrastructure, and Engineering teams to design tooling\
    \ that sits between incoming support tickets and resolution. This includes internal\
    \ dashboards, ticket automations, integrations with tools like Front, Slack, and\
    \ Linear, and emerging AI-assisted workflows that reduce manual work and help\
    \ support engineers focus on harder, higher-impact issues. This role is ideal\
    \ for someone who thrives in async, fast-paced environments and is excited about\
    \ building internal tools for a rapidly scaling engineering and support organization.\
    \ What you'll own Build and maintain internal tooling that helps Support and Engineering\
    \ teams investigate, debug, and resolve customer issues efficiently. Partner closely\
    \ with Support leads and other internal stakeholders to turn real-world pain points\
    \ into scalable, reliable tooling. Own and evolve our primary internal admin dashboard,\
    \ including maintaining existing functionality and contributing to its future\
    \ frontend architecture. Design, implement, and maintain ticket automations, including\
    \ rule-based workflows, webhook-driven background jobs, and cross-tool integrations.\
    \ Build and improve an AI agent and supporting workflows that automate repetitive\
    \ tickets and help support engineers focus on harder, higher-impact issues. Develop\
    \ and maintain integrations with third-party systems such as Front, Slack, Linear,\
    \ and incident management tooling. Ensure reliability, observability, and operational\
    \ safety for critical internal systems, including participating in an on-call\
    \ rotation. What you bring 8+ years of experience as a backend or full-stack engineer\
    \ working on production systems. Strong backend fundamentals, including API design,\
    \ background jobs, and data modeling. Have experience building internal tools,\
    \ admin dashboards, or operational systems used by non-engineering teams. Comfortable\
    \ working across multiple languages and frameworks, with strong experience in\
    \ JavaScript or TypeScript, and the ability to work productively alongside existing\
    \ Elixir systems that power background jobs and automations. Product-oriented\
    \ mindset and are comfortable working from ambiguous requirements to propose practical\
    \ solutions. Experience integrating with third-party APIs and maintaining long-lived\
    \ internal integrations. Communicate clearly across technical and non-technical\
    \ audiences in an async, globally distributed team. Excited by solving real-world\
    \ problems for developers and support teams. Comfortable navigating evolving systems\
    \ and priorities while maintaining reliability and quality. Nice to Have Experience\
    \ with Elixir, Phoenix, LiveView, or Oban-based background processing. Familiarity\
    \ with support tooling or ticketing systems. Hands-on experience integrating AI\
    \ or LLM-based features into real products. What We Offer Fully Remote We hire\
    \ globally. We believe you can do your best work from anywhere. There are no Supabase\
    \ offices, but we provide a WeWork membership or co-working allowance you can\
    \ use anywhere in the world. ESOP Every team member receives ESOP (equity ownership)\
    \ in the company. We want everyone to share in the upside of what we\u2019re building\
    \ together. Tech Allowance Use this budget to set up your ideal work environment\u2014\
    laptop, monitor, headphones, or whatever helps you do your best work. Health Benefits\
    \ Supabase covers 100% of health insurance for employees and 80% for dependents,\
    \ wherever you are. Your wellbeing and your family\u2019s health are important\
    \ to us. Annual Off-Sites Once a year, the entire company gathers in a new city\
    \ for a week of connection, collaboration, and fun. It\u2019s a highlight of our\
    \ year. Flexible Work We operate asynchronously and trust you to manage your own\
    \ time. You know what needs to be done and when. Professional Development Every\
    \ team member receives an annual education allowance to spend on learning\u2014\
    courses, books, conferences, or anything that supports your growth. About the\
    \ Team Supabase was born-remote and open-source-first. We believe our globally\
    \ distributed team is our secret weapon in building tools developers love. 280+\
    \ team members 55+ countries 20+ languages spoken $500M raised 500,000+ community\
    \ members We move fast, build in public, and use what we ship. If it\u2019s in\
    \ your project, we probably use it in ours too. We believe deeply in the open-source\
    \ ecosystem and strive to support\u2014not replace\u2014existing tools and communities.\
    \ Hiring Process We keep things simple, async-friendly, and respectful of your\
    \ time: Apply \u2013 Our team will review your application. Intro Call \u2013\
    \ A short video chat to get to know each other. Interviews \u2013 Up to four calls\
    \ with: Team Leads Future teammates Someone cross-functional from product, growth,\
    \ or engineering (depending on the role) Someone from our leadership/founding\
    \ team Decision \u2013 We "
