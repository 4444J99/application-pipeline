  description: "About Ramp Ramp is building the smart infrastructure for finance teams,\
    \ embedded in the transaction flow of every dollar a business spends. We automate\
    \ how over $100B in annualized spend flows in and out of 50,000+ companies: authorizing\
    \ payments, flagging risk, categorizing spend, and closing books. The problems\
    \ are high-stakes, data-dense, and unforgiving. We hire people with high agency\
    \ and high urgency. We look for slope over intercept. We care less about where\
    \ you trained and more about what you\u2019ve built. At Ramp, everyone is a builder\
    \ who owns problems end to end and makes consequential decisions that shape the\
    \ outcome. The median Ramp customer saves 5% and grows revenue 16% in their first\
    \ year \u2013 far in excess of businesses operating without Ramp. We believe every\
    \ ambitious company deserves the same. If you want to build systems that directly\
    \ shape how companies move and manage billions, Ramp is the place to do it. About\
    \ the Role Growth engineering builds the systems and applications that power every\
    \ growth channel at Ramp. As an engineer on this team, you\u2019ll own foundational\
    \ problems ranging from high volume data ingestion and interfaces to customer-facing\
    \ applications and AI-powered workflows. You\u2019ll partner closely with product,\
    \ data, and design, and work directly with stakeholders across growth, sales,\
    \ and finance. This role offers high ownership, broad technical scope, and the\
    \ opportunity to directly shape Ramp\u2019s growth engine and scale Ramp to its\
    \ next millions of users. Check out our Engineering Blog to learn more about our\
    \ tech stack, mission, and values! What You\u2019ll Do Build software that helps\
    \ grow Ramp to its next millions of users Build and scale internal platforms and\
    \ applications (e.g. workflow orchestration, incentives, sales and marketing apps)\
    \ that power growth across the company Design and maintain data ingestion and\
    \ activation pipelines across Ramp products, internal business systems, external\
    \ systems, and third-party data Apply AI/LLMs to unstructured data processing,\
    \ automation, personalization, and growth signal derivation Drive business outcomes\
    \ through experiments and metric-driven software development Make thoughtful prioritization\
    \ and scoping decisions around when to build custom solutions vs. leverage third-party\
    \ tools Work in a fast-moving, collaborative engineering team alongside partners\
    \ in product, data, and design What You Need Minimum of 3 years of experience\
    \ in a software development role Experience shipping fast, reliable applications\
    \ using modern development tools and infrastructure Comfort operating in a fast-paced,\
    \ constantly evolving startup environment Ability to improvise and develop creative\
    \ solutions when standard approaches fall short; strong bias toward pragmatism\
    \ in the face of uncertainty Perpetual curiosity and a passion for continuously\
    \ improving your craft Nice -to-Haves Startup experience as a technical co-founder\
    \ or early engineer Experience with the modern data stack (e.g. ETL tools like\
    \ Fivetran, workflow orchestrators like Airflow, data platforms like Snowflake)\
    \ Experience applying AI/LLMs in production environments Strong perspective on\
    \ the engineering development lifecycle (system design, documentation, testing,\
    \ and long-term codebase health) Experience building user-facing data or internal\
    \ business applications Familiarity with tools that power marketing and sales\
    \ automation, personalization, and analytics Benefits (for U.S.-based full-time\
    \ employees) 100% medical, dental & vision insurance coverage for you Partially\
    \ covered for your dependents One Medical annual membership 401k (including employer\
    \ match on contributions made while employed by Ramp) Flexible PTO Fertility HRA\
    \ (up to $10,000 per year) Parental Leave Unlimited AI token usage Pet insurance\
    \ Centralized home-office equipment ordering for all employees Health and Wellness\
    \ stipend In-office perks: lunch, snacks, drinks, and more Budget for intra-office\
    \ travel Relocation support to NYC or SF (as needed) Referral Instructions If\
    \ you are being referred for the role, please contact that person to apply on\
    \ your behalf. Other notices Pursuant to the San Francisco Fair Chance Ordinance,\
    \ we will consider for employment qualified applicants with arrest and conviction\
    \ records. Beware of recruiting scams: Ramp will only contact you through official\
    \ @ Ramp.com email addresses and will never ask for payment or sensitive personal\
    \ information during the hiring process. Ramp Applicant Privacy Notice"
