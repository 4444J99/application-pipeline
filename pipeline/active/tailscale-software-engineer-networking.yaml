    <p>Tailscale is building the new Internet by delivering software that makes it
    easy to securely interconnect people and their devices, no matter where they are.
    From hobbyists to multinational corporations, teams of every size use Tailscale
    each day to protect their networks, share access to internal tools, and more.
    We''re building a future for the Internet that''s easy, sensible, and safe, like
    it used to be. Founded in 2019 and fully distributed, we''re backed by Accel,
    CRV, Insight, Heavybit, and Uncork Capital.</p></div><p><strong>Job Description</strong></p>
    <p>We’re seeking a skilled and diligent full-time Software Engineer to join our
    growing team. You will work as part of the engineering team to:</p> <ul> <li>Develop
