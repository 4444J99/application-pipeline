  description: '<p data-pm-slice="1 1 []">We''re looking for a Staff Engineer to join
    the RUM (Real User Monitoring) Platform team within Datadog''s DEM (Digital Experience
    Monitoring) pillar. In this role, you’ll lead foundational engineering work that
    enables scalable, cross-product integrations across critical observability features
    such as session replay, error tracking, feature flags, and product analytics.
    You’ll work hands-on to bring clarity to complex systems, drive architectural
    convergence, and build bridges across teams. As the first Staff Engineer dedicated
    to this platform effort, you’ll shape both the technical vision and execution
    across multiple products—and unlock rapid innovation for years to come.</p> <p><em>At
    Datadog, we value our office culture – the relationships and collaboration it
    builds and the creativity it brings. We operate as a hybrid workplace to ensure
    our Datadogs can create a work-life harmony that best fits them.</em></p> <p>&nbsp;</p>
    <p><strong>What You''ll Do:</strong></p> <ul> <li>Design and evolve platform infrastructure
    that supports frontend observability products across DEM, including RUM, session
    replay, feature flags, and product analytics.</li> <li>Build and scale data pipelines
    and reducers using technologies such as Kafka and Redis to ingest, transform,
    and serve real-time user experience data.</li> <li>Partner with&nbsp; SDK, FE
    and OpenTelemetry contributors to support a growing number of data platforms and
    open standards in frontend instrumentation.</li> <li>Guide cross-functional collaboration
    by identifying shared patterns and unifying backend infrastructure across multiple
    product lines.</li> <li>Solve ambiguous, high-impact technical problems by applying
    deep systems knowledge and delivering clear architectural direction.</li> <li>Serve
    as a technical leader and mentor within the RUM organization and broader engineering
    community at Datadog.</li> </ul> <p>&nbsp;</p> <p><strong>Who You Are:</strong></p>
    <ul> <li>Experienced in building scalable, distributed backend systems using technologies
    such as Kafka, Redis, and Java.</li> <li>Comfortable managing complex data pipelines
    and translating diverse data sources into semantically aligned, actionable insights.</li>
    <li>Skilled at navigating ambiguity and driving clarity across multiple teams
    and product surfaces.</li> <li>Familiar with open standards in observability,
    such as OpenTelemetry, and excited to contribute to a broader ecosystem.</li>
    <li>Proactive and hands-on—you’re ready to dive into unclear problem spaces and
    turn them into reliable, performant systems.</li> <li>Based in Paris or Madrid
    preferred; other EMEA locations with strong alignment may be considered.</li>
    <li>You have demonstrated ability to use AI coding tools in day-to-day workflows
    and validate, critique, and refine AI-generated output.</li> <li>Bonus: you’re
    motivated to push the boundaries of how AI can improve software engineering best
    practices and contribute to building AI-enabled products.</li> </ul> <p><em><span
    style="font-weight: 400;">Datadog values people from all walks of life. We understand
    not everyone will meet all the above qualifications on day one. That''s okay.
    If you’re passionate about technology and want to grow your skills, we encourage
    you to apply.&nbsp;</span></em></p> <p>&nbsp;</p> <p><strong>Benefits and Growth:</strong></p>
    <ul> <li>New hire stock equity (RSUs) and employee stock purchase plan (ESPP)</li>
    <li>Continuous professional development, product training, and career pathing</li>
    <li>Intradepartmental mentor and buddy program for in-house networking</li> <li>An
    inclusive company culture, ability to join our Community Guilds (Datadog employee
    resource groups)</li> <li>Competitive global benefits</li> <li>Giving programs</li>
    </ul> <p><em>Benefits and Growth listed above may vary based on the country of
    your employment and the nature of your employment with Datadog.</em></p> <p style="color:
    white;">#LI-Remote</p><div class="content-conclusion"><hr> <p><strong>About Datadog:&nbsp;</strong></p>
    <p>Datadog (NASDAQ: DDOG) is a global SaaS business, delivering a rare combination
    of growth and profitability. We are on a mission to break down silos and solve
    complexity in the cloud age by enabling digital transformation, cloud migration,
    and infrastructure monitoring of our customers’ entire technology stacks. Built
    by engineers, for engineers, Datadog is used by organizations of all sizes across
    a wide range of industries. Together, we champion professional development, diversity
    of thought, innovation, and work excellence to empower continuous growth. Join
    the pack and become part of a collaborative, pragmatic, and thoughtful people-first
    community where we solve tough problems, take smart risks, and celebrate one another.
