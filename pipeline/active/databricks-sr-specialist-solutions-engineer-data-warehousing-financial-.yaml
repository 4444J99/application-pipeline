  description: '<p data-pm-slice="1 1 []">FEQ227R150</p> <h3><strong>Mission&nbsp;</strong></h3>
    <p>As a Sr. Specialist Solutions Engineer (SSA) - Data Warehousing , you will
    guide customers in their cloud data warehousing transformation with Databricks
    that span a large variety of use cases.&nbsp; You will be in a customer-facing
    role, working with and supporting Solution Architects, that requires hands-on
    production experience with large scale data warehousing technologies and lake
    house architecture.&nbsp; SSAs help customers through evaluations and successful
    production planning for their business intelligence workloads while aligning their
    technical roadmap for the Databricks Data Intelligence Platform.&nbsp; As a deep
    go-to-expert reporting to the Specialist Field Engineering Manager, you will continue
    to strengthen your technical skills through mentorship, learning, and internal
    training programs and establish yourself in the data warehousing specialty - including
    performance tuning, data modeling, winning competitive evaluations, architecture
    design, and production migration planning.</p> <h3><strong>The impact you will
    have:</strong></h3> <ul> <li>Provide technical leadership to guide strategic customers
    to successful cloud transformations on large scale data warehousing workloads
    - ranging from evaluation to architecture design to production deployment.</li>
    <li>Prove the value of the Databricks Intelligence Platform for customer workloads
    by architecting production workloads, including end-to-end pipeline load performance
    testing and optimization.</li> <li>Become a technical expert in an area such as
    competitive data warehousing evaluations or helping set up successful workload
    migrations.</li> <li>Assist Solution Architects with more advanced aspects of
    the technical sale including custom proof of concept content, estimating workload
    sizing and performance, and tuning workloads for production.</li> <li>Provide
    tutorials and training to improve community adoption (including hackathons and
    conference presentations)</li> <li>Contribute to the Databricks Community.</li>
    </ul> <h3><strong>What we look for:</strong></h3> <ul> <li>5+ years experience
    in a technical role with expertise in data warehousing - such as query tuning,
    performance tuning, troubleshooting, data governance, debugging MPP data warehouses
    or other big data solutions, or migration workloads from EDW systems.</li> <li>Experience
    with design and implementation of data warehousing technologies including relational
    databases, SQL, data analytics, NoSQL, MPP, OLTP, and OLAP.</li> <li>Deep Specialty
    Expertise in at least one of the following areas:</li> <ul> <li>Experience scaling
    large analytical data workloads in the cloud that are performant and cost-effective.</li>
    <li>Maintained, extended, or migrated a production data warehouse system to evolve
    with complex needs, including data modeling, data governance needs, and integration
    with business intelligence tools.</li> <li>Experience successfully migrating on-premise
    EDW workloads to the public cloud.</li> </ul> <li>Bachelor''s degree in Computer
    Science, Information Systems, Engineering, or equivalent experience through work
    experience.</li> <li>Production programming experience in SQL and Python, Scala,
    or Java.</li> <li>Experience with the AWS, Azure, or GCP clouds is highly desirable.</li>
    <li>3 years professional experience with data warehousing and big data technologies
    (Ex: SQL, Redshift, SAP, Synapse, EMR, OLAP &amp; OLTP workloads)</li> <li>3 years
    customer-facing experience in a pre-sales or post-sales role</li> <li>Can meet
    expectations for technical training and role-specific outcomes within 6 months
    of hire</li> <li>This role can be remote, but we prefer that you be located in
    the job listing area and can travel up to 30% when needed.</li> </ul><div class="content-pay-transparency"><div
