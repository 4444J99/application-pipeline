    \ all of society, with a particular focus on expanding access, equity, and positive\
    \ impact in education. This role is based in New York City. We use a hybrid work\
    \ model of 3 days in the office per week and offer relocation assistance to new\
    \ employees. In this role, you will: Deliver an exceptional pre-sales customer\
