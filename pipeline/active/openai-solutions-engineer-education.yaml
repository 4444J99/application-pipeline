    \ patterns, and providing in-depth technical advisory. Create and maintain documentation,\
    \ guides, and FAQs related to common questions and requirements discovered during\
    \ the pre-sales process. Foster customer advocacy and represent the voice of the\
    \ customer with internal teams by gathering and relaying customer feedback, identifying\
    \ themes across customers, and incorporating them into product planning. Act as\
    \ a technical multiplier for the team by contributing to best practices, influencing\
    \ deal strategy, and informally mentoring other Solutions Engineers through shared\
    \ learnings and example-setting. Serve as the first line of defense for security,\
    \ privacy, and compliance discussions by exercising sound technical and risk judgment,\
    \ explaining standardized collateral, guiding customers through trust tradeoffs,\
    \ and escalating complex requirements appropriately. Collaborate closely with\
    \ the Education Go-to-Market, Policy/Global Affairs, and GRC teams to ensure a\
    \ seamless customer experience. You might thrive in this role if you: Have 7+\
    \ years of experience in technical pre-sales or adjacent technical advisory roles,\
