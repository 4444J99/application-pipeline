  description: '<p>Software is eating the world, but AI is eating software. We live
    in unprecedented times – AI has the potential to exponentially augment human intelligence.
    Every person will have a personal tutor, coach, assistant, personal shopper, travel
    guide, and therapist throughout life. As the world adjusts to this new reality,
    leading platform companies are scrambling to build LLMs at billion scale, while
    large enterprises figure out how to add it to their products. To make them safe,
    aligned and actually useful, these models need human evaluation and reinforcement
    learning through human feedback (RLHF) during pre-training, fine-tuning, and production
    evaluations. This is the main innovation that’s enabled ChatGPT to get such a
    large headstart among competition.</p> <p>At Scale, our products include the Generative
    AI Data Engine, SGP, Donovan, and others that power the most advanced LLMs and
    generative models in the world through world-class RLHF, human data generation,
    model evaluation, safety, and alignment. The data we are producing is some of
    the most important work for how humanity will interact with AI.</p> <p>At the
    foundation of these products is the Platform Engineering team. As a Staff Software
    Engineer, you will define and drive both the architectural roadmap and implementation
    of core platforms and software systems. You will be responsible for providing
    high-level vision and driving adoption across the engineering org for orchestration,
    data abstraction, data pipelines, identity &amp; access management, and underlying
    cloud infrastructure.&nbsp; You’ll also get widespread exposure to the forefront
    of the AI race as Scale sees it in enterprises, startups, governments, and large
    tech companies.</p> <p>Impact and Responsibilities:</p> <ul> <li><strong>Architectural
    Vision:</strong> You will drive the design and implementation of foundational
    systems, acting as a bridge between high-level business goals and technical goals.</li>
    <li><strong>Cross-Functional Leadership:</strong> You will collaborate with cross-functional
    teams to define and drive adoption of the next generation of features for our
    AI data infrastructure.</li> <li><strong>Technical Ownership:</strong> You are
    responsible for proactively identifying and driving opportunities for organizational
    growth, driving improvements in programming practices, and upgrading the tools
    that define our development lifecycle.</li> <li><strong>Technical Mentorship:</strong>
    You will serve as a subject matter expert, presenting technical information to
    stakeholders and providing the guidance to elevate the engineering culture across
    the company.</li> </ul> <p>&nbsp;</p> <p>Ideally you’d have:</p> <ul> <li>8+ years
    of full-time engineering experience, post-graduation with specialities in back-end
    systems.</li> <li>Extensive experience in software development and a deep understanding
    of distributed systems and public cloud platforms (AWS preferred).</li> <li>Demonstrated
    a track record of independent ownership and leadership across successful multi-team
    engineering projects</li> <li>Possess excellent communication and collaboration
    skills, and the ability to translate complex technical concepts to non-technical
    stakeholders.</li> <li>Experience working fluently with standard containerization
    &amp; deployment technologies like Kubernetes, Terraform, Docker, etc.</li> <li>Experience
    with orchestration platforms, such as Temporal and AWS Step Functions.</li> <li>Experience
    with NoSQL document databases (MongoDB) and structured databases (Postgres).</li>
    <li>Strong knowledge of software engineering best practices and CI/CD tooling
    (CircleCI, ArgoCD).</li> </ul> <p>Nice to haves:</p> <ul> <li>Experience with
    data warehouses (Snowflake, Firebolt) and data pipeline/ETL tools (Dagster, dbt).</li>
    <li>Experience scaling products at hyper-growth startups.</li> <li>Excitement
    to work with AI technologies.</li> </ul><div class="content-pay-transparency"><div
    class="pay-input"><div class="description"><p><em>Compensation packages at Scale
    for eligible roles include base salary, equity, and benefits. The range displayed
    on each job posting reflects the minimum and maximum target for new hire salaries
    for the position, determined by work location and additional factors, including
    job-related skills, experience, interview performance, and relevant education
    or training. Scale employees in eligible roles are also granted equity based compensation,
    subject to Board of Director approval. Your recruiter can share more about the
    specific salary range for your preferred location during the hiring process, and
    confirm whether the hired role will be eligible for equity grant. You’ll also
    receive benefits including, but not limited to: Comprehensive health, dental and
    vision coverage, retirement benefits, a learning and development stipend, and
    generous PTO. Additionally, this role may be eligible for additional benefits
    such as a commuter stipend.</em></p></div><div class="title">Pleas'
