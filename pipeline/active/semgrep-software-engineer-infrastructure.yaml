  description: 'About Semgrep Semgrep, the leader in code security for builders, empowers
    invention without friction. Teams catch, flag, and fix real issues before they
    ship, powered by security that learns as they build. Semgrep secures code as it’s
    written and provides guardrails that pave the road for developers to move fast
    and stay secure. Built for builders and trusted by security, Semgrep lives where
    developers work, delivering fixes without breaking flow, and giving security teams
    visibility, control, and confidence. Semgrep gets smarter as you build, with AI
    that learns your context to cut false positives and prioritize reachable vulnerabilities,
    validated by 95% of security reviewers across 6M+ findings. Semgrep makes zero
    false positives a reality with AppSec teams triaging 80% fewer false positives
    across Code and Supply Chain, dramatically shrinking the backlog. Founded in San
    Francisco and backed by Menlo Ventures, Felicis Ventures, Lightspeed Venture Partners,
    Redpoint Ventures, and Sequoia Capital, Semgrep is recognized by Gartner in Application
    Security Testing and is trusted by leading organizations, including Snowflake,
    Dropbox, and Figma. Learn more at semgrep.dev . About the role Semgrep’s Infrastructure
    team is responsible for the cloud infrastructure that underpins many of Semgrep’s
    internal and external applications, including our flagship products Semgrep Code
    and Semgrep Supply Chain. Our mission is to enable Semgrep’ers to effectively
    and confidently build, run, and manage their systems. We do this by providing
    a tightly integrated platform for going “from code to cloud” including CI/CD systems,
    Kubernetes on AWS cloud environments, and tools for operating software in production.
    You’ll learn about the application-security space, collaborate with other engineers
    on the Infrastructure team to create a robust platform, and build distributed
    systems that are secure, reliable, and performant. Through Semgrep’s culture of
    transparency, you’ll see and influence the decisions that make a startup successful.
    Your decisions and work will be key to making Semgrep a world-leading static-analysis
    project, giving you lasting influence not only at Semgrep, but in the world’s
    developer community. You will: Work with senior and staff engineers on the team
    to design, implement, and deploy Infrastructure initiatives Learn and execute
    infrastructure best practices alongside other members of the team Own projects,
    platforms, and specific tools within the team on the order of multiple weeks in
    scope, from design through maintenance Become a Subject Mater Expert (SME) in
    Kubernetes and AWS administration Collaborate with the team to determine the future
    of the internal platform, what features to build, and how to build them Ensure
    continual, high-availability operation of services using modern site-reliability
    practices, including participation in an on-call rotation You are ideal for this
    role if you have: You have 2+ years of software engineering experience You have
    an aptitude for learning infrastructure tools, patterns, and best practices You
    have worked with or used Kubernetes clusters and AWS infrastructure You are familiar
    with infrastructure tools, patterns, and methodologies You are passionate about
    building reliable and secure infrastructure You have excellent and proactive communication,
    both verbal and written Some examples projects you might work on include: Working
    with the team to own critical infrastructure component upgrades Working with the
    team on strategic infrastructure initiatives, such as migration and expansion
    of cloud services Participating in our oncall rotation, to include leading debugging,
    implementing mitigations, and running postmortems to resolve issues thoroughly
    Location: Hybrid (3 days/week) out of one of our hub locations( Boston, Denver,
    NYC, SF) Compensation: The estimated starting annual salary range for this position
    is $128,500-$161,000 USD. The actual base salary will be determined based on a
    number of factors, which may include job-related skills, relevant experience,
    qualifications, location, internal equity, and market data. In addition to base
    salary, total compensation may include equity, variable compensation, and benefits.
    We view equity as a meaningful part of our compensation philosophy and a way for
    employees to share in the long-term value they help create. Compensation ranges
    are reviewed regularly and may be adjusted as the role, individual performance,
    or market conditions evolve. What we offer (FTE only) Our goal is to competitively
    and fairly compensate every Semgrep employee with a system that equally rewards
    those who are vocal and those who are less comfortable making demands during the
    final steps of the hiring process. To that end, we generate internal compensation
    bands that are used when discussing and negotiating salaries. We update these
    based on market data to make sure they’re above the average for comparable roles.
    We invest in our employees’ well-'
