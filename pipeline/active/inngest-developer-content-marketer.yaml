  description: 'About Inngest Inngest powers durable execution for companies building
    AI in production—including Replit, Cohere, and Outtake. We''re growing fast, our
    product is genuinely exciting, and we need someone to help developers find us,
    understand us, and fall a little bit in love with us. About the role We''re hiring
    a Developer Content Marketer to bring our story to life. To make it tangible.
    To amplify all the reasons developers already love us. And, specifically, to create
    informative, engaging, and highly human content that devs actually want to read.
    The remit is wide, because we want someone who thinks holistically: from market
    research and audience segmentation, all the way through ideation, execution, distribution,
    and measurement. You''ll own the full arc, and report directly to the Head of
    Marketing. Responsibilities This person will shape the first impression developers
    have of Inngest. They’ll help spark community conversations with genuinely interesting
    and helpful content. They’ll influence off-site stories in newsletters, videos,
    and press releases. They’ll accelerate onboarding with examples, cookbooks, and
    tutorials. They’ll inspire building—and hopefully tap into how genuinely rad it
    is to build with Inngest themselves. And, they’ll have fun. We believe your joy
    is the best lever for building engaging content. One important caveat: Inngest
    is a very technical product. Durable execution is still an evolving category,
    and we need someone tuned into the nuances of how our audience describes the problems
    they need help solving. “Language-Market Fit” is important. We’d love someone
    who can write from first-hand experience of orchestration, workflows, or other
    path-to-production developer tools—and make it feel approachable without being
    reductive. Some examples of your day-to-day: Create short and long-form content
    that is engaging and educational, helping us strengthen our presence and authority
    in durable execution and AI . Design an interview series to raise awareness of
    Inngest''s infrastructure expertise . Build independent research reports to highlight
    important conversations in our market. Shape product launch content strategy ,
    from the bottom of the funnel (BoFu) to the top of the funnel (ToFu). Adopt a
    data-first approach to stay up to date with the latest trends and topics in our
    field, helping us shape our AEO and SEO content strategies effectively. Help shape
    and develop our content voice, style, and structure as the company grows. Partner
    with product marketing and engineers to understand our products and technology.
    How this role is measured: Quantitative? All the usual suspects…traffic, open
    rates, signups, activation, expansion. Of course, none of these will fall on this
    person alone. But we expect this person to come to the table with an ownership
    mindset, to work with the rest of the marketing team to drive real results. Qualitative?
    We really just want to see more folks experience the joy of building with Inngest.
    Who you are 4+ years in technical writing, content marketing, video creation,
    Docs, or DevRel Experience with highly complex developer tools (orchestration,
    workflows, AI evals, etc) Ability to understand and explain trending technical
    concepts (distributed systems, software architecture, AI) Experience distributing
    content on developer platforms (X, Reddit, Hacker News) Comfort using AI tools
    to accelerate work without compromising quality Bias to action—you’re comfortable
    figuring it out as you go. Bonus if you have... Experience with video editing
    tools (e.g., Descript) for short-form social content Experience with external
    content creators (scouting, writing briefs, coaching) Experience in market research,
    analytics, or product marketing Experience in engineering—Backend, Platform, AI,
    Fullstack, etc. Interview Process Initial Screen (30 min) — Head of Marketing
    Technical Depth (30 min) — Engineering team member DevRel Partnership (30 min)
    — Head of DevRel Take-Home Project (3-4 hrs) — Present previously delivered campaign
    Presentation (45 min) — Marketing leadership Values Fit (15 min) — CEO'
