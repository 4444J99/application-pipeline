  description: '<div class="content-intro"><p><span style="font-family: arial, helvetica,
    sans-serif;"><strong>Who we are</strong></span></p> <p><span style="font-weight:
    300; font-family: arial, helvetica, sans-serif;">Samsara (NYSE: IOT) is the pioneer
    of the Connected Operations™ Cloud, which is a platform that enables organizations
    that depend on physical operations to harness Internet of Things (IoT) data to
    develop actionable insights and improve their operations. At Samsara, we are helping
    improve the safety, efficiency and sustainability of the physical operations that
    power our global economy. Representing more than 40% of global GDP, these industries
    are the infrastructure of our planet, including agriculture, construction, field
    services, transportation, and manufacturing — and we are excited to help digitally
    transform their operations at scale.</span></p> <p><span style="font-weight: 300;
    font-family: arial, helvetica, sans-serif;">Working at Samsara means you’ll help
    define the future of physical operations and be on a team that’s shaping an exciting
    array of product solutions, including Video-Based Safety, Vehicle Telematics,
    Apps and Driver Workflows, and Equipment Monitoring. As part of a recently public
    company, you’ll have the autonomy and support to make an impact as we build for
    the long term.</span></p></div><p><strong>About the role:</strong></p> <p>As a
    full-stack Software Engineer on Samsara’s Training team, you will design and develop
    features for two new products – Connected Training and Qualification Management.
    Connected Training provides our customers an intelligent, data-driven platform
    for employee training that ensures our customers’ workforce is prepared to perform
    their jobs safely and efficiently. Qualifications Management gives our customers
    a scalable solution for managing critical documents that verify safe, compliant
    operations. You’ll own solving engineering challenges end-to-end, from underlying
    infrastructure needs to user-facing UI and feature development on both web and
    mobile.</p> <p>This role can be office-based or fully remote in the US and Canada.</p>
    <p><strong>You should apply if:</strong></p> <ul> <li><strong>You want to impact
    the industries that run our world: </strong>The software, firmware, and hardware
    you build will result in real-world impact – helping to keep the lights on, get
    food into grocery stores, and most importantly, ensure workers return home safely.</li>
    <li><strong>You want to build for scale: </strong>With over 2.3 million IoT devices
    deployed to our global customers, you will work on a range of new and mature technologies
    driving scalable innovation for customers across industries driving the world''s
    physical operations.</li> <li><strong>You are a life-long learner: </strong>We
    have ambitious goals. Every Samsarian has a growth mindset as we work with a wide
    range of technologies, challenges, and customers that push us to learn on the
    go.</li> <li><strong>You believe customers are more than a number:</strong> Samsara
    engineers enjoy a rare closeness to the end user and you will have the opportunity
    to participate in customer interviews, collaborate with customer success and product
    managers, and use metrics to ensure our work is translating into better customer
    outcomes.</li> <li><strong>You are a team player: </strong>Working on our Samsara
    Engineering teams requires a mix of independent effort and collaboration. Motivated
    by our mission, we’re all racing toward our connected operations vision, and we
    intend to win – together.</li> </ul> <p><strong>In this role, you will:</strong>&nbsp;</p>
    <ul> <li>Leverage AI to design and develop tooling and features that feel like
    magic to our customers - saving them time and money by avoiding toil from painful
    manual processes.&nbsp;</li> <li>Design and develop tooling for seamlessly handling
    multi-language support in training course content generation.&nbsp;</li> <li>Develop
    multi-step automations that integrate our features with other areas of the Samsara
    platform, eliminating manual configuration and increasing the value of our products.</li>
    </ul> <p><strong>Minimum requirements for the role:</strong></p> <ul> <li>Bachelor''s
    Degree in Computer Science/Engineering or equivalent practical experience</li>
    <li>Has 2+ years of relevant industry experience in software development</li>
    <li>Strong programming/coding fundamentals</li> <li>Enjoys understanding users
    and what would make their day to day processes easier</li> <li>Ships high-quality
    features that are immediately used by customers</li> </ul> <p><strong>An ideal
    candidate also has:</strong></p> <ul> <li>A track record of delivery in a fast-paced,
    startup environment</li> <li>Strong bias for action and desire for individual
    ownership</li> <li>Desire to work collaboratively on a distributed, highly engaged
    team&nbsp;</li> <li>Desire to iterate on new products based on customer feedback</li>
    </ul><div class="content-pay-transparency"><div class="pay-input"><d'
