    and Dental Care</li> <li>Mental Wellness Benefit</li> <li>Generous Vacation Policy
    &amp; Additional Company Holidays</li> <li>Enhanced Parental Leave</li> <li>Volunteer
    Time Off</li> <li>Additional US Benefits: Pre-Tax Benefits including 401(K), Wellness
    Benefit, Holiday Break</li> </ul> <p><em>*please note that benefits and perks
    for contract positions will vary*</em></p> <p><strong>Culture Values</strong></p>
    <ul> <li><strong>Make Bold Bets:</strong> We choose courageous action over comfortable
    progress.</li> <li><strong>Innovate with Insight:</strong> We tackle decisions
    with rigor and judgment - combining data, experience and collective wisdom to
    drive&nbsp;powerful outcomes.</li> <li><strong>One Team:</strong> We collaborate
    across boundaries to achieve far greater impact than any of us could accomplish
    alone.</li> <li><strong>Candor with Connection:</strong> We build meaningful relationships
    that enable honest feedback and direct conversations.</li> <li><strong>Champion
    the Customer:</strong> We seek to deeply understand our customers’ needs, ensuring
    their success is our north star.</li> <li><strong>Powerful Simplicity:</strong>
    We find elegant solutions to complex problems, making sophisticated things accessible.</li>
    </ul> <p><strong>Why choose Mixpanel?</strong></p> <p>We’re a leader in analytics
