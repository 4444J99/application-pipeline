    closely with EPD partners in a fast-paced, product-led environment where your
    work directly impacts how thousands of teams build and improve their products.</p>
    <p><strong>What You''ll Do</strong></p> <ul> <li>Build and ship customer-facing
    features across the Experimentation and Feature Flag products</li> <li>Own frontend
    architecture and UI quality - you sweat the details that make complex workflows
    feel intuitive</li> <li>Design and implement backend APIs and services to support
    complete, well-integrated features</li> <li>Collaborate with Product, Design,
    and GTM to define and deliver high-quality solutions</li> <li>Lead projects from
    idea through launch, including monitoring and follow-up</li> <li>Navigate trade-offs
    between product scope, speed, statistical correctness, and maintainability</li>
    </ul> <p>&nbsp;</p> <p><strong><span class="notion-enable-hover" data-token-index="0">What
    We''re Looking For</span></strong></p> <ul> <li>Frontend-leaning full stack experience:
    strong in React/JavaScript, CSS; comfortable on the backend (Python, Golang)</li>
    <li>Sharp product instincts and attention to UI/UX detail</li> <li>Proven ability
    to own problems end-to-end and ship customer value</li> <li>Bonus: Familiarity
    with experimentation or feature flag platforms (e.g. Statsig, LaunchDarkly, Optimizely)</li>
    <li>Bonus: Interest in statistical concepts</li> <li>Bonus: Curiosity around DevOps
