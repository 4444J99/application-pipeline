  description: '<h2>About Privy</h2> <p>Our mission is to make privacy and user ownership
    the default online. We build simple, flexible developer tooling that make it easy
    to build products that put users first. By leveraging modern cryptography, we
    shift the status quo around digital ownership and protect the accounts and assets
    of millions of users.</p> <p>Learn more about Privy: <a href="https://privy.io/blog/announcing-our-acquisition-by-stripe">Privy
    and Stripe: Bringing crypto to everyone</a></p> <p>Engineering at Privy is not
    just about writing world-class code. We create software that turns complex technical
    systems into delightful developer tools. We assemble tried-and-true primitives
    into intuitive, responsive APIs and beautiful interfaces. We believe in open-source
    work and transparency with our teammates and users. We encourage each other to
    think big, run experiments and follow our curiosity so we can build better tooling
    that lets developers shine and empower their users.&nbsp;</p> <h2>What You’ll
    Do</h2> <p>As a Frontend engineer at Privy, you will take on large areas of ownership
    in Privy’s product, architecture, and infrastructure. Because we build a developer
    tool, engineering and product are inextricably connected. We value intuitive interfaces,
    simplicity, and rapid iteration. Above all, we are building a company together
    to ship products that users love.</p> <ul> <li>Design intuitive interfaces to
    break down complex systems and turn them into delightful developer tooling</li>
    <li>Build and integrate systems end-to-end across client-side and server-side
    APIs to enable a seamless developer experience</li> <li>Design and implement end-to-end
    product features driven by user needs</li> <li>Advocate for usability and interface
    coherence across our teams and products</li> <li>Enforce web development best
    practices across our entire product collaborating with other core stakeholders</li>
    </ul> <h3>Minimum requirements</h3> <ul> <li>8+ years of relevant software development
    experience</li> <li>Deep knowledge of React, Typescript, and an application framework
    (Next.js, SvelteKit, etc)</li> <li>Experience building and maintaining a production
    system at scale</li> <li>Prior experience collaborating closely with a designer
    to iterate on user-facing products</li> <li>An understanding of modern web development
    best practices</li> <li>Experience writing delightful developer documentation</li>
    </ul> <h3>Preferred qualifications</h3> <ul> <li>Experience building and maintaining
    published JavaScript/TypeScript SDKs used by developers</li> <li>Experience with
    cross-domain browser challenges (iframes, popups) and client-side authentication
    (token management, session handling)</li> <li>Published about your work (code,
    presentations, papers, blog posts, etc.)</li> <li>Domain expertise in authentication,
    security, payments, or web3</li> </ul>'
