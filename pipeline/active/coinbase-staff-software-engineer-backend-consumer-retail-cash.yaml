    every day, as we build the emerging onchain platform — and with it, the future
    global financial system.</p> <p>To achieve our mission, we’re seeking a very specific
    candidate. We want someone who is passionate about our mission and who believes
    in the power of crypto and blockchain technology to update the financial system.
    We want someone who is eager to leave their mark on the world, who relishes the
    pressure and privilege of working with high caliber colleagues, and who actively
    seeks feedback to keep leveling up. We want someone who will run towards, not
    away from, solving the company’s hardest problems.</p> <p>Our <a href="https://www.coinbase.com/mission">work
    culture</a> is intense and isn’t for everyone. But if you want to build the future
    alongside others who excel in their disciplines and expect the same from you,
    there’s no better place to be.</p> <p>While many roles at Coinbase are remote-first,
    we are not remote-only. In-person participation is required throughout the year.
    Team and company-wide offsites are held multiple times annually to foster collaboration,
    connection, and alignment. Attendance is expected and fully supported.</p></div><p>​​The
    Retail Cash team provides the foundational cash layer for Coinbase’s Consumer
    business. We make it possible for users to reliably hold, fund, withdraw, and
    route cash to every experience across Coinbase—from simple buys and sells to advanced
    trading and new Consumer products. Our systems must be highly reliable, auditable,
    and globally scalable.</p> <p>As a Staff Engineer, you will be the technical anchor
    for Cash services. You will define the architecture and roadmap for core cash
    capabilities, ensuring that any team at Coinbase can depend on a robust, secure,
    and always‑on cash foundation.You will be part of the vision to build a compelling
    and trusted single cash balance that serves Everything Exchange users’ risk‑off
    needs.</p> <p>This role is for an engineer who thrives on tackling complex, high-impact
    distributed systems that require high reliability and performance—especially in
    a trading and financial technology context.</p> <p><strong>What you’ll be doing:</strong></p>
    <ul> <li>Serve as the technical leader and strategist for the Consumer Cash team,
    defining multi-quarter technical strategies that intersect multiple financial
    products.</li> <li>Architect, develop, and own distributed systems that power
    low-latency APIs and event‑driven pipelines that process large volumes of cash
    transactions with strong correctness guarantees.</li> <li>Provide technical structure
    and partner closely with management and stakeholders to translate business goals
    into a defined strategic roadmap.</li> <li>Design and implement foundational,
    high-performance infrastructure components, leveraging tools like Kafka and Clickhouse
    in an event-sourced architecture.</li> <li>Manage individual project priorities,
    deadlines, and deliverables with strong technical expertise.</li> <li>Mentor and
    coach other team members on advanced design techniques, coding standards, and
    best practices for building robust value-add products.</li> <li>Leverage our modern,
    diverse tech stack to write high-quality, production-ready code that is thoroughly
    tested and delivers a critical product to market.</li> </ul> <p><strong>What we
    look for in you:</strong></p> <ul> <li>8+ years of experience in software engineering,
    with significant experience architecting and developing solutions to ambiguous,
    high-impact problems.</li> <li>Demonstrated experience with low-latency, event-driven,
    or distributed systems.</li> <li>A strong signal if you have a background in building
    consumer facing trading products or any application that handles large amounts
    of streaming data.</li> <li>Passion for building an open financial system that
    brings the world together.</li> <li>Intellectual curiosity, openness, and a passion
    for building a culture of positive energy and blameless truth-seeking.</li> </ul>
    <p><strong>&nbsp;Nice to haves:</strong></p> <ul> <li>Experience in payments,
    banking, wallets, or trading systems, especially transaction processing or ledgering.</li>
    <li>Familiarity with the tech stack, including Golang, Clickhouse, Kafka, Redis,
    MongoDB.</li> <li>Experience building financial, high reliability, or security
    systems.</li> <li>Background in Blockchains (such as Bitcoin, Ethereum) or crypto-forward
    experience (e.g., interacting with Ethereum addresses, ENS, dApps).</li> <li>Experience
    with a company going through rapid growth (from 10 to 100s of engineers).</li>
    </ul> <p><span style="font-weight: 400;">Job #: 75913</span></p> <div id="fortidlp-input-element-parent"></div><div
