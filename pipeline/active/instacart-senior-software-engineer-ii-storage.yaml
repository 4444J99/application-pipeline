    have the freedom to suggest and drive high-impact initiatives related to Storage
    solutions that unlock new innovations, accelerate application development, create
    resiliency &amp; high-availability, and right-size storage needs company-wide.</li>
    </ul> <p>Instacart''s technology is constantly changing and adapting. Some of
    the technologies you would use at Instacart include:</p> <ul> <li>Languages: Go,
