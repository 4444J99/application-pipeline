  description: '<div class="content-intro"><p>Ready to be pushed beyond what you think
    you’re capable of?</p> <p>At Coinbase, our mission is to increase economic freedom
    in the world. It’s a massive, ambitious opportunity that demands the best of us,
    every day, as we build the emerging onchain platform — and with it, the future
    global financial system.</p> <p>To achieve our mission, we’re seeking a very specific
    candidate. We want someone who is passionate about our mission and who believes
    in the power of crypto and blockchain technology to update the financial system.
    We want someone who is eager to leave their mark on the world, who relishes the
    pressure and privilege of working with high caliber colleagues, and who actively
    seeks feedback to keep leveling up. We want someone who will run towards, not
    away from, solving the company’s hardest problems.</p> <p>Our <a href="https://www.coinbase.com/mission">work
    culture</a> is intense and isn’t for everyone. But if you want to build the future
    alongside others who excel in their disciplines and expect the same from you,
    there’s no better place to be.</p> <p>While many roles at Coinbase are remote-first,
    we are not remote-only. In-person participation is required throughout the year.
    Team and company-wide offsites are held multiple times annually to foster collaboration,
    connection, and alignment. Attendance is expected and fully supported.</p></div><p>Our
    core mission is clear: build platform services to empower high quality staking
    products for our retail and institutional customers. This way, people don’t just
    buy / sell crypto, they “earn dividend” on crypto, and in the meantime provides
    security and decentralization for underlying blockchain networks.</p> <p>It’s
    backing the #3 largest revenue stream at Coinbase ($700M+ ARR) - and the #2 revenue
    stream that’s not market fluctuation dependent.</p> <p>This team is responsible
    to understand deep context across multiple top staking protocols, and translate
    complex operations and state machines into simple and straightforward API for
    product teams at Coinbase.</p> <p><strong>What you’ll be doing:</strong></p> <ul>
    <li>Design and build critical staking infrastructure that abstract blockchain
    complexity into reliable platform APIs&nbsp;</li> <li>Own APIs, schemas, SLOs,
    observability, and on-call for the systems you run</li> <li>Lead multi-quarter
    initiatives (new chains, re-architecture, migrations/backfills) to improve latency,
    reliability, and cost</li> <li>Partner across teams to define data contracts and
    ship SDKs/platform primitives that drive adoption</li> </ul> <p><strong>What we
    look for in you:</strong></p> <ul> <li>You have at least 5+ years of experience
    in software engineering.</li> <li>You’ve designed, built, scaled and maintained
    production services, and know how to compose a service oriented architecture.</li>
    <li>You write high quality, well tested code to meet the needs of your customers.</li>
    <li>You’re passionate about building an open financial system that brings the
    world together.</li> </ul> <p><strong>Nice to haves:</strong></p> <ul> <li>Experience
    designing and developing distributed systems</li> <li>You have gone through a
    rapid growth in your company (from 10 to 100s of engineers)</li> <li>You have
    experience with Blockchains (such as Bitcoin, Ethereum etc.)</li> <li>You have
    experience decomposing a large monolith into microservices</li> <li>You’ve worked
    with Golang, Kafka, Redis, S3, Clickhouse, MongoDB</li> <li>You’ve built financial,
    high reliability or security systems</li> <li>Crypto-forward experience, including
    familiarity with onchain activity such as interacting with Ethereum addresses,
    using ENS, and engaging with dApps or blockchain-based services.</li> </ul> <p><span
