  description: 'Snowflake is about empowering enterprises to achieve their full potential
    — and people too. With a culture that’s all in on impact, innovation, and collaboration,
    Snowflake is the sweet spot for building big, moving fast, and taking technology
    — and careers — to the next level. Role will be based in Mexico City, Mexico We
    are looking for a Solution Engineer who is accustomed to solving customer’s most
    complex problems and closing large deals. In this role you will work directly
    with the sales team and channel partners to understand the needs of our customers,
    strategize on how to navigate winning sales cycles, provide compelling value-based
    demonstrations, support enterprise Proof of Concepts, and ultimately help customers
    grow in their use of Snowflake. As a Snowflake Solution Engineer you must share
    our passion about reinventing the AI Data platform space, thrive in a dynamic
    environment and have the flexibility and willingness to jump in and get things
    done. You are equally comfortable in both a business and technical context, interacting
    with executives and talking shop with technical audiences. IN THIS ROLE YOU WILL
    GET TO: Present Snowflake technology and vision to executives and technical contributors
    at Snowflake customers and prospects Work hands-on with customers to demonstrate
    and communicate the value of Snowflake technology; identify use cases, and guide
    the customer to successfully take them from demo to implementation, and a successful
    go-live. Present Customers with the innovations in Snowflake and the value these
    innovations add to their business. Immerse yourself in the ever-evolving industry,
    maintaining a deep understanding of competitive and complementary technologies
    and vendors and how to position Snowflake in relation to them. Collaborate with
    Product Management, Engineering, and Marketing to continuously improve Snowflake’s
    products and marketing. ON DAY ONE WE WILL EXPECT YOU TO HAVE: Outstanding presenting
    skills to both technical and executive audiences, whether impromptu on a whiteboard
    or using presentations and demos. Broad range of experience within large-scale
    Database and/or Data Warehouse technology, ETL, analytics and cloud technologies
    Hands-on expertise with SQL and SQL analytics Ability to understand a customer’s
    specific business problems and translate these to Snowflake use cases University
    degree in computer science, engineering, mathematics or related fields, or equivalent
    experience preferred Travel Required ABOUT OUR TEAM: Our Solution Engineers are
    customer obsessed and we believe in the value we can add and stay honest about
    it. We love to learn, are open to giving and receiving feedback and are passionate
    about making our clients successful. Our team works to ensure data is accessible,
    usable and valuable to everyone. Snowflake is growing fast, and we’re scaling
    our team to help enable and accelerate our growth. We are looking for people who
    share our values, challenge ordinary thinking, and push the pace of innovation
    while building a future for themselves and Snowflake. How do you want to make
    your impact? For jobs located in the United States, please visit the job posting
    on the Snowflake Careers Site for salary and benefits information: careers.snowflake.com'
