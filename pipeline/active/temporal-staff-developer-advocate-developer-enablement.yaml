  description: '<div class="content-intro"><h3><strong>About Us</strong></h3> <div>Temporal
    is an open source programming model that can simplify code, make applications
    more reliable, and help developers focus on the important things like delivering
    features faster. We are on a mission to be the reliable foundation of every developer’s
    toolbox, and are building the team that will make that happen.</div> <div>&nbsp;</div>
    <div>Our values guide us —they are present in how we show up, make decisions,
    and work together to make an impact. We’re curious, driven, collaborative, genuine
    and humble.</div> <div>&nbsp;</div> <div>Temporal is growing and we are looking
    for those who share our values, challenge ''standard'' thinking, and want to influence
    our future. If you have a passion for improving the developer experience, building
    world-class open-source software and communities, and want to be a part of our
    amazing team, we''d love to hear from you!</div></div><p><strong>Summary</strong></p>
    <p>Join Temporal’s Enterprise Developer Advocacy team as a Staff Developer Advocate,
    Developer Education, where you’ll play a central role in shaping how enterprise
    developers learn, adopt, and succeed with Temporal.</p> <p>This is a senior individual
    contributor role focused on education strategy, technical mentorship, and hands-on
    delivery. You’ll help define how we design and deliver developer education in
    a post-COVID, LLM-enabled world, while staying deeply connected to real developers
    through workshops, Dev Days, and field engagements.</p> <p>You’ll act as a technical
    partner to Enterprise DevRel leadership, set quality and direction for education
    initiatives, and help scale what works through thoughtful programs, strong technical
    examples, and direct developer feedback.</p> <p><strong>What You’ll Do</strong></p>
    <ul> <li>Define and evolve Temporal’s enterprise developer education approach,
    grounded in how developers actually learn and practice their craft today</li>
    <li>Set technical and instructional direction for programs like workshops and
    training experiences</li> <li>Partner with DevRel leadership to prioritize education
    investments and identify where new formats or tooling make sense</li> <li>Design
    and coordinate train-the-trainer initiatives, including curriculum structure,
    enablement materials and ongoing support</li> <li>Help define certification pathways
    for trainers and developers, including clear skill areas, technical criteria,
    and assessment approaches</li> <li>Experiment thoughtfully with new education
    formats (e.g. AI-assisted learning, interactive labs, hybrid delivery), evaluating
    effectiveness and iterating based on feedback</li> <li>Ensure educational materials
    reflect current product capabilities and recommended architectural patterns</li>
    <li>Validate content by teaching it directly and refining based on developer outcomes</li>
    <li>Design and deliver enterprise Dev Day workshops and technical training sessions</li>
    <li>Partner with Sales, Solutions Architecture, and Field Marketing on high-impact
    customer engagements</li> <li>Represent Temporal at conferences, meetups, webinars,
    and community events with strong technical talks</li> <li>Mentor other advocates,
    educators, and contributors on technical depth, workshop design and instructional
    clarity</li> <li>Serve as a technical sounding board for education initiatives
    across the DevRel org<br><br></li> </ul> <p><strong>What You’ll Bring</strong></p>
    <ul> <li>Strong software engineering background with experience building and operating
    distributed systems</li> <li>Ability to build production-quality applications
    in at least one of Temporal’s primary SDK languages (Go, Java, TypeScript, Python,
    or .NET)</li> <li>Solid understanding of distributed systems fundamentals such
    as state management, fault tolerance, concurrency, and event-driven architectures</li>
    <li>Demonstrated experience creating high-quality, outside-of-the-box, technical
    education (tutorials, workshops, courses, or documentation)</li> <li>Experience
    designing and delivering hands-on workshops or training for developer audiences</li>
    <li>Strategic mindset with the ability to shape programs, not just execute tasks</li>
    <li>Clear, pragmatic communication style with strong written and verbal skills</li>
    <li>Comfort operating as a senior IC with broad ownership and cross-functional
    influence</li> <li>Willingness to travel up to ~30% for Dev Days, customer engagements,
    conferences, and team offsites<br><br></li> </ul> <p><strong>Nice to Haves</strong></p>
    <ul> <li>Experience with Temporal</li> <li>Background in developer education,
    DevRel, or technical enablement roles</li> <li>Experience designing certification
    programs or competency frameworks</li> <li>Experience mentoring other technical
    educators or advocates</li> <li>Experience experimenting with AI-assisted learning
    or modern education tooling</li> <li>Experience working with enterprise customers
    on technical enablement or architectural guidance</li> '
