    Software Engineer, you’ll design and build systems that help manage and forecast
    resource needs, improving infrastructure efficiency, customer experience, and
    platform cost effectiveness.</p> <h2 data-section-id="17fyts0" data-start="541"
    data-end="560">What You'll Do</h2> <ul> <li data-start="561" data-end="1288">Design
