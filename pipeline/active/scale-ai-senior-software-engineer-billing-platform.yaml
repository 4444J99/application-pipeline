  description: '<p><strong>About Scale</strong></p> <p>At Scale AI, our mission is to accelerate the development of AI applications. For 8 years, Scale has been the leading AI data foundry, helping fuel the most exciting advancements in AI, including: generative AI, defense applications, and autonomous vehicles. With our recent Series F round, we’re accelerating the abundance of frontier data to pave the road to Artificial General Intelligence (AGI), and building upon our prior model evaluation work with enterprise customers and governments, to deepen our capabilities and offerings for both public and private evaluations.</p> <p><strong>About Data Engine</strong></p> <p>Our Generative AI Data Engine powers the world’s most advanced LLMs and generative models through world-class RLHF (Reinforcement Learning with Human Feedback), human data generation, model evaluation, safety, and alignment. The data we are producing is some of the most important work for how humanity will interact with AI.</p> <p><strong>About our Billing Team</strong></p> <p>We’re looking for entrepreneurial Software Engineers to join our Billing Platform team. In this role, you''ll have the opportunity to drive the revenue tracking and billing system for our Generative AI products. You’ll be deeply involved in building flexible, new systems to support customer billing use cases, implementing complex billing partitioning schemes based on dynamic criteria, and/or improving customer invoice generation and balance visibility. You’ll also get widespread exposure to the forefront of the AI race as Scale sees it in enterprises, startups, governments, and large tech companies.<br><br>The ideal person is a natural entrepreneurial engineer who can take an ambiguous scope and lead the execution of outcomes, doing what it takes to hit them incl coding, talking to customers, defining requirements, etc. We strongly believe the best engineers own outcomes and deeply understand customer problems.</p> <h3><strong>