  description: '<div class="content-intro"><p>Affirm is reinventing credit to make
    it more honest and friendly, giving consumers the flexibility to buy now and pay
    later without any hidden fees or compounding interest.</p></div><p>Identity at
    Affirm is mission-critical; it is the very first step of the customer journey
    and the foundation of global expansion. The International Expansion Unit (IEU)
    owns Identity for every market outside North America, placing our team at the
    center of Affirm’s global strategy. We are responsible for ensuring Affirm can
    enter and scale in new markets while operating compliantly across diverse regulatory
    environments.</p> <p>Our scope includes building and expanding Identity Data Management,
    KYC Verification, and Decisioning capabilities, while driving architectural changes
    that impact Identity services globally. We don’t just execute; we influence the
    core platform’s evolution to support new risk models and market dynamics. Operating
    at the intersection of technical depth and regulatory complexity, we directly
    impact approval rates, conversion, and fraud exposure. By joining this team, you
    will shape the foundational processes that unlock revenue and build customer trust
    on a global scale.</p> <h3><strong>What You''ll Do:</strong></h3> <ul> <li>You
    will be responsible for setting technical strategy for your team on a year-long
    time scale, and help your team tie it together with critical, business-impacting
    projects.</li> <li>You will collaborate across teams in the product development
    lifecycle by collaborating with product management, design &amp; analytics to
    ensure technical sustainability, risks and trade-offs are well understood and
    managed.</li> <li>You will act as a force-multiplier for your team through your
    definition and advocacy of technical solutions and operational processes.</li>
    <li>You take ownership of your team’s operations and availability by ensuring
    you have the right monitoring, triage rotations, playbooks, polcities, testing
    and alerting in place to support “keep the lights on” &amp; on-call efforts.</li>
    <li>You will foster a culture of quality and ownership on your team by setting
    code review and design standards for your team, and advocating for them beyond
    your team through your writing and tech talks.</li> <li>You will help develop
    talent on your team by providing feedback and guidance, and leading by example.</li>
    <li>On-Call Rotation - There would be an on-call rotation for this role as a requirement.</li>
    </ul> <h3><strong>What We Look For:</strong></h3> <ul> <li>You have 8+ years of
    experience designing, developing and launching backend systems at scale using
    languages like Python or Kotlin.</li> <li>You have an extensive track record of
    developing highly available distributed systems using technologies like AWS, MySQL,
    Spark and Kubernetes.</li> <li>You have strong verbal and written communication
    skills that support effective collaboration with our global engineering team.</li>
    <li>You have experience delivering major features, system components or deprecating
    existing functionality in a system through the definition of a technical and execution
    plan. You write high quality code that is easily understood and used by others.</li>
    </ul> <h3><strong style="font-size: 14px;">Compensation &amp; Benefits</strong></h3>
    <p><strong>Base Pay Grade</strong>&nbsp;<strong>- P</strong></p> <p><strong>Equity
    Grade</strong>&nbsp;<strong>- 6</strong></p> <p>Employees new to Affirm typically
    come in at the start of the pay range. Affirm focuses on providing a simple and
    transparent pay structure which is based on a variety of factors, including location,
    experience and job-related skills.&nbsp;</p> <p>Base pay is part of a total compensation
    package that may include monthly stipends for health, wellness and tech spending,
    and benefits (including 100% subsidized medical coverage, dental and vision for
    you and your dependents). In addition, the employees may be eligible for equity
    rewards offered by Affirm Holdings, Inc. (parent company).</p> <p>ESP base pay
    range per year: <strong>€101,000 &nbsp;- &nbsp;€131,000 </strong>&nbsp; &nbsp;</p>
    <p>Additional benefits include:</p> <ul> <li>Flexible Spending Wallets for tech,
    food and lifestyle</li> <li>Away Days - wellness days to take off work and recharge</li>
    <li>Learning &amp; Development programs</li> <li>Parental benefit</li> <li>Employee
    Resource &amp; Community Groups</li> </ul> <p>We are able to offer visa sponsorship
    for this role, but do require that someone is based in Spain for the role.</p>
    <div> <div> <p><strong>Location - Remote Spain</strong></p> </div> <div><strong>#LI-Remote</strong></div>
    </div><div class="content-conclusion"><div> <p>Affirm is proud to be a remote-first
    company! The majority of our roles are remote and you can work almost anywhere
    within the country of employment. Affirmers in proximal roles have the flexibility
    to work remotely, but will occasionally be required to work out of their assigned
    Affir'
