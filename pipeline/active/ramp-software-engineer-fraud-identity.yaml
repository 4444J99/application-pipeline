  description: 'About Ramp Ramp is building the smart infrastructure for finance teams,
    embedded in the transaction flow of every dollar a business spends. We automate
    how over $100B in annualized spend flows in and out of 50,000+ companies: authorizing
    payments, flagging risk, categorizing spend, and closing books. The problems are
    high-stakes, data-dense, and unforgiving. We hire people with high agency and
    high urgency. We look for slope over intercept. We care less about where you trained
    and more about what you’ve built. At Ramp, everyone is a builder who owns problems
    end to end and makes consequential decisions that shape the outcome. The median
    Ramp customer saves 5% and grows revenue 16% in their first year – far in excess
    of businesses operating without Ramp. We believe every ambitious company deserves
    the same. If you want to build systems that directly shape how companies move
    and manage billions, Ramp is the place to do it. About the Role We are hiring
    a Software Engineer to build systems across Fraud, UIM (User & Identity Management),
    and Identity. This role sits at the intersection of security, risk decisioning,
    and product experience. You will help build detection and enforcement capabilities
    for fraud and account takeover, as well as the identity primitives that power
    authentication, authorization, and safe account access. This work is deeply cross-functional.
    You will partner closely with Fraud Ops, Risk Strategy, Security, Product, and
    Data to ship improvements that are measurable in loss reduction, attack containment,
    and user experience. What You’ll Do Build and evolve backend services that detect
    and prevent fraud across multiple surfaces, including account access and money
    movement. Develop enforcement and response tooling that enables fast, safe actions
    such as identity locks, business locks, payment freezes, and other containment
    levers. Improve protections against account takeover (ATO), including risk-based
    step-ups, monitoring, and targeted friction controls (for example “under attack”
    style controls and MFA surge detection/alerting). Design and operate high-signal
    systems with strong observability: metrics, dashboards, alerting, and playbooks
    for incidents and fraud campaigns. Partner with UIM/Identity stakeholders to strengthen
    authentication and identity foundations (roles, permissions, identity state, and
    related platform primitives). Drive end-to-end delivery: technical design, implementation,
    rollout strategy, and iteration based on outcome metrics. What You’ll Need 3+
    years of software engineering experience (or equivalent). Strong backend engineering
    fundamentals (APIs, distributed systems, data modeling, reliability). Experience
    building data-informed detection or decisioning systems (rules engines, scoring,
    anomaly detection, or similar), or strong interest in learning in this domain.
    Proven ability to operate production systems: debugging, incident response, and
    improving on-call quality through instrumentation and automation. Strong cross-functional
    communication skills and comfort working with product and operations partners.
    Nice to Have Experience in fraud, risk, identity, authentication, authorization,
    abuse prevention, or security engineering. Familiarity with payments rails, card
    transaction risk, or account security patterns. Experience building internal tools
    for operations teams (case management, investigation, enforcement workflows).
    Benefits (for U.S.-based full-time employees) 100% medical, dental & vision insurance
    coverage for you Partially covered for your dependents One Medical annual membership
    401k (including employer match on contributions made while employed by Ramp) Flexible
    PTO Fertility HRA (up to $10,000 per year) Parental Leave Unlimited AI token usage
    Pet insurance Centralized home-office equipment ordering for all employees Health
    and Wellness stipend In-office perks: lunch, snacks, drinks, and more Budget for
    intra-office travel Relocation support to NYC or SF (as needed) Referral Instructions
    If you are being referred for the role, please contact that person to apply on
    your behalf. Other notices Pursuant to the San Francisco Fair Chance Ordinance,
    we will consider for employment qualified applicants with arrest and conviction
    records. Beware of recruiting scams: Ramp will only contact you through official
    @ Ramp.com email addresses and will never ask for payment or sensitive personal
    information during the hiring process. Ramp Applicant Privacy Notice'
