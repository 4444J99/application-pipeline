  description: '<div class="content-intro"><p>Lithic is the modern card issuing and
    processing platform empowering ambitious financial companies to build the future
    of payments.</p> <p>Our infrastructure powers card programs for 100+ innovative
    clients, from fintechs reimagining credit and digital banking to platforms transforming
    disbursements and spend management. Companies like Mercury, Flex, and Novo rely
    on Lithic''s developer-friendly APIs, direct network connections, and flawless
    reconciliation to launch and scale card programs in weeks, not years.</p> <p>We''re
    building a future where access to better financial products materially improves
    people''s lives, free from the constraints of 30-year-old mainframes and legacy
    processors. We''re proud to be backed by world-class investors who share that
    vision, including Bessemer Venture Partners, Index Ventures, Spark Capital, Stripes,
    and Mastercard, along with many others.</p> <p>We''re a team of 160+ across 26
    states and 7 countries, headquartered in New York City. Our values (Customer Centricity,
    Deliver Excellence, Act Like an Owner, Iterate Iterate Iterate, Teach Others,
    and Be a Good Neighbor) shape how we work and grow as a team.</p></div><p>Lithic
    is hiring a <strong>Solutions Consultant</strong> to design and deliver technical
    product solutions that meet customer needs and highlight the value of our platform.
    In this role, you''ll be the technical and strategic bridge between Lithic and
    our clients. You''ll own complex client relationships from pre-sale through implementation,
    helping partners design integrations, navigate the Lithic platform, and unlock
    the full potential of card issuing infrastructure. This is a high-impact, highly
    visible role that requires equal parts technical credibility, client empathy,
    and cross-functional influence. You’ll be responsible to collaborate with internal
    teams to develop tailored solutions that clearly demonstrate the benefits of working
    with Lithic. If you’re passionate about technology, problem-solving, and creating
    exceptional customer experiences this role is for you.</p> <p><strong>What you’ll
    do:</strong></p> <p><strong>Client Engagement</strong></p> <ul> <li>Serve as a
    trusted technical advisor to a portfolio of strategic clients, from early-stage
    fintechs to enterprise partners</li> <li>Lead discovery conversations to understand
    client goals, technical environments, and program requirements</li> <li>Translate
    complex client needs into concrete integration designs and implementation plans</li>
    <li>Own client relationships through the full lifecycle — scoping, build, launch,
    and ongoing optimization</li> </ul> <p><strong>Technical Depth</strong></p> <ul>
    <li>Develop deep expertise in Lithic''s APIs, card issuing workflows, and platform
    capabilities</li> <li>Guide clients through integration decisions including authorization
    flows, transaction processing, tokenization, and card program configuration</li>
    <li>Review client implementations and proactively identify risks, gaps, or optimization
    opportunities</li> <li>Serve as a credible technical voice in escalations and
    complex problem-solving scenarios</li> </ul> <p><strong>Cross-Functional Collaboration</strong></p>
    <ul> <li>Partner closely with Account Executives to support pre-sales and shape
    solution proposals</li> <li>Work with Product and Engineering to surface client
    feedback, inform the roadmap, and advocate for platform improvements</li> <li>Collaborate
    with bank partners and compliance teams to ensure client programs meet regulatory
    and network requirements</li> <li>Contribute to internal knowledge-sharing by
    documenting solutions, building reusable frameworks, and mentoring junior team
    members</li> </ul> <p><strong>Qualifications:</strong></p> <ul> <li>Proven experience
    in Solutions Consulting, Sales Engineering, Solutions Architecture, or a similar
    customer-facing role focused on implementing SaaS or technology solutions.</li>
    <li>3–5 years of experience in FinTech, particularly in payments, card issuance,
    or financial services technologies.</li> <li>Strong understanding of APIs and
    complex technical concepts, with the ability to translate them into clear, actionable
    insights for customers.</li> <li>Excellent communication skills: able to translate
    technical information into clear business language to different internal stakeholders.</li>
    <li>Strong presentation skills: comfortable and confident presenting to external
    teams technical and non-technical stakeholders.</li> <li>Strong product sense,
    concept explanation, and technical acumen: familiarity with APIs and technical
    concepts.</li> <li>A well-rounded contributor with strong product sense, communication,
    and storytelling skills.</li> <li>Low-ego collaborator who builds strong relationships
    internally and externally.</li> <li>Ability to thrive in a cross-functional environment,
    collaborating with diverse stakeholders and subject matter experts to deliver
    impactful, user-facing solutions.</li> <li>Experience working'
