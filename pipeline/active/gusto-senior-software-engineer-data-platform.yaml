    Intelligence, and analysts across Gusto teams to help them achieve their goals.&nbsp;</p>
    <p>The Data Platform position is a software development role with knowledge of
    data architectures and data delivery. The ideal candidate is passionate about
    developing software, working with data, and understanding the needs of end users.</p>
    <p><strong>Here’s what you’ll do day-to-day:</strong></p> <ul> <li>Architect,
    build, and refine our infrastructure and tools that enable other teams to work
    with data.</li> <li>Efficiently handle vast amounts of clickstream, database,
    and third party application data, processing in batch and real-time</li> <li>Take
    full ownership of the solutions you build, working with stakeholders to develop
    requirements, implement solutions, monitor production, and troubleshoot problems
    that arise.</li> <li>Work as part of a team. We value team players who share their
    knowledge and like collaborating with others.</li> </ul> <p><strong>Here’s what
    we''re looking for:</strong></p> <ul> <li>At least 7 years of software engineering
    experience.</li> <li>Experience building solutions in the cloud, AWS preferred
    (Redshift, MSK, EMR).</li> <li>Experience with OLAP databases (Clickhouse)</li>
    <li>Experience building data pipelines at scale, Airflow and Python preferred.</li>
    <li>Experience with streaming systems desired (Kafka, Kinesis, or similar).</li>
    <li>Ability to turn vague requirements into clear deliverables with minimal guidance.</li>
    <li>Experience building and maintaining a&nbsp;<a href="https://snowplow.io/blog/modern-data-stack/">modern
    data stack</a> in production.</li> </ul> <p>Our cash compensation amount for this
    role is targeted at $163,000-$204,000/year in Denver, $178,000-$223,000/year in
    Los Angeles, and $197,000-$247,000/year for San Francisco, New York, and Seattle.
    Final offer amounts are determined by multiple factors including candidate experience
    and expertise and may vary from the amounts listed above.</p><div class="content-conclusion"><hr>
    <p><span style="font-weight: 400;">Gusto has physical office spaces in Denver,
