, and connect open source community discussions with GitLab product needs.</p> <p>Reporting to the Git team lead, you''ll work across Git and Gitaly to deliver changes that improve repository access, performance, and long-term maintainability. This is a unique opportunity to influence both an essential open source project and the systems GitLab uses to serve repositories at scale, while helping guide larger efforts that affect the future direction of Git.</p> <ul> <li>Some examples of our projects: contributing new features and fixes to upstream Git, and adapting Gitaly to make effective use of new and existing Git capabilities</li> </ul> <h2>What you’ll do</h2> <ul> <li>Participate in architectural discussions and technical decisions related to Git and Gitaly, helping drive implementation choices that improve correctness, performance, and maintainability.</li> <li>Contribute features, bug fixes, and performance improvements to upstream Git in line with team and community goals, delivering changes that improve repository access and reliability for users.</li> <li>Adapt Gitaly to make effective use of Git capabilities, including integrating newly available features to improve scalability, efficiency, and long-term maintainability.</li> <li>Connect discussions in the open source Git project with GitLab''s product direction and engineering work, helping align upstream contributions with product and platform needs.</li> <li>Scope tasks, estimate effort, and describe implementation plans that support the team''s priorities and enable predictable delivery of technical work.</li> <li>Test and validate the features you build and integrate, with a focus on correctness and reliability to reduce regressions and support stable production use.</li> <li>Collaborate with team members, contributors and the Git ecosystem</li> <li>Represent GitLab as a constructive participant in the open source ecosystem, building productive relationships that support ongoing collaboration with the Git community.</li> </ul> <h2>What you’ll bring</h2> <ul> <li>Experience building instrumented, observable
    software systems.</li> <li>Knowledge of Git internals, including its code and data structures, or practical experience operating Git servers.</li> <li>Experience writing and testing production-quality code in C.</li> <li>Experience contributing to open source projects, including Git or similar systems, and working effectively in public collaboration spaces.</li> <li>Familiarity with Go for backend development and understanding of Linux internals such as processes, memory management, input/output, and filesystems.</li> <li>Interest or experience in large-scale or distributed systems, storage formats, graph theory, or highly available production environments, including transferable backend or infrastructure experience.</li> </ul> <h2>About the team</h2> <p>The Tenant Scale: Git team works on the Git capabilities that underpin repository access in GitLab, with a strong connection to Gitaly and the upstre'
