    and customer needs into robust, maintainable software solutions.</li> <li>Develop
    and integrate AI-driven capabilities for support workflows, leveraging and managing
    third-party platforms and external partner APIs</li> <li>Participate in technical
    design and architecture discussions, helping shape team-level technical direction
    and tradeoffs.</li> <li>Mentor and support other engineers through code reviews,
    pairing, and technical guidance, contributing to a culture of quality and continuous
    improvement.</li> </ul> <p><strong>What you'll need to thrive (Requirements)</strong></p>
