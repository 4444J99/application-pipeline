    features or projects end-to-end, from design through production and iteration.</li>
    <li>Experience shipping and operating business-critical systems with a focus on
    reliability, performance, and operational excellence.</li> <li>Ability to collaborate
    effectively across teams and communicate technical concepts clearly to both technical
