  description: <p>Toast creates technology to help restaurants and local businesses
    succeed in a digital world, helping business owners operate, increase sales, engage
    customers, and keep employees happy.</p> <p>The Care Experience team is transforming
    how Toast supports its customers across chat, voice, and agent-assisted channels.
    We build the intelligent platforms and tools that power every support interaction—helping
    agents resolve issues faster, improving AI-driven self-service, and ensuring customers
    get accurate, timely help when it matters most.</p> <p>This is a high-impact domain.
    Support systems must operate reliably under urgent, business-critical conditions,
    integrate deeply with customer, device, and account data, and scale across millions
    of interactions while maintaining trust, accuracy, and speed. The platforms built
    by this team directly shape how effectively Toast can reduce friction, resolve
    issues end-to-end, and deliver a differentiated support experience as we grow—modernizing
    our core support infrastructure through a unified contact center platform foundation
    and AI-driven capabilities that improve routing, resolution, and outcomes.</p>
