    and voice/chat AI systems at the heart of Toast’s support ecosystem. You’ll build
    and evolve platforms used daily by thousands of support agents and across millions
    of customer interactions, working at the intersection of distributed systems,
    AI-enabled experiences, and operational reliability to ensure support is fast,
    resilient, and deeply connected to Toast’s products and data.</p> <p>If you’re
    motivated by large-scale platform work, excited to operate at the intersection
    of customer experience, agent experience, and intelligent systems, and eager to
    build software that meaningfully shapes how Toast supports restaurants at scale,
    this role offers a rare opportunity to do so.</p> <p><strong>A day in the life
    (Responsibilities)&nbsp;</strong></p> <ul> <li>Design, build, and operate core
