    to help architect solutions at scale and become the goto whiteboard partner for
    the team.</li> <li>Mentor: Multiply your effectiveness through influence by growing
    our experienced team of Software Engineers of several levels.</li> <li>Plan: Tie
    technical investments to business priorities, lead architecture discussions and
