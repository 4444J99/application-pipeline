    Engineer at Calendly</strong></h3> <p>The Calendly platform is a monolith that
    is being decomposed into various services so we can scale our platform and our
    team. We need ambitious experienced engineers who can help us drive this stage
    of growth. As an engineer at Calendly, you will both build new features and work
    to scale our platform and architecture. You will build tooling and automation
    to improve our delivery process as you grow into a service oriented specialist.
    You will also learn to work with multiple technologies such as Google Cloud Platform,
    Kubernetes, Argo Workflows, TypeScript, Rails, Node.js, React, PostgreSQL, Redis,
    and GraphQL.</p> <p>When you join Calendly, you get the opportunity to deliver
    on a product used by millions and known for its best‑in‑class quality. Help us
    continue to deliver critical commerce features to our users with excellence.</p>
    <h3><strong>On a typical day, you will be working on:</strong></h3> <ul> <li>Collaborating
    within your squad to build and iterate on commerce features that drive measurable
    business impact across self‑serve and enterprise customers.</li> <li>Contributing
    to platform scaling initiatives while improving reliability and performance in
    user critical flows.</li> <li>Meeting regularly with Product and Design to fine
    tune requirements, define MVPs, and instrument experiments that validate value
    quickly.</li> <li>Attending agile ceremonies to help your team plan out their
    work and get it done with predictable delivery.</li> <li>Working across squads
    to improve engineering practices and evolve shared monorepo tooling and service
    boundaries.</li> <li>Reviewing implementation plans and pull requests from your
    peers with a focus on simplicity, maintainability, and incremental delivery.</li>
    <li>Contributing to a high trust, professional casual culture grounded in respect
    and ownership.</li> <li>Using AI assistants thoughtfully to scaffold code, generate
    tests, draft documentation, analyze logs, and accelerate experiments. Choosing
    when not to use AI based on risk, privacy, and correctness considerations.</li>
    </ul> <h3><strong>What do we need from you?</strong></h3> <ul> <li>3+ years of
    professional software development experience in a SaaS or technology driven environment.</li>
    <li>Strong proficiency in React and TypeScript for modern front end web development,
    supporting end to end feature delivery.</li> <li>Professional experience in backend
    engineering with Node.js, including building and maintaining scalable services
    and APIs that are observable, reliable, and secure.</li> <li>Experience with PostgreSQL,
    including schema design, query optimization, and data modeling for transactional
    systems.</li> <li>Experience designing and consuming GraphQL APIs in production
    environments.</li> <li>Background in mixed stack environments, such as Node.js
