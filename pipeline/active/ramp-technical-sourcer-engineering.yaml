  description: 'About Ramp Ramp is building the smart infrastructure for finance teams,
    embedded in the transaction flow of every dollar a business spends. We automate
    how over $100B in annualized spend flows in and out of 50,000+ companies: authorizing
    payments, flagging risk, categorizing spend, and closing books. The problems are
    high-stakes, data-dense, and unforgiving. We hire people with high agency and
    high urgency. We look for slope over intercept. We care less about where you trained
    and more about what you’ve built. At Ramp, everyone is a builder who owns problems
    end to end and makes consequential decisions that shape the outcome. The median
    Ramp customer saves 5% and grows revenue 16% in their first year – far in excess
    of businesses operating without Ramp. We believe every ambitious company deserves
    the same. If you want to build systems that directly shape how companies move
    and manage billions, Ramp is the place to do it. About the Role As a critical
    member of our growing talent team, you will own building our sourcing engine to
    engage and hire world-class talent. This is an opportunity to partner directly
    with our Engineering and Product teams. You will be the first point of contact
    for countless industry professionals, fully responsible for delivering an excellent
    candidate experience right from the start. What You’ll Do Innovate and operationalize
    creative sourcing strategies to deliver top technical talent to Ramp Own talent
    mapping research, referral generation, and sourcing campaigns Effectively align
    candidates’ motivations with Ramp''s value proposition, roles, and expectations
    Lead intake meetings with stakeholders to qualify and deeply understand requirements/qualifications
    for tech job profiles Manage pipeline activity reports and analyze historical
    data to optimize hiring impact Drive Ramp’s engagement across external conferences,
    networking events, and professional association partnerships Partner closely with
    recruiting leadership to anticipate upcoming headcount and proactively understand
    how new hires will fit into the organization What You’ll Need A minimum of 4 years
    of technical sourcing experience in a similar role at a high-growth technology
    company or startup preferred Familiarity with Boolean search operators and x-ray
    searches Excellent written and verbal storytelling communication skills Ability
    to influence at various levels in an organization, anchoring on data-driven decision-making
    Nice to Haves Demonstrated knowledge of technical job profiles, e.g. Software
    Engineering and Product Management Experience with our suite of recruiting tools
    (Ashby) Bachelor''s degree from an accredited university For candidates located
    in NYC or SF, the pay range for this role is $90,100 - $ 181,500 . For candidates
    located in all other locations, the pay range for this role is $90,100 - $153,800.
    Benefits (for U.S.-based full-time employees) 100% medical, dental & vision insurance
    coverage for you Partially covered for your dependents One Medical annual membership
    401k (including employer match on contributions made while employed by Ramp) Flexible
    PTO Fertility HRA (up to $10,000 per year) Parental Leave Unlimited AI token usage
    Pet insurance Centralized home-office equipment ordering for all employees Health
    and Wellness stipend In-office perks: lunch, snacks, drinks, and more Budget for
    intra-office travel Relocation support to NYC or SF (as needed) Referral Instructions
    If you are being referred for the role, please contact that person to apply on
    your behalf. Other notices Pursuant to the San Francisco Fair Chance Ordinance,
    we will consider for employment qualified applicants with arrest and conviction
    records. Beware of recruiting scams: Ramp will only contact you through official
    @ Ramp.com email addresses and will never ask for payment or sensitive personal
    information during the hiring process. Ramp Applicant Privacy Notice'
