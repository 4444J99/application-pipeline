  description: <div class="content-intro"><p>Ready to be pushed beyond what you think
    you’re capable of?</p> <p>At Coinbase, our mission is to increase economic freedom
    in the world. It’s a massive, ambitious opportunity that demands the best of us,
    every day, as we build the emerging onchain platform — and with it, the future
    global financial system.</p> <p>To achieve our mission, we’re seeking a very specific
    candidate. We want someone who is passionate about our mission and who believes
    in the power of crypto and blockchain technology to update the financial system.
    We want someone who is eager to leave their mark on the world, who relishes the
    pressure and privilege of working with high caliber colleagues, and who actively
    seeks feedback to keep leveling up. We want someone who will run towards, not
    away from, solving the company’s hardest problems.</p> <p>Our <a href="https://www.coinbase.com/mission">work
    culture</a> is intense and isn’t for everyone. But if you want to build the future
    alongside others who excel in their disciplines and expect the same from you,
    there’s no better place to be.</p> <p>While many roles at Coinbase are remote-first,
    we are not remote-only. In-person participation is required throughout the year.
    Team and company-wide offsites are held multiple times annually to foster collaboration,
    connection, and alignment. Attendance is expected and fully supported.</p></div><div
    class="p-rich_text_section">CB Node is Coinbase's connection to the blockchain!&nbsp;
    In this role, you will be crypto-facing, while also maintaining a foot in traditional
    web2 systems. We manage the blockchain nodes that connect our company to the 55
    different blockchains that we support, across CB Wallet, Retail, Insto and Prime.&nbsp;
    We are also responsible for building new nodes as part of new asset launches for
    Day1 assets. In the team, you will be part of the following initiatives:</div>
    <ul class="p-rich_text_list p-rich_text_list__bullet p-rich_text_list--nested"
    data-stringify-type="unordered-list" data-list-tree="true" data-indent="0" data-border="0">
    <li data-stringify-indent="0" data-stringify-border="0">Blockchain Traffic Management,
    including stateful failover between multiple external providers</li> <li data-stringify-indent="0"
    data-stringify-border="0">Managing data consistency and block freshness to power
    critical internal services, such as our wallets and indexers</li> <li data-stringify-indent="0"
    data-stringify-border="0">Ensuring reliability and scalability across the blockchain
    platform stack</li> <li data-stringify-indent="0" data-stringify-border="0">Pioneering
    new technologies such as decoupling blockchain node storage and compute</li> <li
    data-stringify-indent="0" data-stringify-border="0">Building a platform on top
    of our existing nodes to reduce engineering effort and ops TOIL</li> </ul> <div
    class="p-rich_text_section">You will be joining a team of some of the most driven
    and talented engineers at the company.&nbsp; We are looking for similar - talented
    engineers who arent afraid of trying new things, failing and iterating quickly.&nbsp;
    We are looking for engineers who are excited about crypto, and treat every problem
    as a chance to make impact.&nbsp; And lastly, we are looking for engineers who
    love to identify inefficiencies in how we do businesses&nbsp;and enjoy being empowered
    to aggressively streamline these problem areas.</div> <div class="p-rich_text_section">&nbsp;</div>
    <div class="p-rich_text_section"> <div class="p-rich_text_section"><strong data-stringify-type="bold">What
    you’ll be doing (ie. job duties):</strong></div> <ul class="p-rich_text_list p-rich_text_list__bullet
    p-rich_text_list--nested" data-stringify-type="unordered-list" data-list-tree="true"
    data-indent="0" data-border="0"> <li data-stringify-indent="0" data-stringify-border="0">This
    person would be responsible for upgrading blockchain nodes, implementing automation
    to reduce TOIL and increase service effectiveness, and identifying new areas of
    investment (automation) to further streamline our service and reduce manual effort</li>
    </ul> <div class="p-rich_text_section"><strong data-stringify-type="bold">What
    we look for in you:</strong></div> <ul class="p-rich_text_list p-rich_text_list__bullet
    p-rich_text_list--nested" data-stringify-type="unordered-list" data-list-tree="true"
    data-indent="0" data-border="0"> <li data-stringify-indent="0" data-stringify-border="0">You
    have at least 5+ years of experience in software engineering.</li> <li data-stringify-indent="0"
    data-stringify-border="0">You’ve designed, built, scaled and maintained production
    services, and know how to compose a service oriented architecture.</li> <li data-stringify-indent="0"
    data-stringify-border="0">You write high quality, well tested code to meet the
    needs of your customers.</li> <li data-stringify-indent="0" data-stringify-border="0">You’re
    passionate about building an open financial system that brings the world together.</li>
    </ul> <div class
