  description: '<p data-pm-slice="1 1 []">FEQ427R31</p> <h3><strong>Mission&nbsp;</strong></h3> <p>As a Specialist Solutions Architect (SSA) - ML &amp; AI Engineer, you will be the trusted technical ML &amp; AI expert to both Databricks customers and the Field Engineering organization. You will work with Solution Architects to guide customers in architecting production-grade ML &amp; AI applications on Databricks, while aligning their technical roadmap with the continually evolving Databricks Data Intelligence Platform. You will continue to strengthen your technical skills through applying cutting edge technologies in GenAI, MLOps, and ML more broadly, expanding your impact through mentorship, and establishing yourself as an AI thought leader.</p> <h3><strong>The impact you will have:</strong></h3> <ul> <li>Architect production level ML &amp; AI workloads for customers using our unified platform, including agents, end-to-end ML pipelines, training/inference optimization, integration with cloud-native services, MLOps, etc.&nbsp;&nbsp;</li> <li>Serve as trusted practitioner for enterprise GenAI solutions, including RAG architectures, agentic systems (tool-calling agents, multi-agent orchestration, guardrails), natural language querying of structured data, AI evaluation and observability, and monitoring systems</li> <li>Build, scale, and optimize customer AI workloads and apply best in class MLOps to productionize these workloads across a variety of domains</li> <li>Provide advanced technical support to Solution Architects during the technical sale ranging from feature engineering, training, tracking, serving to model monitoring all within a single platform, as well as participating in the larger ML SME community in Databricks</li> <li>Collaborate cross-functionally with the product and engineering teams to represent the voice of the customer, define priorities and influence the product roadmap, helping with the adoption of Databricks’ AI offerings</li> </ul> <h3><strong>What we look for:</strong></h3> <ul> <li>5+ years of hands-on industry ML experience in at least one of the following:</li> <ul> <li>ML Engineer: Build and maintain production-grade cloud (AWS/Azure/GCP) infrastructure that supports the deployment of ML applications, including drift monitoring.</li> <li>AI Engineer: Experience with the latest techniques in LLMs &amp; agentic systems including vector databases, fine-tuning LLMs, AI guardrail systems, and deploying LLMs with tools such as HuggingFace, Langchain, and OpenAI</li> </ul> <li>Graduate degree in a quantitative discipline (Computer Science, Engineering, Statistics, Operations Research, etc.) or equivalent practical experience</li> <li>Experience communicating and/or teaching technical concepts to non-technical and technical audiences alike</li> <li>Passion for collaboration, life-long learning, and driving business value through ML &amp; AI</li> <li>[Preferred] 2+ years customer-facing experience in a pre-sales or post-sales role</li> <li>Can meet expectations for technical training and role-specific outcomes within 3 months of hire</li> <li>This role can be remote, but we prefer that you be located in the job listing area and can travel up to 30% when needed</li> </ul><div class="content-pay-transparency"><div class="pay-input"><div class="description"><p>&nbsp;</p> <p><strong>Pay Range Transparency</strong></p> <p><span style="font-weight: 400; font-size: 14px;">Databricks is committed to fair and equitable compensation practices. The pay range(s) for this role is listed below and represents the expected salary range for non-commissionable roles or on-target earnings for commissionable roles.&nbsp; Actual compensation packages are based on several factors that are unique to each candidate, including but not limited to job-related skills, depth of experience, relevant certifications and training, and specific work location. Based on the factors above, Databricks anticipates utilizing the full width of the range. The total compensation package for this position may also include eligibility for annual performance bonus, equity, and the benefits listed above. For more information regarding which range your location is in visit our page <a href="https://www.databricks.com/sites/default/files/2024-08/us-pay-zone-mapping.pdf">here</a>.<br></span></p> <p>&nbsp;</p></div><div class="title">Local Pay Range</div><div class="pay-range"><span>$180,000</span><span class="divider">&mdash;</span><span>$247,500 USD</span></div></div></div><div class="content-conclusion"><p><strong>About Databricks</strong></p> <p><span style="font-family: arial, sans-serif;">Databricks is the data and AI company. More than 10,000 organizations worldwide — including Comcast, Condé Nast, Grammarly, and over 50% of the Fortune 500 — rely on the Databricks Data Intelligence Platform to unify and democratize data, analytics and AI. Databricks is headquartered in San Francisco, with offices around the globe and was founded by the original'
