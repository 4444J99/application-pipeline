  description: 'LiveKit is seeking a Staff Developer Advocate to help grow our presence
    and deepen engagement with developers, with a strong focus on events and community
    building . You’ll be the face of LiveKit in the Bay Area and beyond, driving awareness
    with developers who may not yet know us, and creating experiences that inspire
    them to build with real-time audio and video. This role is a hybrid of content
    creation and event execution : you’ll organize and host events, speak at meetups
    and conferences, and also create supporting content that extends the reach of
    those activities. You’ll bring back insights from the community—trends, patterns,
    and narratives that are top of mind for developers—and use them to inform our
    product, messaging, and broader DevRel strategy. What You’ll Do Drive awareness
    of LiveKit with new developer audiences, especially in the Bay Area where there
    is a significant opportunity to grow our presence. Plan, host, and participate
    in events including meetups, hackathons, developer workshops, and conferences.
    Partner with Marketing to amplify events through digital channels , ensuring broader
    reach and sustained impact. Create content from events (recaps, demos, tutorials,
    blogs, social posts) to expand engagement beyond the room. Serve as a feedback
    loop for the company , bringing back developer perspectives, industry trends,
    and emerging patterns to inform our product and community strategy. Represent
    LiveKit on stage and in community forums , speaking authentically to developer
    audiences about our technology. Help experiment with new event formats and engagement
    tactics , testing what resonates most with our audience. Collaborate cross-functionally
    with DevRel, PMM, and Product to ensure developer narratives are consistent, compelling,
    and authentic . Who You Are 2+ years of experience in Developer Advocacy, Developer
    Relations, or Technical Evangelism , with a strong emphasis on events and community
    engagement. Comfortable being outward-facing —you enjoy speaking to groups, hosting
    sessions, and building relationships in developer communities. Strong technical
    communication skills ; you can explain complex concepts in clear, engaging ways
    across presentations and written content. Hands-on technical background (comfortable
    writing code samples, running demos, or building prototypes). Experience planning
    and executing developer events (e.g., meetups, hackathons, workshops, or conference
    tracks). Based in the San Francisco Bay Area , with willingness to travel for
    conferences and events. Strong collaborator who can work cross-functionally with
    Marketing, Product, and Engineering. Curious and empathetic—you love learning
    what matters most to developers and bringing those insights back to the team.
    Our Commitments to You We offer An opportunity to build something truly impactful
    to the world Competitive salary and equity package Work anywhere in the world
    Health, dental, and vision benefits Flexible vacation policy Ready to Apply? If
    you''re passionate about championing developers in the realm of real-time communications
    and want to make a significant impact at a high-growth company, we''d love to
    hear from you. At LiveKit, your work as a Developer Advocate will be instrumental
    in our growth and success, bridging the gap between our technology and the developers
    who use it.'
