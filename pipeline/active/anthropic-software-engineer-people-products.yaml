  description: '<div class="content-intro"><h2><strong>About Anthropic</strong></h2>
    <p>Anthropic’s mission is to create reliable, interpretable, and steerable AI
    systems. We want AI to be safe and beneficial for our users and for society as
    a whole. Our team is a quickly growing group of committed researchers, engineers,
    policy experts, and business leaders working together to build beneficial AI systems.</p></div><h2
    class="heading"><strong>About the Role</strong></h2> <p>In case you hadn’t noticed,
    Anthropic is growing fast. Really, really fast. The People Products team exists
    to support Anthropic’s mission by defining the blueprint for AI at work. We help
    hire the best person in the world for every job, ensure manager effectiveness,
    ramp new hires successfully, and ensure that we apply first principles thinking
    in how we shape Anthropic’s culture through the tools we build. We cover the entire
    employee lifecycle from hiring to onboarding, teamwork, and promotions.&nbsp;</p>
    <p>&nbsp;</p> <p>You’ll work directly with Claude, with access to capabilities
    no external team has, on problems that are genuinely unsolved. You’ll move fast
    — prototype to production in days or weeks. We believe in cross-functional thinkers
    who can reason across product, design, and engineering. You’ll be given high autonomy,
    own your decisions, and ship constantly. If you’ve experienced the pain of bad
    people practices and want to be the person who fixes them at the most consequential
    AI company in the world, this is that job.</p> <p>&nbsp;</p> <h2 class="heading"><strong>Responsibilities</strong></h2>
    <ul> <li> <p>Build full-stack end-to-end across the People Products portfolio.</p>
    </li> <li> <p>Design and implement AI-native workflows: build tools, evals, prompts,
    and products. You’ll help define what is possible in applied AI for people processes.</p>
    </li> <li> <p>Work directly with internal stakeholders — HR teams, recruiters,
    managers — to understand problems, gather feedback, and iterate quickly without
    waiting for requirements to be handed down. No gatekeeping, you are expected to
    talk to your customers.</p> </li> <li> <p>Make product and architecture decisions
    independently in a low-structure environment: knowing when to cut scope, when
    to ship, and when to ask for input.</p> </li> <li> <p>Contribute ideas for how
    the team works, what it builds, and where applied AI can have the most leverage
    in people workflows.</p> </li> </ul> <p>&nbsp;</p> <h2 class="heading"><strong>You
    Might Be a Good Fit If You:</strong></h2> <ul> <li> <p>Derive joy from hard work
    and the act of creation.</p> </li> <li> <p>Have shipped LLM-native features or
    applications.</p> </li> <li> <p>Are experienced enough to build big features independently,
    and make great architectural decisions along the way.</p> </li> <li> <p>Are self-sufficient
    end-to-end: you can go from idea to production without needing a designer, PM,
    or architect to unblock you.</p> </li> <li> <p>Move fast without cutting corners:
    you hold a high quality bar and know how to make smart tradeoffs under time pressure.</p>
    </li> <li> <p>Engage directly with users and criticism: you’re comfortable talking
    to internal customers, hearing hard feedback, and incorporating it quickly.</p>
    </li> <li> <p>Are genuinely mission-driven: you care about the intersection of
    AI and people practices, not just the technical puzzle.</p> </li> <li> <p>Are
    a collaborative, supportive teammate: you bring people along, communicate clearly
    about tradeoffs, and make the people around you better.</p> </li> </ul> <p>&nbsp;</p>
    <h2 class="heading"><strong>Strong Candidates May Also Have:</strong></h2> <ul>
    <li> <p>Familiarity with MCP (Model Context Protocol) or prior experience building
    Claude or LLM integrations in production.</p> </li> <li> <p>Background at an AI-native
    company or in a product-focused 0-&gt;1 engineering environment.</p> </li> <li>
    <p>Experience with HR tech platforms such as Greenhouse, Workday, or Rippling.</p>
    </li> </ul><div class="content-pay-transparency"><div class="pay-input"><div class="description"><p>The
    annual compensation range for this role is listed below.&nbsp;</p> <p>For sales
    roles, the range provided is the role’s On Target Earnings ("OTE") range, meaning
    that the range includes both the sales commissions/sales bonuses target and annual
    base salary for the role.</p></div><div class="title">Annual Salary:</div><div
    class="pay-range"><span>$300,000</span><span class="divider">&mdash;</span><span>$405,000
    USD</span></div></div></div><div class="content-conclusion"><h2><strong>Logistics</strong></h2>
    <p><strong>Education requirements: </strong>We require at least a Bachelor''s
    degree in a related field or equivalent experience.<strong><br><br>Location-based
    hybrid policy:</strong> Currently, we expect all staff to be in one of our offices
    at least 25% of the time. However, some roles may require more time in our offices.</p>
    <p><strong data-stringify-type="bold">Visa sponsorship:</strong>&nbsp;W'
