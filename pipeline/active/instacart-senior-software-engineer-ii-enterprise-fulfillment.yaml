    safe and flexible earnings opportunities to Instacart Personal Shoppers.</span></p>
    <p>Instacart has become a lifeline for millions of people, and we’re building
    the team to help push our shopping cart forward. If you’re ready to do the best
    work of your life, come join our table.</p> <p><strong>Instacart is a Flex First
    team </strong></p> <p>There’s no one-size fits all approach to how we do our best
    work. Our employees have the flexibility to choose where they do their best work—whether
