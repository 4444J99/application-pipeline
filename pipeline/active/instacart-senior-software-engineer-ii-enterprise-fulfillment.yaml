    more about our flexible approach to where we work.</a></p></div><p><strong>About
    the Role</strong></p> <p>As a Senior Software Engineer, you will focus on executing
    and delivering high‑impact platform capabilities across Instacart’s Enterprise
    Fulfillment Platform APIs and services. You will work on complex areas such as
    API design, fulfillment orchestration, retailer and partner integrations, and
    high‑throughput distributed systems. You will contribute to building the next
    generation of Instacart’s fulfillment technology, ensuring reliability, scalability,
    and partner success.</p> <p>In this role, you will also provide technical leadership,
    mentoring teammates and raising engineering quality without formal management
    responsibilities.</p> <p><strong>About the Team</strong></p> <p>This role sits
    within the Enterprise Platform team, part of the broader Fulfillment organization.
    The team builds and operates the foundational systems that power Connect API Fulfillment
    and Instacart’s 3rd‑Party Fulfillment Platform. These systems enable retailers,
    partners, and external providers to integrate fulfillment experiences directly
    into their own environments.</p> <p>The team’s mission includes ensuring platform
    reliability, expanding partner capabilities, driving adoption of our fulfillment
    services, and contributing to the company’s Gross Transaction Value (GTV) growth
    by powering next‑generation fulfillment orchestration.</p> <p><strong>About the
    Job</strong></p> <ul> <li>Build core platform components that power Connect API
    Fulfillment and the 3rd‑Party Fulfillment Platform.</li> <li>Deliver reliable,
    scalable APIs and orchestration systems that support complex, high‑volume fulfillment
    workflows.</li> <li>Drive execution of major platform initiatives, from architecture
    to implementation to launch.</li> <li>Collaborate with product and cross‑functional
    partners when needed to align on requirements and integration needs.</li> <li>Improve
    platform reliability, throughput, and developer experience.</li> <li>Contribute
    to the design of next‑generation fulfillment orchestration and partner‑facing
    APIs and tooling.</li> <li>Mentor engineers through technical guidance, code reviews,
    and thought leadership.</li> </ul> <p><strong>About You</strong></p> <p><em>Minimum
    Qualifications</em></p> <ul> <li>Bachelor’s or Master’s degree in Computer Science
    (or related field), or equivalent experience.</li> <li>5+ years of backend development
    experience, with a strong record of project delivery.</li> <li>Experience drafting
    clear technical vision and design documents.</li> <li>Strong proficiency in owning
    and maintaining production services at high quality.</li> <li>Ability to rapidly
    deliver high‑quality code supporting high‑traffic systems.</li> <li>Experience
    working with product teams or customers in a collaborative environment.</li> <li>Proven
    ability to influence and mentor a team as a senior IC.</li> </ul> <p><em>Preferred
    Qualifications</em></p> <ul> <li>Experience designing or scaling external APIs.</li>
    <li>Experience with distributed systems or orchestration‑style architectures.</li>
    <li>Experience integrating with external partners or 3rd‑party systems.</li> <li>Experience
    working across teams to develop platform‑level solutions.</li> <li>Track record
    of generating innovative, forward‑looking technical ideas.</li> </ul> <p>#LI-Remote</p><div
