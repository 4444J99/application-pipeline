    rgb(255, 255, 255);">.</span></p></div><p><strong>See yourself at Twilio</strong></p>
    <p>Join the team as Twilio’s next Senior Infrastructure Engineer.</p> <p><strong>About
    the job</strong></p> <p>This position is needed to build and scale Stytch’s core
    product as we bring Stytch capabilities to Twilio’s full customer base, delivering
    secure, developer-first identity experiences.</p> <p>Join the Stytch team at Twilio
    to shape the next generation of identity products. You’ll design and build infrastructure
    that power authentication, authorization, and emerging agentic and non-human identity
    use cases. You’ll partner closely with product and engineering leadership to set
    direction, deliver high-impact features, and evolve our platform for Twilio scale.
    This is a rare chance to operate like a startup within Twilio: you’ll work in
    a high-ownership environment with startup speed, backed by Twilio’s reach and
    scale.</p> <p><strong>Responsibilities</strong></p> <ul> <li>Build and own the
    infrastructure and platform capabilities that power Stytch’s identity platform
    as it scales across Twilio—ensuring security, reliability, and performance for
    every customer.</li> <li>Design, implement, and operate scalable cloud infrastructure
    (AWS/EKS, ECS, networking, data stores), balancing uptime, cost, and developer
    velocity.</li> <li>Partner closely with Product and Engineering leadership to
    set infrastructure direction, translate platform needs into technical plans, and
    deliver high-impact roadmap work.</li> <li>Collaborate across Twilio and Stytch
    teams to align on architecture, integrate platform capabilities, and unblock cross-team
    initiatives.</li> <li>Operate with deep technical ownership: author design docs,
    drive key technical decisions, review code, and stay close to the systems you
    ship.</li> <li>Build in ambiguity—break down complex problems, make pragmatic
    tradeoffs, and adopt new technologies or strategies when they improve outcomes.</li>
    <li>Improve production quality and resilience through strong observability, incident
    response, automated remediation, and continuous reliability engineering.</li>
    <li>Make developers’ lives easier by building self-service tooling, safer deployment
    patterns, and reliable platform primitives that accelerate product teams.</li>
    <li>Mentor and support other engineers through pairing, feedback, and knowledge-sharing,
    helping raise the team’s technical bar and culture.</li> </ul> <p><strong>Qualifications&nbsp;</strong></p>
    <p>Twilio values diverse experiences from all kinds of industries, and we encourage
    everyone who meets the required qualifications to apply. If your career is just
    starting or hasn''t followed a traditional path, don''t let that stop you from
    considering Twilio. We are always looking for people who will bring something
    new to the table!</p> <p><strong>*Required:</strong></p> <ul> <li>6+ years of
    experience as an Infrastructure or Platform Engineer building and operating high-scale,
    mission-critical cloud production systems.</li> <li>Strong experience with containerization
    and orchestration (Kubernetes/EKS, Docker), Infrastructure as Code (Terraform,
    GitOps, or similar) and AWS.</li> <li>Hands-on proficiency in at least one modern
    programming language used in production.</li> <li>Experience designing and running
    observability and on-call systems (e.g., Datadog, ELK, Prometheus/Grafana).</li>
    <li>Experience scaling cloud infrastructure for distributed systems, including
    relational databases and high-availability service architectures.</li> <li>Excellent
    written and verbal communication skills; comfortable writing design docs and leading
    technical discussions.</li> <li>Bachelor’s degree in Computer Science or equivalent
    practical experience.</li> <li>Schedule'
