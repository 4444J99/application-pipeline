  description: "<p>IDM is the team that works on Datadog APM integrations: the parts\
    \ that connect Datadog to the tools and services customers use. The team\u2019\
    s job is to make it easier for engineers to build and maintain integrations over\
    \ time, and to keep quality and reliability high.&nbsp;You will build AI-assisted\
    \ tools that help with day-to-day engineering work, like drafting code changes,\
    \ suggesting fixes, and checking results with tests and other automated checks.\
    \ The goal is building tools that engineers can trust in real production work.\
    \ You\u2019ll also work closely with other teams, understand how they work, and\
    \ build solutions that fit their process.&nbsp;You will define what \u201Cgood\u201D\
    \ means for these tools, measure results, and improve them over time. You\u2019\
    ll set up evaluation and testing so the AI output stays correct and doesn\u2019\
    t silently get worse. This is a senior role with high ownership, from early prototypes\
    \ to production and ongoing support.</p> <p><em>At Datadog, we place value in\
    \ our office culture - the relationships and collaboration it builds and the creativity\
    \ it brings to the table. We operate as a hybrid workplace to ensure our Datadogs\
    \ can create a work-life harmony that best fits them.</em></p> <p>&nbsp;</p> <p><strong>What\
    \ You\u2019ll Do:</strong></p> <ul> <li>Build agent workflows that take an integration\
    \ need from plan to implementation and validation with humans approving at the\
    \ right checkpoints</li> <li>Create systems that synthesize context from codebases,\
    \ docs, specs, telemetry, and historical incidents to make changes that match\
    \ Datadog conventions and customer expectations</li> <li>Generate and evolve integration\
    \ code and tests, including end-to-end scenarios that reflect real customer workloads\
    \ and product features</li> <li>Design evaluation harnesses that prevent silent\
    \ regressions: golden sets, scenario baselines, semantic checks, performance thresholds,\
    \ and release gating</li> <li>Build portfolio-level automation: proactive updates\
    \ for upstream breaking changes, tracer feature rollouts across the catalog, migrations\
    \ to new schemas/semantics, and targeted coverage expansion</li> <li>Partner tightly\
    \ with PM, support engineers, and integration-owning teams to make the system\
    \ adoptable, trustworthy, and embedded in daily engineering workflows</li> </ul>\
    \ <p>&nbsp;</p> <p><strong>Who You Are:</strong></p> <p><strong>Product-minded\
    \ engineer who ships AI to production</strong></p> <ul> <li>6+ years building\
    \ backend systems (Go, Java, or .NET) with strong focus on simplicity, correctness,\
    \ and performance</li> <li>Proven experience delivering LLM/agent features to\
    \ production (prompting, tooling, evals, safety/guardrails)</li> <li>Comfortable\
    \ navigating ambiguity, iterating from prototype to production, and measuring\
    \ impact with clear metrics</li> <li>You have demonstrated ability to use AI coding\
    \ tools in day-to-day workflows and validate, critique, and refine AI-generated\
    \ output</li> </ul> <p><strong>Strong ML fundamentals</strong></p> <ul> <li>Solid\
    \ grasp of the ML lifecycle (task definition, dataset construction, modeling,\
    \ evaluation, deployment, iteration) and statistics for experiments</li> <li>Fluency\
    \ with offline/online evals: golden sets, automated regressions, and evaluation\
    \ harnesses that prevent silent quality drift</li> </ul> <p><strong>Distributed\
    \ systems &amp; observability savvy</strong></p> <ul> <li>Experience with microservices\
    \ performance: tracing, latency breakdowns, concurrency, resiliency patterns</li>\
    \ <li>Production operations mindset: monitoring, alerting, and participating in\
    \ on\u2011call rotations where applicable</li> </ul> <p>&nbsp;</p> <p><strong>Bonus\
    \ Point:</strong></p> <ul> <li>Hands\u2011on with distributed tracing stacks (OpenTelemetry/Datadog\
    \ APM), profilers, and logs/metrics pipelines</li> <li>Experience with planning/agent\
    \ frameworks, tool\u2011use orchestration, RAG, and retrieval/indexing over large\
    \ context</li> <li>Experience building developer tools (IDEs, static analysis,\
    \ compilers, code transformation pipelines) or code-generation systems</li> <li>Familiarity\
    \ with semantic conventions / schema migrations, scenario-based testing, and cross-language\
    \ porting at scale</li> <li>You\u2019re motivated to push the boundaries of how\
    \ AI can improve software engineering best practices and contribute to building\
    \ AI-enabled products</li> </ul> <p><em>Datadog values people from all walks of\
    \ life. We understand not everyone will meet all the above qualifications on day\
    \ one. That's okay. If you\u2019re passionate about technology and want to grow\
    \ your skills, we encourage you to apply.</em></p> <p>&nbsp;</p> <p><strong>Benefits\
    \ and Growth:&nbsp;</strong></p> <ul> <li>New hire stock equity (RSUs) and employee\
    \ stock purchase plan (ESPP)</li> <li>Continuous professional development, product\
    \ training, and career pathing</li> <li>Intradepartmental mentor and buddy program\
    \ for in-house networking</li> <li>An inclusive company culture, ability to join\
    \ our Community Guilds (Datadog employee resource groups)</li> "
