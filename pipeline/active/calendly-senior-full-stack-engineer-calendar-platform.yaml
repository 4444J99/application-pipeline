  description: <div class="content-intro"><h4><strong>What’s in it for you?&nbsp;</strong></h4>
    <p>Ready to make a serious impact? Millions of people already rely on Calendly,
    and we’re still in the midst of exciting product growth — it’s a fantastic time
    to join us. Everything you’ll work on here will accelerate your career to the
    next level. If you want to learn, grow, and do the best work of your life alongside
    the best people you’ve ever worked with, then we hope you’ll consider allowing
    Calendly to be a part of your professional journey.</p></div><h4><strong>About
    the team &amp; opportunity</strong></h4> <p><strong>Our Mission</strong></p> <p>We
    power Calendly's products with reliable, high-performance calendar data infrastructure.
    Our services provide the foundation for how users interact with their scheduling
    data, serving as the single source of truth across our platform.</p> <p><strong>How
    you will contribute</strong></p> <p>As a Senior Engineer on Calendly's Calendar
    Platform team, you will build and evolve the core infrastructure our products
    depend on. Your work will directly shape how millions of users access and interact
    with their calendar data.</p> <p>You will focus on critical platform services
    including:</p> <ul> <li>Core calendar data API development, building and scaling
    a new unified interface and underlying data infrastructure for calendar data across
    all Calendly products</li> <li>Synchronization services to maintain data integrity
    across internal systems and external providers like Google and Microsoft</li>
    <li>Search infrastructure using ElasticSearch to surface relevant calendar data
    for users</li> <li>Novel platform services as new product needs emerge</li> </ul>
    <p><strong>Why this role matters</strong></p> <p>Calendar data is central to the
    Calendly platform. As we grow, our products need fast, reliable access to this
    data through modern, resilient infrastructure. You will help us move beyond legacy
    patterns and build services designed for scale. The technical decisions you make
    will ripple across our entire product ecosystem.</p> <h4><strong>A day in the
    life of a Senior Full Stack Engineer at Calendly</strong></h4> <p><strong>Building
    Calendar Infrastructure</strong></p> <p>Design, develop, and maintain services
    our product teams depend on. You will work hands-on with Golang, Ruby/Rails, and
    PostgreSQL to build resilient systems handling high data volumes and complex synchronization
    requirements.</p> <p><strong>Technical Leadership and Collaboration</strong></p>
    <p>Contribute to architectural decisions for calendar platform services. Share
    your distributed systems expertise with engineers across the organization and
    help establish patterns for engineering excellence.</p> <p><strong>Contribute
    To Critical Initiatives</strong></p> <p>Own and contribute to significant projects
    from concept to production. Whether you're evolving the core calendar API, improving
    sync reliability, or optimizing search performance, you will deliver high-impact
    solutions with quality and reliability at the forefront.</p> <p><strong>Cross-Functional
    Partnership</strong></p> <p>Partner with product engineering teams, Data Platform,
    and Infrastructure to understand their needs and translate them into robust solutions.
    This is a highly collaborative team where your input shapes how we serve internal
    customers.</p> <p><strong>Operational Excellence</strong></p> <p>Ensure reliability
    and performance through thoughtful monitoring, testing, and incident response.
    Participate in on-call rotation for business-critical systems and drive continuous
    improvement based on operational learnings.</p> <p><strong>What do we need from
    you?</strong></p> <ul> <li>7+ years of software engineering experience at a SaaS
    or technology company with strong backend and distributed systems focus</li> <li>Deep
    experience in service-oriented architecture, microservice patterns, and building
    resilient, scalable systems</li> <li>Proven experience building and operating
    high-traffic, high-availability platforms in production</li> <li>Strong proficiency
    building internal tools, frameworks, and SDKs other engineers use</li> <li>Experience
    with API design and data synchronization across multiple external providers</li>
    <li>Excellent problem-solving skills with the ability to diagnose complex system
    issues</li> <li>Strong communication skills, able to explain technical concepts
    clearly to technical and non-technical stakeholders</li> <li>Authorized to work
    lawfully in the United States of America as Calendly does not engage in immigration
    sponsorship at this time</li> </ul> <p><strong>Bonus</strong></p> <ul> <li>Experience
    with Golang, Ruby/Rails, NodeJS/Typescript</li> <li>Background in platform engineering
    roles</li> <li>Experience decomposing monolithic applications into microservices</li>
    <li>Familiarity with Google Cloud Platform, Kubernetes, PostgreSQL, Redis, Pub/Sub</li>
    <li>Experience with ElasticSearch or similar search infrastructure</li> </ul>
