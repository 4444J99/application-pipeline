    <h1 class="heading"><strong>Supply Chain Lead, Data Center Infrastructure</strong></h1>
    <h2 class="heading"><strong>About the role</strong></h2> <p>Anthropic is rapidly
    scaling our compute infrastructure to support the development of safe and beneficial
    AI systems. We're looking for a Supply Chain Lead to build and lead our data center
    infrastructure supply chain function from the ground up. This role is critical
    to ensuring we can secure the mechanical, electrical, and structural materials
    needed to build world-class data centers—on time and at competitive prices.</p>
    <p>You'll be responsible for developing a comprehensive supply chain strategy
    for MEP (mechanical, electrical, plumbing) equipment, steel, and other long-lead
    items that enable our data center construction programs. This is not a role for
    managing an existing playbook—you'll be creating the strategy, processes, and
    vendor relationships that will support Anthropic's infrastructure growth for years
    to come.</p> <p>This individual contributor role reports to the Head of Data Center
    Infrastructure and operates with significant autonomy.&nbsp;</p> <h2 class="heading"><strong>Responsibilities</strong></h2>
    <ul> <li> <p>Develop and execute a comprehensive supply chain strategy for data
    center infrastructure, including MEP equipment, steel, structural components,
    and other long-lead materials (excluding IT equipment)</p> </li> <li> <p>Partner
    with internal stakeholders to translate demand forecasts into forward-looking
    procurement requirements and supply chain plans</p> </li> <li> <p>Collaborate
    with engineering teams to understand future design criteria and anticipate material
    and equipment needs for upcoming builds</p> </li> <li> <p>Identify, evaluate,
    and qualify new vendors, assessing their capabilities, capacity, financial stability,
    and ability to deliver on schedule</p> </li> <li> <p>Build relationships with
    key suppliers to secure favorable allocation and priority during periods of constrained
    supply</p> </li> <li> <p>Negotiate contracts and pricing structures that balance
    cost, quality, and supply security</p> </li> <li> <p>Build programs that enable
    construction partners to secure equipment at competitive prices while meeting
    aggressive delivery timelines</p> </li> <li> <p>Oversee construction partners'
    own procurement plans to avoid risk</p> </li> <li> <p>Define procurement quality
    requirements and hold construction partners accountable end-to-end — from engineering
    specification approval prior to order commitment through appropriate acceptance
    verification (eg FAT or quality inspections) at delivery</p> </li> <li> <p>Develop
    risk mitigation strategies to address supply chain disruptions, single-source
    dependencies, and market volatility</p> </li> <li> <p>Create and maintain visibility
    into supply chain performance through metrics, dashboards, and reporting</p> </li>
    <li> <p>Stay current on market conditions, lead times, and emerging technologies
    relevant to data center construction</p> </li> </ul> <p>&nbsp;</p> <h2 class="heading"><strong>You
    may be a good fit if you</strong></h2> <ul> <li> <p>Have 8-12 years of experience
    in supply chain management, strategic sourcing, or procurement, with significant
    experience in data center, industrial construction, or infrastructure projects</p>
    </li> <li> <p>Have experience procuring MEP equipment (generators, switchgear,
