  description: 'Why Harvey At Harvey, we’re transforming how legal and professional
    services operate — not incrementally, but end-to-end. By combining frontier agentic
    AI, an enterprise-grade platform, and deep domain expertise, we’re reshaping how
    critical knowledge work gets done for decades to come. This is a rare chance to
    help build a generational company at a true inflection point. With 1000+ customers
    in 58+ countries, strong product-market fit, and world-class investor support,
    we’re scaling fast and defining a new category in real time. The work is ambitious,
    the bar is high, and the opportunity for growth — personal, professional, and
    financial — is unmatched. Our team is sharp, motivated, and deeply committed to
    the mission. We move fast, operate with intensity, and take real ownership of
    the problems we tackle — from early thinking to long-term outcomes. We stay close
    to our customers — from leadership to engineers — and work together to solve real
    problems with urgency and care. If you thrive in ambiguity, push for excellence,
    and want to help shape the future of work alongside others who raise the bar,
    we invite you to build with us. At Harvey, the future of professional services
    is being written today — and we’re just getting started. Role Overview As a Fullstack
    Engineer at Harvey, you’ll own end-to-end product experiences that bring advanced
    AI capabilities to life for enterprise and legal customers. You’ll design intuitive
    UIs, build the backend systems behind them, and shape how users interact with
    LLMs and agentic workflows at scale. This is a high-impact role where the features
    you ship directly influence how global organizations adopt AI in mission-critical
    workflows—and where you’ll have significant autonomy to define architecture, UX
    patterns, and the overall product direction. What You''ll Do Collaborate closely
    with Product to prioritize customer-focused work and deliver reliable features
    quickly in a fast-moving environment. Build end-to-end product features across
    the stack using React/TypeScript on the frontend and Python-based services (e.g.,
    FastAPI/Flask) on the backend. Implement product workflows that use LLMs and agentic
    tools behind the scenes, wiring robust backend orchestration into intuitive UIs.
    Design and maintain clear, versioned API contracts and data models backed by Postgres
    and other data stores where they add performance or reliability. Ship secure,
    multi-tenant, permissions-aware features suitable for large enterprise and sensitive
    legal use cases. Add meaningful logging, metrics, and basic tracing for the features
    and services you own, and participate in the on-call rotation. Collaborate closely
    with product and design to scope projects, iterate quickly on UX, and continuously
    refine shipped features based on customer feedback. What You Have 6+ years of
    experience in product-focused fullstack engineering roles building modern web
    applications or SaaS products. Proficiency in Python and a modern web framework
    (e.g., FastAPI or Flask), plus solid understanding of RESTful API design and common
    backend patterns. Hands-on experience with relational databases (e.g., Postgres)
    Strong experience with React and TypeScript, and a track record of shipping polished,
    responsive UIs with good component structure and attention to UX details. High
    ownership, clear communication, and the ability to turn ambiguous product requirements
    into simple, performant, and maintainable solutions in a fast-paced environment.
    Experience building for Cloud Infrastructure such as Azure, AWS, or GCP. Nice
    to have: experience integrating frontends and backends with LLM or ML services,
    or building complex workflows for enterprise or security-sensitive products. #LI-KV1
    Harvey is an equal opportunity employer and does not discriminate on the basis
    of race, gender, sexual orientation, gender identity/expression, national origin,
    disability, age, genetic information, veteran status, marital status, pregnancy
    or related condition, or any other basis protected by law. We are committed to
    providing reasonable accommodations to applicants with disabilities, and requests
    can be made by emailing accommodations@harvey.ai'
