    Own components end-to-end — design, implementation, testing, launch, and iteration.
    Integrate with backend and AI systems to deliver seamless mobile experiences.
    You might thrive in this role if you: Have deep experience in iOS development
    (Swift/Objective-C), including frameworks like UIKit/SwiftUI, Core Data, and performance
    optimization. Are passionate about creating intuitive, performant, and delightful
    mobile experiences. Enjoy collaborating in cross-disciplinary teams and iterating
