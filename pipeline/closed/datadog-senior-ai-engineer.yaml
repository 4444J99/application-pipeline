    agents, and code editing.</li> <li>Work with other Datadog teams to expand capabilities,
    for example integrating with the Datadog IDE extensions to deliver a CoPilot-like
    assistant, or Dynamic Instrumentation to collect more runtime data from production
    and pre-production environments.</li> </ul> <h4>&nbsp;</h4> <h4>Who You Are:</h4>
