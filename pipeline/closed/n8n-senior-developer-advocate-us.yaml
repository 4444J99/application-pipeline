    courses, social media and partnerships Represent the community''s needs internally
    and externally, gathering feedback and learnings, and sharing with engineering,
    product and marketing teams Develop our network of partners, exploring collaboration
    and co-marketing opportunities Lead two team members, a Junior Developer Advocate
    and a Support Engineer, with the possibility to build a bigger team longer-term
    Monitor success metrics, consider how effective initiatives are at achieving goals
    and adjust effort accordingly Requirements 5+ years working in tech, with 2+ years
    in Developer Relations You have experience in building community across some of
    the following channels: Twitter, YouTube, Twitch, Discord, blogs, meetups, public
