    We provide benefits according to local country norms.* US : Multiple low-premium,
    low-deductible medical plans with coverage for individuals and families—plus a
    no-cost premium HDHP option with a pre-seeded HSA—along with dental and vision
    coverage. Future planning 💰 – Europe: We provide pension contributions according
    to local country norms.* US: 401(k) retirement plan with a 4% employer match.
    Financial security 🛡️ – Europe: We provide benefits according to local country
    norms.* US: Company-paid short-term and long-term disability insurance, plus life
