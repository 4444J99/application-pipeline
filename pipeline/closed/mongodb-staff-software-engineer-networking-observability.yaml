  description: '<p>Join and be a part of leading the MongoDB Networking Observability
    team, helping build the core of a distributed database! Our team focuses on creating
    and enhancing components which facilitate communication between cooperating distributed
    processes and make these processes, and their communication, easily observable.
    Networking Observability’s responsibilities include improving MongoDB networking,
    improving the efficiency of resource utilization and building low-overhead observability
    features.</p> <p>Our team currently consists of six engineers, some located in
    New York City and some fully remote. We operate close to the bottom of the stack,
    and have a lot of influence over the performance and robustness of our open source
    database as well as the development efficiency of the engineering team overall.
    Recently we’ve worked on POCs and performance tests for new architectural directions
    in our networking stack, and are integrating OpenTelemetry to accelerate investigation
    of issues or performance bottlenecks in our tests.</p> <p>Are you excited to help
    the MongoDB engineering team build a better database? We are! Join us today, and
    we can build a faster, more reliable, exceptionally observable, database system
    together.</p> <p>Note: This role can be based out of our NYC office or remotely
    from anywhere in North America.</p> <h3>Candidate Profile</h3> <ul> <li>10+ years
    of experience building distributed systems</li> <li>Experienced and passionate
    about delivering and deploying a product with cross-team stakeholders</li> <li>Experience
    with building production-level code with a large user base, robust design structure,
    and rigorous code quality. Experience in C++ is required</li> <li>Understands
    modern computer architecture and internals to the degree that they can reason
    about how specific design choices play out in a system like MongoDB</li> <li>Excellent
    verbal and written communication skills and highly motivated to collaborate with
    colleagues and mentor junior engineers</li> <li>Excellent time and project management
    skills including the ability to make realistic assessments of project cost and
    complexity</li> <li>Good computer networking fundamentals and a desire to improve
    them</li> <li>Has demonstrated industry success or academic research in areas
    such as</li> <ul> <li>High performance / low latency networking</li> <li>Performance
    tuning</li> <li>Building high performance distributed and concurrent systems.</li>
    </ul> </ul> <h3>About MongoDB</h3> <p>MongoDB is built for change, empowering
    our customers and our people to innovate at the speed of the market. We have redefined
    the database for the AI era, enabling innovators to create, transform, and disrupt
    industries with software. MongoDB’s unified database platform—the most widely
    available, globally distributed database on the market—helps organizations modernize
    legacy workloads, embrace innovation, and unleash AI. Our cloud-native platform,
    MongoDB Atlas, is the only globally distributed, multi-cloud database and is available
    across AWS, Google Cloud, and Microsoft Azure.</p> <p>With offices worldwide and
    nearly 60,000 customers—including 75% of the Fortune 100 and AI-native startups—relying
    on MongoDB for their most important applications, we’re powering the next era
    of software.</p> <p>Our compass at MongoDB is our <a href="https://www.mongodb.com/company">Leadership
    Commitment,</a> guiding how and why we make decisions, show up for each other,
    and win. It’s what makes us MongoDB.</p> <p>To drive the personal growth and business
    impact of our employees, we’re committed to developing a supportive and enriching
    culture for everyone. <a href="https://www.mongodb.com/company/blog/culture/employee-benefits-that-make-a-difference-at-mongodb">From
    employee affinity groups, to fertility assistance and a generous parental leave
    policy</a>, we value our employees’ wellbeing and want to support them along every
    step of their professional and personal journeys.<a href="https://www.mongodb.com/blog/channel/culture">
    Learn more about what it’s like to work at MongoDB</a>, and help us make an impact
    on the world!</p> <p>MongoDB is committed to providing any necessary accommodations
    for individuals with disabilities within our application and interview process.
    To request an accommodation due to a disability, please inform your recruiter.</p>
