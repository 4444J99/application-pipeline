  description: <div class="content-intro"><p>Anduril Industries is a defense technology
    company with a mission to transform U.S. and allied military capabilities with
    advanced technology. By bringing the expertise, technology, and business model
    of the 21st century’s most innovative companies to the defense industry, Anduril
    is changing how military systems are designed, built and sold. Anduril’s family
    of systems is powered by Lattice OS, an AI-powered operating system that turns
    thousands of data streams into a realtime, 3D command and control center. As the
    world enters an era of strategic competition, Anduril is committed to bringing
    cutting-edge autonomy, AI, computer vision, sensor fusion, and networking technology
    to the military in months, not years.</p></div><h3><strong>ABOUT THE TEAM<br></strong></h3>
    <p>The Developer Platform team serves as the backbone of Anduril's engineering
    ecosystem, building critical infrastructure that enables teams to deliver mission-critical
    defense systems. On this team you would optimize release pipelines and CI/CD workflows
    powering Anduril's Software Factories across the US, Australia, and UK. You'll
    develop productivity-enhancing tools like our Golang-based dx CLI and architect
    data infrastructure for actionable engineering metrics and KPIs. Your work will
    directly impact the productivity across the entire software engineering ecosystem,
    creating a foundation that scales with Anduril's growth and supports its mission
    of solving critical defense challenges through advanced technology.</p> <h4><br><strong>WHAT
    YOU’ll DO<br></strong></h4> <ul> <li>Lead engineering efforts across release systems,
    developer tooling, and the broader Anduril Software Factory to optimize release
    pipelines and development workflows.</li> <li>Architect scalable AI-powered automation
    solutions that increase developer productivity while maintaining the highest standards
    of quality and security for mission-critical defense systems.</li> <li>Design
    and implement robust data infrastructure to effectively instrument our diverse
    business lines</li> <li>Partner with Heads of Mission Engineering to define and
    track critical KPIs that drive strategic decision-making</li> </ul> <h4><strong>REQUIRED
    QUALIFICATIONS</strong></h4> <ul> <li>5+ years in an engineering setting, with
    platform engineering experience and a deep understanding of development workflows.
    You have experience working on developer tools, CI/CD pipelines, and infrastructure
    automation, preferably in environments that reward initiative, creativity, and
    independent problem-solving with a demonstrable track record of maintaining complex
    software systems.</li> <li>Strong Golang chops needed to create integrations with
    other Anduril services, and improve our popular dx tool</li> <li>Strong Python
    experience for creating, analyzing, and visualizing complex datasets in Palantir’s
    Foundry product</li> <li>Demonstrated ability to quickly learn and adapt to unfamiliar
    technologies across multiple domains</li> <li>Self-directed, entrepreneurial mindset
    with the ability to identify opportunities and craft innovative solutions. The
    roadmap is ours to create and execute on.</li> <li>Must be a U.S. Person due to
    required access to U.S. export controlled information or facilities</li> </ul>
    <h4><strong>PREFERRED QUALIFICATIONS</strong></h4> <ul> <li>Exceptional systems
    thinking with meticulous attention to detail, outstanding communication, and project
    management skills</li> <li>Proficiency with TypeScript/React for developing lightweight
    UI solutions</li> <li>Bachelor's degree or higher in Computer Science, Engineering,
    or related technical field</li> <li>Proven track record in fast-paced startup
    environments</li> </ul><div class="content-pay-transparency"><div class="pay-input"><div
