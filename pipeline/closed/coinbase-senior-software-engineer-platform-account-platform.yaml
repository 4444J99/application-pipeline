    <li>Collaborating cross-functionally with product, SRE, security, compliance,
    and infrastructure teams to deliver robust and compliant solutions</li> <li>Proactively
    identifying opportunities for platformization, modernization, and performance
    improvements to support future business growth</li> </ul> <p><strong>What we look
    for in you:</strong></p> <ul> <li>Have at least 5 years of experience in software
    engineering.</li> <li>Designed, built, scaled and maintained production services,
    and know how to compose a service oriented architecture.</li> <li>Write high quality,
    well tested code to meet the needs of your customers.</li> <li>Experienced architecting
