    the ability to responsibly use generative AI tools and copilots (e.g., LibreChat,
    Gemini, Glean) in daily workflows, continuously learn as tools evolve, and apply
    human-in-the-loop practices to deliver business-ready outputs and drive measurable
    improvements in efficiency, cost, and quality.</li> <li>You’re passionate about
    building an open financial system that brings the world together.</li> </ul> <p><strong>Nice
    to haves:</strong></p> <ul> <li>You have experience in the auth domain.&nbsp;</li>
    <li>You have experience with React (full stack experience is a big plus) .&nbsp;</li>
    <li>You have gone through a rapid growth in your company (from startup to mid-size).</li>
    <li>You’ve worked with Golang, Ruby, Docker, Rails, Postgres, MongoDB or DynamoDB.</li>
    </ul> <p><span style="font-weight: 400;">Job #: P76159</span></p> <p>&nbsp;</p>
