  description: '<h3><strong>About the Role</strong></h3> <p>Together AI is a research-driven
    artificial intelligence company. We believe open and transparent AI systems will
    drive innovation and create the best outcomes for society, and together we are
    on a mission to significantly lower the cost of modern AI systems by co-designing
    software, hardware, algorithms, and models. We have contributed to leading open-source
    research, models, and datasets to advance the frontier of AI, and our team has
    been behind technological advancement such as FlashAttention, Hyena, FlexGen,
    and RedPajama. We invite you to join a passionate group of researchers and engineers
    in our journey in building the next generation AI infrastructure.</p> <p>As a
    Senior Developer Productivity Engineer at Together AI, you’ll own the systems
    and tooling that empower engineers to ship high-quality software faster. You’ll
    optimize workflows, enhance testing, enable reliable and reusable CI/CD, and work
    with developers to build out stable local environments. Your work will directly
    impact release velocity, developer happiness, and cross-cutting enablement ensuring
    engineers spend less time churning on infrastructure and more time building.</p>
    <h3><strong>Responsibilities</strong></h3> <ul> <li>Automate CI/CD pipelines for
    zero-downtime deployments (e.g., Canary, Blue/Green).</li> <ul> <li>Create smart
    pipelines encouraging reusable workflows and simplicity</li> </ul> <li>Streamline
    build/test/deploy workflows.</li> <li>Build shared tooling (CLIs, codegen, IDE
    plugins) to accelerate teams.</li> <li>Reduce friction (e.g., faster builds, hot-reload,
    test tooling).</li> <li>Collaborate with developers to identify pain points and
    streamline workflows.</li> <li>Champion best practices through documentation.</li>
    </ul> <h3><strong>Requirements</strong></h3> <ul> <li>Bachelor’s degree in Computer
    Science, Engineering, or related field or 5+ years of industry experience in DevOps/SRE,
    developer tooling, or infrastructure engineering.</li> <li>Proficiency in Python,
    Go, and JavaScript/TypeScript (for tooling, automation, and FE enablement).</li>
    <li>Strong experience with CI/CD tools (GitHub Actions, ArgoCD, Gitops methodology)
    for building scalable, reusable pipelines.</li> <li>Experience with local dev
    environment tooling (e.g., Skaffold) and containerized development workflows</li>
    <li>Experience with creating starter templates in coordination with engineering
    for enabling rapid spin up of new services&nbsp;</li> <li>Strong ownership and
    a builder mindset, you love creating tools others rely on.</li> <li>Problem-solving
    rigor and attention to detail (e.g., diagnosing flaky tests, build latency).</li>
    </ul> <p><strong>Nice to have</strong></p> <ul> <li>Kubernetes expertise (EKS,
    K3s) and optimizing containerized builds.</li> <li>Infrastructure as Code (Terraform,
    Ansible, Pulumi).</li> <li>Front-end tooling familiarity (e.g., React, Next.js,
    Jest) to optimize FE dev workflows.</li> <li>Monitoring/observability (Prometheus,
    Grafana, Honeycomb) to debug bottlenecks.</li> </ul> <h3><strong>Compensation</strong></h3>
    <p>We offer competitive compensation, startup equity, health insurance and other
    competitive benefits. The US base salary range for this full-time position is:
    $150,000 - $230,000 + equity + benefits. Our salary ranges are determined by location,
    level and role. Individual compensation will be determined by experience, skills,
    and job-related knowledge.</p> <h3><strong>Equal Opportunity</strong></h3> <p>Together
    AI is an Equal Opportunity Employer and is proud to offer equal employment opportunity
    to everyone regardless of race, color, ancestry, religion, sex, national origin,
    sexual orientation, age, citizenship, marital status, disability, gender identity,
    veteran status, and more.</p> <p>Please see our privacy policy at https://www.together.ai/privacy</p>'
