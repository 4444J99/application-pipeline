  description: 'About Ramp Ramp is building the smart infrastructure for finance teams,
    embedded in the transaction flow of every dollar a business spends. We automate
    how over $100B in annualized spend flows in and out of 50,000+ companies: authorizing
    payments, flagging risk, categorizing spend, and closing books. The problems are
    high-stakes, data-dense, and unforgiving. We hire people with high agency and
    high urgency. We look for slope over intercept. We care less about where you trained
    and more about what you’ve built. At Ramp, everyone is a builder who owns problems
    end to end and makes consequential decisions that shape the outcome. The median
    Ramp customer saves 5% and grows revenue 16% in their first year – far in excess
    of businesses operating without Ramp. We believe every ambitious company deserves
    the same. If you want to build systems that directly shape how companies move
    and manage billions, Ramp is the place to do it. About the Role Ramp is, at its
    core, an engineering company, and is on a mission to build the best engineering
    team in the world. Our Infrastructure supports the foundations of our product
    and platform, owning areas like compute orchestration, databases, messaging, observability,
    and developer environments. We build the primitives and abstractions that let
    product teams move fast while ensuring security, scalability, and reliability.
    This role is a cross-functional position within the Infrastructure organization,
    with a specific focus on enabling our government environments (FedRAMP, GovRAMP).
    You’ll act as both a technical owner and a multiplier: helping shape compliant
    infrastructure patterns, identifying risks across infra domains, and partnering
    closely with other infra engineers to ensure our architecture continues to meet
    strict operational and security requirements. You will be expected to take ownership
    of our government infrastructure and guide its evolution, while also contributing
    to high-leverage infra projects across the org. Our ideal candidate combines deep
    cloud infrastructure experience with a strong sense of ownership, collaborative
    instincts, understands the nuances of operating in secure and regulated environments,
    and has a desire to mentor others and raise the bar across the team. What You’ll
    Do Influence the evolution of Ramp’s infrastructure to support our government
    environments Work across infra domains to contribute to the next generation of
    Ramp''s database, real-time queue, or container orchestration infrastructure,
    and ensure proposed changes are viable within our secure environments Collaborate
    across our engineering organization to introduce and scale best practices with
    cloud-native technologies like Cloudflare, Amazon ALB, Service Discovery, ECS/EKS,
    Celery, Kafka, Amazon Aurora PostgreSQL, Elasticache Redis, and S3 Build abstractions
    within Terraform to simplify architecture and increase developer velocity and
    ownership Find solutions to Ramp''s toughest scaling, performance, and low-latency
    problems Participate in an on-call rotation to address critical production events
    Mentor other engineers and contribute to a high-performing, inclusive engineering
    culture What You Need Minimum 6 years of experience shipping high-quality architectures
    for critical systems preferred Production experience in AWS, GCP, or Azure An
    ability to think through customer requirements and come up with high-impact ways
    to quickly solve their problems Expertise in a production deployment of Infrastructure-as-Code
    i.e. Terraform Proficiency in an object-oriented programing language FedRAMP Requirements
    Proven experience designing and operating cloud infrastructure (AWS) compliant
    with FedRAMP security standards. Expertise implementing secure Infrastructure-as-Code
    (Terraform) solutions aligned with FedRAMP controls and audits. Deep understanding
    of secure data handling, encryption, logging, and access controls required under
    FedRAMP guidelines. Strong experience building, scaling, and securing database
    infrastructure and container orchestration systems to meet FedRAMP compliance.
    Benefits (for U.S.-based full-time employees) 100% medical, dental & vision insurance
    coverage for you Partially covered for your dependents One Medical annual membership
    401k (including employer match on contributions made while employed by Ramp) Flexible
    PTO Fertility HRA (up to $10,000 per year) Parental Leave Unlimited AI token usage
    Pet insurance Centralized home-office equipment ordering for all employees Health
    and Wellness stipend In-office perks: lunch, snacks, drinks, and more Budget for
    intra-office travel Relocation support to NYC or SF (as needed) Referral Instructions
    If you are being referred for the role, please contact that person to apply on
    your behalf. Other notices Pursuant to the San Francisco Fair Chance Ordinance,
    we will consider for employment qualified applicants with arrest and conviction
    records. Beware of recruiting scams: Ramp will only contact you through official
    @ Ramp.com em'
