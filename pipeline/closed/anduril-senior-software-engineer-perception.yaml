    advanced technology. By bringing the expertise, technology, and business model
    of the 21st century’s most innovative companies to the defense industry, Anduril
    is changing how military systems are designed, built and sold. Anduril’s family
    of systems is powered by Lattice OS, an AI-powered operating system that turns
    thousands of data streams into a realtime, 3D command and control center. As the
    world enters an era of strategic competition, Anduril is committed to bringing
    cutting-edge autonomy, AI, computer vision, sensor fusion, and networking technology
    to the military in months, not years.</p></div><h3>ABOUT THE TEAM</h3> <p>Anduril’s
    Tactical Recon &amp; Strike (TRS) is a division with two missions: 1) build highly
    capable autonomous drones, and 2) build solid rocket motors at scale. We transform
    products like Ghost, Anvil, Bolt, and Altius from early concepts into fully operational
    capabilities by partnering closely with specialist engineering, operations, and
    production teams. Through our Anduril Rocket Motor Systems (RMS) team, we design
    and manufacture solid rocket motors using advanced materials, proprietary formulations,
    and high-volume production methods—delivering safe, reliable propulsion systems
    that support a wide range of mission requirements. TRS hires software engineers
    &amp; hardware engineers, who are excited to build across a diverse and powerful
    portfolio—from autonomous aerial systems to high-performance solid rocket motors.
    Our teams contribute to highly capable autonomous robotics systems and propulsion
    products that operate reliably in the most demanding mission environment.</p>
    <h3>ABOUT THE JOB</h3> <p>We are seeking Senior Software Engineers specializing
    in Computer Vision and Machine Learning Engineering. You will leverage cutting-edge
    research to solve our most challenging perception problems for our UAVs, bringing
    deep expertise in Object Detection, Object Tracking, or related perception domains.
    This role requires hands-on proficiency in C++ and/or Python within a Linux environment.
    If you are passionate about tackling complex technical challenges in computer
    vision and perception, we encourage you to apply.</p> <p><strong>This position
    will be located at our headquarters in Costa Mesa, CA (relocation benefits provided).</strong><br><br></p>
    <h4>WHAT YOU’LL DO</h4> <ul> <li>Propose and prototype innovative solutions to
    solve real world problems, leveraging the latest state-of-the-art techniques in
    the field.</li> <li>Develop and maintain core libraries and runtime applications.</li>
    <li>Integrate classical and geometric methods in computer vision with ML methods.</li>
    <li>Work with ML and Data Infra team to construct various benchmarks for analyzing
    system performance.</li> </ul> <h4><br>REQUIRED QUALIFICATIONS</h4> <ul> <li>MS
    or PhD in Machine Learning, Robotics or Computer Science, with emphasis on Computer
    Vision.</li> <li>BS in Computer Science, Machine Learning, Electrical Engineering,
    or related field.</li> <li>4+ years experience developing and benchmarking ML
    algorithms on large-scale datasets.</li> <li>High proficiency in C++ development
    in a Linux environment.</li> <li>Experience deploying models with TensorRT and
    ONNX.</li> <li>Experience with Python development and deep learning frameworks
    such as PyTorch and TensorFlow.</li> <li>Experience writing and maintaining automated
    continuous integration tests.</li> <li>Experience in one or more of the following:</li>
    <ul> <li>Object Detection, Object Tracking, Instance Segmentation, Semantic Segmentation,
    Semantic change Detection.</li> </ul> <li>Experience in one or more of the following:</li>
    <ul> <li>Visual Odometry, SLAM, Multi-view Geometry, Structure from Motion, 3D
    Geometry, Discriminative Correlation Filters, Stereo, Neural 3D Reconstruction,
    RGB-D and LIDAR Sensor Fusion.</li> </ul> <li style="font-weight: bold;"><strong>Eligible
    to obtain and maintain an active U.S. Secret security clearance.</strong></li>
    </ul> <h4>PREFERRED QUALIFICATIONS</h4> <ul> <li>Experience troubleshooting and
    analyzing remotely deployed software systems.</li> <li>Proficient in Python.</li>
