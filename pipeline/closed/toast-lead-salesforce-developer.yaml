  description: '<p>Toast creates technology to help restaurants and local businesses
    succeed in a digital world, helping business owners operate, increase sales, engage
    customers, and keep employees happy.</p> <p>We are seeking a highly skilled and
    innovative Lead Salesforce Developer to join our dynamic team. This role is crucial
    for leveraging the Salesforce platform, particularly in integrating advanced Agentic
    workflows and Artificial Intelligence (AI) capabilities. The ideal candidate will
    possess deep expertise in Salesforce development, architecture, and a proven track
    record of implementing intelligent, self-optimizing systems. This is a unique
    opportunity to shape the future of our customer engagement and operational efficiency
    using cutting-edge technology.<br><br></p> <p><strong>A day in the life (Responsibilities)<br></strong></p>
    <ul> <li><strong>Salesforce Architecture &amp; Development:</strong> Lead the
    design, development, and implementation of complex, scalable solutions within
    the Salesforce platform (Sales Cloud, Service Cloud, Experience Cloud, etc.) using
    Apex, Lightning Web Components (LWC), Visualforce, and other Salesforce technologies.</li>
    <li><strong>Agentic System Integration:</strong> Design and implement "Agentic"
    workflows—autonomous, goal-driven AI systems—to automate complex business processes,
    such as intelligent routing, proactive customer service, and dynamic workflow
    adjustments.</li> <li><strong>AI/ML Integration:</strong> Integrate various AI/ML
    models (e.g., Einstein GPT, external LLMs, or custom models) with Salesforce using
    platform features and APIs to drive predictive analytics, personalization, and
    intelligent decision-making.</li> <li><strong>Technical Leadership:</strong> Mentor
    and guide a team of Salesforce developers, conducting code reviews, establishing
    best practices for SDLC (Software Development Life Cycle), and ensuring high-quality,
    maintainable code.</li> <li><strong>Collaboration:</strong> Work closely with
    Product Managers, Business Analysts, and Stakeholders to translate business requirements
    into technical specifications and deliver innovative solutions.</li> <li><strong>Deployment
    and Governance:</strong> Manage release cycles, deployment processes (using tools
    like Azure DevOps, GitLab, or Copado), and maintain platform health, security,
    and governance standards.</li> <li><strong>Stay Current: </strong>Continuously
    research and evaluate new Salesforce features, industry trends, and advancements
    in AI/Agentic technologies to recommend and implement relevant improvements.<br><br></li>
    </ul> <p><strong>What you''ll need to thrive (Requirements)</strong></p> <ul>
    <li><strong>Experience:</strong> 8+ years of experience in Salesforce development
    with at least 2 years in a Lead or Senior role.</li> <li><strong>Certifications:</strong>
    Active Salesforce Certified Platform Developer II, and Certified Application or
    System Architect is highly preferred.</li> <li><strong>Technical Skills:</strong></li>
    <ul> <li>Expert proficiency in Apex, LWC, SOQL/SOSL, and advanced configuration.</li>
    <li>Deep understanding of Salesforce Governor Limits, best practices, and enterprise-level
    architecture patterns.</li> <li>Proven experience integrating Salesforce with
    external systems using REST/SOAP APIs, Platform Events, and Workato, Mulesoft
    or similar middleware.</li> </ul> <li><strong>AI/Agentic Experience: </strong>Direct
    experience developing or integrating AI-driven features (e.g., Natural Language
    Processing, machine learning models, autonomous systems) within the Salesforce
    ecosystem.<br><br></li> </ul> <p><strong>What will help you stand out (Nonessential
    Skills/Nice to Haves)<br></strong></p> <ul> <li>Experience with advanced DevOps
    practices for Salesforce (CI/CD pipelines, automated testing).</li> <li>Knowledge
    of data modeling and management in large-scale Salesforce environments.</li> <li>Familiarity
    with other Cloud platforms (AWS, GCP, Azure) and their AI services.</li> <li>A
    portfolio or demonstrated history of contributing to open-source projects or speaking
    engagements on Salesforce, AI, or Agentic systems.</li> </ul> <p>&nbsp;</p> <p
    data-pm-slice="1 1 []"><strong>AI at Toast</strong></p> <p>At Toast, one of our
    company values is that we''re hungry to build and learn. We believe learning new
    AI tools empowers us to build for our customers faster, more independently, and
    with higher quality. We provide these tools across all disciplines, from Engineering
    and Product to Sales and Support, and are inspired by how our Toasters are already
    driving real value with them. The people who thrive here are those who embrace
    changes that let us build more for our customers; it’s a core part of our culture.</p>
    <p data-pm-slice="1 1 []"><strong>Our Total Rewards Philosophy&nbsp;<br></strong>We
    strive to provide competitive compensation and benefits programs that help to
    attract, retain, and motivate the best and brightest people in our industry. Our
    total rewards package goes bey'
