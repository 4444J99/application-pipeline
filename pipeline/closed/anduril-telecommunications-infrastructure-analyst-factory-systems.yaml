  description: <div class="content-intro"><p>Anduril Industries is a defense technology
    company with a mission to transform U.S. and allied military capabilities with
    advanced technology. By bringing the expertise, technology, and business model
    of the 21st century’s most innovative companies to the defense industry, Anduril
    is changing how military systems are designed, built and sold. Anduril’s family
    of systems is powered by Lattice OS, an AI-powered operating system that turns
    thousands of data streams into a realtime, 3D command and control center. As the
    world enters an era of strategic competition, Anduril is committed to bringing
    cutting-edge autonomy, AI, computer vision, sensor fusion, and networking technology
    to the military in months, not years.</p></div><p><strong>ABOUT THE JOB:</strong></p>
    <p>We are seeking a Telecommunications Infrastructure Analyst with a proven track
    record in IT infrastructure facility assessments and strategic planning. This
    role demands a strong ability to gather and evaluate comprehensive infrastructure
    requirements, including power, cooling, structured cabling, network capacity,
    and security. You will leverage your extensive experience to translate technical
    findings into actionable Statements of Work (SOWs), collaborating effectively
    with diverse stakeholders and third-party design teams. Your deep understanding
    of corporate IT standards, security policies, and vendor-agnostic network technologies
    will be crucial in ensuring reliable, scalable, and secure infrastructure solutions.<br><br></p>
    <p><strong>WHAT YOU"LL DO:</strong></p> <ul> <li>You will establish and maintain
    the critical bridge between the Facilities organization and the external low-voltage
    design and integration vendors providing essential IT technical consultation to
    both parties to ensure successful technical outcomes.</li> <li>Conduct site visits
    to assess infrastructure needs, including power, cooling, structured cabling,
    network capacity, and security.</li> <li>Develop technical site plans in collaboration
    with third-party architects, low-voltage design firms, and engineering teams.</li>
    <li>Ensure compliance with corporate IT standards and security policies.</li>
    <li>Gather comprehensive infrastructure requirements and conduct detailed evaluations.</li>
    <li>Translate complex technical details into actionable SOWs.</li> <li>Communicate
    and collaborate with internal and external stakeholders to ensure project success.</li>
    <li>Provide clear, concise, and opinionated guidance, and push back when necessary
    to ensure project alignment and success.</li> <li>Manage changes to project scope,
    schedule, and costs using appropriate verification techniques.</li> </ul> <p><strong>REQUIRED
    QUALIFICATIONS:</strong></p> <ul> <li>Minimum of 6 years of experience in a Network
    and/or Systems Infrastructure role.</li> <li>Minimum of 4 years of experience
    in infrastructure analysis, site build, and M&amp;A assessments.</li> <li>Proven
    experience in gathering and evaluating infrastructure requirements.</li> <li>Strong
    ability to translate technical details into actionable SOWs.</li> <li>Strong understanding
    of construction phases and analyzing construction drawings</li> <li>Excellent
    communication and collaboration skills; capable of effectively working with diverse
    stakeholders.</li> <li>Strong understanding of corporate IT standards and security
    policies.</li> <li>Ability to conduct thorough site assessments (power, cooling,
    structured cabling, network capacity, security).</li> <li>Experience working with
    third-party architects, low-voltage design firms, and engineering teams.</li>
    <li>Extensive experience with vendor-agnostic network switching, wireless, and
    routing.</li> <li>Experience with ticketing systems and managing a ticket queue.</li>
    <li>Passion for technology and a team-focused attitude.</li> <li>Ability to learn
    new technologies quickly.</li> <li>Strong documentation skills.</li> <li>Strong
    problem-solving skills.</li> <li>Ability to travel for remote deployments when
    required.</li> <li>Must be able and willing to lift 50 pounds.</li> </ul> <p><strong>PREFERRED
    QUALIFICATIONS:</strong></p> <ul> <li>Currently holds or can obtain a BICSI RCDD
    (Registered Communications Distribution Designer) Certification</li> <li>Certification
    in project management or related fields.</li> <li>Experience in large-scale infrastructure
    projects.</li> <li>Familiarity with M&amp;A processes and assessments.</li> </ul>
