    products. The individual will use their experience to plan, build and operate
    viable test facility infrastructure including workshops and test asset inventory
    infrastructure. The candidate will play a pivotal role in defining unique solutions
    to problems with limited information and short time frames. They will leverage
    their knowledge to assist and advance solutions that enable testing and verification
    for key stakeholders.</p> <p>&nbsp;</p> <h4>WHAT YOU'LL DO</h4> <ul> <li>Test
