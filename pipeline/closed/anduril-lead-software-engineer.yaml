  description: <div class="content-intro"><p>Anduril Industries is a defense technology
    company with a mission to transform U.S. and allied military capabilities with
    advanced technology. By bringing the expertise, technology, and business model
    of the 21st century’s most innovative companies to the defense industry, Anduril
    is changing how military systems are designed, built and sold. Anduril’s family
    of systems is powered by Lattice OS, an AI-powered operating system that turns
    thousands of data streams into a realtime, 3D command and control center. As the
    world enters an era of strategic competition, Anduril is committed to bringing
    cutting-edge autonomy, AI, computer vision, sensor fusion, and networking technology
    to the military in months, not years.</p></div><h4>ABOUT THE TEAM</h4> <p>The
    Mission Software Engineering team is responsible for building, deploying, integrating,
    extending, and scaling Anduril's software to deliver mission-critical capabilities
    to our customers. As the software engineers closest to Anduril customers and end-users,
    Mission Software Engineers solve technical challenges of operational scenarios
    while owning the end-to-end delivery of winning capabilities such as Counter Intrusion,
    Joint All Domain Command &amp; Control, and Counter-Unmanned Aircraft Systems.</p>
    <h4>ABOUT THE JOB</h4> <p>As a Lead Software Engineer on the Connected Warfare
    team, you will help architect third party systems to seamlessly integrate with
    Anduril products while solving a wide variety of technical problems, making pragmatic
    engineering tradeoffs along the way. Your role sets the bar for the technical
    excellence our customers expect from Anduril. Above all, Mission Software Engineers
    are driven by a “Whatever It Takes” mindset—executing in an expedient, scalable,
    and pragmatic way while keeping the mission top-of-mind and making sound engineering
    decisions to deliver successful outcomes correctly, on-time, and with high quality.</p>
    <h4>WHAT YOU’LL DO</h4> <ul> <li>Be a champion for Anduril capabilities within
    a customer environment</li> <li>Develop architecture and mission vignettes</li>
    <li>Iterate on core data mesh technology to make optimal use of degraded networks</li>
    <li>Develop connectors and APIs for legacy and cutting edge systems to integrate
    with Lattice</li> <li>Deploy software to non-standard environments</li> <li>Create
    data flow pipelines that span horizontally and vertically across disparate networked
    systems and security domains</li> </ul> <h4>REQUIRED QUALIFICATIONS</h4> <ul>
    <li>Strong engineering background from industry or school, ideally in areas/fields
    such as Computer Science, Software Engineering, Mathematics, or Physics</li> <li>At
    least 6+ years working with a variety of programming languages such as Java, Python,
    C++, Rust, Go, JavaScript, etc.</li> <li>At least 2+ years previous experience
    as a technical lead or people manager of software engineers</li> <li>Experience
    building software solutions involving significant amounts of data processing and
    analysis</li> <li>Ability to quickly understand and navigate complex systems and
    established code bases</li> <li>Experience working in a customer / client facing
    role</li> <li>A desire to work on critical software that has a real-world impact</li>
    <li>Ability to travel to client sites</li> <li>Eligible for NATO Clearance</li>
    </ul><div class="content-conclusion"><p><span data-contrast="auto">The salary
