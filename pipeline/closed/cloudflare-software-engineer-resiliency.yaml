  description: '<div class="content-intro"><div><strong>About Us</strong></div> <div>
    <p>At Cloudflare, we are on a mission to help build a better Internet. Today the
    company runs one of the world’s largest networks that powers millions of websites
    and other Internet properties for customers ranging from individual bloggers to
    SMBs to Fortune 500 companies. Cloudflare protects and accelerates any Internet
    application online without adding hardware, installing software, or changing a
    line of code. Internet properties powered by Cloudflare all have web traffic routed
    through its intelligent global network, which gets smarter with every request.
    As a result, they see significant improvement in performance and a decrease in
    spam and other attacks. Cloudflare was named to Entrepreneur Magazine’s Top Company
    Cultures list and ranked among the World’s Most Innovative Companies by Fast Company.&nbsp;</p>
    <p>At Cloudflare, we’re not looking for people who wait for a polished roadmap;
    we’re looking for the builders who see the cracks in the Internet that everyone
    else has simply learned to live with. We value candidates who have the instinct
    to spot a "normalized" problem and the AI-native curiosity to create a solution
    using the latest tools. Our culture is built on iteration, leveraging AI to ship
    faster today to make it better tomorrow, while ensuring that every improvement,
    no matter how small, is shared across the team to lift everyone up. If you’re
    the type of person who values curiosity over bureaucracy, and that AI is a partner
    in solving tough problems to keep the Internet moving forward, you’ll fit right
    in.</p> </div></div><p><strong>Available Locations: <span class="il">Bengaluru</span></strong></p>
    <p><strong><span class="il">About The Team</span></strong></p> <p><span class="il">Cloudflare’s
    Infrastructure Team builds and runs the systems and software that support our
    solutions that handle trillions of requests per month. We ensure that all of the
    new and existing features and functionality that Cloudflare offers can be managed
    at scale and meet the needs of our massively growing, global customer base.</span></p>
    <p><strong>About The Role&nbsp;</strong></p> <p>As a Engineer: Resiliency, you
    will be part of a team responsible for developing and maintaining the systems
    that manage Cloudflare’s infrastructure at scale. You will work on expanding and
