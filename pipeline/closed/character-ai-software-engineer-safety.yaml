  description: 'About the role We’re looking for a talented and creative Software
    Engineer to join our Safety Engineering team at Character.AI ! In this role, you’ll
    work closely with Product, Design and Trust and Safety operations teams to design
    and build tooling and product experiences that help ensure a safe, transparent
    and engaging experience for our users. You’ll play a key role in shaping innovative
    solutions to the unique Trust & Safety challenges that come with human-to-AI interaction—bringing
    your technical expertise to the table as we define industry best practices in
    this emerging space. What you''ll do Design and develop the front end experience
    of how users interact with our Trust and Safety systems. Balance the needs for
    reducing risk, improving UX and enhancing platform reliability and scalability
    across a host of features to build the best experience possible for users Get
    to know our users and usage patterns deeply to help us design innovative technical
    solutions that incentivize the best behaviors from our users on the platform Work
    with other product teams and co create modular and scalable safety design systems
    that enable all product features to launch safely while maintaining a high launch
    velocity Collaborate with the Trust & Safety team to understand moderation workflows
    and build tools that empower their decision-making. Help evaluate and integrate
    third-party solutions when needed. Work with engineers and Trust & Safety stakeholders
    to design interfaces and interaction models that incorporate AI-assisted moderation,
    ensuring smooth human-AI collaboration. Help us leverage user data and insights
    to improve our core LLM and other models and predictions. Create frontend systems
    that visualize feedback loops between moderation actions and AI training. Ensure
    that data insights are clearly surfaced to support safe and positive user experiences
    across the platform. Who you are 5+ years of experience as a Front-End or Full-Stack
    Software Engineer with a strong focus on user experience and design Deep understanding
    of Typescript, CSS, React, React Native, HTML, and modern front end design patterns
    and best practices. Demonstrated experience with building features and experiences
    for consumer products Passionate about the pixels, an exceptional eye for detail,
    and a focus on craft and polish Proven ability to work in a fast-paced development
    environment and deliver timely results. Excellent communication and interpersonal
    skills You will be a great fit if: You care deeply about Trust & Safety and see
    it as a value-add to the business You enjoy working cross-functionally across
    different teams (e.g. Legal and Product) and balancing privacy, safety, and product
    needs You are proactive and have a “get things done” mindset. About Character.AI
    Character.AI empowers people to connect, learn and tell stories through interactive
    entertainment. Over 20 million people visit Character.AI every month, using our
    technology to supercharge their creativity and imagination. Our platform lets
    users engage with tens of millions of characters, enjoy unlimited conversations,
    and embark on infinite adventure s. In just two years, we achieved unicorn status
    and were honored as Google Play''s AI App of the Year—a testament to our innovative
    technology and visionary approach. Join us and be a part of establishing this
    new entertainment paradigm while shaping the future of Consumer AI! At Character,
    we value diversity and welcome applicants from all backgrounds. As an equal opportunity
    employer, we firmly uphold a non-discrimination policy based on race, religion,
    national origin, gender, sexual orientation, age, veteran status, or disability.
    Your unique perspectives are vital to our success.'
