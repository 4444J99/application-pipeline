  description: 'About the Team The GTM (Go-To-Market) Innovation team is an internal
    powerhouse revolutionizing how we engage customers through groundbreaking applications
    of our technology. As an incubator, we amplify the impact of Sales, Technical
    Success, Enablement, and Revenue Operations by deploying our technology at scale.
    This team applies advanced capabilities to real-world interactions — reshaping
    conversations with customers, learning from every exchange, and finding novel
    ways to show the value of our technology. About the Role We’re looking for Full
    Stack software engineers with a product mindset to join the GTM Innovation team.
    As a product engineer on this team, you’ll help OpenAI meet the world at scale.
    You’ll partner closely with go-to-market teams to understand their workflows,
    identify leverage points, and ship novel solutions using OpenAI’s API platform.
    You’ll move quickly from prototype to production, and your work will directly
    shape how customers experience our technology in the field. This role is ideal
    for engineers who want to be close to users, own end-to-end outcomes, and help
    define entirely new categories of enterprise software. In this role, you will:
    Build high-impact applications and tools that accelerate OpenAI’s go-to-market
    efforts Work across the full product lifecycle for GTM: prototype, iterate, ship,
    and maintain Embed with Sales, Technical Success, and Revenue Operations to identify
    user needs and build for them Apply OpenAI’s models in novel ways to solve real-world
    customer and internal workflow problems Translate learnings into feedback for
    Applied and Research teams to inform product development You’ll thrive in this
    role if you: Have 4+ years of experience as a software/ML/product engineer working
    on user-facing systems Former founder, or early engineer at a startup who built
    a product from scratch is a plus Are fluent in Python or JavaScript and comfortable
    building full-stack applications Have built or prototyped LLM-powered workflows
    using the OpenAI API (or similar) Take initiative, move quickly, and operate with
    a strong sense of ownership Enjoy working closely with end users and shaping 0→1
    products Are collaborative, curious, and motivated to make an outsized impact
    at the frontier of AI About OpenAI OpenAI is an AI research and deployment company
    dedicated to ensuring that general-purpose artificial intelligence benefits all
    of humanity. We push the boundaries of the capabilities of AI systems and seek
    to safely deploy them to the world through our products. AI is an extremely powerful
    tool that must be created with safety and human needs at its core, and to achieve
    our mission, we must encompass and value the many different perspectives, voices,
    and experiences that form the full spectrum of humanity. We are an equal opportunity
    employer, and we do not discriminate on the basis of race, religion, color, national
    origin, sex, sexual orientation, age, veteran status, disability, genetic information,
    or other applicable legally protected characteristic. For additional information,
    please see OpenAI’s Affirmative Action and Equal Employment Opportunity Policy
    Statement . Background checks for applicants will be administered in accordance
    with applicable law, and qualified applicants with arrest or conviction records
    will be considered for employment consistent with those laws, including the San
    Francisco Fair Chance Ordinance, the Los Angeles County Fair Chance Ordinance
    for Employers, and the California Fair Chance Act, for US-based candidates. For
    unincorporated Los Angeles County workers: we reasonably believe that criminal
    history may have a direct, adverse and negative relationship with the following
    job duties, potentially resulting in the withdrawal of a conditional offer of
    employment: protect computer hardware entrusted to you from theft, loss or damage;
    return all computer hardware in your possession (including the data contained
    therein) upon termination of employment or end of assignment; and maintain the
    confidentiality of proprietary, confidential, and non-public information. In addition,
    job duties require access to secure and protected information technology systems
    and related data security obligations. To notify OpenAI that you believe this
    job posting is non-compliant, please submit a report through this form . No response
    will be provided to inquiries unrelated to job posting compliance. We are committed
    to providing reasonable accommodations to applicants with disabilities, and requests
    can be made via this link . OpenAI Global Applicant Privacy Policy At OpenAI,
    we believe artificial intelligence has the potential to help people solve immense
    global challenges, and we want the upside of AI to be widely shared. Join us in
    shaping the future of technology.'
