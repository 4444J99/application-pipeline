  description: 'About the Team OpenAI’s mission is to ensure that general-purpose
    artificial intelligence benefits all of humanity. Our Communications team includes
    PR/media relations, employee communications, events, social media, community,
    influencer relations, and other external-facing functions. We help people understand
    our technology, values, and approach to safely building powerful AI. Our ethos
    is to communicate clearly, authentically, and with purpose, always in support
    of our mission. About the Role We’re looking for a senior communications leader
    to shape how the world understands OpenAI’s global infrastructure platform — from
    compute strategy and chip development to data centers and deployment. At the center
    of this work is a simple truth: building trusted, global infrastructure is what
    allows more people, in more places, to actually access and benefit from powerful
    AI. You will define how we tell the story of one of the largest AI infrastructure
    buildouts ever attempted — from multi-gigawatt compute expansion and chip development
    to data center construction and energy innovation. You will own both the high-level
    strategic narrative and the deep technical translation of complex engineering
    work into clear, credible storytelling. In close partnership with Infrastructure,
    Finance, and Policy leadership, you will lead communications for major infrastructure
    milestones, help explain long-range compute strategy, and position OpenAI as the
    global leader in responsible, large-scale AI infrastructure. This role reports
    to our VP of Corporate Communications and is based in San Francisco, CA. We use
    a hybrid work model of 3 days in the office per week and offer relocation assistance
    to new employees. In this role, you will: Lead infrastructure-related communications
    across OpenAI Translate complex infrastructure and engineering work into clear,
    compelling messaging for media, analysts, policymakers, and public audiences Partner
    closely with Infrastructure leadership and the Finance team on strategy, milestones,
    and investor-relevant messaging Partner with Policy Communications on sovereign
    AI, national-scale infrastructure, and government alignment Prepare infrastructure
    leaders as spokespeople and trusted expert voices You might thrive in this role
    if you have: 12+ years of professional communications experience in infrastructure,
    cloud, semiconductors, energy, or large-scale technology platforms Deep familiarity
    with at least one of the following and strong working knowledge across all: compute
