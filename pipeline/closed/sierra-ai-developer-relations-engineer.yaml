    and educating customers onto Sierra – both the Agent SDK and Agent Studio, our
    no-code platform. Lead the creation and execution of developer training and enablement
    programs. Build content that scales — including technical documentation, educational
    videos, onboarding paths, and sample repositories for SDK adoption. Develop and
    deploy AI Agents as an Agent Software Engineer, building the knowledge to become
    a world-leading expert on agent development. Work with our marketing teams to
    publish developer case studies and success stories to inspire and connect our
    growing technical community. What you''ll bring Passion for helping customers
