    better... Previous experience developing agents using open source tools like LangGraph
    or interacting with MCP servers. Familiarity with agent platforms, developer communities,
    or early-stage developer product ecosystems. Proficiency with TypeScript, and
    comfort with writing code in collaboration with agents like Claude, Codex or Cursor
    Experience collaborating across product, engineering, and go-to-market teams to
