  description: 'Help us to increase the number of successful products in the world!
    🌍 Location: We are full-remote and globally distributed! Our current team is distributed
    between GMT and GMT+2 so we currently only hire in these timezones. 🎤 Interview
    process: Read more about our interview process. 🖥️ Team: Product-led Sales 💼 Manager:
    Simon Fisher 💰 Compensation: Please check our compensation calculator . 🦔 Read
    more about how we hire and how we think about Diversity & Inclusion . About PostHog
    We''re shipping every product that companies need to run their business from their
    first day, to the day they IPO, and beyond. The operating system for folks who
    build software. We started with open-source product analytics, launched out of
    Y Combinator''s W20 cohort . We''ve since shipped more than a dozen products ,
    including: A built-in data warehouse , so users can query product and customer
    data together using custom SQL insights. A customer data platform , so they can
    send their data wherever they need with ease. PostHog AI , an AI-powered analyst
    that answers product questions, helps users find useful session recordings, and
    writes custom SQL queries. Next on the roadmap are CRM, workflow, revenue analytics,
    and support products. When we say every product that companies need to run their
    business, we really mean it! We are: Product-led . More than 100,000 companies
    have installed PostHog, mostly driven by word-of-mouth. We have intensely strong
    product-market fit. Default alive . Revenue is growing 10% MoM on average, and
    we''re very efficient. We raise money to push ambition and grow faster, not to
    keep the lights on. Well-funded. We''ve raised more than $100m from some of the
    world''s top investors . We''re set up for a long, ambitious journey. We''re focused
    on building an awesome product for end users, hiring exceptional teammates, shipping
    fast, and being as weird as possible . Things we care about Transparency: Everyone
    can read about our roadmap, how we pay (or even let go of) people, our strategy,
    and how we work, in our public company handbook . Internally, we share revenue,
    notes and slides from board meetings, and fundraising plans, so everyone has the
    context they need to make good decisions. Autonomy: We don’t tell anyone what
    to do. Everyone chooses what to work on next based on what''s going to have the
    biggest impact on our customers, and what they find interesting and motivating
    to work on. Engineers lead product teams and make product decisions . Teams are
    flexible and easy to change when needed. Shipping fast: Why not now? We want to
    build a lot of products; we can''t do that shipping at a normal pace. We''ve built
    the company around small teams – autonomous, highly-efficient groups of cracked
    engineers who can outship much larger companies because they own their products
    end-to-end. Time for building: Nothing gets shipped in a meeting. We''re a natively
    remote company. We default to async communication – PRs > Issues > Slack. Tuesdays
    and Thursdays are meeting-free days , and we prioritize heads down building time
    over perfect coordination. This will be the most productive job you''ve ever had.
    Ambition: We want to solve big problems. We strongly believe that aiming for the
    best possible upside, and sometimes missing, is better than never trying. We''re
    optimistic about what''s possible and our ability to get there. Being weird: Weird
    means redesigning an already world-class website for the 5th time. It means shipping
    literally every product that relates to customer data. It means building an objectively
    unnecessary developer toy with dubious shareholder value. Doing weird stuff is
    a competitive advantage. And it''s fun. Why we''re hiring We’re starting to do
    proserv and need somebody who is experienced in analytics who can get our customers
    up and running with PostHog super quickly to help further adoption and stickiness.
    Who we’re looking for A technical and customer-obsessed engineer to lead short-term
    projects with our biggest customers to ensure they are using PostHog according
    to recommended patterns. Customers should feel like you are an extension of their
    team, working alongside them to help them succeed with our product set. You’ll
    also need an engineering mindset - whilst most of the role is hands-on implementation
    of PostHog, we also need you to build and maintain automated tooling which will
    help us take the learnings from these high-touch engagements and apply them en
    masse to all of our managed customers. What you’ll be doing You’ll be leading
    short-term projects (both in-person and remote) with customers who are new to
    PostHog, as well as those who don’t have the bandwidth themselves to improve their
    implementation or adopt a new product. It’s your responsibility to make sure that
    the work is done efficiently and to a high standard, and that you are continuously
    learning and improving our professional services , tooling and processes along
    the way. Auditing customer PostHog implementations for correctness,'
