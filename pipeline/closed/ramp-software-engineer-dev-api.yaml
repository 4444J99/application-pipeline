  description: "About Ramp Ramp is building the smart infrastructure for finance teams,\
    \ embedded in the transaction flow of every dollar a business spends. We automate\
    \ how over $100B in annualized spend flows in and out of 50,000+ companies: authorizing\
    \ payments, flagging risk, categorizing spend, and closing books. The problems\
    \ are high-stakes, data-dense, and unforgiving. We hire people with high agency\
    \ and high urgency. We look for slope over intercept. We care less about where\
    \ you trained and more about what you\u2019ve built. At Ramp, everyone is a builder\
    \ who owns problems end to end and makes consequential decisions that shape the\
    \ outcome. The median Ramp customer saves 5% and grows revenue 16% in their first\
    \ year \u2013 far in excess of businesses operating without Ramp. We believe every\
    \ ambitious company deserves the same. If you want to build systems that directly\
    \ shape how companies move and manage billions, Ramp is the place to do it. About\
    \ the Role Ramp's Developer API team powers the programmatic interfaces for reading\
    \ and writing to Ramp, including our MCP server and agentic interfaces. Our ideal\
    \ candidate has a deep understanding of building scalable backend systems, a strong\
    \ sense of ownership, and enjoys driving projects from inception through to customer\
    \ delivery and scaling to 10s of thousands of businesses. Check out our Engineering\
    \ Blog for more on our tech stack, mission and values! What You'll Do Build and\
    \ operate Ramp\u2019s core public APIs and platform primitives that power integrations,\
    \ with a high bar for reliability, correctness, and developer experience. Ship\
    \ AI-first platform capabilities that enable safe automation and agentic workflows\
    \ (clean interfaces, permissions/guardrails, evaluation/monitoring where needed).\
    \ Lead design and execution of complex backend projects end-to-end (architecture,\
    \ implementation, rollout, monitoring) in Python, Temporal, and Postgres. Mentor\
    \ engineers and provide both technical and non-technical leadership to drive the\
    \ team and business goals forward. What You Need 5+ years of backend engineering\
    \ experience preferred Experience building APIs is nice to have Strong ownership\
    \ over delivering technical and business outcomes Desire to work in a fast-paced\
    \ environment, continuously grow, and master your craft Benefits (for U.S.-based\
    \ full-time employees) 100% medical, dental & vision insurance coverage for you\
    \ Partially covered for your dependents One Medical annual membership 401k (including\
    \ employer match on contributions made while employed by Ramp) Flexible PTO Fertility\
    \ HRA (up to $10,000 per year) Parental Leave Unlimited AI token usage Pet insurance\
    \ Centralized home-office equipment ordering for all employees Health and Wellness\
    \ stipend In-office perks: lunch, snacks, drinks, and more Budget for intra-office\
    \ travel Relocation support to NYC or SF (as needed) Referral Instructions If\
    \ you are being referred for the role, please contact that person to apply on\
    \ your behalf. Other notices Pursuant to the San Francisco Fair Chance Ordinance,\
    \ we will consider for employment qualified applicants with arrest and conviction\
    \ records. Beware of recruiting scams: Ramp will only contact you through official\
    \ @ Ramp.com email addresses and will never ask for payment or sensitive personal\
    \ information during the hiring process. Ramp Applicant Privacy Notice"
