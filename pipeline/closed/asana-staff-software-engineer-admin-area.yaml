    and smaller, daily product enhancements—thanks to our continuous deployment architecture.
    We want to create a superlative user experience, down to the smallest details.</p>
    <p>We are looking for a Staff Software Engineer to join the Admin Foundations
    team in our Vancouver Office. The team plays a vital role in developing tools
    for Administrators to manage their Asana instance at Scale while establishing
    frameworks/patterns for Asana engineers to easily create admin controls for the
    features they develop.</p> <p>Being part of this team will provide you with the
    opportunity to get a deep understanding of Asana’s administrative controls and
    permissions. This comes with an exposure to various other surfaces of the product
    that will enable you to work with different teams. You will also be working across
    different levels of our technical stack, from frontend tools like React to backend
    systems like the remote jobs framework.&nbsp;</p> <p>This role is based in our
    Vancouver office with an office-centric hybrid schedule. The standard in-office
    days are Monday, Tuesday, and Thursday. Most Asanas have the option to work from
    home on Wednesdays. Working from home on Fridays depends on the type of work you
    do and the teams with which you partner. If you're interviewing for this role,
    your recruiter will share more about the in-office requirements.</p> <p><strong>What
    you’ll achieve:</strong></p> <ul> <li>Work in a high-performance, dynamic team
    with a strong focus on velocity and software quality</li> <li>Contribute to building
    a complex SaaS application that is a market leader in its segment&nbsp;</li> <li>Work
    closely with Product Managers, Designers and Engineers to deliver delightful software
    and tools for customers to help administer their Asana instance at scale.</li>
    <li>Drive technical strategies that cross over other team surfaces and align with
