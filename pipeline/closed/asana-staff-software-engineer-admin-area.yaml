    features that will be rolled out and used in large organizations</li> </ul> <p><strong>About
    you:</strong></p> <ul> <li>Have 5+ years of software development experience with
    2+ years mentoring/coaching other engineers on impactful software projects.</li>
    <li>Experience working in ambiguous and complex technical spaces and creating
    clarity and alignment with partners and stakeholders.</li> <li>Have a track record
    of designing and implementing solutions to complex business problems. You have
    skillfully influenced and got buy-in from stakeholders and other teams to adopt/implement
    these solutions.</li> <li>Comfortable and autonomously debugging and fixing tricky
    issues in various parts of the software stack, particularly on the backend.</li>
    <li>Have a strong breath of knowledge of software concepts and design patterns
    that you can comfortably apply to make technical solutions scalable and robust.</li>
    <li>Have experience driving projects of medium to large complexity.</li> <li>You
    have a continuous improvement mindset and are never satisfied with the status
    quo, whether it's about the architecture, the code or the team's processes</li>
    <li>Demonstrates curiosity about AI tools and emerging technologies, with a willingness
    to learn and leverage them to enhance productivity, collaboration, or decision-making.</li>
    </ul> <p>At Asana, we're committed to building teams that include a variety of
