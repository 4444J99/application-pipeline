  description: '<div class="content-intro"><p>Figma is growing our team of passionate
    creatives and builders on a mission to make design accessible to all. Figma’s
    platform helps teams bring ideas to life—whether you''re brainstorming, creating
    a prototype, translating designs into code, or iterating with AI. From idea to
    product, Figma empowers teams to streamline workflows, move faster, and work together
    in real time from anywhere in the world. If you''re excited to shape the future
    of design and collaboration, join us!</p></div><div class="section page-centered">
    <p>Figma is a critical part of modern product development, where design and code
    are core primitives in how builders create, iterate, and ship products. Figma’s
    Code Platform team builds the foundational infrastructure that enables seamless
    translation between design, code, and AI-powered creation. Our work powers products
    such as AI Assistant, Make, Sites, and other Figma surfaces.</p> <p>This team’s
    and our work will be at the precipice of powering what is possible downstream
    for users to easily go between design and code. Our mission is to power the interoperability
    of design &lt;-&gt; code so it can be seamless and magical for our customers;
    but also ergonomic, scalable, and extendable for the company.</p> <p>We’re hiring
    engineers to join Code Platform to work on our core code translation infrastructure.
    This role will focus primarily on deep technical execution, and depending on level
    and experience, may also include technical leadership responsibilities such as
    architectural ownership, mentoring, and driving multi-quarter initiatives.</p>
    <p>You’ll work on systems that translate between HTML, JSX, structured design
    models, and LLM-friendly representations, directly impacting latency, correctness,
    and product velocity across Figma. This is a rare opportunity to improve and evolve
    one of the most strategically important abstractions in the company.</p> <p>This
    is a full time role that can be held from one of our US hubs or remotely in the
    United States.&nbsp;</p> <h4>What you''ll do at Figma:</h4> <ul> <li>Design, build,
    and improve code ↔ design translation pipelines</li> <li>Diagnose and resolve
    performance bottlenecks<strong> </strong>and long-running tasks that impact product
    SLAs</li> <li>Improve correctness, reconciliation, and fidelity across complex
    design system and layout edge cases</li> <li>Build scalable serialization pipelines,
    internal APIs, and platform utilities</li> <li>Partner with Figma Make, AI Assistant,
    and Sites leads to define the long term product enablement</li> <li>Improve observability
    and ownership of key metrics (latency, success rate, correctness)</li> <li>Support
    and drive architectural direction and long-term platform strategy for a translation
    surface</li> <li>Mentor engineers and shape the long-term team structure</li>
    </ul> <h4>We’d love to hear from you if you have:</h4> <ul> <li>5+ years of software
    engineering experience, especially in web, platform or infrastructure engineering</li>
    <li>Strong TypeScript/JavaScript and modern frontend fundamentals</li> <li>Deep
    experience with declarative UI systems (React, JSX, or similar)</li> <li>Familiarity
    with ASTs, code transformation, or compilation concepts</li> <li>Experience debugging
    performance, rendering, or pipeline latency issues</li> <li>Experience building
    complex, cross-team platforms with multiple stakeholder groups</li> </ul> <h4><strong>While
    it’s not required, it’s an added plus if you also have:</strong></h4> <ul> <li>Experience
    building design systems or component libraries</li> <li>Platform or infrastructure
    engineering experience (APIs, observability, SLAs)</li> <li>Rendering, layout,
    or graphics pipeline knowledge</li> <li>Experience with structured representations
    used by LLMs</li> </ul> <p>At Figma, one of our values is Grow as you go. We believe
    in hiring smart, curious people who are excited to learn and develop their skills.
    If you’re excited about this role but your past experience doesn’t align perfectly
    with the points outlined in the job description, we encourage you to apply anyways.
    You may be just the right candidate for this or other roles.</p> </div><div class="content-pay-transparency"><div
    class="pay-input"><div class="description"><p><strong><span style="font-size:
    16px;">Pay Transparency Disclosure</span></strong></p> <p>If based in Figma’s
