  description: 'About us At Sierra, we’re creating a platform to help businesses build
    better, more human customer experiences with AI. We are primarily an in-person
    company based in San Francisco, with growing offices in Atlanta, New York, London,
    Paris, Madrid, Munich, Singapore, Japan, and Sydney. We are guided by a set of
    values that are at the core of our actions and define our culture: Trust, Customer
    Obsession, Craftsmanship, Intensity, and Family. These values are the foundation
    of our work, and we are committed to upholding them in everything we do. Our co-founders
    are Bret Taylor and Clay Bavor . Bret currently serves as Board Chair of OpenAI.
    Previously, he was co-CEO of Salesforce (which had acquired the company he founded,
    Quip) and CTO of Facebook. Bret was also one of Google''s earliest product managers
    and co-creator of Google Maps. Before founding Sierra, Clay spent 18 years at
    Google, where he most recently led Google Labs. Earlier, he started and led Google’s
    AR/VR effort, Project Starline, and Google Lens. Before that, Clay led the product
    and design teams for Google Workspace. What you''ll do Build the Intelligence
    layer at Sierra. You’ll work on systems that analyze millions of agent interactions
    and generate insights that improve agent performance and customer outcomes. Turn
    conversations into insights. You’ll build systems for analyzing, clustering, and
    exploring large-scale conversational data. Enable evaluation and experimentation.
    You’ll design systems that allow us and our customers to measure agent quality
    and run experiments. Develop learning systems. You’ll work on retrieval, ranking,
    personalization, and feedback loops that make agents more effective over time.
    What you''ll bring A passion for being on the frontier of AI products. Strong
    software engineering fundamentals and experience building production systems.
    Experience working with data systems, analytics, or machine learning-driven products.
    Motivation and high-agency to drive outcomes in a fast-moving environment. 4+
    years hands-on experience building production systems or data products. Degree
    in Computer Science or related field, or equivalent professional experience. Even
    better Experience with retrieval, ranking, or recommendation systems. Experience
    building analytics or data exploration tools. Experience working with large-scale
    data systems. Experience building AI-powered products. Our values Trust: We build
    trust with our customers with our accountability, empathy, quality, and responsiveness.
    We build trust in AI by making it more accessible, safe, and useful. We build
    trust with each other by showing up for each other professionally and personally,
    creating an environment that enables all of us to do our best work. Customer Obsession:
    We deeply understand our customers’ business goals and relentlessly focus on driving
    outcomes, not just technical milestones. Everyone at the company knows and spends
    time with our customers. When our customer is having an issue, we drop everything
    and fix it. Craftsmanship: We get the details right, from the words on the page
    to the system architecture. We have good taste. When we notice something isn’t
    right, we take the time to fix it. We are proud of the products we produce. We
    continuously self-reflect to continuously self-improve. Intensity: We know we
    don’t have the luxury of patience. We play to win. We care about our product being
    the best, and when it isn’t, we fix it. When we fail, we talk about it openly
    and without blame so we succeed the next time. Family: We know that balance and
    intensity are compatible, and we model it in our actions and processes. We are
    the best technology company for parents. We support and respect each other and
    celebrate each other’s personal and professional achievements. What we offer We
