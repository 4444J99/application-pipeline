  description: '<div class="content-intro"><p>Anduril Industries is a defense technology
    company with a mission to transform U.S. and allied military capabilities with
    advanced technology. By bringing the expertise, technology, and business model
    of the 21st century’s most innovative companies to the defense industry, Anduril
    is changing how military systems are designed, built and sold. Anduril’s family
    of systems is powered by Lattice OS, an AI-powered operating system that turns
    thousands of data streams into a realtime, 3D command and control center. As the
    world enters an era of strategic competition, Anduril is committed to bringing
    cutting-edge autonomy, AI, computer vision, sensor fusion, and networking technology
    to the military in months, not years.</p></div><h3>ABOUT THE TEAM</h3> <p>Anduril’s
    Tactical Recon &amp; Strike (TRS) is a division with two missions: 1) build highly
    capable autonomous drones, and 2) build solid rocket motors at scale. We transform
    products like Ghost, Anvil, Bolt, and Altius from early concepts into fully operational
    capabilities by partnering closely with specialist engineering, operations, and
    production teams. Through our Anduril Rocket Motor Systems (RMS) team, we design
    and manufacture solid rocket motors using advanced materials, proprietary formulations,
    and high-volume production methods—delivering safe, reliable propulsion systems
    that support a wide range of mission requirements. TRS hires software engineers
    &amp; hardware engineers, who are excited to build across a diverse and powerful
    portfolio—from autonomous aerial systems to high-performance solid rocket motors.
    Our teams contribute to highly capable autonomous robotics systems and propulsion
    products that operate reliably in the most demanding mission environment.</p>
    <h3>ABOUT THE JOB</h3> <p>As a Robotics Software Engineer on our TRS team, you''ll
    be at the forefront of cutting-edge autonomous systems development. We are looking
    for a Software Engineer to help build and enhance Anvil, our autonomous kinetic
    interceptor for precise and low-collateral defeat of group 1 and 2 aerial threats.
    As an engineer on the Anvil team, you will play a pivotal role in shaping Anduril’s
    cutting edge UAS capabilities.</p> <h4><strong>WHAT YOU''LL DO</strong></h4> <ul>
    <li>Write robotics software to enhance and add new capabilities to the Anvil platform.</li>
    <li>Own feature development and rollout for our products, from design inception
    to customer deployments.</li> <li>Demonstrate experience leading projects or teams
    with the ability to inspire, mentor, and grow other engineers.</li> <li>Work closely
    with our hardware and manufacturing teams during product development, providing
    quick feedback that contributes to the final hardware design.</li> <li>Integrate
    with other air defense and platform teams within the Anduril Lattice ecosystem.</li>
    </ul> <h4><strong>REQUIRED QUALIFICATIONS</strong></h4> <ul> <li>5+ years of C++
    or Rust experience in a Linux development environment</li> <li>Strong engineering
    background from industry or academia, ideally in areas/fields such as Robotics,
    Computer Science, Software Engineering, Mechatronics, Electrical Engineering,
    Mathematics, or Physics.</li> <li>Demonstrate experience leading projects or teams
    with the ability to inspire, mentor, and grow other engineers.</li> <li>Proven
    understanding of data structures, algorithms, concurrency, and code optimization</li>
    <li>Experience troubleshooting and analyzing remotely deployed software systems</li>
    <li>Experience with data visualization and analysis in Python or Matlab</li> <li>Must
    be eligible to obtain and hold a US DoD Security Clearance.</li> </ul> <h4><strong>PREFERRED
    QUALIFICATIONS</strong></h4> <ul> <li>Experience in one or more of the following
    robotics disciplines: motion planning, perception, localization, mapping, controls,
    and related system performance metrics.</li> <li>Experience programming for embedded
    and physical devices</li> <li>Experience with Linux tools for performance analysis
    and debugging problems</li> <li>Understanding of systems software (kernel, device
    drivers, system calls) and optimizing for limited resources</li> <li>Experience
    with sensor characterization and analysis</li> </ul><div class="content-pay-transparency"><div
    class="pay-input"><div class="title">US Salary Range</div><div class="pay-range"><span>$166,000</span><span
    class="divider">&mdash;</span><span>$220,000 USD</span></div></div></div><div
    class="content-conclusion"><p><span data-contrast="auto">The salary range for
    this role is an estimate based on a wide range of compensation factors, inclusive
    of base salary only. Actual salary offer may vary based on (but not limited to)
    work experience, education and/or training, critical skills, and/or business considerations.
    Highly competitive equity grants are included in the majority of full time offers;
    and are considered part of Anduril''s total compensation package. Additionally,
    Anduril offers top-tier benefit'
