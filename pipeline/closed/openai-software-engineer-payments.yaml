    employees. In this role, you will: Architect, implement and scale core payment
    infrastructure. Build robust and extensible financial primitives to enable rapid
    iteration and support hyper-growth. Collaborate closely with internal and external
    stakeholders (e.g. Finance, GTM, Product, etc) to translate business requirements
    into clean, scalable technical systems. Demonstrate high levels of ownership to
    get changes shipped in the highly-regulated domain of payments. Create a seamless
    user experience for checkout around the world. Improve the reliability, observability
    and auditability of money movement at OpenAI. You might thrive in this role if
    you: Have 5+ years of professional experience in software engineering, ideally
