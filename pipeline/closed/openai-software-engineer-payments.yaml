    We own the user-facing payments experience, direct integrations with payment service
    providers, and other supporting infrastructure that powers checkout and payment
    flows. Payments works closely with teams across Finance, Legal, Growth, Product,
    external vendors and more to ensure our payments infrastructure scales with the
    business and supports evolving commercial goals. About the Role As a Software
    Engineer on the Payments Team, you will play a pivotal role in shaping the infrastructure
    that powers OpenAI’s financial systems. You’ll design and build core payments
    systems, partner with cross-functional teams to deliver scalable solutions, and
    ensure that our financial systems support rapid product iteration and global reach.
