  description: "Our mission is to automate coding. The first step in our journey is\
    \ to build the best tool for professional programmers, using a combination of\
    \ inventive research, design, and engineering. Our organization is very flat,\
    \ and our team is small and talent dense. We particularly like people who are\
    \ truth-seeking, passionate, and creative. We enjoy spirited debate, crazy ideas,\
    \ and shipping code. About the Role Security Software Engineers help us ship secure\
    \ products end-to-end\u2014covering enterprise security, cloud/infrastructure,\
    \ and protections embedded directly in our products. You\u2019ll build the tools\
    \ and features that safeguard our platform and editor and protect our customers.\
    \ You may be a fit if You are a strong software engineer first, with security\
    \ as your superpower. You think like both a builder and an attacker: you anticipate\
    \ vulnerabilities before they become issues. You care about developer experience,\
    \ building solutions that are secure and frictionless. You\u2019re comfortable\
    \ moving quickly, owning problems end to end, and iterating with limited guidance.\
    \ You have experience building or scaling secure systems in fast-moving environments.\
    \ You have strong opinions on secure defaults, but can balance pragmatism with\
    \ rigor. You enjoy working on small, high-talent teams where impact is magnified.\
    \ You\u2019re motivated by protecting developers and users, and you see security\
    \ as an enabler. Sample projects include Build AI augmented code review to get\
    \ involved in important systems at the right time Build a least-privilege and\
    \ JIT system for cloud access that enables engineers and enforces least privileges.\
    \ Implement a safe environment for agents to engage with code Implement a framework\
    \ for securely handling agent manipulation of user systems (e.g., MCP tool calls\
    \ and command execution). Implement a paved road for preventing inappropriate\
    \ data from being logged Applying If there appears to be a fit, we'll reach to\
    \ schedule 2-3 short technicals. After, we'll schedule an onsite in our office,\
    \ where you'll work on a small project, discuss ideas, and meet the team."
