    collaborating with Production leaders to define the hiring needs, influence process
    improvements and efficiencies, and set a high bar of talent and performance. To
    achieve this, you will be given the autonomy and tools to execute, build, and
    develop Anduril''s world class team. We are looking for someone who can handle
    every aspect of recruiting and talent mapping, excited to be part of lean and
    nimble team on one mission together, where no task is too big or too small.</p>
    <p><em><strong>This role will be hybrid in Seattle, WA. This is a 6 month contract
    with the ability to extend up to 2 years. Opportunity to be converted to a full-time
    employee based on performance, impact, and business need.&nbsp;</strong></em></p>
    <p><strong>WHAT YOU’LL DO</strong></p> <ul> <li>Act as a subject matter expert
    in prospecting techniques and tools used for information retrieval, data extraction,
    web-scraping, continuous process improvement, process automation, and candidate
    management</li> <li>Conduct interviews of potential candidates, demonstrating
    ability to anticipate hiring manager preferences through high interview-to-offer
    ratios</li> <li>Engage passive candidates using Linkedin Recruiter, Gem, Boolean
    strings, referral and SOBO campaigns</li> <li>Drive diverse talent into the organization
    ensuring a positive candidate experience at every touchpoint</li> <li>Build talent
    maps to generate market insights to inform your engagement strategy</li> <li>Represent
    the company''s brand and recruiting team internally and externally</li> <li>Leverage
    internal resources to build strategy around selling our value proposition</li>
    </ul> <p><strong>REQUIRED QUALIFICATIONS</strong></p> <ul> <li>6+ years experience
    as a high-volume sourcer for technical roles and engaging top tier talent</li>
    <li>3+ years of client interaction experience, including working with Hiring Managers
    and Directors, taking new requirements, reviewing profiles and updating pipeline
    progress</li> <li>Experience recruiting at an agency and fast-paced startup, hiring
    exempt roles for Hardware, Production, or Manufacturing Engineering</li> <li>Ability
    to be onsite/hybrid at Costa Mesa, CA office&nbsp;</li> </ul> <p><strong>PREFERRED
    QUALIFICATIONS</strong></p> <ul> <li>Experience working at an agency or fast-paced
    startup environment</li> <li>Knowledge of ITAR policies around hiring practices&nbsp;</li>
    <li>Experience acting in a consultative manner where your guidance has led to
    improved outcomes and positive candidate experiences</li> <li>Clear and effective
    communication with candidates to understand motivation, drivers, and fit within
    the organization</li> <li>Experience managing various high-volume pipelines of
    candidates and keeping track of their progress throughout the recruitment process</li>
    <li>Highly autonomous, collaborative, and adaptable</li> </ul> </div> <div class="job__pay-ranges">&nbsp;</div>
