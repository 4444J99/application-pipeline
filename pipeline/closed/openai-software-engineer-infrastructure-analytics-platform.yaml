    follow-through. You might thrive in this role if you have: A track record of owning
    operationally critical systems end to end and delivering outcomes in ambiguous
    environments. Strong hands-on experience building performance-sensitive backend
    systems in Rust or C++. Comfort working below typical service abstractions, including
    concurrency, async execution, memory behavior, serialization, I/O, networking,
