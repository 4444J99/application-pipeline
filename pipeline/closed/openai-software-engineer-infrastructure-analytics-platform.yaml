    researchers rely on - ranging from low-level infrastructure components to research-facing
    custom applications. These systems must scale with the increasing complexity and
    size of our workloads, while remaining reliable and easy to use. About the Role
    We’re looking for a staff-level software engineer to own production-critical infrastructure
    end to end. This role is centered on backend / systems engineering, with emphasis
    on low-level performance, distributed systems, and hands-on operation of critical
    services at scale. You’ll take ambiguous problems, turn them into concrete plans,
    ship pragmatic solutions quickly, and improve them through production feedback
    and iteration. This is not a general Python backend role. We’re specifically looking
    for strong systems experience in Rust or C++, especially in performance-sensitive
    infrastructure. This role is based in San Francisco, CA. We use a hybrid work
    model of 3 days in the office per week and offer relocation assistance to new
    employees. In this role, you will: Own critical infrastructure across design,
    implementation, rollout, operation, and iteration. Build and operate performant
    backend systems in Rust or C++ that support core research workflows. Design and
    improve distributed data and serving systems, including tradeoffs around partitioning,
    replication, consistency, retries, backpressure, and failure isolation. Debug
    real production bottlenecks across latency, throughput, contention, hot spots,
