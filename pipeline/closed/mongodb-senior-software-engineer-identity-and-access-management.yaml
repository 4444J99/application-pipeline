  description: '<p>The MongoDB Atlas team is a diverse group of contributors working
    together to help our users manage MongoDB at global scale. We are responsible
    for MongoDB Atlas: our database as a service offering and fastest growing product
    which allows users to deploy fault-tolerant, globally distributed MongoDB clusters
    in just minutes.</p> <p>We''re seeking a Senior Engineer to join the Atlas Identity
    and Access Management (IAM) team. IAM is a platform and a product team. We serve
    internal engineers by providing them a secure and durable suite of services, and
    we serve external customers by providing them user facing features and products.
    We are the owners of Atlas’ authentication (OAuth, SSO, Federated Identity) and
    authorization (RBAC, ABAC) systems, along with many others. The IAM team’s mission
    is to enable customers to securely build their applications with Atlas through
    our best in class user experience.</p> <p>This role can be based out of our Toronto
    office for a hybrid or in-office working model.</p> <h3>Role Responsibilities</h3>
    <ul> <li>Design, architect, build, and deliver core pieces of IAM</li> <li>Lead
    projects from specification to delivery</li> <li>Mentor and grow other team members</li>
    <li>Improve our codebase, best practices, and design principles</li> <li>Define
    your top priorities and focuses, communicate them, and execute against them</li>
    <li>Lead and contribute to complex technical projects and initiatives</li> </ul>
    <h3>Candidate Profile</h3> <ul> <li>5+ years experience of software engineering,
    primarily focused on backend systems</li> <li>Proficient in a modern compiled
    programming language (Java, Go, C#, C++, etc.)</li> <li>Willingness to learn JavaScript
    and/or TypeScript along with modern frontend technologies (React, Redux, etc.);
    prior experience a plus</li> <li>Excellent communication skills, both written
    and verbal</li> <li>Desire to collaborate with colleagues and mentor fellow engineers</li>
    <li>Is curious, collaborative, empathetic, and intellectually honest</li> <li>Has
    a passion for problem solving and learning new things in the domains of computer
    science and software engineering</li> <li>Experience building identity and access
    management systems such as authentication (OAuth, SSO), authorization (RBAC, ABAC,
    ReBAC), and login and registration systems a plus</li> </ul> <h3>Success Measures</h3>
    <ul> <li>In 1 week you''ll have completed your first pull request</li> <li>In
