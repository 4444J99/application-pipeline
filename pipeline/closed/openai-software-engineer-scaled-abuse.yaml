    expertise: we partner closely with Trust & Safety, Security, and Product to understand
    emerging attack patterns, translate messy signals into clear system behavior,
    and continuously harden our defenses. The problems are dynamic and ambiguous by
    default, so we value engineers who can quickly dive into an unfamiliar codebase,
    develop strong intuition about how it works end-to-end, and propose pragmatic
    improvements that make the entire stack more resilient. In this role, you will:
    Design and build systems for fraud detection and remediation while balancing fraud
    loss, cost of implementation, and customer experience Work closely with finance,
