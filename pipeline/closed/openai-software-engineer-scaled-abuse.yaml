    Utilize GPT-5 and future models to more effectively combat fraud and abuse You
    might thrive in this role if you: Have at least 5 years of software engineering
    experience in backend and data systems. Have at least 2 years experience in fraud
    or abuse analysis, investigation, and/or operations Can dive into our codebase,
    intuit how it works, and be able to have a strong intuition for suggestions that
    will lead us to a stronger engineering position. A voracious and intrinsic desire
