    Engineering organization identifying and responding to fraudsters on our platform.
    We are looking for a software engineer with anti fraud & abuse experience to help
    architect and build our next-generation anti-fraud systems. About the role The
    Scaled Abuse team protects OpenAI’s products and customers by detecting, preventing,
    and responding to fraudulent and abusive behavior at scale. We build and operate
    the backend and data systems that power real-time detection, investigation workflows,
    and enforcement — balancing strong protections with a great user experience as
