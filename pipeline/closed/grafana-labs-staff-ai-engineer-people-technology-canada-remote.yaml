    \ in the Alps. The instantly recognizable dashboards have been spotted everywhere\
    \ from a NASA launch and Minecraft HQ to Wimbledon and the Tour de France. Grafana\
    \ Labs also helps more than 3,000 companies -- including Bloomberg, JPMorgan Chase,\
    \ and eBay -- manage their observability strategies with the Grafana LGTM Stack,\
    \ which can be run fully managed with <a href=\"https://grafana.com/products/cloud/\"\
