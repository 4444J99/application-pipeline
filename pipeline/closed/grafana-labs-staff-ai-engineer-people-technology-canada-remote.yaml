    >Grafana Enterprise Stack</a>, both featuring scalable metrics (<a href=\"https://grafana.com/oss/mimir/\"\
    >Grafana Mimir</a>), logs (<a href=\"https://grafana.com/oss/loki/\">Grafana Loki</a>),\
    \ and traces (<a href=\"https://grafana.com/oss/tempo/\">Grafana Tempo</a>).</p>\
    \ <p>We\u2019re scaling fast and staying true to what makes us different: an open-source\
    \ legacy, a global collaborative culture, and a passion for meaningful work. Our\
    \ team thrives in an innovation-driven environment where transparency, autonomy,\
    \ and trust fuel everything we do.</p> <p>You may not meet every requirement,\
    \ and that\u2019s okay. If this role excites you, we\u2019d love you to raise\
    \ your hand for what could be a truly career-defining opportunity.</p></div><p>This\
    \ is a remote opportunity and we are looking for candidates from Canada. Residents\
    \ of Quebec are not eligible for this role.</p> <p><strong>The Opportunity</strong></p>\
    \ <p>Grafana Labs is looking for a <strong>Staff AI Engineer, People Technology</strong>\
    \ to help build the next generation of AI-powered systems that support our global\
    \ workforce and People programs. This role sits within the <strong>People Technology\
    \ team</strong>, partnering closely with People Operations, Talent Acquisition,\
    \ Enablement, Finance, and Go-to-Market teams to design intelligent workflows\
    \ and data products that improve how we hire, develop, and support Grafanistas\
    \ worldwide.</p> <p>At Grafana Labs, we believe AI should be actually useful.\
    \ Our approach to AI is grounded in solving real problems and creating practical\
    \ tools that help teams work better. As part of this philosophy, you\u2019ll apply\
    \ AI thoughtfully within our People systems, building solutions that improve how\
    \ we operate and support team members.</p> <p>As our first People Team AI Engineer,\
    \ you\u2019ll architect and implement AI-driven solutions that unlock insights\
    \ from our People data ecosystem, including BigQuery and systems such as Workday,\
    \ Greenhouse, Docebo, Tangelo, and Salesforce. Your work will focus on creating\
    \ scalable data pipelines, automation, and AI-powered workflows that drive operational\
    \ efficiency and deliver actionable insights for People leaders.</p> <p>This role\
    \ requires both technical depth and a strong understanding of data governance,\
    \ privacy, and responsible AI practices. You\u2019ll help establish standards\
    \ for anonymization, ethical AI usage, and secure handling of sensitive People\
    \ data while building systems that empower the People team to make data-informed\
    \ decisions.</p> <p>As a Staff-level engineer, you will also set technical direction,\
    \ mentor other engineers, and influence how AI is adopted and governed across\
    \ the broader organization, not just within the People team.</p> <p>This is an\
    \ opportunity to play a foundational role in shaping how AI supports the employee\
    \ lifecycle at Grafana Labs, from recruiting and onboarding to development, engagement,\
    \ and workforce planning.</p> <p><strong>What You'll Be Doing</strong></p> <p>AI\
    \ Architecture &amp; People Data Intelligence</p> <ul> <li>Design and build AI-powered\
    \ workflows, agents, and analytics tools that transform People data into actionable\
    \ insights and reduce manual processes across the People Team</li> <li>Architect\
    \ solutions that leverage BigQuery as the central data layer, integrating platforms\
    \ such as Workday, Greenhouse, Docebo, Tangelo, Salesforce, and other internal\
    \ systems</li> <li>Establish and maintain CI/CD pipelines, testing frameworks,\
    \ and observability standards for AI systems and automated workflows</li> <li>Define\
    \ prompt engineering standards, version control practices, and evaluation frameworks\
    \ for LLM-based systems operating on People data</li> <li>Partner with People\
    \ Analytics to ensure AI systems operate on well-governed, high-quality datasets\
    \ and align with established workforce metrics and data models</li> <li>Build\
    \ internal dashboards, AI assistants, or automated workflows that support reporting,\
