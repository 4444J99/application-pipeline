    to build out products like Real User Monitoring or Cloud Security Management or
    perhaps join one of our internal teams helping engineering teams ship apps quickly?
    Want to see your work actually impact and improve the product in a meaningful
    way? We’ve got you covered. Whether you’re writing a new integration, building
    data pipelines, or working with the open-source community, our early-career engineers
    are key contributors to our product.</p> <p>Datadog offers the unique opportunity
    to work on large-scale, real-time systems by engineers for engineers. Our product
    is multi-cloud and collects more than a hundred trillion events per day for 28,000+
    customers. Early-career engineers work towards the same objectives as their senior
    teammates to bring lasting impact to our products.</p> <p>We place value in our
    office culture - the relationships that it builds, the creativity it brings to
    the table, and the collaboration of being together. Our hybrid workplace ensures
    our employees can create a work-life harmony that best fits them.</p> <p>Students
    can sign up anytime for a free <a href="https://www.datadoghq.com/blog/datadog-github-student-developer-pack/"
    target="_blank">Datadog Pro account</a>!</p> <p>&nbsp;</p> <p><strong>What You’ll
    Do:</strong></p> <ul> <li>Solve a scaling bottleneck in a critical service</li>
    <li>Deploy a new feature to production and progressively roll it out with feature
    flags</li> <li>Investigate and fix a production issue from a service your team
    owns</li> <li>Create a way to optimize a service to handle more traffic at scale</li>
    <li>In partnership with your team, plan the most important projects to work on
    next</li> </ul> <p>&nbsp;</p> <p><strong>Who You Are:</strong></p> <ul> <li>You
    are in the process of receiving/have a degree in Computer Science, Software Engineering
