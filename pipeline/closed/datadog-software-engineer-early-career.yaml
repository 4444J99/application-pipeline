    a 2026 full-time start date</li> <li>You are comfortable coding in one or more
    languages&nbsp;</li> <li>You value code simplicity and performance</li> <li>You
    want to work in a fast-paced environment that values its employees and customers</li>
    <li>You are a self-starter who enjoys partnering with other engineers and solving
