    lunches on Monday, Wednesday, and Friday</li> <li>Free, global mental health benefits
    for employees and dependents age 6+</li> </ul> <p>&nbsp;</p> <p><em>Benefits and
    Growth listed above may vary based on the country of your employment and the nature
    of your employment with Datadog.</em></p> <p>&nbsp;</p> <p><strong><em>Please
    ensure that you submit your CV/resume in English. </em></strong><em>If possible,
    please apply using your personal email address instead of your university email
    address.</em></p> <p>&nbsp;</p> <p style="color: white;">#LI-Onsite</p><div class="content-conclusion"><hr>
