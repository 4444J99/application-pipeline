  description: 'Who we are is what we do. Deel is the all-in-one payroll and HR platform
    for global teams. Our vision is to unlock global opportunity for every person,
    team, and business. Built for the way the world works today, Deel combines HRIS,
    payroll, compliance, benefits, performance, and equipment management into one
    seamless platform. With AI-powered tools and a fully owned payroll infrastructure,
    Deel supports every worker type in 150+ countries—helping businesses scale smarter,
    faster, and more compliantly. Among the largest globally distributed companies
    in the world, our team of 7,000 spans more than 100 countries, speaks 74 languages,
    and brings a connected and dynamic culture that drives continuous learning and
    innovation for our customers. Why should you be part of our success story? As
    the fastest-growing Software as a Service (SaaS) company in history, Deel is transforming
    how global talent connects with world-class companies – breaking down borders
    that have traditionally limited both hiring and career opportunities. We''re not
    just building software; we''re creating the infrastructure for the future of work,
    enabling a more diverse and inclusive global economy. In 2024 alone, we paid $11.2
    billion to workers in nearly 100 currencies and provided healthcare and benefits
    to workers in 109 countries—ensuring people get paid and protected, no matter
    where they are. Our momentum is reflected in our achievements and customer satisfaction:
    CNBC Disruptor 50, Forbes Cloud 100, Deloitte Fast 500, and repeated recognition
    on Y Combinator’s top companies list – all while maintaining a 4.83 average rating
    from 15,000 reviews across G2, Trustpilot, Captera, Apple and Google. Your experience
    at Deel will be a career accelerator. At the forefront of the global work revolution,
    you''ll tackle complex challenges that impact millions of people''s working lives.
    With our momentum—backed by a $17.3 billion valuation and $1 B in Annual Recurring
    Revenue (ARR) in just over five years—you''ll drive meaningful impact while building
    expertise that makes you a sought-after leader in the transformation of global
    work. Team Lead About the Team At the core of Deel’s FinTech platform, responsible
    for building and operating client and contractor wallets across our regulated
    entities globally. This is a mission-critical domain where accuracy, compliance,
    and reliability are non-negotiable. Scope & Responsibilities Lead the fintech
    engineering team to design, build, and scale wallet infrastructure for global
    deel''s users. Work with different teams to integrate wallets with regional banks
    through PSPs (via APIs), orchestrating pay-ins and ensuring seamless treasury
    operations. Depending on the project, you may collaborate with the Core Accounting
    team to connect wallets with the General Ledger (GL), ensuring balances are accurate
    and financial records meet audit standards. Work closely with Compliance, Treasury,
    and PSP Integration teams to ensure adherence to local regulations (MTL, PI, safeguarding
    requirements). Provide technical leadership in a global, fast-paced environment
    where uptime and precision are critical. Responsible for leading a high-performing
    engineering team, including running daily stand-ups, planning sessions, and backlog
    grooming. What We’re Looking For Location : Based in EMEA, with high availability
    for global collaboration. Background : Proven experience as a Team Lead or Manager
    in payments, banking, accounting, or treasury. FinTech Expertise : Hands-on wallets,
    flows of funds, compliance, and regulated money movement. Prior experience at
    companies like Wise, PayPal, or similar is a strong plus. Technical Skills : JavaScript/Node.js
    PostgreSQL with Sequelize ORM Strong understanding of distributed systems and
    API-driven banking/PSP integrations Leadership : Ability to run projects at scale,
    mentor engineers, and drive cross-functional alignment. Mindset : Ownership, detail-oriented,
    and mindful of the responsibility of managing other people’s money. Important
    note: This role will remain technically hands-on, with responsibilities divided
    between people management and hands-on tasks. Why This Role Matters This team
    is the foundation of Deel’s regulated money movement. The work ensures client
    funds are safe, compliant, and seamlessly accessible worldwide Total Rewards Our
    workforce deserves fair and competitive pay that meets them where they are. With
    scalable benefits, rewards, and perks, our total rewards programs reflect our
    commitment to inclusivity and access for all. Some things you’ll enjoy Stock grant
    opportunities dependent on your role, employment status and location Additional
    perks and benefits based on your employment status and country The flexibility
    of remote work, including optional WeWork access At Deel, we’re an equal-opportunity
    employer that values diversity and positively encourage applications from suitably
    qualified and eligible candidates regardless of race, religion, sex, national
    origin, gen'
