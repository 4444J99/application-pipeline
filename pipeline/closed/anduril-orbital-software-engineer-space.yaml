    to address growing threats in space and ensure our Guardians maintain a decisive
    advantage in this contested warfighting domain.</p> <h3>ABOUT THE JOB</h3> <p>As
    an Orbital Software Engineer on Space, you will contribute to the architecture
    and deployment of software solutions that support specific customer missions for
    on-orbit spacecraft operations and mission management. As a software engineer,
    you will provide guidance and oversight to a team developing modular capabilities
    to support the DoD and IC customers across the space domain. This will involve
    architecture of an orbital software system in coordination with the Anduril Lattice
    software platform team, algorithms, techniques and coding development to support
