    blocks our customers use to embed Sierra’s chat and voice agents into their mobile
    apps. You’ll be the technical lead for how Sierra shows up on mobile: UI surfaces,
    animations, voice interactions, performance, and deep operating-system integrations.
    You’ll work closely with design and our web frontend team to make the mobile experience
    feel as considered and cohesive as our core product. What you’ll do Own the mobile
    Experience SDKs for iOS and Android. Lead the architecture, implementation, and
    evolution of our native SDKs that embed Sierra chat and voice agents into customer
    apps. Make them a joy to integrate for other engineers and a delight to use for
    end users. Deepen OS-level integrations and interactions. Push into platform-native
    capabilities: notifications, background execution, voice and audio routing, app
    extensions, system share sheets, in-app attachments, deep links, and other operating-system
    surfaces that make agents feel truly “at home” on each platform. Design and ship
    best-in-class mobile interfaces. Work hand-in-hand with our design team to translate
    Figma concepts into fluid, responsive mobile experiences. Sweat the details on
    motion, gesture handling, transitions, and accessibility so the agent feels fast,
    natural, and trustworthy on every device. Create a robust SDK developer experience.
    Define clear APIs, documentation, and sample apps that make it simple for customer
    engineering teams to integrate Sierra. Focus on stability, versioning, upgrade
    paths, and metrics so that our mobile surfaces are as reliable as they are beautiful.
    Collaborate tightly with web frontend and product teams. Partner with our React/TypeScript
    frontend engineers to keep interactions, visual language, and behavior coherent
    across web and mobile. Work closely with product and PMM to bring new agent features
    to mobile in a way that feels native to each platform. Champion quality, performance,
    and craftsmanship. Set the bar for mobile engineering quality at Sierra: smooth
    animations, low latency, resilient offline behavior, and thoughtful error states.
    Instrument and profile the experience, then iterate to keep it fast and reliable
    at scale. Work across the stack when needed. While your center of gravity will
    be Swift and/or Kotlin, you’ll occasionally dip into backend services (Go, GraphQL)
    or frontend code to unblock features or fine-tune end-to-end flows, working with
    the broader Product Engineering team. What you’ll bring Deep mobile engineering
    expertise. Significant experience (typically 6–10+ years) building high-quality
    native mobile apps or SDKs on iOS (Swift) and/or Android (Kotlin). You’ve shipped
    production code used by large numbers of users and have the scars and judgment
    that come with that. Strong SDK and API design instincts. You’ve built or maintained
    SDKs, libraries, or shared frameworks before. You care about clean API surfaces,
    versioning, and backward compatibility, and you empathize with external developers
    trying to integrate your work. Product and UX sensitivity. You have a good feel
    for interaction design and visual quality. You notice details like animation timing,
    gesture ergonomics, and accessibility, and you’re willing to iterate with design
    until the experience feels “just right.” This lines up strongly with our value
    of craftsmanship. High-bandwidth collaboration. You communicate clearly with designers,
    product managers, and other engineers. You can walk through tradeoffs, explain
    constraints, and adjust plans quickly as we learn from customers. Strong sense
    of ownership. You’re comfortable owning big areas end to end, from rough concept
    through launch and iteration. You’ve thrived in fast-moving environments, can
    operate with limited structure, and care about shipping meaningful improvements
    quickly wit'
