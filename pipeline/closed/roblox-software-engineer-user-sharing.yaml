    projects (1–3 months) with guidance, from design to launch and iteration</li>
    <li>Improve existing systems by identifying inefficiencies and contributing to
    reliability, performance, and scalability</li> <li>Write clean, maintainable,
    and well-tested code, and contribute actively to code reviews</li> <li>Collaborate
    closely with cross-functional partners (product, design, data) to deliver high-quality
    features</li> <li>Document technical decisions and communicate clearly with teammates
