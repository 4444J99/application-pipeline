    and discover content across Roblox.&nbsp;This includes bringing moments (experiences)
    directly to the homepage driving game discovery, user engagement and retention
    through content sharing.</p> <p><strong>You Have:</strong></p> <ul> <li>1–3 years
    of experience building software systems (internships or industry experience)</li>
    <li>Strong coding fundamentals in one or more languages such as C++, C#, Java,
    TypeScript, or similar</li> <li>Experience working on either frontend (e.g., React,
    UI systems) or backend (e.g., APIs, services)</li> <li>Basic understanding of
    system design concepts (e.g., APIs, data storage, scalability)</li> <li>Ability
    to break down problems and deliver solutions with increasing autonomy</li> <li>Good
    communication skills and willingness to collaborate with cross-functional partners</li>
    <li>A growth mindset and eagerness to learn from feedback</li> </ul> <p><strong>You
    Will:</strong></p> <ul> <li>Build and ship user-facing features and backend services
