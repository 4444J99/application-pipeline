  description: Infrastructure Engineer for Browser Development builds reliable, automated,
    and scalable infrastructure for Chromium-based browser teams. This role focuses
    on CI/CD pipelines, monitoring, and development environments to support fast-paced
    browser innovation. Responsibilities Set up and maintain CI/CD pipelines for builds
    and testing (TeamCity, Jenkins, etc.). Support and evolve Chromium browser development
    infrastructure (k8s, terraform, ansible). Configure monitoring and alerting systems
    (Sentry, Datadog). Manage cloud infrastructure (AWS), Linux servers, and virtual
    environments. Develop automation scripts in Bash, Python, and Go. Ensure high
    availability, resilience, and security of development infrastructure. Collaborate
    with developers to optimize workflows and resolve incidents. Requirements 3+ years
    in software development infrastructure, preferably Chromium browsers. Hands-on
    DevOps and SRE experience, including monitoring and incident management. Proficiency
    in k8s, Terraform, Datadog, Sentry, AWS, Unix, TeamCity Strong CI/CD implementation
    skills. Ability to thrive in Agile teams with excellent communication. What We
    Offer Join Comet, Perplexity's young, fast-growing Chromium-based browser. Office
    work in Belgrade or remote (European time zone preferred). Dynamic team with growth
    and learning opportunities.
