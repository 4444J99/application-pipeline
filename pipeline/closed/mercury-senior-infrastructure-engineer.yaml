    high availability and monitor system health.</li> <li><strong>Version Control
    and CI/CD</strong>: Manage code and automate deployments using GitHub &amp; GitHub
    Actions.</li> </ul> <p>As we gear up for the next stages of Mercury''s growth,
    you will:</p> <ul> <li>Build our “Infrastructure Platform” to support the growing
