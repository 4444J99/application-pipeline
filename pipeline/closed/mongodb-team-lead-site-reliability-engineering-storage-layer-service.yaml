    distributed storage services that both enhance today’s Atlas storage stack and
    enable more customer workloads to run more efficiently.</p> <p>As the Lead Site
    Reliability Engineer for SLS, you will partner with the teams building these storage
    services to define SLOs, shape capacity plans, and ensure the reliability, durability,
    and operational safety of the storage layer that underpins Atlas. You’ll help
    grow and lead a small, senior team of SREs as founding members of this organization,
    playing a crucial role in executing on a multi-year roadmap for MongoDB’s cloud
    storage architecture.</p> <p>We''re looking to speak with candidates based in
    Ireland.</p> <h3>Responsibilities</h3> <ul> <li>Build and lead a team of 6-8 engineers,
    fostering a positive culture, handling career growth and performance conversations,
    and proactively removing blockers</li> <li>Define and drive a clear technical
    vision and comprehensive roadmap for our multi-tenant distributed storage systems,
    balancing long-term strategic infrastructure goals with immediate engineering
    needs</li> <li>Contribute through hands-on technical work, such as leading architectural
    design reviews, reviewing PRs, and stepping in to guide the team through complex
    operational challenges</li> <li>Act as the primary liaison for the Storage Layer
    Services SRE team, collaborating closely with other engineering leaders to ensure
    platform alignment and manage stakeholder expectations</li> </ul> <h3>You may
    be a good fit if you</h3> <ul> <li>Have 10+ years of experience working on software
    and operating distributed systems, with 2+ years managing engineering teams</li>
    <li>Possess a customer-focused mindset, treating internal developers as your primary
    users</li> <li>Value efficiency in processes and operations, and have a track
    record of optimizing team workflows</li> <li>Prefer automation over manual processes,
    fostering a culture of building software solutions to eliminate toil</li> <li>Have
    deep technical familiarity with Kubernetes ecosystems, containerization technologies,
    and modern IaC tooling (e.g., Terraform, Crossplane, or Operators) so you can
    effectively guide the team''s technical decisions</li> <li>Have operated or supported
    stateful storage or database systems at scale and are comfortable with durability,
    consistency and recovery trade-offs</li> <li>Excel at translating complex business
    and engineering requirements into actionable, phased technical roadmaps</li> <li>Have
    a high level of empathy, responsibility, ownership, and accountability</li> <li>Excellent
    verbal and written technical communication skills</li> </ul> <h3>Strong candidates
    may also have experience with</h3> <ul> <li>Leading major architectural shifts,
    such as moving from legacy storage stacks to new multi-tenant storage architectures,
    including planning and executing large-scale data and workload migrations with
    tight availability and durability requirements</li> <li>Managing and scaling infrastructure
    across multi-cloud environments (AWS, GCP, or Azure)</li> <li>Designing secure,
    multi-tenant runtime environments at scale</li> </ul> <h3>About MongoDB</h3> <p>MongoDB
    is built for change, empowering our customers and our people to innovate at the
    speed of the market. We have redefined the database for the AI era, enabling innovators
    to create, transform, and disrupt industries with software. MongoDB’s unified
    database platform, the most widely available, globally distributed database on
    the market, helps organizations modernize legacy workloads, embrace innovation,
    and unleash AI. Our cloud-native platform, MongoDB Atlas, is the only globally
    distributed, multi-cloud database and is available across AWS, Google Cloud, and
    Microsoft Azure.</p> <p>With offices worldwide and over 60,000 customers, including
    75% of the Fortune 100 and AI-native startups, relying on MongoDB for their most
    important applications, we’re powering the next era of software.</p> <p>Our compass
    at MongoDB is our <a href="https://www.mongodb.com/company">Leadership Commitment,</a>
    guiding how and why we make decisions, show up for each other, and win. It’s what
    makes us MongoDB.&nbsp;</p> <p>To drive the personal growth and business impact
    of our employees, we’re committed to developing a supportive and enriching culture
    for everyone. <a href="https://www.mongodb.com/company/blog/culture/employee-benefits-that-make-a-difference-at-mongodb">From
    employee affinity groups, to fertility assistance and a generous parental leave
    policy</a>, we value our employees’ wellbeing and want to support them along every
    step of their professional and personal journeys.<a href="https://www.mongodb.com/blog/channel/culture">
    Learn more about what it’s like to work at MongoDB</a>, and help '
