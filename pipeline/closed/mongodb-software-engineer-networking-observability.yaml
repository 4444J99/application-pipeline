    delivering and deploying a product with cross-team stakeholders</li> <li>Solid
    computer science fundamentals, with strong competencies in data structures, algorithms,
    and software design/architecture</li> <li>Hands-on experience with building production-level
    code. Experience in C++ is required</li> <li>Interest in furthering their knowledge
    of networking, observability and how computer architecture and internals impact
    the availability</li> <li>Solid verbal and written communication skills and highly
