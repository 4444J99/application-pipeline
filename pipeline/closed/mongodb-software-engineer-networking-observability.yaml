    these processes, and their communication, easily observable. Networking Observability’s
    responsibilities include improving MongoDB networking, improving the efficiency
    of resource utilization, and building low-overhead observability features.</p>
    <p>Our team includes engineers located in New York City and fully remote engineers.
    We operate close to the bottom of the stack, and have a lot of influence over
    the availability, performance, and robustness of our open source database as well
    as the development efficiency of the engineering team overall. Recently we’ve
    worked on POCs and performance tests for new architectural directions in our networking
    stack, and are integrating OpenTelemetry to accelerate investigation of issues
    and integrate with a wider ecosystem of observability tooling.</p> <p>Are you
    excited to help the MongoDB engineering team build a better database? We are!
    Join us today, and we can build a faster, more reliable, exceptionally observable,
    database system together.</p> <p>Note: This role can be based out of our NYC office
    or remotely from anywhere in North America.</p> <h3>Candidate Profile</h3> <ul>
