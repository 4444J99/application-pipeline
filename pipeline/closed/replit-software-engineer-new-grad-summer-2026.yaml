    to application creation. About the role: As a New Grad Software Engineer, you''ll
    join a team of exceptional builders working on products that are reshaping how
    the world creates software. You''ll have the opportunity to work on everything
    from our AI-powered development platform to the distributed systems that enable
    real-time collaboration for millions of developers. This is a chance to define
    your career while defining the future of software development. You''ll work on
    problems that matter, with the autonomy to drive solutions and the support to
    grow into a technical leader. What you will build: Product features that delight
    users and make it possible for anybody to create software AI coding agent that
    understands intent and generates production-ready applications Cloud infrastructure
    that provides instant, powerful development environments at global scale Platform
    features that enable one click deployments and scale to millions of users Required
    skills and experience: Recent graduate (2024-2026) with a degree in Computer Science,
    Computer Engineering, or related field Strong programming skills in a modern language
    (JavaScript/TypeScript, Python, Go, Rust) Full-stack capabilities with experience
    in React, Node.js, and database technologies Growth orientation - eager to learn
    new technologies and take on increasing responsibility Collaborative spirit -
    you work well in cross-functional teams and value diverse perspectives What we
    value : Problem-solving mindset: Ability to approach complex operational challenges
    systematically and devise effective solutions Self-directed and autonomous: Capable
    of working independently while collaborating effectively with cross-functional
    teams Strong communication skills: Ability to explain complex technical concepts
    to both technical and non-technical audiences Continuous learning: Passion for
    staying current with industry best practices and new technologies Focus on automation:
    Strong belief in automating repetitive tasks and building self-healing systems
    This is a full-time role that can be held from our Foster City, CA office. The
    hybrid role has an in-office requirement of Monday, Wednesday, and Friday Full-Time
    Employee Benefits Include: 💰 Competitive Salary & Equity 💹 401(k) Program with
    a 4% match ⚕️ Health, Dental, Vision and Life Insurance 🩼 Short Term and Long
    Term Disability 🚼 Paid Parental, Medical, Caregiver Leave 🚗 Commuter Benefits
    📱 Monthly Wellness Stipend 🧑‍💻 Autonomous Work Environment 🖥 In Office Set-Up
    Reimbursement 🏝 Flexible Time Off (FTO) + Holidays 🚀 Quarterly Team Gatherings
    ☕ In Office Amenities Want to learn more about what we are up to? Meet the Replit
    Agent Replit: Make an app for that Replit Blog Amjad TED Talk Interviewing + Culture
    at Replit Operating Principles Reasons not to work at Replit To achieve our mission
    of making programming more accessible around the world, we need our team to be
    representative of the world. We welcome your unique perspective and experiences
    in shaping this product. We encourage people from all kinds of backgrounds to
    apply, including and especially candidates from underrepresented and non-traditional
    backgrounds.'
