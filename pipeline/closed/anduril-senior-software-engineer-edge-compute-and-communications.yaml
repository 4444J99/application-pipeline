  description: <div class="content-intro"><p>Anduril Industries is a defense technology
    company with a mission to transform U.S. and allied military capabilities with
    advanced technology. By bringing the expertise, technology, and business model
    of the 21st century’s most innovative companies to the defense industry, Anduril
    is changing how military systems are designed, built and sold. Anduril’s family
    of systems is powered by Lattice OS, an AI-powered operating system that turns
    thousands of data streams into a realtime, 3D command and control center. As the
    world enters an era of strategic competition, Anduril is committed to bringing
    cutting-edge autonomy, AI, computer vision, sensor fusion, and networking technology
    to the military in months, not years.</p></div><p><u><strong>ABOUT THE TEAM</strong></u><br>Anduril
    Software Engineers in the Connected Warfare (CW) Division build, deploy, integrate,
    extend, and scale Anduril's software on hardware systems to deliver mission-critical
    capabilities to our customers at the tactical edge. As the software engineers
    closest to customers/end-users, Mission Software Engineers solve technical challenges
    of operational scenarios while owning the end-to-end delivery of winning capabilities.<br><br>As
    a Senior Software Engineer<strong> </strong>on the<strong> ECC</strong> Engineering<strong>
    </strong>team, you will contribute to the creation of new products, features,
    and solutions to address a wide variety of customer problems involving software,
    hardware, networking, autonomy/robotics, systems integration, and more. Your efforts
    will ensure that Anduril products seamlessly work together to achieve a variety
    of critical outcomes. Above all, Mission Software Engineers are driven by a “Whatever
    It Takes” mindset—executing in an <em>expedient</em>, <em>scalable</em>, and <em>methodical</em>
    way while keeping the mission top-of-mind and making sound engineering decisions
    to deliver successful outcomes correctly, on-time, and with high quality. You
    will work on products like the Menace Family of Systems to bring integrated C4
    capabilities to the tactical edge. <br><br>We are working on cutting edge, complex
    systems that must deliver critical capability on aggressive timelines to outmatch
    the pacing threats and empower our customers with commercial style technologies
    that they can immediately use for defense. We are looking for talented, organized,
    growth mindset, Software Engineers who appreciate ownership, autonomy, and direct
    customer engagement when designing, architecting, building and collaborating with
    our software, hardware, operations, SRE, and business development teams to exceed
    customer expectations and bring new products and capabilities to market. <br><br><strong>WHAT
    YOU’LL DO</strong></p> <ul> <li>You will work closely with Product Managers, Business
    Development, and other engineering teams (internal and external), executing on
    our SDLC process from concept, development, production and fielding.</li> <li>Own
    areas of the ECC software solution that are deployed to customers</li> <li>Build
    scalable systems</li> <li>Write code to improve products and scale the mission
    capability to more customers</li> <li>Collaborate across multiple teams to plan,
    build, and test complex functionality</li> <li>Create and analyze metrics that
    are leveraged for debugging and monitoring</li> <li>Triage issues, root cause
    failures, and coordinate next-steps</li> <li>Partner with end-users to turn needs
    into features while balancing user experience with engineering constraints</li>
    <li>Travel up to 30% of time to build, test, and deploy capabilities in the real
    world</li> <li>Brief executives (internal and external) and high ranking officials</li>
    </ul> <p><strong>REQUIRED QUALIFICATIONS&nbsp;</strong></p> <ul> <li>Strong engineering
    background from industry or school, ideally in areas/fields such as Computer Science,
    Software Engineering, Mathematics, or Physics</li> <li>4+ years working with a
    variety of programming languages such as Java, Python, C++, Rust, Go, JavaScript,
    etc.</li> <li>Experience working with Linux and/or Nix/NixOS.</li> <li>Experience
    building software solutions involving hardware integrations</li> <li>Experience
    building scalable solutions on edge infrastructure</li> <li>Ability to quickly
    understand and navigate complex systems and established code bases</li> <li>Passionate
    about working on critical software that has a real-world impact</li> <li>Be data
    driven and customer outcomes focused</li> <li>Experience using AGILE methodologies
    and execution</li> </ul> <p><strong>PREFERRED QUALIFICATIONS (No minimum requirements,
    maximum ~5-6 bullet points)</strong></p> <ul> <li>Computer Science or Computer
    Engineering or equivalent degrees</li> <li>Prior military service/contractor experience
    working with edge computing and tactical networking</li> <li>Experience at technology
    startups</li> <li>TS/SCI active or eligible</li> </ul><div class="content-pay-transparency"><div
