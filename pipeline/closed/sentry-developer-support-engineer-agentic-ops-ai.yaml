    You will engage with our users across GitHub, Discord, and our support systems,
    while also acting as the product owner for our AI Agents. You ensure that when
    a developer asks a complex question, our AI has the right context, the right data,
    and a seamless "Human-in-the-Loop" path to you when deep expertise is required.
    We’re looking for a coder who is passionate about both customer experience and
    the cutting edge of Agentic Operations. You will drive success by scaling our
