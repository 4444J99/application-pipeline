    SaaS problems. Strong Coding Foundations: Proficiency in Python, JavaScript, or
    Ruby. You should be comfortable reading SDK source code and reproducing bugs.
    Modern Dev Stack Knowledge: Deep understanding of CI/CD, APIs, microservices,
