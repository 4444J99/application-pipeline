  description: 'About the Team Identity is the foundation of trust in an AI-powered
    world. As people build a rich personal and organizational context in ChatGPT,
    they need systems that protect it, remember it, and let them share it securely
    across apps and agents. Without strong identity, context stays locked away or
    exposed. With it, AI becomes safe, personal, and truly useful, empowering users
    while keeping control firmly in their hands. Our team builds the trusted OpenAI
    account layer that connects people, enterprises, developers, and agents to OpenAI
    apps and the broader AI ecosystem. About the Role As a Senior Software Engineer
    on the Identity team, you will build and evolve the foundational identity platform
    that serves all OpenAI users across our products. You’ll lead the design and implementation
    of core identity systems — including authentication, authorization, access control,
    and account management — enabling individuals, teams, and businesses to securely
    manage accounts at scale while keeping the user experience seamless. This role
    spans our entire product fleet, including ChatGPT, the API, Sora, Codex, and Atlas,
    and involves close collaboration with product and platform engineers who rely
    on identity as critical infrastructure. You’ll drive major architectural initiatives,
    mentor other engineers, and make platform-level decisions where security, correctness,
    and reliability are paramount. In this role, you will: Architect and build the
    next generation of Identity at OpenAI – including new use cases such as Agent
    identity and Sign In With ChatGPT Design and build our identity infrastructure
    for consumer internet scale, while also solving scalability bottlenecks as they
    arise. Build powerful identity primitives, APIs, and internal tooling that enable
    product teams across OpenAI to integrate seamlessly with the account and access-control
    layer. Collaborate closely with a broad set of stakeholders, including product,
    design, go-to-market, and other engineers. You might thrive in this role if you:
    Bring 7+ years of experience building and shipping production systems at product-driven
    technology companies, with a track record of owning meaningful technical scope.
    Care deeply about reliability, safety, and performance in production environments.
    Have experience or interest in Authentication, Authorization, Federation, and
    Identity Management. Naturally take ownership end-to-end, are comfortable navigating
    unfamiliar systems, and are eager to learn whatever’s needed to solve hard problems
    well. Thrive in fast-moving environments, bringing structure to ambiguous problems,
    balancing competing priorities, and making sound tradeoffs as the company and
    platform evolve. About OpenAI OpenAI is an AI research and deployment company
    dedicated to ensuring that general-purpose artificial intelligence benefits all
    of humanity. We push the boundaries of the capabilities of AI systems and seek
    to safely deploy them to the world through our products. AI is an extremely powerful
    tool that must be created with safety and human needs at its core, and to achieve
    our mission, we must encompass and value the many different perspectives, voices,
    and experiences that form the full spectrum of humanity. We are an equal opportunity
    employer, and we do not discriminate on the basis of race, religion, color, national
    origin, sex, sexual orientation, age, veteran status, disability, genetic information,
    or other applicable legally protected characteristic. For additional information,
    please see OpenAI’s Affirmative Action and Equal Employment Opportunity Policy
    Statement . Background checks for applicants will be administered in accordance
    with applicable law, and qualified applicants with arrest or conviction records
    will be considered for employment consistent with those laws, including the San
    Francisco Fair Chance Ordinance, the Los Angeles County Fair Chance Ordinance
    for Employers, and the California Fair Chance Act, for US-based candidates. For
    unincorporated Los Angeles County workers: we reasonably believe that criminal
    history may have a direct, adverse and negative relationship with the following
    job duties, potentially resulting in the withdrawal of a conditional offer of
    employment: protect computer hardware entrusted to you from theft, loss or damage;
    return all computer hardware in your possession (including the data contained
    therein) upon termination of employment or end of assignment; and maintain the
    confidentiality of proprietary, confidential, and non-public information. In addition,
    job duties require access to secure and protected information technology systems
    and related data security obligations. To notify OpenAI that you believe this
    job posting is non-compliant, please submit a report through this form . No response
    will be provided to inquiries unrelated to job posting compliance. We are committed
    to providing reasonable accommodations to applicants with disabilities, and requests
    can be made via this link . OpenAI '
