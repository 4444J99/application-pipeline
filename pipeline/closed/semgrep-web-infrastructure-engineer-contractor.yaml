    \ and modernize the infrastructure behind our website semgrep.dev . This project\
    \ focuses on simplifying and strengthening our website\u2019s deployment pipeline\
    \ to reduce downtime during deployments, improve reliability, and enable faster,\
    \ more predictable content publishing, while ensuring the marketing website operates\
    \ independently from the product application so new URLs and pages can be added\
    \ without requiring Infrastructure\u2019s involvement. You will work closely with\
