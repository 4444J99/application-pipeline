    \ S3, AWS, Kubernetes, and proxy layers for improved stability and performance.\
    \ At the end of this engagement, semgrep.dev will have a more reliable deployment\
    \ process where: The Web Development team can deploy and push changes to production\
    \ without taking down the CMS or disrupting ongoing content work. Content updates\
    \ can be published instantly and automatically through a simplified deployment\
    \ flow. New URLs and pages can be added to the marketing site without Infrastructure\
    \ support. What you\u2019ll do Scope and assess the current marketing site and\
    \ product application setup to identify dependencies, bottlenecks, and improvement\
    \ areas. Research and propose infrastructure solutions and optimization strategies\
    \ to simplify deployments and improve scalability. Develop a detailed execution\
    \ plan outlining milestones, architectural updates, and rollout phases. Eliminate\
    \ CMS downtime during deployments by improving Statamic\u2019s build and publish\
    \ flow. Ensure the marketing site operates independently from the product application\
    \ so new URLs and pages can be added without Infrastructure involvement. Redesign\
    \ the deployment pipeline with Infrastructure to enable faster, more reliable\
    \ content releases Review and optimize AWS (S3, CloudFront, EKS/Kubernetes) configurations\
    \ to support the new architecture. Partner with Marketing, Infrastructure, and\
    \ Engineering teams to ensure performance, security, and monitoring best practices\
    \ are implemented. You are ideal for this role if you have 5+ years of experience\
    \ in web infrastructure or DevOps roles with strong focus on deployment automation\
    \ and CI/CD systems. Expertise with AWS services (S3, CloudFront, EC2/ECS, Lambda,\
    \ Route53, etc.). Hands-on experience with Kubernetes, Docker, and containerized\
    \ deployment workflows. Deep understanding of CI/CD pipelines and experience improving\
    \ deployment processes for static or hybrid sites. Familiarity with static site\
    \ generators or CMS-driven sites (Statamic, Laravel, or similar frameworks a plus).\
    \ Strong knowledge of Git, branching strategies, and repository management. Comfort\
    \ working in cross-functional environments across Marketing, Infrastructure, and\
    \ Engineering. Excellent written documentation and communication skills. Bonus\
    \ Points For: Understanding of CDN caching, proxy routing, and build optimization\
    \ techniques. Familiarity with Netlify or other static site hosting workflows.\
    \ Compensation Contract hourly range: $80-$100 per hour, up to 40 hours a week\
