    \ lives where developers work, delivering fixes without breaking flow, and giving\
    \ security teams visibility, control, and confidence. Semgrep gets smarter as\
    \ you build, with AI that learns your context to cut false positives and prioritize\
    \ reachable vulnerabilities, validated by 95% of security reviewers across 6M+\
    \ findings. Semgrep makes zero false positives a reality with AppSec teams triaging\
