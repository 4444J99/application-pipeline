    workflows, reduce friction, and create a tight feedback loop with product leadership.</p>
    <h3>What You’ll Do</h3> <ul> <li>Lead the design, build, and evolution of internal
    engineering tooling that improves builder flow and reduces friction across the
    company.</li> <li>Define best practices and drive adoption of AI agentic coding
    tools through guidance, automation, and hands-on enablement.</li> <li>Architect,
    develop, and operate internally facing agents that scale across teams and use
    cases.</li> <li>Own and continuously improve developer workflows, including guardrails,
    evaluation frameworks, and guidance that enables safe and effective adoption of
    new tooling.</li> <li>Own the strategy, development, and operation of our internal
    agent platform, setting direction and ensuring reliability and scalability.</li>
    <li>Partner closely with stakeholders across Engineering, Product, Sales, and
    G&amp;A to identify high-impact opportunities where AI can accelerate work and
    improve outcomes.</li> <li>Establish and drive measurement and feedback loops
    (usage, reliability, cost, and cycle time) to quantify impact, inform prioritization,
    and guide iteration.</li> <li>Create and maintain clear documentation, playbooks,
    and enablement materials, and proactively drive adoption of paved roads across
    the organization.</li> <li>Mentor and support engineers on the team, raising the
    bar on technical design, execution, and use of AI-enabled tooling.</li> <li>Participate
    in on-call rotation, while identifying and driving improvements that reduce operational
    burden and improve the internal user experience.</li> </ul> <h3>What You’ll Bring</h3>
    <ul> <li>Strong software engineering fundamentals and a track record of leading
    the design, delivery, and operation of production-quality internal platforms or
    developer tooling.</li> <li>Experience leveraging modern agentic coding tools
    such as Codex and Claude Code, including defining best practices and driving adoption
    across teams.</li> <li>Proficiency in one or more programming languages commonly
    used at Temporal, such as Go, TypeScript/JavaScript, Python, or Java, with the
    ability to make pragmatic, high-leverage technical decisions.</li> <li>Experience
    architecting and scaling workflow automation or internal tools (CLI tools, services,
    GitHub automation, cloud automation, or similar) used across teams or the organization.</li>
    <li>Strong judgment about when to standardize versus when to enable flexibility,
    and how to remove friction without compromising reliability, security, or long-term
    maintainability.</li> <li>Comfort leading cross-functional collaboration, including
    partnering with non-traditional developers and translating ambiguous needs into
    scalable, well-adopted solutions.</li> <li>Ability to use data and qualitative
    feedback together to define success metrics, prioritize effectively, and measure
    impact.</li> <li>Clear written communication, including documentation that enables
    self-service and scales knowledge across teams.</li> </ul> <h3>Nice to Haves</h3>
    <ul> <li>Experience building internal agents and operating an agent platform</li>
