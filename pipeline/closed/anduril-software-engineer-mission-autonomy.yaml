    and navigate complex systems and established code bases.</li> <li>A desire to
    work on critical software that has a real-world impact.</li> <li>A bias for action,
    extreme ownership, and the drive to see projects through from concept to production.</li>
    <li>Eligible to obtain and maintain an active UKSV Security Clearance</li> </ul>
