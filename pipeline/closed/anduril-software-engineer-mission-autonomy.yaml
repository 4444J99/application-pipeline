    shape the future of the battlefield. We build Software services and Autonomy algorithms
    that solve some of the hardest problems facing our customers.<br><br>As a Mission
    Software Engineer<strong> </strong>on the<strong> </strong>Maneuver Dominance
    team, you will solve a wide variety of problems involving networking, autonomy,
    systems integration, robotics, and more, while making pragmatic engineering tradeoffs
    along the way. Your efforts will ensure that Anduril products seamlessly work
    together to achieve a variety of critical outcomes. Above all, Engineers within
    Maneuver Dominance are driven by a “Whatever It Takes” mindset—executing in an
    expedient, scalable, and pragmatic way while keeping the mission top-of-mind and
    making sound engineering decisions to deliver successful outcomes correctly, on-time,
    and with high quality.<br><br></p> <h3>WHAT YOU'LL DO</h3> <ul> <li>Own the feature
    development and software solutions that are deployed to customers</li> <li>Write
    code to improve products and scale the mission capability to more customers.</li>
    <li>Collaborate across multiple teams to plan, build, and test complex functionality.</li>
    <li>Create and analyze metrics that are leveraged for debugging and monitoring.</li>
    <li>Triage issues, root cause failures, and coordinate next-steps.</li> <li>Work
