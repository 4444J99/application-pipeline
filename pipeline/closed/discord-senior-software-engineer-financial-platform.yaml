  description: <div class="content-intro"><p>Discord is used by over 200 million people
    every month for many different reasons, but there’s one thing that nearly everyone
    does on our platform:<strong> play video games.</strong> Over 90% of our users
    play games, spending a combined 1.5 billion hours playing thousands of unique
    titles on Discord each month. Discord plays a uniquely important role in the future
    of gaming. We are focused on making it easier and more fun for people to talk
    and hang out before, during, and after playing games.</p></div><p>Come build the
    future of Discord’s business with us! We are looking for impact-focused full-stack
    engineers to join our world-class Revenue group as we accelerate Discord’s growth
    through the creation of compelling paid products. These products allow us to grow
    our business while keeping Discord’s core functionality free, and without selling
    user data. You will be reporting to the Engineering Manager of Financial Platform.
    To learn more about Discord Engineering, take a look at our <a href="https://blog.discord.com/tagged/engineering">engineering
    blog</a>!</p> <p><strong>What you'll be doing:</strong></p> <ul> <li>Work with
    your squad to build the financial systems and integrations that underpin Discord’s
    existing business lines, and enable new revenue streams across Android, iOS, and
    Web</li> <li>Run revenue operations side by side with our finance and accounting
    teams</li> <li>Collaborate with business development to forge strategic partnerships</li>
    <li>Partner with CX, Data Science, and feature teams across the company to evolve
    Discord’s payments and payouts platforms</li> <li>Improve reliability, observability,
    and stability of Discord’s billing system</li> </ul> <p><strong>What you should
    have:</strong></p> <ul> <li><strong>5+ years of software engineering experience.</strong>
    Deep expertise in backend development (Python); working knowledge of frontend
    technologies (React, TypeScript) to contribute across the full stack when needed.</li>
    <li><strong>You have a growth mindset.</strong> You view challenges and mistakes
    as learning opportunities while building upon your successes. You push yourself
    and those around you to continuously improve.</li> <li><strong>A focus on impact.</strong>
    You have a sharp eye for what changes can bring a product from good to great.
    You collaborate closely with product managers, designers, analysts, and other
    engineers to define great solutions to business problems.</li> <li><strong>A sense
    of ownership.</strong> You believe in solving a problem completely rather than
    simply shipping a solution. You operate autonomously and follow through on your
    commitments.</li> </ul> <p><strong>Bonus Points</strong></p> <ul> <li>Direct experience
    working on revenue/monetization teams</li> <li>Knowledge of accounting, revenue
    operations, or payments</li> <li>A love of solving puzzles and using data to answer
    questions</li> </ul> <p><em>Candidates must reside in or be willing to relocate
    to the San Francisco Bay Area (Alameda, Contra Costa, Marin, Napa, San Francisco,
    San Mateo, Santa Clara, Solano, and Sonoma counties). Relocation assistance may
    be available. </em></p> <p><em>For this role, there is no formal requirement to
    work from the office.</em><em><br></em><em><br></em><em>The US base salary range
    for this full-time position is $196k</em><em> to $220k</em><em>&nbsp;+ equity
    + benefits. Our salary ranges are determined by role and level. Within the range,
    individual pay is determined by additional factors, including job-related skills,
    experience, and relevant education or training. Please note that the compensation
    details listed in US role postings reflect the base salary only, and do not include
    equity, or benefits.</em></p><div class="content-conclusion"><p><strong>Why Discord?&nbsp;</strong><br><br>Discord
    plays a uniquely important role in the future of gaming. We're a multiplatform,
    multigenerational and multiplayer platform that helps people deepen their friendships
    around games and shared interests. We believe games give us a way to have fun
    with our favorite people, whether listening to music together or grinding in competitive
    matches for diamond rank. <strong>Join us in our mission! Your future is just
    a click away!</strong></p> <p><strong>Discord is committed to inclusion and providing
    reasonable accommodations during the interview process. </strong>We want you to
    feel set up for success, so if you are in need of reasonable accommodations, please
    let your recruiter know.</p> <p><em><strong>Please see our Applicant and Candidate
    Privacy Policy for details regarding Discord’s collection and usage of personal
    information relating to the application and recruitment process by clicking&nbsp;<a
    href="https://discord.com/terms/applicant-candidate-privacy-policy">HERE.</a></strong></em></p></div>
