  description: Company Overview Deepgram is the leading platform underpinning the
    emerging trillion-dollar Voice AI economy, providing real-time APIs for speech-to-text
    (STT), text-to-speech (TTS), and building production-grade voice agents at scale.
    More than 200,000 developers and 1,300+ organizations build voice offerings that
    are ‘Powered by Deepgram’, including Twilio, Cloudflare, Sierra, Decagon, Vapi,
    Daily, Cresta, Granola, and Jack in the Box. Deepgram’s voice-native foundation
    models are accessed through cloud APIs or as self-hosted and on-premises software,
    with unmatched accuracy, low latency, and cost efficiency. Backed by a recent
    Series C led by leading global investors and strategic partners, Deepgram has
    processed over 50,000 years of audio and transcribed more than 1 trillion words.
    There is no organization in the world that understands voice better than Deepgram.
    Company Operating Rhythm At Deepgram, we expect an AI-first mindset—AI use and
    comfort aren’t optional, they’re core to how we operate, innovate, and measure
    performance. Every team member who works at Deepgram is expected to actively use
    and experiment with advanced AI tools, and even build your own into your everyday
    work. We measure how effectively AI is applied to deliver results, and consistent,
    creative use of the latest AI capabilities is key to success here. Candidates
    should be comfortable adopting new models and modes quickly, integrating AI into
    their workflows, and continuously pushing the boundaries of what these technologies
    can do. Additionally, we move at the pace of AI. Change is rapid, and you can
    expect your day-to-day work to evolve just as quickly. This may not be the right
    role if you’re not excited to experiment, adapt, think on your feet, and learn
    constantly, or if you’re seeking something highly prescriptive with a traditional
    9-to-5. Opportunity Deepgram is seeking a Pre-Sales Solutions Engineer to join
    our Applied Engineering team. While you'll have the opportunity to contribute
    across the team's various responsibilities (including pre-sales, implementation,
    and customer support), your primary focus will be driving technical pre-sales
    engagements with our prospects, customers, and partners. In this role, you will
    be the technical authority who bridges the gap between our state-of-the-art AI
    speech technology and customer business needs. You'll collaborate closely with
    our sales team to craft compelling technical solutions, provide technical validation,
    build proof-of-concepts, and demonstrate the value of our platform to technical
    decision makers. Your deep engineering expertise combined with consultative sales
    skills will be crucial in navigating complex sales cycles and establishing Deepgram
    as the preferred Voice AI partner. As a member of the Applied Engineering team,
    you'll influence the team’s vision, product strategy based on market insights,
    and contribute to the evolution of our pre-sales methodology. Location This role
    is based in San Francisco, where many of our customers and partners are located.
    Being close to them helps us move quickly and stay connected to their needs. While
    the role is anchored in our San Francisco office, Deepgram continues to be remote-first
    and we don't expect you to be in the office every day. We believe a mix of in-person
    and remote work allows us to share context and build productively. This role also
    includes up to 50% travel to meet with customers, support sales engagements, and
    participate in key onsite interactions About Applied Engineering at Deepgram The
    Applied Engineering (AppEng) team at Deepgram combines the functions that other
    companies might separate into Solutions Engineering, Sales Engineering, Implementation,
    and Technical Support. We serve as the technical interface between Deepgram and
    our customers throughout their entire journey. We work closely with our Customer
    Success and Developer Experience (DX) teams to ensure a positive, growth-focused
    experience for our customers, as well as with Product and Engineering teams to
    deliver solutions that meet customer needs. This unified approach allows us to
    provide comprehensive technical guidance and build deeper relationships with our
    customers. As an Applied Engineer, you'll be primarily focused on the pre-sales
    aspects of this journey while having opportunities to contribute to the full customer
    lifecycle. There is an also a travel expectation of up to 50% What You’ll Do Lead
    technical discovery and solution design for enterprise prospects and customers
    Architect and implement custom proof-of-concepts and technical demonstrations
    that address specific customer use cases Provide expert guidance on API integration,
    performance optimization, and deployment strategies Partner with Account Executives
    to navigate technical objections and accelerate the sales cycle Contribute to
    technical content creation including implementation guides, reference architectures,
    and best practices Mentor junior team members and share tech
