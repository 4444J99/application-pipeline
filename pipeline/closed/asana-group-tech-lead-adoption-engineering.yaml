  description: <p>The Adoption Group is focused on helping new users discover the
    full value of Asana in their very first moments with the product. Our group moves
    rapidly and pivots as needed, building zero-to-one product experiences, defining
    new AI functionality in customer onboarding, and optimizing for maximum customer
    and business impact. We make it easier for users to explore, understand, and adopt
    the product — turning curiosity into long-term engagement.</p> <p>We're looking
    for an experienced tech lead or staff engineer to join as a <strong>Group</strong>
    <strong>Tech Lead</strong> for our Adoption teams. This role will report to the
    Engineering Director of the Adoption group and have impact across multiple teams.</p>
    <p>At Asana, Group Tech Leads are responsible for the technical execution, culture,
    quality, and long-term engineering strategy of multiple teams. They drive complex
    projects, ensure high quality and high velocity execution, set technical direction,
    mentor other tech leads, and partner with cross-functional and cross-organizational
    stakeholders. They carry a lot of technical context and authority and can seamlessly
    collaborate across multiple teams.&nbsp;</p> <p>This role is based in our San
    Francisco office with an office-centric hybrid schedule. The standard in-office
    days are Monday, Tuesday, and Thursday. Most Asanas have the option to work from
    home on Wednesdays. Working from home on Fridays depends on the type of work you
    do and the teams with which you partner. If you're interviewing for this role,
    your recruiter will share more about the in-office requirements.</p> <p><strong>What
    you’ll achieve:</strong></p> <ul> <li>Set long-term technical strategy for the
    Adoption Group along with other engineering leaders</li> <li>Design, scope, and
    implement novel product experiences and scalable systems focused on user activation
    and adoption</li> <li>Plan, and execute large projects that require involvement
    from multiple engineering teams.</li> <li>Foster an engineering culture of high
    velocity, innovation, and business impact</li> <li>Strengthen experience as a
    cross functional engineering leader</li> </ul> <p><strong>About you:</strong></p>
    <ul> <li>6+ years working in fast-paced, high growth environments</li> <li>Experience
    leading large cross-team projects</li> <li>Ability to onboard quickly onto various
    systems, and support cross-functional work</li> <li>Demonstrates curiosity about
    AI tools and emerging technologies, with a willingness to learn and leverage them
    to enhance productivity, collaboration, or decision-making</li> <li>Track record
    of mentoring and growing other engineers</li> </ul> <p>At Asana, we're committed
    to building teams that include a variety of backgrounds, perspectives, and skills,
    as this is critical to helping us achieve our mission. If you're interested in
    this role and don't meet every listed requirement, we still encourage you to apply.</p>
    <p><strong>What we’ll offer:</strong></p> <p>Our comprehensive compensation package
    plays a big part in how we recognize you for the impact you have on our path to
    achieving our mission. We believe that compensation should be reflective of the
    value you create relative to the market value of your role. To ensure pay is fair
    and not impacted by biases, we're committed to looking at market value which is
    why we check ourselves and conduct a yearly pay equity audit.</p> <p>For this
    role, the estimated base salary range is between $248,000 - $316,000. The actual
    base salary will vary based on various factors, including market and individual
    qualifications objectively assessed during the interview process. The listed range
    above is a guideline, and the base salary range for this role may be modified.</p>
    <p>In addition to base salary, your compensation package may include additional
    components such as equity, sales incentive pay (for most sales roles), and benefits.
    If you're interviewing for this role, speak with your Talent Acquisition Partner
    to learn more about the total compensation and benefits for this role.</p> <p>We
    strive to provide equitable and competitive benefits packages that support our
    employees worldwide and include:</p> <ul> <li>Mental health, wellness &amp; fitness
    benefits</li> <li>Career coaching &amp; support</li> <li>Inclusive family building
    benefits</li> <li>Long-term savings or retirement plans</li> <li>In-office culinary
    options to cater to your dietary preferences&nbsp;</li> </ul> <p>These are just
    some of the benefits we offer, and benefits may vary based on role, country, and
    local regulations. If you're interviewing for this role, speak with your Talent
    Acquisition Partner to learn more about the total compensation and benefits for
    this role.</p> <p>#LI-Hybrid</p><div class="content-conclusion"><p><strong>About
