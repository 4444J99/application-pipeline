    may also include equity and bonus eligibility and benefits (including medical,
    dental, vision and 401(k)).</p></div><div class="title">Annual base salary range
    (excluding equity and bonus):</div><div class="pay-range"><span>$152,405</span><span
    class="divider">&mdash;</span><span>$179,300 USD</span></div></div></div><div
