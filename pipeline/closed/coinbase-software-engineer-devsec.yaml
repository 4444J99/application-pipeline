  description: '<div class="content-intro"><p>Ready to be pushed beyond what you think
    you’re capable of?</p> <p>At Coinbase, our mission is to increase economic freedom
    in the world. It’s a massive, ambitious opportunity that demands the best of us,
    every day, as we build the emerging onchain platform — and with it, the future
    global financial system.</p> <p>To achieve our mission, we’re seeking a very specific
    candidate. We want someone who is passionate about our mission and who believes
    in the power of crypto and blockchain technology to update the financial system.
    We want someone who is eager to leave their mark on the world, who relishes the
    pressure and privilege of working with high caliber colleagues, and who actively
    seeks feedback to keep leveling up. We want someone who will run towards, not
    away from, solving the company’s hardest problems.</p> <p>Our <a href="https://www.coinbase.com/mission">work
    culture</a> is intense and isn’t for everyone. But if you want to build the future
    alongside others who excel in their disciplines and expect the same from you,
    there’s no better place to be.</p> <p>While many roles at Coinbase are remote-first,
    we are not remote-only. In-person participation is required throughout the year.
    Team and company-wide offsites are held multiple times annually to foster collaboration,
    connection, and alignment. Attendance is expected and fully supported.</p></div><p>The
    Developer Security team secures Coinbase''s software supply chain and builds automation
    to find and fix vulnerabilities at scale. We own artifact scanning, dependency
    analysis, vulnerability management, and security agents that automate remediation
    across the company. As a Software Engineer on this team, you will build and ship
    features across these systems. You will work with engineers across Coinbase to
    make security a natural part of how they build software.</p> <p><strong>What you’ll
    be doing (ie. job duties):</strong></p> <ul> <li>Build and maintain services to
    meet critical product and business needs using Golang.</li> <li>Deliver features
    and small-to-medium projects end-to-end: design, implementation, deployment, and
    monitoring.</li> <li>Author technical design documents and break down complex
    features into individual tasks.</li> <li>Write high quality, well tested code
    to meet the needs of your customers.</li> <li>Improve code quality and address
    technical debt within your ownership area.</li> <li>Participate in on-call rotations,
    code reviews, and incident response.</li> <li>Work with engineers, product managers,
    and security partners to deliver on the team''s roadmap.</li> </ul> <p><strong>What
    we look for in you (ie. job requirements):</strong></p> <ul> <li>At least 2 years
    of experience in software engineering.</li> <li>You have built, deployed, and
    maintained production services and understand service-oriented architecture.</li>
    <li>You write high quality, well tested code.</li> <li>You can author technical
    design documents and break down features into discrete tasks.</li> <li>You actively
    use modern tooling (including AI-assisted development) to ship faster and learn
    new domains quickly.</li> <li>You are passionate about building an open financial
    system that brings the world together.</li> </ul> <p><strong>Nice to haves:</strong></p>
    <ul> <li>Experience with security tooling or security-adjacent engineering (e.g.,
    SLSA, Sigstore, artifact scanning, SBOM).</li> <li>Familiarity with Artifactory,
    Xray, or similar supply chain security platforms.</li> <li>Experience with Golang,
    Docker, Kubernetes, Postgres, MongoDB, gRPC.</li> <li>Experience with cloud infrastructure
    (AWS or GCP).</li> <li>You have worked at a company during a period of rapid growth.</li>
    </ul> <p>Job #: 75879</p> <div id="fortidlp-input-element-parent"></div><div class="content-pay-transparency"><div
