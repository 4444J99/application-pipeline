    more affordable for everyone. What you''ll do Design and deliver production-grade
    AI agents for healthcare: You''ll build and ship highly performant, reliable,
    and empathetic AI agents that handle sensitive patient and member interactions.
    These agents help people understand their coverage, find providers, schedule appointments,
    navigate billing, and more—all while maintaining strict HIPAA compliance and the
    trust that healthcare demands. Drive the Agent Development Life Cycle (ADLC):
    You''ll have complete ownership and autonomy from initial pilot through deployment
    and continuous iteration. You''ll be responsible for building, tuning, and evolving
    AI agents in production environments serving healthcare payers, providers, and
    platforms. Partner with healthcare leaders: You''ll work directly with executives
    and technical teams at health plans, provider networks, and healthcare technology
    companies to understand their most pressing challenges - from managing high call
    volumes to reducing administrative burden and building AI agents that transform
    how they operate at scale. Navigate healthcare complexity: You’ll develop deep
    expertise in healthcare systems and workflows, including integrations across EHR
    and patient access platforms, payer and provider operations, and common healthcare
    data and interoperability standards. You’ll become fluent in the nuances of benefits
    and eligibility, claims and billing, scheduling and intake, and translate that
    understanding into exceptional, trustworthy AI experiences. Build the future of
    the platform: Your direct work with healthcare customers will guide the evolution
    of Sierra''s core platform. You''ll surface unmet needs, prototype new tools and
    features, and collaborate with research, product, and platform to shape the future
    of AI agent development in healthcare. Example projects These are examples of
    projects our healthcare team has worked on: Build AI agents for major health insurance
    networks that handle detailed questions such as, "What''s my co-pay for a primary
    care visit?" and "How many physical therapy sessions do I have left?" Develop
    voice and chat agents for healthcare providers that help members find in-network
