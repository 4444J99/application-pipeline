  description: '<h2>Who we are</h2> <h3>About Stripe</h3> <p><span style="font-weight:
    400;">Stripe is a financial infrastructure platform for businesses. Millions of
    companies—from the world’s largest enterprises to the most ambitious startups—use
    Stripe to accept payments, grow their revenue, and accelerate new business opportunities.
    Our mission is to increase the GDP of the internet, and we have a staggering amount
    of work ahead. That means you have an unprecedented opportunity to put the global
    economy within everyone’s reach while doing the most important work of your career.</span></p>
    <h3>About the team</h3> <p>Stripe''s Experimental Projects team is our in-house
    innovation lab where we rapidly transform ideas into working prototypes. We operate
    as an idea incubator, building and testing new concepts with real users, sometimes
    going from concept to functional prototype in just days.</p> <h2>What you’ll do</h2>
    <p>As a Software Engineer on the Experimental Projects team, you''ll be at the
    forefront of innovation at Stripe, turning promising ideas into tangible solutions
    that could shape the future of our platform. You''ll have the autonomy to identify
    opportunities, rapidly build prototypes, and work directly with users to validate
    and iterate on your solutions.&nbsp;</p> <p>This role combines technical excellence
    with creative problem-solving – you''ll work across our entire technology stack
    to bring ideas to life, sometimes in just days.&nbsp;</p> <p>Your work will help
    us discover new ways to empower businesses worldwide, contributing directly to
    Stripe''s mission of increasing the GDP of the internet. Whether it''s creating
    new developer tools, exploring novel payment experiences, or inventing entirely
    new products, you''ll have the freedom to experiment and the resources to make
    a significant impact.</p> <h3>Responsibilities<span style="font-weight: 400;">&nbsp;</span></h3>
    <ul> <li>Drive projects from ideation to implementation, taking ownership of the
    full development lifecycle</li> <li>Build full-stack solutions including intuitive
    web frontends, clean APIs, and robust backend systems</li> <li>Work across various
    technologies and languages (TypeScript, Ruby, Python, Java, etc.) based on project
    needs</li> <li>Collaborate directly with users to understand their needs and gather
    feedback</li> <li>Prototype and validate ideas quickly, pivoting or adjusting
    based on real-world usage</li> <li>Partner with teams across Stripe to integrate
    with existing systems and infrastructure</li> </ul> <h2><strong>Who you are</strong></h2>
    <p><span style="font-weight: 400;">We’re looking for someone who meets the minimum
    requirements to be considered for the role. If you meet these requirements, you
    are encouraged to apply. The preferred qualifications are a bonus, not a requirement.</span></p>
    <h3>Minimum requirements</h3> <ul> <li>5+ years of professional, hands on full-stack
    development experience with languages such as JavaScript, TypeScript, Ruby, Python,
    Go, or Java</li> <li>Excel at rapid prototyping while maintaining appropriate
    quality standards</li> <li>Demonstrate strong product intuition and user empathy</li>
    <li>Have experience building and shipping customer facing products from scratch</li>
    </ul> <h3><strong>Preferred qualifications</strong></h3> <ul> <li>Are comfortable
    with ambiguity and fast-paced environments</li> <li>Have a passion for working
    on side-projects, open source, or similar self-driven initiatives you’re proud
    of</li> <li>Bring energy and enthusiasm that inspires collaboration</li> </ul>'
