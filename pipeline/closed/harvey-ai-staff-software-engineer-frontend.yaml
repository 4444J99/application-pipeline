  description: 'Why Harvey At Harvey, we’re transforming how legal and professional
    services operate — not incrementally, but end-to-end. By combining frontier agentic
    AI, an enterprise-grade platform, and deep domain expertise, we’re reshaping how
    critical knowledge work gets done for decades to come. This is a rare chance to
    help build a generational company at a true inflection point. With 1000+ customers
    in 58+ countries, strong product-market fit, and world-class investor support,
    we’re scaling fast and defining a new category in real time. The work is ambitious,
    the bar is high, and the opportunity for growth — personal, professional, and
    financial — is unmatched. Our team is sharp, motivated, and deeply committed to
    the mission. We move fast, operate with intensity, and take real ownership of
    the problems we tackle — from early thinking to long-term outcomes. We stay close
    to our customers — from leadership to engineers — and work together to solve real
    problems with urgency and care. If you thrive in ambiguity, push for excellence,
    and want to help shape the future of work alongside others who raise the bar,
    we invite you to build with us. At Harvey, the future of professional services
    is being written today — and we’re just getting started. Role Overview As a Staff
    Frontend Software Engineer at Harvey, you’ll play a pivotal role in shaping the
    foundation of our product platform while directly building user-facing features
    for some of the world’s leading law firms and enterprise customers. This team
    owns and operates the platform layer that enables secure, reliable, and flexible
    experiences for our customers including notifications, permissions and feature
    flag infrastructure. We also build enterprise-grade collaboration product experiences
    for law firms. You will design and own systems that not only serve as critical
    infrastructure for the rest of the company, but also directly impact how our users
    engage with Harvey’s AI-powered legal tools. This role is ideal for engineers
    who are excited by the opportunity to move between deep platform thinking and
    hands-on product iteration. This role is based in Toronto, Canada. We use a hybrid,
    3+ days-per week in-person work model and offer relocation assistance to new employees.
    What You’ll Do Design and build foundational infrastructure including authentication,
    permissions, feature flagging, notifications, and document management integrations
    Build and evolve Harvey’s internal product platform, accelerating development
    across multiple product lines and engineering teams Lead development of enterprise-facing
    features, such as secure multi-party collaboration, cross-organization workflows,
    and robust admin controls Maintain high standards for security, privacy, and system
    reliability, particularly in handling sensitive legal data Collaborate cross-functionally
    with product, AI, design, and GTM teams to deliver delightful, enterprise-ready
    experiences What You Have 5+ years (post-BS/MS) of frontend-focused software engineering
    experience on platform and/or product-oriented teams Experience working across
    the stack to ship user-facing features with measurable impact Strong knowledge
    of frontend technologies such as React, Typescript, and CSS Familiarity with or
    interest in enterprise SaaS patterns, such as role-based access control (RBAC),
    feature flag systems, and third-party integrations Track record of shipping highly
    intuitive products, strong attention to detail Strong programming skills and general
    Computer Science knowledge What We Offer Be part of building something special
    as a founding member of our Toronto team Structured hybrid working arrangement:
    3 days in our Toronto office, 2 days working from home We are an AI company and
    we use AI to improve all of our processes, including in the recruitment process.
    Whilst we do use AI to help improve efficiency in our recruitment process, we
    do not rely on AI to make any automated decisions and ensure that a human reviews
    AI output. #LI-KT1 Harvey is an equal opportunity employer and does not discriminate
    on the basis of race, gender, sexual orientation, gender identity/expression,
    national origin, disability, age, genetic information, veteran status, marital
    status, pregnancy or related condition, or any other basis protected by law. We
    are committed to providing reasonable accommodations to applicants with disabilities,
    and requests can be made by emailing accommodations@harvey.ai'
