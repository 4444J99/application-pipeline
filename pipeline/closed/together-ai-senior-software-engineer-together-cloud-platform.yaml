  description: '<h3>About the Role</h3> <p>Together AI is building the AI Acceleration
    Cloud, an end-to-end platform for the full generative AI lifecycle, combining
    the fastest LLM inference engine with state-of-the-art AI cloud infrastructure.</p>
    <p>As a Senior Backend Engineer, you will play a key role in building the next
    generation AI cloud platform – a highly available, global, blazing-fast cloud
    infrastructure that virtualizes cutting-edge ML hardware (GB200s/GB300s, BlueField
    DPUs) and enables state-of-the-art ML practitioners with self-serve AI cloud services,
    such as on-demand + managed Kubernetes and Slurm clusters. This platform serves
    both our internal StaaS products (inference, fine-tuning) and our external cloud
    customers, spanning dozens of data centers across the world.</p> <p>Some of what
    you’ll work on:</p> <ul> <li>Work on a distributed GPU scheduling system for the
    on-demand clusters product, Instant Clusters.</li> <li>Build out a global management
    plane for managing our data center compute, networking, and storage.</li> <li>Design
    and build new customer-facing cloud platform services, delivering killer enterprise
    AI cloud features.</li> </ul> <h3><strong>Responsibilities</strong></h3> <ul>
    <li>Identify, design, and develop foundational backend services that power Together’s
    cloud platform</li> <li>Analyze and improve the robustness and scalability of
    existing distributed systems, APIs, databases, and infrastructure</li> <li>Partner
    with product teams to understand functional requirements and deliver solutions
    that meet business needs</li> <li>Write clear, well-tested, and maintainable software
    and IaC for both new and existing systems</li> <li>Conduct design and code reviews,
    create developer documentation, and develop testing strategies for robustness
    and fault tolerance</li> <li>Participate in an on-call rotation to address critical
    incidents when necessary</li> </ul> <h3><strong>Requirements</strong></h3> <ul>
    <li>5+ years of demonstrated experience in building large scale, fault tolerant,
    distributed systems and API microservices</li> <li>Experience designing, analyzing
    and improving efficiency, scalability, and stability of various system resources</li>
    <li>Excellent communication skills – able to write clear design docs and work
    effectively with both technical and non-technical team members</li> <li>Demonstrated
    experience with building and operating high-performance and/or globally distributed
    microservice architectures across one or more cloud providers (AWS, Azure, GCP)</li>
    <li>Strong systems knowledge across compute, networking, and storage, including
    concurrency, memory management, performant I/O, and scale</li> <li>Experience
    developing against and managing a relational database, such as PostgreSQL</li>
    <li>Expert-level programmer in one or more of programming language (Golang preferred)</li>
    <li>Proficiency in version control practices and integrating IaC with CI/CD pipelines.</li>
    <li>Experience with Kubernetes and containers preferred</li> <li>Experience building
    and operating data infrastructure (Kinesis, Airflow, Kafka, etc) a plus</li> <li>Bachelor’s
    or Master’s degree in Computer Science, Computer Engineering, or a related technical
    field, or equivalent practical experience</li> </ul> <h3><strong>About Together
    AI</strong></h3> <p>Together AI is a research-driven artificial intelligence company.
    We believe open and transparent AI systems will drive innovation and create the
    best outcomes for society, and together we are on a mission to significantly lower
    the cost of modern AI systems by co-designing software, hardware, algorithms,
    and models. We have contributed to leading open-source research, models, and datasets
    to advance the frontier of AI, and our team has been behind technological advancement
    such as FlashAttention, Hyena, FlexGen, and RedPajama. We invite you to join a
    passionate group of researchers in our journey in building the next generation
    AI infrastructure.</p> <h3><strong>Compensation</strong></h3> <p>We offer competitive
    compensation, startup equity, health insurance, and other benefits, as well as
    flexibility in terms of remote work. The US base salary range for this full-time
    position is: $160,000 - $230,000 + equity + benefits. Our salary ranges are determined
    by location, level and role. Individual compensation will be determined by experience,
    skills, and job-related knowledge.</p> <h3><strong>Equal Opportunity</strong></h3>
    <p>Together AI is an Equal Opportunity Employer and is proud to offer equal employment
    opportunity to everyone regardless of race, color, ancestry, religion, sex, national
    origin, sexual orientation, age, citizenship, marital status, disability, gender
    identity, veteran status, and more.</p> <p>Please see our privacy policy at<a
    href="https://www.together.ai/privacy"> https://www.together.ai/privacy</a>&nbsp;&nbsp;</p>
    <p>&nbsp;</p>'
