    world enters an era of strategic competition, Anduril is committed to bringing
    cutting-edge autonomy, AI, computer vision, sensor fusion, and networking technology
    to the military in months, not years.</p></div><p>We are seeking a mid-level&nbsp;<strong>Modeling,
    Simulation, and Analysis Engineer</strong>&nbsp;to join our team.</p> <p><strong>ABOUT
    THE TEAM</strong></p> <p>In this role, you will:</p> <ul> <li>Develop cutting-edge
