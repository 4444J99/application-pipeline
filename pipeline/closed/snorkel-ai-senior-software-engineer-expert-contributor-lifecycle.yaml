  description: '<div class="content-intro"><p><strong>About Snorkel</strong></p> <p>At
    Snorkel, we believe meaningful AI doesn’t start with the model, it starts with
    the data.</p> <p>We’re on a mission to help enterprises transform expert knowledge
    into specialized AI at scale. The AI landscape has gone through incredible changes
    between 2015, when Snorkel started as a research project in the Stanford AI Lab,
    to the generative AI breakthroughs of today. But one thing has remained constant:
    the data you use to build AI is the key to achieving differentiation, high performance,
    and production-ready systems. We work with some of the world’s largest organizations
    to empower scientists, engineers, financial experts, product creators, journalists,
    and more to build custom AI with their data faster than ever before. Excited to
    help us redefine how AI is built? Apply to be the newest Snorkeler!</p></div><p>As
    a Senior Backend Engineer at Snorkel, you will deliver robust features that power
    our&nbsp;<strong>Expert Contributor (EC) Platform</strong>. You will have full
    ownership and responsibility for building, shipping, and maintaining innovative,
    scalable services and complex features as well as building and maintaining integrations
    with various vendors. Your work will bridge the gap between human expertise and
    machine learning by enabling domain experts to provide high-signal data for training
    and refining state-of-the-art models.</p> <p>&nbsp;</p> <p><strong>Main Responsibilities</strong></p>
    <ul> <li><strong>Design and develop mission-critical systems</strong> for the
    end-to-end Expert Contributor (EC) lifecycle, focusing on automated <strong>onboarding</strong>
    workflows, performance management, and contributor retention.</li> <li><strong>Build
    robust features and integrations</strong> with key third-party services, including
    platforms for <strong>assessments</strong> and <strong>Employer of Record </strong>systems.</li>
    <li><strong>Automate supply and allocation</strong> logic to efficiently manage
    and deploy a <strong>high volume of ECs</strong> to various data collection projects,
    ensuring optimal coverage and quality.</li> <li><strong>Prototype, optimize, and
    maintain scalable services</strong> to power complex data user management pipelines.</li>
    <li><strong>Set the strategy and architecture</strong> for build systems, testing
    frameworks, and CI/CD pipelines.</li> <li>Lead the transition from scheduled releases
    to a robust, automated continuous deployment framework, taking end-to-end ownership
    of the release pipeline.</li> <li><strong>Build proactively with empathy</strong>
    for both customers and subject matter experts using our tools.</li> <li><strong>Collaborate
    with engineers</strong> to bring consistency and high standards to codebases,
    infrastructure, and processes.</li> <li>Engage with product managers, designers,
    and ML experts to create a phenomenal user experience for data acquisition and
    refinement.</li> </ul> <p><strong>Qualifications</strong></p> <ul> <li><strong>8+
    years of software engineering experience</strong></li> <li><strong>6+ years of
    professional experience</strong> developing performant, intuitive, and scalable
    web application architectures.</li> <li>Strong background in <strong>developer
    productivity</strong>, <strong>distributed systems</strong>, and <strong>cloud
    platforms</strong> (AWS preferred).</li> <li><strong>Expertise designing REST</strong>
    for internal services and developers.</li> <li>Experience developing and shipping
    enterprise software products, specifically those focused on data collection, annotation,
    or machine learning applications.</li> <li>Track record of <strong>leading complex
    engineering initiatives</strong>, influencing stakeholders, and delivering measurable
    impact.</li> <li>Comfortable working with:</li> <ul> <li>Infra &amp; deployment
    technologies: <strong>Terraform, Docker, Kubernetes</strong>.</li> <li>CI/CD systems:
    <strong>CircleCI, Buildkite, GitHub Actions, Helm</strong>.</li> </ul> <li>Ability
    to work in a fast-paced environment with strong technical communication skills.</li>
    <li>Self-motivation, a positive mental attitude, and an eagerness to learn in
    the rapidly evolving AI landscape.</li> </ul> <p><strong>Nice to Have</strong></p>
    <ul> <li>Experience in <strong>hyper-growth startup environments</strong> or scaling
    engineering orgs.</li> <li>Experience with <strong>AI development workflows</strong>,
    AI-assisted code generation, or SRE automation or strong excitement to learn.</li>
    <li>Prior experience as a <strong>Tech Lead</strong>, <strong>Team Lead</strong>,
    or <strong>Hands on Engineering Manager</strong>.</li> </ul> <p><strong>Work Schedule</strong></p>
    <ul> <li>Work a hybrid schedule with three days per week in our Redwood City HQ
    or the SF office.</li> </ul> <p><br><br><br></p><div class="content-pay-transparency"><div
    class="pay-input"><div class="title">Salary Range </div><div class="pay-range"><span>$190,000</span><span
    class="divider">&mdash;</span><'
