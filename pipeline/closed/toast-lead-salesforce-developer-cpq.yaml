  description: "<p>Toast creates technology to help restaurants and local businesses\
    \ succeed in a digital world, helping business owners operate, increase sales,\
    \ engage customers, and keep employees happy.</p> <p>As a <strong>Lead Salesforce\
    \ Developer</strong> within the Business Technology and Transformation (BTT) team,\
    \ you will be a technical cornerstone in delivering innovative solutions on the\
    \ Salesforce platform. You won\u2019t just write code; you will collaborate with\
    \ architects, admins, and engineering managers to scale an ecosystem that supports\
    \ Toast\u2019s ambitious global growth. We are looking for a \"bar-raiser\" who\
    \ thrives on technical excellence and mentorship.</p> <p><strong>A day in the\
    \ life (Responsibilities)</strong></p> <ul> <li><strong>Technical Leadership:</strong>\
    \ Drive the development of high-performance Salesforce solutions, Salesforce CPQ,\
    \ spanning Apex (Triggers, Async, Patterns), LWC, and complex integrations (REST/SOAP).</li>\
    \ <li><strong>Architectural Stewardship:</strong> Ensure all solutions adhere\
    \ to best practices regarding the Salesforce Data Model, Security, Sharing, and\
    \ Visibility.</li> <li><strong>Mentorship &amp; Quality:</strong> Act as a technical\
    \ mentor to junior and mid-level developers. You will own the code review process,\
    \ fostering a culture of high-quality, maintainable code and \"review etiquette.\"\
    </li> <li><strong>Release Excellence:</strong> Oversee the end-to-end deployment\
    \ lifecycle, including GitHub PR processes, merge conflict resolution, and CI/CD\
    \ best practices.</li> <li><strong>Strategic Planning:</strong> Partner with leadership\
    \ to provide accurate story sizing and project estimates within a SCRUM framework.\
    \ You are expected to proactively identify blockers and escalate risks before\
    \ they impact delivery.</li> <li><strong>Expert Troubleshooting: </strong>Act\
    \ as the final line of defense for complex production issues, leveraging the Developer\
    \ Console, Workbench, and Debug Logs to optimize performance and resolve errors.</li>\
    \ </ul> <p><strong>What you'll need to thrive (Requirements)</strong></p> <ul>\
    \ <li><strong>Industry Tenure:</strong> 10+ years of Salesforce development experience\
    \ within a large-scale Enterprise environment.</li> <li><strong>CPQ Expertise:</strong>\
    \ Deep hands-on experience with Salesforce CPQ (Products, Pricing Rules, Lookup\
    \ Queries, and Quote Templates). You should understand the nuances of the Quote-to-Cash\
    \ domain.</li> <li><strong>Advanced Engineering:</strong> Proven mastery of Apex,\
    \ Lightning Web Components (LWC), and platform event-driven architectures, Web-services\
    \ &amp; integration.</li> <li><strong>Team Leadership:</strong> Previous experience\
    \ leading a team of developers through successful project delivery.</li> <li><strong>Process\
    \ Oriented:</strong> Advanced understanding of the SDLC and Agile methodologies.</li>\
    \ <li><strong>Hybrid Collaboration: </strong>Ability to work in a hybrid model\
    \ (3 days per week in-office) if located within 25-50 miles of a Toast office.</li>\
    \ <li><strong>Education &amp; Certs:</strong></li> <ul> <li>Bachelor\u2019s Degree\
    \ in Engineering or a related technical field.</li> <li>Salesforce Platform Developer\
    \ I &amp; II certifications.</li> <li><em>Salesforce CPQ Specialist certification\
    \ is a significant plus.</em></li> </ul> </ul> <p><strong>What will help you stand\
    \ out (Nonessential Skills/Nice to Haves)</strong></p> <ul> <li><strong>Tooling:</strong>\
    \ Familiarity with ServiceNow, Jira, or Copado for CI/CD.</li> <li><strong>Domain\
    \ Knowledge:</strong> Experience with Billing platforms (Zuora, Salesforce Billing,\
    \ or Conga).</li> <li><strong>Version Control: </strong>Advanced GitHub workflow\
    \ management.</li> </ul> <p data-pm-slice=\"1 1 []\"><strong>AI at Toast</strong></p>\
    \ <p>At Toast, one of our company values is that we're hungry to build and learn.\
    \ We believe learning new AI tools empowers us to build for our customers faster,\
    \ more independently, and with higher quality. We provide these tools across all\
    \ disciplines, from Engineering and Product to Sales and Support, and are inspired\
    \ by how our Toasters are already driving real value with them. The people who\
    \ thrive here are those who embrace changes that let us build more for our customers;\
    \ it\u2019s a core part of our culture.</p> <p data-pm-slice=\"1 1 []\"><strong>Our\
    \ Total Rewards Philosophy&nbsp;<br></strong>We strive to provide competitive\
    \ compensation and benefits programs that help to attract, retain, and motivate\
    \ the best and brightest people in our industry. Our total rewards package goes\
    \ beyond great earnings potential and provides the means to a healthy lifestyle\
    \ with the flexibility to meet Toasters\u2019 changing needs. Learn more about\
    \ our benefits at&nbsp;<a class=\"c-link\" href=\"https://careers.toasttab.com/toast-benefits\"\
    \ target=\"_blank\" data-stringify-link=\"https://careers.toasttab.com/toast-benefits\"\
    \ data-sk=\"tooltip_parent\" data-remove-tab-index=\"true\">https://careers.toasttab.com/toast-benefits</a>.</p><div\
    \ class=\"content-pay-transparency\"><div class=\"pay-input\"><div class"
