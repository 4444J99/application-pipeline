  description: '<div class="content-intro"><p>Anduril Industries is a defense technology
    company with a mission to transform U.S. and allied military capabilities with
    advanced technology. By bringing the expertise, technology, and business model
    of the 21st century’s most innovative companies to the defense industry, Anduril
    is changing how military systems are designed, built and sold. Anduril’s family
    of systems is powered by Lattice OS, an AI-powered operating system that turns
    thousands of data streams into a realtime, 3D command and control center. As the
    world enters an era of strategic competition, Anduril is committed to bringing
    cutting-edge autonomy, AI, computer vision, sensor fusion, and networking technology
    to the military in months, not years.</p></div><div><strong>ABOUT THE TEAM</strong><br><br>Our
    DeviceOS team develops the operating system that powers Anduril’s robots. As a
    member of the DeviceOS team you will build Anduril’s platform for running software
    on Anduril’s robotics systems. Your software will be deployed on robots operating
    on land, sea, and air. You will be responsible for the full lifecycle of software
    development projects including design, implementation, automated testing, field
    testing, and deployment support.<br><br><strong>WHAT YOU''LL DO</strong></div>
    <ul> <li>Board bring-up and maintenance on embedded ARM boards (device trees,
    bootloaders, kernel drivers, etc)</li> <li>Customize vendor BSPs for use with
    NixOS systems</li> <li>Help secure our embedded Linux systems</li> </ul> <div><strong>REQUIRED
    QUALIFICATIONS </strong></div> <ul> <li>Familiarity with triaging vulnerability
    reports and mitigating vulnerabilities by patching system components.</li> <li>Experience
    with Linux kernel development</li> <li>Experience with uboot, EDK2, platform firmware,
    etc</li> <li>Interest in using Nix/NixOS as an alternative to Yocto, buildroot,
