    we are:</strong></p> <div> <p>Shape a brighter financial future with us.</p> <p>Together
    with our members, we’re changing the way people think about and interact with
    personal finance.</p> <p>We’re a next-generation financial services company and
    national bank using innovative, mobile-first technology to help our millions of
    members reach their goals. The industry is going through an unprecedented transformation,
    and we’re at the forefront. We’re proud to come to work every day knowing that
    what we do has a direct impact on people’s lives, with our core values guiding
    us every step of the way. <strong>Join us to invest in yourself, your career,
    and the financial world.</strong></p> </div></div><p><strong>The Role:</strong></p>
    <p>We are seeking a highly skilled and experienced Staff Software Engineer to
    join our Test Platform team. In this role, you will have the opportunity to directly
    impact the design and architecture of our Developer Platform and tooling that
    enables SoFi engineers to create and deliver high-quality solutions. You will
    collaborate and partner with a curious team of engineers to design and deliver
    solutions that raise the testing and reliability standards for our backend and
    web applications. This new team will be focused on building a green field project
    to enable autonomous testing for our AI driven SDLC, leveraging cutting edge technologies
    to deliver a highly resilient and thorough platform. If you are a seasoned Staff
    Software Engineer with a passion for building products that just work and enabling
    developers to build reliable services, and a strong background in distributed
    systems, we invite you to apply for this exciting and new opportunity.</p> <p><strong>What
    You’ll Do:</strong></p> <ul> <li>Provide technical leadership for initiatives
    in Testing and Reliability, with a focus on integrating AI-driven automation and
    autonomous testing practices.</li> <li>Collaborate with product engineering teams
    to understand requirements and design platform capabilities that are efficient,
    robust, and developer-friendly.</li> <li>Architect and implement solutions that
    accelerate integration, load, performance, and chaos testing—including the use
    of AI for automated test generation, selection, and failure analysis.</li> <li>Deliver
    software that enables seamless testing and operation of backend systems in cloud-native,
    containerized, and CI/CD environments, supporting shift-left and continuous delivery.</li>
    <li>Research, prototype, and productionize AI/ML tools to enhance developer productivity,
    test coverage, and test maturity.</li> <li>Lead code reviews, refactoring, and
    provide constructive feedback to team members, promoting a culture of continuous
    improvement.</li> <li>Champion best practices for code health, test automation,
    environment stability, and software maintainability, contributing to the evolution
    of autonomous testing at SoFi.</li> </ul> <p><strong>What You’ll Need:</strong></p>
    <ul> <li><strong>Experience </strong>- Bachelor's or Master's degree in Computer
    Science, Software Engineering or a related technical field.</li> <li>8+ years
    of software development experience.</li> <li>Experience developing in a cloud
    environment (AWS), using containers (e.g., Docker, Kubernetes), cloud-native technologies
    and service meshes (e.g., Istio, Envoy).</li> <li><strong>Design</strong> - Strong
    understanding of software design principles, and distributed systems architecture.</li>
    <li><strong>Coding Skills</strong> - Proven programming skills (Java, Kotlin,
    Python, Go) in developing enterprise scale systems.</li> <li><strong>Expertise</strong>
    - Expertise in automated testing strategies, testing in production, test tenancy,
    API mocking, traffic capture, routing and playback technologies.</li> <li><strong>Problem
    Solving </strong>- Excellent problem-solving skills and ability to think strategically
    about the Testing and Reliability domains.</li> <li><strong>Project Ownership</strong>
    - Ability to manage and deliver projects from scoping through launch.&nbsp;</li>
    <li><strong>Communication</strong> - Effective communication and collaboration,
    and proven skills to operate effectively in a cross-functional team.</li> </ul>
    <p><strong>Nice to haves:&nbsp;</strong></p> <ul> <li>Experience with load testing
    (e.g., Locust, Artillery), E2E testing (e.g., Cypress), failure injection and
    chaos testing (Gremlin, AWS FIS) technologies.</li> <li>Experience with monitoring
    and logging (e.g. Datadog, Elastic, Splunk).</li> <li>Familiarity with CI/CD pipelines
    and tools (e.g., Argo, GitLab CI/CD).</li> <li>Experience with security and compliance
    requirements in cloud environments.</li> </ul><div class="content-conclusion"><div
