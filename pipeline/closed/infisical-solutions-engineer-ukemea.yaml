  description: 'Infisical is looking to hire exceptional talent to join our teams
    in building the open source security infrastructure stack for the AI era. We''re
    building a generational company with a world-class team. This isn’t a place to
    coast — but if you want to grow fast, take ownership, and solve tough problems,
    you’ll be challenged like nowhere else. What We’re Looking For We’re looking for
    an exceptional Solutions Engineer to help grow Infisical’s customer base and ensure
    a seamless product experience from onboarding to long-term success. This is a
    high-impact, customer-facing role where you’ll work closely with our CEO, sales,
    and engineering teams. You''ll play a critical role in helping organizations adopt
    Infisical by demonstrating technical value, driving successful implementations,
    and expanding product usage across accounts. You’ll be working directly with the
    CEO, engineering, and sales teams on: Running proof-of-concept with leads, guiding
    customer through onboarding, or being able to recommend best practices for specific
    architectures and use cases. Ensuring new customers are activated, happy, and
    have all of their questions answered; Becoming a trusted technical advisor to
    customer and business leaders. Working in tandem with account executives to lead
    demo & discovery calls. Talking to customers daily to find points of friction
    and potential improvement in any workflows, understanding customer''s needs and
    provide feedback towards product roadmap. Understanding user journey and being
    able to guide UX/DX roadmap Hosting webinars and knowledge sharing sessions for
    customer''s stakeholders. Improving documentation and public facing materials
    based on customer feedback. Overall, you’re going to be one of the defining pieces
    of our team as we scale to thousands of customers over the next 18 months. Requirements
    Prior experience in development, systems engineering, or DevOps (open source contributions
    are a plus). Strong written and verbal communication skills—able to clearly articulate
    technical concepts. High energy, high ownership mindset, and a willingness to
    operate in ambiguity. Based in EMEA. Bonus Familiarity with secret management
    tools or developer security platforms. Solid understanding of developer workflows
    and/or DevSecOps infrastructure. Prior experience in a startup or fast-scaling
    environment. Past involvement in developer communities or public speaking (webinars,
    talks, etc.). Experience in a customer-facing technical role (e.g., Solutions
    Engineer, Sales Engineer, DevRel). Experience supporting enterprise accounts and
    working with technical stakeholders. How You’ll Grow In this role, you’ll be instrumental
    in shaping how Infisical scales and serves thousands of customers: Drive technical
    success across a fast-growing customer base. Influence the short and long-term
    product roadmap based on customer needs. Help build out the future customer success
    and go-to-market teams & functions. Team, Values & Benefits Our team brings experience
    from companies like Figma, AWS, and Red Hat. We operate primarily as a remote
    team but maintain a strong presence in San Francisco, where we have an office.
    We also get together in person throughout the year for off-sites, conferences,
    and team gatherings. At Infisical, we offer competitive compensation, including
    both salary and equity options. Additional benefits, such as a lunch stipend and
    a work setup budget, are available with more details to be found on our careers
    page . About Us Infisical is the open source security infrastructure platform
    that engineers use for secrets, certificates, and privileged access management.
    We help developers and organizations securely manage over 1.5 billion secrets
    each month including application configuration, database credentials, certificates,
    and more. We’ve raised $19M from Y Combinator, Google, and Elad Gil, and our customers
    include Hugging Face, Lucid, and LG. Join us on a mission to make security easier
    for all developers — starting with secrets management.'
