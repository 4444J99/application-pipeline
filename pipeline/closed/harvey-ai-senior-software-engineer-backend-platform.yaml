  description: 'Why Harvey At Harvey, we’re transforming how legal and professional
    services operate — not incrementally, but end-to-end. By combining frontier agentic
    AI, an enterprise-grade platform, and deep domain expertise, we’re reshaping how
    critical knowledge work gets done for decades to come. This is a rare chance to
    help build a generational company at a true inflection point. With 1000+ customers
    in 58+ countries, strong product-market fit, and world-class investor support,
    we’re scaling fast and defining a new category in real time. The work is ambitious,
    the bar is high, and the opportunity for growth — personal, professional, and
    financial — is unmatched. Our team is sharp, motivated, and deeply committed to
    the mission. We move fast, operate with intensity, and take real ownership of
    the problems we tackle — from early thinking to long-term outcomes. We stay close
    to our customers — from leadership to engineers — and work together to solve real
    problems with urgency and care. If you thrive in ambiguity, push for excellence,
    and want to help shape the future of work alongside others who raise the bar,
    we invite you to build with us. At Harvey, the future of professional services
    is being written today — and we’re just getting started. Role Overview As a Backend
    Platform Engineer at Harvey, you will help build and operate the cohesive backend
    platform that all our services run on. In this mid-to-senior level role, you’ll
    design and implement shared frameworks and libraries that abstract common concerns,
    improve developer experience, and raise the baseline for reliability and performance
    across all teams. Your mission aligns with our platform charter: create “a shared
    foundation that enables product teams to ship reliable, observable, and performant
    experiences quickly and safely.” By centralizing common work, you’ll let product
    engineers focus on shipping features rather than re-inventing the wheel. This
    is a high-impact role where the code you write and the systems you build will
    amplify the productivity and quality of engineering across the entire company.
    If you’re excited about building foundational systems, solving cross-cutting technical
    challenges, and enabling others to move faster with confidence, we’d love to hear
    from you. What You''ll Do Develop and maintain Harvey’s internal backend frameworks
    and libraries that provide common capabilities (API routing, service lifecycle
    management, caching and messaging primitives, error handling interfaces, etc.),
    so product teams don’t have to reinvent them Create and improve APIs, service
    templates, and versioned interfaces that establish consistent patterns for building
    new services and features Introduce and champion modern backend architecture patterns
    like asynchronous I/O (asyncio) and streaming data processing, continually evolving
    our platform for better performance and scalability Design Harvey-specific abstractions
    and domain-specific frameworks—covering cross-cutting concerns (e.g., authorization,
    streaming) and areas like data governance and event processing—to provide product
    engineers with these capabilities out of the box. Embed reliability and observability
    into the platform by building in tracing, metrics, and automated tests (shift-left),
    ensuring services built on our foundation are robust and easy to monitor Collaborate
    with Model Infrastructure team to tackle challenges unique to GenAI-native applications
    — such as supporting high-throughput model inference, managing streaming and long-running
    API interactions, and designing abstractions for retrieval, context handling,
    and prompt lifecycle Collaborate with the Developer Experience and Infrastructure
    teams (who own CI/CD pipelines, build tools, and release infrastructure) to integrate
    our platform components seamlessly into the deployment and monitoring ecosystem
    Work closely with product engineering teams to gather feedback, evangelize best
    practices, and make the “paved road” approach a reality — providing strong defaults
    and clear documentation so teams can move fast with confidence What You Have 5+
    years of software engineering experience (post-BS/MS), including building scalable
    backend systems or internal developer platforms Proficiency in Python (or similar
    languages) and deep knowledge of backend development fundamentals (APIs, data
    stores, concurrency, distributed systems) Hands-on experience with web frameworks
    and service architectures (e.g. Flask/FastAPI, Bounded context services, microservices)
    and an understanding of designing clean, versioned APIs Familiarity with caching,
    messaging, and database technologies (Redis, Kafka, SQL/NoSQL databases, Vector
    databases, etc.) and how to use them effectively for high performance and reliability
    A track record of writing high-quality, well-tested code and using tools (unit/integration
    testing, static typing, CI) to catch issues early and ensure reliability Strong
    problem-solving skills and a passion for improving developer experience —'
