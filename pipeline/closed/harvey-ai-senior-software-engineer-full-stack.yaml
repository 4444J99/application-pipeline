    the bar is high, and the opportunity for growth — personal, professional, and
    financial — is unmatched. Our team is sharp, motivated, and deeply committed to
    the mission. We move fast, operate with intensity, and take real ownership of
    the problems we tackle — from early thinking to long-term outcomes. We stay close
    to our customers — from leadership to engineers — and work together to solve real
    problems with urgency and care. If you thrive in ambiguity, push for excellence,
    and want to help shape the future of work alongside others who raise the bar,
    we invite you to build with us. At Harvey, the future of professional services
    is being written today — and we’re just getting started. Role Overview As a Software
    Engineer on the Product Engineering team at Harvey, you will own and lead engineering
    projects across our various product lines. You will work closely with our AI,
    Legal, and GTM teams to build secure systems that deliver value to our customers.
    We are looking for individuals who have worked across the stack on incredible
    products across consumer, enterprise, and various industries and who are excited
    about building the future of application layer and genAI products. This role is
    based in San Francisco, CA. We use an in-person work model and offer relocation
    assistance to new employees. What You’ll Do Retrieval over peta-byte scale documents
