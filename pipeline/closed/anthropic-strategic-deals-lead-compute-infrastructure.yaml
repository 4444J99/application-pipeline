  description: <div class="content-intro"><h2><strong>About Anthropic</strong></h2>
    <p>Anthropic’s mission is to create reliable, interpretable, and steerable AI
    systems. We want AI to be safe and beneficial for our users and for society as
    a whole. Our team is a quickly growing group of committed researchers, engineers,
    policy experts, and business leaders working together to build beneficial AI systems.</p></div><h2><strong>About
    the role:</strong></h2> <p>We are seeking a Strategic Deals Lead, Compute &amp;
    Infrastructure team member to drive the planning and execution of programs critical
    to Anthropic's compute infrastructure strategy. In this role, you will manage
    internal and external stakeholders to bring clarity to our compute technology
    roadmaps, help prioritize across technical and non-technical teams, and focus
    on securing and delivering compute capacity.</p> <p>Anthropic's AI models are
    available on both our first-party platforms (claude.ai and our API) as well as
    through our major cloud partners. Ensuring tight coordination between our internal
    teams and external partners is essential to our ability to stay on the frontier
    of AI development. You will work closely with engineering, finance, and partnership
    teams to drive execution of technical roadmaps, support deal structuring, and
    manage the operational aspects of our compute partnerships.</p> <p>This role combines
    technical program management with elements of strategic operations, partnership
    development, and financial analysis. You will be an integral part of a team focused
    on securing the compute resources Anthropic needs to pursue its mission of developing
    safe, beneficial AI systems.</p> <h2><strong>Responsibilities:</strong></h2> <ul>
    <li>Drive cross-functional coordination across Engineering, Finance, and external
    partners to define, scope, and deliver on compute partnership initiatives</li>
    <li>Develop and maintain detailed project plans, timelines, and status reporting
    for technical programs related to compute infrastructure and partnerships</li>
    <li>Partner with engineering leaders to translate technical requirements into
    actionable roadmaps and track execution against milestones</li> <li>Support the
    structuring and negotiation of strategic compute deals, including financial modeling,
    term analysis, and vendor evaluation</li> <li>Build and maintain relationships
    with key stakeholders at cloud providers and infrastructure partners</li> <li>Develop
    and manage systems, processes, and documentation to support program management
    efficiency and stakeholder visibility</li> <li>Analyze financial and operational
    data to inform decision-making on compute capacity planning and vendor strategy</li>
    <li>Provide clear and transparent reporting on program status, issues, and risks
    to leadership</li> </ul> <h2><strong>You might be a good fit if you have:</strong></h2>
    <ul> <li>8-10 years of experience in technical product/program management, business
    development, or strategic partnerships roles at technology companies</li> <li>Experience
    structuring and negotiating strategic customer deals or partnerships within the
    technology space (cloud services, semiconductors, data center/infrastructure)</li>
    <li>Background in cloud computing, data center infrastructure, compute/silicon
    development, or technology-focused investment banking or consulting</li> <li>Familiarity
    with data center infrastructure, compute hardware, and/or silicon development
    cycles</li> <li>Comfort with financial analysis and modeling; experience with
    vendor financing arrangements is a plus</li> <li>Strong interpersonal and communication
    skills with the ability to influence and align diverse stakeholders</li> <li>Ability
    to drive clarity in ambiguous environments and manage competing priorities with
    high-quality execution</li> <li>A track record of managing cross-functional initiatives
    in fast-paced, scaling technology environments</li> <li>A passion for Anthropic's
    mission and ensuring safe AI development</li> </ul> <h2><strong>Strong candidates
    may also have:</strong></h2> <ul> <li>Experience managing external partnerships
    with large-scale cloud providers or hardware vendors</li> <li>Understanding of
    AI/ML infrastructure requirements and compute capacity planning</li> <li>Experience
    with vendor financing, equipment leasing, or infrastructure investment analysis</li>
    <li>Background in technical due diligence or technology M&amp;A</li> </ul><div
    class="content-pay-transparency"><div class="pay-input"><div class="description"><p>The
    annual compensation range for this role is listed below.&nbsp;</p> <p>For sales
    roles, the range provided is the role’s On Target Earnings ("OTE") range, meaning
    that the range includes both the sales commissions/sales bonuses target and annual
    base salary for the role.</p></div><div class="title">Annual Salary:</div><div
    class="pay-range"><span>$250,000</span><span class="divider">&mdash;</span><span>$310,000
    USD</span></div></div></div><div class="content-conclusion"><h2
