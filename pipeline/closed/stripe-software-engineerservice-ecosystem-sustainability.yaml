  description: <h2><strong>Who We Are</strong></h2> <h2><strong>About Stripe</strong></h2>
    <p>Stripe is a financial infrastructure platform for businesses. Millions of companies—from
    the world’s largest enterprises to the most ambitious startups—use Stripe to accept
    payments, grow their revenue, and accelerate new business opportunities. Our mission
    is to increase the GDP of the internet, and we have a staggering amount of work
    ahead. That means you have an unprecedented opportunity to put the global economy
    within everyone’s reach while doing the most important work of your career.</p>
    <h2><strong>About the team</strong></h2> <p>The Service Platform organization
    within Stripe focuses on enabling Stripe engineers to write and ship useful services
    that efficiently leverage infrastructure capabilities. We do so by building effective
    frameworks and abstractions on top of the core infrastructure platforms that abstract
    away challenging infrastructure complexities and promote best practices. We are
    forming a new Service Ecosystem Sustainability team within this organization.
    This team will be accountable for the health, consistency, and modernity of the
    service infrastructure ecosystem.</p> <p>This is a critical cross-functional team
    that will collaborate closely across infrastructure and product teams. This is
    a challenging and impactful work that is crucial for reducing fragmentation and
    improving safe and consistent usage of the infrastructure.&nbsp;&nbsp;</p> <h1><strong>What
    you’ll do</strong></h1> <p>As an engineer in the Service Ecosystem Sustainability
    team, you will help guide our service infrastructure sustainability roadmap. You
    will invest in the most impactful sustainability initiatives and work towards
    the goal of reducing fragmentation and promoting the use of the newer, better
    and safer abstractions. You will build strong partnerships, work on complex projects
    and provide technical guidance to the junior engineers on the team.&nbsp;</p>
    <h1><strong>Who you are</strong></h1> <p>We’re looking for someone who meets these
    requirements to be considered for the role. If you meet these requirements, you
    are encouraged to apply.&nbsp;</p> <h2><strong>Minimum requirements</strong></h2>
    <ul> <li>4+ years of professional software development experience in the domain
    of distributed systems and service oriented architecture, including technical
    leadership of projects</li> <li>Experience in architecting and designing large-scale
    systems that delivered meaningful impact to a business</li> <li>Skilled in working
    across infrastructure and product teams - building alignment, driving decision
    making, and communicating transparently</li> <li>Passionate about improving productivity
    and developer experience of internal product teams</li> <li>Eager to learn and
    effective at giving and receiving constructive feedback to/from peer engineers</li>
    </ul> <h2><strong>Preferred qualifications</strong></h2> <ul> <li>Experience building
    and operating microservices in Java and/or Ruby</li> <li>Experience communicating
    and collaborating effectively across globally distributed teams</li> <li>Experience
    with effectively planning and executing large scale migrations.</li> <li>Experience
    mentoring and helping in the development of engineers and peers</li> <li>Strong
    written and verbal communication skills for different audiences (leadership, users,
    stakeholders etc.).</li> </ul>
