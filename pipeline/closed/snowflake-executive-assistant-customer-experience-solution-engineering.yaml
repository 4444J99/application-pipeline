  description: 'Snowflake is about empowering enterprises to achieve their full potential
    — and people too. With a culture that’s all in on impact, innovation, and collaboration,
    Snowflake is the sweet spot for building big, moving fast, and taking technology
    — and careers — to the next level. Executive Assistant, Customer Experience, Solution
    Engineering Menlo Park, CA or Dublin, CA Snowflake is looking for an experienced
    Executive Assistant to join our Customer Experience, Solution Engineering team.
    As an Executive Assistant, you’re at the center of the team’s business operations
    and activities, and are relied upon to keep the team moving in a positive, forward
    direction. You are organized, dependable and able to keep up with changing business
    needs - using your understanding to strategically support and prioritize your
    team’s projects. You also have communication skills needed to interact with a
    variety of people and job functions including customers, partners and vendors.
    The ideal candidate will thrive in a fast-paced environment, proactively solving
    problems, and helping executives effectively scale the business by providing structure
    and organization. RESPONSIBILITIES: Effectively manage complex calendars for four
    executives, prioritizing strategic scheduling. Manage team budget, travel and
    expenses; process all expenses and reimbursements; manage invoices and Purchase
    Orders. Create, organize and maintain team resources to include: mailing lists,
    folders, drives so that information is easily-accessible and well-organized. Coordinate
    team building activities and events, as well as managing and coordinating the
    content and flow of large scale meetings such as All Hands, QBRs and leadership
    reviews. Manage domestic and international travel and event logistics for multiple
    executives. Attend team meetings and track action items, assist with day-to-day
    projects, help build and improve processes and systems. Be the main liaison for
    coordinating meetings and external engagements with our customers, and partners.
    Lead and manage various projects. Other duties as assigned. SKILLS & EXPERIENCE:
    Bachelor’s degree and 5+ years of relevant work experience -- direct executive
    support, project management, and event planning experience. Proven ability to
    manage time efficiently and prioritize multiple stakeholders, functions and tasks.
    Proactive with a strong sense of ownership, honesty, and humility. Excellent communication
    and interpersonal skills. Experience implementing systems, processes, or programs
    that increase efficiency. Positive, can-do attitude and willingness to jump into
    a myriad of projects. Resourceful self-starter with an eagerness to learn, asks
    questions and can make logical, proactive decisions in a fast-paced and demanding
    environment. Detail-oriented with high precision in logistics and scheduling.
    Experience working with all levels of management, employees, vendors, and customers.
    Embrace and spread the Snowflake culture which revolves around our values. We’re
    looking for people who share our passion for ground-breaking technology and want
    to create a lasting future for you and Snowflake. Every Snowflake employee is
    expected to follow the company’s confidentiality and security standards for handling
    sensitive data. Snowflake employees must abide by the company’s data security
    plan as an essential part of their duties. It is every employee''s duty to keep
    customer information secure and confidential. Snowflake is growing fast, and we’re
    scaling our team to help enable and accelerate our growth. We are looking for
    people who share our values, challenge ordinary thinking, and push the pace of
    innovation while building a future for themselves and Snowflake. How do you want
    to make your impact? For jobs located in the United States, please visit the job
    posting on the Snowflake Careers Site for salary and benefits information: careers.snowflake.com'
