  description: 'Snowflake is about empowering enterprises to achieve their full potential
    — and people too. With a culture that’s all in on impact, innovation, and collaboration,
    Snowflake is the sweet spot for building big, moving fast, and taking technology
    — and careers — to the next level. Snowflake is looking for someone with adaptability
    and aptitude to join our Product admin team and elevate the business through proactive
    and holistic support of Engineering leadership. As an Executive Assistant, you’re
    at the center of the team’s business operations and activities, and are relied
    upon to keep the team moving in a positive, forward direction. You are organized,
    dependable and able to keep up with changing business needs - using your understanding
    to strategically support and prioritize your team’s projects. You also have communication
    skills needed to interact with a variety of people and job functions including
    customers, partners and vendors. In this role you will work closely with a team
    of Administrative professionals and manage the day-to-day operations of the office
    and help keep teams efficient, happy and productive. RESPONSIBILITIES: Perform
    an extensive array of core administrative tasks: Effectively manage and maintain
    complex calendars for Product Leadership. Book complex travel and manage team
    and executive level expenses. Create, organize and maintain team mailing lists,
    folders, drives. Organize, plan and execute team events. Respond to questions
    and requests for information by employees and guests, connecting people with the
    right resources. Responsible for greeting executive’s guests (ie. interviews,
    customers, etc.) and ensuring every guest sign in upon arrival. Attend team meetings
    and track action items, assist with day-to-day projects, help build and improve
    processes and systems. Drive projects and own the operations of programs and initiatives
    within the Product team. Be the main liaison for coordinating meetings and external
    engagements with our customers, and partners. Lead and manage small projects within
    the administrative team. Other duties as assigned. SKILLS & EXPERIENCE: Bachelor’s
    degree and 5+ years of relevant work experience -- direct executive support, project
    management, and event planning experience. Proven ability to manage time efficiently
    and prioritize multiple stakeholders, functions and tasks. Excellent communication
    and interpersonal skills; proven ability to take initiative and build strong,
    productive relationships. Experience implementing systems, processes, or programs
    that increase efficiency. Positive, can-do attitude and willingness to jump into
    a myriad of projects. Resourceful self-starter that is curious, asks questions
    and can make logical, proactive decisions in a fast-paced and demanding environment.
    Extreme attention to detail, organized and responsive. Embrace and spread the
    Snowflake culture which revolves around our values Generally tech savvy Experience
    working with all levels of management, employees, vendors, and customers We’re
    looking for individuals who share our passion for groundbreaking technology and
    want to help create a lasting future for you and Snowflake. Every Snowflake employee
    is expected to follow the company’s confidentiality and security standards for
    handling sensitive data. Snowflake employees must abide by the company’s data
    security plan as an essential part of their duties. It is every employee''s duty
    to keep customer information secure and confidential. Snowflake is growing fast,
    and we’re scaling our team to help enable and accelerate our growth. We are looking
    for people who share our values, challenge ordinary thinking, and push the pace
    of innovation while building a future for themselves and Snowflake. How do you
    want to make your impact? For jobs located in the United States, please visit
    the job posting on the Snowflake Careers Site for salary and benefits information:
    careers.snowflake.com'
