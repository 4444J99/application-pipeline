  description: <p>We’re looking for people who care deeply about customers and are
    passionate about building products that improve the way millions of teams work
    together. As a member of the team developing the software of a product-led company,
    you won’t just code — you will be an integral part of the entire product development
    process, from conception to post-launch reflection. Asana is helping teams become
    significantly more productive with our leading work management platform. You will
    be manifesting continuous improvements in their experience and helping us achieve
    our mission to enable all teams to work together effortlessly.</p> <p>The Product
    team builds features end-to-end. From designing our data models to implementing
    the subtle interaction behaviors that differentiate good software from great software.
    We work closely with UI designers and are supported by our infrastructure team.
    We aim to delight users with both large new features and smaller, daily product
    enhancements—thanks to our continuous deployment architecture. We want to create
    a superlative user experience, down to the smallest details.</p> <p>This role
    is based in our Vancouver office with an office-centric hybrid schedule. The standard
    in-office days are Monday, Tuesday, and Thursday. Most Asanas have the option
    to work from home on Wednesdays. Working from home on Fridays depends on the type
    of work you do and the teams with which you partner. If you're interviewing for
    this role, your recruiter will share more about the in-office requirements.</p>
    <p><strong>What you’ll achieve</strong></p> <ul> <li>Work in a high-performance,
    dynamic team with a strong focus on velocity and software quality</li> <li>Contribute
    to building a complex SaaS application that is a market leader in its segment&nbsp;</li>
    <li>Be exposed to Asana’s core infrastructure, particularly how data is represented,
    stored and deleted in the storage layer.</li> <li>Work with asynchronous jobs
    and efficiently and implement algorithms that efficiently traverse the Asana Work
    Graph</li> <li>Work with legal to implement data ownership rules, requiring simple
    and effective technical solutions to make this process easy and clear to customers.&nbsp;</li>
    <li>Drive large, impactful projects, delivering features that will be rolled out
    and used in large organizations</li> <li>Support other teams and stakeholders
