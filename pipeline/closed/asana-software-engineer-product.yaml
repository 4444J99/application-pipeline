    <li>2+ years of experience working within large, well-maintained codebases</li>
    <li>Excellent communication skills for collaborating with cross-functional partners
    (e.g. PM, design)</li> <li>Sound judgment when balancing moving quickly with producing
    quality code and long-term code maintainability</li> <li>Passionate about creating
    a superlative user experience and attentive to details</li> <li>Appreciate productivity
    and care deeply about helping teams collaborate more effectively and efficiently,
    including your own</li> <li>Excited to be a part of an inclusive culture where
    everyone brings the aspects of themselves to the workplace that they need to thrive</li>
    <li>Demonstrated curiosity about AI tools and emerging technologies, with a willingness
    to learn and leverage them to enhance productivity, collaboration, or decision-making</li>
    </ul> <p><em>At Asana, we're committed to building teams that include a variety
    of backgrounds, perspectives, and skills, as this is critical to helping us achieve
    our mission. If you're interested in this role and don't meet every listed requirement,
    we still encourage you to apply.</em></p> <p><strong>What we’ll offer</strong></p>
    <p>Our comprehensive compensation package plays a big part in how we recognize
    you for the impact you have on our path to achieving our mission. We believe that
    compensation should be reflective of the value you create relative to the market
    value of your role. To ensure pay is fair and not impacted by biases, we're committed
    to looking at market value which is why we check ourselves and conduct a yearly
    pay equity audit.</p> <p>For this role, the estimated base salary range is between
    $146,000 CAD - $158,000 CAD. The actual base salary will vary based on various
    factors, including market and individual qualifications objectively assessed during
    the interview process. The listed range above is a guideline, and the base salary
    range for this role may be modified.</p> <p>In addition to base salary, your compensation
    package may include additional components such as equity, sales incentive pay
