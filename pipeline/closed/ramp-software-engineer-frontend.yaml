  description: "About Ramp Ramp is building the smart infrastructure for finance teams,\
    \ embedded in the transaction flow of every dollar a business spends. We automate\
    \ how over $100B in annualized spend flows in and out of 50,000+ companies: authorizing\
    \ payments, flagging risk, categorizing spend, and closing books. The problems\
    \ are high-stakes, data-dense, and unforgiving. We hire people with high agency\
    \ and high urgency. We look for slope over intercept. We care less about where\
    \ you trained and more about what you\u2019ve built. At Ramp, everyone is a builder\
    \ who owns problems end to end and makes consequential decisions that shape the\
    \ outcome. The median Ramp customer saves 5% and grows revenue 16% in their first\
    \ year \u2013 far in excess of businesses operating without Ramp. We believe every\
    \ ambitious company deserves the same. If you want to build systems that directly\
    \ shape how companies move and manage billions, Ramp is the place to do it. About\
    \ the Role Our ideal candidate has a deep understanding of JavaScript, a passion\
    \ for web performance, and can creatively come up with solutions to solve customer's\
    \ needs. Our tech stack currently involves TypeScript, React, Vite, and Ryu, our\
    \ in-house design system. Check out our Engineering Blog for more on our tech\
    \ stack, mission and values! What You\u2019ll Do Build! Design performant, beautiful,\
    \ and usable interfaces Collaborate on our technical vision. Lead discussions\
    \ and implementation of multiple complex projects Foster a culture of upholding\
    \ industry-leading UX Continuously improve our engineering processes, tools, and\
    \ systems that allow us to scale the code base, productivity, and the team Recruit,\
    \ interview and develop your own interview questions, while fostering the culture\
    \ of excellence, velocity and humility Inspire and mentor less experienced engineers\
    \ and interns What You'll Need Minimum of 2 years of frontend engineering experience\
    \ preferred Proficiency in JavaScript and React Knack for getting the visuals\
    \ right Track record of shipping high-quality products and developing projects\
    \ at scale Ability to turn business and product ideas into engineering solutions\
    \ Desire to work in a fast-paced environment, continuously grow, and master your\
    \ craft Alignment with Ramp\u2019s core values of enabling businesses to grow\
    \ more by spending less Benefits (for U.S.-based full-time employees) 100% medical,\
    \ dental & vision insurance coverage for you Partially covered for your dependents\
    \ One Medical annual membership 401k (including employer match on contributions\
    \ made while employed by Ramp) Flexible PTO Fertility HRA (up to $10,000 per year)\
    \ Parental Leave Unlimited AI token usage Pet insurance Centralized home-office\
    \ equipment ordering for all employees Health and Wellness stipend In-office perks:\
    \ lunch, snacks, drinks, and more Budget for intra-office travel Relocation support\
    \ to NYC or SF (as needed) Referral Instructions If you are being referred for\
    \ the role, please contact that person to apply on your behalf. Other notices\
    \ Pursuant to the San Francisco Fair Chance Ordinance, we will consider for employment\
    \ qualified applicants with arrest and conviction records. Beware of recruiting\
    \ scams: Ramp will only contact you through official @ Ramp.com email addresses\
    \ and will never ask for payment or sensitive personal information during the\
    \ hiring process. Ramp Applicant Privacy Notice"
