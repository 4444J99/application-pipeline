    database reliability, performance, and cost efficiency across multi-region deployments.
    This role has a direct impact on system availability, latency, and resiliency
    for customer-facing products and internal engineering teams.</p> <p>Here are a
    few talks + blog posts from the team!</p> <ul> <li><a href="https://youtu.be/MBvyZENChk0?si=1cNuPCHvMvrZAZww&amp;t=2022">Listen</a>
