    it’s where ambitious people do the best work of their careers. We’re a high-performing,
    fast-moving team with ethics at the center of everything we do. Expectations are
    high, and so are the rewards.</p> <p>The <strong>Storage Platform</strong> team
    builds and operates the platform that powers database access across Robinhood.
    We own relational (Postgres/Aurora), key-value (DynamoDB), and caching systems,
    along with the SDKs, control plane automation, and data plane services that enable
    safe and reliable access at scale. Our mission is to standardize and strengthen
    how services connect to storage, improve reliability and performance, and reduce
    operational overhead through automation. We manage thousands of databases and
    hundreds of caching clusters supporting millions of users and critical brokerage
    workloads. Availability is our highest priority — our systems are designed to
    meet strict uptime targets, including no downtime during market hours.</p> <p>As
    a <strong>Staff Software Engineer</strong>, you will design and evolve the core
    infrastructure that underpins Robinhood’s storage systems. You’ll lead complex
    distributed systems initiatives such as horizontal sharding, proxy-based query
