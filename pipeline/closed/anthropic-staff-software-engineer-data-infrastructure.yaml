    data scientists, analysts, and business stakeholders while diving deep into cloud
    infrastructure primitives.</p> <h2 class="heading"><strong>Responsibilities:</strong></h2>
    <p>Within Data Infra, you may be matched to critical business areas including:&nbsp;</p>
