    Backend team, you''ll join a new, fast-growing product area. You will help define
    our technical vision, influence the product roadmap, and solve complex engineering
    challenges at scale.</p> <p>In Product Analytics, we consume and process data
    from multiple sources: clickstreams, user information, and data from third-party
    systems. Your work will be central to building a robust and flexible system that
    can ingest, manipulate, correlate and store all this data to have it efficiently
    queried by our end users.</p> <p><em>At Datadog, we place value in our office
    culture - the relationships that it builds, the creativity it brings to the table,
    and the collaboration of being together. We operate as a hybrid workplace to ensure
    our employees can create a work-life harmony that best fits them.</em></p> <p>&nbsp;</p>
    <p><strong>What You’ll Do:&nbsp;</strong></p> <ul> <li>Design, build, and maintain
    core backend systems for Product Analytics, ensuring scalability, reliability,
    and high performance&nbsp;</li> <li>Drive technical architecture decisions in
    alignment with product goals and collaborate closely with frontend and platform
    teams&nbsp;</li> <li>Work with our core platform teams to tailor Datadog''s storage
    and query solutions to our needs</li> <li>Create a strong team culture aligned
    with our engineering standards and our customer focus</li> <li>Participate in
    hands-on engineering work including coding, code reviews, and design reviews</li>
    </ul> <p>&nbsp;</p> <p><strong>Who You Are:&nbsp;</strong></p> <ul> <li>A seasoned
    backend engineer with deep expertise in designing and building distributed systems&nbsp;</li>
    <li>Comfortable influencing technical direction without direct management authority,
    operating as a technical leader and mentor&nbsp;</li> <li>Interested in working
    on an early stage project with many challenges to solve and a fast iteration cycle&nbsp;</li>
    <li>You have a track record of delivering high-quality software products on schedule
    and collaborating closely with product partners&nbsp;</li> <li>Strong technician,
    particularly with Go, Java or SQL, who is interested in remaining a hands-on contributor</li>
    <li><span data-sheets-root="1">You’re excited about leveraging AI tools to enhance
    how you code, solve problems, and build – or eager to learn how</span></li> <li><span
    data-sheets-root="1">You have demonstrated ability to use AI coding tools in day-to-day
    workflows and validate, critique, and refine AI-generated output</span></li> <li><span
    data-sheets-root="1">Bonus: you’re motivated to push the boundaries of how AI
    can improve software engineering best practices and contribute to building AI-enabled
