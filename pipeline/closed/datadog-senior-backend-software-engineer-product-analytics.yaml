    for in-house networking</li> <li>An inclusive company culture, ability to join
    our Community Guilds (Datadog employee resource groups)</li> <li>Access to Inclusion
    Talks, our Internal panel discussions</li> <li>Free, global mental health benefits
    for employees and dependents age 6+</li> <li>Competitive global benefits</li>
    </ul> <p><br><em>Benefits and Growth listed above may vary based on the country
    of your employment and the nature of your employment with Datadog.</em></p> <p
    style="color: white;">#LI-Hybrid</p><div class="content-conclusion"><hr> <p><strong>About
    Datadog:&nbsp;</strong></p> <p>Datadog (NASDAQ: DDOG) is a global SaaS business,
