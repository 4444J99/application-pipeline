  description: 'About Us: Notion helps you build beautiful tools for your life’s work.
    In today''s world of endless apps and tabs, Notion provides one place for teams
    to get everything done, seamlessly connecting docs, notes, projects, calendar,
    and email—with AI built in to find answers and automate work. Millions of users,
    from individuals to large organizations like Toyota, Figma, and OpenAI, love Notion
    for its flexibility and choose it because it helps them save time and money. In-person
    collaboration is essential to Notion''s culture. We require all team members to
    work from our offices on Mondays, Tuesdays, and Thursdays, our designated Anchor
    Days. Certain teams or positions may require additional in-office workdays. About
    the Role: You’ll design and implement reliable, secure, and scalable workplace
    systems across identity, SaaS, automation, and endpoint/VDI programs—including
    desktop applications, web applications, and API-based integrations—while partnering
    closely with IT Operations and Security. What You''ll Achieve: Design and implement
    cross-functional IT solutions (IAM/SSO, SaaS integrations, device/VDI, and workflow
    automation) that improve productivity and reliability Own technical deliverables
    end-to-end: discovery, solution design, implementation, documentation, and operational
    handoff Partner with Security/AppSec to review designs and ensure pragmatic, risk-appropriate
    controls Collaborate with IT Operations to build runbooks, monitoring, and escalation
    paths so solutions are supportable at scale Automate repetitive work (provisioning,
    access lifecycle, audits, reporting) using APIs, scripts, and infrastructure-as-code
    where appropriate Become a technical advisor for stakeholders, translating business
    needs into system design, tradeoffs, and clear execution plans Skills You''ll
    Need to Bring: Growth mindset with a tinkerer''s nature—you love to code and enjoy
    building solutions to complex problems 2+ years in Solutions/Systems Engineering,
    IT Engineering, or similar roles delivering internal platforms and workflows Strong
    fundamentals in identity and access ( SAML/OIDC, SCIM, RBAC, group lifecycle,
    least privilege ) Experience integrating SaaS tools ( Okta/Entra, Google Workspace/O365,
    Slack, Jira/GitHub, etc. ) and troubleshooting auth/provisioning flows Proficiency
    writing automation in Python, TypeScript, Bash, or PowerShell, with familiarity
    in CI/CD and version control Ability to produce clear documentation ( design docs,
    runbooks, and stakeholder updates ) and drive alignment across teams Proven experience
    with Infrastructure-as-Code and IaaS Pragmatic security mindset with strong debugging
    skills across logs, APIs, and system behavior AI-forward mindset —hands-on with
    tools like Notion AI, Claude, Claude Code, and Cursor to work smarter We hire
    talented and passionate people from a variety of backgrounds because we want our
    global employee base to represent the wide diversity of our customers. If you’re
    excited about a role but your past experience doesn’t align perfectly with every
    bullet point listed in the job description, we still encourage you to apply. If
    you’re a builder at heart, share our company values, and enthusiastic about making
    software toolmaking ubiquitous, we want to hear from you. Notion is proud to be
    an equal opportunity employer. We do not discriminate in hiring or any employment
    decision based on race, color, religion, national origin, age, sex (including
    pregnancy, childbirth, or related medical conditions), marital status, ancestry,
    physical or mental disability, genetic information, veteran status, gender identity
    or expression, sexual orientation, or other applicable legally protected characteristic.
    Notion considers qualified applicants with criminal histories, consistent with
    applicable federal, state and local law. Notion is also committed to providing
    reasonable accommodations for qualified individuals with disabilities and disabled
    veterans in our job application procedures. If you need assistance or an accommodation
    due to a disability, please let your recruiter know. Notion is committed to providing
    highly competitive cash compensation, equity, and benefits. The compensation offered
    for this role will be based on multiple factors such as location, the role’s scope
    and complexity, and the candidate’s experience and expertise, and may vary from
    the range provided below. For roles based in San Francisco or New York City, the
    estimated base salary range for this role is $140,000-$160,000 per year. By clicking
    “Submit Application”, I understand and agree that Notion and its affiliates and
    subsidiaries will collect and process my information in accordance with Notion’s
    Global Recruiting Privacy Policy and NYLL 144 . #LI-Onsite'
