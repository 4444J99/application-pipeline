  description: 'About the team Marketing Innovation is a product engineering team
    embedded within OpenAI’s broader Demand Gen and Marketing organization. The team
    builds agentic, AI‑native systems that directly drive revenue, pipeline, and marketing
    leverage. Our mandate is to own and scale autonomous, customer‑facing and internal
    systems that operate at massive scale. This includes building autonomous, customer‑facing
    systems that engage with prospects, generate pipeline and revenue, and shape the
    future of how marketing and revenue teams operate in an AI‑native world. We focus
    on problems that exceed the limits of low‑code tools and long‑tail workflow automation.
    When a problem requires a native product experience, deep system integration,
    and high standards for precision, safety, and reliability, Marketing Innovation
    steps in. About the role We’re looking for product‑minded software engineers to
    join the Marketing Innovation team. As a Software Engineer on this team, you will
    build and own autonomous, customer‑facing agentic systems that interface directly
    with enterprise customers, prospects, and revenue‑critical workflows. You will
    partner closely with functional leaders across scaled revenue, demand gen, and
    marketing to understand desired outcomes, then translate those needs into production‑grade
    systems. You will move quickly from ambiguous problem statements to working software
    in production. Your work will be measured not by output, but by impact: revenue,
    enterprise pipeline, and Marketing efficiency. This role is ideal for engineers
    who want ownership over real systems, enjoy building 0->1 products, and are excited
    to define new categories of AI‑native products and workflows. In this role, you
    will: Build autonomous and semi‑autonomous customer‑facing and internal agentic
    systems that directly drive Revenue, Pipeline, and Marketing efficiency. Own end‑to‑end
    product execution, from early prototypes to reliable production systems with strong
    instrumentation and evals. Work across the full stack, including APIs, orchestration,
    data flows, frontend experiences, and deployment. Partner closely with marketing,
    demand gen, and enterprise sales stakeholders to define success metrics and functional
    requirements. Apply OpenAI models and tooling in novel ways, making informed tradeoffs
    between models, platforms, and architectures. Continuously iterate based on live
    usage, agent behavior, and performance data. You’ll thrive in this role if you
    Have 4+ years of experience as a software, product, or ML engineer working on
    user‑ or customer‑facing systems. Have built, deployed, or operated complex systems
    in production, ideally including agents or automation at scale. Are comfortable
    working without a groomed backlog and enjoy framing problems, proposing solutions,
    and executing end‑to‑end. Are fluent in Python or JavaScript and comfortable building
    full‑stack applications. Have hands‑on experience with APIs, cloud infrastructure,
    orchestration, and production monitoring. Are curious about modern AI models and
    excited to experiment with how evolving capabilities change system design. Have
    familiarity with sales, marketing, or go‑to‑market workflows, or are eager to
    learn how revenue systems operate. Operate with a strong sense of ownership, move
    quickly, and care deeply about measurable business outcomes. Are collaborative,
    pragmatic, and motivated to build at the frontier of applied AI. About OpenAI
    OpenAI is an AI research and deployment company dedicated to ensuring that general-purpose
    artificial intelligence benefits all of humanity. We push the boundaries of the
    capabilities of AI systems and seek to safely deploy them to the world through
    our products. AI is an extremely powerful tool that must be created with safety
    and human needs at its core, and to achieve our mission, we must encompass and
    value the many different perspectives, voices, and experiences that form the full
    spectrum of humanity. We are an equal opportunity employer, and we do not discriminate
    on the basis of race, religion, color, national origin, sex, sexual orientation,
    age, veteran status, disability, genetic information, or other applicable legally
    protected characteristic. For additional information, please see OpenAI’s Affirmative
    Action and Equal Employment Opportunity Policy Statement . Background checks for
    applicants will be administered in accordance with applicable law, and qualified
    applicants with arrest or conviction records will be considered for employment
    consistent with those laws, including the San Francisco Fair Chance Ordinance,
    the Los Angeles County Fair Chance Ordinance for Employers, and the California
    Fair Chance Act, for US-based candidates. For unincorporated Los Angeles County
    workers: we reasonably believe that criminal history may have a direct, adverse
    and negative relationship with the following job duties, potentially resulting
    in the withdrawal of a conditional offer of employment: protect computer hardware
    entrust'
