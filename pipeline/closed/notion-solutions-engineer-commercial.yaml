  description: "About Us: Notion helps you build beautiful tools for your life\u2019\
    s work. In today's world of endless apps and tabs, Notion provides one place for\
    \ teams to get everything done, seamlessly connecting docs, notes, projects, calendar,\
    \ and email\u2014with AI built in to find answers and automate work. Millions\
    \ of users, from individuals to large organizations like Toyota, Figma, and OpenAI,\
    \ love Notion for its flexibility and choose it because it helps them save time\
    \ and money. In-person collaboration is essential to Notion's culture. We require\
    \ all team members to work from our offices on Mondays, Tuesdays and Thursdays,\
    \ our designated Anchor Days. Certain teams or positions may require additional\
    \ in-office workdays. About the Role: Notion\u2019s sales motion is evolving from\
    \ product-led to sales-led. Many customers start self-serve, then partner with\
    \ our team as they scale. As a Solutions Engineer focused on our Commercial segment,\
    \ you\u2019ll work primarily with companies of roughly 100\u2013300 employees.\
    \ You\u2019ll pair closely with Account Executives to run discovery, deliver tailored\
    \ demos, scope lightweight solutions, and guide prospects through evaluation,\
    \ security, and deployment so they can adopt Notion quickly and successfully.\
    \ You\u2019ll be joining a growing team and will have opportunities to improve\
    \ our tools, content, and processes while staying close to customers. What You\u2019\
    ll Do: Partner with AEs on customer engagements across the Commercial segment\
    \ to understand goals and success criteria Lead discovery, design solution approaches\
    \ in Notion, and deliver persuasive product demos tailored to each prospect\u2019\
    s workflows Advise on integrations and basic technical topics such as SSO/SAML,\
    \ SCIM, and admin controls, escalating to specialists for deeper needs Answer\
    \ product and technical questions, and support standard security and procurement\
    \ reviews with clear, timely responses Create proof-of-concepts and example workspaces\
    \ that showcase how Notion can replace point tools and support team-wide workflows\
    \ Capture and communicate structured product feedback to Product and Engineering\
    \ Contribute enablement content for the sales team, including demo assets, talk\
    \ tracks, and competitive notes Document repeatable patterns, field learnings,\
    \ and best practices to strengthen our internal knowledge base What You'll Achieve:\
    \ Help Commercial customers evaluate, pilot, and launch Notion to meet their goals\
    \ Shorten sales cycles through crisp technical guidance and compelling demos Improve\
    \ our pre-sales playbooks and assets for the Commercial segment Influence the\
    \ roadmap by channeling customer insights Skills You'll Need to Bring: 2+ years\
    \ in a customer-facing technical role such as Solutions/Sales Engineer, Product\
    \ Manager, Solution Consultant, or Implementation Specialist Experience supporting\
    \ mid-market or Commercial deals, ideally at a SaaS company Ability to explain\
    \ APIs and integrations at a conceptual level and map them to customer workflows\
    \ Familiarity with identity and security concepts such as SSO/SAML, SCIM, user\
    \ provisioning, and basic security reviews Strong written and verbal communication,\
    \ with the ability to translate business needs into practical solution designs\
    \ and clear next steps Solid project coordination skills with the ability to run\
    \ multiple evaluations in parallel Adaptable, resourceful, and comfortable working\
    \ in a fast-changing environment You don\u2019t need to be an AI expert, but you\u2019\
    re curious and willing to adopt AI tools to work smarter and deliver better results.\
    \ Nice to Haves: Hands-on experience with Notion as a power user or workspace\
    \ admin Light scripting experience or the ability to write basic examples with\
    \ the Notion API Experience with relational data modeling and designing information\
    \ architecture Exposure to RFPs, security questionnaires, and procurement processes\
    \ Experience in a product-led growth environment We hire talented and passionate\
    \ people from a variety of backgrounds because we want our global employee base\
    \ to represent the wide diversity of our customers. If you\u2019re excited about\
    \ a role but your past experience doesn\u2019t align perfectly with every bullet\
    \ point listed in the job description, we still encourage you to apply. If you\u2019\
    re a builder at heart, share our company values, and enthusiastic about making\
    \ software toolmaking ubiquitous, we want to hear from you. Notion is proud to\
    \ be an equal opportunity employer. We do not discriminate in hiring or any employment\
