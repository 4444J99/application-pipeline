    Winter 2026 Report, Amplitude is the best-in-class solution for product, data,
    and marketing teams. Learn more at <a href="http://amplitude.com">amplitude.com</a>.</p>
    <p>As an organization, we deliver for our customers by living our values. We operate
    from a place of humility, take ownership of problems and successes, approach challenges
    with a growth mindset, and put our customers at the center of everything we do.</p>
    <p><strong>Amplitude’s Commitment to Diversity Equity &amp; Inclusion (DEI): </strong>Amplitude
    believes that diversity enables the creation of better products, improves the
    ability to solve complex problems, and drives more powerful solutions. We strive
    to create an environment of inclusion—one focused on psychological safety, empathy,
    and human connection—that will allow employees of all backgrounds to thrive.</p></div><p>The
    Developer Experience (DX) team at Amplitude builds and maintains the foundations
