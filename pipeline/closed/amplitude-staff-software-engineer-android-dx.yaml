    Our mission is to make Amplitude’s SDKs reliable, easy to adopt, and a joy to
    build on, so customers can confidently instrument their products and unlock insights
    at scale.</p> <p>We’re looking for a Staff Software Engineer, Android to play
    a key technical leadership role on our DevEx team. In this role, you will lead
    the design and development of Amplitude’s core Android SDKs, including Analytics
    and Session Replay, and serve as the Android platform expert that other SDK teams,
    such as Experiment, Guides, and Surveys rely on.</p> <p>As a Staff Engineer, you’ll
    operate with a wide scope and high impact: setting technical direction for the
    Android platform, driving cross-SDK architecture, improving performance and reliability,
    and raising the bar for developer experience across Amplitude’s mobile ecosystem.</p>
    <p><strong>As a Staff Software Engineer, you will:&nbsp;</strong></p> <ul> <li>Lead
    the technical direction, architecture, and long-term evolution of Amplitude’s
    Android SDK platform.</li> <li>Own and drive development of core Android SDKs,
    including Analytics and Session Replay, with a strong focus on performance, reliability,
    and ease of use.</li> <li>Act as the Android platform expert and trusted partner
    for other SDK teams (Experiment, Guides, Surveys), enabling them to build on shared
    foundations safely and efficiently.</li> <li>Design and evolve shared infrastructure,
    APIs, and abstractions that scale across multiple Android SDKs.</li> <li>Collaborate
    closely with Product, and Customer Support to ensure SDKs meet real customer needs.</li>
    <li>Lead cross-team technical discussions, reviews, and architectural decisions
    that span multiple SDKs.</li> <li>Improve developer experience through better
    APIs, documentation, tooling, testing strategies, and sample apps.</li> <li>Mentor
    senior and mid-level engineers, raising the overall quality and effectiveness
    of the team.</li> </ul> <p><strong>You''ll be a great addition to the team if
    you have:</strong></p> <ul> <li>A strong focus on developer experience and empathy
    for the engineers who use your work.</li> <li>Deep expertise in Android platform
    internals and best practices.</li> <li>Proficiency in Jetpack Compose beyond UI
    development, including its rendering pipeline and Composition internals.</li>
    <li>A track record of technical leadership where others look to you for guidance
    and decision-making.</li> <li>Strong judgment in making tradeoffs between API
    design, performance, backward compatibility, and speed of delivery.</li> <li>Comfort
    working across team boundaries and influencing without direct authority.</li>
    <li>A high bar for code quality, testing, and long-term maintainability.</li>
    <li>The ability to explain complex technical topics clearly to both technical
    and non-technical partners.</li> </ul> <p><strong>At a minimum, you need to have:</strong></p>
    <ul> <li>B.S., M.S., or Ph.D. in Computer Science or a related technical field,
    or equivalent practical experience.</li> <li>8+ years of professional software
    engineering experience, with significant time spent on Android development.</li>
    <li>Deep expertise in Android platform internals and best practices.</li> <li>Strong
    proficiency in Kotlin and Java, and experience with modern Android APIs and tooling.</li>
    <li>Experience designing public APIs with a strong focus on stability and backward
    compatibility.</li> <li>Experience debugging complex issues across a wide range
    of Android devices and OS versions.</li> <li>Familiarity with performance profiling,
    memory management, and concurrency on Android.</l'
