    office per week and offer relocation assistance to new employees. In this role,
    you will: Deliver an exceptional pre-sales customer experience for prospects and
    customers by providing technical expertise, outlining the value proposition, and
    answering product, API, and LLM-related questions. Demonstrate how leveraging
    ChatGPT and the OpenAI API can meet customers’ business needs and deliver substantial
    business value, including, but not limited to, building and presenting demos,
    scoping use cases, recommending architecture patterns, and providing in-depth
    technical advisory. Create and maintain documentation, guides, and FAQs related
    to common questions and requirements discovered during the pre-sales process.
    Foster customer advocacy and represent the voice of the customer with internal
    teams by gathering and relaying customer feedback, identifying themes across customers,
    and incorporating them into product planning. Serve as the first line of defense
    for security and compliance questions, explaining standardized collateral, guiding
    customers toward relevant resources (e.g., trust portal), and escalating complex
    requirements to the appropriate teams. You’ll thrive in this role if you: Have
    5+ years of experience in a technical pre-sales role, managing C-level technical
