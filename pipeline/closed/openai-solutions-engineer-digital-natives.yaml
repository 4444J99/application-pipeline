    languages like Python or Javascript and working with REST APIs. Have delivered
    prototypes of Generative AI/traditional ML solutions and have knowledge of network/cloud
    architecture. Are an effective presenter and communicator who can translate business
    and technical topics to all audiences, including senior leaders. Own problems
    end-to-end and are willing to pick up whatever knowledge you''re missing to get
    the job done. Have a humble attitude, an eagerness to help your colleagues, and
    a desire to do whatever it takes to make the team succeed. About OpenAI OpenAI
    is an AI research and deployment company dedicated to ensuring that general-purpose
