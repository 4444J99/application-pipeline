    business stakeholders to understand their pre-sales needs, guide their AI strategy,
    and identify the highest value use cases and applications. You will work with
    business and technical teams to demonstrate the value of our solutions and recommend
    architectural patterns to kickstart their implementation and development. You
    will work closely with Sales, Customer Success, Security, and Product teams. This
