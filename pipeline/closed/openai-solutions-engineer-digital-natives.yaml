    As a Solutions Engineer, you’ll help companies across industries transform their
    business through solutions such as customer service, automated content generation,
    and novel applications that make use of our newest, most exciting models. About
    the Role We are seeking an experienced pre-sales solutions engineer to partner
    with our Digital Native customers and ensure they achieve tangible business value
