  description: 'About the Role We''re looking for a Frontend Engineer to help shape
    how Pika feels. You''ll own meaningful parts of our product UI — building interfaces
    that are fast, polished, and delightful to use. This role is ideal for someone
    who cares deeply about quality: the micro-interactions, the performance, the craft
    that separates good products from great ones. What You''ll Do • Build and own
    core UI surfaces across Pika''s web products • Write clean, maintainable code
    that serves as the foundation for how we build UI going forward • Collaborate
    closely with design to translate concepts into polished, performant interfaces
    • Optimize for performance — fast initial loads, smooth interactions, minimal
    bundle sizes • Identify ways to make the product better and drive them forward
    What We''re Looking For • Strong TypeScript and React skills, with a focus on
    well-structured, reusable component architecture • Deep understanding of how to
    organize and scale React codebases — clean abstractions, thoughtful patterns,
    maintainable systems • Experience implementing smooth, performant animations (CSS,
    Motion, GSAP, or similar) • A strong sense of craft — the polish and refinement
    that elevates good products to great ones • Familiarity with Next.js, Tailwind,
    and modern frontend tooling • Comfort working in a fast-paced environment where
    you own projects end-to-end • Clear communication and ability to collaborate across
    design and engineering Nice to Have • Based in or around Palo Alto, CA • Background
    in design or strong design sensibility About Pika At Pika, we''re crafting a future
    where video creation is seamless, intuitive, and universally accessible. Our vision
    is set on a world where videos transcend entertainment, serving as a canvas for
    everyone''s unique expression. Harnessing AI''s transformative power, we aim to
    dismantle the technical barriers that have traditionally made video production
    an exclusive field. We''re a small, focused team of highly curious builders who
    value efficiency, collaboration, and creative ambition. We move quickly, care
    deeply about craft, and believe great technology is built by people who take ownership
    and think long-term. Our headquarters is based in Palo Alto, CA, and we work on-site
    5 days a week.'
