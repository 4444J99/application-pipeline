  description: 'Snowflake is about empowering enterprises to achieve their full potential
    — and people too. With a culture that’s all in on impact, innovation, and collaboration,
    Snowflake is the sweet spot for building big, moving fast, and taking technology
    — and careers — to the next level. Snowflake is about empowering enterprises to
    achieve their full potential — and people too. With a culture that’s all in on
    impact, innovation, and collaboration, Snowflake is the sweet spot for building
    big, moving fast, and taking technology — and careers — to the next level.About
    the Role The Cortex Code team is building the future of coding agents for working
    with data. See our flagship product in action: Cortex Code in Action: Live Demos
    + AMA . Your work will directly impact how developers and businesses build with
    data. You''ll own the full AI engineering lifecycle: design, prompt/tool engineering,
    evals, deployment, measurement, and optimization. You''ll work with a small, high-powered
    modeling and infrastructure team. What you will do in this role: Own features
    end-to-end for Snowflake Cortex Code products. Build agentic workflows, coding
    harnesses, evaluation pipelines. Build enterprise-grade context engineering: function
    calling, tool schemas, guardrails, agent teams, and verification/repair. Design
    evals and hillclimb : create golden sets, create rubrics and metrics, analyze
    errors, run experiments to hill climb on the metrics. Partner with product and
    infra: translate customer problems into products and experiments. Collaborate
    with infrastructure teams to productionize improvements. Work with an elite team
    of engineers towards building great products Requirements: Bachelor’s degree in
    Computer Science, Engineering, Statistics or a related field. Master’s or higher
    degree preferred but not a requirement. 5+ years of experience shipping AI features
    in production. Proficiency in programming languages such as Python, Typescript,
    Go Strong communication skills and ability to collaborate effectively in a team
    environment. (Optional) Experience working with data engineering pipelines (dbt,
    airflow), data modeling, data analysis, retrieval systems, and semantic layers
    is a plus. Nice to have: Deep experience with agentic coding tools (e.g. IDE agents,
    CLI agents) and intuition for model strengths, failure modes, and prompting limits.
    Background in data engineering (dbt, Airflow), data modeling, analytics, retrieval
    / RAG, or semantic layers — highly relevant for data-centric coding agents. Prior
    work on eval harnesses, LLM observability, or safety / guardrails in production.
    You may be a particularly good fit if you: Have built and owned complex systems
    — pipelines, orchestration, or software with substantial state, branching logic,
    and operational requirements. Thrive in high-intensity environments with short
    feedback loops and high standards for rigor. Take problems to completion independently:
    you don’t stop at a prototype; you care about production reliability and clear
    metrics. Are a power user of modern coding agents and care about turning that
    intuition into systematic measurement and improvement. About Snowflake Snowflake
    is the AI Data Cloud trusted by the world''s most innovative companies. We''re
    shipping production-ready AI applications at scale and want you to join us in
    building the future of how businesses interact with their data through Cortex
    Code , Cortex agents , Cortex analyst , Cortex search . Snowflake is growing fast,
    and we’re scaling our team to help enable and accelerate our growth. We are looking
    for people who share our values, challenge ordinary thinking, and push the pace
    of innovation while building a future for themselves and Snowflake. How do you
    want to make your impact? For jobs located in the United States, please visit
    the job posting on the Snowflake Careers Site for salary and benefits information:
    careers.snowflake.com'
