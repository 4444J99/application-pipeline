    honesty go hand in hand, and prioritize both. Semgrep is an equal-opportunity
    employer seeking a diverse range of backgrounds. We value who you are — including
    your cultural heritage, your socioeconomic status, your age, your race, your gender,
    your sexual orientation, your disabilities. We value what’s vitally important
    to you — your family, your religion, your politics. We value what you love in
    this world — your music, your weekend pursuits. We believe in welcoming varied
    professional backgrounds, educations, and interests. If you’re exceptional in
    your role, believe in Semgrep’s mission, and treat Semgrep’s values as your own,
    you belong here. Please Note: For US-based roles open to remote work, we are currently
    able to hire employees in the following states only: Arizona, California, Colorado,
    Connecticut, District of Columbia, Florida, Georgia, Illinois, Maryland, Massachusetts,
    Michigan, Missouri, Nebraska, New Jersey, New York, North Carolina, Oregon, Tennessee,
    Texas, Virginia, Washin'
