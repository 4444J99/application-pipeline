  description: 'About the Team OpenAI’s ChatGPT Enterprise team sits within the B2B
    Applications organization and is responsible for making ChatGPT work for businesses
    at scale. Our goal is to deliver a seamless experience where people can use the
    same product at home and at work, while meeting the requirements that only enterprises
    care about—security and admin controls, regulatory compliance (e.g., HIPAA/FINRA),
    and data / compute residency across geographies. The team’s roadmap spans three
    core workstreams: enterprise controls, user value & activation, and company-specific
    products (e.g., Company Knowledge). About the Role We’re hiring backend engineers
    to build the product experiences that turn ChatGPT into an indispensable tool
    for teams—while ensuring the trust, controls, and performance enterprises require.
    This role is especially focused on the enterprise controls track: designing collaboration
    experiences, onboarding and engagement loops, and product affordances that help
    employees discover and adopt advanced capabilities (including agents and custom
    GPT-style workflows). In this role, you will: Build backend systems that power
    enterprise controls, including permissions, policy enforcement, auditability,
    and compliance workflows. Design residency- and region-aware architectures that
    enable enterprise workloads to meet country- and customer-specific requirements.
    Partner with product, security, legal/compliance, and adjacent engineering teams
    to turn enterprise requirements into scalable technical systems. Improve the reliability,
    observability, and operational maturity of the services that underpin ChatGPT
    Enterprise. Your background might look something like: 5+ years of professional
    engineering experience (excluding internships) in relevant roles at tech and product-driven
    companies Former founder, or early engineer at a startup who has built a product
    from scratch is a plus Proficiency in one or more backend languages (e.g., Python,
    Go, Rust, Typescript or similar) and distributed systems concepts Experience designing
    and operating distributed systems with a strong emphasis on reliability, performance,
    and security Experience building systems involving access controls, identity,
    compliance, privacy, data governance, or other enterprise platform concerns Some
    experience with relational databases like Postgres/MySQL Care deeply about reliability,
    safety, and performance in production environments Interest in AI/ML (direct experience
    not required) Proven ability to thrive in fast-growing, product-driven companies
    by effectively navigating loosely defined tasks and managing competing priorities
    or deadlines. About OpenAI OpenAI is an AI research and deployment company dedicated
    to ensuring that general-purpose artificial intelligence benefits all of humanity.
    We push the boundaries of the capabilities of AI systems and seek to safely deploy
    them to the world through our products. AI is an extremely powerful tool that
    must be created with safety and human needs at its core, and to achieve our mission,
    we must encompass and value the many different perspectives, voices, and experiences
    that form the full spectrum of humanity. We are an equal opportunity employer,
    and we do not discriminate on the basis of race, religion, color, national origin,
    sex, sexual orientation, age, veteran status, disability, genetic information,
    or other applicable legally protected characteristic. For additional information,
