    of systems is powered by Lattice OS, an AI-powered operating system that turns
    thousands of data streams into a realtime, 3D command and control center. As the
    world enters an era of strategic competition, Anduril is committed to bringing
    cutting-edge autonomy, AI, computer vision, sensor fusion, and networking technology
    to the military in months, not years.</p></div><h3>ABOUT THE TEAM</h3> <p>The
    Data &amp; Analytics team builds the core data infrastructure that powers Anduril's
    operations. We design and implement scalable data architectures that model how
    Anduril functions across the organization. You will develop high-performance data
    systems that serve as the digital twin of our operations, creating both the backend
    services and internal-facing applications that drive mission-critical decision-making.
    If you are invested in Anduril's mission and interested in building mission-critical
    data systems, you're in the right place.</p> <h3>ABOUT THE JOB</h3> <p>We're looking
    for people who excel at building robust data systems. Designing schemas, optimizing
    performance, and writing the code that powers data-intensive applications. You
    prioritize engineering excellence and are interested in pushing the boundaries
    of what data systems can achieve within an organization - never settling for pipelines
    to dashboards and always pushing the bounds of what is possible . As a Senior
    Software Engineer, you should be a technical all-star who can take complicated
    or opaque asks and turn them into business value.<br><br><strong>WHAT YOU'LL DO</strong></p>
    <p>&nbsp;</p> <ul> <li>Design and implement scalable database schemas and data
    models that serve Anduril's core operational needs</li> <li>Build performant data
    processing pipelines that transform raw data for dozens of use cases</li> <li>Architect
    end-to-end data solutions - from database design through service layers to integration
    points to frontend applications</li> <li>Collaborate with cross-functional stakeholders
    to understand complex business requirements and translate them into technical
