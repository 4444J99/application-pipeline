  description: 'About the Team The Platform Team at OpenAI owns the foundational data
    and processing stack powering the OpenAI API and products built on top of it.
    We innovate on the infrastructure needed to serve the latest models and agentic
    workflows at an unprecedented pace of growth and scale with high performance and
    reliability. Join us to build and operate the core platform that underpins OpenAI’s
    products and allows our customers to deploy AI themselves. About the Role This
    role is centered on designing and deploying services and infrastructure that empower
    our models and agents to generate insights and execute tasks, all grounded in
    authorized data sources and internal systems. You’ll help define the most effective
    data access patterns to unlock higher model accuracy and task performance. You
    will own the full lifecycle of your work—from architecture and implementation
    to production operations and on-call responsibilities. Success in this role requires
    a solid understanding of enterprise data management fundamentals, including security,
    identity and access, performance, and reliability. In this role, you will: Design,
    build, and maintain infrastructure and networking systems that connect structured
    and unstructured data to LLMs in a performant and reliable manner. Design, build,
    and maintain secure and compliant systems to process sensitive and valuable data.
    Ensure our platform can support use cases at the scale of large enterprise customers,
    while remaining reliable and efficient. Integrate data access and authentication
    with our production model and agent systems. Collaborate with product, research
    and forward-deployed engineering teams to fill in the full picture on how to deploy
    production systems and achieve world-class results on overall task capabilities.
    Own the reliability of the systems you build, including participation in an on-call
    rotation for critical incidents You might thrive in this role if you: Have expertise
    in deploying, configuring, and operating software systems within customer-managed
    infrastructure and networks. Are excited to bring the power of AGI to the infrastructure
    the world runs on today Are comfortable with ambiguity and rapid change Have an
    intrinsic desire to learn and fill in missing skills, and an equally strong talent
    for sharing learnings clearly and concisely with others About OpenAI OpenAI is
    an AI research and deployment company dedicated to ensuring that general-purpose
    artificial intelligence benefits all of humanity. We push the boundaries of the
    capabilities of AI systems and seek to safely deploy them to the world through
    our products. AI is an extremely powerful tool that must be created with safety
    and human needs at its core, and to achieve our mission, we must encompass and
    value the many different perspectives, voices, and experiences that form the full
    spectrum of humanity. We are an equal opportunity employer, and we do not discriminate
    on the basis of race, religion, color, national origin, sex, sexual orientation,
    age, veteran status, disability, genetic information, or other applicable legally
    protected characteristic. For additional information, please see OpenAI’s Affirmative
    Action and Equal Employment Opportunity Policy Statement . Background checks for
    applicants will be administered in accordance with applicable law, and qualified
    applicants with arrest or conviction records will be considered for employment
    consistent with those laws, including the San Francisco Fair Chance Ordinance,
    the Los Angeles County Fair Chance Ordinance for Employers, and the California
    Fair Chance Act, for US-based candidates. For unincorporated Los Angeles County
    workers: we reasonably believe that criminal history may have a direct, adverse
    and negative relationship with the following job duties, potentially resulting
    in the withdrawal of a conditional offer of employment: protect computer hardware
    entrusted to you from theft, loss or damage; return all computer hardware in your
    possession (including the data contained therein) upon termination of employment
    or end of assignment; and maintain the confidentiality of proprietary, confidential,
    and non-public information. In addition, job duties require access to secure and
    protected information technology systems and related data security obligations.
    To notify OpenAI that you believe this job posting is non-compliant, please submit
    a report through this form . No response will be provided to inquiries unrelated
    to job posting compliance. We are committed to providing reasonable accommodations
    to applicants with disabilities, and requests can be made via this link . OpenAI
    Global Applicant Privacy Policy At OpenAI, we believe artificial intelligence
    has the potential to help people solve immense global challenges, and we want
    the upside of AI to be widely shared. Join us in shaping the future of technology.'
