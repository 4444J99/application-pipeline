    this role if you: A background in building secure systems—from core IAM services
    to orchestration layers that manage credentials, roles, or policies at scale.
    Proficiency in programming languages such as Python, Go, or similar, with a track
    record of writing high-quality, maintainable code. Experience with modern cloud
    infrastructure (AWS, Azure, GCP) and familiarity with industry-standard security
    protocols (OAuth, SAML, OpenID Connect) and authentication/authorization patterns.
    A security-focused mindset, with knowledge of threat modeling, risk assessment,
    and the ability to embed security features throughout the software development
    lifecycle. Excellent collaboration skills—you work well across diverse technical
