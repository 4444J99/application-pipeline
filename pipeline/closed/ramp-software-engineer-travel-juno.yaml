  description: "About Ramp Ramp is building the smart infrastructure for finance teams,\
    \ embedded in the transaction flow of every dollar a business spends. We automate\
    \ how over $100B in annualized spend flows in and out of 50,000+ companies: authorizing\
    \ payments, flagging risk, categorizing spend, and closing books. The problems\
    \ are high-stakes, data-dense, and unforgiving. We hire people with high agency\
    \ and high urgency. We look for slope over intercept. We care less about where\
    \ you trained and more about what you\u2019ve built. At Ramp, everyone is a builder\
    \ who owns problems end to end and makes consequential decisions that shape the\
    \ outcome. The median Ramp customer saves 5% and grows revenue 16% in their first\
    \ year \u2013 far in excess of businesses operating without Ramp. We believe every\
    \ ambitious company deserves the same. If you want to build systems that directly\
    \ shape how companies move and manage billions, Ramp is the place to do it. About\
    \ Juno We started Juno with a clear mission: fix guest travel and expense. Nearly\
    \ every organization struggles with it. Whether booking for job candidates, contractors,\
    \ customers, or speakers\u2014it's a manual, fragmented mess. While employee travel\
    \ and expense has benefited from decades of innovation, guest travel and expense\
    \ is still handled with spreadsheets, email chains, personal credit cards, vendor\
    \ portals, and W9 forms. Guest travel represents up to 20% of corporate travel\
    \ spend, and in sectors like healthcare, life sciences, higher education, energy,\
    \ sports, media and entertainment\u2014it's often much more. We're building a\
    \ modern platform to solve this once and for all. Juno is backed by incredible\
    \ investors, such as Steve Singh at Madrona Ventures, Avid Ventures, Bungalow\
    \ Capital, and Matchstick Ventures, but remains fully founder controlled and led.\
    \ We're building a company that's durable, here for the long term to support our\
    \ partners and clients, and will reshape how guest travel is done across every\
    \ vertical. Juno is built by people who thrive on ownership and move fast. We\
    \ believe in staying small and punching above our weight. Every person at Juno\
    \ has real ownership and directly impacts our product, customers, and trajectory.\
    \ Why this role matters This is a full-stack role where you'll work across the\
    \ entire surface area of the product. From the delightful travel booking experience\
    \ for guests to the complex travel and payments infrastructure that powers it,\
    \ and everything in between. Every engineer at Juno owns critical product decisions\
    \ and helps shape what we build, not just how it's built. What you'll do Build\
    \ and evolve the booking experience that guests interact with, and the coordination\
    \ tools that travel managers and admins rely on to manage complex, multi-person\
    \ travel. Build the payment and expense infrastructure \u2014 virtual cards, spend\
    \ controls, receipt verification, and reimbursement systems that handle real money\
    \ across currencies and countries. Ship AI-powered agents that reduce coordination\
    \ overhead \u2014 automating tasks like policy enforcement, expense review, disruption\
    \ handling, and traveler support. Work across the full stack: shape the interfaces\
    \ guests and admins interact with on the frontend and the APIs, data models, and\
    \ integrations that power them on the backend. You might be a fit if\u2026 You\
    \ default to ownership \u2014 if something is broken, you fix it, even if it isn't\
    \ \"yours.\" You're energized by ambiguity and can make strong technical decisions\
    \ without a detailed spec. You think in systems, not features \u2014 you see how\
    \ a change in one area ripples across the platform. You write code you're proud\
    \ of but ship fast \u2014 you know when \"good enough\" is the right call. You're\
    \ comfortable across the full stack and don't see yourself as \"only frontend\"\
    \ or \"only backend.\" You like working with a small team where your decisions\
    \ truly matter. Preferred experience 4+ years of professional software engineering\
    \ experience building production web applications (6+ for staff level). Deep proficiency\
    \ in TypeScript, React, and PostgreSQL \u2014 we use a modern stack and choose\
    \ best-in-class tools. Experience designing APIs, data models, and systems that\
    \ scale. Comfort working with complex third-party integrations \u2014 payment\
    \ systems, booking APIs, or similar. Track record of owning large, ambiguous projects\
    \ end-to-end. Experience mentoring engineers and raising team-wide engineering\
    \ standards is valued at the staff level. Why join Juno Work on the full product\
    \ \u2014 frontend, backend, payments, AI. No silos. Your technical decisions directly\
    \ shape the product and the company. Small team, high autonomy, zero bureaucracy.\
    \ Competitive compensation with meaningful equity upside. Benefits (for U.S.-based\
    \ full-time employees) 100% medical, dental & vision insurance coverage for you\
    \ Partially covered for your dependents One Medical annual membership 401k (including\
    \ employer match on contributions made while employed by Ramp) Flexible PTO Fertility\
    \ HRA (up to $10,000 per year) Parental Leave Unlimited A"
