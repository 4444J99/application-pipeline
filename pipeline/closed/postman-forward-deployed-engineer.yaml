  description: '<div class="content-intro"><h2><strong>Who Are We?</strong></h2> <p>Postman
    is the world’s leading API platform, used by more than 45 million+ developers
    and 500,000 organizations, including 98% of the Fortune 500. Postman is helping
    developers and professionals across the globe build the API-first world by simplifying
    each step of the API lifecycle and streamlining collaboration—enabling users to
    create better APIs, faster.</p> <p>The company is headquartered in San Francisco
    and has offices in Boston, New York, Austin, Tokyo, London, and Bangalore - where
    Postman was founded. Postman is privately held, with funding from Battery Ventures,
    BOND, Coatue, CRV, Insight Partners, and Nexus Venture Partners. Learn more at
    postman.com or connect with Postman on X via @getpostman.</p> <p>P.S: We highly
    recommend reading <a href="https://api-first-world.com/">The "API-First World"
    graphic novel</a> to understand the bigger picture and our vision at Postman.</p></div><h2><strong>The
    Opportunity</strong></h2> <p>This team will build 0-to-1 products from scratch
    — innovative, strategic initiatives designed to unlock hundreds of millions of
    dollars in new revenue. As a Forward Deployed Engineer (FDE), you will be deeply
    embedded with customers and partners, working at the intersection of product,
    engineering, and GTM to build high-leverage solutions that solve real-world problems
    at scale.</p> <h2><strong>What You’ll Do</strong></h2> <ul> <li>Work closely with
    strategic customers and internal teams to deeply understand high-value problems</li>
    <li>Design and build full-stack applications, integrations, and tools that solve
    real-world use cases with APIs at the center</li> <li>Rapidly prototype solutions,
    validate impact, and iterate quickly based on user feedback</li> <li>Own end-to-end
    technical execution — from architecture and infrastructure to frontend and backend
    development</li> <li>Act as a trusted technical advisor and partner to customers,
    helping them unlock the full power of Postman</li> <li>Collaborate with Postman’s
    product and engineering teams to influence roadmap based on field learnings</li>
    <li>Help define and scale the Forward Deployed Engineering function from the ground
    up</li> <li>Travel Requirement: 20–30%, based on customer engagement needs. This
    may include on-site visits for strategy, discovery, deployment, support meetings</li>
    </ul> <h2><strong>About You</strong></h2> <ul> <li>Have <strong>2-5 years of professional
    experience</strong> as a full-stack or backend engineer; startup or founding team
    experience is a big plus</li> <li>Are <strong>customer-obsessed</strong> and energized
    by solving real problems with high business impact</li> <li>Experience with AI
    Agents, API Platforms is a plus</li> <li>Have experience working directly with
    customers or in consultative roles (e.g., solutions engineering, CTO-as-a-service,
    technical consulting)</li> <li>Are a strong generalist with proficiency in <strong>Node.js,
    Python, or similar</strong> backend languages, and <strong>React/Next.js</strong>
    or similar for the frontend</li> <li>Have experience building and shipping cloud-based
    applications (AWS/GCP/Azure)</li> <li>Enjoy ambiguity and thrive in fast-paced,
    0→1 environments</li> <li>Are excited about building systems and practices that
    can scale with a rapidly growing company</li> </ul> <p>The reasonably estimated
    base salary for this role ranges from $150,000 to $180,000, plus a competitive
    equity package. Actual compensation is based on the candidate''s skills, qualifications,
    and experience.&nbsp;</p> <p>&nbsp;</p><div class="content-conclusion"><h2 data-renderer-start-pos="4036"><strong
    data-renderer-mark="true">What Else?</strong></h2> <p data-renderer-start-pos="4048">In
    addition to Postman''s pay-on-performance philosophy, and a flexible schedule
    working with a fun, collaborative team, Postman offers a comprehensive set of
    benefits, including full medical coverage, flexible PTO, wellness reimbursement,
    and a monthly lunch stipend. Along with that, our wellness programs will help
    you stay in the best of your physical and mental health. Our frequent and fascinating
    team-building events will keep you connected, while our donation-matching program
    can support the causes you care about. We’re building a long-term company with
    an inclusive culture where everyone can be the best version of themselves.&nbsp;</p>
    <p data-renderer-start-pos="4048">At Postman we value in person collaboration.
    We are in office 5 days a week for all roles based out of our hubs in San Francisco
    Bay Area, Boston, Austin, Tokyo and London. For roles based in Bangalore, employees
    currently work in the office three days a week and will transition to five days
    per week by the end of the year. We were thoughtful in our approach which is based
    on collaboration and grounded in feedback from our workforce, leadership team,
    and peers. The benefits of our in office model will be shared knowledge, brainstorming
    sessions, communication'
