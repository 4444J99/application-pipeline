    fostering positive relationships between people around the world.<br><br></p>
    <p><strong>Why Text Safety?<br></strong>As a Senior Engineer you will play a key
    role in advancing large-scale AI systems that strengthen text safety and integrity.
    You’ll leverage cutting-edge ML models to build intelligent tools to curate high-quality
    training and evaluation data to train machine learning models. These systems will
    continuously refine and enhance model performance, enabling proactive detection
    and mitigation of safety risks across the platform in real time.</p> <p>In this
    role, you’ll work closely with cross-functional teams of engineers, product managers,
    policy experts, and safety specialists to turn complex safety challenges into
    scalable, impactful solutions. You’ll establish best practices and technical standards
    that define the next generation of safety AI, ensuring the platform remains secure,
    inclusive, and resilient. Your contributions will directly empower robust, AI-driven
    moderation and detection systems that foster a safe and positive experience for
    all users.<br><br></p> <p><strong>You Will:</strong></p> <ul> <li>Design, build,
    and own critical components of the AI based text safety components, with a focus
    on usability, reliability, scalability, and performance.</li> <li>Implement robust
    AI service to ensure text quality on all Roblox properties (Avatar, Game Description
    etc.).</li> <li>Advance our AI systems infrastructure by developing strong frameworks
    and APIs to support the text filtering needs for hundreds of clients in Roblox.</li>
    <li>Partner with cross-functional teams of engineers, product managers, policy
    experts, and safety specialists to to deliver scalable data and AI solutions to
    power next-generation safety systems.</li> <li>Develop text safety quality metrics
    and eval tooling to support the continued quality iteration over time.</li> <li>Stay
    current with emerging technologies and push forward innovation in AI space to
    enhance user and platform safety.<br><br></li> </ul> <p><strong>You Have:</strong></p>
    <ul> <li>5+ years of experience designing, building, and deploying large-scale
    machine learning systems in production environments.</li> <li>A graduate degree
    or equivalent experience in Computer Science, Engineering, or a related technical
    field.</li> <li>Strong communication skills and a collaborative, solution-oriented
    approach to problem solving.</li> <li>Hands-on experience with fine-tuning VLMs,
    LLMs, or large multimodal models to improve model quality, safety, and performance
    is a plus.<br><br></li> </ul> <p><strong>You Are:</strong></p> <ul> <li><strong>Data
    &amp; System Oriented: </strong>You understand that robust data and systems are
