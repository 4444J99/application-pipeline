    there.&nbsp;</span></p> <p><span style="font-weight: 400;">A career at Roblox
    means you’ll be working to shape the future of human interaction, solving unique
    technical challenges at scale, and helping to create safer, more civil shared
    experiences for everyone.</span></p></div><p><strong>Why Safety?<br></strong>At
