    younger generations in the next two decades. The largest transfer of wealth in
    human history. If you’re ready to be at the epicenter of this historic cultural
    and financial shift, keep reading.</p></div><h2><strong>About the team + role&nbsp;</strong></h2>
    <p data-start="498" data-end="687">With a strong and growing engineering hub in
    Toronto, our teams in Canada are essential to building exceptional financial products
    and supporting our mission to democratize finance for all!</p> <p data-start="689"
    data-end="1142">Robinhood is a metrics-driven company where data is foundational
