    on our Data Engineering team, you''ll help build and maintain the core datasets
    that power analytics, experimentation, and machine learning across Robinhood.
    These foundational data assets include application events, database snapshots,
    and derived metrics that track the performance of our products.</p> <p data-start="1144"
    data-end="1369">You’ll work closely with engineers, data scientists, and business
    teams to design scalable, intuitive pipelines and tooling. This is a unique opportunity
    to influence how data supports our decision-making for years to come.</p> <p><strong>The
    role is located in the office location(s) listed on this job description which
    will align with our in-office working environment. Please connect with your recruiter
    for more information regarding our in-office philosophy and expectations.</strong></p>
    <h2><strong>What you’ll do&nbsp;</strong></h2> <ul> <li>Help define and build
    key datasets across all Robinhood product areas. Lead the evolution of these datasets
    as use cases grow.</li> <li>Build scalable data pipelines using Python, Spark
    and Airflow to move data from different applications into our data lake.</li>
    <li>Partner with upstream engineering teams to enhance data generation patterns.</li>
    <li>Partner with data consumers across Robinhood to understand consumption patterns
    and design intuitive data models.</li> <li>Ideate and contribute to shared data
    engineering tooling and standards.</li> <li>Define and promote data engineering
    best practices across the company.</li> </ul> <h2><strong>What you bring</strong></h2>
    <ul> <li>3+ years of professional experience building end-to-end data pipelines</li>
    <li>Hands-on software engineering experience, with the ability to write production-level
    code in Python for user-facing applications, services, or systems (not just data
    scripting or automation).</li> <li>Expert at building and maintaining large-scale
    data pipelines using open source frameworks (Spark, Flink, etc)</li> <li>Strong
    SQL (Presto, Spark SQL, etc) skills.</li> <li>Experience solving problems across
    the data stack (Data Infrastructure, Analytics and Visualization platforms)</li>
    <li>Expert collaborator with the ability to democratize data through actionable
    insights and solutions.</li> </ul> <p data-start="2487" data-end="2941">Our team
    is committed to providing an inclusive and welcoming interview experience for
    all candidates. If you require a specific accommodation during the application
    or interview process due to a physical or mental condition, please complete this
    <a class="decorated-link" href="https://robinhood.hracuity.net/webform/index/752875e4-42ba-4dff-9951-fd51e315997e"
    target="_new" data-start="2734" data-end="2847">Applicant Accommodation Form</a>
    to notify our team. The form should only be completed if you need a specific accommodation.</p>
