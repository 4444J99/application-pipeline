  description: 'About Ramp Ramp is building the smart infrastructure for finance teams,
    embedded in the transaction flow of every dollar a business spends. We automate
    how over $100B in annualized spend flows in and out of 50,000+ companies: authorizing
    payments, flagging risk, categorizing spend, and closing books. The problems are
    high-stakes, data-dense, and unforgiving. We hire people with high agency and
    high urgency. We look for slope over intercept. We care less about where you trained
    and more about what you’ve built. At Ramp, everyone is a builder who owns problems
    end to end and makes consequential decisions that shape the outcome. The median
    Ramp customer saves 5% and grows revenue 16% in their first year – far in excess
    of businesses operating without Ramp. We believe every ambitious company deserves
    the same. If you want to build systems that directly shape how companies move
    and manage billions, Ramp is the place to do it. About the Role Being a part of
    Forward Deployed Engineering (FDE) , you will design and build solutions to support
    our largest customers and scale our enterprise motion. FDE is a high-pace, customer-facing,
    business-focused engineering team, and we pave the way for Ramp to support the
    largest and most complex organizations in the world. On FDE, you will interact
    directly with customers and deliver solutions end to end — from understanding
    pain points and shaping product decisions to designing and implementing scalable
    systems. We are a full stack team and collaborate closely with sales and core
    product engineering. Check out our Engineering Blog for more on our tech stack,
    mission and values! What You’ll Do Deliver solutions end to end that meet the
    needs of our largest, strategic customers — understanding user pain points, scoping
    product specs, and designing and building software. Collaborate closely with our
    sales and go-to-market teams to close exciting deals, activate customers, and
    expand the value Ramp provides over time. We work with and support huge, world-class
    companies at the scale of $100B+ in valuation. Drive our core product engineering
    roadmap and make important prioritization and scoping decisions that determine
    when we build custom solutions vs. accelerate larger existing projects. Our team
    uses an embedding model where FDEs embed within core product engineering teams
    to develop expertise in the most relevant technical areas. Solve technical challenges
    to support new levels of scale, and help us develop and execute our strategy to
    grow our enterprise platform. For example, extending our data model for roles
    and permissions, seamlessly integrating with 3rd party systems with generalized
    data exports, and ingesting HRIS data at scale. What You Need A minimum of 2 years
    of software engineering experience preferred Track record of shipping high-quality
    products and features at scale Ability to turn business and product ideas into
    engineering solutions Desire to work in a fast-paced environment, continuously
    grow, and master your craft Benefits (for U.S.-based full-time employees) 100%
    medical, dental & vision insurance coverage for you Partially covered for your
    dependents One Medical annual membership 401k (including employer match on contributions
    made while employed by Ramp) Flexible PTO Fertility HRA (up to $10,000 per year)
    Parental Leave Unlimited AI token usage Pet insurance Centralized home-office
    equipment ordering for all employees Health and Wellness stipend In-office perks:
    lunch, snacks, drinks, and more Budget for intra-office travel Relocation support
    to NYC or SF (as needed) Referral Instructions If you are being referred for the
    role, please contact that person to apply on your behalf. Other notices Pursuant
    to the San Francisco Fair Chance Ordinance, we will consider for employment qualified
    applicants with arrest and conviction records. Beware of recruiting scams: Ramp
    will only contact you through official @ Ramp.com email addresses and will never
    ask for payment or sensitive personal information during the hiring process. Ramp
    Applicant Privacy Notice'
