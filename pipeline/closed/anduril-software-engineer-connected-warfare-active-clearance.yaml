    mindset—executing in an <em>expedient</em>, <em>scalable</em>, and <em>pragmatic</em>
    way while keeping the mission top-of-mind and making sound engineering decisions
    to deliver successful outcomes correctly, on-time, and with high quality.</p>
    <p><strong>WHAT YOU’LL DO&nbsp;</strong></p> <ul> <li>Own the software solutions
