    tests, deploys, and sustains the Anduril Air Defense Family of Systems (FoS) in
    challenging operational environments worldwide.<br><br><strong>ABOUT THE JOB</strong><br>We
    are hiring for a Staff Software Engineer to join rapidly growing team in Irvine,
    CA. As a Staff Software Engineer, you will solve a wide variety of problems involving
