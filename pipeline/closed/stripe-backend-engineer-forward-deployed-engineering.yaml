    and user systems. Your job is the work that requires an engineer: making judgment
    calls on ambiguous problems, building relationships with user engineering teams,
    making product decisions, and designing solutions. You will also help shape the
    tooling itself, identifying what should be automated and what needs to stay human.</li>
    <li><strong>Engage directly with users.</strong> You will work with Stripe''s
    most strategic enterprise users to understand their revenue, billing, and payments
    requirements. You translate what you learn into technical solutions, and you bring
    that user reality back to product teams. This is a genuinely user-facing role,
    not user-facing in the "I read a dashboard" sense.</li> <li><strong>Build across
    product boundaries.</strong> You will design and deploy products and solutions
    that address product-market fit gaps, not just in Billing but across multi-product
    boundaries (Payments + Invoicing + Global LPMs). You embed within Stripe product
    engineering teams to co-develop the highest-leverage capabilities.</li> <li><strong>Build
    reusable solutions, not one-off fixes.</strong> Contribute to a customization
