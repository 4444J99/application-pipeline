    passionate, and creative. We enjoy spirited debate, crazy ideas, and shipping
    code. Research Engineer Cursor is building the future of coding. We train frontier
    coding agents and scale RL on real user data to make them increasingly effective.
    About the role We’re looking for Research Engineers to build the training, inference,
    and data systems behind our frontier coding models. You’ll work directly with
    researchers to make progress repeatable and iteration fast. What you’ll do Build
    our distributed training, inference, and RL infrastructure Write libraries to
    simplify how researchers do large-scale data jobs Architect the systems that turn
    Cursor user data into effective training data You may be a fit if You have a strong
    infrastructure/distributed systems background You are able to architect and ship
    end-to-end with high ownership You have strong intuitions about how language models
    work You’re excited to learn more about ML
