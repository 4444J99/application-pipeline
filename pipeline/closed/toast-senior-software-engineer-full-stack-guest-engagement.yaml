  description: '<p><strong>Senior Software Engineer, Full Stack - Guest Engagement</strong></p>
    <p>Toast is driven by building the restaurant platform that helps restaurants
    adapt, take control, and get back to what they do best: building the businesses
    they love. Because our technology is purpose-built for restaurants, by restaurant
    people - and increasingly shaped by AI in both what we build and how we build
    - restaurants can trust that we’ll deliver on their needs for today while investing
    in the experiences that will power their restaurant of the future.</p> <p>We’re
    seeking a Senior Software Engineer to work within our team focused on building
    impactful capabilities that empower restaurants to drive Guest engagement, retention
    and growth. The team will help shape the future of how restaurants use technology
    to connect with their guests - increasingly through AI-powered tools and experiences
    that drive automation, personalization and smarter decision-making. You will be
    a key part of a high-impact, high-ownership engineering team solving complex challenges
    in a fast-moving product space. Your engineering leadership will be balancing
    technical excellence alongside a strong product mindset to solve for continuous
    growth within both the team and our product space.</p> <p><strong>A day in the
    life (Responsibilities)</strong></p> <ul> <li>Deliver projects that deeply connect
    restaurants with their guests within a cross-functional collaborative and supportive
    environment.</li> <li>Build performant, scalable web features across guest and
    restaurant-facing surfaces that will be critical to our customers’ success.</li>
    <li>Partner closely with Design, Product, and other engineers across the company
    to drive measurable outcomes.</li> <li>Monitor feature rollouts to ensure customer
    success, iterating and improving when necessary.</li> <li>Advocate for best coding
    practices, raising the bar for yourself, your team and the company.</li> <li>Leverage
    cutting edge AI tools to enhance your development workflow, improve velocity,
    and help pioneer new approaches to building - contributing to a culture of innovation
    and productivity across the team.</li> </ul> <p><strong>What you''ll need to thrive
    (Requirements)</strong></p> <ul> <li>Driven by impact and solving for the customer.</li>
    <li>5+ years of experience as a Backend/Full Stack engineer, ideally in consumer-facing
    or growth teams.</li> <li>Strong frontend skills (React preferred) with a solid
    grasp of modern JavaScript/TypeScript, HTML, and CSS fundamentals.</li> <li>Experience
    with modern web technologies and UI frameworks (e.g., React, Javascript , TypeScript,
    REST, GraphQL)</li> <li>Comfortable turning high-fidelity UX designs from Figma
    into reality.</li> <li>Ability to break down problems and communicate solutions
    clearly throughout cross-functional teams.</li> <li>Strong collaboration mindset,
    you thrive in a team, work transparently, and build with empathy.</li> </ul> <p
    data-pm-slice="1 1 []"><strong>Our Tech Stack:</strong></p> <ul> <li>A core of
    <strong>Java &amp; Kotlin</strong> based backend services.</li> <li><strong>React</strong>
    SPAs leveraging Tailwind, GraphQL and Storybook.</li> <li><strong>Android</strong>
    app built in Java &amp; Kotlin running in the restaurant.</li> <li><strong>PostgreSQL</strong>,
    <strong>Dynamodb </strong>for persistence.</li> <li>Pulsar, Camel and RabbitMQ
    for message-based integrations.</li> <li>And many more technologies that help
    us build a top class platform.</li> </ul> <p><strong>**This role requires a minimum
    of two days per week in our Dublin office**</strong></p> <p data-pm-slice="1 1
    []"><strong>#LI-HYBRID</strong></p> <p data-pm-slice="1 1 []"><strong>#BI-Hybrid</strong></p>
    <p data-pm-slice="1 1 []">&nbsp;</p> <p data-pm-slice="1 1 []"><strong>AI at Toast</strong></p>
    <p>At Toast, one of our company values is that we''re hungry to build and learn.
    We believe learning new AI tools empowers us to build for our customers faster,
    more independently, and with higher quality. We provide these tools across all
    disciplines, from Engineering and Product to Sales and Support, and are inspired
    by how our Toasters are already driving real value with them. The people who thrive
    here are those who embrace changes that let us build more for our customers; it’s
    a core part of our culture.</p> <p data-pm-slice="1 1 []"><strong>Our Total Rewards
    Philosophy&nbsp;<br></strong>We strive to provide competitive compensation and
    benefits programs that help to attract, retain, and motivate the best and brightest
    people in our industry. Our total rewards package goes beyond great earnings potential
    and provides the means to a healthy lifestyle with the flexibility to meet Toasters’
    changing needs. Learn more about our benefits at&nbsp;<a class="c-link" href="https://careers.toasttab.com/toast-benefits"
    target="_blank" data-stringify-link="https://careers.toasttab.com/toast-benefits"
    data-sk="tooltip_parent" data-remove-tab-index="true">https://careers.toa'
