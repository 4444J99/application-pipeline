  description: <p>As a <strong>Senior Solutions Engineer at CircleCI</strong> you
    will be the customer’s trusted technical advisor throughout the sales and retention
    lifecycle. You’ll provide hands-on advice for cloud-based and single tenant deployment
    and product guidance with CircleCI’s largest prospects and customers. You will
    serve as the technical expert and owner of deal validation strategy, collaborating
    with account executives and success managers to identify customer business goals,
    needs, and pains and showing how CircleCI can address them.</p> <p><strong>What
    You’ll Do</strong></p> <ul> <li>Lead the technical implementation and day-to-day
    management of CircleCI Demonstrations and proof-of-concepts.</li> <li>Demonstrate
    the technical feasibility , integrated into our customer’s technology stack, ensuring
    early customer success and a long-term business relationship.</li> <li>Serve as
    a technical advisor and subject matter expert for customers, offering guidance
    on product implementation, adoption, and best practices.</li> <li>Conduct in-depth
    analysis of customer use cases, identify opportunities for product optimization,
    and provide feedback to internal teams for improvements.</li> <li>Support strategic
    planning conversations with customer executives; connecting software delivery
    challenges with corporate objectives, articulating their full business impact.</li>
    <li>Lead technical discussions with enterprise clients,&nbsp; addressing complex
    issues, customizations, and integrations to meet customer-specific requirements.</li>
    <li>Develop and deliver technical training sessions, workshops, and documentation
    to empower customers to maximize the value of CircleCI products.</li> <li>Stay
    up-to-date on industry trends, product updates, and emerging technologies to continuously
    enhance your technical knowledge and customer support capabilities.</li> </ul>
    <p>&nbsp;</p> <p><strong>What We’re Looking For</strong></p> <ul> <li>5-10 years
    experience as an engineer in the application development, devops, or CI/CD space.</li>
    <li>Extensive experience with solutions selling in a technical customer-facing
    role, such as Sales Engineer, Solutions Engineer, Customer Success Engineer, or
    similar position, preferably in a SaaS or software development environment.</li>
    <li>Strong proficiency in CI/CD concepts, DevOps practices, software configuration,
    and scripting languages like Python, Shell, etc..</li> <li>Knowledge of Docker
    or Linux containers in general.</li> <li>Outstanding presentation skills. You
    feel comfortable leading presentations and demos of our platform to groups, both
    technical and non-technical, in-person and virtually.</li> <li>Proven track record
    of engaging with enterprise clients, understanding their technical requirements,
    and delivering solutions that drive customer success.</li> <li>Ability to work
    collaboratively with cross-functional teams, Sales, Product, and Engineering,
    to advocate for customer needs and provide valuable insights for product enhancement.</li>
    </ul> <p><strong>Ideal Candidates might also have:</strong></p> <ul> <li>Experience
    developing mobile applications across iOS and Android devices.&nbsp;</li> <li>Strong
    ops/infrastructure knowledge, especially networking and security.</li> </ul> <p><strong>About
    CircleCI</strong></p> <p>CircleCI is the world’s largest shared continuous integration/continuous
    delivery (CI/CD)&nbsp;platform, and the hub where code moves from idea to delivery.
    As one of the most-used&nbsp;DevOps tools - processing more than 1 million builds
    a day - CircleCI has unique access&nbsp;to data on how engineering teams work,
    and how their code runs. Companies like&nbsp;Spotify, Coinbase, and BuzzFeed use
    us to improve engineering team productivity,&nbsp;release better products, and
    get to market faster.</p> <p>Founded in 2011 and headquartered in downtown San
    Francisco with a global, remote&nbsp;workforce, CircleCI is venture-backed by
    Base10, Greenspring Associates, Eleven Prime,&nbsp;IVP, Sapphire Ventures, Top
    Tier Capital Partners, Baseline Ventures, Threshold&nbsp;Ventures, Scale Venture
    Partners, Owl Rock Capital, Next Equity Partners, Heavybit and&nbsp;Harrison Metal
    Capital.</p> <p>CircleCI is an Equal Opportunity and Affirmative Action employer.
    We do not&nbsp;discriminate based upon race, religion, color, national origin,
    sexual orientation, gender,&nbsp;gender identity, gender expression, transgender
    status, sexual stereotypes, age, status&nbsp;as a protected veteran, status as
    an individual with a disability, or other applicable&nbsp;legally protected characteristics.
    We also consider qualified applicants with criminal&nbsp;histories, consistent
    with applicable federal, state, and local law.</p> <p>&nbsp;</p><div class="content-pay-transparency"><div
