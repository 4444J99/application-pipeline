  description: '<p>Toast creates technology to help restaurants and local businesses
    succeed in a digital world, helping business owners operate, increase sales, engage
    customers, and keep employees happy.</p> <p><br>Fintech at Toast operates one
    of the most critical portions of the Toast infrastructure: processing payments
    on behalf of our restaurants and ensuring that restaurants are paid in a timely
    manner. Payment processing is a key source of Toast’s revenue and also the lifeblood
    of our customers; we process millions of dollars in transactions per day.&nbsp;</p>
    <p><br>We are seeking a <strong>Senior Software Engineer to join our Payments
    team to build out our unified payment processing solution. </strong>This platform
    offers a single, integrated service for payment acceptance across various channels
    and supports a configurable enterprise approach. It is designed to allow a build-once,
    available-to-all strategy for both existing and emerging payment methods. The
    successful candidate will contribute to the development of services providing
    supporting and core functionality within and around this payment processing solution.<br><br><br></p>
    <p><strong>A day in the life (Responsibilities)</strong></p> <ul> <li>Design,
    build, and deliver features for Toast’s payments products&nbsp;</li> <li>Develop
    and implement automated test suite to ensure the code shipped to our customers
    meets the highest quality standards</li> <li>Roll* features out to customers,
    including monitoring for success</li> <li>Collaborate with our PM (and UX) on
    the definition and design of features&nbsp;&nbsp;</li> <li>Partner with a wide
    array of teams across Toast&nbsp;</li> <li>Work with experienced engineers to
    deliver design and code review&nbsp;</li> </ul> <p>&nbsp;</p> <p><strong>What
    you''ll need to thrive (Requirements)<br></strong></p> <ul> <li>5+ years of experience
    in designing and implementing robust backend services</li> <li>Proven ability
    to develop scalable and secure APIs that integrate with various internal/external
    systems</li> <li>Knowledge of best practices in API lifecycle management, including
    versioning, documentation, and deprecation strategies</li> <li>Demonstrated experience
    with microservices architecture and containerization technologies for enhanced
    scalability and maintainability</li> </ul> <p><strong>Special Sauce (*Nice to
    Haves)</strong></p> <ul> <li>Demonstrated proficiency with DynamoDB or PostgreSQL</li>
    <li>Proficiency in Kotlin (or Java and willing to learn Kotlin) and Kotlin-specific
    frameworks and libraries for building efficient backend solutions</li> <li>Experience
    with modern data architectures (event sourcing, OLAP, ETL/ELT, streaming data)</li>
    <li>Experience designing payments APIs</li> <li>Familiarity with PCI-DSS</li>
    <li>Familiarity with AI-augmented development workflows and tools (e.g., Claude
    Code, GitHub Copilot, Codex, or similar)</li> </ul> <p><strong>#LI-HYBRID<br>#BI-Hybrid</strong></p>
