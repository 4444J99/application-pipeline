  description: "<div class=\"content-intro\"><h2><strong>About Anthropic</strong></h2>\
    \ <p>Anthropic\u2019s mission is to create reliable, interpretable, and steerable\
    \ AI systems. We want AI to be safe and beneficial for our users and for society\
    \ as a whole. Our team is a quickly growing group of committed researchers, engineers,\
    \ policy experts, and business leaders working together to build beneficial AI\
    \ systems.</p></div><h1>About the Role</h1> <p>We're building Claude into the\
    \ AI that everyone uses at work. Not a demo, not a chatbot sidebar \u2014 a tool\
    \ that professionals across industries rely on every day to do substantive work.\
    \ We're looking for experienced software engineers to join the Enterprise &amp;\
    \ Verticals team, where we build the products that make that real.</p> <p>This\
    \ is a rare engineering role where you don't just build on top of a model \u2014\
    \ you shape the model itself. Every engineer on this team works directly with\
    \ Anthropic's research organization, including post-training, to make Claude better\
    \ at the specific tasks your products need to solve. Whether you're working on\
    \ general enterprise tooling or a specific industry vertical, you'll identify\
    \ capability gaps, collaborate with researchers on domain-specific improvements,\
    \ and see those improvements ship in your products.</p> <p>This team owns two\
    \ complementary surfaces:</p> <p><strong>Enterprise AI Products.</strong> General-purpose\
    \ features that make Claude useful for any knowledge worker \u2014 products like\
    \ Cowork, plugins, skills, and the connective tissue that lets Claude operate\
    \ effectively across workflows. A big part of this work is understanding why users\
    \ aren't activating, what's blocking adoption, and building the capabilities that\
    \ close those gaps. You'll work on the systems that make Claude a daily-use tool\
    \ for enterprise customers across industries.</p> <p><strong>Vertical AI Products.</strong>\
    \ Purpose-built experiences for specific industries where Claude can transform\
    \ complex professional workflows. We're currently building for three verticals,\
    \ with more to come:</p> <ul> <li><strong>Financial Services</strong> \u2014 from\
    \ data retrieval and analysis to institutional-quality report generation, building\
    \ AI experiences that meet the standards of the world's largest financial institutions.</li>\
    \ <li><strong>Healthcare</strong> \u2014 from clinical documentation and prior\
    \ authorization to care coordination and patient management, solving critical\
    \ challenges for healthcare systems while ensuring accuracy and compliance.</li>\
    \ <li><strong>Legal</strong> \u2014 from document review and contract analysis\
    \ to regulatory compliance and matter management, building tools that handle the\
    \ precision, confidentiality, and nuance that legal work demands.</li> </ul> <h2>Representative\
    \ Projects</h2> <ul> <li>Build an Office add-in that lets Claude read, analyze,\
    \ and generate content within Excel and Word \u2014 operating within the constraints\
    \ of host application sandboxes and third-party platform APIs</li> <li>Design\
    \ the plugins and skills infrastructure that lets Claude learn new domain-specific\
    \ capabilities \u2014 from financial modeling templates to clinical documentation\
    \ workflows \u2014 and make them discoverable and composable for enterprise users</li>\
    \ <li>Build the customization and distribution layer to allow enterprise power\
    \ users capture, refine, and share their enhanced workflows.</li> <li>Develop\
    \ a document generation pipeline that produces institutional-quality investment\
    \ research reports, translating Claude's analytical capabilities into outputs\
    \ that meet the formatting, sourcing, and compliance standards of a top-tier bank</li>\
    \ <li>Instrument and diagnose activation funnels to understand why enterprise\
    \ users sign up but don't adopt Claude for daily work, then build the product\
    \ changes that close those gaps</li> <li>Design the context and memory architecture\
    \ that lets multiple Claude agents working across different product surfaces \u2014\
    \ Cowork, chat, Office add-ins, vertical tools \u2014 share a unified understanding\
    \ of a user's projects, preferences, and in-flight work so that nothing falls\
    \ through the cracks as people move between tools</li> <li>Identify high-toil\
    \ workflows that enterprise users repeat daily \u2014 reformatting reports, reconciling\
    \ data across systems, triaging inbound requests \u2014 and apply new model capabilities\
    \ to automate or eliminate them, measuring the impact on time saved and user retention</li>\
    \ <li>Build hybrid workflow systems where Claude agents and people collaborate\
    \ asynchronously on complex tasks \u2014 for example, an agent that drafts a first-pass\
    \ contract review overnight, flags items that need human judgment, and routes\
    \ those decisions back through a structured interface so the attorney can review\
    \ and approve in minutes rather than hours</li> <li>Collaborate with post-training\
    \ researchers to improve Claude's performance on clinical documentation tasks,\
    \ identifying specific failure modes in patient note summarization and helping\
    \ design training data to address them</li> </ul> "
