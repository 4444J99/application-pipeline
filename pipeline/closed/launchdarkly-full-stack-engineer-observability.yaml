    \ with product, design, and other engineering teams to shape how AI capabilities\
    \ land across LaunchDarkly. Additionally, you\u2019ll work on other Enterprise-grade\
    \ capabilities for the Observability platform to help drive customer activation\
    \ and success.</p> <h4>What You'll Work On:</h4> <ul> <li>Expand Vega beyond Observability\
