    and the base salary range for this role may be modified.</p> <p>#LI-Hybrid #LI-KM2</p><div
    class="content-conclusion"><p><strong>About us</strong></p> <p data-pm-slice="1
    1 []">Asana is a leading platform for human + AI collaboration. Millions of teams
    around the world rely on Asana to achieve their most important goals, faster.
