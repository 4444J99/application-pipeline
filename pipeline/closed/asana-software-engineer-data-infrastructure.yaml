  description: '<p>We’re looking for a Software Engineer with experience in cloud
    infrastructure and a strong interest in big data systems. You will be a member
    of our Data Platform Infrastructure team in Warsaw, responsible for systems that
    move, store, and govern Asana’s data.</p> <p>This role is based in our Warsaw
    office with an office-centric hybrid schedule. The standard in-office days are
    Monday, Tuesday, and Thursday. Most Asanas have the option to work from home on
    Wednesdays. Working from home on Fridays depends on the type of work you do, and
    your recruiter can share more about the in-office requirements.</p> <p>Our employees
    in Poland are employed under a contract of employment.&nbsp;</p> <p><strong>The
    Role &amp; Tech Stack</strong></p> <p>The Data Infrastructure teams build and
    own the entire lifecycle of data - from Asana’s product surfaces to the analytical
    warehouse and back:</p> <ul> <li>Provisioning and scaling AWS and Databricks environments</li>
    <li>Building and maintaining ingestion systems that sync data from Asana’s product
    surfaces into our data lake</li> <li>Developing orchestration frameworks to simplify
    pipeline development and testing for other engineering teams</li> <li>Creating
    attribution and reporting systems to provide visibility into platform spend and
    resource usage</li> </ul> <p><strong>What you''ll achieve:&nbsp;</strong></p>
    <ul> <li>Write production code for backend and infrastructure services that support
    data reliability and timeliness</li> <li>Build internal CLI tools or APIs that
    allow Data Consumers to self-serve infrastructure without needing deep AWS knowledge</li>
    <li>Lead end-to-end projects, from scoping and design through to rollout, working
    across multiple data infrastructure teams</li> </ul> <p><strong>About you:</strong></p>
    <ul> <li>Software Engineering or Data Engineering background - you’re comfortable
    writing production code, designing systems or working with Data stack. We use
    AWS, Databricks, Spark, Python, Scala, but care more about engineering fundamentals
    than specific domain experience.</li> <li>4+ years of experience designing and
    implementing production code for backend, infrastructure, data systems.</li> <li>Experience
    with major cloud platforms (AWS, GCP, or Azure), Terraform, and monitoring tooling
    like Datadog, Grafana or similar.</li> <li>Familiarity with distributed data processing
    systems (e.g. Databricks, Spark, Snowflake or similar systems).</li> <li>Demonstrates
    curiosity about AI tools and emerging technologies, with a willingness to learn
    and leverage them to enhance productivity, collaboration, or decision-making.</li>
    </ul> <p>At Asana, we''re committed to building teams that include a variety of
    backgrounds, perspectives, and skills, as this is critical to helping us achieve
    our mission. If you''re interested in this role and don''t meet every listed requirement,
    we still encourage you to apply.</p> <p><strong>What we’ll offer</strong> :</p>
    <ul> <li>Generous, transparent and fair compensation system&nbsp;</li> <li>Contract
