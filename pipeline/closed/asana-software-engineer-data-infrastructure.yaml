    you work from the office&nbsp;</li> <li>Career growth budget&nbsp;</li> <li>Home
    office setup budget&nbsp;</li> <li>Gym/Fitness reimbursement&nbsp;</li> <li>Fertility
    healthcare and family-forming support with Carrot&nbsp;</li> <li>Mental health
    support in Modern Health&nbsp;</li> <li>Group life insurance&nbsp;</li> <li>MacBooks
    with all necessary accessories&nbsp;</li> </ul> <p>For this role, the estimated
    base salary range is between 23,667 PLN - 32,917 PLN gross per month (subject
    to all taxes and necessary deductions) . The actual base salary will vary based
    on various factors, including market and individual qualifications objectively
