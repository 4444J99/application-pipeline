  description: '<h3><strong>About the role</strong></h3> <p>Together AI/Codesandbox
    is looking for a Senior Backend/Distributed Systems engineer to help us build
    and maintain the codebase that powers the Together AI Sandbox service. This is
    a role for engineers that are familiar with standard backend architecture, database
    design, and high-performance backend services. Our API platform is under constant
    load and scrutiny, so a key part of the role is experience and commitment to writing
    easily understood and well-tested code. You will be working closely with the product
    team to understand and document the functional needs of their product requirements,
    developing new code to solve new problems, as well as maintaining existing code
    to squash bugs.</p> <ul> <li>Location: Hybrid in Amsterdam, or Open to Relocation
    in the Netherlands</li> <li>Full-time: This means 40 flexible hours, Monday through
    Friday.</li> </ul> <h3><strong>Responsibilities</strong></h3> <ul> <li>Design
    core, backend software components</li> <li>Perform architecture and research work
    for AI workloads</li> <li>Interface with other teams to incorporate their innovations</li>
    <li>Analyze and improve efficiency, scalability, and stability of various system
    resources</li> <li>Conduct design and code reviews</li> <li>Create services, tools
    and developer documentation</li> <li>Create testing frameworks for robustness
    and fault-tolerance</li> <li>Participate in an on-call rotation to respond to
    critical incidents as needed</li> </ul> <h3><strong>Requirements</strong></h3>
    <ul> <li>5+ years experience writing high-performance, well-tested, production
    quality code</li> <li>Bachelor''s or Master''s degree in Computer Science, Computer
    Engineering, relevant technical field, or equivalent practical experience</li>
    <li>Demonstrated experience in building large scale, fault tolerant, distributed
    systems like storage, search, and computation</li> <li>Expert level programmer
    in one or more of Golang, Java, Rust, or C/C++</li> <li>Demonstrated experience
    with relational (e.g., PostgreSQL) and non-relational (e.g., ClickHouse, Redis)
    databases</li> <li>Experience designing, analyzing and improving efficiency, scalability,
    and stability of various system resources</li> <li>Excellent understanding of
    low level operating systems concepts including multi-threading, memory management,
    networking and storage, performance and scale</li> <li>Experience with Kubernetes/Nomad
    and containers is a plus</li> <li>Experience with virtual machines, microVMs,
    or sandboxing technologies (e.g., gVisor, Firecracker, QEMU) is a plus</li> <li>Experience
    with Ceph is a plus</li> <li>Experience with Elixir is a plus</li> </ul> <h3><strong>About
    Together AI</strong></h3> <p>Together AI is a research-driven artificial intelligence
    company. We believe open and transparent AI systems will drive innovation and
    create the best outcomes for society, and together we are on a mission to significantly
    lower the cost of modern AI systems by co-designing software, hardware, algorithms,
    and models. We have contributed to leading open-source research, models, and datasets
    to advance the frontier of AI, and our team has been behind technological advancement
    such as FlashAttention, Hyena, FlexGen, and RedPajama. We invite you to join a
    passionate group of researchers and engineers in our journey in building the next
    generation AI infrastructure.</p> <h3><strong>Compensation</strong></h3> <p>We
    offer competitive compensation, startup equity, and other competitive benefits.
    Our salary ranges are determined by location, level and role. Individual compensation
    will be determined by experience, skills, and job-related knowledge.</p> <h3><strong>Equal
    Opportunity</strong></h3> <p>Together AI is an Equal Opportunity Employer and
    is proud to offer equal employment opportunity to everyone regardless of race,
    color, ancestry, religion, sex, national origin, sexual orientation, age, citizenship,
    marital status, disability, gender identity, veteran status, and more.</p> <p><br><br><br></p>'
