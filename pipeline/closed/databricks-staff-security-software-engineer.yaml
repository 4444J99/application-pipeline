    can focus on the high-value challenges that are central to their missions.</p>
    <p>As a member of the Security Continuous Monitoring team, you will help build
    and scale Databricks Security systems built on top of the Databricks platform.
    You will design, test, and implement data pipelines to assess security configurations
    of Cloud, SaaS and on-premise tooling. You will design and deploy robust supporting
    security tools for managing and assessing security state, integrate with third-party
    applications, and interact with cloud APIs (AWS, Azure, GCP, Terraform). You will
    plan and lead, end-to-end, projects supporting data collection and integration
    with vulnerability and threat detection efforts.</p> <p>You will be an individual
    contributor on the Security Continuous Monitoring team at Databricks, reporting
    to the Director of Continuous Monitoring.</p> <p><strong>What we look for:</strong></p>
    <ul> <li>8+ years of software engineering experience, with 4+ years specifically
    in security-related engineering (preferred)</li> <li>6+ years of experience building
    large scale distributed systems with a focus on reliability and observability</li>
    <li>Experience with Python, Git/GitHub, and CI/CD automation, and Terraform</li>
    <li>Expertise in securing at least one major cloud environment (AWS, Azure, GCP)</li>
    <li>Experience with software security and systems that handle sensitive data.
    FedRAMP Moderate/High experience preferred.</li> <li>Experience with data correlation
    engine preferred</li> <li>Excellent communication skills, with the ability to
    collaborate effectively across teams and present complex ideas clearly to stakeholders
    at all levels.</li> <li>A leadership mindset with the ability to mentor peers,
    drive strategic initiatives, and influence the organization’s security direction.</li>
    <li>Bias to action and passion for delivering high-quality solutions.</li> <li>Bachelor''s
    degree in Computer Science or related field, or equivalent experience.</li> </ul>
