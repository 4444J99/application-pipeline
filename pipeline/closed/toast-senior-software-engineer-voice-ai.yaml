  description: "<p><strong>Location(s):&nbsp;</strong>US (remote), Boston (hybrid),\
    \ or New York (hybrid)</p> <p>&nbsp;</p> <p><strong>Bready* to make a change?</strong></p>\
    \ <p>Now, more than ever, the Toast team is committed to our customers. Our focus\
