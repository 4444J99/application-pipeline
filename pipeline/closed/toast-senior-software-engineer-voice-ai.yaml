    \ our technology is purpose-built for restaurants, by restaurant people, restaurants\
    \ can trust that we\u2019ll deliver on their needs for today while investing in\
    \ experiences that will power their restaurant of the future.</p> <p><strong>Who\
    \ We Are</strong></p> <p>The Voice AI team is responsible for building and advancing\
    \ Toast\u2019s restaurant Voice products, as well as working closely with the\
    \ integrated Websites, Branded App, and Online Ordering teams. This group is highly\
    \ product oriented, with a laser-focus on creating top tier Voice-driven consumer\
    \ experiences for restaurants and their guests, starting with Voice Ordering and\
    \ Voice Answering. The Voice AI team\u2019s work advances the cutting edge of\
    \ low-latency AI, audio processing, and system architecture to provide fast and\
    \ genuine Voice ordering for our customers. The team rigorously measures and iterates\
    \ on product performance to build compelling voice-driven experiences, so be prepared\
    \ to innovate in a new product paradigm on products built for massive scale and\
    \ exacting product quality.</p> <p>&nbsp;</p> <p><strong>About this roll* (Responsibilities)</strong></p>\
    \ <p>In this role, your focus will be on improving the core Voice AI stack, using\
    \ your technical chops to influence not just the code, but also product and business\
    \ strategies. This is a golden opportunity for a hands-on, entrepreneurial engineer\
    \ who thrives in a modern tech stack environment, loves solving real-world problems\
    \ through technology and AI. You\u2019ll identify where you can create impact,\
    \ run experiments, iterate quickly, and have a strong role in shaping the future\
    \ of Voice AI here at Toast. Here\u2019s what you\u2019ll be doing:</p> <ul> <li><strong>Design,\
    \ scope, and implement</strong> cutting-edge solutions using a mix of technologies.</li>\
    \ <li><strong>Raise the bar</strong> to boost quality, performance, usability,\
    \ and scalability of the Voice AI product.</li> <li><strong>Collaborate closely</strong>\
    \ with Design and Product stakeholders to chase product-market fit.</li> <li><strong>Drive\
    \ discovery of high-impact opportunities</strong> with your team and turn them\
    \ into reality.</li> <li><strong>Be an awesome teammate</strong> who\u2019s all\
    \ in on collaboration and collective success.</li> <li><strong>Work across teams\
    \ </strong>to ensure that every part of our product ecosystem works seamlessly\
    \ together to deliver the best possible experience for our customers.</li> </ul>\
    \ <p>&nbsp;</p> <p><strong>Do you have the right ingredients*? (Requirements)</strong></p>\
    \ <ul> <li>5+ years of experience developing <strong>fullstack</strong> web applications</li>\
    \ <li>Proficient in backend technologies like <strong>Java/Kotlin</strong>, and\
    \ <strong>Python</strong>.</li> <li>Skilled with frontend frameworks like React,\
    \ and CSS frameworks like Tailwind or Bootstrap.</li> <li>Experienced in building\
    \ on AWS, with tools like Docker and Git.</li> <li>Comfortable turning high-fidelity\
    \ UX designs from Figma into reality.</li> <li>Adept at designing databases and\
    \ architectures that scale and perform well.</li> <li>Enthusiastic to employ AI-based\
    \ tooling to expand impact and improve work.</li> <li>Proven at implementing LLMs\
    \ and AI inference for real-world applications by utilizing evolving best practices\
    \ for AI-product building.</li> <li>Thrive in a collaborative, team-based environment\
    \ where you ship features together.</li> <li>Passionate about making users happy\
    \ and seeing people use your product in the wild.</li> <li>Embrace the agile mindset\u2014\
    ship quickly, iterate, and refine.</li> </ul> <p data-pm-slice=\"1 1 []\"><strong>AI\
    \ at Toast</strong></p> <p>At Toast, one of our company values is that we're hungry\
    \ to build and learn. We believe learning new AI tools empowers us to build for\
    \ our customers faster, more independently, and with higher quality. We provide\
    \ these tools across all disciplines, from Engineering and Product to Sales and\
    \ Support, and are inspired by how our Toasters are already driving real value\
    \ with them. The people who thrive here are those who embrace changes that let\
    \ us build more for our customers; it\u2019s a core part of our culture.</p> <p\
