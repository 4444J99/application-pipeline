  description: 'Who we are is what we do. Deel is the all-in-one payroll and HR platform
    for global teams. Our vision is to unlock global opportunity for every person,
    team, and business. Built for the way the world works today, Deel combines HRIS,
    payroll, compliance, benefits, performance, and equipment management into one
    seamless platform. With AI-powered tools and a fully owned payroll infrastructure,
    Deel supports every worker type in 150+ countries—helping businesses scale smarter,
    faster, and more compliantly. Among the largest globally distributed companies
    in the world, our team of 7,000 spans more than 100 countries, speaks 74 languages,
    and brings a connected and dynamic culture that drives continuous learning and
    innovation for our customers. Why should you be part of our success story? As
    the fastest-growing Software as a Service (SaaS) company in history, Deel is transforming
    how global talent connects with world-class companies – breaking down borders
    that have traditionally limited both hiring and career opportunities. We''re not
    just building software; we''re creating the infrastructure for the future of work,
    enabling a more diverse and inclusive global economy. In 2024 alone, we paid $11.2
    billion to workers in nearly 100 currencies and provided healthcare and benefits
    to workers in 109 countries—ensuring people get paid and protected, no matter
    where they are. Our momentum is reflected in our achievements and customer satisfaction:
    CNBC Disruptor 50, Forbes Cloud 100, Deloitte Fast 500, and repeated recognition
    on Y Combinator’s top companies list – all while maintaining a 4.83 average rating
    from 15,000 reviews across G2, Trustpilot, Captera, Apple and Google. Your experience
    at Deel will be a career accelerator. At the forefront of the global work revolution,
    you''ll tackle complex challenges that impact millions of people''s working lives.
    With our momentum—backed by a $17.3 billion valuation and $1 B in Annual Recurring
    Revenue (ARR) in just over five years—you''ll drive meaningful impact while building
    expertise that makes you a sought-after leader in the transformation of global
    work. Summary The Solutions Engineer for Global Payroll, will partner directly
    with the Deel’s Global Payroll go-to-market and internal teams for success. In
    this role, you''ll work hand-in-hand with our Global Payroll Account Executives
    to support prospective clients as they explore Deel’s Global Payroll offering,
    playing an essential part in showcasing value and credibility within our platform.
    You’ll be instrumental in translating complex client needs into actionable, scalable,
    and compliant solutions—supporting every stage of the sales process from discovery
    through to implementation hand-off. Responsibilities Work directly with our go-to-market
    teams to showcase the value of Deel’s Global Payroll Platform to deliver technical
    wins. Consult with prospective customers to assess their current payroll practices
    and identify areas for improvement & optimisation. Act as the technical voice
    during sales cycles — owning solution discovery, RFP responses, platform demonstrations
    & integration workshops. Collaborate with Product, Engineering and Operations
    to advocate for prospect needs, accelerate deal velocity, & refine value messaging.
    Constructive disruption - challenge the status quo, always looking for opportunities
    to scale, improve & refine. Stay up-to-date on global payroll legislation, trends,
    and best practices to continuously improve service offerings & maintain industry
    expertise. Support Partnership & Marketing led initiatives Qualifications Minimum
    of 4 years of experience as a Solutions Engineer / Pre-Sales Consultant Previous
    experience working for a Global Payroll or HCM organisation A background and understanding
    of best in class HCM and ERP payroll based integration, especially Workday and
    SuccessFactors. Willingness to travel inside and outside of territory (~10% or
    less) Outstanding presentational skills, always focusing on value (multilingual
    capability is a bonus) Entrepreneurial DNA with a positive, can-do attitude A
    collaborative, team player is essential Comfortable in a start-up, fast-moving
    environment Fluent level of Dutch is a plus Total Rewards Our workforce deserves
    fair and competitive pay that meets them where they are. With scalable benefits,
    rewards, and perks, our total rewards programs reflect our commitment to inclusivity
    and access for all. Some things you’ll enjoy Stock grant opportunities dependent
    on your role, employment status and location Additional perks and benefits based
    on your employment status and country The flexibility of remote work, including
    optional WeWork access At Deel, we’re an equal-opportunity employer that values
    diversity and positively encourage applications from suitably qualified and eligible
    candidates regardless of race, religion, sex, national origin, gender, sexual
    orientation, age, marital status, veteran status, disability status, pregnancy
    or maternity or ot'
