  description: <p>MongoDB is growing and gaining adoption rapidly across the globe
    with the most demanding and innovative companies and development teams in enterprise
    software.&nbsp;</p> <p>MongoDB is building a world-class team in India to create
    tooling that helps customers verify their application and data modernizations.
    As companies modernize their application and data ecosystems, ensuring functional
    equivalence and performance is paramount. The tools developed by the Modernization
    Testing and Verification team are critical in this journey, helping customers
    with automated testing, functional equivalence, and performance validation by
    creating frameworks for contract testing, database state-based testing, and leveraging
    LLMs for unit test generation.</p> <p>We are looking for an experienced Senior
    Software Engineer with a strong background in building software testkits/frameworks.
    You will lead a talented team building a complex product suite using a modern
    stack. The ideal candidate will be designing and building automated frameworks
    that validate functional equivalence, performance benchmarks, and data integrity.
    From leveraging LLMs for unit test generation to building contract testing frameworks,
    your work will be the safety net for the world’s largest enterprise migrations.</p>
    <p>We are looking to speak to candidates who are based in Gurugram for our hybrid
    working model.</p> <h3>The ideal candidate for this role will have</h3> <ul> <li>6+
    years of commercial software development experience with at least one JVM language
    such as Java, preferably using the Spring ecosystem</li> <li>Expertise integrating
    Large Language Models (LLMs) into the developer workflow to automate unit test
    generation and edge-case discovery</li> <li>Experience building developer tools,
    infrastructure, or complex testing frameworks</li> <li>Solid experience in software
    architecture and development</li> <li>Deep expertise in application/database modernization
    with proven ability to design and implement frameworks that ensure database state
    equivalence across different implementations Must understand change data capture,
    event-driven database interception (MongoDB listeners, RDBMS triggers), and state
    comparison algorithms with pattern-based exclusions Strong Spring Boot (or equivalent
    Java framework), MongoDB (or equivalent), and JDBC/JPA skills required</li> <li>Extensive
    experience with relational and document data modeling and hands-on experience
    with at least one SQL database (Postgres, MySQL, etc) and at least one document
    database (e.g. MongoDB)</li> <li>Good understanding of algorithms, data structures
    and their time and space complexity</li> <li>Curiosity, a positive attitude, and
    a drive to continue learning</li> <li>Excellent verbal and written communication
    skills</li> </ul> <h3>Position Expectations</h3> <ul> <li>Contribute high-quality,
    well-tested code to the modernization and framework team and its surrounding services</li>
    <li>Collaborate effectively with Product Management, other engineers, and designers
    to build and deliver on the product roadmap</li> <li>Participate actively in code
    reviews to enforce best practices and patterns</li> <li>Help troubleshoot and
    resolve complex technical issues in our distributed systems</li> <li>Give and
    solicit feedback on technical design documents and pull requests</li> <li>Perform
    tasks related to process such as CI/CD, quality, testing, etc&nbsp;</li> </ul>
    <h3>Success Measures</h3> <p>Within the first three months, you will have</p>
    <ul> <li>Familiarize yourself with the MongoDB <a href="../../sdash/3268714">Modernization
    Infrastructure &amp; Frameworks</a> stack</li> <li>Set up software development
    infrastructure (tech stack, build tools, etc) to enable development using the
    relevant tech stacks</li> <li>Started collaborating with your peers and contributed
    to code reviews and design reviews</li> </ul> <p>Within six months, you will have</p>
    <ul> <li>Familiarised yourself with the rest of our the application modernization
    tool stack</li> <li>Delivered at least one large scale feature that spans the
    entire tech stack</li> <li>Reviewed and contributed to scope and technical design
    documents</li> </ul> <p>Within 12 months, you will have</p> <ul> <li>Become a
    key contributor to our stack, capable of taking on complex features independently</li>
    <li>Helped recruit and interview new members of the team</li> <li>Collaborated
    effectively with other teams at MongoDB on cross-functional projects</li> </ul>
    <h3>About MongoDB</h3> <p>MongoDB is built for change, empowering our customers
    and our people to innovate at the speed of the market. We have redefined the database
    for the AI era, enabling innovators to create, transform, and disrupt industries
    with software. MongoDB’s unified database platform—the most widely available,
    globally distributed database on the market—helps organizations modernize legacy
    workloads, embrace innovation, and unleash AI. Our cloud-native platform, MongoDB
    Atlas,
