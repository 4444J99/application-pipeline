  description: "Company Overview Deepgram is the leading platform underpinning the\
    \ emerging trillion-dollar Voice AI economy, providing real-time APIs for speech-to-text\
    \ (STT), text-to-speech (TTS), and building production-grade voice agents at scale.\
    \ More than 200,000 developers and 1,300+ organizations build voice offerings\
    \ that are \u2018Powered by Deepgram\u2019, including Twilio, Cloudflare, Sierra,\
    \ Decagon, Vapi, Daily, Cresta, Granola, and Jack in the Box. Deepgram\u2019s\
    \ voice-native foundation models are accessed through cloud APIs or as self-hosted\
    \ and on-premises software, with unmatched accuracy, low latency, and cost efficiency.\
    \ Backed by a recent Series C led by leading global investors and strategic partners,\
    \ Deepgram has processed over 50,000 years of audio and transcribed more than\
    \ 1 trillion words. There is no organization in the world that understands voice\
    \ better than Deepgram. Company Operating Rhythm At Deepgram, we expect an AI-first\
    \ mindset\u2014AI use and comfort aren\u2019t optional, they\u2019re core to how\
    \ we operate, innovate, and measure performance. Every team member who works at\
    \ Deepgram is expected to actively use and experiment with advanced AI tools,\
    \ and even build your own into your everyday work. We measure how effectively\
    \ AI is applied to deliver results, and consistent, creative use of the latest\
    \ AI capabilities is key to success here. Candidates should be comfortable adopting\
    \ new models and modes quickly, integrating AI into their workflows, and continuously\
    \ pushing the boundaries of what these technologies can do. Additionally, we move\
    \ at the pace of AI. Change is rapid, and you can expect your day-to-day work\
    \ to evolve just as quickly. This may not be the right role if you\u2019re not\
    \ excited to experiment, adapt, think on your feet, and learn constantly, or if\
    \ you\u2019re seeking something highly prescriptive with a traditional 9-to-5.\
    \ Opportunity You deploy Deepgram\u2019s voice AI platform into complex restaurant\
    \ environments and make it work in the real world. This role sits at the intersection\
    \ of engineering, product, and customer systems, partnering closely with customer\
    \ leadership and technical stakeholders to bring ambitious deployments to life.\
    \ You embed with enterprise restaurant brands and restaurant technology partners,\
    \ learn their systems deeply, and integrate our platform into the core of their\
    \ operations. Along the way you write code, debug production issues, and adapt\
    \ the platform to real world constraints. You operate as a trusted technical partner\
    \ to both customer leadership and engineering teams, ensuring deployments move\
    \ quickly and deliver meaningful business outcomes. You turn real world deployments\
    \ into leverage for the entire platform by identifying patterns across customers,\
    \ shaping product improvements, and building the tooling, reference architectures,\
    \ and playbooks that make each new deployment faster, more reliable, and easier\
    \ to scale across large restaurant fleets and technology ecosystems. The mission\
    \ of this role is to ensure every enterprise deployment of Deepgram for Restaurants\
    \ works like magic \u2014 technically flawless and delivering measurable value\
    \ from day one. Location This role is based in New York City, where many of our\
    \ customers and partners are located. Being close to them helps us move quickly\
    \ and stay connected to their needs. While the role is based in New York City,\
    \ this would still be a remote-first opportunity, as we do not have an office\
    \ local to the area. This role also includes up to 50% travel to meet with customers,\
    \ support sales engagements, and participate in key onsite interactions What You\u2019\
    ll Own: Customer engineering partnership: Embed with customer engineering teams\
    \ as a trusted technical peer. Lead technical discovery and solutioning for prospects\
    \ and customers. Technical integration and deployment: Own the end-to-end technical\
    \ implementation of Deepgram\u2019s voice AI platform for enterprise customers\
    \ \u2014 from scoping and architecture through go-live and optimization. Configuration\
    \ and customization: Adapt and configure Deepgram\u2019s platform to meet each\
    \ customer\u2019s unique operational requirements \u2014 menu structures, ordering\
    \ flows, POS integrations, edge cases, and everything in between. Production excellence:\
    \ Monitor, troubleshoot, and resolve technical issues in live deployments. Serve\
    \ as an escalation point for complex technical issues when necessary. Deployment\
    \ infrastructure leadership: Codify patterns into tools, playbooks, reference\
    \ architectures, and building blocks the broader team can use for other deployments\
    \ and customers. Feedback loop to product and engineering: Translate real-world\
    \ deployment challenges into actionable requirements for Deepgram\u2019s product\
    \ and engineering teams. You are the voice of the customer inside the building.\
    \ You\u2019ll Love This Role If You You are hands-on. You write code, read logs,\
    \ and ship fixes \u2014 you don\u2019t just coordinate. When a customer has a\
    \ technical problem, you roll up your sleeves and solve it. You operate with extreme\
    \ ownership"
