  description: '<div class="content-intro"><p><strong>Why join us</strong></p> <p>Brex
    is the AI-powered spend platform. We help companies spend with confidence with
    integrated corporate cards, banking, and global payments, plus intuitive software
    for travel and expenses. Tens of thousands of companies from startups to enterprises
    — including DoorDash, Flexport, and Compass — use Brex to proactively control
    spend, reduce costs, and increase efficiency on a global scale.</p> <p><span style="font-weight:
    400;">Working at Brex allows you to push your limits, challenge the status quo,
    and collaborate with some of the brightest minds in the industry. We’re committed
    to building a diverse team and inclusive culture and believe your potential should
    only be limited by how big you can dream. We make this a reality by empowering
    you with the tools, resources, and support you need to grow your career.</span></p></div><p><strong>Sales
    at Brex</strong><br>The Sales team is the driving factor behind revenue for Brex
    and every member of our team directly affects our bottom line. We focus on generating
    new opportunities, acquiring new customers, and building even stronger relationships
    with our current customers. Our winning culture recognizes big team wins and celebrates
    individual accomplishments. We ensure that top performers are recognized and have
    built a competitive environment to motivate and unify the team.</p> <p><strong>What
    you’ll do</strong></p> <p>As a SaaS Client Sales Executive at Brex, you will play
    a pivotal role in driving the adoption of Empower SaaS solutions within our Commercial
    customer segment. Your primary focus will be to improve SaaS attach rates, ensuring
    customer stickiness and satisfaction. You will collaborate closely with Customer
    Success and Client Sales team members, engaging in both proactive and reactive
    sales motions to identify and close SaaS opportunities.</p> <p><strong>Where You’ll
    Work</strong></p> <p>This role will be based in our New York City office. We are
    a hybrid environment that combines the energy and connections of being in the
    office with the benefits and flexibility of working from home. We currently require
    a minimum of three coordinated days in the office per week, Monday, Wednesday
    and Thursday. As a perk, we also have up to four weeks per year of fully remote
    work!</p> <p><strong>Responsibilities</strong></p> <ul> <li>Reactively support
    Customer Success and Client Sales teams on paid SaaS sales cycles, taking the
    lead on complex deals</li> <li>Engage with our existing customers, focusing on
    driving SaaS upsell, which will increase customer stickiness</li> <li>Conduct
    product demonstrations and provide technical expertise to potential customers</li>
    <li>Collaborate with CSEs, CSMs, and Solution Consultants to ensure seamless sales
    processes and customer experiences</li> <li>Develop and execute strategic account
    plans to achieve and exceed sales targets</li> <li>Maintain accurate records of
    sales activities and customer interactions in CRM systems</li> </ul> <p><strong>Requirements</strong></p>
    <ul> <li>2+ years of full-cycle B2B software sales experience&nbsp;</li> <li>1+
    years of outbound prospecting experience&nbsp;</li> <li>Experience leading SaaS
    product demonstrations</li> <li>Goal-oriented and self-motivated with a proven
    track record of meeting and exceeding targets</li> <li>Strong understanding of
    SaaS products and their implementation</li> <li>Excellent communication and presentation
    skills</li> <li>Ability to work in fast-paced, high-velocity environments</li>
    <li>Proficiency in CRM software and other sales tools</li> <li>Coachability with
    an interest in growing your career in sales</li> </ul> <p><strong>Bonus points</strong></p>
    <ul> <li>Previous experience in an overlay or channel sales role</li> <li>Familiarity
    with financial products, credit cards, and business finance</li> <li>Familiarity
    with the commercial or mid-market customer segment and high-value sales cycles</li>
    <li>Familiarity with software solutions, especially in areas such as Expense Management,
    Travel, and AP</li> <li>Previous experience in implementing successful upselling
    and cross-selling strategies</li> <li>Keen awareness of the competitive landscape,
    industry trends, and market dynamics</li> <li>A background in handling renewals,
    ensuring customer retention, and minimizing churn</li> <li>Familiarity with sales
    tools such as Gong, Salesforce, Outreach, etc.&nbsp;</li> </ul> <p>The expected
    OTE range for this role is $132,888 - $166,110. The starting wage will depend
    on a number of factors including the candidate’s location, skills, experience,
    market demands, and internal pay parity. The OTE figure listed here includes base
    salary and commissions, which may or may not be earned depending on performance.&nbsp;
    Depending on the position offered, equity and other forms of compensation may
    be provided as part of a total compensation package.</p><div class="content-conclusion"><p><em>Please
    be aware, job-'
