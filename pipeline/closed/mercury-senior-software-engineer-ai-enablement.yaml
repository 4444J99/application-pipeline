    \ programming languages and can navigate platform engineering, infrastructure,\
    \ and developer tooling without needing a map.</li> <li>Has hands-on experience\
    \ building LLM-powered systems\u2014RAG pipelines, agents, eval frameworks\u2014\
    and has shipped at least one of these to production.</li> <li>Understands the\
    \ real tradeoffs in AI deployments: cost modeling, observability, latency, and\
    \ safety\u2014not just the exciting parts.</li> <li>Is high-agency and self-directed.\
    \ You can operate effectively without tightly-defined scope, find the highest-leverage\
    \ work, and get it done.</li> <li>Communicates clearly across technical and non-technical\
    \ audiences\u2014you can explain what you built and why it matters.</li> </ul>\
    \ <p>The total rewards package at Mercury includes base salary, equity, and benefits.\
    \ Our salary and equity ranges are highly competitive within the SaaS and fintech\
    \ industry and are updated regularly using the most reliable compensation survey\
    \ data for our industry. New hire offers are made based on a candidate\u2019s\
    \ experience, expertise, geographic location, and internal pay equity relative\
    \ to peers.</p> <p>Our target new hire base salary ranges for this role are the\
    \ following:</p> <ul> <li>US employees (any location): $166,600 - $218,700</li>\
    \ <li>Canadian employees (any location): CAD 157,400 - 206,650</li> </ul> <p>Mercury\
