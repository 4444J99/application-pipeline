  description: "<p>In 1600, William Gilbert published&nbsp;<em>De Magnete</em>\u2014\
    the first systematic study of magnetism. He didn't just theorize; he built instruments,\
    \ ran experiments, and shared what he learned so that others could go further.\
    \ Three centuries later, those foundations helped power the modern world.</p>\
    \ <p>At Mercury, we're making a deliberate, company-wide bet on AI. Frontier users\
    \ are already pushing boundaries\u2014building agents, automating workflows, moving\
    \ fast. But they're doing it in silos. This role exists to change that: to take\
    \ those scattered experiments and turn them into shared infrastructure, shared\
    \ context, and shared capability. The goal is a multiplier effect\u2014where the\
    \ most ambitious AI work inside Mercury lifts the velocity of everyone else.</p>\
    \ <h2><strong>What you'll do</strong></h2> <p>You'll join a team that has already\
    \ started building Mercury's internal AI platform and enablement layer. Your work\
    \ will be to <strong>extend, harden, and scale what's in motion</strong>, and\
    \ to help partner teams adopt it.</p> <h3><strong>Extend the AI platform foundation</strong></h3>\
    \ <ul> <li>Build and evolve MCP servers that connect internal systems and data\
    \ sources into a coherent interface for agents and engineers.</li> <li>Expand\
    \ and operate our LLM gateway infrastructure: routing, rate limiting, cost attribution,\
    \ and observability across teams.</li> <li>Turn early patterns into durable defaults:\
    \ shared prompt libraries, guardrails, and policy-as-code so teams can move fast\
    \ safely.</li> </ul> <h3><strong>Strengthen the shared company knowledge layer</strong></h3>\
    \ <ul> <li>Shape and maintain structured context artifacts\u2014clean, reliable,\
    \ agent-consumable\u2014so LLMs working in Mercury's systems can reason accurately\
    \ about our domain.</li> <li>Improve internal knowledge discoverability and retrieval\
    \ so both humans and agents can quickly find accurate answers.</li> <li>Partner\
    \ with domain teams to standardize key sources of truth, and keep them fresh.</li>\
    \ </ul> <h3><strong>Enable faster prototyping and iteration across the company</strong></h3>\
    \ <ul> <li>Build and refine sandbox environments and tooling that let engineers\
    \ experiment with AI safely and at speed.</li> <li>Create self-service scaffolding\
    \ so non-engineers\u2014PMs, ops, finance\u2014can prototype and deploy AI-powered\
    \ workflows with minimal hand-holding.</li> <li>Build playgrounds and evaluation\
    \ harnesses so internal AI agents can be tested and iterated in controlled environments\
    \ before hitting production.</li> </ul> <p><em>This list is illustrative. Priorities\
    \ will shift as we learn; the right person will help choose the next highest-leverage\
