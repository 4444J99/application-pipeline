  description: About the Role We are looking for a talented and motivated Backend
    Engineer to join our team. You will be responsible for building and maintaining
    scalable, high-performance backend systems that power our products. Collaborating
    with designers, data scientists, and engineers, you'll play a key role in conceptualizing,
    designing, and delivering robust and efficient backend solutions. What you’ll
    do Design, develop, and maintain scalable backend services that support our applications
    and infrastructure. Implement secure and efficient APIs to support frontend applications
    and third-party integrations. Optimize system performance, reliability, and scalability
    through effective architecture and engineering best practices. Work closely with
    product managers, data analysts, and frontend engineers to develop backend solutions
    that align with business and user needs. Ensure high availability, fault tolerance,
    and performance of backend systems. Monitor system health, troubleshoot issues,
    and implement improvements to enhance efficiency and stability. Maintain security
    best practices to protect user data and system integrity. Stay up to date with
    industry trends and emerging technologies in backend development and distributed
    systems. Who you are 5+ years of experience in backend development, building scalable
    and reliable applications. Strong proficiency in programming languages such as
    Python, Java, or Go. Python and Go are preferred. Experience with database technologies
    such as PostgreSQL, MySQL, or NoSQL solutions. Familiarity with designing and
    integrating APIs, including REST and GraphQL. Understanding of distributed systems,
    microservices architecture, and cloud platforms (AWS, GCP, or Azure). Experience
    with containerization and orchestration tools like Docker and Kubernetes. Strong
    problem-solving skills and the ability to optimize system performance and reliability.
    Excellent communication skills and the ability to work effectively in a collaborative
    environment. Preferred Qualifications Experience with event-driven architectures
    and messaging systems (Kafka, RabbitMQ, etc.). Knowledge of caching strategies
    and performance optimization techniques. Experience working on large-scale, high-traffic
    applications. Familiarity with CI/CD pipelines and DevOps best practices. Exposure
    to machine learning or data-driven applications. About Character.AI Character.AI
    empowers people to connect, learn and tell stories through interactive entertainment.
    Over 20 million people visit Character.AI every month, using our technology to
    supercharge their creativity and imagination. Our platform lets users engage with
    tens of millions of characters, enjoy unlimited conversations, and embark on infinite
    adventure s. In just two years, we achieved unicorn status and were honored as
    Google Play's AI App of the Year—a testament to our innovative technology and
    visionary approach. Join us and be a part of establishing this new entertainment
    paradigm while shaping the future of Consumer AI! At Character, we value diversity
    and welcome applicants from all backgrounds. As an equal opportunity employer,
    we firmly uphold a non-discrimination policy based on race, religion, national
    origin, gender, sexual orientation, age, veteran status, or disability. Your unique
    perspectives are vital to our success.
