  description: <h3>About the Role</h3> <p>We’re looking for a Senior Engineer to help
    build the next-generation inference platform that supports embedding models used
    for semantic search, retrieval, and AI-native experiences in MongoDB Atlas.</p>
    <p>You’ll join the broader Search and AI Platform organization and collaborate
    with ML researchers and engineers from our Voyage.ai acquisition. Together, we’re
    building infrastructure for real-time, low-latency, and high-scale inference —
    fully integrated with Atlas and designed for developer-first experiences.</p>
    <p>As a Senior Engineer, you'll focus on building core systems and services that
    power model inference at scale. You'll own key components of the infrastructure,
    work across teams to ensure tight integration with Atlas, and contribute to a
    platform designed for reliability, performance, and ease of use.</p> <p>We're
    looking to speak with candidates in Palo Alto for our hybrid working model.</p>
    <h3>What You’ll Do</h3> <ul> <li>Design and build components of a multi-tenant
    inference platform integrated directly with MongoDB Atlas, supporting semantic
    search and hybrid retrieval</li> <li>Collaborate with AI engineers and researchers
    to productionize inference for embedding models and rerankers — enabling both
    batch and real-time use cases</li> <li>Contribute to platform capabilities such
    as latency-aware routing, model versioning, health monitoring, and observability</li>
    <li>Improve performance, autoscaling, GPU utilization, and resource efficiency
    in a cloud-native environment</li> <li>Work across product, infrastructure, and
    ML teams to ensure the inference platform meets the scale, reliability, and latency
    demands of Atlas users</li> <li>Gain hands-on experience with tools like vLLM
    and container orchestration with Kubernetes</li> </ul> <h3>Who You Are</h3> <ul>
    <li>5+ years of experience building backend or infrastructure systems at scale</li>
    <li>Strong software engineering skills in languages such as Go, Rust, Python,
    or C++, with an emphasis on performance and reliability</li> <li>Experienced in
    cloud-native architectures, distributed systems, and multi-tenant service design</li>
    <li>Familiar with concepts in ML model serving and inference runtimes, even if
    not directly deploying models</li> <li>Knowledge of vector search systems (e.g.,
