    Master’s degree in Computer Science, or a related technical field.</li> </ul>
    <p><strong>What will help you stand out (Nonessential Skills/Nice to Haves)</strong></p>
    <ul> <li>Experience building internal "Sales Tech" or "Fintech" tools that directly
    impact revenue.</li> <li>Familiarity with AWS data services (SageMaker, Lambda,
    SQS).</li> <li>A passion for removing "human-in-the-loop" friction through intelligent
    automation.</li> </ul> <p>&nbsp;</p> <p><strong>**This is a hybrid role requiring
