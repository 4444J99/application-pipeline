    new internal products from scratch that leverage LLMs and Agentic AI to automate
    account research, lead prioritization, and complex quoting logic.</li> <li><strong>Core
    Intelligence Models:</strong> Design and implement ML models that provide real-time
    recommendations to sales users, reducing manual entry and increasing deal velocity.</li>
    <li><strong>Infrastructure Integration:</strong> Develop the backend connective
    tissue between our custom quoting engine, Salesforce, and internal data lakes
    to ensure a seamless, low-latency end-to-end experience.</li> <li><strong>Technical
    Problem Solving:</strong> Act as a domain expert to solve complex synchronization
    and architectural challenges across the GTM stack, ensuring systems are scalable
    and resilient.</li> <li><strong>Quality &amp; Mentorship:</strong> Drive engineering
    excellence through rigorous code reviews, automated testing, and by modeling best
    practices for&nbsp; engineers on the team.</li> <li><strong>Build Great Products:</strong>
    Deliver significant core capabilities that have broad impact; take high-level
    goals and turn them into sequenced, production-ready code.</li> <li><strong>Problem
    Solve:</strong> Anticipate shifts in product needs and build flexible, decoupled
    backend systems that can evolve with our AI strategy.</li> <li><strong>Deliver
    Quality:</strong> Ensure the reliability of GTM tools by building deep observability
