  description: 'Snowflake is about empowering enterprises to achieve their full potential
    — and people too. With a culture that’s all in on impact, innovation, and collaboration,
    Snowflake is the sweet spot for building big, moving fast, and taking technology
    — and careers — to the next level. Senior Software Engineer - Customer Experience
    Engineering Our customers are very happy with our technology and are quickly expanding
    their use cases, only limited by their own imaginations. The Customer Experience
    Engineering Team aims to enable customers to push these limits, and when customers
    run into roadblocks or issues, enable them and our internal technical resources
    to resolve those issues and get back to seeing success with Snowflake. Snowflake’s
    Customer Experience Engineering Team is expanding! We are looking for a Senior
    Software Engineer to join our team who likes building intelligent data applications
    that give insight into diagnostic data and technical content that is relevant
    to issues customers may be facing. Our Customer Experience Senior Software Engineers
    enjoy developing features into the Snowflake product that aim to greatly reduce
    friction points that block customers and regularly require help from Snowflake
    technical experts. They are excited by the challenges presented by extracting
    intelligence from a wide variety of data sources, including structured and unstructured
    data. You will: Lead and drive projects that span our stack, including Java and
    Python services hosted in AWS Lambda and Kubernetes. Promote strong collaboration
    within a cross-functional team, including product management and design. Deliver
    features requiring close coordination with several partner teams. Be a strong
    contributor to the product vision and drive team planning. Pinpoint problems,
    instrument relevant components as needed, and ultimately implement solutions.
    Mentor and coach junior team members. Our ideal Senior Software Engineer will
    have: B.S. or M.S degree in CS, MIS, or equivalent discipline 6+ years experience
    hands-on software engineering experience Deep understanding of modern application
    design architecture, good API design patterns, performance, and scale. Expertise
    in at least one of the following (bonus for more than one): Python, Java, NodeJS,
    GoLang, C#, Ruby. Experience with software engineering best practices: unit testing,
    code reviews, and design documentation. Excellent debugging and troubleshooting
    skills, especially in a cloud environment. Demonstrated technical leadership experience,
    such as being an architect or tech lead for high-impact projects. Great communication
    skills, both verbal and written and an interest in working with a diverse set
    of peers and external developers. Genuine enjoyment of the art of building great
    software, and a love of learning new things Snowflake is growing fast, and we’re
    scaling our team to help enable and accelerate our growth. We are looking for
    people who share our values, challenge ordinary thinking, and push the pace of
    innovation while building a future for themselves and Snowflake. How do you want
    to make your impact? For jobs located in the United States, please visit the job
    posting on the Snowflake Careers Site for salary and benefits information: careers.snowflake.com'
