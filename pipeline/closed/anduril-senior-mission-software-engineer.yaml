  description: <div class="content-intro"><p>Anduril Industries is a defense technology
    company with a mission to transform U.S. and allied military capabilities with
    advanced technology. By bringing the expertise, technology, and business model
    of the 21st century’s most innovative companies to the defense industry, Anduril
    is changing how military systems are designed, built and sold. Anduril’s family
    of systems is powered by Lattice OS, an AI-powered operating system that turns
    thousands of data streams into a realtime, 3D command and control center. As the
    world enters an era of strategic competition, Anduril is committed to bringing
    cutting-edge autonomy, AI, computer vision, sensor fusion, and networking technology
    to the military in months, not years.</p></div><h4>ABOUT THE TEAM</h4> <p>The
    Mission Software Engineering team is responsible for building, deploying, integrating,
    extending, and scaling Anduril's software to deliver mission-critical capabilities
    to our customers. As the software engineers closest to Anduril customers and end-users,
    Mission Software Engineers solve technical challenges of operational scenarios
    while owning the end-to-end delivery of winning capabilities such as Counter Intrusion,
    Joint All Domain Command &amp; Control, and Counter-Unmanned Aircraft Systems.</p>
    <h4>ABOUT THE JOB</h4> <p>As a Sr Mission Software Engineer in our brand-new Netherlands
    office, you will be a driving force in establishing Anduril's engineering presence
    and capabilities across Europe. This isn't just another engineering role; it's
    a foundational opportunity to define, build, and lead mission-critical software
    development from the ground up in a strategically vital region.<br><br>You will
    contribute to the design, development, and deployment of complex mission software
    solutions, enabling third party systems to seamlessly integrate with Anduril products.
    You'll engage with a wide variety of intricate technical problems, making pragmatic
    engineering tradeoffs as you learn and grow. Your contributions will be essential
    in upholding the technical excellence our customers expect from Anduril in this
    critical new market. Above all, you will embody the “Whatever It Takes” mindset—executing
    in an expedient, scalable, and pragmatic way while keeping the mission top-of-mind
    and making sound engineering decisions to deliver successful outcomes correctly,
    on-time, and with the highest quality.</p> <h4>WHAT YOU’LL DO</h4> <ul> <li>Be
    a champion for Anduril capabilities within a customer environment</li> <li>Develop
    architecture and mission vignettes</li> <li>Iterate on core data mesh technology
    to make optimal use of degraded networks</li> <li>Develop connectors and APIs
    for legacy and cutting edge systems to integrate with Lattice</li> <li>Deploy
    software to non-standard environments</li> <li>Create data flow pipelines that
    span horizontally and vertically across disparate networked systems and security
    domains</li> </ul> <h4>REQUIRED QUALIFICATIONS</h4> <ul> <li>Strong engineering
    background from industry or school, ideally in areas/fields such as Computer Science,
    Software Engineering, Mathematics, or Physics</li> <li>At least 4+ years working
    with a variety of programming languages such as Java, Python, C++, Rust, Go, JavaScript,
    etc.</li> <li>Experience building software solutions involving significant amounts
    of data processing and analysis</li> <li>Ability to quickly understand and navigate
    complex systems and established code bases</li> <li>Experience working in a customer
    / client facing role</li> <li>A desire to work on critical software that has a
    real-world impact</li> <li>Ability to travel to client sites</li> <li>Eligible
    for NATO Clearance</li> </ul><div class="content-conclusion"><p><span data-contrast="auto">The
    salary range for this role is an estimate based on a wide range of compensation
    factors, inclusive of base salary only. Actual salary offer may vary based on
