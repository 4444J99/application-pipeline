  description: 'Perplexity is looking for experienced Infrastructure Engineers to
    join our small team revolutionizing the way people search and interact with the
    internet. You will be responsible for leading the design, implementation, and
    scaling of tools, systems, and platforms that empower web, mobile, and browser
    engineers to build state-of-the-art products. You’ll play a critical role in enabling
    our product, AI, and developer teams to innovate quickly while ensuring reliability,
    security, and performance at scale. Tech Stack: Python | Go | TypeScript | PostgreSQL
    | DynamoDB | Redis | FastAPI | React | Bazel | GitHub | AWS Teams Hiring Senior/Staff
    Platform The Platform team is the backbone of Perplexity’s product reliability,
    scalability, and performance, enabling every product and AI team to build with
    confidence. This small, high-impact group builds and maintains critical infrastructure—from
    backend systems such as authentication, real-time data flows, and service orchestration
    to frontend frameworks that ensure fast, reliable, and secure user experiences.
    By setting rigorous standards for code quality, uptime, and developer productivity,
    the Platform team ensures everyone at Perplexity can innovate at speed on top
    of a robust, well-architected foundation. Senior/Staff DevX DevX (Developer Experience)
    empowers engineers across Perplexity to build, ship, and iterate faster than ever.
    The team owns internal platforms for source control, build, test, and deployment—removing
    friction from every step of product development. They architect seamless onboarding,
    blazing-fast CI/CD, and developer tools that unlock creativity and safety at scale.
    Through deep collaboration and high autonomy, the DevX team amplifies the impact
    of every engineer, making rapid, reliable innovation possible across the company.
    Senior/Staff Cloud Infra The Cloud Infra team architects and operates the mission-critical
    cloud infrastructure behind Perplexity’s global platform. This team designs and
    scales compute, storage, and networking systems for high-throughput, low-latency
    workloads, blending a mix of proactive project work and operational support. The
    team collaborates closely with product, AI research, security, and the rest of
    Perplexity’s teams to ensure our services are always available, reliable, and
    as fast as curiosity demands—building infrastructure that grows in lockstep with
    user and model scale.'
