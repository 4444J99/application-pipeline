    any requirements for when you’re not around A great sense of direction and prioritization
    when it comes to dealing with the ambiguity of an early stage startup A sense
    of grit to dive into a problem, implement a solution, scale that solution, and
    replace it when needed A great set of communication skills for getting your point
    across, solution implemented, and beyond We value and love to work with diverse
    persons from all backgrounds Things to know For better or worse, we''re a startup;
    our team dynamics are different from companies of different sizes and stages.
    We''re distributed ALL across the globe, and that''s only going to be more and
    more distributed. As a result, stuff is ALWAYS happening. We do NOT expect you
    to work all the time, but you''ll have to be diligent about your boundaries because
    the end of your day may overlap with the start of someone else''s. We''re a small
    team, with high ownership, who are not only passionate about what we do, but seek
    to be exceptional as well. At the time of writing we''re 21, serving hundreds
    of thousands of users. There''s a lot of stuff going on, and a lot of ambiguity.
    We want you to own it. We believe that ownership is a key to growth, and part
    of that growth is not only being able to make the choices, but owning the success,
    or failure, that comes with those choices. Benefits and perks At Railway, we provide
    best in class benefits. Great salary, full health benefits including dependents,
    strong equity grants, equipment stipend, and much more. For more details, check
    back on the main careers page . Beyond compensation, there are a few things that
    we believe that make working at Railway truly unique: Autonomy : We have very
    few meetings. Just a Monday and a Friday to go over the Company Board. We think
    your time is sacred, whether it''s at work, or outside of work. Ownership : We''re
    a company with a high ownership, high autonomy culture. We hope that you''ll come
    in, help us, and over the course of many years do the best work of your life.
    When we bring you onboard, we expect you to change the company. Novel problems/solutions
    : We''re a startup that''s well funded, with cool problems, which lets us implement
    novel solutions! We abhor “busywork” and think, whether it''s community, engineering,
    operations, etc there''s always opportunity for creative and high leverage solutions.
