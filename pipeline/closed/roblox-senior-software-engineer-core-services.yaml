  description: '<div class="content-intro"><p><span style="font-weight: 400;">Every
    day, tens of millions of people come to Roblox to explore, create, play, learn,
    and connect with friends in 3D immersive digital experiences– all created by our
    global community of developers and creators.&nbsp;</span></p> <p><span style="font-weight:
    400;">At Roblox, we’re building the tools and platform that empower our community
    to bring any experience that they can imagine to life. Our vision is to reimagine
    the way people come together, from anywhere in the world, and on any device.</span><strong>
    </strong><span style="font-weight: 400;">We’re on a mission to connect a billion
    people with optimism and civility, and looking for amazing talent to help us get
    there.&nbsp;</span></p> <p><span style="font-weight: 400;">A career at Roblox
    means you’ll be working to shape the future of human interaction, solving unique
    technical challenges at scale, and helping to create safer, more civil shared
    experiences for everyone.</span></p></div><p>The Core Services team manages the
    core infrastructure and API stack and builds high throughput microservices that
    powers<a href="https://www.roblox.com"> https://www.roblox.com</a>. These services
    need to be fast, reliable and highly scalable as they have a huge impact on the
    day-to-day experience of every Roblox user. In addition, the team owns shared
    libraries, infrastructure microservices, and the web infrastructure used by all
    other Roblox full-stack feature teams.</p> <p>We are building a massive-scale,
    multi-region platform designed to power the next generation of global real-time
    experiences. At the intersection of Cloud Engineering and AI Infrastructure, you
    will build the foundation for a platform that supports millions of concurrent
    users, defining how stateless jobs are executed at a scale that pushes the boundaries
    of standard open-source tooling.</p> <p>As the orchestrator for our global inference
    and microservices footprint, our platform provides a "deploy and forget" experience
    for critical workloads. You won''t just be managing clusters; you will be building
    the custom control plane that automates scheduling, scaling, and recovery across
    a hybrid-cloud environment, ensuring our infrastructure remains resilient regardless
    of where it runs.</p> <p><strong>You will:</strong></p> <ul> <li>Build the Orchestration
    Engine: Design and develop custom Kubernetes Operators and Controllers in Go to
    automate the entire lifecycle of high-throughput, mission-critical stateless workloads.</li>
    <li>Architect Hybrid-Cloud Mobility: Create systems that enable workloads to move
    seamlessly between on-premise and public cloud environments, ensuring high availability
    and automated failover during regional outages.</li> <li>Extend the Kubernetes
    Control Plane: Write performant reconciliation loops and Custom Resource Definitions
    (CRDs) to handle complex scheduling logic and resource optimization for massive
    CPU and GPU-intensive fleets.</li> <li>Empower Developer Velocity: Build high-level
    platform abstractions and automation that allow service owners to deploy global-scale
    code without needing to manage the underlying container orchestration.</li> </ul>
    <p><strong>You have:</strong></p> <ul> <li>3-5 years of experience building web
    services using Golang or similar language.</li> <li>Experience building and operating
    K8’s clusters.</li> <li>Deep understanding of Kubernetes internals (control plane,
    reconciliation loops, scheduling, networking).</li> <li>Experience building large
    scale distributed systems with focus on scalability, reliability, and availability.</li>
    <li>Experience building or operating control-plane or orchestration systems (e.g.,
    schedulers, workflow engines, or compute platforms).</li> <li>Strong knowledge
    of distributed systems fundamentals such as leader election, event-driven architectures,
    messaging/queuing, or distributed state management.</li> <li>Experience designing
    systems that handle multi-region orchestration, failover, disaster recovery, or
    large-scale reliability challenges.</li> <li>Experience with Oncall and in troubleshooting
    live site issues.&nbsp;</li> <li>Bachelor’s degree in Computer Science or a related
    field, or equivalent experience.</li> <li>Experience writing Kubernetes Operators
    or custom controllers using Operator-SDK or control runtime (a plus).</li> </ul>
    <p><br><br></p><div class="content-pay-transparency"><div class="pay-input"><div
    class="description"><p>For roles that are based at our headquarters in San Mateo,
