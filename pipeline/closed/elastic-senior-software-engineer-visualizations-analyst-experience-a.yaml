  description: '<div class="content-intro"><p>Elastic, the Search AI Company, enables
    everyone to find the answers they need in real time, using all their data, at
    scale — unleashing the potential of businesses and people. The Elastic Search
    AI Platform, used by more than 50% of the Fortune 500, brings together the precision
    of search and the intelligence of AI to enable everyone to accelerate the results
    that matter. By taking advantage of all structured and unstructured data — securing
    and protecting private information more effectively — Elastic’s complete, cloud-based
    solutions for search, security, and observability help organizations deliver on
    the promise of AI.</p></div><h3><strong>What is The Role</strong></h3> <p>If you
    are a passionate full-stack developer that loves to navigate the JavaScript universe
    we would like to hear from you. We are seeking a Senior Software Engineer to join
    the Application Experience team in order to build the future of the data visualization
    user experience in Kibana.</p> <p>You will be contributing significantly to our
    Software-as-a-Service, Serverless, and On-Premise initiatives. You will also be
    integral in crafting the products we build, not just implementing specs. You''ll
    influence architecture, improve system design and raise the technical quality
    bar across visualization experiences.</p> <p>If this sounds like you, then let''s
    talk. Here are some specifics:</p> <h3><strong>What You Will Be Doing</strong></h3>
    <ul> <li>As part of the Analyst Experience team you will invent, build and evolve
    core parts of the Kibana visualization and editor experiences</li> <li>Work on
    a codebase that consists of UX, APIs, and services both on the client and server
    side</li> <li>Own technical initiatives end-to-end: from problem framing and architecture
    decisions to delivery and iteration</li> <li>Build and optimize data visualization
    pipelines (data shaping, expression/model layers, rendering, and interaction UX)</li>
    <li>Improve performance, reliability and maintainability for data-heavy, multi-layer
    visualizations</li> <li>Work closely with the Product, Operations, Design and
    Engineering teams to shape roadmap and implementation details</li> <li>Be part
    of a great team who mentor, challenge and support each other through design reviews,
    code reviews and strong engineering practices</li> </ul> <h3>What You Bring&nbsp;</h3>
    <ul> <li>At least five years of experience building modern web applications</li>
    <li>Strong proficiency with React, Typescript, Node.js, Git, Storybook, and modern
    testing practices (for example, Jest)</li> <li>Proven track record of delivering
    complex frontend or full-stack features with minimal direction</li> <li>Interest
    in data visualization and willingness to deepen expertise in charting patterns,
    interaction models, and performance trade-offs</li> <li>Ability to collaborate
    in a distributed, multi-functional environment</li> <li>Clear technical communication
    and writing skills</li> </ul> <h3>Bonus Points</h3> <ul> <li>Hands-on experience
    with core visualization rendering technologies such as Canvas, WebGL, and SVG</li>
    <li>Understanding of how visualization libraries work internally (for example
    D3, Vega, or similar), beyond basic usage</li> <li>Experience with analytics,
    dashboarding, observability, or security products.</li> <li>Familiarity with OpenSource
    development and/or Elasticsearch</li> </ul><div class="content-conclusion"><h2><strong>Additional
    Information - We Take Care of Our People</strong></h2> <p>As a distributed company,
    diversity drives our identity. Whether you’re looking to launch a new career or
    grow an existing one, Elastic is the type of company where you can balance great
    work with great life. Your age is only a number. It doesn’t matter if you’re just
    out of college or your children are; we need you for what you can do.</p> <p>We
    strive to have parity of benefits across regions and while regulations differ
    from place to place, we believe taking care of our people is the right thing to
    do.</p> <ul> <li>Competitive pay based on the work you do here and not your previous
    salary</li> <li>Health coverage for you and your family in many locations</li>
    <li>Ability to craft your calendar with flexible locations and schedules for many
    roles</li> <li>Generous number of vacation days each year</li> <li>Increase your
    impact - We match up to $2000 (or local currency equivalent) for financial donations
    and service</li> <li>Up to 40 hours each year to use toward volunteer projects
    you love</li> <li>Embracing parenthood with minimum of 16 weeks of parental leave</li>
    </ul> <p>Different people approach problems differently. We need that. Elastic
    is an equal opportunity employer and is committed to creating an inclusive culture
    that celebrates different perspectives, experiences, and backgrounds. Qualified
    applicants will receive consideration for employment without regard to race, ethnicity,
    color, religion, sex, pregnancy, sexual orientation, gender perception or '
