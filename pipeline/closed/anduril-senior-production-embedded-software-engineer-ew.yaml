  description: <div class="content-intro"><p>Anduril Industries is a defense technology
    company with a mission to transform U.S. and allied military capabilities with
    advanced technology. By bringing the expertise, technology, and business model
    of the 21st century’s most innovative companies to the defense industry, Anduril
    is changing how military systems are designed, built and sold. Anduril’s family
    of systems is powered by Lattice OS, an AI-powered operating system that turns
    thousands of data streams into a realtime, 3D command and control center. As the
    world enters an era of strategic competition, Anduril is committed to bringing
    cutting-edge autonomy, AI, computer vision, sensor fusion, and networking technology
    to the military in months, not years.</p></div><p><strong>ABOUT THE TEAM</strong><br>Anduril’s
    Electronic Warfare (EW) team is seeking an experienced embedded software engineer
    to support next-generation electronic warfare platforms in production. As a Production
    Embedded software engineer, you’ll develop and maintain EW product software specific
    to a production environment, collaborate with manufacturing and test automation
    engineers to improve testability, and collaborate with the wider embedded software
    organization to ensure a seamless new product introduction.<br><br><strong>WHAT
    YOU'LL DO</strong></p> <ul> <li>Contribute to design reviews acting as an expert
    in Built In Test, design for test, and fault isolation and detection.</li> <li>Define
    Built In Test strategy and requirements for automated testing, supporting fault
    detection, isolation, and reporting.</li> <li>Develop and maintain production
    SW builds that enable testing and troubleshooting at board-level and unit-level
    RF test stations.</li> <li>Develop and regression test high-reliability software
    for controlling our electronic warfare assets, seamlessly integrated with production
    test automation.</li> <li>Utilize infrastructure providing deterministic builds
    and configuration management for production deployment, guaranteeing software
    traceability and minimizing the maintenance burden of manufacturing.</li> </ul>
    <p><strong>REQUIRED QUALIFICATIONS</strong></p> <ul> <li>7+ years professional
    experience in software engineering</li> <li>Experience (professional or in the
