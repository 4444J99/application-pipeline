    languages (Haskell or Rust)</li> <li>Experience with Built In Test development</li>
    <li>Eligible to obtain and maintain an active U.S. Secret security clearance</li>
    </ul> <p><strong>PREFERRED QUALIFICATIONS</strong></p> <ul> <li>Experience with
