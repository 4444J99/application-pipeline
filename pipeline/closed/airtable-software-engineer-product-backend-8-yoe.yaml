    discover and unlock the full value of Airtable.</li> <li><strong>The Platform
    Interoperability Team</strong>&nbsp;<strong>(Full-Stack/BE)</strong> builds the
    systems that allow agents, integrations, and connected workflows to interact with
    Airtable as a platform. As AI agents become a primary interface for how work gets
    done, we''re ensuring Airtable is a first-class participant in that ecosystem.
    This team''s mission is to make Airtable the most capable and well-connected platform
