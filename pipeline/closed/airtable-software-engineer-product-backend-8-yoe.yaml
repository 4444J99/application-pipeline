    <li><strong><em>Based in New York City and are open to coming into our office
    (Soho) at least ~2-3 times/week for team collaboration</em></strong></li> <li><strong><em>Based
    remotely in the greater Seattle area</em></strong></li> </ul> <h1><strong>What
    you''ll do</strong></h1> <ul> <li>Design and build systems that dramatically increase
    the scalability and performance of all applications built on Airtable, to earn
    the trust of our customers through predictable, reliable, and thoughtful interactions.</li>
    <li>Work at the deep backend of the Airtable software stack within the Enterprise
    Product portion of the org, just above the Infrastructure org.</li> <li>Partner
    with product managers, designers, and data scientists to understand the needs
    of potential users and build a product that unlocks their potential.</li> <li>Work
    alongside and learn from a talented group of engineers with a diverse range of
    experiences and backgrounds.</li> </ul> <h1><strong>Who you are</strong></h1>
