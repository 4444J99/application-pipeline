    and teammates across multiple time zones.</li> </ul> <p><strong>What we look for
    in you&nbsp;</strong></p> <ul> <li>You have at least 5 years of experience in
    software engineering and at least 5 years of experience in developing large scale
    systems with Golang and cloud technologies and shipping user-facing features.</li>
    <li>Experience with third-party vendor integrations.</li> <li>You enjoy and have
    experience with large-scale, high-traffic platforms and implementing scalable,
    robust services in the real world.&nbsp;</li> <li>You have experience in authoring
    and contributing to technical architecture and implementing them.&nbsp;</li> <li>Experience
    in AWS, Kubernetes, Terraform, BuildKite or similar.&nbsp;</li> <li>Experience
    in rate limiters, caching, load balancing, circuit breakers, metrics, logging,
    tracing, debugging etc.</li> <li>Experience in event driven architectures (Kafka,
    MQ etc.), proficiency in either SQL or NoSQL DBs, understanding of concepts like
    gRPC, GraphQL, ETL.</li> <li>Proficiency in Go.</li> </ul> <p><strong>Nice to
    haves:</strong></p> <ul> <li>Python, Ruby</li> <li>SaaS platform experience</li>
