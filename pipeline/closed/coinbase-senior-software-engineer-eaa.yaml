  description: <div class="content-intro"><p>Ready to be pushed beyond what you think
    you’re capable of?</p> <p>At Coinbase, our mission is to increase economic freedom
    in the world. It’s a massive, ambitious opportunity that demands the best of us,
    every day, as we build the emerging onchain platform — and with it, the future
    global financial system.</p> <p>To achieve our mission, we’re seeking a very specific
    candidate. We want someone who is passionate about our mission and who believes
    in the power of crypto and blockchain technology to update the financial system.
    We want someone who is eager to leave their mark on the world, who relishes the
    pressure and privilege of working with high caliber colleagues, and who actively
    seeks feedback to keep leveling up. We want someone who will run towards, not
    away from, solving the company’s hardest problems.</p> <p>Our <a href="https://www.coinbase.com/mission">work
    culture</a> is intense and isn’t for everyone. But if you want to build the future
    alongside others who excel in their disciplines and expect the same from you,
    there’s no better place to be.</p> <p>While many roles at Coinbase are remote-first,
    we are not remote-only. In-person participation is required throughout the year.
    Team and company-wide offsites are held multiple times annually to foster collaboration,
    connection, and alignment. Attendance is expected and fully supported.</p></div><ul>
    <li><strong>Team</strong>&nbsp;- The Agent Productivity Tools (APT) team is a
    vital part of Coinbase’s Enterprise Applications and Architecture org, responsible
    for building the customer experience platforms that streamlines the customer service
    and compliance processes with innovative services, tools and applications that
    improve the efficiency and effectiveness of CX agents. This helps resolve customer
    issues and compliance KYC processes faster, with greater accuracy, and ultimately
    this leads to higher customer satisfaction levels and a better overall compliant
    experience for our customers.</li> <li><strong>Role&nbsp;</strong>- You will be
    building applications that will enable Coinbase Customer Agents and other users
    to increase their productivity, drive automation, and deliver impact at scale
    through AI/ML-based technologies.</li> </ul> <p><strong>What you’ll be doing&nbsp;</strong></p>
    <ul> <li>Build complete user features including Golang and cloud technologies&nbsp;</li>
    <li>Lead assessment and implementation of third-party tools.</li> <li>Deliver
    cross-functional outcomes to complex problems in collaboration with product, design,
    security, data or other engineering teams</li> <li>Demonstrate a keen awareness
    of Coinbase’s platform, development practices, and various technical domains and
