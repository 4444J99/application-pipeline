  description: <h2><strong>Senior Solutions Engineer, Commercial</strong></h2> <p>As
    a<strong> Senior Solutions Engineer</strong>, you will be the primary technical
    resource for our Commercial Accounts team. You will share your product and technical
    expertise through presentations, product demonstrations, and technical evaluations
    (Proof Of Values). As the technical expert, you will work with clients to understand
    their requirements and pain points, then design the right solution for their business
    needs. During the sales cycle you will guide clients through trials and POVs,
    demonstrating Sumo Logic’s ability to meet and exceed their requirements and building
    a positive relationship that will provide continuous value to our customers. Finally,
    you will have the opportunity to work cross-functionally with our Product Management
    and Engineering teams to share your knowledge and experiences to ultimately improve
    our business and our customers’ success.</p> <p>The ideal candidate will have
    a broad technical background, with a minimum of 4 years experience in a Solutions
    Engineer role (or similar). While you will be working on a variety of use cases,
    the ideal candidate should have a strong security background with a deep understanding
    of security threats, solutions, security tools, and network technologies. In addition,
    hands-on experience architecting and deploying security tooling to on-premise
    and cloud environments is preferred.</p> <p>We seek talent who wants to leverage
    their technical and people skills to help deliver solutions to clients directly
    and become a trusted advisor in the process. Above all else, you should be highly
    self-motivated and extremely curious to learn more about Sumo Logic and the vast
    problems that it can solve.</p> <h4>Responsibilities</h4> <ul> <li>Partner with
    the Accounts Team to articulate Sumo Logic’s value proposition, vision, and strategy
    to customers</li> <li>Technically close complex opportunities through advanced
    competitive knowledge, technical skill, and credibility</li> <li>Understand and
    help orchestrate all phases of the sales cycle, including leading technical validations
    during the Proof of Value phase&nbsp;</li> <li>Be successful working with all
    levels of an organization, from executives down to individual developers and Site
    Reliability Engineers</li> <li>Deliver product and technical demonstrations of
    the Sumo Logic service</li> <li>Work cross functionally with Product Management
    and Engineering to improve the Sumo Logic service based on your experience with
    customers</li> </ul> <h4>Required Qualifications and Skills</h4> <ul> <li>B.S.
    in Computer Science, Engineering, or a related field; M.S. in Computer Science,
    Engineering, or a related field (preferred)</li> <li>4+ years as a Solutions Engineer
    (preferred), Solutions Architect (preferred), Sales Engineer (preferred), Implementation
    Consultant, Support Engineer, Site Reliability Engineer, or a Software Developer
    with experience leading projects and/or working with customers</li> <li>Hands
    on Knowledge of Security related products, technologies, and sources such as IDS/IPS,
    SIEM/Log Management, Network / Endpoint Security, Threat Detection, Incident Response,
    MSSP/MDR, Threat Feeds, CASB, etc</li> <li>Experience with leading and running
    technical validations like Proof of Value (preferred)</li> <li>Experience selling
    and working with pure SaaS solutions in multi-tenant architectures</li> <li>Experience
    with Amazon Web Services (AWS), Google Cloud Platform (GCP), Microsoft Azure (certification
    is preferred)</li> <li>A broad background and understanding of technical infrastructure
    (servers, networking devices, storage, etc.)</li> <li>Modern application architecture
    (micro-services) understanding and experience working with Kubernetes, Docker,
    and/or Lambda (preferred)</li> <li>Experience with various monitoring tools like
    Splunk, Datadog, Elastic, New Relic, etc. (preferred)</li> <li>Comfortable working
    in a dynamic, fast-paced startup environment and experience at a successful startup
    (preferred)</li> <li>Strong written and verbal communication skills, as well as
    business and technical acumen</li> </ul> <h2><strong>About Us</strong></h2> <p>Sumo
    Logic, Inc. helps make the digital world secure, fast, and reliable by unifying
    critical security and operational data through its Intelligent Operations Platform.
    Built to address the increasing complexity of modern cybersecurity and cloud operations
    challenges, we empower digital teams to move from reaction to readiness—combining
    agentic AI-powered SIEM and log analytics into a single platform to detect, investigate,
    and resolve modern challenges. Customers around the world rely on Sumo Logic for
    trusted insights to protect against security threats, ensure reliability, and
    gain powerful insights into their digital environments. For more information,
    visit<a href="http://www.sumologic.com/" target="_blank" data-saferedirecturl="https://www.google.com/url?q=http://www.sumologic.com/
