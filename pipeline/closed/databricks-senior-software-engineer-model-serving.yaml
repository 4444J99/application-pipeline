  description: '<p>At Databricks, we are passionate about enabling data teams to solve
    the world''s toughest problems — from making the next mode of transportation a
    reality to accelerating the development of medical breakthroughs. We do this by
    building and running the world''s best data and AI infrastructure platform so
    our customers can use deep data insights to improve their business.&nbsp;</p>
    <p>&nbsp;</p> <p>Databricks’ Model Serving product provides enterprises with a
    unified, scalable, and governed platform to deploy and manage AI/ML models — from
    traditional ML to fine-tuned and proprietary large language models. It offers
    real-time, low-latency inference, governance, monitoring, and lineage. As AI adoption
    accelerates, Model Serving is a core pillar of the Databricks platform, enabling
    customers to operationalize models at scale with strong SLAs and cost efficiency.</p>
    <p>&nbsp;</p> <p>As a Senior Engineer, you’ll play a critical role in shaping
    both the product experience and the foundational infrastructure of Model Serving.
    You will design and build systems that enable high-throughput, low-latency inference
    across CPU and GPU workloads, influence architectural direction, and collaborate
    closely across platform, product, infrastructure, and research teams to deliver
    a world-class serving platform.</p> <p>&nbsp;</p> <p><strong>The impact you will
    have:</strong></p> <ul> <li>Design and implement core systems and APIs that power
    Databricks Model Serving, ensuring scalability, reliability, and operational excellence.</li>
    <li>Drive architectural decisions and trade-offs to optimize performance, throughput,
    autoscaling, and operational efficiency for CPU and GPU serving workloads.</li>
    <li>Contribute directly to key components across the serving infrastructure —
    from model container builds and deployment workflows to runtime systems like routing,
    caching, observability, and intelligent autoscaling — ensuring smooth and efficient
    operations at scale.</li> <li>Collaborate cross-functionally with product, platform,
    and research teams to translate customer needs into reliable and performant systems.</li>
    <li>Lead technical initiatives that improve latency, availability, and cost-effectiveness
    across both customer-facing and foundational serving layers.</li> <li>Establish
    best practices for code quality, testing, and operational readiness, and mentor
    other engineers through design reviews and technical guidance.</li> </ul> <p>&nbsp;</p>
    <p><strong>What we look for:</strong></p> <ul> <li>5+ years of experience building
    and operating large-scale distributed systems.</li> <li>Experience in model serving,
    inference systems, or related infrastructure (e.g., routing, scheduling, autoscaling,
    and observability).</li> <li>Strong foundation in algorithms, data structures,
    and system design as applied to large-scale, low-latency serving systems.</li>
    <li>Proven ability to deliver technically complex, high-impact initiatives that
    create measurable customer or business value.</li> <li>Experience building architecture
    for large-scale, performance-sensitive CPU/GPU inference systems.</li> <li>Strong
    communication skills and ability to collaborate across teams in fast-moving environments.</li>
    <li>Customer-focused mindset with the ability to align implementation details
    with product goals.</li> <li>Passion for mentoring, growing engineers, and fostering
