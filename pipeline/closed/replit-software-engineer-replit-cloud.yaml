  description: 'Replit is the agentic software creation platform that enables anyone
    to build applications using natural language. With millions of users worldwide,
    Replit is democratizing software development by removing traditional barriers
    to application creation. About the role: Help power the development of Replit
    Agent as an engineer in the Replit Cloud organization. The Replit Cloud team builds
    Replit’s first party cloud infrastructure so users can build, scale, and succeed
    entirely on Replit. They manage databases, application storage, app publishing
    and hosting, development/production environment splitting, custom domains, and
    more. By having a set of first party services that integrate seamlessly, you will
    power one of Replit’s key product differentiators. You will: Work closely with
    designers and product managers, to quickly iterate on Replit Cloud to continually
    grow and improve the product. Drive full-stack feature development from conception
    to deployment, taking ownership of key product initiatives. Contribute to architectural
    decisions that shape the future of our product. Ship product and build infrastructure
    as a true full stack builder using: TypeScript, React, CSS, Postgres, Go, and
    Terraform. Examples of what you could do: Leverage our unique cloud infrastructure
    to build differentiated full product experiences, helping non-technical or semi-technical
    users remove roadblocks to success. Leverage AI agents to proactively optimize
    or suggest app improvements on latency, reliability, SEO, and more. Be part of
    engineering leadership, steering teams towards the highest impact work and supporting
    initiatives across the company. Required skills and experience: Bachelor’s degree
    in Computer Science or related field, OR equivalent real-world experience in engineering
    roles. Comfortable building with our tech stack: TypeScript, React, Go Preferred
    Qualifications Experience building user facing platform as a service products.
    Experience with AI/agentic systems. Previous experience at a high-growth startup.
    Bonus Points : Open source project contributions. What we value : Problem-solving
    mindset: Ability to approach complex operational challenges systematically and
    devise effective solutions Self-directed and autonomous: Capable of working independently
    while collaborating effectively with cross-functional teams Strong communication
    skills: Ability to explain complex technical concepts to both technical and non-technical
    audiences Continuous learning: Passion for staying current with industry best
    practices and new technologies Focus on automation: Strong belief in automating
    repetitive tasks and building self-healing systems Full-Time Employee Benefits
    Include: 💰 Competitive Salary & Equity 💹 401(k) Program with a 4% match ⚕️ Health,
    Dental, Vision and Life Insurance 🩼 Short Term and Long Term Disability 🚼 Paid
    Parental, Medical, Caregiver Leave 🚗 Commuter Benefits 📱 Monthly Wellness Stipend
    🧑‍💻 Autonomous Work Environment 🖥 In Office Set-Up Reimbursement 🏝 Flexible Time
    Off (FTO) + Holidays 🚀 Quarterly Team Gatherings ☕ In Office Amenities Want to
    learn more about what we are up to? Meet the Replit Agent Replit: Make an app
    for that Replit Blog Amjad TED Talk Interviewing + Culture at Replit Operating
    Principles Reasons not to work at Replit To achieve our mission of making programming
    more accessible around the world, we need our team to be representative of the
    world. We welcome your unique perspective and experiences in shaping this product.
    We encourage people from all kinds of backgrounds to apply, including and especially
    candidates from underrepresented and non-traditional backgrounds.'
