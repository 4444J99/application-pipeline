    company with a mission to transform U.S. and allied military capabilities with
    advanced technology. By bringing the expertise, technology, and business model
    of the 21st century’s most innovative companies to the defense industry, Anduril
    is changing how military systems are designed, built and sold. Anduril’s family
    of systems is powered by Lattice OS, an AI-powered operating system that turns
    thousands of data streams into a realtime, 3D command and control center. As the
    world enters an era of strategic competition, Anduril is committed to bringing
    cutting-edge autonomy, AI, computer vision, sensor fusion, and networking technology
    to the military in months, not years.</p></div><h3 id="SoftwareEngineer,ComputationalGeometryD3-ABOUTTHETEAM">ABOUT
    THE TEAM&nbsp;</h3> <p>Anduril Maritime delivers platforms, systems, and integrated
    effects in the maritime domain. Our autonomous vehicles (sub-surface and surface)
    are the cornerstone of these capabilities, and we continually strive to push the
    boundaries of the possible in terms of endurance, autonomy and mission capability.
    The Maritime team develops and maintains core products and payloads, and adapts
    and applies those products to serve a wide variety of defense, IC and commercial
    customers in US and international markets.</p> <h3 id="SoftwareEngineer,ComputationalGeometryD3-ABOUTTHEJOB">ABOUT
    THE JOB&nbsp;</h3> <p>On the Maritime Digital Production team, you will design
    and build the high-performance geometric and physics-based computation engines
    that power our digital shipbuilding environment. Your work will enable fast, precise
    simulations of complex structures, materials, and assemblies—turning digital models
    into actionable insights for manufacturing and production.</p> <p>You’ll develop
    core algorithms for collision detection, spatial partitioning, and physics-based
    simulation, leveraging tools such as CUDA, OpenCL, and modern C++ for GPU-accelerated
    performance. You’ll integrate your work with existing geometry, physics, and data
    systems, supporting both real-time visualization and large-scale numerical analysis.</p>
    <p>You’ll collaborate with digital, manufacturing, and corporate technology teams
    across Anduril in a high-tech, fast-paced culture of innovation that values technical
    depth, creativity, and execution. If you’re excited to build advanced computational
    systems that bring geometry and physics to life at production scale, you’ll be
    helping build the future of digital shipbuilding and the next generation of maritime
    vehicles.</p> <h4>WHAT YOU’LL DO&nbsp;</h4> <ul> <li>Algorithm Development: Develop
    and implement algorithms for determining the optimal manufacturing assembly order
    of operations.</li> <li>Collision Detection: Perform collision analysis to ensure
    that assembly operations can be conducted without interference.</li> <li>Ergonomic
    and Tooling Constraints: Factor in human ergonomics and tooling constraints in
    the algorithmic design to ensure all operations are feasible.</li> <li>Optimization:
    Rapidly run feasibility checks and optimize assembly operations based on the current
    conditions of the assembly.Collaborate with</li> <li>Teams: Work closely with
    cross-functional teams to integrate algorithms into the overall MPG system and
    refine based on feedback.</li> <li>Documentation: Maintain comprehensive documentation
    of algorithms and methodologies for future reference and updates.</li> </ul> <h4
    id="SoftwareEngineer,ComputationalGeometryD3-REQUIREDQUALIFICATIONS">REQUIRED
    QUALIFICATIONS&nbsp;</h4> <ul> <li>Advanced proficiency in C++ for high-performance
    computing.</li> <li>Proficiency with python for quick prototyping.</li> <li>Experience
    with physics engines such as PhysX or Bullet.</li> <li>Ability to implement custom
    physics simulations for flexible commodities like wires.</li> <li>Proficiency
    with CUDA and OpenCL for GPU acceleration.</li> <li>Knowledge of efficient collision
    detection algorithms such as AABB, OBB, BVH.</li> <li>Strong foundation in computational
    geometry, linear algebra, and numerical methods.</li> <li>Experience with algorithms
    such as Delaunay triangulation, Voronoi diagrams, and spatial partitioning techniques.</li>
    <li>Comfortable working in an agile, collaborative environment.</li> <li>Ability
    to work independently, self-starter.</li> <li>Eligible to obtain and maintain
    an active U.S. Secret security clearance.</li> </ul> <h4 id="SoftwareEngineer,ComputationalGeometryD3-PREFERREDQUALIFICATIONS">PREFERRED
    QUALIFICATIONS</h4> <ul> <li>Background in industrial or manufacturing environments</li>
    <li>Familiar with collaborative tools such as JIRA</li> <li>Experience with SQL/NoSQL
    databases</li> <li>Familiar with gRPC and other communication protocols</li> <li>Familiar
    with Docker and containerization</li> <li>Enthusiastic about test-driven development</li>
