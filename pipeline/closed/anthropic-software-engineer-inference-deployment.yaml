    \ and deployment consume the same accelerator chips that serve customer traffic\
    \ \u2014 your deploys compete with live user requests for the same hardware. Every\
    \ model brings different fleet sizes, startup times, and correctness requirements,\
    \ so the system must adapt continuously. You'll build systems that navigate these\
    \ constraints \u2014 orchestrating validation, scheduling deployments intelligently,\
    \ and driving down cycle time from merge to production.</p> <p>If you've built\
    \ deployment systems at scale and gravitate toward the hardest problems at the\
    \ intersection of automation and resource management, this team will give you\
    \ an outsized scope to work on them.</p> <h2>Responsibilities</h2> <ul> <li><strong>Own\
