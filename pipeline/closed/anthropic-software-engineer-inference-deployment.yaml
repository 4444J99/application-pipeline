    \ affinity)</li> <li>Experience with progressive delivery in systems with long\
    \ validation cycles: canary/soak testing, blue-green deployments, traffic shifting,\
    \ automated rollback</li> <li>Experience at companies with large-scale release\
    \ engineering challenges (mobile release trains, monorepo deployments, multi-datacenter\
    \ rollouts)</li> <li>Experience with Python and/or Rust in production systems</li>\
