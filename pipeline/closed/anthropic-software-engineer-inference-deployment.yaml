    \ as a whole. Our team is a quickly growing group of committed researchers, engineers,\
    \ policy experts, and business leaders working together to build beneficial AI\
    \ systems.</p></div><h2>About the Role</h2> <p>Our mandate is to make inference\
    \ deployment boring and unattended.</p> <p>Anthropic serves Claude to millions\
    \ of users across GPUs, TPUs, and Trainium \u2014 and every model update must\
    \ reach production safely, quickly, and without disrupting service. We're building\
    \ the systems that make inference deployment continuous and unattended.</p> <p>As\
    \ a Software Engineer on the Launch Engineering team, you'll design and build\
    \ the deployment infrastructure that moves inference code from merge to production.\
