  description: '<p>Asana’s API gives external developers the power and flexibility
    to extend Asana''s functionality in creative ways that Asana doesn''t yet provide.
    In turn, this rich ecosystem of apps, integrations, and scripts helps us ensure
    that Asana can support every customer use case out there – no matter how big or
    small the team, and no matter which tools or workflows they use. The API team
    at Asana builds the Developer Platform that makes this possible; we own the gateway
    that facilitates data flow in and out of Asana.</p> <p>We’re looking for an experienced
    Technical Lead to help us make our Developer Platform come to life, driving execution
    and technical vision for the team. Your scope will range from assisting product
    teams in exposing new functionality via the API, to overseeing foundational changes
    to our API’s core features and security model, to rearchitecting the underlying
    API frameworks for simplicity and ease-of-use, to mentoring and growing the engineers
    and developer advocates on the team. If you care deeply about building effective
    developer experiences and high-performing engineering teams, then we’d love to
    hear from you!</p> <p>This role is based in our San Francisco office with an office-centric
    hybrid schedule. The standard in-office days are Monday, Tuesday, and Thursday.
    Most Asanas have the option to work from home on Wednesdays. Working from home
    on Fridays depends on the type of work you do and the teams with which you partner.
    If you''re interviewing for this role, your recruiter will share more about the
    in-office requirements.</p> <p><strong>What you’ll achieve</strong></p> <ul> <li>Set
    the technical strategy for the API platform within Asana and advocate for engineering-driven
    investments, with a vision for keeping our systems flexible and maintainable to
    meet customer needs now and in the future</li> <li>Drive the team to continually
    and holistically better itself, enabling the engineers around you to deliver at
    a high velocity while helping them grow their skills in the process</li> <li>Be
    a key collaborator with other groups in Engineering and a technical counterpart
    to the API team’s Engineering Manager, serving as a public face for API engineering
    and representing our interests across team boundaries</li> <li>Partner with Product
    Management, Design, Data Science, and User Research to deeply understand developer
    needs, and then propose elegant solutions to meet them</li> <li>Own and shape
    the guidelines for what good API design looks like, partnering with product engineering
    teams to help them implement those best practices in a self-serve manner</li>
    <li>Develop across the entire stack to make developers’ experiences better by
    writing clean, beautiful code and leaving things better than you found them: this
    includes writing Scala, Javascript, and Typescript</li> </ul> <p><strong>About
    you</strong></p> <ul> <li>6+ years of experience working in large codebases</li>
    <li>2+ years leading engineering teams</li> <li>1+ years building public-facing
    API products or Developer Platforms</li> <li>Excellent communication, collaboration,
    and delegation skills</li> <li>Quick learner and comfortable transitioning between
    different contexts and codebases, enabling you to jump in and rapidly unblock
    teammates facing thorny obstacles</li> <li>Deep project management experience
    including high-level timeline planning, risk mitigation, stakeholder management,
    and coordinating the work of others</li> <li>Passionate about mentoring engineers
    at all skill levels; able to identify technical growth opportunities and deliver
    thoughtful, candid feedback</li> <li>Excited to be a part of an inclusive culture
    where everyone brings the aspects of themselves to the workplace that they need
    to thrive, fostering an environment of psychological safety within your team</li>
    <li>Demonstrate curiosity about AI tools and emerging technologies, with a willingness
    to learn and leverage them to enhance productivity, collaboration, or decision-making</li>
    </ul> <p>At Asana, we''re committed to building teams that include a variety of
    backgrounds, perspectives, and skills, as this is critical to helping us achieve
    our mission. If you''re interested in this role and don''t meet every listed requirement,
    we still encourage you to apply.</p> <p><strong>What we’ll offer</strong></p>
    <p>Our comprehensive compensation package plays a big part in how we recognize
    you for the impact you have on our path to achieving our mission. We believe that
    compensation should be reflective of the value you create relative to the market
    value of your role. To ensure pay is fair and not impacted by biases, we''re committed
    to looking at market value which is why we check ourselves and conduct a yearly
    pay equity audit.</p> <p>For this role, the estimated base salary range is between
    $248,000 - $282,000. The actual base salary will vary based on various factors,
    including market and individual qualifications objectively assessed during the
    interview pr'
