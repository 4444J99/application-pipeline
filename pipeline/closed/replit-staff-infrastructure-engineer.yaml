  description: 'Replit is the agentic software creation platform that enables anyone
    to build applications using natural language. With millions of users worldwide,
    Replit is democratizing software development by removing traditional barriers
    to application creation. About the Role: Join our Infrastructure Engineering team
    and help ensure the reliability, scalability, and performance of Replit''s infrastructure
    that serves millions of developers worldwide. As a Staff Infrastructure Engineer,
    you will bridge the gap between development and operations, implementing automation
    and establishing best practices that enable our platform to scale efficiently
    while maintaining high availability. We are seeking Staff Infrastructure Engineers
    who are passionate about building and maintaining resilient systems at scale.
    Your mission will be to proactively find and analyze reliability problems across
    our stack, then design and implement software and systems to create step-function
    improvements. You will design robust monitoring solutions, automate operational
    tasks, and continuously improve our infrastructure''s reliability, all while mentoring
    and educating the broader engineering team to make reliability a core value at
    Replit. You Will: Drive Automation and Infrastructure as Code: Architect, build,
    and improve automation to eliminate toil and operational work. Design and maintain
    CI/CD pipelines and infrastructure automation using tools like Terraform or Pulumi.
    Create self-healing systems that can automatically respond to common failure scenarios.
    Optimize Performance and Infrastructure: Collaborate with core infrastructure
    and product teams to performance tune and optimize our cloud deployments (Kubernetes,
    Docker, GCP). Identify and resolve performance bottlenecks, implement capacity
    planning strategies, and reduce latency across global regions. Elevate Developer
    Experience: Design and implement improvements to our build, test, and deployment
    systems to make software delivery faster, safer, and more reliable for all engineers.
    Drive Cross-Company Improvements: Partner directly with service owners across
    Replit to understand their pain points, and collaborate on implementing build/test/deploy
    enhancements within their specific services. Build Shared Tooling: Create and
    maintain centralized tooling and automation that improves the entire engineering
    lifecycle, from local development to production monitoring. Debug and Harden Systems:
    Dive deep into debugging extremely difficult technical problems, making our systems
    and products more robust, operable, and easier to diagnose. Provide Staff-Level
    Guidance: Review feature and system designs, acting as an owner for the security,
    scale, and operational integrity of those designs. Educate and Mentor: Educate,
    mentor, and hold accountable the engineering team to improve the reliability of
    our systems, making reliability a core value of the Replit engineering culture.
    Build and Integrate: Write high-quality, well-tested code to meet the needs of
    your customers, including building pipelines to integrate with 3rd party vendors.
    Required Skills and Experience: 8-10 years of experience in Infrastructure Engineering
    or similar roles (DevOps, Systems Engineering, Site Reliability Engineering).
    Strong programming skills in languages like Python or Go. You write high-quality,
    well-tested code. Deep understanding of distributed systems. You’ve designed,
    built, scaled, and maintained production services and know how to compose a service-oriented
    architecture. Experience with container orchestration platforms (Kubernetes) and
    cloud-native technologies. Proven track record of implementing and maintaining
    monitoring/observability solutions, with strong skills in debugging and performance
    tuning. Strong incident management skills with experience leading incident response
    and demonstrated critical thinking under pressure. Experience with infrastructure
    as code (e.g., Terraform) and configuration management tools. Excellent written
    and verbal communication skills, with an ability to explain technical concepts
    clearly and simply and a bias toward open, transparent cultural practices. Strong
    interpersonal skills, with experience working with engineers from junior to principal
    levels. A willingness to dive into understanding, debugging, and improving any
    layer of the stack. You''re passionate about making software creation accessible
    and empowering the next generation of builders. Bonus Points: Deep experience
    with Google Cloud Platform (GCP) services and tools. Knowledge of modern observability
    platforms (Prometheus, Grafana, Datadog, etc.). Experience designing and building
    reliable systems capable of handling high throughput and low latency. Experience
    with Go and Terraform. Familiarity with working in rapid-growth environments.
    Experience writing company-facing blog posts and training materials. This is a
    full-time role that can be held from our Foster City, CA office. The role has
    an in-office requirement '
