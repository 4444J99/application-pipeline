  description: 'Supabase is the Postgres development platform, built by developers
    for developers. We provide a complete backend solution including Database, Auth,
    Storage, Edge Functions, Realtime, and Vector Search. All services are deeply
    integrated and designed for growth. We are seeking a platform engineer to join
    our Compute & Scaling squad. This team owns the critical systems that power project
    provisioning, scaling, and the compute that our users rely on every day. You’ll
    work on the core platform that ensures Supabase can seamlessly scale across multiple
    regions, handle high-volume workloads, and provide low-latency, highly available
    compute services. You''ll design, build, and operate systems that are both robust
    and highly automated — enabling us to provision new projects reliably at scale,
    optimize resource utilization, and deliver a seamless experience to the 5M databases
    which we manage. What You’ll Be Responsible for: Help build and maintain the Supabase
    Cloud offering; Design and implement systems to provision, scale, and manage the
    multi-region compute workloads powering Supabase projects in Kubernetes Maintain
    our Go-based Kubernetes operator that orchestrates distributed Postgres deployments
    Design and implement robust deployment patterns for EKS and other Kubernetes platforms
    Work with CSI drivers, persistent volumes, and cross-cloud networking to ensure
    data reliability and connectivity Own the full lifecycle of compute orchestration:
    project creation, warm pools, autoscaling, smart region selection, resizing, and
    resource optimization; Improve automation and observability across the compute
    stack to ensure high availability and performance; Improve our system architecture
    to reduce costs while balancing security, reliability, and performance; Collaborate
    cross-functionally with other teams to help leverage compute as a core platform
    offering; Participate in on-call rotations, incident response, and post-incident
    reviews; Resolve escalated support issues, while also identifying and resolving
    systemic issues across the platform. You might be a fit if you have: Strong software
    engineering skills - Go and Typescript proficiency required, with experience building
    production-grade Kubernetes operators or controllers Cloud Infrastructure knowledge
    - familiarity with AWS constructs is required, past experience using the AWS SDKs
    and IaC tools (Pulumi, Terraform, etc) to build and operate infrastructure is
    strongly preferred. Deep Kubernetes expertise - Hands-on experience with Kubernetes
    internals, custom resources, and cloud-managed Kubernetes services (EKS, GKE,
    AKS) Production operations mindset - track record of building reliable, observable,
    and maintainable systems Ownership mindset - you thrive in being able to operate
    independently with high-level guidance What We Offer Fully Remote We hire globally.
    We believe you can do your best work from anywhere. There are no Supabase offices,
    but we provide a WeWork membership or co-working allowance you can use anywhere
    in the world. ESOP Every team member receives ESOP (equity ownership) in the company.
    We want everyone to share in the upside of what we’re building together. Tech
    Allowance Use this budget to set up your ideal work environment—laptop, monitor,
    headphones, or whatever helps you do your best work. Health Benefits Supabase
    covers 100% of health insurance for employees and 80% for dependents, wherever
    you are. Your wellbeing and your family’s health are important to us. Annual Off-Sites
    Once a year, the entire company gathers in a new city for a week of connection,
    collaboration, and fun. It’s a highlight of our year. Flexible Work We operate
    asynchronously and trust you to manage your own time. You know what needs to be
    done and when. Professional Development Every team member receives an annual education
    allowance to spend on learning—courses, books, conferences, or anything that supports
    your growth. About the Team Supabase was born-remote and open-source-first. We
    believe our globally distributed team is our secret weapon in building tools developers
    love. 280+ team members 55+ countries 20+ languages spoken $500M raised 500,000+
    community members We move fast, build in public, and use what we ship. If it’s
    in your project, we probably use it in ours too. We believe deeply in the open-source
    ecosystem and strive to support—not replace—existing tools and communities. Hiring
    Process We keep things simple, async-friendly, and respectful of your time: Apply
    – Our team will review your application. Intro Call – A short video chat to get
    to know each other. Interviews – Up to four calls with: Team Leads Future teammates
    Someone cross-functional from product, growth, or engineering (depending on the
    role) Someone from our leadership/founding team Decision – We may follow up with
    a final question or go straight to offer. All communication is remote and we aim
    to move fast.'
