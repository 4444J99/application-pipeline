  description: "About Ramp Ramp is building the smart infrastructure for finance teams,\
    \ embedded in the transaction flow of every dollar a business spends. We automate\
    \ how over $100B in annualized spend flows in and out of 50,000+ companies: authorizing\
    \ payments, flagging risk, categorizing spend, and closing books. The problems\
    \ are high-stakes, data-dense, and unforgiving. We hire people with high agency\
    \ and high urgency. We look for slope over intercept. We care less about where\
    \ you trained and more about what you\u2019ve built. At Ramp, everyone is a builder\
    \ who owns problems end to end and makes consequential decisions that shape the\
    \ outcome. The median Ramp customer saves 5% and grows revenue 16% in their first\
    \ year \u2013 far in excess of businesses operating without Ramp. We believe every\
    \ ambitious company deserves the same. If you want to build systems that directly\
    \ shape how companies move and manage billions, Ramp is the place to do it. About\
    \ the Role We\u2019re building the mission critical financial infrastructure that\
    \ powers Ramp - a system of record that connects our products, data, and reporting\
    \ into a single, trusted view of how the company performs. This is foundational\
    \ systems work that ensures financial accuracy and visibility across the business\
    \ globally, from tracking spend and revenue to forecasting, reconciliation, and\
    \ reporting. You\u2019ll design and build durable, auditable infrastructure that\
    \ blends data modeling, orchestration, and finance domain logic at scale. This\
    \ work sits at the heart of Ramp\u2019s mission and will form the backbone as\
    \ we expand our product suite and grow internationally. What You\u2019ll Do Design\
    \ and build large-scale financial systems that handle high volumes of transactional\
    \ data with correctness and precision Create robust and extensible data models\
    \ and orchestration logic for ledgering, reconciliation, and financial reporting\
    \ systems Partner directly with our CFO and finance leadership to translate business\
    \ requirements into technical specifications Build systems that maintain auditability,\
    \ data integrity, and regulatory compliance across our expanding product ecosystem\
    \ Work on complex problems involving distributed systems, event-driven architectures,\
    \ and financial data at scale Collaborate with engineers who care deeply about\
    \ correctness, reliability, and elegant system design What You Need 3-5 years\
    \ of backend engineering experience with expertise in building data-intensive\
    \ systems Strong Python experience (ideally as your primary language) Deep SQL\
    \ knowledge and experience working with complex data models Proven system design\
    \ skills - you can take high-level requirements and architect scalable, maintainable\
    \ solutions Experience thriving in startup-like environments with high ambiguity\
    \ and requiring independent problem-solving Comfortable working flexibly across\
    \ the stack - equally at home prototyping analyses in a Jupyter notebook and implementing\
    \ production backend endpoints Track record of building reliable, well-tested\
    \ systems where correctness matters Nice to Have Experience with financial data\
    \ (banking, payments, card transactions, trading/exchange data) Familiarity with\
    \ accounting concepts and ledgering systems Experience with distributed systems\
    \ technologies (e.g., Kafka) Background in fintech products (billing, cards, payments,\
    \ reconciliation) Experience working closely with internal stakeholders and translating\
    \ business needs into technical solutions Experience with workflow orchestration\
    \ tools like Temporal or Airflow Benefits (for U.S.-based full-time employees)\
    \ 100% medical, dental & vision insurance coverage for you Partially covered for\
    \ your dependents One Medical annual membership 401k (including employer match\
    \ on contributions made while employed by Ramp) Flexible PTO Fertility HRA (up\
    \ to $10,000 per year) Parental Leave Unlimited AI token usage Pet insurance Centralized\
    \ home-office equipment ordering for all employees Health and Wellness stipend\
    \ In-office perks: lunch, snacks, drinks, and more Budget for intra-office travel\
    \ Relocation support to NYC or SF (as needed) Referral Instructions If you are\
    \ being referred for the role, please contact that person to apply on your behalf.\
    \ Other notices Pursuant to the San Francisco Fair Chance Ordinance, we will consider\
    \ for employment qualified applicants with arrest and conviction records. Beware\
    \ of recruiting scams: Ramp will only contact you through official @ Ramp.com\
    \ email addresses and will never ask for payment or sensitive personal information\
    \ during the hiring process. Ramp Applicant Privacy Notice"
