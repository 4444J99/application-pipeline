  description: '<div class="content-intro"><p>Discord is used by over 200 million
    people every month for many different reasons, but there’s one thing that nearly
    everyone does on our platform:<strong> play video games.</strong> Over 90% of
    our users play games, spending a combined 1.5 billion hours playing thousands
    of unique titles on Discord each month. Discord plays a uniquely important role
    in the future of gaming. We are focused on making it easier and more fun for people
    to talk and hang out before, during, and after playing games.</p></div><p>As a&nbsp;<strong>Senior
    Engineer</strong> on the Safety Experience team, you''ll lead the charge in making
    Discord''s platform safer for hundreds of millions of users. You''ll design, build,
    and maintain product features and systems that prevent harmful activities while
    ensuring regulatory compliance. Keeping users safe is essential for Discord''s
    growth, making your team''s work critical. This role reports to the <strong>Engineering
    Manager of Safety Experience</strong>.</p> <h3>What you''ll be doing:</h3> <ul>
    <li>Lead development of highly‑visible, user‑facing products that protect Discord''s
    users.</li> <li>Design, build, and deploy robust production APIs, backend services,
    and data pipelines to launch safety features at scale.</li> <li>Collaborate cross‑functionally
    with Product, Design, Policy, Data Science, ML, Legal, and T&amp;S Operations
    to create solutions that are both impactful and lovable.</li> <li>Iterate on in-house
    tooling to supercharge our T&amp;S workflows.</li> <li>Respond rapidly to the
    ever‑evolving abuse and compliance landscape.</li> </ul> <h3>What you should have:</h3>
    <ul> <li>5+ years experience writing Python and utilizing back-end API frameworks
    (Flask, Django).</li> <li>5+ years experience developing front-end interfaces
    with JavaScript (React, TypeScript) for both web and mobile platforms.</li> <li>Familiarity
    with databases such as Cassandra, Postgres, and ScyllaDB.</li> <li>Demonstrated
    success leading end‑to‑end delivery of complex projects: breaking down ambiguity,
    coordinating rollouts, and aligning stakeholders.</li> <li>Demonstrated ability
    to troubleshoot, debug, and test complex systems in a live, production environment.</li>
    <li>Exceptional communication and collaboration skills, with the ability to work
    well with cross-functional partners, designers, and other engineers.</li> <li>Experience
    using metrics and dashboards to make data-driven decisions and develop insightful
    reports.</li> </ul> <h3>Bonus Points</h3> <ul> <li>Experience in the Safety or
    Anti‑Abuse domain.</li> <li>Experience analyzing and visualizing data using Datadog
    or Mode.</li> <li>Familiarity with real‑time streaming systems like Kafka or Pub-Sub.</li>
    <li>Ability to contribute to offline analytics jobs and processes.</li> <li>Experience
    building and operating mobile‑client features on iOS and Android.</li> <li>Exposure
    to lower‑level languages such as Go, Rust, and Elixir.</li> <li>A strong moral
    compass that drives you to protect users and do the right thing.</li> </ul> <p><em>Candidates
    must reside in or be willing to relocate to the San Francisco Bay Area (Alameda,
    Contra Costa, Marin, Napa, San Francisco, San Mateo, Santa Clara, Solano, and
    Sonoma counties). Relocation assistance may be available. </em></p> <p><em>The
    US base salary range for this full-time position is $196,000 to $220,500 + equity
    + benefits. Our salary ranges are determined by role and level. Within the range,
    individual pay is determined by additional factors, including job-related skills,
    experience, and relevant education or training. Please note that the compensation
    details listed in US role postings reflect the base salary only, and do not include
    equity, or benefits.</em></p><div class="content-conclusion"><p><strong>Why Discord?&nbsp;</strong><br><br>Discord
    plays a uniquely important role in the future of gaming. We''re a multiplatform,
    multigenerational and multiplayer platform that helps people deepen their friendships
    around games and shared interests. We believe games give us a way to have fun
    with our favorite people, whether listening to music together or grinding in competitive
    matches for diamond rank. <strong>Join us in our mission! Your future is just
    a click away!</strong></p> <p><strong>Discord is committed to inclusion and providing
    reasonable accommodations during the interview process. </strong>We want you to
    feel set up for success, so if you are in need of reasonable accommodations, please
    let your recruiter know.</p> <p><em><strong>Please see our Applicant and Candidate
    Privacy Policy for details regarding Discord’s collection and usage of personal
    information relating to the application and recruitment process by clicking&nbsp;<a
    href="https://discord.com/terms/applicant-candidate-privacy-policy">HERE.</a></strong></em></p></div>'
