  description: <div class="content-intro"><p><strong>Why join us</strong></p> <p>Brex
    is the intelligent finance platform that enables companies to spend smarter and
    move faster in more than 200 markets. By combining global corporate cards and
    banking with intuitive spend management, bill pay, and travel software, Brex enables
    founders and finance teams to accelerate operations, gain real-time visibility,
    and control spend effortlessly. Brex’s AI-native automation and world-class service
    eliminate manual expense and accounting tasks for customers so they can focus
    on what matters most. Tens of thousands of the world's best companies run on Brex,
    including DoorDash, Coinbase, Robinhood, Zoom, Plaid, Reddit, and SeatGeek.</p>
    <p>Working at Brex allows you to push your limits, challenge the status quo, and
    collaborate with some of the brightest minds in the industry. We’re committed
    to building a diverse team and inclusive culture and believe your potential should
    only be limited by how big you can dream. We make this a reality by empowering
    you with the tools, resources, and support you need to grow your career.</p></div><p><strong>Sales
    at Brex</strong><strong><br></strong>The Sales team is the driving factor behind
    revenue for Brex and every member of our team directly affects our bottom line.
    We focus on generating new opportunities, acquiring new customers, and building
    even stronger relationships with our current customers. Our winning culture recognizes
    big team wins and celebrates individual accomplishments. We ensure that top performers
    are recognized and have built a competitive environment to motivate and unify
    the team.</p> <p><strong>What you’ll do</strong></p> <p>As a Mid-Market Client
    Sales Executive II, you will play an essential role in driving revenue growth
    by engaging existing Brex customers and cultivating new business opportunities.
    In this role, you will combine your sales and relationship building skills with
    a strategic mindset to identify opportunities and execute strategies that recapture
    and increase card spend. You will have the opportunity to collaborate with cross-functional
    teams and learn from experienced professionals across various domains to broaden
    your skill set and knowledge base.</p> <p><strong>Where You’ll Work</strong></p>
    <p>This role will be based in our San Francisco office. We are a hybrid environment
    that combines the energy and connections of being in the office with the benefits
    and flexibility of working from home. We currently require a minimum of three
    coordinated days in the office per week, Monday, Wednesday and Thursday. As a
    perk, we also have up to four weeks per year of fully remote work!</p> <p><strong>Responsibilities</strong></p>
    <ul> <li>Spearhead initiatives to propel net-new revenue growth by strategically
    increasing spending levels on the Brex Card among our current client base</li>
    <li>Proactively identify and cultivate expansion opportunities through targeted
    outreach efforts</li> <li>Champion the cross-selling of our cutting-edge Spend
    Management software, encompassing Expense Management, Billpay, and Travel solutions,
    to diversify and enhance our clients financial operations</li> <li>Engage with
    CFOs and finance leaders regularly, serving as a trusted advisor to provide expert
    consultation on optimizing financial operations through the seamless integration
    of our innovative solutions</li> <li>Formulate and execute strategic plans geared
    towards enhancing the overall client experience, encompassing improvements in
    product features and implementation processes</li> </ul> <p><strong>Requirements</strong></p>
    <ul> <li>3+ years of hands-on experience in Sales roles within B2B SaaS <strong><em>OR</em></strong>
    Payments companies&nbsp;</li> <li>2+ years of closing experience, preferably in
    a net-new logo acquisition environment</li> <li>1+ years of outbound prospecting
    experience&nbsp;</li> <li>Strong communication and negotiation skills</li> <li>Data-driven
    mindset and the ability to analyze customer behavior</li> <li>Goal-oriented and
    self-motivated with a proven track record of meeting and exceeding targets</li>
    <li>Ability to work in fast-paced, high-velocity environments</li> <li>Coachability
    with an interest in growing your career in sales</li> </ul> <p><strong>Bonus points</strong></p>
    <ul> <li>Familiarity with financial products, credit cards, and business finance</li>
    <li>Familiarity with credit card management, encompassing a deep understanding
    of limits, rewards, and underwriting</li> <li>Familiarity with software solutions,
    especially in areas such as Expense Management, Travel, and Billpay</li> <li>Previous
    experience in implementing successful upselling and cross-selling strategies</li>
    <li>Keen awareness of the competitive landscape, industry trends, and market dynamics</li>
    <li>A background in handling renewals, ensuring customer retention, and minimizing
    churn</li> <li>Familiarity with sales tools such as Gong, Salesforce, Outreach,
    etc.&nbsp;</li
