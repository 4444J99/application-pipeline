    Engineering, and Cloud Infrastructure Build for enterprise scale, performance,
    and security to serve large organizations and their data workloads, handling high-throughput
    and low-latency requirements Contribute to the technical architecture and product
    vision for data application development in the cloud Ensure seamless integration
