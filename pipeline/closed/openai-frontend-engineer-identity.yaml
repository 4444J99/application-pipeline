  description: 'About the Team The Applied team at OpenAI brings cutting-edge AI technology
    into the hands of millions of people and businesses worldwide. We build and operate
    products such as ChatGPT, Sora, and the OpenAI API, delivering state-of-the-art
    multimodal capabilities across text, image, audio, and video. Our work spans product
    engineering, large-scale inference, and platform infrastructure — all designed
    to safely and reliably support global usage. Identity is the essential foundation
    of trust across all OpenAI user experiences, protecting, remembering, and securely
    sharing personal and professional context across apps, agents, and workflows.
    A robust identity system is critical for safe, personal, and scalable AI. The
    Identity team builds this trusted account and access layer connecting people,
    enterprises, developers, and agents to the OpenAI ecosystem, designing experiences
    that balance security, control, and usability for confidently managing identity,
    permissions, and trust. About the Role As a Frontend Engineer on OpenAI’s Identity
    team, you’ll build the user-facing experiences that make secure access to OpenAI
    simple, clear, and trustworthy for organizations. You’ll design and implement
    core identity flows — such as sign-in, account management, permissions, and admin
    experiences — that enable enterprises to adopt OpenAI’s products with confidence.
    You’ll work closely with design, product, security, and backend teams to translate
    complex identity systems like SSO, RBAC, and identity federation into intuitive,
    reliable interfaces. Your work will directly shape how users and administrators
    understand and manage access across OpenAI’s products, helping unlock secure,
    large-scale enterprise adoption of AI. This role is based in San Francisco, California.
    There may be relocation options available. In this role, you will: Build scalable,
    reusable frontend components and patterns for core identity experiences, including
    sign-in flows, account management, permissions, and admin surfaces. Partner closely
    with backend and security engineers to deliver end-to-end identity capabilities
    such as SSO, RBAC, SCIM provisioning, and delegated access through clear, intuitive
    interfaces. Translate complex authentication and authorization systems (e.g.,
    SAML, OIDC, OAuth) into user experiences that are understandable, reliable, and
    trustworthy for both admins and end users. Help define frontend architecture,
    standards, and patterns for a shared identity platform used across OpenAI’s products.
    Build internal tools and surfaces that enable teams across OpenAI to integrate,
    manage, and reason about identity and access control effectively. Collaborate
    with Product, Design, Security, and Go-To-Market partners to turn ambiguous enterprise
    requirements into high-quality, user-centered interfaces. You might thrive here
    if you: Have at least 5+ years of frontend engineering experience building and
    maintaining production-grade web applications, with a focus on usability, scalability,
    and long-term maintainability. Bring deep frontend expertise and genuine enthusiasm
    for frontend frameworks, performance optimization, latency, and building reusable,
    composable UI systems. Are excited to take ownership of critical access flows,
    helping scale and improve sign-in, permissions, and account experiences across
    OpenAI’s products. Enjoy working closely with cross-functional partners — including
    product, design, security, and go-to-market teams — to shape thoughtful, user-centered
    solutions. Have experience evolving or re-architecting production systems to support
    new capabilities and increased scale. Care deeply about user experience and take
    pride in crafting interfaces that make complex identity and access systems feel
    simple and trustworthy. Thrive in fast-moving environments where requirements
    may be ambiguous and priorities evolve, and can still execute quickly without
    sacrificing quality. About OpenAI OpenAI is an AI research and deployment company
    dedicated to ensuring that general-purpose artificial intelligence benefits all
    of humanity. We push the boundaries of the capabilities of AI systems and seek
    to safely deploy them to the world through our products. AI is an extremely powerful
    tool that must be created with safety and human needs at its core, and to achieve
    our mission, we must encompass and value the many different perspectives, voices,
    and experiences that form the full spectrum of humanity. We are an equal opportunity
    employer, and we do not discriminate on the basis of race, religion, color, national
    origin, sex, sexual orientation, age, veteran status, disability, genetic information,
    or other applicable legally protected characteristic. For additional information,
    please see OpenAI’s Affirmative Action and Equal Employment Opportunity Policy
    Statement . Background checks for applicants will be administered in accordance
    with applicable law, and qualified applicants with arrest or conviction records
