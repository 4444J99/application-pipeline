    of the 21st century’s most innovative companies to the defense industry, Anduril
    is changing how military systems are designed, built and sold. Anduril’s family
    of systems is powered by Lattice OS, an AI-powered operating system that turns
    thousands of data streams into a realtime, 3D command and control center. As the
    world enters an era of strategic competition, Anduril is committed to bringing
    cutting-edge autonomy, AI, computer vision, sensor fusion, and networking technology
    to the military in months, not years.</p></div><h3>ABOUT THE TEAM</h3> <p>Anduril's
    Space team is dedicated to expanding our AI-powered capabilities into the final
    frontier, enhancing Space Domain Awareness, Space Control, and Command and Control
    for U.S. military and allied partners. We're developing fully integrated hardware
    and software systems, including Lattice for Space Missions and modular payloads,
    to address growing threats in space and ensure our Guardians maintain a decisive
    advantage in this contested warfighting domain.</p> <h3>ABOUT THE JOB</h3> <p>As
    a Software Engineer on Space Ground Software, you will own the architecture and
    deployment of software solutions that support customer missions for space operations
    and mission management. As a Senior Software Engineer, you will develop modular
    capabilities to support the DoD and IC customers across the space domain. This
    will involve the architecture of the Space C2 system based on top of the Anduril
    Lattice software platform, to include infrastructure, algorithms, and integrations
    to support both orbital and ground systems. The Anduril Space C2 capability development
    will involve integration with legacy systems that have been part of our nation’s
    critical defense for decades as well as new space systems being added to the cache
    of orbital and ground-based capabilities.<br><br><em>We work with mission partners
    and operators to deploy reliable and robust capabilities on operationally-relevant
    fielding timelines to meet&nbsp;</em><em>complex challenges across the DOD and
    IC.</em></p> <p><strong>WHAT YOU'LL DO</strong></p> <ul> <li>Own the software
    solutions that are deployed to customers</li> <li>Own the development of Space
    C2 and Mission Management capabilities to enable delivery of end-to-end mission
