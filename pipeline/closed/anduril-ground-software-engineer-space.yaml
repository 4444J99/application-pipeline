    skills including documentation and training material</li> <li>3+ years working
    with a variety of programming languages such as Java, Python, C++, Rust, Go, JavaScript,
    etc.</li> <li>Experience with Space C2 software systems and spacecraft operations</li>
    <li>A desire to work on critical software that has a real-world impact</li> <li>Eligible
