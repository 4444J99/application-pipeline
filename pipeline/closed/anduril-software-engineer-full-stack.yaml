  description: <div class="content-intro"><p>Anduril Industries is a defense technology
    company with a mission to transform U.S. and allied military capabilities with
    advanced technology. By bringing the expertise, technology, and business model
    of the 21st century’s most innovative companies to the defense industry, Anduril
    is changing how military systems are designed, built and sold. Anduril’s family
    of systems is powered by Lattice OS, an AI-powered operating system that turns
    thousands of data streams into a realtime, 3D command and control center. As the
    world enters an era of strategic competition, Anduril is committed to bringing
    cutting-edge autonomy, AI, computer vision, sensor fusion, and networking technology
    to the military in months, not years.</p></div><h3>ABOUT THE JOB</h3> <p>The Maneuver
    Dominance team at Anduril develops operationally relevant, multi-asset autonomy.
    We are focused on building the next generation of autonomous capabilities by leveraging
    existing Anduril platforms like Ghost or Altius, bringing 3rd party platforms
    into Anduril's Lattice ecosystem, and developing breakthrough systems that will
    shape the future of the battlefield. We build Software services and Autonomy algorithms
    that solve some of the hardest problems facing our customers.<br><br>As a Full-Stack
    Engineer on the Maneuver Dominance team, you will architect and deliver systems
    for fleets of heterogeneous autonomous systems in complex operational environments.
    This role requires technical versatility across the stack, from backend services
    and infrastructure to frontend interfaces. Above all, Engineers within Maneuver
    Dominance are driven by a “Whatever It Takes” mindset—executing in an expedient,
    scalable, and pragmatic way while keeping the mission top-of-mind and making sound
    engineering decisions to deliver successful outcomes correctly, on-time, and with
    high quality. <br><br></p> <h3>WHAT YOU'LL DO</h3> <ul> <li>Build robust, high-performance
    backend services that coordinate fleets of autonomous systems with downstream
    components in C++ and Rust handling scenario execution, physics modeling, and
    autonomy</li> <li>Design and implement APIs, and data pipelines that power systems
    for the full mission lifecycle from design and planning to live operation and
    post-analysis debrief</li> <li>Shape the operator experience by contributing frontend
    components that visualize real-time sensor data and mission state, building interactive
    map overlays, telemetry dashboards, and mission planning interfaces</li> <li>Deploy
    and maintain services on Kubernetes infrastructure, ensuring reliability and performance</li>
    <li>Own the integration between applications, working with gRPC/protobuf and other
    platform primitives to create seamless workflows</li> <li>Collaborate closely
    with robotics engineers, autonomy specialists, and operators to translate sophisticated
    technical capabilities into reliable, performant features</li> <li>Identify bottlenecks
    and optimize specific features across the stack, from database queries and service
    latency to rendering performance</li> </ul> <h3>REQUIRED QUALIFICATIONS</h3> <ul>
    <li>Bachelor's degree in Computer Science or related field; or equivalent industry
    experience</li> <li>2+ years of professional industry experience working with
    both compiled and scripting languages (Go, C++, Rust, Typescript, Python, etc)</li>
    <li>Experience building and deploying distributed systems with containerization
    and orchestration platforms (K8s)</li> <li>Understanding of databases, data modeling,
    and system architecture</li> <li>Familiarity with gRPC/protobuf or similar RPC
    technologies</li> <li>Ability to work across the stack, from infrastructure and
    backend services to frontend applications</li> <li>A bias for action, extreme
    ownership, and the drive to see projects through from concept to production</li>
    <li>Eligible to obtain and maintain an active UKSV Security Clearance</li> </ul>
    <h3>PREFERRED QUALIFICATIONS</h3> <ul> <li>Experience with CI/CD pipelines, infrastructure-as-code
    and declarative build systems (Bazel, Nix)</li> <li>Experience with VR/AR development
    (Unity, Unreal) or simulation environments</li> <li>Experience in defense, aerospace,
    robotics, or other real-time C2 systems</li> </ul><div class="content-conclusion"><p><span
    data-contrast="auto">The salary range for this role is an estimate based on a
    wide range of compensation factors, inclusive of base salary only. Actual salary
    offer may vary based on (but not limited to) work experience, education and/or
    training, critical skills, and/or business considerations. Highly competitive
    equity grants are included in the majority of full time offers; and are considered
    part of Anduril's total compensation package. Additionally, Anduril offers top-tier
    benefits for full-time employees, including:</span><span data-ccp-props="{&quot;134233117&quot;:false,&quot;134233118&quot;:false,&quot;335551550&quot;:0,&quot;335551620&quot;:0,&quot;335559738&quot;:240,&quot;
