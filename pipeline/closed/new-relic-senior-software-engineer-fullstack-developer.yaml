    solutions</li> <li>Act as a subject matter expert, guiding and mentoring a team
    of talented software engineers to achieve technical excellence and deliver high-quality
    code</li> <li>Collaborate with cross-functional teams to design and implement
    robust, scalable, and efficient systems that meet the demands of our growing customer
    base</li> <li>Stay ahead of industry trends and emerging technologies, constantly
    researching and experimenting with innovative solutions to enhance our observability
    platform</li> <li>Work closely with product managers, designers, and stakeholders
    to translate business requirements into technical solutions, advocating for best
    practices and promoting a collaborative work environment</li> <li>Be proactive
    in identifying and addressing performance bottlenecks, applying optimizations,
    and maintaining the stability and availability of our platform</li> <li>Encourage
    a culture of continuous learning, improvement, and innovation within the engineering
    team, sharing knowledge and promoting professional growth</li> </ul> <p style="line-height:
    1.2;">&nbsp;</p> <p><strong>This role requires</strong><strong><br></strong></p>
    <ul> <li>Bachelor’s degree, software development, engineering, or a related technical
    field</li> <li>5+ years of experience working as a software engineer working in
    Java and/or Go with a strong computer science background and an aptitude for learning
    new languages quickly</li> <li>Experience with front-end technologies (e.g., HTML,
    CSS, JavaScript, React)</li> <li>Demonstrated experience in designing, developing,
