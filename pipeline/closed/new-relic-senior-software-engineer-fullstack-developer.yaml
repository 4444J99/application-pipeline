    <li>Contribution to open source projects</li> <li>Experience working with or building
    GraphQL schemas</li> <li>Experience building and maintaining high throughput pipelines
    and distributed systems</li> <li>Experience working on an Observability product,
    especially in the SaaS vendor space</li> </ul><div class="content-conclusion"><p>Fostering
    a diverse, welcoming and inclusive environment is important to us. We work hard
