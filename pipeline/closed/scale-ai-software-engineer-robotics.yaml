    high autonomy</li> </ul> <p><strong>Nice to Haves:</strong></p> <ul> <li>Experience
    with C++</li> <li>Experience with robotics hardware platforms (robotic arms, mobile
    robots, perception systems) with a focus on time synchronization</li> <li>Background
