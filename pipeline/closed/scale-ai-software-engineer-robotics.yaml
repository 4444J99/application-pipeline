    comprehensive monitoring and evaluation frameworks for robotics models and data
    quality</li> <li>Solving complex, late-stage industry challenges in concurrent
    and real-time robotic systems, with strict attention to timing constraints and
    data integrity. This often involves deep investigation, reviewing academic papers,
    and direct collaboration with robotics vendors</li> <li>Collaborate with ML engineers
    and researchers to bring robotics research into production</li> <li>Deliver features
    at high velocity while maintaining system reliability and performance</li> </ul>
    <p><strong>Ideally, You Have:</strong></p> <ul> <li>3+ years of high-proficiency
