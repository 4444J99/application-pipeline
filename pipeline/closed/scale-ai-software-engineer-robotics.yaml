    have the opportunity to own critical parts of our robotics platform, work directly
    with cutting-edge robotics and AV customers, and shape the future of embodied
    AI systems.</p> <p><strong>You Will:</strong></p> <ul> <li>Own and architect large-scale
    data processing pipelines for robotics and autonomous vehicle datasets</li> <li>Build
    ML training and fine-tuning pipelines using Scale''s robotics data</li> <li>Work
