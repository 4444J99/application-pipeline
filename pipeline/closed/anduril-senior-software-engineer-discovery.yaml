  description: <div class="content-intro"><p>Anduril Industries is a defense technology
    company with a mission to transform U.S. and allied military capabilities with
    advanced technology. By bringing the expertise, technology, and business model
    of the 21st century’s most innovative companies to the defense industry, Anduril
    is changing how military systems are designed, built and sold. Anduril’s family
    of systems is powered by Lattice OS, an AI-powered operating system that turns
    thousands of data streams into a realtime, 3D command and control center. As the
    world enters an era of strategic competition, Anduril is committed to bringing
    cutting-edge autonomy, AI, computer vision, sensor fusion, and networking technology
    to the military in months, not years.</p></div><p><strong>ABOUT THE TEAM</strong><br>The
    Discovery team at Anduril is at the forefront of incubating and maturing high-potential,
    software-defined, AI-native offerings that meet the toughest, newest challenges
    across hardware, software, space, and cyber domains. We're the architects of mission
    autonomy and mesh networking, delivering scalable hardware solutions that meet
    some of the most urgent national security needs. By working hand-in-hand with
    elite teams in Perception, AI, Motion Planning, Hardware, Test Engineering, Space,
    Networking, and Vehicle hardware, we craft cutting-edge, end-to-end systems that
    redefine mission success.<br><br><strong>ABOUT THE JOB</strong><br>As a Software
    Engineer in Discovery, you will solve a wide variety of problems involving networking,
    autonomy, systems integration, robotics, and more, while making pragmatic engineering
    tradeoffs along the way. Your efforts will ensure that Anduril products seamlessly
    work together to achieve critical outcomes. You will be given mentorship and leadership
    opportunities, and be expected to set the direction for technical teams.<br><br>Above
    all, Software Engineers must be driven by a “Whatever It Takes” mindset—executing
    in an expedient, scalable, and pragmatic way while keeping the mission top-of-mind
    and making sound engineering decisions to deliver successful outcomes on-time
    and with high quality. Not only will you build the software, but you'll also work
    directly with customers to deploy it.<br><br><strong>WHAT YOU’LL DO</strong></p>
    <ul> <li>Develop tools and capabilities that extend Anduril's Lattice OS to solve
    unique customer problems in the command and control of cyber assets, the planning
    and execution of offensive cyber missions, networking, and remote asset management
    in far-edge environments.</li> <li>Collaborate closely with customers, product
    designers, and other engineering teams to shape and build new software products
    and applications, optimizing for maximum value to the end user.</li> <li>Build,
    test, deploy, and demonstrate mission-critical code in a tight feedback loop with
    end users.</li> <li>Travel up to 25% of the time to participate in customer events
    and deploy capabilities in real-world scenarios.</li> <li>Contribute to the development
    of existing software services across Anduril, aiming to develop reusable components
    that contribute to success across multiple Anduril product lines.</li> </ul> <h4><strong>REQUIRED
    QUALIFICATIONS</strong></h4> <ul> <li>Strong engineering background from industry
    or school, ideally in areas/fields such as Computer Science, Software Engineering,
    Mathematics, or Physics</li> <li>7+ years working with a variety of programming
    languages such as Java, Python, C++, Rust, Go, JavaScript, etc.</li> <li>Experience
    building software solutions involving significant amounts of data processing and
    analysis</li> <li>Ability to quickly understand and navigate complex systems and
    established code bases</li> <li>A desire to work on critical software that has
    a real-world impact</li> <li>Experience making impactful technical architectural
    decisions, tradeoffs and engaging in engineering discussion with peers</li> <li>Currently
    possesses and is able to maintain an active U.S. Top Secret security clearance</li>
    </ul> <h4><strong>PREFERRED QUALIFICATIONS</strong></h4> <ul> <li>Developing and
    testing multi-agent autonomous systems and deploying in real-world environments</li>
    <li>Feature and algorithm development with an understanding of behavior trees</li>
    <li>Distributed communication networks and message standards</li> <li>Knowledge
    of military systems and operational tactics</li> <li>Experience mentoring junior
    engineers</li> <li>Experience and examples of architecting complex systems</li>
