  description: 'About Supabase Supabase is the Postgres development platform, built
    by developers for developers. We provide a complete backend solution including
    Database, Auth, Storage, Edge Functions, Realtime, and Vector Search. All services
    are deeply integrated and designed for growth. About the Role We’re looking for
    a Docs Engineer to help build and contribute to our documentation site, API, and
    Docs AI tools. You’ll be responsible for our docs site and content pipelines,
    building the tools for product teams and other contributors to showcase Supabase
    features. We believe that documentation is more than just a tool. It’s part of
    our product. The documentation is where developers take their first step on their
    side project. We know our docs need a lot of work, and that’s why we need you.
    If you have ideas for what the best docs in the world would look like, now, and
    in the future we want you to join us and make that happen. What you''ll be responsible
    for : Leveling up our documentation site. Making it a best-in-class experience
    for users ranging from indie vibe coders to enterprise engineering teams. Maintaining
    our docs tooling and content pipelines, making working on docs a smooth experience
    for both internal and external contributors. Working with our open source contributors
    through GitHub discussions, issues, and pull requests. You might be a good fit
    if you : Have Front-end experience. You can build and maintain a Next.js site
    and content pipelines. Have experience with CI/CD pipelines and automation for
    content or documentation workflows to help reduce repetitive tasks. Have documentation
    experience. You know something about information architecture, and ideally have
    worked on a docs site. Have the open source or community facilitation experience
    (it’s a plus). Our docs are open source, and you’ll need to engage with the community
    through GitHub issues and pull requests. Have experience with automated testing
    and building pipelines for docs. What We Offer Fully Remote We hire globally.
    We believe you can do your best work from anywhere. There are no Supabase offices,
    but we provide a WeWork membership or co-working allowance you can use anywhere
    in the world. ESOP Every team member receives ESOP (equity ownership) in the company.
    We want everyone to share in the upside of what we’re building together. Tech
    Allowance Use this budget to set up your ideal work environment—laptop, monitor,
    headphones, or whatever helps you do your best work. Health Benefits Supabase
    covers 100% of health insurance for employees and 80% for dependents, wherever
    you are. Your wellbeing and your family’s health are important to us. Annual Off-Sites
    Once a year, the entire company gathers in a new city for a week of connection,
    collaboration, and fun. It’s a highlight of our year. Flexible Work We operate
    asynchronously and trust you to manage your own time. You know what needs to be
    done and when. Professional Development Every team member receives an annual education
    allowance to spend on learning—courses, books, conferences, or anything that supports
    your growth. About the Team Supabase was born-remote and open-source-first. We
    believe our globally distributed team is our secret weapon in building tools developers
    love. 280+ team members 55+ countries 20+ languages spoken $500M raised 500,000+
    community members We move fast, build in public, and use what we ship. If it’s
    in your project, we probably use it in ours too. We believe deeply in the open-source
    ecosystem and strive to support—not replace—existing tools and communities. Hiring
    Process We keep things simple, async-friendly, and respectful of your time: Apply
    – Our team will review your application. Intro Call – A short video chat to get
    to know each other. Interviews – Up to four calls with: Team Leads Future teammates
    Someone cross-functional from product, growth, or engineering (depending on the
    role) Someone from our leadership/founding team Decision – We may follow up with
    a final question or go straight to offer. All communication is remote and we aim
    to move fast.'
