  description: '<p data-pm-slice="1 1 []">FEQ127R315</p> <p><em>Specialist Solutions
    Architect - Cloud Infrastructure &amp; Security</em></p> <p>As a Specialist Solutions
    Architect (SSA) - Cloud Infrastructure &amp; Security, you will guide customers
    in the administration and security of their Databricks deployments for a variety
    of our customers. You will be in a customer-facing role, working with and supporting
    Solution Architects, which requires hands-on production experience with public
    cloud - AWS, Azure, and GCP.&nbsp; SSAs help customers with the design and successful
    implementation of essential workloads while aligning their technical roadmap to
    expand the use of the Databricks Platform. As a deep go-to-expert reporting to
    the Specialist Field Engineering Manager, you will continue to strengthen your
    technical skills through mentorship, learning, and internal training programs
    and establish yourself in an area of specialty - whether that be cloud deployments,
    security, networking, or more.</p> <h3><strong>The impact you will have:</strong></h3>
    <ul> <li>Provide technical leadership to guide strategic customers to the successful
    administration of Databricks, ranging from design to deployment</li> <li>Architect
    production-level deployments, including meeting necessary security and networking
    requirements&nbsp;</li> <li>Become a technical expert in an area such as cloud
    platforms, automation, security, networking, or identity management</li> <li>Assist
    Solution Architects with more advanced aspects of the technical sale including
    custom proof of concept content and custom architectures</li> <li>Provide tutorials
    and training to improve community adoption (including hackathons and conference
    presentations)</li> <li>Contribute to the Databricks Community</li> </ul> <h3><strong>What
    we look for:</strong></h3> <ul> <li>5+ years of experience in a technical role
    with expertise in at least one of the following:</li> <ul> <li>Cloud Platforms
    &amp; Architecture: Cloud Native Architecture in CSPs such as AWS, Azure, and
    GCP, Serverless Architecture.</li> <li>Security: Platform security, Network security,
    Data Security, Gen AI &amp; Model Security, Encryption, Vulnerability Management,
    Compliance.&nbsp;</li> <li>Networking: Architecture design, implementation, and
    performance</li> <li>Identify management: Provisioning, SCIM, OAuth, SAML, Federation</li>
    <li>Platform Administration: High availability and disaster recovery, cluster
    management, observability, logging, monitoring, audit, cost management</li> <li>Infrastructure
    Automation and InfraOps with IaC tools like Terraform</li> </ul> <li>Maintain
    and extend the Databricks environment to adapt to evolving complex needs.</li>
    <li>Deep Specialty Expertise in at least one of the following areas:</li> <ul>
    <li>Security - understanding how to secure data platforms and manage identities</li>
    <li>Complex deployments</li> <li>Public Cloud experience - experience designing
    data platforms on cloud infrastructure and services, such as AWS, Azure, or GCP,
    using best practices in cloud security and networking.</li> </ul> <li>Bachelor''s
    degree in Computer Science, Information Systems, Engineering, or equivalent experience
    through work experience.</li> <li>Hands-on experience with Python, Java, or Scala,
    and proficiency in SQL, and Terraform experience are desirable.</li> <li>2 years
    of professional experience with Big Data technologies (Ex: Spark, Hadoop, Kafka)
    and architectures</li> <li>2 years of customer-facing experience in a pre-sales
    or post-sales role</li> <li>Can meet expectations for technical training and role-specific
    outcomes within 6 months of hire</li> <li>This role can be remote, but we prefer
    that you be located in the job listing area and can travel up to 30% when needed.</li>
