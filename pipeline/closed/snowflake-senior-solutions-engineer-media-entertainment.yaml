  description: "At Snowflake, we are powering the era of the agentic enterprise. To\
    \ usher in this new era, we seek AI-native thinkers across every function who\
    \ are energized by the opportunity to reinvent how they work. You don\u2019t just\
    \ use tools; you possess an innate curiosity, treating AI as a high-trust collaborator\
    \ that is core to how you solve problems and accelerate your impact. We look for\
    \ low-ego individuals who thrive in dynamic and fast-moving environments and move\
    \ with an experimental mindset \u2014 who rapidly test emerging capabilities to\
    \ discover simpler, more powerful ways to deliver results. At Snowflake, your\
    \ role isn't just to execute a function, but to help redefine the future of how\
    \ work gets done. We are looking for a Senior Solutions Engineer who is accustomed\
    \ to solving customer\u2019s most complex problems and closing large deals. In\
    \ this role you will work directly with the sales team and channel partners to\
    \ understand the needs of our customers, strategize on how to navigate winning\
    \ sales cycles, provide compelling value-based demonstrations, support enterprise\
    \ Proof of Concepts, and ultimately close business. As a Snowflake Solutions Engineer\
    \ you must share our passion about reinventing the database space, thrive in a\
    \ dynamic environment and have the flexibility and willingness to jump in and\
    \ get things done. You are equally comfortable in both a business and technical\
    \ context, interacting with executives and talking shop with technical audiences.\
    \ IN THIS ROLE YOU WILL GET TO: Present Snowflake technology and vision to executives\
    \ and technical contributors at prospects and customers Work hands-on with prospects\
    \ and customers to demonstrate and communicate the value of Snowflake technology\
    \ throughout the sales cycle, from demo to proof of concept to design and implementation\
    \ Immerse yourself in the ever-evolving industry, maintaining a deep understanding\
    \ of competitive and complementary technologies and vendors and how to position\
    \ Snowflake in relation to them. Collaborate with Product Management, Engineering,\
    \ and Marketing to continuously improve Snowflake\u2019s products and marketing\
    \ ON DAY ONE WE WILL EXPECT YOU TO HAVE: Outstanding presenting skills to both\
    \ technical and executive audiences, whether impromptu on a whiteboard or using\
    \ presentations and demos. Broad range of experience within large-scale Database\
    \ and/or Data Warehouse technology, ETL, analytics, data science, AI/ML, and cloud\
    \ technologies Hands-on expertise with SQL and SQL analytics and Python Ability\
    \ to connect a customer\u2019s specific business problems and Snowflake\u2019\
    s solutions University degree in computer science, engineering, mathematics or\
    \ related fields, or equivalent experience preferred ABOUT OUR TEAM Our Solutions\
    \ Engineers are customer obsessed and we believe in the value we can add and stay\
    \ honest about it. We love to learn, are open to giving and receiving feedback\
    \ and are passionate about making our clients successful. Our team works to ensure\
    \ data is accessible, usable and valuable to everyone. Every Snowflake employee\
    \ is expected to follow the company\u2019s confidentiality and security standards\
    \ for handling sensitive data. Snowflake employees must abide by the company\u2019\
    s data security plan as an essential part of their duties. It is every employee's\
    \ duty to keep customer information secure and confidential. Snowflake is growing\
    \ fast, and we\u2019re scaling our team to help enable and accelerate our growth.\
    \ We are looking for people who share our values, challenge ordinary thinking,\
    \ and push the pace of innovation while building a future for themselves and Snowflake.\
    \ How do you want to make your impact? For jobs located in the United States,\
    \ please visit the job posting on the Snowflake Careers Site for salary and benefits\
    \ information: careers.snowflake.com"
