  description: '<p><strong><em>Note: </em></strong><span style="font-size: 10pt;"><em>if
    you are an intern or new grad applicant, please do not apply using this link and
    visit our </em><a href="https://stripe.com/jobs/search"><em>jobs page</em></a><em>
    for those specific postings.</em></span></p> <h2><strong>Who we are</strong></h2>
    <h3><strong>About Stripe</strong></h3> <p>Stripe is a financial infrastructure
    platform for businesses. Millions of companies - from the world’s largest enterprises
    to the most ambitious startups - use Stripe to accept payments, grow their revenue,
    and accelerate new business opportunities. Our mission is to increase the GDP
    of the internet, and we have a staggering amount of work ahead. That means you
    have an unprecedented opportunity to put the global economy within everyone''s
    reach while doing the most important work of your career.</p> <h3><strong>About
    the Organization&nbsp;</strong></h3> <p>The JavaScript Infrastructure Engineering
    team is a high impact, high leverage, and high visibility team that supports the
    productivity of Stripe’s frontend engineers. The team creates and supports cross
    cutting infrastructural libraries, services, and utilities; establishes and enforces
    clean coding patterns; makes sweeping code changes that improve the quality of
    code at Stripe; and improves build times and reliability.</p> <p>That’s not easy.
    We work with a code base of several million lines of code (and counting), used
    by thousands of engineers across the globe and we must focus at many levels of
    the stack. It''s rewarding and what we do is key to allowing Stripe engineers
    working in our products to have the most productive time of their careers.</p>
    <h2><strong>What you’ll do</strong></h2> <p>We''re looking for engineers who are
    excited about making large-scale frontend development fast, reliable, and maintainable.
    You''ll own parts of the infrastructure that every Stripe UI engineer depends
    on, from remote devboxes to CI, and build solutions where open-source tooling
    doesn''t scale to our needs.</p> <h3><strong>Responsibilities</strong></h3> <ul>
    <li>Build and maintain Stripe''s frontend package manager, build toolchain, bundler
    setup, and TypeScript infrastructure</li> <li>Lay the groundwork for AI-native
    frontend development</li> <li>Drive consistency and best practices across Stripe''s
    JS codebases through tooling</li> <li>Own SLOs for build performance, install
    speed, and developer tooling reliability</li> <li>Debug and resolve developer-facing
    incidents during on-call, providing timely support to UI engineers across Stripe</li>
    <li>Partner with frontend product and platform teams to understand friction points
    and continuously improve the core edit/build/test loop</li> </ul> <h2><strong>Who
    you are</strong></h2> <p>We''re looking for someone who meets the minimum requirements
    to be considered for the role. If you meet these requirements, you are encouraged
    to apply. The preferred qualifications are a bonus, not a requirement.</p> <h3><strong>Minimum
    requirements</strong></h3> <ul> <li>2+ years of software development experience,
    with a strong foundation in JavaScript or TypeScript</li> <li>Knows their way
    around the modern frontend ecosystem, and has worked on complex web applications
    with a global user base</li> <li>Deep systems thinking: you consider edge cases,
    failure modes, and downstream effects when designing solutions</li> <li>Motivated
    by improving the experience of the engineers around you; you measure your success
    by their productivity and happiness</li> <li>Comfortable working with high autonomy
    on problems where the right solution isn''t obvious</li> <li>Strong written communicator,
    able to share context and decisions clearly across a distributed team</li> </ul>
    <h3><strong>Preferred Qualifications</strong></h3> <ul> <li>Experience building
    or contributing to developer tooling, CLI tools, or build infrastructure</li>
    <li>A background building frontend products with React is helpful, but we''re
    especially interested in candidates eager to improve how frontend developers work,
    wherever that takes them in the stack.</li> </ul>'
