    changes perform in the real world. Based out of OpenAI’s Bellevue office, we are
    a tight-knit team that values in-person collaboration, moving quickly with a strong
    bias toward impact, and building systems that empower other builders across the
    company. About the Role As a Senior Infrastructure Engineer on the Statsig team,
    you will build and scale the foundational infrastructure that powers OpenAI’s
    experimentation and rollout tools. You’ll work on the distributed systems that
    deliver configuration decisions in real time, ingest massive volumes of experimentation
    data, and power analytics that help teams understand how product and model changes
    perform in production. This role is deeply technical and focuses on performance,
    scalability, and reliability at extreme scale. You will design systems that support
    billions of feature evaluations, operate with strict latency requirements, and
    provide the data foundation for experimentation across OpenAI’s product ecosystem.
    In this role, you will: Design and operate low-latency configuration delivery
    systems powering progressive rollouts across OpenAI’s product suites. Build highly
    scalable data ingestion and analytics infrastructure to support experimentation,
    product analytics, and feature performance monitoring. Improve the performance,
    efficiency, and reliability of Statsig’s core infrastructure, ensuring systems
    remain fast and stable as OpenAI’s products scale globally. Optimize query performance
    and data availability for experimentation and analytics workflows used by teams
    across OpenAI. Lead large technical initiatives and shape the architecture of
    experimentation and rollout infrastructure used across the company. You might
    thrive in this role if you: Have experience building large-scale distributed systems
    with strict performance and reliability requirements. Enjoy solving low-latency
    systems problems, such as real-time configuration delivery, high-throughput ingestion
    pipelines, or large-scale analytics systems. Have experience building and optimizing
    large-scale data platforms, event pipelines, etc. Care deeply about system reliability,
    observability, and operational excellence in production environments. Take ownership
