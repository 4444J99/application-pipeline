  description: "About Ramp Ramp is building the smart infrastructure for finance teams,\
    \ embedded in the transaction flow of every dollar a business spends. We automate\
    \ how over $100B in annualized spend flows in and out of 50,000+ companies: authorizing\
    \ payments, flagging risk, categorizing spend, and closing books. The problems\
    \ are high-stakes, data-dense, and unforgiving. We hire people with high agency\
    \ and high urgency. We look for slope over intercept. We care less about where\
    \ you trained and more about what you\u2019ve built. At Ramp, everyone is a builder\
    \ who owns problems end to end and makes consequential decisions that shape the\
    \ outcome. The median Ramp customer saves 5% and grows revenue 16% in their first\
    \ year \u2013 far in excess of businesses operating without Ramp. We believe every\
    \ ambitious company deserves the same. If you want to build systems that directly\
    \ shape how companies move and manage billions, Ramp is the place to do it. About\
    \ the Role Ramp is redesigning how businesses manage travel\u2014and the backbone\
    \ of that vision is a seamless, intelligent platform that unifies booking, spend,\
    \ and policy in real time. The Ramp Travel team is building the systems that power\
    \ how businesses plan, book, and manage travel, ensuring every trip is efficient,\
    \ compliant, and fully integrated into the company\u2019s financial workflows.\
    \ We\u2019re looking for a blazingly fast backend engineer who thrives in complex\
    \ systems, cares deeply about reliability and user experience, and wants to shape\
    \ how modern companies manage travel. You\u2019ll help us save customers time\
    \ and money while supporting Ramp\u2019s transformation into the AI-powered finance\
    \ platform of the future. What You'll Do Own and scale the backend services powering\
    \ Ramp\u2019s travel booking platform, enabling cardholders to seamlessly book\
    \ flights, hotels, and cars directly within Ramp Build delightful user experiences\
    \ that leverage Ramp\u2019s integrated travel and spend platform\u2014unlocking\
    \ capabilities no other product can match Develop reporting and policy systems\
    \ that give travel managers real-time visibility into employee travel and ensure\
    \ spend stays within company policy Lay the technical foundation for AI agents\
    \ that learn traveler preferences and automate trip planning and booking Design\
    \ and operate highly scalable, reliable systems that serve millions of travelers\
    \ with exceptional performance and support Improve internal developer tooling\
    \ and platform interfaces to accelerate engineering velocity and product development\
    \ What You Need Experience in high-velocity environments Experience using AI coding\
    \ tools to ship fast while maintaining a high bar on quality Strong understanding\
    \ of system design, reliability engineering, and service observability Fluent\
    \ in Python or a comparable modern backend language 3+ years of backend engineering\
    \ experience Comfort working closely with customers to translate business needs\
    \ into clean code Nice-to-Haves Experience building AI agents that execute complex\
    \ tasks Travel industry knowledge (especially experience using travel APIs) Experience\
    \ working with difficult and unreliable APIs Benefits (for U.S.-based full-time\
    \ employees) 100% medical, dental & vision insurance coverage for you Partially\
    \ covered for your dependents One Medical annual membership 401k (including employer\
    \ match on contributions made while employed by Ramp) Flexible PTO Fertility HRA\
    \ (up to $10,000 per year) Parental Leave Unlimited AI token usage Pet insurance\
    \ Centralized home-office equipment ordering for all employees Health and Wellness\
    \ stipend In-office perks: lunch, snacks, drinks, and more Budget for intra-office\
    \ travel Relocation support to NYC or SF (as needed) Referral Instructions If\
    \ you are being referred for the role, please contact that person to apply on\
    \ your behalf. Other notices Pursuant to the San Francisco Fair Chance Ordinance,\
    \ we will consider for employment qualified applicants with arrest and conviction\
    \ records. Beware of recruiting scams: Ramp will only contact you through official\
    \ @ Ramp.com email addresses and will never ask for payment or sensitive personal\
    \ information during the hiring process. Ramp Applicant Privacy Notice"
