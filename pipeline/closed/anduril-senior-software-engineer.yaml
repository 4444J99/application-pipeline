    sufficiently advanced technology is indistinguishable from magic.” Anduril is
    seeking talented “magicians” to join in our mission to expand the boundary of
    what’s possible.&nbsp;</p> <h4><strong>WHAT YOU WILL DO:</strong></h4> <ul> <li>Contribute
    to the direction of a small team with your expertise and ideas</li> <li>Prototype
