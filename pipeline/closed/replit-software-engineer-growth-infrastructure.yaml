    Translate business goals into technical specifications and system designs. Provide
    guidance on performance, reliability, and scalability trade-offs. Monitoring &
    Reliability Implement monitoring and alerting for growth infrastructure services.
    Troubleshoot production issues and optimize for uptime and performance. Ensure
    data quality and consistency for reporting and decision-making. Continuous Improvement
    Evaluate new tools, frameworks, and platforms that accelerate growth engineering.
    Drive best practices in infrastructure as code, CI/CD, and automated testing.
