  description: '<p>We''re looking for a <strong>Senior Infrastructure Engineer</strong>
    who brings strong software engineering skills and a deep understanding of production
    systems. This role is a good fit for someone who enjoys building systems that
    make infrastructure more scalable, reliable, and easy to operate – using code,
    not runbooks.</p> <p>You''ll work with a highly collaborative team to design and
    build the internal platforms that power all of Asana, from product features to
    AI systems to offline analytics. Our tech stack includes: <strong>AWS, Kubernetes
    (EKS), MySQL (RDS), OpenSearch, DynamoDB, Redis, Terraform, Datadog, TypeScript,
    Scala, Go, and Python.</strong></p> <p>We’re especially interested in people who
    think like backend engineers but care deeply about systems – things like failure
    modes, operational cost, debuggability, and performance.</p> <p>This role is based
    in our Warsaw office with an office-centric hybrid schedule. The standard in-office
    days are Monday, Tuesday, and Thursday. Most Asanas have the option to work from
    home on Wednesdays. Working from home on Fridays depends on the type of work you
    do, and your recruiter can share more about the in-office requirements.<br><br><strong>We
    offer a Contract of Employment (UoP) for our employees in Poland.</strong></p>
    <p><strong>What you’ll achieve:</strong></p> <ul> <li>Design and build frameworks,
    tools, and services that improve the reliability, observability, and scalability
    of Asana’s infrastructure.</li> <li>Lead end-to-end projects, from scoping and
    design through to rollout, across multiple systems and teams.</li> <li>Improve
    the operability of stateful infrastructure like MySQL, OpenSearch, and DynamoDB
    – and help drive Asana’s long-term vision for storage reliability.</li> <li>Debug
    production issues across the stack. Yes, there’s an on-call rotation – but this
    isn’t a pager monkey role. You’re here to fix things properly and make sure they
    don’t break again.</li> <li>Partner with product teams to shape a service-oriented
    architecture that enables fast, reliable development.</li> <li>Share knowledge
    through code reviews, design discussions, and mentorship.</li> </ul> <p><strong>About
    you:</strong></p> <ul> <li>Strong software engineering background – you’re comfortable
    writing production code and designing systems (we use Go, Python, Scala, TypeScript).</li>
    <li>5+ years of experience building and operating backend systems at scale.</li>
    <li>Familiarity with distributed systems and storage technologies (SQL, NoSQL,
    Search), especially in cloud environments.</li> <li>Experience with AWS services
    (e.g. RDS, EKS, IAM), Terraform, and monitoring tooling like Datadog or similar.</li>
    <li>Solid understanding of SRE principles (e.g. SLIs/SLOs, error budgets, incident
    response), but you approach reliability as a software problem first.</li> <li>Clear
    communicator and strong collaborator – you''re comfortable navigating trade-offs
    with stakeholders across the stack.</li> <li><strong>Important:</strong> If you’re
    only comfortable with scripting, <strong>this isn’t the right role</strong>. We’re
    looking for engineers who build and ship real systems.</li> <li>Demonstrates curiosity
    about AI tools and emerging technologies, with a willingness to learn and leverage
    them to enhance productivity, collaboration, or decision-making</li> </ul> <p><strong>Why
    this role?</strong></p> <ul> <li><strong>Founding team:</strong> You’ll be one
    of the first SREs in Warsaw – and a key player in a growing team.</li> <li><strong>Drive
    real change:</strong> This isn’t a role where you’ll just patch up legacy systems.
    We are expecting (and supporting) real architectural changes to improve reliability,
    scalability, and long-term operability.</li> <li><strong>Big impact:</strong>
    Our product is scaling fast, and reliability is a top company priority.</li> <li><strong>Room
    to grow:</strong> As this team grows, so will your influence – whether you want
    to lead projects, mentor others, or help shape how we scale.</li> <li><strong>Global
    collaboration</strong>: Work closely with experienced engineers in San Francisco,
    Reykjavik, and Warsaw, while helping build the future of SRE at Asana.</li> </ul>
    <p><strong>What we''ll offer:</strong></p> <ul> <li>Generous, transparent and
    fair compensation system (base salary and generous Restricted Stock Unit for Asana
    Inc.).</li> <li>Contract of Employment (<strong>with</strong> <strong>50% tax
    deductible costs for author’s rights usage for Engineers).</strong></li> <li>Health
    insurance with dental and travel coverage (Lux Med).</li> <li>Lunch catering on
    the days that you work from the office.</li> <li>Career growth budget.</li> <li>Home
    office setup budget.</li> <li>Gym/Fitness reimbursement.</li> <li>Fertility healthcare
    and family-forming support with <a href="https://www.get-carrot.com/">Carrot</a>.</li>
    <li>Mental health support in Modern Health.</li> <li>Group life insurance.</li>
    <li>MacBooks with all necessary accessories.</li> </ul> '
