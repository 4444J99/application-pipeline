  description: '<h2><strong>Senior Software Engineer, AI Teammates Experience</strong></h2>
    <p>Asana is seeking an experienced and empathetic Senior Software Engineer to
    join our AI Teammates Experience team. Our team builds features end-to-end, from
    designing our data models to implementing the subtle interaction behaviors that
    differentiate good software from great software. You will build engaging experiences
    that enable our customers to work effectively with their AI Teammates, creating
    the interaction and product surfaces for teams, users, and admins. We’re looking
    for an engineer who is passionate about AI, curious to learn about how people
    interact with agents, and willing to share what they learn to help their colleagues
    grow and thrive.</p> <p>This role is based in our <strong>San Francisco</strong>
    office with an office-centric hybrid schedule. The standard in-office days are
    Monday, Tuesday, and Thursday. Most Asanas have the option to work from home on
    Wednesdays. Working from home on Fridays depends on the type of work you do and
    the teams with which you partner. If you''re interviewing for this role, your
    recruiter will share more about the in-office requirements.</p> <h3><strong>What
    you’ll achieve</strong></h3> <ul> <li>Drive full-stack development of robust systems
    and product surfaces that enable users to guide and work alongside their AI Teammates.</li>
    <li>Collaborate with cross-functional product, design, and platform teams to turn
    cutting-edge AI capabilities into intuitive product surfaces that provide clear
    value for teams.</li> <li>Contribute to the next generation of interaction patterns
    for AI, from conversational flows and human-in-the-loop workflows to experiences
    that build user trust.</li> <li>Apply empathetic product judgment and rapid experimentation
    to iterate on features, ensuring high quality, usability, and measurable impact.</li>
    <li>Mentor and develop engineers on your team by sharing knowledge and experience,
    fostering strong engineering practices and a culture of continuous improvement.</li>
    <li>Help shape the trajectory of AI at Asana by contributing technical insight,
    product thinking, and strong execution.</li> </ul> <h3><strong>About you</strong></h3>
    <ul> <li>Demonstrates curiosity about AI tools and emerging technologies, with
    a willingness to learn and leverage them to enhance productivity, collaboration,
    or decision-making.</li> <li>5+ years of experience working across the stack within
    large, well-maintained codebases.</li> <li>Experience building product features
    in complex technical domains; experience with applied AI, prompting LLMs, or agentic
    workflows is a plus.</li> <li>A proven track record of working with a team to
    scope and deliver impactful features.</li> <li>Ability to bring structure, judgment,
    and collaboration to evolving AI and product challenges.</li> <li>Thrives in a
    highly cross-functional environment, partnering closely with product and design.</li>
    <li>Communicates clearly and collaborates effectively across functions with a
    spirit of openness and curiosity.</li> </ul> <p>At Asana, we''re committed to
    building teams that include a variety of backgrounds, perspectives, and skills,
    as this is critical to helping us achieve our mission. If you''re interested in
    this role and don''t meet every listed requirement, we still encourage you to
    apply.</p> <h3><strong>What we’ll offer</strong></h3> <p>Our comprehensive compensation
    package plays a big part in how we recognize you for the impact you have on our
    path to achieving our mission. We believe that compensation should be reflective
    of the value you create relative to the market value of your role. To ensure pay
    is fair and not impacted by biases, we''re committed to looking at market value
    which is why we check ourselves and conduct a yearly pay equity audit.</p> <p>For
    this role, the estimated base salary range is between <strong>$202,000 - $258,000</strong>.
    The actual base salary will vary based on various factors, including market and
    individual qualifications objectively assessed during the interview process. The
    listed range above is a guideline, and the base salary range for this role may
    be modified.</p> <p>In addition to base salary, your compensation package may
    include additional components such as equity, sales incentive pay (for most sales
    roles), and benefits. If you''re interviewing for this role, speak with your recruiter
    to learn more about the total compensation and benefits for this role.</p> <p>We
    strive to provide equitable and competitive benefits packages that support our
    employees worldwide and include:</p> <ul> <li>Mental health, wellness &amp; fitness
    benefits</li> <li>Career coaching &amp; support</li> <li>Inclusive family building
    benefits</li> <li>Long-term savings or retirement plans</li> <li>In-office culinary
    options to cater to your dietary preferences</li> </ul> <p>These are just some
    of the benefits we offer, and benefits may vary based on role, country, and local
    regulations. '
