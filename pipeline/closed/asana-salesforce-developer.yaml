    for the end-to-end health of our ecosystem—from architecting complex new revenue
    features and customer-facing portals to ensuring the high-availability and operational
    stability of our global instance.</p> <p>This role is based in our Vancouver office
    with an office-centric hybrid schedule. The standard in-office days are Monday,
    Tuesday, and Thursday. Most Asanas have the option to work from home on Wednesdays.
    Working from home on Fridays depends on the type of work you do and the teams
    with which you partner. If you''re interviewing for this role, your recruiter
    will share more about the in-office requirements.</p> <p><strong>What You’ll Achieve</strong></p>
    <ul> <li>Platform Architecture: Lead the end-to-end design and implementation
    of enterprise-scale features across Sales and Service Cloud. This includes managing
    complex business logic for Lead/Opportunity lifecycles, Territory Management,
    and sophisticated Case Management workflows, Omni-Channel, Entitlements, and Milestones.</li>
    <li>Custom Engineering: Develop and maintain high-performance Apex Trigger Frameworks
    and Lightning Web Components (LWC). You will ensure all code follows Enterprise
    Design Patterns, is bulk-safe, and is strictly optimized for SOQL and CPU limits.</li>
    <li>Digital Experience &amp; Access: Build and customize Experience Cloud sites
    for Customer and/or Partners, utilizing role-based and audience-based access logic.
    You will implement secure data visibility using advanced sharing sets, permission
    sets, and the Salesforce security model.</li> <li>Operational Excellence: Own
    the "run" state of the platform by proactively monitoring system health, managing
    Sev 0 incident response. You will balance long-term roadmap projects with the
    immediate need for system stability and performance tuning.</li> <li>Integration
    &amp; Messaging: Design and support Enterprise Integration Patterns, Custom APIs,
    and Platform Events to facilitate seamless data flow between Salesforce and external
    business systems.</li> <li>Technical Governance: Drive the SDLC and release management
    process using Gearset, Copado, and GitHub. You will conduct rigorous code reviews,
    maintain comprehensive technical documentation, and mentor distributed teams to
    ensure a culture of engineering excellence.</li> <li>Automation &amp; Innovation:
    You will also contribute to the adoption of emerging AI technologies, such as
    Agentforce and prompt engineering, to drive productivity.</li> </ul> <p><strong>About
    You</strong></p> <ul> <li>Bachelor’s degree in Computer Science (or equivalent)</li>
    <li>8+ years of deep Salesforce development experience. You have a track record
    of driving work from abstract ideas to technical completion.</li> <li>You value
    elegant system architecture and clean, efficient code with 100% appropriate unit
    test coverage. You prefer automation over manual work every time.</li> <li>You
    thrive in high-velocity, high-accountability Scrum environments. You are comfortable
    managing multiple competing priorities and can pivot quickly from deep-focus development
    to urgent troubleshooting.</li> <li>You have an insatiable desire to learn cross-platform
    logic (Java/Python) and emerging AI frameworks.</li> <li>Demonstrates curiosity
    about AI tools and emerging technologies, with a willingness to learn and leverage
    them to enhance productivity, collaboration, or decision-making</li> </ul> <p><strong>Technical
    Qualifications</strong></p> <ul> <li>Salesforce Certified Platform Developer.</li>
    <li>Expertise in Apex, LWC, SOQL, and Salesforce APIs.</li> <li>Hands-on experience
    with Experience Cloud, Service Cloud, and Sales Cloud.</li> <li>Proficiency with
    CI/CD tools (Gearset, Copado, or GitHub Actions).</li> </ul> <p><strong>What we’ll
    offer</strong></p> <p>Our comprehensive compensation package plays a big part
    in how we recognize you for the impact you have on our path to achieving our mission.
    We believe that compensation should be reflective of the value you create relative
    to the market value of your role. To ensure pay is fair and not impacted by biases,
    we''re committed to looking at market value which is why we check ourselves and
    conduct a yearly pay equity audit.</p> <p>For this role, the estimated base salary
    range is between $128,000-145,000 CAD. The actual base salary will vary based
    on various factors, including market and individual qualifications objectively
    assessed during the interview process. The listed range above is a guideline,
    and the base salary range for this role may be modified.</p> <p>In addition to
    base salary, your compensation package may include additional components such
    as equity, sales incentive pay (for most sales roles), and benefits. If you''re
    interviewing for this role, speak with your Talent Acquisition P'
