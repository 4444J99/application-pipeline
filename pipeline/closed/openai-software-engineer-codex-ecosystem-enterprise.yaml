  description: 'About the Team With Codex we’re building an AI software engineer.
    One that you can pair with, delegate to, or even ask to take on future tasks proactively.
    Our team is a fast-moving group within OpenAI, bringing together research, engineering,
    design, and product. We iteratively build the Codex agent harness and product
    to get the most out of the model, and we iteratively train the model to be great
    at complex software engineering tasks. The Codex team is responsible for building
    state-of-the-art AI systems that can write code, reason about software, and act
    as intelligent agents for developers and non-developers alike. We operate across
    research, engineering, product, and infrastructure; owning the full lifecycle
    of experimentation, deployment, and iteration on novel coding capabilities. Codex
    Ecosystem and Enterprise builds the ecosystem building blocks, discovery surfaces,
    and enterprise capabilities that help Codex spread across developers, teams, and
    organizations worldwide. It is a cross-cutting team that works across the stack
    to build both delightful product experiences and fundamental platform capabilities.
    Its customers range from individual developers and small teams to large enterprises,
    and our mission is critical to achieving the vision of Codex as a proactive teammate.
    About the Role As we grow, we’re focused on turning Codex from a powerful individual
    tool into a production-grade teammate for entire organizations. You will work
    across internal OpenAI teams and external customers, from fast-moving startups
    to large enterprises, to make it possible to deploy, operate, and trust Codex
    in increasingly demanding real-world environments. As Codex’s consumer adoption
    accelerates, enterprise demand is growing just as quickly, and there is also increasing
    opportunity to expand Codex through ecosystem capabilities that unlock new workflows,
    integrations, and discovery. This team helps turn messy, real-world team requirements
    into robust, repeatable, and scalable product and platform capabilities. You will
    work directly with a small set of deeply engaged design-partner customers using
    their real deployments to surface opportunities, and what’s required for Codex
    to succeed inside modern engineering organizations. Those insights will drive
    what you build across product, infrastructure, deployment patterns, and ecosystem
    capabilities for all teams using Codex. This role owns systems end-to-end: from
    architecture and implementation to production operations with a strong bias for
    both quality and velocity. In this role, you will: Shape the evolution of Codex
    by identifying how teams actually use (and break) AI-powered software engineering,
    and driving changes across product, infrastructure, ecosystem surfaces, and model
    behavior to make Codex a truly reliable teammate for organizations. Build the
    core ecosystem, team, and enterprise primitives that make Codex usable at scale,
    including plugins, skills, hooks, discovery surfaces, RBAC, admin and audit surfaces,
    usage, rate limits and pricing controls, managed configuration and constraints,
    and analytics that give teams and operators deep visibility into how Codex is
    being used. Design and own secure, observable, full-stack systems that power Codex
    across web, IDEs, CLI, and CI/CD, integrating with enterprise identity and governance
    systems (SSO/SAML/OIDC, SCIM, policy enforcement) and building data-access patterns
    that are performant, compliant, and trustworthy. Lead real-world deployments and
    launches by working directly with customers and the Go To Market team (GTM) to
    roll Codex out across teams, using live usage and operational signals to rapidly
    iterate and turn messy, real-world feedback into scalable product, platform, and
    ecosystem improvements. You might thrive in this role if you: Have strong software
    engineering fundamentals and experience turning ideas into productionized systems,
    thinking holistically about speed, performance, and user experience. Are proficient
    in one or more backend languages (e.g., Python, Go, Rust) and distributed systems
    concepts, with a focus on reliability, observability, and security. Enjoy building
    cross-cutting platform capabilities that unlock product velocity, and you’re comfortable
    working across services, APIs, end-user product surfaces, and extensibility systems.
    Have experience with team/enterprise foundations such as identity and access (SAML/OIDC),
    SCIM, RBAC, audit/compliance logging, policy enforcement, and data governance
    controls. Like working directly with users/customers (or alongside GTM/solutions
    teams), and can translate messy, diverse requirements into opinionated implementations
    that scale across many teams. Enjoy 0 -> 1 environments, can navigate ambiguity,
    and bring crisp product thinking to technical trade-offs. About OpenAI OpenAI
    is an AI research and deployment company dedicated to ensuring that general-purpose
    artificial intelligence benefits all of humanity. We push the boundaries of the
    cap'
