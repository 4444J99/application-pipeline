    large-scale inference and platform infrastructure that supports these experiences
    at global scale. With much more on the horizon, our impact continues to grow.
    Our customers build fast-growing businesses using our APIs, unlocking product
    capabilities that were previously unimaginable. ChatGPT and Sora exemplify the
    breadth of what’s now possible across text, image, audio, and video experiences.
    As these capabilities expand, we prioritize the responsible use of our technology,
    emphasizing safe and thoughtful deployment over unchecked growth. Within Applied
    Engineering, the Financial Engineering team builds the frontend platforms and
    workflows that power how OpenAI’s products are priced, purchased, and managed
    at scale. We work closely with Go-To-Market and Finance partners to translate
    complex commercial requirements into clear, reusable billing experiences. We’re
    looking for a frontend engineer to help define and evolve these billing platforms,
    shaping the primitives, interfaces, and patterns that product teams rely on as
    our offerings and customer needs continue to grow in complexity. In this role,
    you will: Create scalable, reusable UI components and patterns that support a
    wide range of billing use cases across products. Partner closely with backend
    engineers to deliver end-to-end billing capabilities spanning subscriptions, usage-based
    pricing, and enterprise offerings. Build tools and surfaces that allow teams like
    Finance, Sales, Support, and GTM to manage and reason about billing data efficiently.
    Create AI powered features for billing workflows and platform tooling to automate
    repetitive tasks, surface insights, and improve decision-making. Help define frontend
    architecture, standards, and patterns for a shared billing platform used by teams
    across OpenAI. Collaborate with Product, Data, Finance, Go-To-Market, and Engineering
    partners to translate ambiguous requirements into clear, high-quality interfaces.
    You might thrive in this role if you: Software engineering experience, with added
    experience in payments, billing, or monetization seen as a bonus. Strong frontend
    engineering experience building and maintaining production-grade web applications,
    with an emphasis on usability, scalability, and maintainability. Enjoy engaging
    with various partners, particularly those outside of engineering. Have a keen
    and innate desire to learn and acquire new skills, coupled with a strong ability
    to impart that knowledge clearly and succinctly to others. Bring significant experience
    in developing (and redeveloping) production systems to launch new product capabilities
    and to handle scaling challenges. Are deeply invested in creating an exceptional
    user experience, taking pride in crafting products that address customer needs.
