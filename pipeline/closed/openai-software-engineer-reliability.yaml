    Build and maintain the load, chaos and synthetic testing software leveraged by
    development teams to make the systems they design and operate more reliable. Build
    and maintain automation tools to streamline repetitive tasks and improve system
    reliability. Build and maintain the platform for CPU/storage, GPU, and network
    lifecycle management to drive efficiency, accountability and support dynamic optimization
    of our resources. Implement fault-tolerant and resilient design patterns to minimize
    service disruptions. Develop and maintain service level objectives (SLOs) and
