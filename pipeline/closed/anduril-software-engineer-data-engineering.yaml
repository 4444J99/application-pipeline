  description: '<div class="content-intro"><p>Anduril Industries is a defense technology
    company with a mission to transform U.S. and allied military capabilities with
    advanced technology. By bringing the expertise, technology, and business model
    of the 21st century’s most innovative companies to the defense industry, Anduril
    is changing how military systems are designed, built and sold. Anduril’s family
    of systems is powered by Lattice OS, an AI-powered operating system that turns
    thousands of data streams into a realtime, 3D command and control center. As the
    world enters an era of strategic competition, Anduril is committed to bringing
    cutting-edge autonomy, AI, computer vision, sensor fusion, and networking technology
    to the military in months, not years.</p></div><h3>ABOUT THE TEAM</h3> <p>Anduril
    Maritime delivers platforms, systems, and integrated effects in the maritime domain.
    Our autonomous vehicles (sub-surface and surface) are the cornerstone of these
    capabilities, and we continually strive to push the boundaries of the possible
    in terms of endurance, autonomy and mission capability. The Maritime team develops
    and maintains core products and payloads, and adapts and applies those products
    to serve a wide variety of defense, IC and commercial customers in US and international
    markets.</p> <h3>ABOUT THE JOB</h3> <p>As a Software Engineer, Data Engineering
    on the Maritime Digital Production team, you will build the high-throughput data
    systems that connect design, manufacturing, and operations into a unified digital
    thread. You’ll design and implement scalable data architectures that move and
    transform massive datasets efficiently, supporting everything from geometry access
    to live production analytics.<br><br>In this role, you’ll develop high-performance
    data access layers and scalable databases, integrate information from systems
    such as PLM, ERP, and MES, and ensure seamless, reliable data flow across the
    enterprise. You’ll continuously monitor and optimize performance to meet the demands
    of real-time, high-speed data operations, and maintain strong documentation to
    keep the system transparent and auditable.<br><br>You’ll work closely with software
    engineers, data scientists, and manufacturing technologists across Anduril in
    a high-tech, fast-paced culture of innovation. If you’re driven to build data
    systems that are fast, resilient, and deeply connected to real-world production,
    you’ll be helping build the future of digital shipbuilding and the next generation
    of maritime vehicles.</p> <h4>WHAT YOU''LL DO</h4> <ul> <li>Design and Implement
    Data Access Layers: Develop high-performance data access layers to handle massive
    datasets, ensuring quick and efficient data retrieval and processing.</li> <li>Database
    Design and Management: Design, implement, and maintain scalable databases suitable
    for high-speed, high-throughput data operations.</li> <li>Data Integration: Integrate
    data from various business systems including PLM, ERP, and MES, ensuring seamless
    and efficient data flow.</li> <li>Performance Optimization: Monitor and optimize
    the performance of data access layers and databases to meet the demands of large-scale,
    real-time data processing.</li> <li>Collaborate with Cross-Functional Teams: Work
    closely with software engineers, data scientists, and other stakeholders to ensure
    the data architecture supports various applications and analytical needs.</li>
    <li>Maintain Documentation: Write and maintain comprehensive documentation for
    data access layers, databases, and data integration processes.</li> </ul> <h4>REQUIRED
    QUALIFICATIONS</h4> <ul> <li>Proficiency in database management systems (e.g.,
    SQL, NoSQL databases like MongoDB, Cassandra).</li> <li>Experience with data warehousing
    solutions (e.g., Amazon Redshift, Google BigQuery).</li> <li>Strong understanding
    of data architecture principles and best practices.</li> <li>Proficiency in programming
    languages used for data engineering (e.g., Python, Java, Scala).</li> <li>Experience
    with big data technologies (e.g., Hadoop, Spark).</li> <li>Familiarity with cloud
    platforms and services (e.g., AWS, Azure, GCP).</li> <li>Strong problem-solving
    skills and ability to handle large volumes of data.</li> <li>Excellent collaboration
    and communication abilities.</li> <li>Eligible to obtain and maintain an active
    U.S. Secret security clearance.</li> </ul> <h4>PREFERRED QUALIFICATIONS</h4> <ul>
    <li>Previous experience in a manufacturing or industrial setting.</li> <li>Experience
    with real-time data processing and stream processing technologies (e.g., Kafka,
    Flink).</li> <li>Knowledge of data governance and data quality management practices.</li>
    <li>Familiarity with containerization (Docker) and orchestration (Kubernetes).</li>
    </ul><div class="content-pay-transparency"><div class="pay-input"><div class="title">US
    Salary Range</div><div class="pay-range"><span>$146,000</span><span class="divider">&mdash;</span><span>$194,000
    USD</span></div></div></div><div class="cont'
