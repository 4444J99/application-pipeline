  description: 'About us At Sierra, we’re creating a platform to help businesses build
    better, more human customer experiences with AI. We are primarily an in-person
    company based in San Francisco, with growing offices in Atlanta, New York, London,
    Paris, Singapore, and Japan. We are guided by a set of values that are at the
    core of our actions and define our culture: Trust, Customer Obsession, Craftsmanship,
    Intensity, and Family. These values are the foundation of our work, and we are
    committed to upholding them in everything we do. Our co-founders are Bret Taylor
    and Clay Bavor . Bret currently serves as Board Chair of OpenAI. Previously, he
    was co-CEO of Salesforce (which had acquired the company he founded, Quip) and
    CTO of Facebook. Bret was also one of Google''s earliest product managers and
    co-creator of Google Maps. Before founding Sierra, Clay spent 18 years at Google,
    where he most recently led Google Labs. Earlier, he started and led Google’s AR/VR
    effort, Project Starline, and Google Lens. Before that, Clay led the product and
    design teams for Google Workspace. What you’ll do As a Software Engineer, Infrastructure
    at Sierra, you will be responsible for designing, building, and maintaining the
    core systems that make our AI platform possible. You’ll focus on making Sierra’s
    infrastructure secure, reliable, and scalable, enabling product teams to deliver
    with speed and confidence. Ensure the reliability, scalability, and performance
    of our platform and LLM inference serving as we rapidly grow traffic. Build and
    maintain cloud infrastructure using Terraform to ensure scalable, secure, and
    reproducible environments. Create and maintain a self-serve infrastructure platform
    that enables the rest of engineering to deploy and operate services. Own and evolve
    CI/CD pipelines and release management, enabling fast, reliable deployments for
    Sierra’s platform. Architect and operate distributed systems that leverage distributed
    databases, retrieval systems, and ML models. Develop and maintain core data serving
    abstractions along with authentication and security features (SSO, RBAC, authentication
    controls). Navigate and integrate our stack with enterprise customer environments
    in scalable and maintainable ways. Enhance observability tooling (metrics, logging,
    tracing) to provide deep visibility into platform health and performance. Lead
    and participate in incident management, improving system resilience through proactive
    monitoring, root cause analysis, and postmortems. What you’ll bring Strong software
    engineering background with 5–7+ years of hands-on development experience in highly
    technical products. A strong inclination towards building automation, tooling,
    and platform, along with designing maintainable systems. Proven experience with
    cloud platforms (AWS, GCP, or Azure) and infrastructure as code (Terraform preferred).
    Hands-on expertise in CI/CD systems, release management, and container orchestration
    (e.g., Docker, Kubernetes). Experience with observability tools (Prometheus, Grafana,
    Datadog, OpenTelemetry, etc.). Experience in incident response and operating distributed
    systems in production. Degree in Computer Science or related field, or equivalent
    professional experience Even better… Production experience working with LLMs and
    machine learning models. Background in distributed systems, running SaaS services
    at scale, and agentic architecture. Familiarity with security and authentication
    protocols (OAuth, SSO, mTLS). Previous experience in a fast-paced startup environment
    or platform/infra-focused team. Our values Trust: We build trust with our customers
    with our accountability, empathy, quality, and responsiveness. We build trust
    in AI by making it more accessible, safe, and useful. We build trust with each
    other by showing up for each other professionally and personally, creating an
    environment that enables all of us to do our best work. Customer Obsession: We
    deeply understand our customers’ business goals and relentlessly focus on driving
    outcomes, not just technical milestones. Everyone at the company knows and spends
    time with our customers. When our customer is having an issue, we drop everything
    and fix it. Craftsmanship: We get the details right, from the words on the page
    to the system architecture. We have good taste. When we notice something isn’t
    right, we take the time to fix it. We are proud of the products we produce. We
    continuously self-reflect to continuously self-improve. Intensity: We know we
    don’t have the luxury of patience. We play to win. We care about our product being
    the best, and when it isn’t, we fix it. When we fail, we talk about it openly
    and without blame so we succeed the next time. Family: We know that balance and
    intensity are compatible, and we model it in our actions and processes. We are
    the best technology company for parents. We support and respect each other and
    celebrate each other’s personal and professional achievements. What we offer We
    want our benefits to reflect '
