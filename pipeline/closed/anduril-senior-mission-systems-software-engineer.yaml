  description: <div class="content-intro"><p>Anduril Industries is a defense technology
    company with a mission to transform U.S. and allied military capabilities with
    advanced technology. By bringing the expertise, technology, and business model
    of the 21st century’s most innovative companies to the defense industry, Anduril
    is changing how military systems are designed, built and sold. Anduril’s family
    of systems is powered by Lattice OS, an AI-powered operating system that turns
    thousands of data streams into a realtime, 3D command and control center. As the
    world enters an era of strategic competition, Anduril is committed to bringing
    cutting-edge autonomy, AI, computer vision, sensor fusion, and networking technology
    to the military in months, not years.</p></div><p data-pm-slice="1 1 []"><strong>WHY
    WE ARE HERE</strong><br>We are seeking a senior software engineer for mission
    systems development of the Fury. Fury is a&nbsp;<strong>high-performance, multi-mission</strong>
    group 5 autonomous air vehicle (AAV) enabling trusted and collaborative autonomy
    for the high-end fight. Engineers in this role will architect, develop, deploy,
    and test software spanning the air vehicle. Our software engineers collaborate
    with other engineering disciplines to develop software for fire control, networking,
    sensor integration, and telemetry. We are looking for engineers excited to build
    the foundational mission systems software stack that supports a wide range of
    initiatives, from early concept simulation to first flight to live operations
    to large scale fleet management.<br><br><strong>WHAT YOU'LL DO</strong></p> <ul>
    <li>Design and write software services for controlling payloads, sensors, and
    radios, which are deployed to real hardware.</li> <li>Integrate 3rd party hardware
    into the greater ecosystem of a large air vehicle.</li> <li>Test software-hardware
    integrations in both virtualized and real-world environments.</li> <li>Enable
    and collaborate with multiple teams to plan, build, and test complex functionality.</li>
    <li>Drive software requirements and specifications with cyber and safety considerations.</li>
    <li>Own and maintain parts of the software roadmap, with detailed breakdown of
    work and milestones tracked against broader program deliverables.</li> </ul> <p><strong>REQUIRED
    QUALIFICATIONS</strong></p> <ul> <li>Strong engineering background from industry
    or school, ideally in areas/fields such as Computer Science, Software Engineering,
    Mathematics, or Physics</li> <li>5+ years working on Linux systems with a variety
    of programming languages such as C++, C, Rust, Python, Go, or Zig (to include
    internship experience)</li> <li>Experience deploying containerized software via
    orchestration tools such as Docker or Kubernetes</li> <li>A desire to work on
    critical software that has a real-world impact</li> <li>Currently possesses and
    is able to maintain an active U.S. Secret security clearance</li> </ul> <p><strong>PREFERRED
    QUALIFICATIONS</strong></p> <ul> <li>Experience working in air-gapped environments
    (without network connectivity) on RHEL systems</li> <li>Knowledge of defense technology
    and tactics, especially in the air domain</li> <li>Knowledge of distributed communication
    networks and message standards</li> <li>Knowledge of Nix and NixOS</li> </ul>
