  description: <div class="content-intro"><p>Anduril Industries is a defense technology
    company with a mission to transform U.S. and allied military capabilities with
    advanced technology. By bringing the expertise, technology, and business model
    of the 21st century’s most innovative companies to the defense industry, Anduril
    is changing how military systems are designed, built and sold. Anduril’s family
    of systems is powered by Lattice OS, an AI-powered operating system that turns
    thousands of data streams into a realtime, 3D command and control center. As the
    world enters an era of strategic competition, Anduril is committed to bringing
    cutting-edge autonomy, AI, computer vision, sensor fusion, and networking technology
    to the military in months, not years.</p></div><h3><strong>ABOUT THE TEAM</strong></h3>
    <p>The Air Dominance &amp; Strike team at Anduril develops aerial and multi-domain
    robotic systems. The team is responsible for taking products like Fury (unmanned
    fighter jet) and Barracuda (air-breathing cruise missile) from concept to product.
    The team also develops Lattice for Mission Autonomy, Anduril’s premier software
    platform that enables masses of Fury, Barracuda, and other first and third party
    robots to collaborate across various missions. We work in close coordination with
    specialist teams like Perception, Motion Planning, Hardware, and Test Engineering
    to solve some of the hardest problems facing our customers. We are looking for
    software engineers and roboticists excited about creating a powerful autonomy
    software stack that includes computer vision, motion planning, SLAM, controls,
    estimation, and secure communications.<strong><br><br>WHAT YOU'LL DO<br></strong></p>
    <ul> <li>Design, build, and deploy a real-time, map-based interface for displaying
    and interacting with sensor data and commanding physical assets</li> <li>Fetch
    and manage large streams of data while maintaining performant rendering in a low-friction
    user experience</li> <li>Build and design immersive image-viewing experiences
    in a web-based platform</li> <li>Take ownership of initial, well-scoped projects
    with clear objectives. Work closely with colleagues to deliver results, understanding
    the importance of teamwork in achieving success.</li> <li>Partner with end-users
    to turn needs into features while balancing user experience with engineering constraints</li>
    <li>Travel up to 30% of time to build, test, and deploy capabilities in the real
    world</li> </ul> <h4><strong>REQUIRED QUALIFICATIONS:<br></strong></h4> <ul> <li>Eligible
