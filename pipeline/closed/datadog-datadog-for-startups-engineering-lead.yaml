    <li> <p>Excellent communication skills: equally effective in technical deep-dives
    and business-level storytelling.</p> </li> <li> <p>Builder: eager to shape a hybrid
    BD + technical role in a fast-scaling program while also able to get hands on
    and build both for DDFS and with startups using Datadog.</p> </li> <li> <p>Storyteller:
    able to translate technical differentiators into startup-relevant business value.</p>
    </li> <li> <p>Startup advocate: passionate about helping early-stage companies
    scale successfully with Datadog.</p> </li> </ul> <p>&nbsp;</p> <p><strong>Nice-to-Haves</strong></p>
    <ul> <li> <p>Strong knowledge of Datadog’s product suite and observability/security
    ecosystem.</p> </li> <li> <p>A former technical founder or engineering leader
    at a startup.</p> </li> <li> <p>Experience running or speaking at startup/technical
    events.</p> </li> <li> <p>Background in developer advocacy, community building,
    or technical marketing.</p> </li> <li> <p>Knowledge of VC/accelerator ecosystems
    and startup go-to-market motion.</p> </li> <li> <p>Hands-on ability to articulate
