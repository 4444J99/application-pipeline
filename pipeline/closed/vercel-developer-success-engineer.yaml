    \ go-live readiness, and post-launch stabilization\u2014that help unblock progress\
    \ and set customers up for long-term success on Vercel. They work with a wide\
    \ variety of customers\u2014from fast-moving startups to established enterprises\u2014\
    adapting their approach to match the needs and pace of each.</p> <p>These engagements\
    \ are designed as short, focused sprints with clear objectives, allowing DSEs\
    \ to work with many customers while delivering meaningful impact. By focusing\
    \ on production-readiness, performance, and optimization, DSEs ensure customers\
    \ can launch with confidence and scale effectively.</p> <p>Beyond individual engagements,\
    \ DSEs capture repeatable solutions and translate them into documentation, playbooks,\
    \ and best practices\u2014extending the impact of their work to thousands of developers.\
    \ In doing so, they strengthen Vercel\u2019s customer intelligence, reduce friction\
    \ across the developer journey, and improve the overall efficiency of our customer\
    \ experience.</p> <h2>What You Will Do:</h2> <ul> <li>Lead customers\u2014from\
    \ fast-paced startups to established enterprises\u2014through defined technical\
    \ motions that accelerate their adoption and launch on Vercel</li> <li>Provide\
    \ implementation guidance to ensure deployments follow best practices for builds,\
    \ caching, web performance, and cost efficiency</li> <li>Troubleshoot and resolve\
    \ technical challenges related to Next.js, serverless functions, build pipelines,\
    \ and integrations</li> <li>Identify and unblock opportunities for customer growth\
    \ and expansion</li> <li>Author and maintain resources\u2014including internal\
    \ playbooks, external documentation, and knowledge base articles\u2014that scale\
    \ learnings across internal teams and customers</li> <li>Partner with Sales, Support,\
    \ and Product teams to escalate complex issues, close feedback loops, and influence\
    \ product improvements</li> <li>Spot patterns in customer challenges and proactively\
    \ recommend optimizations or new motions that improve adoption at scale</li> </ul>\
    \ <h2>About You:</h2> <ul> <li>3+ years of experience in frontend development,\
    \ technical support, solutions engineering, or customer-facing technical role</li>\
    \ <li>Strong knowledge of Next.js, React, and modern web performance best practices</li>\
    \ <li>Familiarity with troubleshooting frontend build systems, serverless runtimes,\
    \ and API integrations</li> <li>Ability to diagnose complex technical issues and\
    \ provide structured recommendations with empathy and clarity</li> <li>Strong\
    \ communication skills\u2014you can explain technical concepts clearly in writing,\
    \ async channels, and live conversations.</li> <li>Must have used Vercel or Next.js,\
    \ or a comparable platform.</li> <li>Passion for helping developers succeed by\
    \ delivering clear guidance, reducing friction, and creating scalable resources.</li>\
    \ </ul> <h2>Bonus If You:</h2> <ul> <li>Have contributed to open-source projects,\
    \ technical documentation, or developer advocacy initiatives</li> <li>Bring experience\
    \ in incident management, debugging serverless functions, or optimizing frontend\
    \ performance</li> <li>Are comfortable working in a fast-paced, global, remote-friendly\
    \ environment</li> </ul> <h2>Benefits:</h2> <ul> <li data-stringify-indent=\"\
    0\" data-stringify-border=\"0\">Competitive compensation package, including equity.</li>\
    \ <li data-stringify-indent=\"0\" data-stringify-border=\"0\">Inclusive Healthcare\
    \ Package.</li> <li data-stringify-indent=\"0\" data-stringify-border=\"0\">Learn\
    \ and Grow - we provide mentorship and send you to events that help you build\
    \ your network and skills.</li> <li data-stringify-indent=\"0\" data-stringify-border=\"\
    0\">Flexible Time Off.</li> <li data-stringify-indent=\"0\" data-stringify-border=\"\
    0\">We will provide you the gear you need to do your role, and a WFH budget for\
