    \ build for the AI-native web.<br></span></p> <p><span data-sheets-root=\"1\"\
    >Our mission is to enable the world to ship the best products. That starts with\
    \ creating a place where everyone can do their best work. Whether you're building\
    \ on our platform, supporting our customers, or shaping our story: You can just\
    \ ship things.</span></p></div><h2>About The Role:</h2> <p>Vercel is hiring a\
    \ Developer Success Engineer (DSE) to accelerate adoption and unlock growth by\
