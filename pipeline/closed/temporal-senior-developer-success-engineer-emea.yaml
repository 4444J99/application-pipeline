    managing medium to large-scale architectures (e.g., Kubernetes or Docker).</li>
    <li>Experience with monitoring tools such as Prometheus and Grafana and troubleshooting
    performance and availability issues.</li> <li>Minimum of one year experience in
    an internal or external customer-facing role.</li> <li>Passion for helping others
    regardless of who they are or how they act.</li> <li>Experience working with or
    as part of remote teams.</li> <li>Strong written and verbal communication skills.</li>
