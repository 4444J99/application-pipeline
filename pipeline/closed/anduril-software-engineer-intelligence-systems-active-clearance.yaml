  description: '<div class="content-intro"><p>Anduril Industries is a defense technology
    company with a mission to transform U.S. and allied military capabilities with
    advanced technology. By bringing the expertise, technology, and business model
    of the 21st century’s most innovative companies to the defense industry, Anduril
    is changing how military systems are designed, built and sold. Anduril’s family
    of systems is powered by Lattice OS, an AI-powered operating system that turns
    thousands of data streams into a realtime, 3D command and control center. As the
    world enters an era of strategic competition, Anduril is committed to bringing
    cutting-edge autonomy, AI, computer vision, sensor fusion, and networking technology
    to the military in months, not years.</p></div><p><strong>ABOUT THE TEAM</strong><br>Anduril
    builds world-class autonomous systems and distributed networking technologies
    that integrate sensors, compute, comms, and services into mission-critical operational
    effects. We’re expanding our software team to include a dedicated engineer to
    lead federation efforts to integrate various third-party software with internally
    developed systems that ensure secure, scalable, low-latency interoperability across
    systems.<br><br>As part of this team, you’ll design, implement, and operate core
    distributed systems supporting federation protocols, identity/auth workflows,
    API contracts, event routing, and resilient networking services used in production
    across cloud and on-prem environments. You’ll work closely with frontend developers,
    backend engineers, infrastructure, and product counterparts to drive federation
    strategy and execution.<br><br>Anduril’s software teams build from cloud to edge,
    use modern languages and frameworks, and value ownership, quality, and real-world
    impact. Federation is the connective tissue that enables Anduril’s products, partner
    systems, and third-party interfaces to interoperate securely and at scale. This
    role drives foundational technology that directly impacts how distributed systems
    collaborate in mission environments.<br><br><strong>WHAT YOU’LL DO</strong><br>Design
    &amp; Implementation</p> <ul> <li>Architect, build, test, and deploy federation
    infrastructure supporting various third-party services and integrating with internally
    developed systems</li> <li>Develop APIs that enable secure interoperability with
    external partners.</li> <li>Build backend services in Go focused on performance,
    observability, and reliability.</li> </ul> <p>Frontend &amp; Full-Stack Collaboration</p>
    <ul> <li>Partner with frontend developers building federation-aware UIs (React/TS)
    for administration and observability.</li> <li>Ensure service APIs meet needs
    of both UI and system consumers.</li> </ul> <p>Distributed Systems &amp; Networking</p>
    <ul> <li>Solve complex networking and protocol challenges for reliable federation
    across public/private networks.</li> <li>Implement federation handlers, event
    queues, delivery guarantees, and retry/backoff strategies.</li> </ul> <p>Platform
    &amp; Deployment</p> <ul> <li>Work with Kubernetes and Terraform for service deployment,
    scaling, and secure isolation.</li> <li>Monitor, troubleshoot, and optimize services
    in cloud and hybrid environments.</li> </ul> <p>Cross-Team Integration</p> <ul>
    <li>Drive integration with other platform teams, security, and storage services.</li>
    </ul> <p><br><strong>REQUIRED QUALIFICATIONS</strong><br>Core Software Skills</p>
    <ul> <li>Strong backend development experience; primary language: Go (production
    services).</li> <li>Solid understanding of networking fundamentals, distributed
    protocols, and security practices.</li> </ul> <p>Federation &amp; Protocols</p>
    <ul> <li>Experience implementing or consuming federation protocols (Matrix, XMPP,
    SIP, WebRTC, or similar).</li> <li>Understanding of authentication/authorization,
    token flows, and federated identity workflows.</li> </ul> <p>Cloud &amp; Infrastructure</p>
    <ul> <li>Kubernetes experience (deploying, managing, troubleshooting workloads).</li>
    <li>Familiar with CI/CD, Terraform, containerization (Docker).</li> <li>Linux
    and cloud experience (AWS/GCP/Azure).</li> </ul> <p>General</p> <ul> <li>3+ years
    of professional software engineering experience (backend systems, distributed
    services).</li> <li>Excellent problem solving, communication, and collaboration
    across teams.</li> <li>Currently possesses and is able to maintain an active U.S.
    Top Secret SCI security clearance</li> </ul> <p><strong>PREFERRED QUALIFICATIONS</strong></p>
    <ul> <li>Prior work with scalable federation solutions, real-time messaging systems,
    or federated video architectures.</li> <li>Comfortable with React/TypeScript and
    integrating frontend needs with backend APIs.</li> <li>Experience building scale-aware
    services with observability (metrics, logging, tracing).</li> <li>Familiar with
    React or functional UI frameworks.</li> <li>Experience in defense or regulated
    environments.</li> </ul><div class="content-pay-transpare'
