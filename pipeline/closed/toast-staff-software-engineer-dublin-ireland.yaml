    practices.</li> <li>Work directly with pilot customers (sometimes in the restaurant!)
    to ensure successful delivery and operation</li> <li>Advocate for best coding
    practices, raising the bar for yourself, your team, and the company.</li> <li><span
    data-sheets-root="1">Leverage cutting edge AI tools to enhance your development
    workflow, improve velocity, and help pioneer new approaches to building - contributing
