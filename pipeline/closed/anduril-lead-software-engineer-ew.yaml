  description: <div class="content-intro"><p>Anduril Industries is a defense technology
    company with a mission to transform U.S. and allied military capabilities with
    advanced technology. By bringing the expertise, technology, and business model
    of the 21st century’s most innovative companies to the defense industry, Anduril
    is changing how military systems are designed, built and sold. Anduril’s family
    of systems is powered by Lattice OS, an AI-powered operating system that turns
    thousands of data streams into a realtime, 3D command and control center. As the
    world enters an era of strategic competition, Anduril is committed to bringing
    cutting-edge autonomy, AI, computer vision, sensor fusion, and networking technology
    to the military in months, not years.</p></div><h3>ABOUT THE TEAM</h3> <p class="p1">Anduril’s
    Electromagnetic Warfare (EW) team is seeking functional programming technology
    leaders to scale up&nbsp;our proven approach and maximize the benefits of functional&nbsp;programming
    for our customers. As a lead Haskell engineer&nbsp;you’ll work with EW leadership
    to craft our software&nbsp;roadmap, design large scale systems using functional
    programming and algebra driven design principles, and build teams to execute our
    shared vision. You’ll work with industry leaders in mechanical, electrical, RF,
    and FPGA design&nbsp;to deliver the next generation of EW capabilities to our
    end&nbsp;users. You’ll do all this while rubbing elbows with some of&nbsp;the
    top minds in the Haskell ecosystem, tapping in to many&nbsp;decades of collective
    functional programming experience.</p> <p><strong>WHAT YOU'LL DO</strong></p>
    <ul> <li>Lead teams of <strong>Haskell</strong> developers to to implement high
    performance, high assurance software systems</li> <li>Participate in EW technology
    roadmapping, software architecture, and holistic design review processes&nbsp;</li>
    <li>Build teams to scale the execution of our proven FP based software development
    approach</li> </ul> <h4>REQUIRED QUALIFICATIONS</h4> <ul> <li class="p1">Experience
    building and leading teams dedicated to the functional programming approach</li>
    <li>Eligible to obtain and maintain an active U.S. Top Secret SCI security clearance</li>
    <li class="p1">Ability to relocate to and work in person in our RF laboratory
    in Orange County, California</li> </ul> <h4>PREFERRED QUALIFICATIONS</h4> <ul>
    <li class="p1">Experience (professional or in the setting of an open source community)
    working with typed functional programming languages (<strong>Haskell</strong>,
