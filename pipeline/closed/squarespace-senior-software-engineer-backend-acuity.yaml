  description: '<p>The Acuity Scheduling team is looking for experienced Backend Engineers
    to join our Acuity Engineering team.</p> <p>Acuity Scheduling is a distinct brand
    and platform within the Squarespace suite of products whose mission is to help
    appointment-based businesses start and grow their service by allowing clients
    to directly schedule appointments, removing administrative burden, and giving
    our users more time to focus on what they love doing.</p> <p>As a Backend Engineer,
    your work will focus on architecture, performance and scalability. You will be
    actively involved in the end-to-end development of multiple components and in
    the long-term vision of Squarespace.</p> <p>This is a hybrid role working from
    our Dublin office 3 days per week. You will report to the Software Engineering
    Manager. You will be part of Squarespace''s initial primary team in the country
    and help grow our Ireland presence into a market reference.</p> <h2>You''ll Get
    To…</h2> <ul> <li>Take a lead role with other engineers to provide a rock solid
    platform</li> <li>Collaborate with teammates, and product, design, analytics,
    and customer operations to understand why we build the features we do</li> <li>Help
    the team improve the existing codebase by promoting thoughtful design patterns
    and disciplined software engineering (e.g. automated testing, code reviews, and
    writing beautiful, readable code)</li> <li>Scale and improve the performance of
    applications and databases</li> <li>Manage engineering workstreams to accelerate
    our velocity, supporting stakeholders along the way.</li> <li>Actively contribute
    to team processes and mentor peers as we continue to grow</li> </ul> <h2>Who We''re
    Looking For</h2> <ul> <li>5+ years of Go, Java, PHP or other object-oriented language
    application development</li> <li>2+ years of experience using relational databases,
    such as MySQL or PostgreSQL</li> <li>A solid foundation in computer science, with
    competencies in data structures, algorithms, and software design practices</li>
    <li>A sincere commitment to creating readable code and a desire to write clear
    and practical technical documentation</li> <li>A degree in Computer Science or
    related or equivalent industry experience</li> </ul> <h2>Benefits &amp; Perks</h2>
    <ul> <li>Health insurance with 100% covered premiums for you, your spouse or partner
    and your dependent children including medical, dental, and vision</li> <li>Life
    and Income Protection</li> <li>Fertility and adoption benefits</li> <li>Headspace
    mindfulness app subscription</li> <li>Global Employee Assistance Program</li>
    <li>Pension benefits with employer match</li> <li>Flexible paid time off</li>
    <li>26 weeks paid maternity leave &amp; 12 weeks paid paternity leave</li> <li>2
    weeks paid family care leave</li> <li>Education reimbursement</li> <li>Employee
    donation match to community organizations</li> <li>7 Global Employee Resource
    Groups (ERGs)</li> <li>Free lunch and snacks</li> <li>Close proximity to cultural
    landmarks such as Dublin Castle and St. Patrick''s Cathedral</li> </ul> <h2>About
    Squarespace</h2> <p>Squarespace is a design-driven platform helping entrepreneurs
    build brands and businesses online. We empower millions of customers in more than
    200 countries and territories with all the tools they need to create an online
    presence, build an audience, monetize, and scale their business. Our suite of
    products range from websites, domains, ecommerce, and marketing tools, as well
    as tools for scheduling with Acuity and creating and managing social media presence
    with Bio Sites and Unfold. Our team of more than 1,700 is headquartered in New
    York City, with offices in Dublin, Ireland, and Aveiro, Portugal. For more information
    about our company, visit <a href="https://www.squarespace.com/about/careers" target="_blank">https://www.squarespace.com/about/careers</a>.</p>
    <h2>Our Commitment</h2> <p>Today, more than a million people around the globe
    use Squarespace to share different perspectives and experiences with the world.
    Not only do we embrace and celebrate the diversity of our customer base, but we
    also strive for the same in our employees. At Squarespace, we are committed to
    equal employment opportunity regardless of race, color, ethnicity, ancestry, religion,
    national origin, gender, sex, gender identity or expression, sexual orientation,
    age, citizenship, marital or parental status, disability, veteran status, or other
    class protected by applicable law. We are proud to be an equal opportunity workplace.</p><div
    class="content-conclusion"><p style="text-align: center;"><strong>Thank you in
    advance for providing the following details about your work history from your
    resume! This helps us ensure that your candidate information is accurate and consistent
    during the hiring process.</strong></p> <p style="text-align: center;">&nbsp;</p>
    <p style="text-align: center;"><strong>Squarespace will never solicit your personal
    banking information or ask you to transfer money in connection with a job offer'
