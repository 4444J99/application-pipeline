    emerging needs (e.g., JAX, PyTorch, distributed training ) and translate them
    into robust, scalable infrastructure solutions. Champion best practices : Advocate
    for observability, automation, and infrastructure-as-code (IaC) across the organization,
    ensuring systems are maintainable and resilient. Mentorship and collaboration
    : Share expertise through code reviews, documentation, and cross-team collaboration,
    fostering a culture of knowledge transfer and engineering excellence . You may
    be a good fit if you have: Deep expertise in ML/HPC infrastructure : Experience
    with GPU/TPU clusters, distributed training frameworks (JAX, PyTorch, TensorFlow),
    and high-performance computing (HPC) environments . Kubernetes at scale : Proven
    ability to deploy, manage, and troubleshoot cloud-native Kubernetes clusters for
    AI workloads. Strong programming skills : Proficiency in Python (for ML tooling)
