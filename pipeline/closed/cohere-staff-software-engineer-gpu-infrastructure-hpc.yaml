    for building and operating superclusters across multiple clouds. Your work will
    directly accelerate the development of industry-leading AI models that power Cohere''s
    platform North. Please Note: All of our infrastructure roles require participating
    in a 24x7 on-call rotation, where you are compensated for your on-call schedule.
