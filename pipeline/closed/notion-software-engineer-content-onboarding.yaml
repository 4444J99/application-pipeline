  description: 'About Us: Notion helps you build beautiful tools for your life’s work.
    In today''s world of endless apps and tabs, Notion provides one place for teams
    to get everything done, seamlessly connecting docs, notes, projects, calendar,
    and email—with AI built in to find answers and automate work. Millions of users,
    from individuals to large organizations like Toyota, Figma, and OpenAI, love Notion
    for its flexibility and choose it because it helps them save time and money. In-person
    collaboration is essential to Notion''s culture. We require all team members to
    work from our offices on Mondays, Tuesdays, and Thursdays, our designated Anchor
    Days. Certain teams or positions may require additional in-office workdays. About
    the role This is a product-focused engineering role on Notion’s Content Onboarding
    team. You’ll build import and migration experiences that help individuals and
    enterprises bring existing content into Notion with high fidelity and reliability.
    You’ll work across the stack, partnering closely with product, design, and go-to-market
    teams to ship features end-to-end. The work spans user-facing flows, backend systems
    for large data movement, and the operational tooling needed to diagnose and improve
    reliability at scale. What You''ll Achieve: You’ll contribute to Notion''s user
    growth by building a delightful user experience that enables users to seamlessly
    migrate their content from existing productivity tools. You’ll contribute to the
    overall design, scale, reliability and robustness of the systems responsible for
    moving large amounts of customer data into and out of Notion. You would be enabling
    Notion move upmarket by working with a team of engineers and cross-functional
    partners across product, design & professional services to reliably migrate some
    of Notion’s biggest Enterprise customers from third-party applications. Skills
    You''ll Need to Bring: Proven track record of execution: You have 5+ years of
    engineering experience, including several years building world-class product experiences
    alongside a team of engineers. Building the team: You enjoy collaborating with
    both fellow engineers and cross-functional partners. You are a lifelong learner
    and invest in both your own growth, but also the growth, learning, and development
    of your teammates. Thoughtful problem-solving: You approach problems holistically,
    starting with a clear and accurate understanding of the context. You think critically
    about the implications of what you''re building and how it will impact real people''s
    lives. You can navigate ambiguity flawlessly, decompose complex problems into
    clean solutions, while also balancing the business impact of what you’re building.
    Not ideological about technology: To you, technologies and programming languages
    are about tradeoffs. You may be opinionated, but you''re not ideological and can
    learn new technologies as you go. Empathetic communication: You clearly communicate
    complex ideas to both technical and non-technical stakeholders—whether you''re
    explaining technical decisions in writing or brainstorming in real time. In disagreements,
    you engage thoughtfully with other perspectives and compromise when needed. We
    hire talented and passionate people from a variety of backgrounds because we want
    our global employee base to represent the wide diversity of our customers. If
    you’re excited about a role but your past experience doesn’t align perfectly with
    every bullet point listed in the job description, we still encourage you to apply.
    If you’re a builder at heart, share our company values, and enthusiastic about
    making software toolmaking ubiquitous, we want to hear from you. Notion is proud
    to be an equal opportunity employer. We do not discriminate in hiring or any employment
    decision based on race, color, religion, national origin, age, sex (including
    pregnancy, childbirth, or related medical conditions), marital status, ancestry,
    physical or mental disability, genetic information, veteran status, gender identity
    or expression, sexual orientation, or other applicable legally protected characteristic.
    Notion considers qualified applicants with criminal histories, consistent with
    applicable federal, state and local law. Notion is also committed to providing
    reasonable accommodations for qualified individuals with disabilities and disabled
    veterans in our job application procedures. If you need assistance or an accommodation
    due to a disability, please let your recruiter know. By clicking “Submit Application”,
    I understand and agree that Notion and its affiliates and subsidiaries will collect
    and process my information in accordance with Notion’s Global Recruiting Privacy
    Policy . #LI-Onsite'
