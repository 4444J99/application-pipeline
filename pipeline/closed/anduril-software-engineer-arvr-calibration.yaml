  description: <div class="content-intro"><p>Anduril Industries is a defense technology
    company with a mission to transform U.S. and allied military capabilities with
    advanced technology. By bringing the expertise, technology, and business model
    of the 21st century’s most innovative companies to the defense industry, Anduril
    is changing how military systems are designed, built and sold. Anduril’s family
    of systems is powered by Lattice OS, an AI-powered operating system that turns
    thousands of data streams into a realtime, 3D command and control center. As the
    world enters an era of strategic competition, Anduril is committed to bringing
    cutting-edge autonomy, AI, computer vision, sensor fusion, and networking technology
    to the military in months, not years.</p></div><h3><strong>ABOUT THE TEAM</strong></h3>
    <p>The WFOS (Warfighter OS) Display Software and Calibration team at Anduril develops
    display pipeline software, firmware, and calibration systems for our AR/VR products
    including our <a href="https://www.anduril.com/eagleeye">Eagle Eye</a> program.
    We focus on developing a software platform that delivers app graphics and sensor
    feeds to display hardware, solving complex technical challenges to achieve exceptional
    image quality with minimal latency.<br><br>As an engineer on our Display Calibration
    team, you will be instrumental in developing and validating innovative techniques
    for optical tests and calibration, ensuring that our mixed reality displays perform
    at their absolute best in mission-critical environments. Join us to push the boundaries
    of display technology and contribute to creating products that are critical to
    enhancing situational awareness and operational success on the modern battlefield.</p>
    <h3>Key Responsibilities</h3> <ul> <li><strong>Prototype-to-Production Development:</strong>
    Lead the complete cycle from modeling to production, developing calibration algorithms
    that meet rigorous operational requirements.</li> <li><strong>Cross-Disciplinary
    Collaboration:</strong> Work closely with system engineers, perception experts,
    testing teams, and calibration leads to refine and deploy robust methodologies.</li>
    <li><strong>Innovative Validation Techniques:</strong> Design and implement optical
    test protocols that validate and enhance display performance across various Anduril
    products.</li> </ul> <h3>WHAT YOU’LL DO:</h3> <ul> <li>Design and develop algorithms
    and production software for photometric display calibration of AR/VR displays</li>
    <li>Design and develop on-device APIs and tools to facilitate display calibration</li>
    <li>Diagnose and resolve display calibration issues in the production environment,
    working with internal teams and manufacturing partners to implement fixes</li>
    </ul> <h3>REQUIRED QUALIFICATIONS:</h3> <ul> <li>Bachelor’s or Master’s degree
    in Computer Engineering, Electrical Engineering, Computer Science or related technical
    field</li> <li>5+ years of work experience with displays, optics or equivalent
    work experience</li> <li>Strong proficiency in C++</li> <li>Experience in computer
    vision and image processing</li> <li>Excellent communication skills for working
    across hardware and software teams</li> </ul> <h3>PREFERRED QUALIFICATIONS:</h3>
    <ul> <li>Masters or PhD degree in optics, electrical engineering, computational
    imaging, a related field, or equivalent practical experience</li> <li>Proficiency
    in Python<u>,</u> OpenCV and Matlab</li> <li>Experience in embedded systems, AR/VR
    devices, color/light measurement instruments, camera optics, robot and stage motion
    control, and common communication protocols</li> <li>Experience in device manufacturing
    calibration stations</li> <li>Experience in electronic color display and display
    metrology</li> <li>Experience with prototype builds and testing</li> </ul><div
