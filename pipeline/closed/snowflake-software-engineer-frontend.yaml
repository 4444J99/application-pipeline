  description: 'Snowflake is about empowering enterprises to achieve their full potential
    — and people too. With a culture that’s all in on impact, innovation, and collaboration,
    Snowflake is the sweet spot for building big, moving fast, and taking technology
    — and careers — to the next level. Snowflake is about empowering enterprises to
    achieve their full potential — and people too. With a culture that’s all in on
    impact, innovation, and collaboration, Snowflake is the sweet spot for building
    big, moving fast, and taking technology — and careers — to the next level. We’re
    at the forefront of the data revolution, committed to building the world’s greatest
    data and applications platform. Snowflake started with a clear vision: develop
    a cloud data platform that is effective, affordable, and accessible to all data
    users. Data Cloud allows sharing live data in governed and secure ways so our
    customers can solve their business problems. Come join our world-class team as
    a Frontend Software Engineer to build customer-facing services for the AI Data
    Cloud. We are looking for a Software Engineer who is passionate about creating
    exceptional user experiences and driving customer value. AS A FRONTEND SOFTWARE
    ENGINEER, YOU WILL: Design, develop, and deliver highly interactive and responsive
    user interfaces that have a direct impact on our customers and partners. Work
    closely with Designers and Product Managers to translate complex requirements
    into intuitive workflows. Architect and build robust, reusable frontend components
    and state management systems using TypeScript and React. Optimize web performance
    to ensure a seamless experience, focusing on core web vitals and efficient data
    rendering. Write clean, well-tested, and maintainable code, while contributing
    to our shared design system and internal frontend standards. OUR IDEAL CANDIDATE
    WILL HAVE: 2–5 years'' of industry experience specializing in frontend development
    for scalable web applications. Strong foundation on the modern frontend stack,
    including fluency React and Typescript. Strong fundamental computer science skills.
    Knowledge of algorithms and data structures. A strong understanding of core computer
    science concepts and web application architecture, including security, performance,
    and scalability. A genuine passion for building customer-facing products and a
    drive to solve problems that create real value for users. Experience collaborating
    with backend teams to define API contracts that power dynamic frontend experiences.
    BS/MS/PhD in Computer Science or related majors, or equivalent experience. Snowflake
    is growing fast, and we’re scaling our team to help enable and accelerate our
    growth. We are looking for people who share our values, challenge ordinary thinking,
    and push the pace of innovation while building a future for themselves and Snowflake.
    How do you want to make your impact? For jobs located in the United States, please
    visit the job posting on the Snowflake Careers Site for salary and benefits information:
    careers.snowflake.com'
