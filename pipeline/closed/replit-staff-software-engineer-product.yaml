  description: 'Replit is the agentic software creation platform that enables anyone
    to build applications using natural language. With millions of users worldwide,
    Replit is democratizing software development by removing traditional barriers
    to application creation. About the role: As a Staff Product Engineer at Replit,
    you’ll work closely with other product and platform engineers, designers, sales
    representative, and product managers to build features that help users collaborate
    with their team to go from idea to software fast. You’ll be at the forefront of
    shaping and experimenting on what our tens of millions of users love. You will:
    Help lead major projects and take new products from 0->1 Identify the hardest
    technical and/or quality problems holding us back, and then build solutions Chart
    high level technical direction and follow up to make sure those projects come
    together to deliver on results Mentor and develop new senior engineers to help
    grow the team Ship new features and build infrastructure using: TypeScript, React,
    CSS, GraphQL, Node.js, and Postgres Required skills and experience: A minimum
    of 7 years of professional software development experience Experience in a technical
    leadership role, working cross functionally Working experience building full stack
    applications with TypeScript Working experience building directly for users Bonus
    Points : You’re excited about the future of programming and have experience working
    with IDEs, terminals, or other common developer tools You’ve had previous experience
    working at a startup in a cross-functional engineering role This is a full-time
    role that can be held from our Foster City, CA office. The hybrid role has an
    in-office requirement of Monday, Wednesday, and Friday. Full-Time Employee Benefits
    Include: 💰 Competitive Salary & Equity 💹 401(k) Program with a 4% match ⚕️ Health,
    Dental, Vision and Life Insurance 🩼 Short Term and Long Term Disability 🚼 Paid
    Parental, Medical, Caregiver Leave 🚗 Commuter Benefits 📱 Monthly Wellness Stipend
    🧑‍💻 Autonomous Work Environment 🖥 In Office Set-Up Reimbursement 🏝 Flexible Time
    Off (FTO) + Holidays 🚀 Quarterly Team Gatherings ☕ In Office Amenities Want to
    learn more about what we are up to? Meet the Replit Agent Replit: Make an app
    for that Replit Blog Amjad TED Talk Interviewing + Culture at Replit Operating
    Principles Reasons not to work at Replit To achieve our mission of making programming
    more accessible around the world, we need our team to be representative of the
    world. We welcome your unique perspective and experiences in shaping this product.
    We encourage people from all kinds of backgrounds to apply, including and especially
    candidates from underrepresented and non-traditional backgrounds.'
