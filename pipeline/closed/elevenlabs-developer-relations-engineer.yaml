  description: 'About ElevenLabs ElevenLabs is an AI research and product company
    transforming how we interact with technology. We launched in January 2023 with
    the first human-like AI voice model. Today, we serve millions of users and thousands
    of businesses - from fast-growing startups to large enterprises like Deutsche
    Telekom and Meta. Our investors are some of the world''s most prominent, including
    Andreessen Horowitz, ICONIQ Growth and Sequoia. We''ve raised $781M in funding
    and our last valuation was $11B - multiples of 11, always. We have expanded from
    voice into three main platforms: ElevenAgents enables businesses to deliver seamless
    and intelligent customer experiences, with the integrations, testing, monitoring,
    and reliability necessary to deploy voice and chat agents at scale. ElevenCreative
    empowers creators and marketers to generate and edit speech, music, image, and
    video across 70+ languages. ElevenAPI gives developers access to our leading AI
    audio foundational models. Everything we do is the result of the creativity and
    commitment of our team - builders doing the best work of their lives. We are researchers,
    engineers, and operators. IOI medalists and ex-founders. If you want to work hard
    and create lasting positive impact, we want to hear from you. How we work High-velocity:
    Rapid experimentation, lean autonomous teams, and minimal bureaucracy. Impact
    not job titles: We don’t have job titles. Instead, it’s about the impact you have.
    No task is above or beneath you. AI first: We use AI to move faster with higher-quality
    results. We do this across the whole company—from engineering to growth to operations.
    Excellence everywhere: Everything we do should match the quality of our AI models.
    Global team: We prioritize your talent, not your location. What we offer Innovative
    culture: You’ll be part of a generational opportunity to define the trajectory
    of AI, surrounded by a team pushing the boundaries of what’s possible. Growth
    paths: Joining ElevenLabs means joining a dynamic team with countless opportunities
    to drive impact - beyond your immediate role and responsibilities. Learning &
    development : ElevenLabs proactively supports professional development through
    an annual discretionary stipend. Social travel : We also provide an annual discretionary
    stipend to meet up with colleagues each year, however you choose. Annual company
    offsite: Each year, we bring the entire team together in a new location - past
    offsites have included Croatia and Italy. Co-working : If you’re not located near
    one of our main hubs, we offer a monthly co-working stipend. About the role We’re
    hiring a Developer Relations Engineer. In this role, you’ll play a core part in
    improving our developer experience — particularly our documentation and example
    projects. You’ll dive deep into where users are getting stuck and ship what they
    need to succeed. You’ll also help drive acquisition of our technical, self-serve
    customers by creating and presenting engaging content online and in-person — especially
    at developer meetups and conferences across the US, with a focus on events in
    the San Francisco Bay Area. This role is perfect for someone who can create compelling
    technical content and is energized by connecting with developers face-to-face.
    Requirements You love attending, organizing, and speaking at developer events.
    You''re able to tailor messaging for different audiences and build strong networks
    with developers, startup accelerators, and VCs alike. A strong full-stack engineering
    skillset with an eye for design — bonus points if you leverage new AI coding tools.
    The ability to come up with great ideas for tutorials, build working demos, and
    create high-quality blog posts and talks. A passion for writing engaging technical
    content. A product-minded approach to content: you understand metrics, speak to
    users, decide what to build/write based on needs, and double down on what works.
    Location This role is remote and can be executed globally. If you prefer, you
    can work from our offices in Bangalore, Dublin, London, New York, San Francisco,
    Tokyo, and Warsaw. #LI-Remote'
