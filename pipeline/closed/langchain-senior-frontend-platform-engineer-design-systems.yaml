  description: 'About Us: At LangChain, our mission is to make intelligent agents
    ubiquitous. We build the foundation for agent engineering in the real world, helping
    developers move from prototypes to production-ready AI agents that teams can rely
    on. We began as widely adopted open-source tools and have grown to also offer
    a platform for building, evaluating, deploying, and operating agents at scale.
    Today, LangChain, LangGraph, LangSmith, and Agent Builder are used by teams shipping
    real AI products across startups and large enterprises. Millions of developers
    trust LangChain to power AI teams at companies like Replit, Clay, Coinbase, Workday,
    Lyft, Cloudflare, Harvey, Rippling, Vanta, and 35% of the Fortune 500 . With $125M
    raised at Series B from IVP, Sequoia, Benchmark, CapitalG, and Sapphire Ventures
    , we’re at a stage where we’re continuing to develop new products, growth is accelerating,
    and all team members have meaningful impact on what we build and how we work together.
    LangChain is a place where your contributions can shape how this technology shows
    up in the real world. About the Role: LangChain is building the infrastructure
    that powers the next generation of AI applications. Our tools are used by thousands
    of developers and teams to build, debug, and ship production-grade LLM-powered
    products. As our product surface area grows, so does the need for a cohesive,
    scalable, and high-quality UI foundation . That’s where Design Systems comes in.
    We’re looking for a Design Systems Engineer to help build, own, and evolve LangChain’s
    component library —the foundation that our frontend teams rely on to ship fast
    without sacrificing quality, accessibility, or consistency. This role sits at
    the intersection of Design and Engineering . You’ll work closely with designers,
    product engineers, and platform teams to turn design intent into robust, reusable
    components and tooling that scale across the product. You’ll have ownership, influence,
    and your work will be directly consumed across LangChain’s products. What You’ll
    Do: Build and own LangChain’s component library Design and implement reusable,
    composable React components that are flexible, accessible, and production-ready
    Partner closely with designers to translate design systems, tokens, and interaction
    patterns into code Build reliable UI quality systems Develop design system tooling
    and improve workflows around theming, tokens, versioning, testing, and component
    discovery (e.g. Storybook) Make thoughtful architectural decisions that enable
    accessibility, performance, consistency, and maintainability across LangChain’s
    UI stack Improve UI build and test workflows Optimize build performance, bundling
    strategy, and package versioning for the component library Maintain tooling for
    testing, dependency management of the UI app How to be successful in this role:
    Strong experience building modular, composable, and well-documented component
    libraries and/or design systems Deep knowledge of React, TypeScript, HTML, and
    CSS, f amiliarity with: styling approaches (CSS Modules, CSS-in-JS, Tailwind,
    Sass, etc.) and design system toolings (Storybook, Chromatic, tokens pipelines,
    etc.) Experience collaborating closely with designers and non-engineering partners
    Strong attention to detail and a high bar for craft and genuine passion for accessibility
    and inclusive design Familiarity with testing UI components and visual regression
    testing Compensation: We offer competitive compensation that includes base salary,
    variable compensation for relevant roles, meaningful equity, benefits, and perks.
    Benefits include things like medical, dental, and vision coverage, flexible vacation,
    a 401(k) plan, and life insurance. Actual compensation and offerings will vary
    based on role, level, and location. Team members in the EU, UK, and APAC receive
    locally competitive benefits aligned with regional norms and regulations. Annual
    salary range: $170,000 - $195,000'
