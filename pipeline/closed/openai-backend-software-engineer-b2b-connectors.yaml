  description: 'About the Team OpenAI’s mission is to make AGI beneficial for all
    of humanity and our mission is successful only if AGI drives real benefits across
    all industries in the world. Our goal in B2B applications is to enable this mission
    by helping businesses, enterprises & governments redefine how they operate to
    empower people and accelerate economic growth. Connectors are the bridge between
    OpenAI products (ChatGPT Enterprise, Frontier, and the API) and the systems where
    work actually happens—documents, tickets, messages, CRM records, knowledge bases,
    and more. The Connectors Platform team builds the infrastructure and control plane
    that makes these integrations reliable, secure, scalable, and enterprise-ready
    across a wide range of partners and customer environments. About the Role We’re
    looking for an infrastructure-focused engineer to build and operate the systems
    that make Connectors dependable at global scale. In this role, you’ll design the
    control plane, reliability foundations, and operational tooling that power connector
    execution—auth flows, sync and indexing pipelines, rate limiting, isolation, observability,
    incident response, and safe rollouts. You’ll work closely with product engineering,
    partner teams, and security to ship enterprise-grade connectivity while meeting
    high bars for privacy, compliance, and uptime. In this role, you will: Design
    and operate the infrastructure that powers connector sync, indexing, and retrieval
    at scale (job orchestration, queues, storage, caching, backpressure). Build the
    “control plane” primitives for connectors: rollout controls, configuration management,
    permissions, policy enforcement, and kill switches. Own reliability and operational
    excellence: SLOs, monitoring/alerting, incident response, postmortems, on-call
    health, and capacity planning. Create guardrails for safe multi-tenant execution:
    isolation boundaries, secrets handling, rate limits, abuse prevention, and blast-radius
    reduction. Partner with security and compliance teams to ensure enterprise requirements
    are met (audibility, least privilege, data retention, and secure-by-default architecture).
    Improve developer velocity via internal tooling: local dev workflows, canary environments,
    load testing, and observability dashboards. Your background might look something
    like: 5+ years of professional engineering experience (excluding internships)
    in infra / SRE / platform roles at tech and product-driven companies. Strong distributed
    systems fundamentals and production instincts (availability, latency, correctness,
    resilience). Experience building and operating services with meaningful uptime
    and scale requirements (multi-region is a plus). Proficient in one or more backend
    languages (e.g. Python, Rust) and comfortable working close to systems concerns
    (networking, storage, queueing). Deep familiarity with observability (metrics,
    logs, tracing), incident management, and reliability engineering practices. Comfortable
    navigating ambiguous problem spaces and pushing pragmatic solutions into production.
    Interest in AI/ML is a plus, but not required. About OpenAI OpenAI is an AI research
    and deployment company dedicated to ensuring that general-purpose artificial intelligence
    benefits all of humanity. We push the boundaries of the capabilities of AI systems
    and seek to safely deploy them to the world through our products. AI is an extremely
