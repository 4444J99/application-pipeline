  description: 'Our mission is to automate coding. The first step in our journey is
    to build the best tool for professional programmers, using a combination of inventive
    research, design, and engineering. Our organization is very flat, and our team
    is small and talent dense. We particularly like people who are truth-seeking,
    passionate, and creative. We enjoy spirited debate, crazy ideas, and shipping
    code. About the Role We’re hiring Field Engineers to partner with prospective
    and strategic enterprise customers. As a Field Engineer, you’ll be the technical
    face of Anysphere in the field — helping customers evaluate Cursor, guiding them
    through proofs of concept, and ensuring they see the full value of AI in their
    engineering workflows. You’ll work hand-in-hand with Sales, Product, and Engineering
    to scope solutions, demonstrate capabilities, and act as a trusted advisor to
    technical stakeholders. This is a highly customer-facing role where you’ll combine
    deep technical fluency with strong communication skills to drive adoption and
    influence product direction. What you’ll do Partner with Account Executives to
    lead technical discovery, demos, and proof-of-concept engagements. Build trusted
    relationships with engineering leaders, architects, and developers, serving as
    their technical advisor. Translate customer requirements into solution designs,
    guiding them on best practices for rollout, prompt strategy, and context configuration.
    Develop and deliver technical presentations, whiteboard sessions, and hands-on
    workshops tailored to customer needs. Act as the customer’s technical advocate
    internally, influencing roadmap priorities and escalating feedback to Product
    and Engineering. Collaborate with post-sales teams to ensure a smooth handoff
    and successful customer onboarding. Maintain deep knowledge of Cursor’s capabilities
    and competitive landscape to position our value effectively. Support strategic
    account planning and help drive expansion opportunities with technical validation.
    You may be a fit if Strong communication skills and executive presence — equally
    comfortable coding alongside developers or presenting to CTOs. Deep understanding
    of the software development lifecycle, modern engineering org structures, and
    developer productivity challenges. Hands-on technical ability — you don’t need
    to be a full-time engineer, but you should be fluent in technical workflows, AI
    tooling, and debugging complex environments. Customer-obsessed with a knack for
    translating technical details into business impact. Experience in Field Engineering,
    Solutions Architecture, Pre-Sales, or Consulting for enterprise software. Thrives
    in a startup environment: resourceful, adaptable, and proactive in creating solutions.
    Applying If there appears to be a fit, we’ll reach out to schedule 2–3 short technical
    conversations. After, we’ll arrange an onsite visit to our office, where you’ll
    work on a small project, discuss ideas, and meet the team.'
