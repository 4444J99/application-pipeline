  description: <p>The Product team builds features end-to-end. From designing our
    data models to implementing the subtle interaction behaviors that differentiate
    good software from great software. We work closely with UI designers and are supported
    by our infrastructure team. We aim to delight users with both large new features
    and smaller, daily product enhancements—thanks to our continuous deployment architecture.
    We want to create a superlative user experience, down to the smallest details.</p>
    <p>This role is based in our Warsaw office with an office-centric hybrid schedule.
    The standard in-office days are Monday, Tuesday, and Thursday. Most Asanas have
    the option to work from home on Wednesdays. Working from home on Fridays depends
    on the type of work you do, and your recruiter can share more about the in-office
    requirements.</p> <p><strong>Our employees in Poland are employed under a contract
    of employment.</strong></p> <p><strong>What you’ll achieve</strong></p> <ul> <li>You
    will work full-stack to design, build and release new functionalities used by
    millions of Asana users.</li> <li>Make consistent contributions to Asana’s core
    product with a focus on overcoming tricky technical challenges and modelling practices
    that improve quality and velocity.</li> <li>Mentor other engineers through activities
    like pairing and code reviews to promote a culture of technical excellence.</li>
    <li>Own and support technical design and execution for medium and large projects
    on the team (and sometimes partner teams).</li> <li>Partner with the team’s Tech
    Lead to drive aspects of the technical strategy.</li> </ul> <p><strong>About you</strong></p>
    <ul> <li>5+ years of experience working in large codebases.</li> <li>2+ years
    of experience leading complex projects.</li> <li>Sound judgment when balancing
    moving quickly with producing quality code and long-term code maintainability.</li>
    <li>Experience working cross-functionally with stakeholders and PM/Design partners
    to define requirements, make trade-offs and align on long-term plans.</li> <li>Appreciation
    for productivity and deep care for helping teams collaborate more effectively
    and efficiently.</li> <li>Demonstrated curiosity about AI tools and emerging technologies,
    with a willingness to learn and leverage them to enhance productivity, collaboration,
    or decision-making.</li> </ul> <p>At Asana, we're committed to building teams
    that include a variety of backgrounds, perspectives, and skills, as this is critical
    to helping us achieve our mission. If you're interested in this role and don't
    meet every listed requirement, we still encourage you to apply.</p> <p><strong>What
    we’ll offer</strong></p> <ul> <li>Generous, transparent and fair compensation
    system</li> <li>Contract of Employment (<strong>and the option of </strong>&nbsp;<strong>50%
    tax deductible costs for author’s rights usage in respect of&nbsp; applicable
    roles )&nbsp;</strong></li> <li>Health insurance with dental and travel coverage
    (Lux Med)&nbsp;</li> <li>Meals reimbursement on the days that you work from the
    office</li> <li>Career growth budget&nbsp;</li> <li>Home office setup budget&nbsp;</li>
    <li>Gym/Fitness reimbursement</li> <li>Fertility healthcare and family-forming
    support with <a href="https://www.get-carrot.com/">Carrot</a></li> <li>Mental
    Health Support in Modern Health</li> <li>Group life insurance</li> <li>MacBooks
    with all necessary accessories</li> </ul> <p>For this role, the estimated base
    salary range is between $29,000 - 33,896 PLN gross per month (subject to all taxes
    and necessary deductions). The actual base salary will vary based on various factors,
    including market and individual qualifications objectively assessed during the
    interview process. The listed range above is a guideline, and the base salary
    range for this role may be modified.</p> <p>In addition to base salary, your compensation
    package may include additional components such as equity and sales incentive pay
    (for most sales roles), and benefits. If you're interviewing for this role, speak
    with your Talent Acquisition Partner to learn more about the total compensation
    and benefits for this role.</p> <p>#LI-Hybrid</p><div class="content-conclusion"><p><strong>About
    us</strong></p> <p data-pm-slice="1 1 []">Asana is a leading platform for human
    + AI collaboration. Millions of teams around the world rely on Asana to achieve
    their most important goals, faster. Asana has been named to Fortune's Best Workplaces
    for 7+ years and recognized by Fast Company, Forbes, and Gartner for excellence
    in workplace culture and innovation. We offer an exceptional office-centric culture
    while adopting the best elements of hybrid models to ensure that every one of
    our global team members can work together effortlessly. With 13+ offices all over
    the world, we are always looking for individuals who care about building technology
    that drives positive change in the world and a culture where everyone feels that
    they belong.</p> <p data-pm-slice="1 1 []"><str
