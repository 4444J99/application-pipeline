  description: 'About the Team The Developer Experience team at OpenAI has a singular
    focus: empowering developers globally. Our mission is to provide every developer
    and startup on the planet with the most delightful and seamless experience to
    integrate AI into their applications and products. We ensure developers have the
    tools, resources, and support they need to unlock AI’s full potential. We craft
    inspiring demos, powerful developer tools, sample projects, and engaging content
    to show how to build great applications with our frontier models such as OpenAI
    o3 and GPT-4.1, multimodal capabilities, and agents like Codex. We collaborate
    closely with product, engineering, research, and GTM teams to ensure the developer
    journey—from initial API call to full production deployment—is seamless, effective,
    and delightful. About the Role As a Developer Experience Engineer, you will create
    compelling technical content, developer tools, and sample applications designed
    to inspire developers and enable them to succeed with OpenAI’s APIs, platform,
    and products for developers. You will engage with developers and technical founders,
    demonstrating best practices and building innovative applications powered by frontier
    models, multimodal capabilities, and tools like Codex. We’re looking for people
    who combine strong technical skills, creativity, and a passion for engaging with
    and empowering developers. In this role, you will: Develop demos and sample applications
    demonstrating cutting-edge integrations and best practices using reasoning models,
    multimodal capabilities, and agent tools. Create high-quality technical content—including
    tutorials, blog posts, videos, and code samples—to educate and inspire the developer
    community about our models, APIs, and Codex. Actively engage with and foster a
    vibrant local and global developer ecosystem around OpenAI’s platform. Represent
    OpenAI at developer events and online platforms, serving as a knowledgeable, approachable
    advocate for developers. Gather and synthesize developer feedback to inform and
    enhance our product roadmap. Collaborate cross-functionally with product, engineering,
    and marketing teams to ensure adoption and success of OpenAI’s developer tools
    and APIs. Contribute directly to improving and refining OpenAI’s developer interfaces
    and surfaces. Own challenges end-to-end, proactively addressing gaps and acquiring
    new skills to resolve complex issues. You might thrive in this role if you: Are
    passionate about crafting exceptional developer experiences and creating inspirational
    technical content and projects. Bring a robust full-stack engineering background
    with demonstrated experience building innovative applications using AI and large
    language models (LLMs). Have strong user empathy and care deeply about delivering
    experiences developers truly appreciate. Have a proven track record of successfully
    creating engaging technical content, compelling demos, or innovative developer
    tooling that accelerates technology adoption. Find joy in coding, continuously
    shipping high-quality, impactful software. Excel in dynamic environments characterized
    by rapidly evolving priorities, ambiguity, and competing deadlines. Are an exceptional
    collaborator who thrives working cross-functionally and enjoys partnering with
    diverse teams. Maintain a genuine commitment to AI ethics and safety, strongly
    aligning with OpenAI''s responsible AI development principles. About OpenAI OpenAI
    is an AI research and deployment company dedicated to ensuring that general-purpose
    artificial intelligence benefits all of humanity. We push the boundaries of the
    capabilities of AI systems and seek to safely deploy them to the world through
    our products. AI is an extremely powerful tool that must be created with safety
    and human needs at its core, and to achieve our mission, we must encompass and
    value the many different perspectives, voices, and experiences that form the full
    spectrum of humanity. We are an equal opportunity employer, and we do not discriminate
    on the basis of race, religion, color, national origin, sex, sexual orientation,
    age, veteran status, disability, genetic information, or other applicable legally
    protected characteristic. For additional information, please see OpenAI’s Affirmative
    Action and Equal Employment Opportunity Policy Statement . Background checks for
    applicants will be administered in accordance with applicable law, and qualified
    applicants with arrest or conviction records will be considered for employment
    consistent with those laws, including the San Francisco Fair Chance Ordinance,
    the Los Angeles County Fair Chance Ordinance for Employers, and the California
    Fair Chance Act, for US-based candidates. For unincorporated Los Angeles County
    workers: we reasonably believe that criminal history may have a direct, adverse
    and negative relationship with the following job duties, potentially resulting
    in the withdrawal of a conditional offer of employment: protect computer hardware
    entrusted '
