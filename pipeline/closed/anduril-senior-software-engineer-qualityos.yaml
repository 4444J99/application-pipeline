    system. Your decisions will have a large impact on the company today and into
    the future. We are looking not only for a software engineer that has a knack for
    quickly understanding complex systems, but one that dives in and creates features
    driving bottom-line value for the business.<br><br>A Software Engineer in this
    role should possess strong collaborative skills to integrate seamlessly into a
    team focused on revolutionizing manufacturing through innovative tools and insights.
    The ideal candidate will have expertise in developing custom software solutions
