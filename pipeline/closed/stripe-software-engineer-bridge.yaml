  description: <p><strong>About Bridge</strong></p> <p>We’re creating an entirely
    new payments platform, built with stablecoins, to simplify global money movement.
    Bridge enables faster, cheaper payments and borderless access to dollars via stablecoins.
    Through our APIs, businesses can send and receive funds across borders faster
    / cheaper vs. SWIFT and other fiat-only rails. Our virtual accounts enable international
    consumers and businesses to easily access, store and spend US dollars. Our payouts
    infrastructure enables platforms to disburse USD to anyone globally. We believe
    many trillions of dollars will move and settle through stablecoin payment rails.
    Bridge is pulling this future forward.&nbsp;</p> <p>We have a small team of people
    who have previously built financial infrastructure at some of the world’s leading
    companies (Coinbase, Stripe, Square, Brex, Upstart, DoorDash, Airbnb) and each
    and every one of them chose Bridge because they fundamentally believe that stablecoins
    will be a critical piece of financial infrastructure that allows for the improvement
    of global money movement.</p> <p><strong>About the Role</strong></p> <p>As an
    early member of the Bridge engineering team, you will be given the autonomy to
    work on projects that are truly global in scale and aim to give customers access
    to products they've never had access to. Many of the use cases that we work on
    today didn't exist several months ago and that's because our team is dedicated
    to constant improvement for our partners and end users. Our Engineers have outsized
    ownership over projects so if you are looking for increased autonomy working on
    a completely greenfield opportunity, Bridge is the place for you.</p> <p><strong>Responsibilities</strong></p>
    <ul> <li> <p>Ship software to build out our suite of API products. We’re an engineering
    and API-first company, and you will learn first-hand and contribute towards building
    highly reliable, performant, and mission critical infrastructure serving thousands
    of developers across the globe.</p> </li> <li> <p>Take sole ownership of projects,
    oftentimes without the support of Product Management, and liaise both internally
    with teams like Legal/Compliance and externally with our partners and developers.</p>
    </li> <li> <p>Look for constant improvements to our product offerings with the
    explicit goal of improving the experience for our partners and end users.</p>
    </li> <li> <p>Make effective tradeoffs that consider business priorities, user
    experience, and a sustainable technical foundation.</p> </li> <li> <p>Improve
    engineering standards, tooling and processes for the team and our broader org.</p>
    </li> </ul> <p><strong>Qualifications</strong></p> <ul> <li> <p>We are open to
    hiring engineers at various levels of seniority (SWE through Senior Staff) but
    at a minimum we are looking for somebody with 5+ years of experience.</p> </li>
    <li> <p>Experience building backend systems with SQL databases. Experience with
    frameworks such as Rails, Django, Express or equivalent is a bonus.</p> </li>
    <li> <p>An enlarged sense of ownership and the ability to lead and influence the
    design and direction of our products.</p> </li> <li> <p>An ability to thrive in
    a fast paced environment.</p> </li> <li> <p>A growth mindset and a constant curiosity
    and fearlessness to dive into the unknown.</p> </li> <li> <p>An ability to write
    maintainable, well-tested, modular code, but also be pragmatic about moving fast.</p>
    </li> <li> <p>Excellent written and verbal communication skills, including the
    ability to write clear technical documentation.</p> </li> <li> <p>Past experience
    working on crypto or financial products a plus, and while not required, we do
    look for people who are very passionate about building in this space.</p> </li>
    <li> <p>Experience with building API products a plus, but not required.</p> </li>
    <li> <p>Experience working with blockchain or distributed systems a big plus</p>
    </li> </ul>
