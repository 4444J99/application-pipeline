    and protecting private information more effectively — Elastic’s complete, cloud-based
    solutions for search, security, and observability help organizations deliver on
    the promise of AI.</p></div><h3><strong>What is The Role</strong></h3> <p>We are
    looking for a Senior Software Engineer to join our Docs Engineering Team. In this
