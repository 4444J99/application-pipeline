    engineer who views programming languages as tools rather than identities. Someone
    who knows how to build software using the right methods, both established and
    new. and who has a drive to improve efficiency and automation through intelligent
    and informed choices.</p> <p>The Docs Engineering Team is responsible for making
    available documentation to both internal and external users across the entire
    Elastic ecosystem. We do this by providing utilities, platforms and processes
    by which documentation can be authored, organized and delivered in both traditional
    and emerging ways. So as part of our Docs Engineering Team, you won't just be
    maintaining a platform, you'll be building the sophisticated tooling and pipelines
    that deliver documentation to the world.</p> <p>You will have the autonomy to
    help lead the effort in redefining how technical documentation is authored and
    delivered. If you are a self-motivated engineer who enjoys solving high-level
    architectural puzzles and isn't afraid to get their hands dirty across different
    stacks, we want to talk to you.</p> <p>Prior experience with the Elastic product
    suite is not essential, but is beneficial.</p> <h3><strong>What You Will Be Doing</strong></h3>
