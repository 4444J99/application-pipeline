  description: "Company Overview Deepgram is the leading platform underpinning the\
    \ emerging trillion-dollar Voice AI economy, providing real-time APIs for speech-to-text\
    \ (STT), text-to-speech (TTS), and building production-grade voice agents at scale.\
    \ More than 200,000 developers and 1,300+ organizations build voice offerings\
    \ that are \u2018Powered by Deepgram\u2019, including Twilio, Cloudflare, Sierra,\
    \ Decagon, Vapi, Daily, Cresta, Granola, and Jack in the Box. Deepgram\u2019s\
    \ voice-native foundation models are accessed through cloud APIs or as self-hosted\
    \ and on-premises software, with unmatched accuracy, low latency, and cost efficiency.\
    \ Backed by a recent Series C led by leading global investors and strategic partners,\
    \ Deepgram has processed over 50,000 years of audio and transcribed more than\
    \ 1 trillion words. There is no organization in the world that understands voice\
    \ better than Deepgram. Company Operating Rhythm At Deepgram, we expect an AI-first\
    \ mindset\u2014AI use and comfort aren\u2019t optional, they\u2019re core to how\
    \ we operate, innovate, and measure performance. Every team member who works at\
    \ Deepgram is expected to actively use and experiment with advanced AI tools,\
    \ and even build your own into your everyday work. We measure how effectively\
    \ AI is applied to deliver results, and consistent, creative use of the latest\
    \ AI capabilities is key to success here. Candidates should be comfortable adopting\
    \ new models and modes quickly, integrating AI into their workflows, and continuously\
    \ pushing the boundaries of what these technologies can do. Additionally, we move\
    \ at the pace of AI. Change is rapid, and you can expect your day-to-day work\
    \ to evolve just as quickly. This may not be the right role if you\u2019re not\
    \ excited to experiment, adapt, think on your feet, and learn constantly, or if\
    \ you\u2019re seeking something highly prescriptive with a traditional 9-to-5.\
    \ Note: this role is based out of India and will service the APAC region. Opportunity\
    \ Deepgram is expanding across APAC and operating a follow-the-sun model. We are\
    \ hiring a Pre-Sales Solutions Engineer in India to win complex technical evaluations,\
    \ design clear solution paths, and drive repeatable adoption for strategic accounts.\
    \ Our strategic Account Executives do not hand off their customers after the first\
    \ sale, so you will partner long term across discovery, POC, production launch,\
    \ and expansion. You will focus on pre-sales, and you will often step into post-sales\
    \ style work when the stakes are high and continuity matters. About Applied Engineering\
    \ at Deepgram Applied Engineering blends what many companies split into Solutions\
    \ Engineering, Architecture, Consulting, and Senior Technical Support. We are\
    \ builders and communicators who bridge sales and engineering. We help customers\
    \ move from problem to production with speed, clarity, and measurable outcomes.\
    \ What You Will Do Lead technical discovery for strategic opportunities. Map business\
    \ goals to measurable technical success criteria and an evaluation plan. Design,\
    \ scope, and execute POCs that prove value. Define datasets, metrics, and timelines\
    \ that land a clear technical win. Build lightweight prototypes, sample integrations,\
    \ and demos using Deepgram SDKs and APIs. Advise on architecture for accuracy,\
    \ latency, scalability, and cost. Cover cloud, self-hosted, hybrid, and data residency\
    \ needs. Run security and compliance threads common in APAC. Prepare crisp responses\
    \ for Singapore PDPA, Japan APPI, Korea PIPA, Australia\u2019s Privacy Act, and\
    \ India\u2019s DPDP Act. Triage and debug issues during evaluations. Collaborate\
    \ with Product, Engineering, and Support to unblock customers quickly. Create\
    \ reusable assets that scale. Turn repeated requests into working samples, reference\
    \ architectures, runbooks, and field guides. Partner with Solutions Architects\
    \ and Support for seamless continuity after initial wins. Stay involved through\
    \ expansion phases when needed. Enable the field. Collaborate with AEs, CSMs,\
    \ and partners on positioning, demos, and technical validation for priority use\
    \ cases. Regional Expectations Based in an APAC time zone with strong overlap\
    \ to customer business hours across East Asia, Southeast Asia, and ANZ. Excellent\
    \ written and spoken English. Additional Asian languages are a strong plus, especially\
    \ Japanese, Korean, Mandarin, or Hindi. Familiarity with procurement, InfoSec,\
    \ and data privacy expectations across APAC. Ability to travel within the region\
    \ for key customer milestones. Estimated travel 10 to 20 percent. Your First 90\
    \ Days Ramp approach for this role Ramping mirrors the Solutions Architect plan,\
    \ with explicit ticket work and earlier support for strategic Account Executives.\
    \ In the first weeks you will pick up low-risk customer tickets to learn our systems\
    \ and support flow, then progress to pre-sales escalations tied to active evaluations.\
    \ First 30 days Ramp on Deepgram\u2019s product surface area, platform APIs, SDKs,\
    \ evaluation methodology, and security review materials. Shadow strategic discovery\
    \ and POC calls across AP"
