  description: 'Why Harvey At Harvey, we’re transforming how legal and professional
    services operate — not incrementally, but end-to-end. By combining frontier agentic
    AI, an enterprise-grade platform, and deep domain expertise, we’re reshaping how
    critical knowledge work gets done for decades to come. This is a rare chance to
    help build a generational company at a true inflection point. With 1000+ customers
    in 58+ countries, strong product-market fit, and world-class investor support,
    we’re scaling fast and defining a new category in real time. The work is ambitious,
    the bar is high, and the opportunity for growth — personal, professional, and
    financial — is unmatched. Our team is sharp, motivated, and deeply committed to
    the mission. We move fast, operate with intensity, and take real ownership of
    the problems we tackle — from early thinking to long-term outcomes. We stay close
    to our customers — from leadership to engineers — and work together to solve real
    problems with urgency and care. If you thrive in ambiguity, push for excellence,
    and want to help shape the future of work alongside others who raise the bar,
    we invite you to build with us. At Harvey, the future of professional services
    is being written today — and we’re just getting started. Role Overview As a Senior
    Software Engineer, Frontend at Harvey, you will own and lead engineering projects
    that define the user experience of our different products: Assistant, Vault, Workflows,
    and Harvey in Microsoft Word and Outlook. You will also lead frontend engineering
    on new products that we are building at Harvey. The team is composed of highly
    motivated, skilled, and considerate engineers. Everything we touch is polished
    to high standards extending to all aspects of our work – from design to architecture
    to code to slack communication. If any of this resonates with you, this role might
    be right for you. This role is based in San Francisco, CA. We use a hybrid in-person
    work model and offer relocation assistance to new employees. What You''ll Do Build
    new interfaces for lawyers and organizations to collaborate with AI. Lead end-to-end
    UI features for Assistant, Vault, Workflows, our Word/Outlook add-ins, and future
    Harvey products — from scoping and design reviews to implementation, launch, and
    iteration. Build polished, high-performance React + TypeScript interfaces using
    TailwindCSS, with crisp interactions, resilient state management, and strong error
    handling. Architect reusable components and patterns and evolve our internal design
    system. Optimize frontend performance at scale. Collaborate tightly with design
    and backend/infrastructure to shape APIs and UX for long-running jobs, streaming
    results, and tool-calling workflows. Raise the bar on frontend reliability and
    security UX for enterprise and regulated environments. Mentor peers through thoughtful
    code reviews and documentation; help refine our frontend standards and developer
    experience. What You Have Experience with React, Typescript, and CSS (we use Tailwind
    CSS) Track record of building fast-growing SaaS products by leveraging PWA technologies
    Track record of shipping highly intuitive products, strong attention to detail
    Experience working at startups and scaleups (anywhere from early-to-late-stage)
    is a plus Compensation Range $200,000 - $260,000 USD Please find our CA applicant
