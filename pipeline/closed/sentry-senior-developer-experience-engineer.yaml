    and timely content + building community through live and virtual gatherings +
    Being customer-to-product influence Listen as much as you talk. And you know how
    to build a community organically by lifting up and promoting others. Qualifications
    5+ years as a developer and 3+ years in an advocacy or educational role such as
    developer relations/evangelism, creating technical content, leading a community
