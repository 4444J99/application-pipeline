    project using a common modern development language or framework You have been
    an active member and contributor of technical communities, on any platform (e.g.
    Discord, Stack Overflow, Reddit, Twitter, TikTok) Ability to prioritize competing
    opportunities and balance customer needs versus business priorities Stellar written
    and '
