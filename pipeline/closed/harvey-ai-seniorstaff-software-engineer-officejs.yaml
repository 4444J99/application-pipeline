  description: 'Why Harvey At Harvey, we’re transforming how legal and professional
    services operate — not incrementally, but end-to-end. By combining frontier agentic
    AI, an enterprise-grade platform, and deep domain expertise, we’re reshaping how
    critical knowledge work gets done for decades to come. This is a rare chance to
    help build a generational company at a true inflection point. With 1000+ customers
    in 60+ countries, strong product-market fit, and world-class investor support,
    we’re scaling fast and defining a new category in real time. The work is ambitious,
    the bar is high, and the opportunity for growth — personal, professional, and
    financial — is unmatched. Our team is sharp, motivated, and deeply committed to
    the mission. We move fast, operate with intensity, and take real ownership of
    the problems we tackle — from early thinking to long-term outcomes. We stay close
    to our customers — from leadership to engineers — and work together to solve real
    problems with urgency and care. If you thrive in ambiguity, push for excellence,
    and want to help shape the future of work alongside others who raise the bar,
    we invite you to build with us. At Harvey, the future of professional services
    is being written today — and we’re just getting started. Role Overview Legal professionals
    spend most of their day in Microsoft Word: drafting, reviewing, and refining complex
    documents that shape meaningful outcomes. Harvey in Word brings AI-powered capabilities
    directly into Word, enabling lawyers to draft faster, run playbook reviews, and
    perform agentic editing, all without leaving their workflow. It''s one of our
    most strategic product lines and a key part of how we meet lawyers where they
    already work. As a Senior/Staff Software Engineer on the Embedded Experiences
    team, you will own and lead the development of Harvey in Word, our Microsoft Office
    Add-in built on OfficeJS, alongside our other Microsoft Office integrations. You''ll
    architect and ship features that integrate seamlessly with Word, handling the
    unique challenges of building performant, polished experiences within the Office
    Add-in environment. We''re looking for someone with deep expertise in OfficeJS
    and Office Add-in development, ideally from building a similar product at scale.
    You''ll join a team of highly motivated, skilled engineers who hold everything
    they touch to the highest standards, from architecture to code to user experience.
    You may also contribute to our Outlook integration and help build the next generation
    of agentic AI interfaces across the Microsoft suite. This role is based in San
    Francisco, CA. We use a hybrid in-person work model and offer relocation assistance
    to new employees. What You''ll Do Own and lead the technical direction of Harvey
    in Word, our flagship Office Add-in product, alongside our other Microsoft Office
    integrations. Build the AI-native editing experience: agentic document rewrites,
    real-time redlining, and playbook automation that transforms how lawyers work
    Design and build sophisticated integrations with Microsoft Word using the OfficeJS
    API, including document manipulation, playbook reviews, and AI-assisted drafting
    Architect scalable, maintainable solutions that handle the constraints and quirks
    of the Office Add-in environment across platforms (Windows, Mac, Web) Build polished,
    high-performance interfaces with crisp interactions and resilient error handling
    Collaborate with product, design, and backend teams to shape APIs and UX for AI-powered
    features like streaming results and tool-calling workflows Navigate Office Add-in
    requirement sets, versioning, and cross-platform compatibility to ensure broad,
    reliable support Contribute to Harvey in Outlook and shape the next generation
    of agentic AI interfaces across the Microsoft suite Mentor engineers, drive technical
    decisions, and raise the bar on quality and developer experience What You Have
    5+ years of software engineering experience, with significant depth in Office
    Add-in development using OfficeJS Experience building and shipping a production
    Office Add-in product, ideally one used at enterprise scale Strong proficiency
    in JavaScript/TypeScript, HTML, and CSS Deep understanding of Office Add-in architecture,
    requirement sets, manifest configuration, and cross-platform considerations Experience
    with React or similar modern frontend frameworks Track record of shipping highly
    intuitive products with strong attention to detail Familiarity with Microsoft
    Office Add-in guidelines and AppSource submission process is a plus Nice to Have
    Experience with Outlook Add-ins or other Microsoft 365 integrations (SharePoint,
    Teams) Background in legal tech or enterprise SaaS Experience building products
    that integrate with AI/LLM capabilities Compensation Range $200,000 - $312,000
    USD Depending on your location, an Applicant Privacy Notice may apply to you.
