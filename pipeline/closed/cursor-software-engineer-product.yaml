  description: Our mission is to automate coding. The first step in our journey is
    to build the best tool for professional programmers, using a combination of inventive
    research, design, and engineering. Our organization is very flat, and our team
    is small and talent dense. We particularly like people who are truth-seeking,
    passionate, and creative. We enjoy spirited debate, crazy ideas, and shipping
    code. About the Role Product engineers create the software we ship to our users,
    in particular our editor. As a member of our core product team, you'll join us
    in inventing a new, better way to build software. You may be a fit if You've built
    a great product. You blend excellent engineering with a taste for models and design.
    You have a propensity for creative ideas and have a knack for making powerful
    tools without compromising their ease-of-use. Sample projects include Inventing
    new interfaces and UX for reviewing PRs of AI-generated code Sprinting for two
    weeks to build a new product vertical from scratch (e.g., AI bug detection) Running
    experiments and A/B tests on millions of users to push the frontier of agent quality
    - ex sub-agents, memories, and PR retrieval Applying If there appears to be a
    fit, we'll reach to schedule 2-3 short technicals. After, we'll schedule an onsite
    in our office, where you'll work on a small project, discuss ideas, and meet the
    team.
