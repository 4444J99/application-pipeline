    of systems is powered by Lattice OS, an AI-powered operating system that turns
    thousands of data streams into a realtime, 3D command and control center. As the
    world enters an era of strategic competition, Anduril is committed to bringing
    cutting-edge autonomy, AI, computer vision, sensor fusion, and networking technology
    to the military in months, not years.</p></div><h3>ABOUT THE JOB</h3> <p class="c-mrkdwn__quote"
    data-stringify-type="quote">We are hiring a Senior Software Engineer to design,
    improve, and maintain the core package set which supports software distribution
    throughout Anduril. This involves creating internal tooling, establishing standards,
    planning architectural changes, and supporting users of the package set. You are
    expected to provide expertise for the usage of Nix at a large scale and assist
    in training other engineers. You should be capable of operating autonomously with
    limited oversight in a complex environment, and have the ability to break down
    intricate problems into simple solutions.</p> <p>&nbsp;</p> <p><strong>WHAT YOU''LL
    DO</strong></p> <ul> <li>Maintain an internal package set in order to enable software
    distribution across the company for development, hosted services, and embedded
    devices</li> <li>Package open-source and proprietary software components using
    Nix</li> <li>Improve developer ergonomics by defining Nix usage standards, creating
    tooling support, and integrating with developer workflows</li> <li>Provide assistance,
    training, and mentorship to other team members</li> </ul> <p><strong>REQUIRED
