    functional programming generally</li> <li>Deep understanding of how build systems
    and packaging ecosystems work</li> <li>Ability to dive into large and complicated
    systems, and use Nix to improve them</li> <li>Experience with one or more of the
    following languages: Rust, C++, Go, Python, Haskell</li> <li>Eligible to obtain
    and maintain an active U.S. Secret security clearance</li> </ul> <p><strong>PREFERRED
