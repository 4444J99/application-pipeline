  description: 'About the Team The Statsig team within OpenAI is responsible for the
    core experimentation, rollout, and analytics infrastructure that powers every
    layer of OpenAI’s product development stack. Our systems enable teams across OpenAI
    to safely launch features, run experiments, and understand how product and model
    changes perform in the real world. Based out of OpenAI’s Bellevue office, we are
    a tight-knit team that values in-person collaboration, moving quickly with a strong
    bias toward impact, and building tools and systems that empower other builders
    across the company. About the Role As a Senior Product Engineer on the Statsig
    team, you will design and build the experimentation and rollout platform used
    by product and research teams across OpenAI. You’ll work on the core platform
    that allows engineers to safely launch new features, test ideas with users, and
    understand the impact of changes at global scale. This role sits at the intersection
    of product engineering and platform infrastructure. You’ll partner closely with
    teams across ChatGPT, the API, Growth, and Research to ensure that teams within
    OpenAI can move fast while maintaining strong experimentation practices and safe
    rollout mechanisms. In this role, you will: Design and build core experimentation
    and rollout infrastructure used by teams across OpenAI to launch and evaluate
    product and model changes safely. Develop systems for feature management, progressive
    rollouts, and canary deployments that allow engineers to ship quickly while minimizing
    risk to users. Partner directly with Data Science to enable scaled adoption of
    advanced statistical methodologies Partner with product, infrastructure, and research
    teams across the organization to integrate experimentation and rollout systems
    deeply into their product development lifecycle. Lead large technical initiatives,
    shaping the architecture and long-term evolution of OpenAI’s experimentation and
    launch infrastructure. You might thrive in this role if you: Have strong experience
    building internal tooling infrastructure, such as internal data or experimentation
    platforms, feature flagging systems, rollout tooling, or internal developer platforms.
    Enjoy working on systems that enable other engineers to move faster, and care
    deeply about developer experience and platform usability. Are comfortable designing
    and operating large-scale distributed systems that support high traffic products
    and rapid iteration cycles. Take ownership of complex technical problems end-to-end
    and enjoy driving architectural decisions that impact many teams. Thrive in fast-moving
    environments where ambiguity is high and the opportunity for impact is large.
    Location: This role is based in Bellevue, WA. We use a hybrid work model of 3
    days in the office per week and offer relocation assistance to new employees.
    About OpenAI OpenAI is an AI research and deployment company dedicated to ensuring
    that general-purpose artificial intelligence benefits all of humanity. We push
    the boundaries of the capabilities of AI systems and seek to safely deploy them
    to the world through our products. AI is an extremely powerful tool that must
    be created with safety and human needs at its core, and to achieve our mission,
    we must encompass and value the many different perspectives, voices, and experiences
    that form the full spectrum of humanity. We are an equal opportunity employer,
    and we do not discriminate on the basis of race, religion, color, national origin,
    sex, sexual orientation, age, veteran status, disability, genetic information,
    or other applicable legally protected characteristic. For additional information,
    please see OpenAI’s Affirmative Action and Equal Employment Opportunity Policy
    Statement . Background checks for applicants will be administered in accordance
    with applicable law, and qualified applicants with arrest or conviction records
    will be considered for employment consistent with those laws, including the San
    Francisco Fair Chance Ordinance, the Los Angeles County Fair Chance Ordinance
    for Employers, and the California Fair Chance Act, for US-based candidates. For
    unincorporated Los Angeles County workers: we reasonably believe that criminal
    history may have a direct, adverse and negative relationship with the following
    job duties, potentially resulting in the withdrawal of a conditional offer of
    employment: protect computer hardware entrusted to you from theft, loss or damage;
    return all computer hardware in your possession (including the data contained
    therein) upon termination of employment or end of assignment; and maintain the
    confidentiality of proprietary, confidential, and non-public information. In addition,
    job duties require access to secure and protected information technology systems
    and related data security obligations. To notify OpenAI that you believe this
    job posting is non-compliant, please submit a report through this form . No response
    will be provided to inquiries unrelated to job posting compliance.'
