    of the 21st century’s most innovative companies to the defense industry, Anduril
    is changing how military systems are designed, built and sold. Anduril’s family
    of systems is powered by Lattice OS, an AI-powered operating system that turns
    thousands of data streams into a realtime, 3D command and control center. As the
    world enters an era of strategic competition, Anduril is committed to bringing
    cutting-edge autonomy, AI, computer vision, sensor fusion, and networking technology
    to the military in months, not years.</p></div><p><strong>WHO WE ARE</strong></p>
    <p>Anduril’s MA team will develop mission autonomy for unmanned systems across
    multiple domains to enable execution of complex ISR and strike missions with coordinated
    kinetic effects in denied, degraded, intermittent, and limited (DDIL) environments.
    The team will be responsible for advancing next generation of software-defined
    unmanned systems leveraging technologies and tools for edge computing, secure
    communications, fleet management, perception and planning (computer vision, motion
    planning, SLAM, controls, state estimation), and more.<br><br><strong>WHAT YOU'LL
    DO</strong><br>We are hiring a Senior Tactical Networking engineer to lead the
    design and implementation of a networking stack to enable command and control
    (C2) and collaborative autonomy of distributed unmanned systems. As a Senior Tactical
    Networking Engineering, you will:</p> <ul> <li>Design, implement, deploy, and
    troubleshoot networking solutions focused on Layer-1 (Physical), Layer-2 (Data),
    Layer-3 (Network), and Layer-4 (Transport) of the Open Systems Interconnection
    (OSI) reference model</li> <li>Perform trade-off studies of different comms and
    networking solutions including government provided technologies</li> <li>Design
    network laydowns and configurations decomposed from complex design reference missions
    (DRMs) involving large scale unmanned systems and forward-deployed C2 systems.</li>
    <li>Build robust tooling for benchmarking and analyzing network traffic</li> <li>Analyze
    test network infrastructure, develop recommendations, and implement improvements
    for network reliability and throughput for edge network</li> <li>Collaborate extensively
    with software engineers to build a representative modeling and simulation environment
    including hardware-in-the-loop lab infrastructure</li> </ul> <p><strong>REQUIRED
    QUALIFICATIONS:</strong></p> <ul> <li>Expertise in tactical LOS and BLOS RF systems
    especially in maritime environment for ship-to-ship and ship-to-shore comms</li>
    <ul> <li>SatCom</li> <li>VHF + UHF</li> <li>LPI/LPD and anti-jamming</li> <li>MIMO</li>
    <li>Antenna theory</li> </ul> <li>Experience with networking protocols and technologies,
