  description: 'About the Team Our Inference team brings OpenAI’s most capable research
    and technology to the world through our products. We empower consumers, enterprise
    and developers alike to use and access our start-of-the-art AI models, allowing
    them to do things that they’ve never been able to before. We focus on performant
    and efficient model inference, as well as accelerating research progression via
    model inference. About the Role We are looking for an engineer who wants to take
    the world''s largest and most capable AI models and optimize them for use in a
    high-volume, low-latency, and high-availability production and research environment.
    In this role, you will: Work alongside machine learning researchers, engineers,
    and product managers to bring our latest technologies into production. Work alongside
    researchers to enable advanced research through awesome engineering. Introduce
    new techniques, tools, and architecture that improve the performance, latency,
    throughput, and efficiency of our model inference stack. Build tools to give us
    visibility into our bottlenecks and sources of instability and then design and
    implement solutions to address the highest priority issues. Optimize our code
    and fleet of Azure VMs to utilize every FLOP and every GB of GPU RAM of our hardware.
    You might thrive in this role if you: Have an understanding of modern ML architectures
    and an intuition for how to optimize their performance, particularly for inference.
    Own problems end-to-end, and are willing to pick up whatever knowledge you''re
    missing to get the job done. Have at least 5 years of professional software engineering
    experience. Have or can quickly gain familiarity with PyTorch, NVidia GPUs and
    the software stacks that optimize them (e.g. NCCL, CUDA), as well as HPC technologies
    such as InfiniBand, MPI, NVLink, etc. Have experience architecting, building,
    observing, and debugging production distributed systems. Bonus point if worked
    on performance-critical distributed systems. Have needed to rebuild or substantially
    refactor production systems several times over due to rapidly increasing scale.
    Are self-directed and enjoy figuring out the most important problem to work on.
    Have a humble attitude, an eagerness to help your colleagues, and a desire to
    do whatever it takes to make the team succeed. About OpenAI OpenAI is an AI research
    and deployment company dedicated to ensuring that general-purpose artificial intelligence
    benefits all of humanity. We push the boundaries of the capabilities of AI systems
    and seek to safely deploy them to the world through our products. AI is an extremely
    powerful tool that must be created with safety and human needs at its core, and
    to achieve our mission, we must encompass and value the many different perspectives,
    voices, and experiences that form the full spectrum of humanity. We are an equal
    opportunity employer, and we do not discriminate on the basis of race, religion,
    color, national origin, sex, sexual orientation, age, veteran status, disability,
    genetic information, or other applicable legally protected characteristic. For
    additional information, please see OpenAI’s Affirmative Action and Equal Employment
    Opportunity Policy Statement . Background checks for applicants will be administered
    in accordance with applicable law, and qualified applicants with arrest or conviction
    records will be considered for employment consistent with those laws, including
    the San Francisco Fair Chance Ordinance, the Los Angeles County Fair Chance Ordinance
    for Employers, and the California Fair Chance Act, for US-based candidates. For
    unincorporated Los Angeles County workers: we reasonably believe that criminal
    history may have a direct, adverse and negative relationship with the following
    job duties, potentially resulting in the withdrawal of a conditional offer of
    employment: protect computer hardware entrusted to you from theft, loss or damage;
    return all computer hardware in your possession (including the data contained
    therein) upon termination of employment or end of assignment; and maintain the
    confidentiality of proprietary, confidential, and non-public information. In addition,
    job duties require access to secure and protected information technology systems
    and related data security obligations. To notify OpenAI that you believe this
    job posting is non-compliant, please submit a report through this form . No response
    will be provided to inquiries unrelated to job posting compliance. We are committed
    to providing reasonable accommodations to applicants with disabilities, and requests
    can be made via this link . OpenAI Global Applicant Privacy Policy At OpenAI,
    we believe artificial intelligence has the potential to help people solve immense
    global challenges, and we want the upside of AI to be widely shared. Join us in
    shaping the future of technology.'
