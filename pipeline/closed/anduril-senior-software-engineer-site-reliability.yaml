    at the orchestration layer, including technologies such as OpenShift, Kubernetes,
    Docker and Terraform</li> <li>Manage modern ICT systems at the application layer,
    including Github Enterprise, CircleCI and a variety of proprietary applications</li>
    <li>Contribute to our Nix managed build and deployment systems</li> <li>Contribute
    to the management of ICT hardware systems in a limited capacity</li> <li>Advocate
    for and implement best-practice security measures within Anduril’s software toolchain</li>
    <li>Work as a member of a multi-disciplinary software team, including as a mentor
    for Software Engineers from differing backgrounds</li> </ul> <h3>REQUIRED QUALIFICATIONS</h3>
    <ul> <li>Bachelor’s degree in Computer Science, Software Engineering, a relevant
