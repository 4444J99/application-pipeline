  description: '<h2><strong>This is Engineering at Lattice</strong></h2> <p>Lattice’s
    Engineering team is continuously working to better both our product and our craft.
    We use a modern, cutting-edge tech stack aimed at developer productivity and delight.
    We strive for maintainable, robust, and performant code. We’re highly collaborative
    and continuously iterative and work closely with designers and product managers.
    We prioritize not only great technical architecture but also an amazing product
    experience.<br><br>Compensation is a domain where product decisions directly impact
    how companies pay their people. Our team builds flexible systems that support
    a wide range of complex, real-world configurations, requiring engineers to deeply
    understand customer needs, model nuanced scenarios, and ensure accuracy and trust
    at every step.</p> <h2><strong>What You Will Do</strong></h2> <ul> <li>You’ll
    be responsible for building software to help companies create cultures in which
    their employees thrive.</li> <li>Partner with other engineers to build and own
    products across a modern tech stack. Our current stack includes React, Relay Modern,
    GraphQL, Node, and PostgreSQL. We rely on AWS to host our infrastructure.</li>
    <li>Work closely with other product teams to understand and solve overarching
    pain points.</li> <li>Own the execution of complex projects, including those that
    require cross-functional collaboration with product managers and designers.</li>
    <li>Provide substantial mentorship to less experienced colleagues, helping to
    refine their technical craft and expand their knowledge.</li> <li>Make contributions
    to our engineering practices, identifying and evangelizing improvements to improve
    our team output.</li> </ul> <h2><strong>What You Will Bring to the Table</strong></h2>
    <p>You have 5+ years of professional experience writing and maintaining production-level
    applications.</p> <ul> <li>You have experience with modern programming languages
    such as TypeScript, Ruby, and Python.</li> <li>You have experience working on
    and maintaining services for an organization operating at scale.</li> <li>You
    have experience building systems that are adopted by the wider engineering org.</li>
    <li>You’re no stranger to SQL, you know how to efficiently model data and write
    performant queries in a relational database like PostgreSQL.</li> <li>You know
    the ins and outs of maintaining and scaling an application actively serving customers
    in production.</li> <li>You seek out the root cause when debugging software defects,
    and champion improvements that prevent future issues. You are familiar with operations
    tasks such as monitoring application performance over time or troubleshooting
    issues with production applications.</li> <li>You’re clear and concise in explaining
    your thought process and in enumerating the tradeoffs made in your work.</li>
    <li>You love mentoring and supporting other software engineers who are newer to
    the industry.</li> </ul> <p><strong>Location Requirement:</strong><br>This role
    is open to candidates located in British Columbia or Ontario, Canada. At this
    time, we are only able to hire employees residing in these provinces.</p> <p>___</p>
    <p><em data-stringify-type="italic">The estimated annual cash salary for this
