    Program; Wellness Apps; Paid Parental Leave, Paid Time off inclusive of holidays
    and sick time; One time WFH Office Set-Up Stipend; Retirement Plan; Financial
    Planning; and Learning &amp; Development Budget.</em></p> <p><em data-stringify-type="italic">Note
    on Pay Transparency:</em><br><em data-stringify-type="italic">Lattice provides
    an estimate of the compensation for roles that may be hired as required by regulations.
