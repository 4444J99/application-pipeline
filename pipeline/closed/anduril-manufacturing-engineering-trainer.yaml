  description: <div class="content-intro"><p>Anduril Industries is a defense technology
    company with a mission to transform U.S. and allied military capabilities with
    advanced technology. By bringing the expertise, technology, and business model
    of the 21st century’s most innovative companies to the defense industry, Anduril
    is changing how military systems are designed, built and sold. Anduril’s family
    of systems is powered by Lattice OS, an AI-powered operating system that turns
    thousands of data streams into a realtime, 3D command and control center. As the
    world enters an era of strategic competition, Anduril is committed to bringing
    cutting-edge autonomy, AI, computer vision, sensor fusion, and networking technology
    to the military in months, not years.</p></div><h3>ABOUT THE TEAM</h3> <p>The
    Manufacturing Production team is responsible for a wide range of activities that
    are crucial to the manufacturing process including operating equipment, assembling
    products, performing quality control checks, and maintaining a safe and efficient
    work environment. The Manufacturing Training and Development team plays a critical
    role in equipping employees with the skills, knowledge, and resources needed to
    excel in their roles. They design, develop, and deliver training programs that
    enhance technical proficiency, ensure compliance, and support career growth within
    the organization.&nbsp;This position offers an opportunity to contribute to a
    growing training function while enhancing our employee’s training experiences.&nbsp;</p>
    <h3>ABOUT THE JOB</h3> <p>Anduril Industries is seeking an Engineering Trainer
    to join our Manufacturing Training team to support our Manufacturing Engineers.
    You will be responsible for developing and facilitating training content for manufacturing
    engineers, ensuring accuracy and consistency across all materials. You will collaborate
    with engineering personnel, program managers, and subject matter experts to create
    comprehensive training materials for existing and new systems/processes. This
    role is critical to scaling internal knowledge, enabling product readiness, and
    enhancing our manufacturing team’s ability to produce cutting edge defense capabilities.</p>
    <h3>WHAT YOU'LL DO</h3> <ul> <li>Create/develop and facilitate training content
    based on procedures, SOPs, work instructions, and process workflows.</li> <li>Develops
    in-house programs/curriculums, learning aids, and activities to address developmental
    needs of the manufacturing engineering department.</li> <li>Effectively deliver
    dynamic and interactive training sessions to diverse audiences, utilizing a blend
    of classroom, virtual, and hands-on approaches.</li> <li>Act as a subject matter
    expert (SME) during training, providing clear explanations, demonstrations, and
    practical examples.</li> <li>Coordinate and facilitate scheduled training and
    ad hoc training events across multiple sites.</li> <li>Utilize relevant software
    tools to research, configure, maintain, and enhance training media and instructional
    content.</li> <li>Collaborate with engineers, program managers, and subject matter
    expert to ensure content accuracy and relevance.</li> <li>Evaluate the effectiveness
    of training programs through assessments and feedback, and champion continuous
    improvement of training effectiveness.</li> <li>Utilize project management methodologies
    to organize resources, track progress, and communicate effectively with stakeholders</li>
    <li>Lead the training and support for our Manufacturing Execution Systems (MES)
    software, ensuring engineering and production staff are proficient in its use</li>
    </ul> <h3><br>REQUIRED QUALIFICATIONS</h3> <ul> <li>2 years of experience in engineering
    required, preferably in a manufacturing environment.</li> <li>Education or formal
    training equivalent to a bachelor’s degree in a related field in Education, or
    Instructional Design.</li> <li>Work experience in a manufacturing company preferred
    with related experience in engineering for aerospace or related industries.</li>
    <li>Practical understanding of training procedures and manufacturing engineering.</li>
    <li>Experience with training creation &amp; delivery</li> <li>Ability to work
    independently and as part of a team.</li> <li>Ownership mentality with strong
    initiative in managing your own work, and possibly that of others. You should
    have a natural bias to assume responsibility.</li> <li>Excellent communication,
    presentation, and interpersonal skills, with the ability to translate complex
    technical information into easily understandable content.</li> <li>Proficiency
    and hands-on experience with Manufacturing Execution Systems (MES) software</li>
    <li>Proficiency with Microsoft Office Suite (Word, Excel, PowerPoint)</li> <li>Demonstrated
    expertise in Project Management, with the ability to manage multiple training
    initiatives concurrently.</li> </ul><div class="content-pay-transparency"><div
    class="pay-input"><div class="title">US Salary Range</div><div class="pay-range"><sp
