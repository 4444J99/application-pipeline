  description: <div class="content-intro"><p>Anduril Industries is a defense technology
    company with a mission to transform U.S. and allied military capabilities with
    advanced technology. By bringing the expertise, technology, and business model
    of the 21st century’s most innovative companies to the defense industry, Anduril
    is changing how military systems are designed, built and sold. Anduril’s family
    of systems is powered by Lattice OS, an AI-powered operating system that turns
    thousands of data streams into a realtime, 3D command and control center. As the
    world enters an era of strategic competition, Anduril is committed to bringing
    cutting-edge autonomy, AI, computer vision, sensor fusion, and networking technology
    to the military in months, not years.</p></div><p>&nbsp;</p> <p><strong>ABOUT
    THE TEAM</strong><br>The Air and Ground Deterrence team builds robots that find
    other robots and knock them out of the sky. At a time when air superiority can
    no longer be taken for granted, the Air and Ground Deterrence team provides mission
    critical capabilities to warfighters. From detection to tracking, identification,
    deterrence, and defeat, our family of networked sensors and effectors enables
    our customers to rapidly close the kill chain against a broad range of Unmanned
    Aerial System (UAS) threats. Working across product, engineering, sales, logistics,
    operations, and mission success, the Air and Ground Deterrence team develops,
    tests, deploys, and sustains the Anduril Air Defense Family of Systems (FoS) in
    challenging operational environments worldwide.<br><br><strong>ABOUT THE JOB</strong><br>We're
    looking for a Software Engineer to join our growing team in Irvine, CA. As a Mission
    Software Engineer on the Air and Ground Deterrence team, you will solve a wide
    variety of user-facing and system-level problems involving networking, autonomy,
    systems integration, robotics, and more, while making pragmatic engineering tradeoffs
    along the way. You'll work closely with product design and cross-functional teams
    to deliver full-stack solutions that align with and advance our mission. Your
    efforts will ensure that Anduril products seamlessly integrate and deliver exceptional
    user experiences while achieving a variety of critical outcomes. Above all, Mission
    Software Engineers are driven by a “Whatever It Takes” mindset—executing in an
    expedient, scalable, and pragmatic way while keeping the mission top-of-mind and
    making sound engineering decisions to deliver successful outcomes correctly, on-time,
    and with high quality.<br><br><strong>WHAT YOU'LL DO</strong></p> <ul> <li>Own
    feature development and rollout for our products.</li> <li>Develop extendable
    solutions for complex mission sets.</li> <li>Build micro-services to extend the
    capabilities of our user interface.</li> <li>Write code to improve products and
    scale the mission capability to more customers.</li> <li>Quarterback on call issues
    from remotes sites to resolve user facing issues in a timely manner.</li> <li>Participate
    in the full SDLC from concept and design through testing and deployment.</li>
    <li>Travel up to 30% of time to build, test, and deploy capabilities in the real
    world.</li> </ul> <p><br><strong>REQUIRED QUALIFICATIONS</strong></p> <ul> <li>Strong
    engineering background from industry or school, ideally in areas/fields such as
    Computer Science, Software Engineering, Mathematics, Physics, or Robotics.</li>
    <li>7+ years of experience building React applications.</li> <li>7+ years of experience
    building tools and platforms using Go and other cloud-native technologies.</li>
    <li>Eligible to obtain and maintain an active U.S. Secret security clearance.</li>
    </ul> <p><br><strong>PREFERRED QUALIFICATIONS </strong></p> <ul> <li>BS in Computer
    Science, Engineering, or similar field.</li> <li>Strong architectural engineering
    skills.</li> <li>Experience with NixOS.</li> <li>Experience with Containerization
    and Orchestration software such as Docker or Kubernetes.</li> <li>Knowledge and
    experience with control SW.</li> </ul> <p>&nbsp;</p><div class="content-pay-transparency"><div
