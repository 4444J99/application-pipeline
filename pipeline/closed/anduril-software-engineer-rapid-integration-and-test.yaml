  description: <div class="content-intro"><p>Anduril Industries is a defense technology
    company with a mission to transform U.S. and allied military capabilities with
    advanced technology. By bringing the expertise, technology, and business model
    of the 21st century’s most innovative companies to the defense industry, Anduril
    is changing how military systems are designed, built and sold. Anduril’s family
    of systems is powered by Lattice OS, an AI-powered operating system that turns
    thousands of data streams into a realtime, 3D command and control center. As the
    world enters an era of strategic competition, Anduril is committed to bringing
    cutting-edge autonomy, AI, computer vision, sensor fusion, and networking technology
    to the military in months, not years.</p></div><p>The Test and Evaluation team
    at Anduril ensures every product meets the highest standards of performance and
    reliability through a variety of testing activities, including developmental testing
    with surrogate vehicles. As we grow, we're seeking a dynamic Systems Integration
    Engineer focused on advancing our unmanned systems to achieve mission-critical
    objectives by integrating and advancing test platforms that facilitate rapid development
    and testing, seamlessly merging mechanical, sensor, and software components while
    collaborating with cross-functional teams to align with our overarching architecture.</p>
    <h3>WHAT YOU'LL DO</h3> <ul> <li>Participate in weekly stand-ups and provide Situation
    Reports (SITREPS) to leadership to highlight progress, pinpoint issues, and facilitate
    resource enablement.</li> <li>Develop and execute a streamlined test plan that
    focuses on key objectives while maintaining a commitment to safety and minimizing
    unnecessary procedures.</li> <li>Ensure adherence to baseline safety plans, proactively
    mitigating risks without compromising the team's agility and innovation goals.</li>
    <li>Communicate effectively to bolster teamwork and navigate risks, ensuring that
    information flows seamlessly within the team and across the organization.</li>
    <li>Act as a key contributor within the T&amp;E team, playing a significant role
    in shaping the overarching testing strategy and ensuring the success of the prototype's
    transition to formal development.</li> <li>Evaluate and implement sensor integrations
    that support operation by both human and autonomous planning agents.</li> <li>Debug
    complex linux networking problems</li> </ul> <h3>REQUIRED QUALIFICATIONS</h3>
    <ul> <li>Bachelor's degree in Robotics, Computer Science, or related field with
    3+ years combined professional working experience.</li> <li><strong>2+ years</strong>
    minimum of professional software development experience</li> <li><strong>2+ years</strong>
