  description: 'Why Harvey At Harvey, we’re transforming how legal and professional
    services operate — not incrementally, but end-to-end. By combining frontier agentic
    AI, an enterprise-grade platform, and deep domain expertise, we’re reshaping how
    critical knowledge work gets done for decades to come. This is a rare chance to
    help build a generational company at a true inflection point. With 1000+ customers
    in 58+ countries, strong product-market fit, and world-class investor support,
    we’re scaling fast and defining a new category in real time. The work is ambitious,
    the bar is high, and the opportunity for growth — personal, professional, and
    financial — is unmatched. Our team is sharp, motivated, and deeply committed to
    the mission. We move fast, operate with intensity, and take real ownership of
    the problems we tackle — from early thinking to long-term outcomes. We stay close
    to our customers — from leadership to engineers — and work together to solve real
    problems with urgency and care. If you thrive in ambiguity, push for excellence,
    and want to help shape the future of work alongside others who raise the bar,
    we invite you to build with us. At Harvey, the future of professional services
    is being written today — and we’re just getting started. Role Overview The Embedded
    Experience team operates like an internal innovation lab at Harvey, focused on
    expanding our core capabilities into adjacent markets beyond traditional law firms
    — including private equity, Big Four, technology companies, and other professional
    services. The team builds first-of-their-kind products that embed Harvey directly
    into the tools professionals already use, such as Outlook and Microsoft Word.
    Legal professionals spend most of their day in Microsoft Word: drafting, reviewing,
    and refining complex documents that shape meaningful outcomes. Harvey in Word
    brings AI-powered capabilities directly into Word, enabling lawyers to draft faster,
    run playbook reviews, and perform agentic editing, all without leaving their workflow.
    It''s one of our most strategic product lines and a key part of how we meet lawyers
    where they already work. As a Staff Software Engineer on this team, you’ll own
    critical backend systems that power these embedded experiences and play a central
    role in shaping how Harvey expands into new customer segments. This is a high-impact,
    high-autonomy role with deep customer interaction, where your technical judgment
    will directly influence product direction, system design, and the long-term foundations
    of new offerings. What You''ll Do Own and lead the backend architecture for Harvey’s
    embedded experiences, including integrations with enterprise platforms like Microsoft
    Word and Outlook. Design and build scalable, reliable backend systems and APIs
    that support AI-powered workflows across diverse customer environments. Partner
    directly with customers to deeply understand their workflows, validate hypotheses,
    and translate insights into durable, extensible product features. Drive technical
    decisions in a high-autonomy environment, where problem definition, scope, and
    success metrics are often shaped by the team rather than handed down. Collaborate
    closely with frontend engineers, product managers, and designers to shape cohesive,
    high-quality embedded experiences. Navigate ambiguity and help define new products
    and technical foundations for customer segments that are new to Harvey. Mentor
    engineers and raise the bar on system design, code quality, and engineering judgment
    across the team. What You Have 8+ years of professional software engineering experience,
    with deep expertise in backend or backend-leaning fullstack development. A strong
    track record of designing and building scalable, production-grade systems—including
    backend systems, APIs, services, and infrastructure for complex, distributed,
    or latency-sensitive applications—in SaaS or high-growth environments. Comfort
    working close to the product surface and directly with customers, translating
    qualitative feedback into technical solutions. Strong communication skills and
    the ability to collaborate effectively across engineering, product, design, and
    customer-facing teams. Excellent context-switching abilities and comfort operating
    in ambiguous, exploratory problem spaces. A bias toward ownership and action.
    Nice to Have Experience building embedded applications or deep integrations (e.g.,
    Office add-ins, browser extensions, IDE plugins, or similar). Experience building
    in TypeScript and/or Python Background in building or shipping products that integrate
    with AI or LLM-based systems. Experience working with Microsoft 365 integrations
    or enterprise SaaS platforms. Familiarity with private equity, Big Four, or other
    professional services workflow Compensation $238,000 - $312,000 USD Please find
    our CA applicant privacy notice here . #LI-KV1 Harvey is an equal opportunity
    employer and does not discriminate on the basis of race, gender, sexual orientation,
    gender identity/expression,'
