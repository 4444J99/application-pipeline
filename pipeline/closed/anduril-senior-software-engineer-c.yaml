    develop and deploy critically needed capabilities that address our customers’
    most pressing national security requirements.</p> <h3>ABOUT THE JOB</h3> <p>The
    Mission Software Engineering team builds, deploys, integrates, extends, and scales
    Anduril''s software to deliver mission-critical capabilities to our customers.
    As the software engineers closest to Anduril customers and end-users, Mission
    Software Engineers solve technical challenges of operational scenarios while owning
    the end-to-end delivery of winning capabilities such as Counter Intrusion, Joint
    All Domain Command &amp; Control, and Counter-Unmanned Aircraft Systems.<br><br>As
    a Senior Software Engineer, you will solve a wide variety of problems involving
    networking, autonomy, systems integration, robotics, and more, while making pragmatic
    engineering tradeoffs along the way. Your efforts will ensure that Anduril products
