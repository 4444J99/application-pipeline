    making sound engineering decisions to deliver successful outcomes correctly, on-time,
    and with high quality. Not only will you build the software, you’ll have the opportunity
    to work with the customer’s to deploy it.</p> <h4>WHAT YOU’LL DO&nbsp;</h4> <ul>
    <li>Own the software solutions that are deployed to customers from inception to
