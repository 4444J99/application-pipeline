    \ <p>dbt Labs is now synonymous with analytics engineering, defining the modern\
    \ data stack and serving as the data control plane for enterprise teams around\
    \ the world. And we\u2019re just getting started.. We\u2019re growing fast and\
    \ building a team of passionate, curious people across the globe. Learn more about\
