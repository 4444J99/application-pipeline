    >values</a>.</p></div><p><strong>The Opportunity</strong></p> <p>At dbt Labs,\
    \ data is the product, the language, and the mission. As our GTM AI Engineer,\
    \ you'll be the architect behind improving the productivity of our GTM organization\
    \ through AI-powered and AI-assisted GTM workflows. This is a high-impact, high-agency\
    \ role sitting at the intersection of engineering, automation, and go-to-market\
    \ strategy, directly influencing revenue performance, sales productivity, pipeline\
    \ generation, and conversion rates.&nbsp;</p> <p>You'll partner with senior GTM\
    \ leadership and GTM Operations to build the AI-powered infrastructure that defines\
    \ how dbt Labs goes to market. You'll own the full lifecycle: uncovering inefficiencies,\
    \ defining what \"better\" looks like, designing the solution, and building, shipping,\
    \ and iterating. This role is ideal for someone who thinks like a sales leader,\
    \ works like a product manager and builds like an engineer, and who wants their\
    \ work to directly move the needle on revenue growth.</p> <p><strong>In this role\
    \ you can expect to:</strong></p> <ul> <li>GTM owner of building AI capabilities\
    \ and agents to automate GTM AI use cases and workflow to improve GTM productivity</li>\
    \ <li>Build and deploy AI agents that reduce manual data entry and enhance outbound\
    \ personalization at scale.</li> <li>Enable GTM broader GTM organization AI tools\
    \ and capabilities and drive deeper adoption by building highest impact AI use\
    \ cases</li> <li>Implement AI-driven outbound programs using tools like Clay,\
    \ Glean, Claude and LLM APIs to automate account research, data enrichment, and\
    \ personalized outreach sequences in support of marketing pipeline goals.</li>\
    \ <li>Work directly with GTM operations (revenue ops, marketing ops, enablement\
    \ etc) to identify productivity improvement opportunities and leverage AI to improve\
    \ operations and sales productivity</li> <li>Experiment rapidly by prototyping\
    \ AI solutions for current manual processes, measuring results, and iterating\
    \ to improve GTM funnel conversion improvement.</li> </ul> <p><strong>You are\
    \ good fit if you have:</strong></p> <ul> <li>3\u20135 years of experience in\
    \ GTM Engineering, Marketing Operations, Revenue Operations, or a closely related\
    \ technical role with a track record of driving measurable results.</li> <li>Hands-on\
    \ experience applying AI and automation to GTM problems \u2014 you can walk us\
    \ through concrete examples.</li> <li>Proficiency with modern AI and automation\
    \ tools such as Clay, n8n, Zapier, Gumloop, or GPT/Claude APIs.</li> <li>Experience\
    \ with CRM and marketing platforms such as Salesforce, HubSpot, or Marketo.</li>\
    \ <li>A strong understanding of the sales funnel and the business logic behind\
    \ the data you're moving.</li> <li>A bias toward action \u2014 you move from idea\
    \ \u2192 experiment \u2192 solution quickly and thrive in ambiguity.</li> <li>The\
    \ ability to communicate clearly with both technical and non-technical stakeholders.</li>\
    \ </ul> <p><strong>You\u2019ll have an edge if you have:</strong></p> <ul> <li>Experience\
    \ with sales platforms like Salesforce, Clari, Gong, Outreach etc.</li> <li>Familiarity\
    \ with customer data platforms like Segment or Hightouch, and analytics tools\
    \ like Looker, Tableau, Omni \u2014 a natural fit with the dbt ecosystem.</li>\
    \ <li>Exposure to newer GTM AI tooling such as Claude Code, Parallel, Unify, or\
    \ Cursor.</li> <li>Experience designing or optimizing marketing attribution models,\
    \ lead scoring, or conversion funnels.</li> <li>Experience in a product-led growth\
    \ (PLG) or B2B SaaS environment.</li> </ul>"
