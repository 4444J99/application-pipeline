  description: <h2><strong>Who we are</strong></h2> <h3><strong>About Stripe</strong></h3>
    <p>Stripe is a financial infrastructure platform for businesses. Millions of companies
    - from the world’s largest enterprises to the most ambitious startups - use Stripe
    to accept payments, grow their revenue, and accelerate new business opportunities.
    Our mission is to increase the GDP of the internet, and we have a staggering amount
    of work ahead. That means you have an unprecedented opportunity to put the global
    economy within everyone's reach while doing the most important work of your career.</p>
    <h3><strong>About the Organization</strong></h3> <p>The Data Foundations team
    drives Data Engineering and Data Apps &amp; Tooling work across Stripe, enabling
    Stripes to leverage data to make informed decisions and build user-centric products.
    We provide tools and infrastructure to move, store, process, and analyze data,
    both at rest and in motion.&nbsp;</p> <ul> <li><strong>Revenue and Finance Automation</strong>-
    Revenue and Finance Automation (RFA) suite gives businesses power over the entire
    life cycle of their cash flow. By coordinating billing, tax, reporting, and data
    services in one modern stack, Stripe’s revenue and finance automation suite eliminates
    the inefficiencies of legacy finance tools and supports revenue growth.</li> <li><strong>Data
    Engineering Solutions</strong>-&nbsp; We are experts in data, working to make
    it cost-effective, understandable, and trustworthy. We build pipelines processing
    billions of events a day and are stewards of canonical data warehouses and datasets
    delivering products for Stripe Users while embedding with teams to build their
    data products.&nbsp; We are experts in using the Stripe Data Platform and to scale
    we lead the data culture and data education to enable product teams to own their
    data. We invest in [AI] Data Ops to scale incident handling and serve as an escalation
    path for data incidents to minimize their impact. The Data Engineering Solutions
    team will work closely with product teams delivering trustworthy data / backend
    code / and innovative (AI) tools/platforms/services for data..&nbsp;&nbsp;</li>
    </ul> <h2><strong>What you’ll do</strong></h2> <p>As a Software Engineer, you
    will design and build platforms, and system solutions that are configurable and
    scalable around the globe. You will partner with many functions at Stripe, with
    the opportunity to both work on financial platform systems, as well as direct
    user-facing business impact.</p> <h3><strong>Responsibilities</strong></h3> <ul>
    <li>Design, build, and maintain APIs, services, and systems across Stripe’s engineering
    teams.</li> <li>Work with engineers across the company to build new features at
    large-scale.</li> <li>Maintain a collaborative environment, engaging in discussions
    and decision-making processes with stakeholders within various domains at Stripe.</li>
    </ul> <h2><strong>Who you are</strong></h2> <p>We're looking for someone who meets
    the minimum requirements to be considered for the role. If you meet these requirements,
    you are encouraged to apply. The preferred qualifications are a bonus, not a requirement.</p>
    <h3><strong>Minimum requirements</strong></h3> <ul> <li>4+ years of experience
    in delivering, extending, and maintaining large scale distributed systems.</li>
    <li>Love to design systems that are elegant abstractions over complex patterns/practices,
    especially in the financial industry.</li> <li>Hold yourself and others to a high
    bar when working with production systems.</li> <li>Take pride in working on projects
    to successful completion involving a wide variety of technologies and systems.</li>
    <li>Think about systems, services, and platforms, and write high quality code.&nbsp;</li>
    <li>You have great product taste and a track record of taking complex problems
    and solving them elegantly.</li> <li>You are capable of working in ambiguous fast-moving
    environments and have a curiosity to learn the domain to a deep level.</li> <li>Enjoy
    working with a diverse group of people with different expertise.</li> </ul> <h3><strong>Preferred
    qualifications</strong></h3> <ul> <li>Familiarity with large scale distributed
    systems.</li> <li>Experience working in high-growth teams similar to Stripe.</li>
    <li>If you meet the minimum requirements, we encourage you to apply. Preferred
    qualifications are beneficial but not mandatory.</li> </ul> <h2><br><br></h2>
