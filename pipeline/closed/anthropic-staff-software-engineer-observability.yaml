  description: <div class="content-intro"><h2><strong>About Anthropic</strong></h2>
    <p>Anthropic’s mission is to create reliable, interpretable, and steerable AI
    systems. We want AI to be safe and beneficial for our users and for society as
    a whole. Our team is a quickly growing group of committed researchers, engineers,
    policy experts, and business leaders working together to build beneficial AI systems.</p></div><h2
    class="heading"><strong>About the Role</strong></h2> <p>Anthropic is seeking talented
    and experienced Software Engineers to join our Observability team within the Infrastructure
    organization. The Observability team owns the monitoring and telemetry infrastructure
    that every engineer and researcher at Anthropic depends on—from metrics and logging
    pipelines to distributed tracing, error analytics, alerting, and the dashboards
    and query interfaces that make it all actionable. By joining this team, you’ll
    have a direct impact on the reliability and operational excellence of Anthropic’s
    research and product systems.</p> <p>As Anthropic scales its infrastructure across
    massive GPU, TPU, and Trainium clusters, the volume and complexity of operational
    data is growing by orders of magnitude. We’re building next-generation observability
    systems—high-throughput ingest pipelines, cost-efficient columnar storage, unified
    query layers across signals, and agentic diagnostic tools—to ensure that engineers
    can detect, diagnose, and resolve issues in minutes rather than hours, even as
    the systems they operate become exponentially more complex.</p> <h2 class="heading"><strong>Responsibilities</strong></h2>
    <ul> <li>Design and build scalable telemetry ingest and storage pipelines for
    metrics, logs, traces, and error data across Anthropic’s multi-cluster infrastructure</li>
    <li>Own and evolve core observability platforms, driving migrations and architectural
    improvements that improve reliability, reduce cost, and scale with organizational
    growth</li> <li>Build instrumentation libraries, SDKs, and integrations that make
    it easy for engineering teams to emit high-quality telemetry from their services</li>
    <li>Drive alerting and SLO infrastructure that enables teams to define, monitor,
    and respond to reliability targets with minimal noise</li> <li>Reduce mean time
    to detection and resolution by building cross-signal correlation, unified query
    interfaces, and AI-assisted diagnostic tooling</li> <li>Partner with Research,
    Inference, Product, and Infrastructure teams to ensure observability solutions
    meet the unique needs of each organization</li> </ul> <h2 class="heading"><strong>You
    May Be a Good Fit If You</strong></h2> <ul> <li>Have 10+ years of relevant industry
    experience building and operating large-scale observability or monitoring infrastructure</li>
    <li>Have deep experience with at least one observability signal area (metrics,
    logging, tracing, or error analytics) and familiarity with the others</li> <li>Understand
    high-throughput data pipelines, columnar storage engines, and the tradeoffs involved
    in ingesting and querying telemetry data at scale</li> <li>Have experience operating
    or building on top of observability platforms such as Prometheus, Grafana, ClickHouse,
    OpenTelemetry, or similar systems</li> <li>Have strong proficiency in at least
    one of Python, Rust, or Go</li> <li>Have excellent communication skills and enjoy
    partnering with internal teams to improve their operational visibility and incident
    response capabilities</li> <li>Are excited about building foundational infrastructure
    and are comfortable working independently on ambiguous, high-impact technical
    challenges</li> </ul> <h2 class="heading"><strong>Strong Candidates May Also Have</strong></h2>
    <ul> <li>Experience operating metrics systems at very high cardinality (hundreds
    of millions of active time series or more)</li> <li>Experience with log storage
    migrations or operating columnar databases (ClickHouse, BigQuery, or similar)
    for analytics workloads</li> <li>Experience with OpenTelemetry instrumentation,
    collector pipelines, and tail-based sampling strategies</li> <li>Experience building
    or operating alerting platforms, on-call tooling, or SLO frameworks at scale</li>
    <li>Experience with Kubernetes-native monitoring, eBPF-based observability, or
    continuous profiling</li> <li>Interest in applying AI/LLMs to operational workflows
    such as automated root cause analysis, anomaly detection, or intelligent alerting</li>
    </ul> <p>&nbsp;</p><div class="content-pay-transparency"><div class="pay-input"><div
    class="description"><p>The annual compensation range for this role is listed below.&nbsp;</p>
    <p>For sales roles, the range provided is the role’s On Target Earnings ("OTE")
    range, meaning that the range includes both the sales commissions/sales bonuses
    target and annual base salary for the role.</p></div><div class="title">Annual
    Salary:</div><div class="pay-range"><span>£325,000</span><span class="divider">&mdash;</span><span>£390,000
    GBP</span></div></div></d
