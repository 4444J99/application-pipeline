  description: '<p>We''re looking for a Senior Platform Reliability Engineer who brings
    strong software engineering skills and a deep understanding of system behavior
    under load and stress. This role is a good fit for someone who wants to own reliability
    as a first-class concern – building the foundational systems that protect Asana''s
    platform, not just responding when things go wrong.</p> <p>You''ll build core
    platform systems like load shedding, rate limiting, circuit breakers, and traffic
    controls that protect Asana under real-world load. This is deep, cross-cutting
    work that shapes stability and performance of our entire infrastructure – and
    you''ll partner closely with other platform teams to make reliability something
    that''s built in, not bolted on.</p> <p>Our tech stack includes: AWS, Kubernetes
    (EKS), CloudFront, Istio, Cilium,&nbsp; MySQL (RDS), OpenSearch, DynamoDB, Redis,
    Terraform, Datadog, TypeScript, Scala, Go, and Python. (Yeah, we know this sounds
    like buzzword bingo – but we want this post to actually show up in your searches.)</p>
    <p>Why this role?</p> <ul> <li><strong>Reliability as a first-class feature</strong>:
    You won''t be patching things up after the fact. You''ll build the systems that
    make Asana resilient by design.</li> <li><strong>Foundational work</strong>: Load
    shedding, traffic management, ingress/egress – these are the building blocks that
    protect everything else. You''ll own them.</li> <li><strong>Strong collaboration,
    reasonable hours</strong>: You''ll work closely with infrastructure teams in Warsaw
    and Reykjavik, making deep collaboration practical without constant timezone gymnastics.</li>
    <li><strong>Room to grow</strong>: This is a new team, and you''ll help shape
    what Platform Reliability Engineering looks like at Asana – whether that means
    leading projects, mentoring others, or defining our technical direction.</li>
    </ul> <p>In this role, success means shipping systems that other teams rely on
    by default – because they make the platform safer, not because they''re mandatory.</p>
    <p>We''re especially interested in people who think like backend engineers but
    obsess over failure modes, capacity planning, and building systems that degrade
    gracefully under pressure.</p> <p>This role is based in our Warsaw office with
    an office-centric hybrid schedule. The standard in-office days are Monday, Tuesday,
    and Thursday. Most Asanas have the option to work from home on Wednesdays. Working
    from home on Fridays depends on the type of work you do, and your recruiter can
    share more about the in-office requirements.</p> <p>We offer a Contract of Employment
    (UoP) for our employees in Poland.</p> <p><strong>What you''ll achieve:</strong></p>
    <ul> <li>Design and build core platform systems – load shedding, circuit breakers,
    rate limiting – that protect Asana at scale.</li> <li>Own critical platform concerns
    like ingress and egress, shaping how traffic flows through our systems.</li> <li>Define
    stable interfaces and libraries that other platform teams build on.</li> <li>Lead
    end-to-end projects, from scoping and design through to rollout, working across
    multiple platform teams.</li> <li>Partner with other infrastructure teams to embed
    reliability into Asana''s architecture – not as an afterthought, but as a core
    design constraint.</li> <li>Debug hard problems across the stack. When something
    breaks in a way that matters, you''ll be the person who figures out why and makes
    sure it doesn''t happen again.</li> <li>Share knowledge through code reviews,
    design discussions, and mentorship.</li> </ul> <p><strong>About you:</strong></p>
    <ul> <li>Strong software engineering background – you''re comfortable writing
    production code and designing systems. We use Go, Python, Scala, and TypeScript,
    but we care more about engineering fundamentals than specific language experience.</li>
    <li>5+ years of experience building and operating backend systems at scale.</li>
    <li>Familiarity with distributed systems patterns – you''ve thought about things
    like backpressure, graceful degradation, and capacity planning.</li> <li>Experience
    with major cloud platforms (AWS, GCP, or Azure), Terraform, and monitoring tooling
    like Datadog or similar.</li> <li>Experience defining and working within explicit
    reliability and performance targets for production systems.</li> <li>Clear communicator
    and strong collaborator – you''re comfortable navigating trade-offs with other
    platform and infrastructure teams.</li> <li>Demonstrates curiosity about AI tools
    and emerging technologies, with a willingness to learn and leverage them to enhance
    productivity, collaboration, or decision-making</li> </ul> <p>At Asana, we''re
    committed to building teams that include a variety of backgrounds, perspectives,
    and skills, as this is critical to helping us achieve our mission. If you''re
    interested in this role and don''t meet every listed requirement, we still encourage
    you to apply.</p> <p>Important: This is a software engineering role. If your background
    is primarily script'
