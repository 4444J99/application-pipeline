    etc.), and orchestration frameworks (LangGraph, CrewAI, or custom state machines).
    Rigorous Evaluation: Proven ability to move beyond "trial and error" by building
    robust evaluation frameworks to measure agent accuracy, safety, and latency. Leadership
    & Impact Stakeholder Mastery: Experience leading technical discussions with enterprise
    customers to translate ambiguous business needs into concrete technical specs.
