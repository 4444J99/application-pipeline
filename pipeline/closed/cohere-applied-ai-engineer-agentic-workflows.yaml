    plan, and act across tools and data sources with enterprise-grade reliability
    and performance. Balance rapid iteration with enterprise requirements, evolving
    prototypes into stable, reusable solutions. Define and apply evaluation and quality
    standards to measure success, failures, and regressions. Debug real-world agent
    behavior and systematically improve prompts, workflows, tools, and guardrails.
