    \ You\u2019ll work across the stack, partner closely with product and analysts,\
    \ and ship changes that are measured in real business outcomes.</p> <p>This is\
    \ <strong>not</strong> a traditional feature team role. The work is fast-moving,\
    \ iterative, and data-driven. You\u2019ll regularly balance speed, quality, and\
    \ long-term maintainability while operating in an environment with incomplete\
    \ information.</p> <h4><strong>What we value on Growth </strong></h4> <ul> <li>Ownership\
