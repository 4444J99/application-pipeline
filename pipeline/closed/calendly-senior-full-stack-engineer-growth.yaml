    \ platform and growth infrastructure</li> <li>Make thoughtful engineering tradeoffs\
    \ in pursuit of impact</li> </ul> <p><strong>On a typical week, you might:</strong></p>\
    \ <ul> <li>Build and ship an experiment that impacts a core funnel step</li> <li>Partner\
    \ with product, design, and analysts to refine a hypothesis or flow</li> <li>Review\
