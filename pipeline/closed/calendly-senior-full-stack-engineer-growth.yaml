    \ <li>Sound judgment paired with a bias toward action</li> <li>Technical leadership\
    \ that raises the bar for the team</li> <li>Curiosity, humility, and openness\
    \ to diverse perspectives</li> </ul> <h4><strong>A day in the life of a Senior\
