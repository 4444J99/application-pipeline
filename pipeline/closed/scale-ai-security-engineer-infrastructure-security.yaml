    example, Scale works with the world''s top self-driving car and robotics ML teams
    as well as the largest companies in the generative AI space.<br>As our customer
    base is growing, you will be on the front lines of our engineering efforts for
    our federal AI projects, having the opportunity to meaningfully impact millions
    of dollars in revenue by working closely with our largest public sector customers
    and ensuring that they become passionate, lifelong Scale customers.</p> <p>Our
    Infrastructure Security Engineers ensure that the systems powering Scale’s Public
    Sector solutions are secure, compliant, and resilient. You’ll design and implement
    secure, scalable backend systems on top of our modern, cloud-native AI infrastructure.
    You''ll lead the development of services operating in high-security environments,
    define long-term reliability and security goals, and improve the health of critical
    components across the platform.</p> <p>Security Engineers collaborate closely
    with Product, Engineering, and cross-functional teams to deliver backend solutions
    that meet the demanding requirements of government agencies. You’ll contribute
    to the platform roadmap, engage with stakeholders to understand mission needs,
    and ensure our solutions meet strict federal compliance standards (e.g., FedRAMP,
    STIG, Cloud SRG). A strong foundation in containerized environments, cloud platforms,
    and security frameworks is essential, along with the ability to solve complex
    infrastructure challenges at scale.</p> <p>The ideal candidate brings deep backend
    experience, a security-first mindset, and a willingness to engage directly with
    customers and stakeholders. If you''re excited by solving hard problems that have
    real-world impact, we invite you to apply.</p> <p><strong>You will:</strong></p>
    <ul> <li>Design and implement secure scalable backend systems for Public Sector
    customers, leveraging Scale''s modern and cloud-native AI infrastructure.</li>
    <li>Own services or systems and define their long-term health goals, while also
    improving the health of surrounding components</li> <li>Improve our high engineering
    standards, tooling, and process</li> <li>Collaborate with cross-functional teams
    to define and execute the vision for backend solutions, ensuring they meet the
    unique needs of government agencies operating in secure environments.</li> <li>Participate
    actively in customer engagements, working closely with stakeholders to understand
    requirements and deliver innovative solutions.</li> <li>Contribute to the platform
    roadmap and product strategy for Scale AI''s Public Sector business, playing a
    key role in shaping the future direction of our offerings.</li> </ul> <p><strong>Ideally
    you''d have:&nbsp;</strong></p> <ul> <li><strong>An active security clearance,
    and the ability to obtain a TS/SCI with CI Poly. This is a requirement and candidates
    will not be considered who do not hold this level of clearance</strong></li> <li>Cloud-Native
    Technologies: Understanding of containerization (e.g., Docker) and container orchestration
    (e.g., Kubernetes) is desired. Familiarity with cloud platforms (e.g., AWS, Azure,
    GCP) and experience in developing and deploying applications in a cloud-native
    environment.&nbsp;</li> <li>Security Focused: Experience with Federal Compliance
    frameworks, and requirements(e.g, Cloud SRG, FedRAMP, STIG Benchmarks, etc). Experience
    developing software &amp; technical solutions that meet strict security &amp;
