    Excellent interpersonal and communication skills to effectively collaborate with
    cross-functional teams, stakeholders, and customers. Ability to clearly articulate
    technical concepts to non-technical audiences and foster a collaborative work
    environment.</li> <li>Adaptability and Learning Agility: Willingness to embrace
    new technologies, learn new skills, and adapt to evolving project requirements.
    Ability to quickly grasp and apply new concepts and stay up-to-date with emerging
    trends in software engineering.</li> <li>Must be able to support work 3-4 days
    a week from the DC or STL office.</li> </ul><div class="content-pay-transparency"><div
