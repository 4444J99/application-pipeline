    \ full-stack software engineer to join the Wikimedia Fundraising Technology team.&nbsp;\
    \ Each year, small donations from hundreds of thousands of individuals constitute\
    \ the majority of the budget for the Wikimedia Foundation. This money is used\
    \ primarily for projects, such as Wikipedia, and operational costs. We are looking\
    \ for someone who wants to help Wikimedia\u2019s non-profit fundraising efforts\
    \ to become more accessible worldwide, while maintaining integrity and scalability\
    \ across changing markets and over numerous engagement methods.</p> <p><strong>We'd\
    \ like you to do these things:</strong></p> <ul> <li>Support Wikimedia\u2019s\
    \ online fundraising goals worldwide by developing tools and features that empower\
    \ users to create effective fundraising campaigns</li> <li>Write code to integrate\
    \ with payment providers and other tools and services, both internal and third-party</li>\
    \ <li>Help the team surface important patterns and trends by improving internal\
    \ visibility and reporting capabilities</li> <li>Share the ongoing responsibility\
    \ of maintaining the security and integrity of the existing donation infrastructure</li>\
    \ <li>Provide an increased level of engineering support during high-traffic or\
    \ critical campaigns</li> </ul> <p><strong>We'd like you to have these skills:</strong></p>\
    \ <ul> <li>Two years experience developing in PHP or similar web scripting language(s)</li>\
    \ <li>Experience developing, deploying, and debugging in LAMP environments</li>\
    \ <li>BS in Computer Science or the equivalent in relevant work experience</li>\
    \ <li>Knowledge of MySQL and other relational databases</li> <li>Comfortable working\
    \ with JavaScript/HTML/CSS for front-end development</li> <li>Experience integrating\
    \ with third-party web APIs, and maintaining those integrations</li> <li>Highly\
    \ collaborative work style</li> <li>Ability to work confidently in open source\
    \ environments</li> </ul> <p><strong>And it would be even more awesome if you\
    \ have experience with:</strong></p> <ul> <li>Open-source software architecture\
    \ and development</li> <li>Payments-related code</li> <li>CiviCRM or other customer\
