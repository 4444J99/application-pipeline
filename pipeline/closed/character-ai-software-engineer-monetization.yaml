  description: About the Role We are scaling personalized AI to billions of users
    and monetization is at the core of making this vision sustainable. Our monetization
    team is reimagining how users interact with virtual currency, subscriptions, and
    premium features in ways that feel intuitive, rewarding, and fun. We’re looking
    for a product engineer who thrives at the intersection of core product, commerce,
    and user experience—someone excited to design and build systems that not only
    drive revenue but also enhance user delight. If you have experience with subscriptions,
    ads, virtual economies, or in-app purchase flows, and care deeply about building
    high-quality user experiences we’d love to work with you. What you’ll do Build
    and optimize user-facing features across mobile and web that power payments, subscriptions,
    and in-app purchase flows. Design and experiment with monetization surfaces, from
    virtual currency systems to premium upsells to advertising. Partner closely with
    design and product to create delightful, performant, and trustworthy purchase
    experiences. Collaborate with data science to define monetization success metrics,
    run experiments, and analyze outcomes. Work with backends to design scalable,
    reliable systems for payments, entitlements, and transactions. Maintain a high
    bar for UI/UX polish, performance, and privacy in sensitive user flows. Help shape
    the company’s approach to monetization experimentation, including frameworks for
    A/B testing and iteration velocity. Who you are Experience in consumer products
    with monetization, IAP, or subscription flows. Deep understanding of Typescript,
    React, React Native, Tailwind, HTML, and modern front-end best practices. Comfortable
    contributing to backend services, ideally with Python or Golang, especially for
    payments or commerce systems. Demonstrated experience shipping user-facing features
    that drove measurable monetization or engagement outcomes. Proven ability to thrive
    in a fast-paced environment, balancing iteration speed with quality and reliability.
    Excellent communication and collaboration skills across engineering, product,
    design, and data. Nice to Have Background in gaming, virtual currencies, or digital
    goods ecosystems. Prior experience with payment processors, subscription platforms,
    or marketplace ecosystems. Passion for user psychology, reward systems, and designing
    engaging monetization loops. Exposure to startup or zero-to-one product development
    environments. About Character.AI Character.AI empowers people to connect, learn
    and tell stories through interactive entertainment. Over 20 million people visit
    Character.AI every month, using our technology to supercharge their creativity
    and imagination. Our platform lets users engage with tens of millions of characters,
    enjoy unlimited conversations, and embark on infinite adventure s. In just two
    years, we achieved unicorn status and were honored as Google Play's AI App of
    the Year—a testament to our innovative technology and visionary approach. Join
    us and be a part of establishing this new entertainment paradigm while shaping
    the future of Consumer AI! At Character, we value diversity and welcome applicants
    from all backgrounds. As an equal opportunity employer, we firmly uphold a non-discrimination
    policy based on race, religion, national origin, gender, sexual orientation, age,
    veteran status, or disability. Your unique perspectives are vital to our success.
