  description: '<div class="content-intro"><p>Anduril Industries is a defense technology
    company with a mission to transform U.S. and allied military capabilities with
    advanced technology. By bringing the expertise, technology, and business model
    of the 21st century’s most innovative companies to the defense industry, Anduril
    is changing how military systems are designed, built and sold. Anduril’s family
    of systems is powered by Lattice OS, an AI-powered operating system that turns
    thousands of data streams into a realtime, 3D command and control center. As the
    world enters an era of strategic competition, Anduril is committed to bringing
    cutting-edge autonomy, AI, computer vision, sensor fusion, and networking technology
    to the military in months, not years.</p></div><h3>ABOUT THE TEAM</h3> <p>The
    Maneuver Dominance team at Anduril develops operationally relevant, multi-asset
    autonomy. We are focused on making large groups of autonomous systems work effectively
    together. We leverage existing Anduril drone platforms like Ghost or Altius, in
    addition to bringing 3rd party platforms into Anduril’s Lattice ecosystem.</p>
    <h3><strong>ABOUT THE JOB</strong></h3> <p>We are looking for a Robotics Software
    Engineer to join our rapidly growing team in Costa Mesa, CA. In this role, you
    will be responsible for developing and maintaining code that controls high-level
    robotic behavior (behavior trees). Additionally, members of our team contribute
    to solving a wide variety of problems involving networking, autonomy, systems
    integration, robotics, and more, while making pragmatic engineering tradeoffs
    along the way. You will ensure that Anduril products seamlessly work together
    to achieve a variety of critical outcomes. This will require strong systems-level
    knowledge and experience. If you are someone who possess a “Whatever It Takes”
    mindset—executing in an expedient, scalable, and pragmatic way while keeping the
    mission top-of-mind and making sound engineering decisions then this role is for
    you.<br><strong><br>WHAT YOU’LL DO<br></strong></p> <ul> <li>Develop behavior
    trees and state machines that control high-level behavior for teams of robots.</li>
    <li>Write software integrations that enable seamless interactions between autonomy
    and robotic peripherals e.g. sensors, flight controllers, radios.</li> <li>Own
    end to end testing of autonomy code from simulation to real world flight and customer
    deployment.</li> <li>Collaborate with Anduril software platform teams to integrate
    and develop their products to serve end users.</li> <li>Create and analyze metrics
    that are leveraged for debugging and monitoring.</li> <li>Triage issues, root
    cause failures, and coordinate next-steps.</li> <li>Partner with end-users to
    turn needs into features while balancing user experience with engineering constraints.</li>
    <li>Travel up to 25% of the time to build, test, and deploy capabilities in the
    real world.</li> </ul> <h4><strong>CORE REQUIREMENTS<br></strong></h4> <ul> <li>Strong
    engineering background from industry or school, ideally in areas/fields such as
    Computer Science, Software Engineering, Mathematics, or Physics.</li> <li>3+ years
    of professional experience programming in Python, C++ or Rust. You must be proficient
    in Python for developing autonomy behaviors while possessing basic C++ or Rust
    skills to integrate these behaviors into real-time systems and interact with hardware
    efficiently.</li> <li>Experience contributing to the stack of real-world robotics
    applications. e.g. Behaviors, navigation, planning or controls.</li> <li>Experience
    building software solutions involving significant amounts of data processing and
    analysis.</li> <li>Ability to quickly understand and navigate complex systems
    and established code bases.</li> <li>A desire to work on critical software that
    has a real-world impact.</li> <li>Must be willing to travel up to 25%.</li> <li>Eligible
    to obtain an active U.S. Secret security clearance</li> </ul> <h4><strong>PREFERRED
    REQUIREMENTS<br></strong></h4> <ul> <li>Strong background with focus in Physics,
    Mathematics, and/or Motion Planning to inform modeling &amp; simulation (M&amp;S)
    and physical systems.</li> <li>Developing and testing multi-agent autonomous systems
    and deploying in real-world environments.</li> <li>Feature and algorithm development
    with an understanding of behavior trees or state machines.</li> <li>Experience
    contributing to, modifying or writing code to interface with open-source autopilot
    software such as Ardupilot or PX4.</li> <li>Developing software/hardware for flight
    systems and safety critical functionality.</li> <li>Experience with distributed
    communication networks and message standards.</li> </ul><div class="content-pay-transparency"><div
