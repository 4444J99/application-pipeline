    that powers our user experiences — from tokens and typography to color, patterns,
    and component architecture.</p> <p>You will also have the opportunity to shape
    the roadmap for our internal applications and mobile app, driving impactful projects
    from concept to completion. Working closely with product managers, operations
    teams, and other engineering teams, you''ll influence the design and functionality
    of the experience that all of our members use every day.</p> <p>The base salary
    offered for this role and level of experience will begin at $164,000 and up to
