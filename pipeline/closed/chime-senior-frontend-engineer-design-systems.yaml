    in UX development, ensuring a seamless and consistent user experience across all
    our applications</li> <li>Implement product features and provide support or work
    with backend engineers to define and integrate platform APIs</li> <li>Mentor,
    document, and share knowledge as part of your immediate team as well as through
    Chime Engineering as a whole</li> <li>Foster collaboration across engineering
    teams to create reusable, scalable solutions, contributing to architecture blueprints
    that benefit the entire organization.</li> <li>Lead projects by defining timelines,
    managing scope, overseeing development, and ensuring quality</li> <li>Contribute
    to a culture of continuous improvement by actively participating in sprint ceremonies
    and process refinement</li> <li>Participate in a community of practice (guild)
    around how our frontend ecosystem is architected, developed, tested, deployed,
