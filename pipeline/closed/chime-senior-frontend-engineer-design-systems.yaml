    </ul> <h3><strong>To thrive in this role, you have</strong> &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</h3>
    <ul> <li>Deep knowledge and ability to navigate all aspects of front-end development,
    with 6+ years of active web and/or mobile development experience with React, React
    Native and Typescript</li> <li>Demonstrated ability to be a team player as well
    as a top-level individual contributor in a cross-functional environment, collaborating
    with engineers, designers and product managers</li> <li>Work across the stack
