  description: '<div class="content-intro"><p style="line-height: 1.2;">&nbsp;</p>
    <hr> <p><strong>About Gusto</strong></p> <p><span style="font-weight: 400;">At
    Gusto, we''re on a mission to grow the small business economy. We handle the hard
    stuff—like payroll, health insurance, 401(k)s, and HR—so owners can focus on their
    craft and customers. With teams in Denver, San Francisco, and New York, we’re
    proud to support more than 400,000 small businesses across the country, and we’re
    building a workplace that represents and celebrates the customers we serve. Learn
    more about our </span><a href="https://gusto.com/about/careers/total-rewards"><span
    style="font-weight: 400;">Total Rewards philosophy</span></a><span style="font-weight:
    400;">.&nbsp;</span></p></div><p><strong>About the Role:</strong></p> <p>As an
    engineer on the Developer Productivity Rails team, you''ll work at the heart of
    Gusto''s core applications, championing Ruby, Rails, and related technologies
    so that hundreds of product engineers can ship faster and more confidently. You''ll
    modernize foundational systems, build reusable tools and patterns, and drive automation
    (including AI-assisted tooling) that scales our Rails applications as the number
    of services and engineers grows. This is high-leverage work: the improvements
    you make ripple nearly every engineering team at Gusto.</p> <p><strong>About the
    Team:</strong></p> <p>The Developer Productivity Rails team empowers Gusto engineers
    by keeping our core applications modern, up to date, and productive to work in.
    We own Rails and Ruby upgrades across all services, maintain shared libraries
    and CI infrastructure, and build the tooling and standards that make it easy to
    do the right thing, for humans and AI agents alike. We''re a small team with an
    outsized ownership footprint, which means a high degree of autonomy and freedom
    to shape how engineering works at Gusto.</p> <p><strong>Here’s what you’ll do
    day-to-day:</strong></p> <ul> <li>Seek out and solve inefficiencies in the tooling,
    frameworks, and feedback mechanisms available to product engineers to improve
    developer productivity</li> <li>Advance Rails and Ruby upgrades across Gusto''s
    core applications, developing automation and AI-assisted tooling to scale this
    work across a growing number of services</li> <li>Build and maintain reusable
    libraries, gems, and patterns that commonize best practices so teams are productive
    from day one in any service</li> <li>Steward and improve shared CI tooling, including
    Danger, Sorbet, RuboCop, database migration checks, and other developer-facing
    guardrails</li> <li>Collaborate with product engineering teams as their partner
    and "internal customer advocate," understanding their pain points and shipping
    solutions iteratively</li> <li>Contribute to observable standards and scorecards
    that make the health and maturity of our services visible and actionable</li>
    <li>Leverage AI tools (Cursor, Claude, automation agents) as part of your daily
    workflow and help shape how AI augments developer productivity across the organization</li>
    </ul> <p><strong>Here’s what we''re looking for:</strong></p> <ul> <li>10+ years
    of professional software development experience with solid architecture and systems
    thinking skills</li> <li>Deep working knowledge of Ruby on Rails, or equivalent
    backend experience (Python, Go, TypeScript) with a genuine willingness to go deep
    on Rails</li> <li>Experience building developer tooling, shared libraries, or
    platform infrastructure that serves 10s or 100s of engineers</li> <li>Comfort
    working with colleagues as your "customers," you''re a great communicator who
    can plan, document, consult, and collaborate effectively on changes that affect
    how others work</li> <li>Familiarity with AI-assisted development workflows (e.g.,
    Cursor, Copilot, or similar) and enthusiasm for applying AI to scale infrastructure
    and automation work</li> <li>Experience with some combination of: type systems
    (Sorbet/RBS), CI/CD pipelines, code generation, linting/static analysis, or framework
    upgrades at scale</li> <li>A tendency toward making things observable, repeatable,
    and automated, you''d rather build the machine than do it by hand twice</li> </ul>
    <p>Our cash compensation amount for this role is targeted at $190,000-$215,000
    /yr in Denver &amp; most remote locations, and $220,000-$250,000 /yr for San Francisco,
    Seattle &amp; New York. Final offer amounts are determined by multiple factors,
    including candidate experience and expertise, and may vary from the amounts listed
    above.</p><div class="content-conclusion"><hr> <p><span style="font-weight: 400;">Gusto
    has physical office spaces in Denver, San Francisco, and New York City. Employees
    who are based in those locations will be expected to work from the office on designated
    days approximately <strong>2-3 days </strong>per week (or more depending on role).
    The same office expectations apply to all Symmetry roles, Gusto''s subsidiary,
    whose physical office is in Scottsdale.</span></p'
