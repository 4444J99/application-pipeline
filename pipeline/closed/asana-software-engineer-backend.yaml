  description: <p>As a member of the backend engineering team developing the software
    of a product-led company, you won’t just code — you will be an integral part of
    the entire product development process, from conception to post-launch reflection.
    Asana is helping teams become significantly more productive with our leading work
    management platform. You will be manifesting continuous improvements in their
    experience and helping us achieve our mission to enable all teams to work together
    effortlessly.</p> <p>The R&amp;D team builds features end-to-end. From designing
    our data models to implementing the subtle interaction behaviors that differentiate
    good software from great software. We work closely with UI designers and are supported
    by our infrastructure team. We aim to delight users with both large new features
    and smaller, daily product enhancements—thanks to our continuous deployment architecture.
    We want to create a superlative user experience, down to the smallest details.</p>
    <p>This role is based in our Warsaw office with an office-centric hybrid schedule.
    The standard in-office days are Monday, Tuesday, and Thursday. Most Asanas have
    the option to work from home on Wednesdays. Working from home on Fridays depends
    on the type of work you do, and your recruiter can share more about the in-office
    requirements.</p> <p><strong>Our employees in Poland are employed under a contract
    of employment.</strong></p> <p><strong>What you’ll achieve</strong></p> <ul> <li>As
    a backend engineer, you get to build and own a broad swath of the product across
    creating efficient, flexible, and scalable back-end processing logic</li> <li>Participate
    in every step of the product development process with an open and curious team,
    working cross-functionally with a product manager, designer, user researcher,
    and data scientist</li> <li>Develop clean, beautiful code and leave it better
    than you found it</li> <li>Experience growth and development through opportunities
    to stretch and learn</li> </ul> <p><strong>About you</strong></p> <ul> <li>4 or
    more years of backend experience working in large, well-maintained codebases building
    user-facing products (integration development preferred), with professional experience
    in TypeScript, React, or Scala</li> <li>Excellent communication skills for collaborating
    with cross-functional partners (e.g. PM, design) and cross-timezone with partner
    teams</li> <li>Sound autonomous judgment when balancing moving quickly with producing
    quality, long-term maintainable code</li> <li>Passionate about creating a superlative
    user experience and attentive to details</li> <li>Appreciate productivity and
    care deeply about helping teams collaborate more effectively and efficiently,
    including your own</li> <li>Excited to be a part of an inclusive culture where
    everyone brings the aspects of themselves to the workplace that they need to thrive</li>
    <li>Demonstrated curiosity about AI tools and emerging technologies, with a willingness
    to learn and leverage them to enhance productivity, collaboration, or decision-making</li>
    </ul> <p>At Asana, we're committed to building teams that include a variety of
    backgrounds, perspectives, and skills, as this is critical to helping us achieve
    our mission. If you're interested in this role and don't meet every listed requirement,
    we still encourage you to apply.</p> <p><strong>What we’ll offer</strong></p>
    <p>For this role, the estimated base salary range is between 25,667 PLN - 33,896
    PLN. The actual base salary will vary based on various factors, including market
    and individual qualifications objectively assessed during the interview process.
    The listed range above is a guideline, and the base salary range for this role
    may be modified.</p> <p>In addition to base salary, your compensation package
    may include additional components such as equity, sales incentive pay (for most
    sales roles), and benefits. If you're interviewing for this role, speak with your
    Talent Acquisition Partner to learn more about the total compensation and benefits
    for this role.</p> <p>We strive to provide equitable and competitive benefits
    packages that support our employees worldwide and include:</p> <ul> <li>Generous,
    transparent and fair compensation system</li> <li>Contract of Employment (<strong>and
    the option of </strong>&nbsp;<strong>50% tax deductible costs for author’s rights
    usage in respect of&nbsp; applicable roles )&nbsp;</strong></li> <li>Health insurance
    with dental and travel coverage (Lux Med)&nbsp;</li> <li>Meals reimbursement on
    the days that you work from the office</li> <li>Career growth budget&nbsp;</li>
    <li>Home office setup budget&nbsp;</li> <li>Gym/Fitness reimbursement</li> <li>Fertility
    healthcare and family-forming support with <a href="https://www.get-carrot.com/">Carrot</a></li>
    <li>Mental Health Support in Modern Health</li> <li>Group life insurance</li>
    <li>MacBooks with all necessary accessories</li> </ul> <p>#LI-Hybrid</p><div class="content-conclusion"><p><strong>About
    us</st
