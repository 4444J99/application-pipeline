  description: "<p>Toast creates technology to help restaurants and local businesses\
    \ succeed in a digital world, helping business owners operate, increase sales,\
    \ engage customers, and keep employees happy.</p> <p>The Toast POS app is the\
    \ central pillar of Toast\u2019s restaurant products. Every day, hundreds of thousands\
    \ of servers, hosts, bartenders, and chefs use Toast\u2019s POS to serve millions\
    \ of guests. Our POS product is constantly evolving, and the POS Productivity\
    \ team builds the platform that makes this evolution possible.</p> <p>Our mission\
    \ is to make it as easy as possible for 150+ Android engineers to develop new\
    \ features and deliver them with high confidence and quality. We are customer-obsessed\u2014\
    our customers are our fellow developers, and luckily for us, they are just a Slack\
    \ message away! We strive to make it easy for people to do the right thing by\
    \ default.</p> <p>The team manages a broad technical domain, including CI/CD,\
    \ the local developer experience, and release engineering for the POS app. Its\
    \ projects cover Android app development, Java and Kotlin backend services in\
    \ AWS, React UIs, and more. The team is an excellent fit for Android engineers\
    \ with experience with mobile DevOps\u2013CI/CD, and build and release processes.</p>\
    \ <p>The team\u2019s current primary goals are boosting build speeds and significantly\
    \ reducing our lead time to value by optimizing POS developers\u2019 build/test\
    \ cycles, and making updates to the mobile app release platform to allow Toast\
    \ to manage concurrent releases across multiple projects.</p> <p><strong>A day\
    \ in the life (Responsibilities)</strong><span data-sheets-root=\"1\"><br></span></p>\
    \ <ul> <li>Deliver rapid, high-quality output, leveraging AI tooling to accelerate\
    \ development and improve code quality.</li> <li>Provide feedback and participate\
    \ in code reviews to ensure implementation meets requirements.</li> <li>Participate\
    \ in architectural discussions and influence the team\u2019s and POS teams\u2019\
    \ technical roadmap.</li> <li>Mentor and provide technical guidance to other team\
    \ members.</li> <li>Partner closely with the developer community, release manager\
    \ and QA functions to develop DevEx, feature flag (FF) management and release\
    \ strategies.</li> <li>Leverage cutting edge AI tools to enhance your development\
    \ workflow, improve velocity, and help pioneer new approaches to building - contributing\
    \ to a culture of innovation and productivity across the team.</li> </ul> <p><strong>What\
    \ you'll need to thrive (Requirements)</strong></p> <ul> <li>Deep experience with\
    \ Android development and a strong interest in full-stack work (Java/Kotlin Cloud\
