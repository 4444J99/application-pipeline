    \ <li>Contribute to the design and implementation of our next-generation compute\
    \ infrastructure</li> <li>Share knowledge with team members on low-level systems\
    \ programming and Linux kernel internals</li> <li>Partner with cloud providers\
    \ to influence hardware and platform features for AI workloads</li> </ul> <h2><strong>You\
