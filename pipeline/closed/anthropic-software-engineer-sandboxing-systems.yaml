    \ experience with systems languages like Rust</li> <li>Understand Linux resource\
    \ management, scheduling, and memory management</li> <li>Have experience profiling\
    \ and debugging system-level performance issues</li> <li>Are comfortable diving\
    \ into unfamiliar codebases and technical domains</li> <li>Are results-oriented,\
