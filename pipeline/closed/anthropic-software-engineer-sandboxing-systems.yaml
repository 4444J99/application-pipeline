    \ drivers, and system-level components to enhance our compute infrastructure</li>\
    \ <li>Investigate and resolve performance bottlenecks in virtualized environments</li>\
    \ <li>Collaborate with cloud engineering teams to optimize interactions between\
    \ our workloads and underlying hardware</li> <li>Develop tooling for monitoring\
