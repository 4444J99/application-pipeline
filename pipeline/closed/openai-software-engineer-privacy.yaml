  description: 'About the Team The Privacy Team at OpenAI is committed to building
    a secure and trustworthy platform. Our area of responsibility encompasses all
    OpenAI products and systems that process user data. We provide cross-functional
    partners with the tools needed to ensure that all products adhere to the highest
    standards of data privacy and legal compliance. Our approach to prioritizing responsible
    data use is integral to OpenAI''s mission of safely introducing Artificial General
    Intelligence (AGI) that offers widespread benefits. About the Role We’re in search
    of a Software Engineer with experience building data pipelines and working closely
    with members of the Legal team. This role is perfect for someone who''s passionate
    about the intersection of systems, privacy, and legal compliance. You will architect,
    design, and write backend systems responsible for handling some of the most sensitive
    data at OpenAI. This role is based in Dublin, Ireland. We use a hybrid work model
    of 3 days in the office per week and offer relocation assistance to new employees.
    In this role, you will: Design, build, and maintain back-end systems and services
    that power privacy and data compliance functions within our API products and consumer
    applications. Work closely with legal advisors and other engineers to respond
    to court orders and other legal processes, all while upholding strict data privacy
    and legal standards. Identify opportunities for automation and build the tools
    that enable other teams to automate tasks involving customer data. Develop and
    implement data handling policies and procedures in compliance with legal and ethical
    standards, ensuring the integrity and confidentiality of user data. You might
    thrive in this role if you: Have experience building data pipelines, especially
    for legal processes and investigative workflows. Can translate legal requirements
    into technical solutions and explain technical solutions to a non-technical audience.
    Take responsibility for problems from beginning to end, and are prepared to acquire
    any missing knowledge necessary to get the job done. Create tools to speed up
    your own and your colleagues’ workflows, particularly when pre-existing solutions
    are inadequate. Deeply care about user experience and take pride in developing
    products that meet customer needs while ensuring privacy. Have a background in
    security investigations or experience working in collaboration with trust and
    safety, legal, and engineering teams. Compensation, Benefits and Perks This is
    a position with OpenAI Ireland Ltd., which controls the hiring and management
    of this position. Total compensation includes an annual salary, generous equity,
    and benefits. Medical, dental, and vision insurance for you and your family Mental
    health and wellness support PRSA plan with 6% employer matching Unlimited time
    off Annual learning & development stipend (€1,400 per year) About OpenAI OpenAI
    is an AI research and deployment company dedicated to ensuring that general-purpose
    artificial intelligence benefits all of humanity. We push the boundaries of the
    capabilities of AI systems and seek to safely deploy them to the world through
    our products. AI is an extremely powerful tool that must be created with safety
    and human needs at its core, and to achieve our mission, we must encompass and
    value the many different perspectives, voices, and experiences that form the full
    spectrum of humanity. We are an equal opportunity employer, and we do not discriminate
    on the basis of race, religion, color, national origin, sex, sexual orientation,
    age, veteran status, disability, genetic information, or other applicable legally
    protected characteristic. For additional information, please see OpenAI’s Affirmative
    Action and Equal Employment Opportunity Policy Statement . Background checks for
    applicants will be administered in accordance with applicable law, and qualified
    applicants with arrest or conviction records will be considered for employment
    consistent with those laws, including the San Francisco Fair Chance Ordinance,
    the Los Angeles County Fair Chance Ordinance for Employers, and the California
    Fair Chance Act, for US-based candidates. For unincorporated Los Angeles County
    workers: we reasonably believe that criminal history may have a direct, adverse
    and negative relationship with the following job duties, potentially resulting
    in the withdrawal of a conditional offer of employment: protect computer hardware
    entrusted to you from theft, loss or damage; return all computer hardware in your
    possession (including the data contained therein) upon termination of employment
    or end of assignment; and maintain the confidentiality of proprietary, confidential,
    and non-public information. In addition, job duties require access to secure and
    protected information technology systems and related data security obligations.
    To notify OpenAI that you believe this job posting is non-compliant, please submit
    a report through this form . No response will be'
