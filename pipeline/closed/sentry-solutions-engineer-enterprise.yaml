    resources, and content from scratch (scripts, code samples, demos, sales-consumable
    collateral/documents, etc.). Have a fast-paced, results-driven mindset. Love developer
    tools, open-source, and/or all things software development life cycle! Qualifications
    5+ years as a Solutions Engineer (preferred), Implementation Consultant, Support
    Engineer, or Software Developer with experience leading projects and/or working
    with customers. Hands-on experience working with programming languages and frameworks
    including JavaScript, Python, Node.js, Java, PHP, .NET, Ruby, React, React Native,
