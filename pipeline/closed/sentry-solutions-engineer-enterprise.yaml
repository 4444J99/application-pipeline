    set as in-office anchor days to encourage meaningful collaboration. If you like
    to selfishly build things that make your digital life better, come help us build
    the next generation of software monitoring tools. About the role: The Solutions
    Engineering team at Sentry is responsible for helping our largest customers successfully
    embed Sentry into their applications and workflows, from integrating our SDK to
    making sure alerts and issues make it to the right place at the right time. Solutions
    Engineers will be interfacing with customers to ensure optimal implementation
    and utilization ensuring that: Developers can effectively identify and resolve
    slowdowns and errors in their applications. Development teams increase developer
    productivity and customer satisfaction. In this role you will Understand customers''
    pain points and objectives and translate those into implementation and onboarding
    plans to meet those objectives and demonstrate business value. Develop best practices,
    educational offerings, and content around error and performance management, open-source,
    or the Sentry product (ex: “how-to” articles and/or videos on specific functionality
    of the product). Act as a trusted advisor and subject-matter expert for customers
    to assist with instrumenting software engineering and monitoring best practices
    Provide workshop-level interaction to customers in order to drive the maturity
    of use and broader adoption. Work cross-functionally (internally) to provide feedback
