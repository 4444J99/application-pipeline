  description: <h1>Backend Engineer, UI Services</h1> <h2>Who we are</h2> <h3>About
    Stripe</h3> <p>Stripe is a financial infrastructure platform for businesses. Millions
    of companies—from the world’s largest enterprises to the most ambitious startups—use
    Stripe to accept payments, grow their revenue, and accelerate new business opportunities.
    Our mission is to increase the GDP of the internet, and we have a staggering amount
    of work ahead. That means you have an unprecedented opportunity to put the global
    economy within everyone’s reach while doing the most important work of your career.</p>
    <h3>About the team</h3> <p>The UI Services team provides backend-for-frontend
    (BFF) capabilities and services to bridge the gap between the complex backend
    systems and the UI platform, allowing a unified experience. Our team is ambitious
    and forward-thinking, committed to building solutions that not only meet today's
    needs but also lay the groundwork for future innovations, ultimately enriching
    the value that Stripe can deliver to its customers.</p> <h2>What you’ll do</h2>
    <p>You will design, implement and maintain the services for our UI platform at
    scale, including its user experience, and driving widespread adoption among the
    engineering teams. The primary objective of the UI platform is to empower engineers
    to build product experiences at scale, efficiently and faster while ensuring a
    consistent and smooth user experience.</p> <h2>Who you are</h2> <p>We are seeking
    a candidate with a background in backend services, tooling and infrastructure
    and who meets the minimum requirements to be considered for the role. If you meet
    these requirements, you are encouraged to apply.&nbsp;</p> <h3>Minimum requirements</h3>
    <ul> <li>Residence in the Barcelona metropolitan area, or willing to relocate</li>
    <li>3+ years of backend engineering experience building services using programming
    languages such as Java, Ruby, or Go.</li> <li>Experience in developing infrastructure
    solutions.</li> <li>Strong oral and written communication skills and ability to
    collaborate with designers, product managers, and product engineers</li> <li>Appreciation
    for the importance of good documentation -- internal and external</li> </ul> <p>&nbsp;</p>
