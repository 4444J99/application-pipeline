  description: About Sentry Bad software is everywhere, and we’re tired of it. Sentry
    is on a mission to help developers write better software faster so we can get
    back to enjoying technology. With more than $217 million in funding and 100,000+
    organizations that believe we’re on to something, we're building performance and
    error monitoring tools that help companies like Disney, Microsoft, and Atlassian
    spend less time fixing bugs and more time building products. Sentry embraces a
    hybrid work model across our global hubs, with Mondays, Tuesdays, and Thursdays
    set as in-office anchor days to encourage meaningful collaboration. If you like
    to selfishly build things that make your digital life better, come help us build
    the next generation of software monitoring tools. About the role As a Senior Software
    Engineer, Native, on our client infrastructure (SDK) team, you'll join a cross-functional
    group of Software Engineers that is responsible for the client facing operation
    of Sentry. This includes building and maintaining SDK libraries, extending our
    existing native integrations, and building new integrations for Gaming Consoles.
    This means you will be involved in the design and evolution of both external and
    internal services, as well as create new mission critical software at Sentry.
    If you want to build and improve product features that empower software development
    teams to do their best work, all while writing open source code, this could be
    the role for you. In this role you will Develop first-class clients for native
    languages like C and C++, as well as integrations for popular frameworks in Gaming,
    IoT and high performance applications Work in the Game Dev Experience (GDX) team
    to improve and evolve our native, game engine and console products Puzzle over
    unique challenges in the fields of compilers, debugging, operating system internals,
    low-level optimization, and distributed systems Use a variety of programming languages,
    systems, and technologies to own and solve problems related to mission critical
    software of Sentry (C and C++ — but also Rust, Python, .NET and JavaScript) Collaborate
    with Infrastructure and Operations teams to build solutions that scale (we process
    over a billion events every day) Write unit and integration tests that ensure
    the correctness of your work, as well as strong documentation to help educate
    both peers and customers You’ll love this job if you Take pride in building features
    that don't just work, but are also delightful to use Like to take challenges that
    you don't see every day, daily Care about writing highly performant code Build
    a product by developers for developers Join a modern software development team
    that iterates and ships code rapidly Contribute to open source full-time — our
    product is entirely Open Source Work with collaborative, thoughtful engineers
    who push themselves and others to do better Qualifications 5+ years relevant experience
    Experience in writing high performance native server, desktop-applications or
    libraries Experience in programming languages such as C and C++ Bonus points for
    experience with Game engines (Unreal, Unity, Godot) or Gaming Consoles (PlayStation,
    Xbox, Nintendo Switch) and other programming languages (Rust, .NET) Good written
    and spoken English communication skills Live in the Vienna, Austria area or are
    willing to relocate We are obliged by law to quote the minimum wage of EUR 60,844,--
