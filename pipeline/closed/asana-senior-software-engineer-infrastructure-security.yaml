  description: <p>We are dedicated to ensuring proactive elimination of entire classes
    of security risk by engineering the core libraries, platforms and frameworks that
    provide secure guardrails for all Asanas.</p> <p>We are looking for a Senior Software
    Engineer to join our new Security Development team. This team is focused on building
    durable, secure-by-default solutions to protect Asana's infrastructure and product.
    Instead of acting as gatekeepers, we build guardrails that empower engineering
    teams to move quickly and safely. You will be responsible for engineering preventative
    controls at scale, focusing on building platforms and frameworks that eradicate
    systemic risks.</p> <p>This role is based in our San Francisco office with an
    office-centric hybrid schedule. The standard in-office days are Monday, Tuesday,
    and Thursday. Most Asanas have the option to work from home on Wednesdays. Working
    from home on Fridays depends on the type of work you do and the teams with which
    you partner. If you're interviewing for this role, your recruiter will share more
    about the in-office requirements.</p> <p><strong>What you’ll achieve:</strong></p>
    <ul> <li>Design, build, and maintain secure-by-default frameworks, libraries,
    and platforms to eliminate entire classes of vulnerabilities.</li> <li>Engineer
    and improve core security services, including our access control frameworks, secrets
    management infrastructure, and AWS permissions systems.</li> <li>Develop and own
    the platform for vulnerability remediation, creating tooling that empowers engineering
    teams to address risks efficiently.</li> <li>Partner with product and&nbsp; infrastructure
    teams to architect and implement foundational security controls for Asana including
    cloud networking, and compute infrastructure.</li> <li>Partner with product teams
    to effectively offer recommendations for how to secure projects at all phases
    of implementation (design, development, launch, and/or incidents)</li> <li>Influence
    engineering initiatives through design reviews, communicating security principles,
    and helping teams make sound security trade-offs.</li> </ul> <p><strong>About
    you:</strong></p> <ul> <li>4+ years of experience in full-time professional software
    development, working with large codebases.</li> <li>Proven software engineering
    experience, with a background in building platforms, libraries, or core infrastructure.</li>
    <li>Strong interest or direct experience in security engineering, with a focus
    on building preventative controls.</li> <li>Expertise in programming and computer
    science fundamentals.</li> <li>Experience with cloud infrastructure and services,
    particularly AWS.</li> <li>Excellent communication skills for collaborating effectively
    with engineering teams across the organization.</li> <li>A proactive mindset geared
    towards identifying and eliminating systemic risks, not just individual bugs.</li>
    <li>Demonstrates curiosity about AI tools and emerging technologies, with a willingness
    to learn and leverage them to enhance productivity, collaboration, or decision-making</li>
    </ul> <p><strong>What we’ll offer</strong></p> <p>Our comprehensive compensation
    package plays a big part in how we recognize you for the impact you have on our
    path to achieving our mission. We believe that compensation should be reflective
    of the value you create relative to the market value of your role. To ensure pay
    is fair and not impacted by biases, we're committed to looking at market value
    which is why we check ourselves and conduct a yearly pay equity audit.</p> <p>For
    this role, the estimated base salary range is between $202,000-$230,000. The actual
    base salary will vary based on various factors, including market and individual
    qualifications objectively assessed during the interview process. The listed range
    above is a guideline, and the base salary range for this role may be modified.</p>
    <p>In addition to base salary, your compensation package may include additional
    components such as equity, sales incentive pay (for most sales roles), and benefits.
    If you're interviewing for this role, speak with your Talent Acquisition Partner
    to learn more about the total compensation and benefits for this role.</p> <p>We
    strive to provide equitable and competitive benefits packages that support our
    employees worldwide and include:</p> <ul> <li>Mental health, wellness &amp; fitness
    benefits</li> <li>Career coaching &amp; support</li> <li>Inclusive family building
    benefits</li> <li>Long-term savings or retirement plans</li> <li>In-office culinary
    options to cater to your dietary preferences&nbsp;</li> </ul> <p>These are just
    some of the benefits we offer, and benefits may vary based on role, country, and
    local regulations. If you're interviewing for this role, speak with your Talent
    Acquisition Partner to learn more about the total compensation and benefits for
    this role.</p> <p>#LI-Hybrid</p><div class="content-conclusion"><p><strong>About
    us</strong></p> <p data-pm-slice="1 1 []">Asana is a lead
