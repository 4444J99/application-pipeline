    is changing how military systems are designed, built and sold. Anduril’s family
    of systems is powered by Lattice OS, an AI-powered operating system that turns
    thousands of data streams into a realtime, 3D command and control center. As the
    world enters an era of strategic competition, Anduril is committed to bringing
    cutting-edge autonomy, AI, computer vision, sensor fusion, and networking technology
    to the military in months, not years.</p></div><h3>About the Team</h3> <p>Anduril’s
    Maritime Division has assembled a diverse team of experts in software, robotics,
    artificial intelligence, sensor fusion, and data analysis to create software and
    hardware solutions that radically evolve the capabilities of our customers. We
    are fielding the next generation of autonomous systems to tackle the extremely
    challenging industry demands of maritime operations. Anduril has brought to market
    a unique, ultra-long-range, full-ocean-depth underwater vessel platform and a
    completely refreshed maritime vehicle and flexible manufacturing architecture
    that scales from "small" to "extra-large" vehicle sizes. Today, Anduril is executing
    on billion-dollar contracts while simultaneously performing Robot-as-a-Service
    (RaaS) AUV operations.<br><br>We are seeking to sustain our early successes with
    deep investment in an expanded product portfolio. These products, including Dive-XL,
    Dive-LD, Copperhead, Seabed Sentry, and other unannounced systems, will deliver
    a coherent system-of-systems, enabling the end-to-end conduct of a variety of
    autonomous missions in the maritime domain. If you are passionate about solving
    problems that have real impact and working on systems that directly contribute
    to achieving national strategic priorities, we want you to join Anduril’s Maritime
    Division and help us build the future of defense capability.</p> <h3>About the
    Job</h3> <p>Senior Software Engineers independently drive the delivery of a variety
    of embedded and/or safety critical software integrated in to our products. This
    includes device management, drivers, firmware, power management, networking, and
    contingency management and recovery. We expect Senior Software Engineers to demonstrate
    end-to-end outcome ownership at the major subsystem or system level. Senior Software
    Engineers contribute as a technical lead to the rapid architecting, design, delivery,
    support, and evolution of next generation autonomous platforms through their entire
    product life-cycle.</p> <h4>What You’ll Do</h4> <ul> <li>Design and implement
    trusted, safety critical Vehicle Management Systems that balance constraints,
    restrictions and requirements in a multi-stakeholder environment.</li> <li>Design
    and implement scalable vehicle sub-systems including sensor processing, state
    estimation, contingency management, actuation, payload interfaces, and mission
    systems interfaces.</li> <li>Contribute to the design and development of existing
    software components across Anduril, with the aim of developing components that
    are re-usable across multiple Anduril product lines.</li> <li>Develop real-time
    embedded software using an RTOS.</li> <li>Develop device drivers and interfaces
    to a variety of sensors and actuators.</li> <li>Create test and simulation fixtures
    that operate with both software-and hardware-in-the-loop.</li> <li>Support vehicle
    manufacturing and deployment.</li> <li>Work as a member of a multi-disciplinary
    engineering team, including as a mentor for Software Engineers from differing
    backgrounds.</li> <li>Travel to co-locate with end-users and/or other teams up
    to 20% of the time.</li> </ul> <h4>Required Qualifications</h4> <ul> <li>Bachelor’s
    degree in Robotics, Mechatronics, Computer Science, Engineering, a relevant field,
    or equivalent experience.</li> <li>Experienced and proficient at writing C.</li>
    <li>Experience with an RTOS.</li> <li>Familiarity with communications busses and
    protocols (e.g. CAN, CANFD, UART/RS232/RS422/RS485, SPI, QSPI, I2C, Ethernet,
    ARINC-825, ARINC-429, MIL-STD-1553, etc).</li> <li>Systems programming skills
    including algorithms, data structures, concurrency and optimization.</li> <li>Capacity
    to act as the technical owner for a software component, including stakeholder
